---
apiVersion: oci.planton.dev/v1
kind: OciObjectStorageBucket
metadata:
  name: "{{ values.env }}-{{ values.bucket_name }}"
spec:
  compartmentId:
    value: "{{ values.compartment_ocid }}"
  name: "{{ values.env }}-{{ values.bucket_name }}"
  accessType: no_public_access
  storageTier: standard
  versioning: enabled
  autoTiering: infrequent_access
