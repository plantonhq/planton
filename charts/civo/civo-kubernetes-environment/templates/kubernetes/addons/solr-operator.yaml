{% if values.solrOperatorEnabled | bool %}
---
apiVersion: kubernetes.planton.dev/v1
kind: KubernetesSolrOperator
metadata:
  name: {{ values.cluster_name }}-solr-operator
  relationships:
    - kind: CivoKubernetesCluster
      name: "{{ values.env }}-{{ values.cluster_name }}"
      type: runs_on
spec:
  targetCluster:
    clusterKind: CivoKubernetesCluster
    clusterName: "{{ values.env }}-{{ values.cluster_name }}"
  container:
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 50m
        memory: 100Mi
{% endif %}

