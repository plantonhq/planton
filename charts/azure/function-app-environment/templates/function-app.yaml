---
apiVersion: azure.planton.dev/v1
kind: AzureFunctionApp
metadata:
  name: "{{ values.env }}-{{ values.function_app_name }}"
spec:
  region: "{{ values.region }}"
  resourceGroup:
    valueFrom:
      kind: AzureResourceGroup
      name: "{{ values.env }}-rg"
      fieldPath: status.outputs.resource_group_name
  name: "{{ values.env }}-{{ values.function_app_name }}"
  servicePlanId:
    valueFrom:
      kind: AzureServicePlan
      name: "{{ values.env }}-{{ values.plan_name }}"
      fieldPath: status.outputs.plan_id
  storageAccountName:
    valueFrom:
      kind: AzureStorageAccount
      name: "{{ values.env }}-sa"
      fieldPath: status.outputs.storage_account_name
  functionsExtensionVersion: "{{ values.functions_extension_version }}"
  siteConfig:
    applicationStack:
      {% if values.runtime_stack == "node" %}
      nodeVersion: "{{ values.runtime_version }}"
      {% elif values.runtime_stack == "python" %}
      pythonVersion: "{{ values.runtime_version }}"
      {% elif values.runtime_stack == "java" %}
      javaVersion: "{{ values.runtime_version }}"
      {% elif values.runtime_stack == "dotnet" %}
      dotnetVersion: "{{ values.runtime_version }}"
      useDotnetIsolatedRuntime: false
      {% elif values.runtime_stack == "dotnet-isolated" %}
      dotnetVersion: "{{ values.runtime_version }}"
      useDotnetIsolatedRuntime: true
      {% endif %}
  {% if values.create_app_insights | bool %}
  applicationInsightsConnectionString:
    valueFrom:
      kind: AzureApplicationInsights
      name: "{{ values.env }}-appinsights"
      fieldPath: status.outputs.connection_string
  {% endif %}
