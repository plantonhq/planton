{% if values.postgresOperatorEnabled | bool %}
---
apiVersion: kubernetes.planton.dev/v1
kind: KubernetesZalandoPostgresOperator
metadata:
  name: {{ values.cluster_name }}-postgres-operator
  relationships:
    - kind: AzureAksNodePool
      name: "{{ values.node_pool_name }}"
      type: runs_on
spec:
  targetCluster:
    clusterKind: AzureAksCluster
    clusterName: "{{ values.env }}-{{ values.cluster_name }}"
{% endif %}

