{% if values.ingressNginxEnabled | bool %}
---
apiVersion: kubernetes.planton.dev/v1
kind: KubernetesIngressNginx
metadata:
  name: {{ values.cluster_name }}-ingress-nginx
  relationships:
    - kind: AwsEksNodeGroup
      name: "{{ values.node_group_name }}"
      type: runs_on
spec:
  targetCluster:
    clusterKind: AwsEksCluster
    clusterName: "{{ values.env }}-{{ values.cluster_name }}"
{% endif %}

