---
apiVersion: aws.planton.dev/v1
kind: AwsIamRole
metadata:
  name: "{{ values.env }}-eks-cluster-role"
spec:
  region: "{{ values.aws_region }}"
  description: IAM role for EKS control plane
  managedPolicyArns:
    - value: arn:aws:iam::aws:policy/AmazonEKSClusterPolicy
  trustPolicy:
    Statement:
      - Effect: Allow
        Principal:
          Service: eks.amazonaws.com
        Action: sts:AssumeRole
    Version: "2012-10-17"
---
apiVersion: aws.planton.dev/v1
kind: AwsIamRole
metadata:
  name: "{{ values.env }}-eks-node-role"
spec:
  region: "{{ values.aws_region }}"
  description: IAM role for EKS worker nodes
  managedPolicyArns:
    - value: arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
    - value: arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
    - value: arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
  trustPolicy:
    Statement:
      - Effect: Allow
        Principal:
          Service: ec2.amazonaws.com
        Action: sts:AssumeRole
    Version: "2012-10-17"
