---
apiVersion: aws.planton.dev/v1
kind: AwsIamRole
metadata:
  name: "{{ values.sagemaker_domain_name }}-execution-role"
  group: identity
spec:
  region: "{{ values.aws_region }}"
  description: SageMaker execution role with access to S3 model data
  path: /service-role/
  trustPolicy:
    Version: "2012-10-17"
    Statement:
      - Effect: Allow
        Principal:
          Service: sagemaker.amazonaws.com
        Action: sts:AssumeRole
  managedPolicyArns:
    - value: arn:aws:iam::aws:policy/AmazonSageMakerFullAccess
    - value: arn:aws:iam::aws:policy/AmazonS3FullAccess
