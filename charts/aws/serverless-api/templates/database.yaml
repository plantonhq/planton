{% if values.databaseEnabled | bool %}
---
apiVersion: aws.planton.dev/v1
kind: AwsDynamodb
metadata:
  name: "{{ values.dynamodb_table_name }}"
  group: database
spec:
  billingMode: PAY_PER_REQUEST
  attributeDefinitions:
    - name: "{{ values.dynamodb_hash_key }}"
      type: S
  keySchema:
    - attributeName: "{{ values.dynamodb_hash_key }}"
      keyType: HASH
{% endif %}
