{% if values.messagingEnabled | bool %}
---
apiVersion: aws.planton.dev/v1
kind: AwsSqsQueue
metadata:
  name: "{{ values.sqs_queue_name }}"
  group: messaging
spec:
  queueType: STANDARD
  visibilityTimeoutSeconds: 60
  messageRetentionSeconds: 345600
{% endif %}
{% if values.notificationsEnabled | bool %}
---
apiVersion: aws.planton.dev/v1
kind: AwsSnsTopic
metadata:
  name: "{{ values.sns_topic_name }}"
  group: messaging
spec: {}
{% endif %}
