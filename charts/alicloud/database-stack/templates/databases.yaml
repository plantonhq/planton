{% if values.rdsEnabled | bool %}
---
apiVersion: alicloud.planton.dev/v1
kind: AliCloudRdsInstance
metadata:
  name: "{{ values.env }}-rds"
spec:
  region: "{{ values.region }}"
  engine: "{{ values.rds_engine }}"
  engineVersion: "{{ values.rds_engine_version }}"
  instanceType: "{{ values.rds_instance_type }}"
  instanceStorage: {{ values.rds_storage_gb }}
  instanceName: "{{ values.env }}-rds"
  vswitchId:
    valueFrom:
      kind: AliCloudVswitch
      name: "{{ values.env }}-db-vswitch-1"
      fieldPath: status.outputs.vswitchId
  zoneId: "{{ values.availability_zone_1 }}"
  zoneIdSlaveA: "{{ values.availability_zone_2 }}"
  dbInstanceStorageType: cloud_essd
  securityIps:
    - "10.1.0.0/16"
{% endif %}

{% if values.polardbEnabled | bool %}
---
apiVersion: alicloud.planton.dev/v1
kind: AliCloudPolardbCluster
metadata:
  name: "{{ values.env }}-polardb"
spec:
  region: "{{ values.region }}"
  dbType: "{{ values.polardb_db_type }}"
  dbVersion: "{{ values.polardb_db_version }}"
  dbNodeClass: "{{ values.polardb_node_class }}"
  vswitchId:
    valueFrom:
      kind: AliCloudVswitch
      name: "{{ values.env }}-db-vswitch-1"
      fieldPath: status.outputs.vswitchId
  zoneId: "{{ values.availability_zone_1 }}"
  securityIps:
    - "10.1.0.0/16"
{% endif %}

{% if values.redisEnabled | bool %}
---
apiVersion: alicloud.planton.dev/v1
kind: AliCloudRedisInstance
metadata:
  name: "{{ values.env }}-redis"
spec:
  region: "{{ values.region }}"
  vswitchId:
    valueFrom:
      kind: AliCloudVswitch
      name: "{{ values.env }}-db-vswitch-1"
      fieldPath: status.outputs.vswitchId
  instanceClass: "{{ values.redis_instance_class }}"
  engineVersion: "{{ values.redis_engine_version }}"
  zoneId: "{{ values.availability_zone_1 }}"
  securityIps:
    - "10.1.0.0/16"
{% endif %}

{% if values.mongodbEnabled | bool %}
---
apiVersion: alicloud.planton.dev/v1
kind: AliCloudMongodbInstance
metadata:
  name: "{{ values.env }}-mongodb"
spec:
  region: "{{ values.region }}"
  vswitchId:
    valueFrom:
      kind: AliCloudVswitch
      name: "{{ values.env }}-db-vswitch-1"
      fieldPath: status.outputs.vswitchId
  engineVersion: "{{ values.mongodb_engine_version }}"
  dbInstanceClass: "{{ values.mongodb_instance_class }}"
  dbInstanceStorage: {{ values.mongodb_storage_gb }}
  zoneId: "{{ values.availability_zone_1 }}"
  securityIpLists:
    - "10.1.0.0/16"
{% endif %}
