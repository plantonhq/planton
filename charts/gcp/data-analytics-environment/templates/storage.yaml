---
apiVersion: gcp.planton.dev/v1
kind: GcpGcsBucket
metadata:
  name: "{{ values.bucket_name }}"
  group: storage
spec:
  gcpProjectId:
    value: "{{ values.gcp_project_id }}"
  bucketName: "{{ values.bucket_name }}"
  location: "{{ values.region }}"
  uniformBucketLevelAccessEnabled: true
  publicAccessPrevention: enforced
---
apiVersion: gcp.planton.dev/v1
kind: GcpBigQueryDataset
metadata:
  name: "{{ values.dataset_id }}"
  group: storage
spec:
  projectId:
    value: "{{ values.gcp_project_id }}"
  datasetId: "{{ values.dataset_id }}"
  location: "{{ values.region }}"
  description: Analytics warehouse managed by the Data Analytics Environment chart
---
apiVersion: gcp.planton.dev/v1
kind: GcpPubSubTopic
metadata:
  name: "{{ values.topic_name }}"
  group: messaging
spec:
  projectId:
    value: "{{ values.gcp_project_id }}"
  topicName: "{{ values.topic_name }}"
