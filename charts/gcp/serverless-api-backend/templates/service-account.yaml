---
apiVersion: gcp.planton.dev/v1
kind: GcpServiceAccount
metadata:
  name: "{{ values.service_account_id }}"
  group: identity
spec:
  serviceAccountId: "{{ values.service_account_id }}"
  projectId:
    value: "{{ values.gcp_project_id }}"
  projectIamRoles:
    - roles/run.invoker
    - roles/cloudsql.client
{% if values.cacheEnabled | bool %}
    - roles/redis.editor
{% endif %}
{% if values.messagingEnabled | bool %}
    - roles/pubsub.publisher
{% endif %}
{% if values.tasksEnabled | bool %}
    - roles/cloudtasks.enqueuer
{% endif %}
{% if values.secretsEnabled | bool %}
    - roles/secretmanager.secretAccessor
{% endif %}
