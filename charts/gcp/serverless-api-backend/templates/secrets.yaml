{% if values.secretsEnabled | bool %}
---
apiVersion: gcp.planton.dev/v1
kind: GcpSecretsManager
metadata:
  name: "{{ values.service_name }}-secrets"
  group: secrets
  relationships:
    - kind: GcpServiceAccount
      name: "{{ values.service_account_id }}"
      type: uses
spec:
  projectId:
    value: "{{ values.gcp_project_id }}"
  secretNames:
{% for secret in values.secret_names.split(',') %}
    - "{{ secret | trim }}"
{% endfor %}
{% endif %}
