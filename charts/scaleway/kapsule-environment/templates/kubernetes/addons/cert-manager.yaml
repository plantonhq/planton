{% if values.certManagerEnabled | bool %}
---
apiVersion: kubernetes.planton.dev/v1
kind: KubernetesCertManager
metadata:
  name: {{ values.cluster_name }}-cert-manager
  relationships:
    - kind: ScalewayKapsuleCluster
      name: "{{ values.env }}-{{ values.cluster_name }}"
      type: runs_on
spec:
  targetCluster:
    clusterKind: ScalewayKapsuleCluster
    clusterName: "{{ values.env }}-{{ values.cluster_name }}"
{% endif %}
