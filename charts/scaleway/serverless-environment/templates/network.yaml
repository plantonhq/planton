{% if values.create_network | bool %}
---
apiVersion: scaleway.planton.dev/v1
kind: ScalewayVpc
metadata:
  name: "{{ values.env }}-{{ values.container_name }}-vpc"
spec:
  region: "{{ values.region }}"
  enableRouting: false
---
apiVersion: scaleway.planton.dev/v1
kind: ScalewayPrivateNetwork
metadata:
  name: "{{ values.env }}-{{ values.container_name }}-pn"
spec:
  vpcId:
    valueFrom:
      kind: ScalewayVpc
      name: "{{ values.env }}-{{ values.container_name }}-vpc"
      fieldPath: status.outputs.vpc_id
  region: "{{ values.region }}"
{% endif %}
