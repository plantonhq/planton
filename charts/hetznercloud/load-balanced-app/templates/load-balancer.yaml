---
apiVersion: hetznercloud.planton.dev/v1
kind: HetznerCloudLoadBalancer
metadata:
  name: "{{ values.env }}-lb"
spec:
  loadBalancerType: "{{ values.load_balancer_type }}"
  location: "{{ values.location }}"
  algorithm: round_robin
  services:
    - protocol: http
      listenPort: 80
      destinationPort: {{ values.app_port }}
  {% if values.enable_https | bool %}
    - protocol: https
      listenPort: 443
      destinationPort: {{ values.app_port }}
      http:
        certificateIds:
          - valueFrom:
              kind: HetznerCloudCertificate
              name: "{{ values.env }}-cert"
              fieldPath: status.outputs.certificate_id
        redirectHttp: true
  {% endif %}
  serverTargets:
  {% for i in range(values.server_count | int) %}
    - serverId:
        valueFrom:
          kind: HetznerCloudServer
          name: "{{ values.env }}-app-{{ loop.index }}"
          fieldPath: status.outputs.server_id
      usePrivateIp: true
  {% endfor %}
  network:
    networkId:
      valueFrom:
        kind: HetznerCloudNetwork
        name: "{{ values.env }}-network"
        fieldPath: status.outputs.network_id
