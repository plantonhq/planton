---
apiVersion: hetznercloud.planton.dev/v1
kind: HetznerCloudSshKey
metadata:
  name: "{{ values.env }}-ssh-key"
spec:
  publicKey: "{{ values.ssh_public_key }}"
---
apiVersion: hetznercloud.planton.dev/v1
kind: HetznerCloudFirewall
metadata:
  name: "{{ values.env }}-firewall"
spec:
  rules:
    - direction: in
      protocol: tcp
      port: "22"
      sourceIps:
        - "0.0.0.0/0"
        - "::/0"
      description: Allow SSH from anywhere
    - direction: in
      protocol: icmp
      sourceIps:
        - "0.0.0.0/0"
        - "::/0"
      description: Allow ICMP (ping) from anywhere
