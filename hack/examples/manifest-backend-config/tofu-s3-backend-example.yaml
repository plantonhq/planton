# Example manifest with Terraform/Tofu S3 backend configuration in labels
# This manifest configures remote state storage in AWS S3
apiVersion: aws.planton.ai/v1
kind: EksCluster
metadata:
  id: main-cluster
  name: Main EKS Cluster
  labels:
    # Terraform/Tofu backend configuration for S3
    terraform.openmcf.org/backend.type: "s3"
    terraform.openmcf.org/backend.object: "my-terraform-state-bucket/eks/main-cluster/terraform.tfstate"
spec:
  awsProviderConfigId: aws-prod-creds
  region: us-west-2
  kubernetesVersion: "1.28"
  nodeGroups:
    - name: default
      instanceType: t3.medium
      minSize: 2
      maxSize: 5
      desiredSize: 3
