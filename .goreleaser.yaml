version: 2

project_name: planton

before:
  hooks:
    - go mod tidy

builds:
  - id: planton
    main: .
    binary: planton
    ldflags:
      - -s -w -X github.com/plantonhq/planton/internal/cli/version.Version={{.Tag}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    name_template: "cli_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "cli_{{ .Version }}_checksums.txt"

release:
  github:
    owner: plantonhq
    name: planton
  header: |
    ## Planton {{ .Tag }}

    This release includes the CLI and website deployment.

    Pre-built Pulumi binaries and Terraform module zips are hosted on [downloads.planton.dev](https://downloads.planton.dev/releases/{{ .Tag }}/).

  footer: |
    ---

    ## CLI Installation

    ### macOS (Manual)

    ```bash
    # Apple Silicon (M1/M2/M3)
    curl -LO https://github.com/plantonhq/planton/releases/download/{{ .Tag }}/cli_{{ .Version }}_darwin_arm64.tar.gz
    tar -xzf cli_{{ .Version }}_darwin_arm64.tar.gz
    chmod +x planton
    sudo mv planton /usr/local/bin/

    # Intel
    curl -LO https://github.com/plantonhq/planton/releases/download/{{ .Tag }}/cli_{{ .Version }}_darwin_amd64.tar.gz
    tar -xzf cli_{{ .Version }}_darwin_amd64.tar.gz
    chmod +x planton
    sudo mv planton /usr/local/bin/
    ```

    ### Linux

    ```bash
    # x86_64
    curl -LO https://github.com/plantonhq/planton/releases/download/{{ .Tag }}/cli_{{ .Version }}_linux_amd64.tar.gz
    tar -xzf cli_{{ .Version }}_linux_amd64.tar.gz
    chmod +x planton
    sudo mv planton /usr/local/bin/

    # ARM64
    curl -LO https://github.com/plantonhq/planton/releases/download/{{ .Tag }}/cli_{{ .Version }}_linux_arm64.tar.gz
    tar -xzf cli_{{ .Version }}_linux_arm64.tar.gz
    chmod +x planton
    sudo mv planton /usr/local/bin/
    ```

    ### Windows

    ```powershell
    # Download the ZIP file
    Invoke-WebRequest -Uri "https://github.com/plantonhq/planton/releases/download/{{ .Tag }}/cli_{{ .Version }}_windows_amd64.zip" -OutFile "cli.zip"

    # Extract
    Expand-Archive -Path "cli.zip" -DestinationPath "."

    # Add to PATH or move to a directory in PATH
    Move-Item -Path "planton.exe" -Destination "C:\Windows\System32\"
    ```

    ---

    ## Website

    The updated documentation website is available at:

    **https://planton.dev**

    ---

    ## Pulumi Module Binaries

    Pre-built Pulumi module binaries are hosted on **downloads.planton.dev** for all platforms. Each binary is gzip-compressed.

    **Browse all binaries:** [downloads.planton.dev/releases/{{ .Tag }}/modules/pulumi/](https://downloads.planton.dev/releases/{{ .Tag }}/modules/pulumi/)

    ### Available Platforms

    | Platform | Suffix | Example |
    |----------|--------|---------|
    | Linux x86-64 | `_linux_amd64.gz` | `awsecsservice_linux_amd64.gz` |
    | macOS Apple Silicon | `_darwin_arm64.gz` | `awsecsservice_darwin_arm64.gz` |
    | macOS Intel | `_darwin_amd64.gz` | `awsecsservice_darwin_amd64.gz` |
    | Windows x86-64 | `_windows_amd64.exe.gz` | `awsecsservice_windows_amd64.exe.gz` |

    ### Download and Extract

    ```bash
    # Example: Download the AWS ECS Service module for your platform

    # Linux x86-64
    curl -LO https://downloads.planton.dev/releases/{{ .Tag }}/modules/pulumi/awsecsservice_linux_amd64.gz
    gunzip awsecsservice_linux_amd64.gz
    chmod +x awsecsservice_linux_amd64

    # macOS Apple Silicon (M1/M2/M3)
    curl -LO https://downloads.planton.dev/releases/{{ .Tag }}/modules/pulumi/awsecsservice_darwin_arm64.gz
    gunzip awsecsservice_darwin_arm64.gz
    chmod +x awsecsservice_darwin_arm64
    ```

    ---

    ## Terraform Modules

    Terraform module zips are hosted on **downloads.planton.dev** for all deployment components across all providers.

    **Browse all modules:** [downloads.planton.dev/releases/{{ .Tag }}/modules/terraform/](https://downloads.planton.dev/releases/{{ .Tag }}/modules/terraform/)

    ### Download Zip (Recommended)

    ```bash
    # Example: AWS ECS Service
    curl -LO https://downloads.planton.dev/releases/{{ .Tag }}/modules/terraform/awsecsservice.zip
    unzip awsecsservice.zip -d awsecsservice
    cd awsecsservice
    terraform init && terraform plan
    ```

    ### Git Source Reference (Alternative)

    Reference modules directly in your Terraform configuration:

    ```hcl
    module "awsecsservice" {
      source = "git::https://github.com/plantonhq/planton.git//apis/dev/planton/provider/aws/awsecsservice/v1/iac/tf?ref={{ .Tag }}"
    }
    ```

    ---

    **Full Changelog**: https://github.com/plantonhq/planton/compare/{{ .PreviousTag }}...{{ .Tag }}

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch
