version: 2

project_name: openmcf

before:
  hooks:
    - go mod tidy

builds:
  - id: openmcf
    main: .
    binary: openmcf
    ldflags:
      - -s -w -X github.com/plantonhq/openmcf/internal/cli/version.Version={{.Tag}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    name_template: "cli_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "cli_{{ .Version }}_checksums.txt"

release:
  github:
    owner: plantonhq
    name: openmcf
  header: |
    ## OpenMCF {{ .Tag }}

    This release includes the CLI and website deployment.

    Pre-built Pulumi binaries and Terraform module zips are hosted on [downloads.openmcf.org](https://downloads.openmcf.org/releases/{{ .Tag }}/).

  footer: |
    ---

    ## CLI Installation

    ### macOS (Homebrew)

    ```bash
    brew tap plantonhq/tap
    brew install openmcf
    ```

    To upgrade:

    ```bash
    brew upgrade openmcf
    ```

    ### macOS (Manual)

    ```bash
    # Apple Silicon (M1/M2/M3)
    curl -LO https://github.com/plantonhq/openmcf/releases/download/{{ .Tag }}/cli_{{ .Version }}_darwin_arm64.tar.gz
    tar -xzf cli_{{ .Version }}_darwin_arm64.tar.gz
    chmod +x openmcf
    sudo mv openmcf /usr/local/bin/

    # Intel
    curl -LO https://github.com/plantonhq/openmcf/releases/download/{{ .Tag }}/cli_{{ .Version }}_darwin_amd64.tar.gz
    tar -xzf cli_{{ .Version }}_darwin_amd64.tar.gz
    chmod +x openmcf
    sudo mv openmcf /usr/local/bin/
    ```

    ### Linux

    ```bash
    # x86_64
    curl -LO https://github.com/plantonhq/openmcf/releases/download/{{ .Tag }}/cli_{{ .Version }}_linux_amd64.tar.gz
    tar -xzf cli_{{ .Version }}_linux_amd64.tar.gz
    chmod +x openmcf
    sudo mv openmcf /usr/local/bin/

    # ARM64
    curl -LO https://github.com/plantonhq/openmcf/releases/download/{{ .Tag }}/cli_{{ .Version }}_linux_arm64.tar.gz
    tar -xzf cli_{{ .Version }}_linux_arm64.tar.gz
    chmod +x openmcf
    sudo mv openmcf /usr/local/bin/
    ```

    ### Windows

    ```powershell
    # Download the ZIP file
    Invoke-WebRequest -Uri "https://github.com/plantonhq/openmcf/releases/download/{{ .Tag }}/cli_{{ .Version }}_windows_amd64.zip" -OutFile "cli.zip"

    # Extract
    Expand-Archive -Path "cli.zip" -DestinationPath "."

    # Add to PATH or move to a directory in PATH
    Move-Item -Path "openmcf.exe" -Destination "C:\Windows\System32\"
    ```

    ---

    ## Website

    The updated documentation website is available at:

    **https://openmcf.org**

    ---

    ## Pulumi Module Binaries

    Pre-built Pulumi module binaries are hosted on **downloads.openmcf.org** for all platforms. Each binary is gzip-compressed.

    **Browse all binaries:** [downloads.openmcf.org/releases/{{ .Tag }}/modules/pulumi/](https://downloads.openmcf.org/releases/{{ .Tag }}/modules/pulumi/)

    ### Available Platforms

    | Platform | Suffix | Example |
    |----------|--------|---------|
    | Linux x86-64 | `_linux_amd64.gz` | `awsecsservice_linux_amd64.gz` |
    | macOS Apple Silicon | `_darwin_arm64.gz` | `awsecsservice_darwin_arm64.gz` |
    | macOS Intel | `_darwin_amd64.gz` | `awsecsservice_darwin_amd64.gz` |
    | Windows x86-64 | `_windows_amd64.exe.gz` | `awsecsservice_windows_amd64.exe.gz` |

    ### Download and Extract

    ```bash
    # Example: Download the AWS ECS Service module for your platform

    # Linux x86-64
    curl -LO https://downloads.openmcf.org/releases/{{ .Tag }}/modules/pulumi/awsecsservice_linux_amd64.gz
    gunzip awsecsservice_linux_amd64.gz
    chmod +x awsecsservice_linux_amd64

    # macOS Apple Silicon (M1/M2/M3)
    curl -LO https://downloads.openmcf.org/releases/{{ .Tag }}/modules/pulumi/awsecsservice_darwin_arm64.gz
    gunzip awsecsservice_darwin_arm64.gz
    chmod +x awsecsservice_darwin_arm64
    ```

    ---

    ## Terraform Modules

    Terraform module zips are hosted on **downloads.openmcf.org** for all deployment components across all providers.

    **Browse all modules:** [downloads.openmcf.org/releases/{{ .Tag }}/modules/terraform/](https://downloads.openmcf.org/releases/{{ .Tag }}/modules/terraform/)

    ### Download Zip (Recommended)

    ```bash
    # Example: AWS ECS Service
    curl -LO https://downloads.openmcf.org/releases/{{ .Tag }}/modules/terraform/awsecsservice.zip
    unzip awsecsservice.zip -d awsecsservice
    cd awsecsservice
    terraform init && terraform plan
    ```

    ### Git Source Reference (Alternative)

    Reference modules directly in your Terraform configuration:

    ```hcl
    module "awsecsservice" {
      source = "git::https://github.com/plantonhq/openmcf.git//apis/org/openmcf/provider/aws/awsecsservice/v1/iac/tf?ref={{ .Tag }}"
    }
    ```

    ---

    **Full Changelog**: https://github.com/plantonhq/openmcf/compare/{{ .PreviousTag }}...{{ .Tag }}

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch

homebrew_casks:
  - name: openmcf
    repository:
      owner: plantonhq
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/plantonhq/openmcf
    description: "OpenMCF CLI - Infrastructure as Code made simple"
    binaries:
      - openmcf
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/openmcf"]
          end
    caveats: |
      Installation Complete!

      OpenMCF CLI helps you manage infrastructure deployments.

      Quick Start

      1. Check the version:
         openmcf version

      2. Get help:
         openmcf --help

      Documentation: https://github.com/plantonhq/openmcf
