syntax = "proto3";

package org.openmcf.qa.providere2eprofile.v1;

import "org/openmcf/qa/providere2eprofile/v1/spec.proto";
import "org/openmcf/shared/metadata.proto";

// ProviderE2EProfile declares how E2E tests are executed for a cloud provider.
// Follows the KRM pattern (apiVersion + kind + metadata + spec).
// Lives at {provider}/aa_e2e/profile.yaml.
//
// Example:
//   apiVersion: qa.openmcf.org/v1
//   kind: ProviderE2EProfile
//   metadata:
//     name: kubernetes
//   spec:
//     credential_approach: none
//     test_substrate: kind
//     default_cost_class: free_local
//     default_schedule_lane: weekly
//     required_tools: [kind, kubectl, pulumi, tofu]
//     github_environment: e2e-kubernetes
//     max_concurrent_tests: 8
message ProviderE2EProfile {
  string api_version = 1;
  string kind = 2;
  org.openmcf.shared.CloudResourceMetadata metadata = 3;
  ProviderE2EProfileSpec spec = 4;
}
