syntax = "proto3";

package org.openmcf.qa.componente2eprofile.v1;

import "org/openmcf/qa/shared/cost_class.proto";
import "org/openmcf/shared/iac.proto";

// ComponentE2EProfileSpec configures per-component E2E behavior.
message ComponentE2EProfileSpec {
  // E2E readiness status for this component.
  enum Status {
    status_unspecified = 0;
    // Passes on CI and is included in scheduled runs.
    green = 1;
    // Known failure with a documented reason; skipped in CI.
    deferred = 2;
    // Intentionally excluded from E2E (e.g., requires cloud credentials not yet configured).
    skip = 3;
    // Module is a stub with no real deployment logic yet.
    stub = 4;
  }

  // Dependency tier within the provider (1 = simplest, higher = more dependencies).
  // For Kubernetes: 1=native K8s, 2=Helm-based, 3=operator-dependent, 4=operators/addons.
  int32 tier = 1;
  Status status = 2;
  // Human-readable explanation when status is deferred or skip.
  string deferred_reason = 3;
  // IaC provisioners that have been E2E-validated for this component.
  repeated org.openmcf.shared.IacProvisioner validated_provisioners = 4;
  // Per-component timeout in minutes for a single E2E run.
  int32 timeout_minutes = 5;
  // Overrides the provider's default cost class when this component is more expensive
  // than typical components in the same provider.
  org.openmcf.qa.shared.CostClass cost_class = 6;
  // Known limitations that affect E2E testing (e.g., "requires 4+ GB RAM").
  repeated string limitations = 7;
}
