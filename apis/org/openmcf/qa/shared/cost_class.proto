syntax = "proto3";

package org.openmcf.qa.shared;

// CostClass classifies a provider or component by its E2E testing cost profile.
// Used by the CI scheduler to determine which test lane a component runs in
// and by budget controls to cap cloud spend.
enum CostClass {
  cost_class_unspecified = 0;
  // Local infrastructure only (kind clusters, local containers). $0.
  free_local = 1;
  // Cloud free tiers (Cloudflare Workers Free, Auth0 free, OCI Always Free, Atlas M0). $0.
  free_cloud = 2;
  // Low-cost VPS providers (DigitalOcean, Civo, Hetzner, Scaleway). ~$1-5/provider/month.
  cheap_ephemeral = 3;
  // Major cloud non-free resources (AWS, GCP, Azure compute/storage). ~$25-200/provider/month.
  paid_ephemeral = 4;
  // Managed control planes and heavy resources (EKS, GKE, Cloud SQL, AKS). Variable cost.
  expensive = 5;
}
