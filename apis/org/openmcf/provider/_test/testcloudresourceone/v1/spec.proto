syntax = "proto3";

package org.openmcf.provider._test.testcloudresourceone.v1;

import "buf/validate/validate.proto";
import "org/openmcf/shared/foreignkey/v1/foreign_key.proto";
import "org/openmcf/shared/options/options.proto";

//TestCloudResourceOneSpec defines test configuration with comprehensive default values
message TestCloudResourceOneSpec {
  // String fields - one with default, one without
  optional string string_field = 1 [(org.openmcf.shared.options.default) = "default-string"];
  string string_no_default = 2;

  // Numeric fields with defaults
  optional int32 int32_field = 3 [(org.openmcf.shared.options.default) = "42"];
  optional int64 int64_field = 4 [(org.openmcf.shared.options.default) = "9999"];
  optional uint32 uint32_field = 5 [(org.openmcf.shared.options.default) = "100"];
  optional uint64 uint64_field = 6 [(org.openmcf.shared.options.default) = "50000"];

  // Float fields with defaults
  optional float float_field = 7 [(org.openmcf.shared.options.default) = "3.14"];
  optional double double_field = 8 [(org.openmcf.shared.options.default) = "2.718"];

  // Bool field with default
  optional bool bool_field = 9 [(org.openmcf.shared.options.default) = "true"];

  // Nested message with defaults
  TestNestedMessage nested = 10;

  // ─── StringValueOrRef validation test fields ──────────────────────────────────
  //
  // These two fields exist to provide durable boundary-test coverage for the
  // message-level CEL rule on StringValueOrRef (see foreign_key.proto).
  //
  // WHY HERE AND NOT ON A PRODUCTION RESOURCE:
  // Production resources (KubernetesDeployment, GcpSecretsManager, etc.) may be
  // removed or refactored over time. If boundary tests lived only on those resources,
  // the institutional knowledge encoded in the tests would silently vanish with them.
  // TestCloudResourceOne is permanent test infrastructure -- these tests survive
  // regardless of which production resources come and go.
  //
  // WHY TWO FIELDS:
  // - required_ref: Tests the interaction of `(buf.validate.field).required = true`
  //   with StringValueOrRef's message-level CEL rule. This is the exact combination
  //   that caused the false-positive: `required` checks message presence, but the CEL
  //   rule now also checks content.
  // - optional_ref: Tests the opposite -- a StringValueOrRef without `required`. This
  //   proves the CEL rule fires on message PRESENCE, not on the field annotation. When
  //   the field is nil (absent), validation passes. When the message is present, the
  //   CEL rule fires regardless of whether the field is marked required.

  // A StringValueOrRef with required = true. Mirrors real-world usage like
  // KubernetesDeploymentSpec.namespace, AwsEcsServiceSpec.cluster_arn, etc.
  org.openmcf.shared.foreignkey.v1.StringValueOrRef required_ref = 11 [(buf.validate.field).required = true];

  // A StringValueOrRef WITHOUT required. Proves the CEL rule fires on message
  // presence alone. nil = skip validation, present = must have content.
  org.openmcf.shared.foreignkey.v1.StringValueOrRef optional_ref = 12;
}

//TestNestedMessage tests nested message defaults
message TestNestedMessage {
  optional string nested_string = 1 [(org.openmcf.shared.options.default) = "nested-default"];
  optional int32 nested_int = 2 [(org.openmcf.shared.options.default) = "99"];
}
