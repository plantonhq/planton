syntax = "proto3";

package org.openmcf.provider._test.testcloudresourcegeneric.v1;

import "buf/validate/validate.proto";
import "org/openmcf/shared/foreignkey/v1/foreign_key.proto";
import "org/openmcf/shared/options/options.proto";

// TestCloudResourceGenericSpec is permanent test infrastructure for both OpenMCF
// and downstream consumers (Planton). It provides every GENERIC field type needed
// to test proto processing machinery (defaults, validation, serialization,
// reflection) without depending on volatile production cloud resource shapes or
// Kubernetes-specific types.
//
// For Kubernetes-specific test fields (ContainerResources, KubernetesClusterSelector,
// ContainerEnv, etc.), use TestCloudResourceKubernetes instead.
//
// Field coverage:
//   - Scalar fields with (org.openmcf.shared.options.default): string, int32, int64,
//     uint32, uint64, float, double, bool
//   - Scalar field WITHOUT default (verifies non-default fields are untouched)
//   - Nested message with defaults (TestGenericNestedMessage)
//   - StringValueOrRef fields for foreign-key / valueFrom testing
//   - map<string, string> for verifying that defaults applier skips map fields
//   - repeated string for verifying that defaults applier skips repeated fields
message TestCloudResourceGenericSpec {
  // ─── Scalar fields with defaults ──────────────────────────────────────────────

  optional string string_field = 1 [(org.openmcf.shared.options.default) = "default-string"];
  string string_no_default = 2;
  optional int32 int32_field = 3 [(org.openmcf.shared.options.default) = "42"];
  optional int64 int64_field = 4 [(org.openmcf.shared.options.default) = "9999"];
  optional uint32 uint32_field = 5 [(org.openmcf.shared.options.default) = "100"];
  optional uint64 uint64_field = 6 [(org.openmcf.shared.options.default) = "50000"];
  optional float float_field = 7 [(org.openmcf.shared.options.default) = "3.14"];
  optional double double_field = 8 [(org.openmcf.shared.options.default) = "2.718"];
  optional bool bool_field = 9 [(org.openmcf.shared.options.default) = "true"];

  // ─── Nested message with defaults ─────────────────────────────────────────────

  TestGenericNestedMessage nested = 10;

  // ─── StringValueOrRef validation test fields ──────────────────────────────────
  //
  // These two fields provide durable boundary-test coverage for the message-level
  // CEL rule on StringValueOrRef (see foreign_key.proto).
  //
  // WHY HERE AND NOT ON A PRODUCTION RESOURCE:
  // Production resources may be removed or refactored over time. TestCloudResource
  // types are permanent test infrastructure -- these tests survive regardless of
  // which production resources come and go.
  //
  // - required_ref: Tests (buf.validate.field).required + StringValueOrRef CEL rule.
  // - optional_ref: Tests StringValueOrRef CEL rule fires on presence, not annotation.

  org.openmcf.shared.foreignkey.v1.StringValueOrRef required_ref = 11 [(buf.validate.field).required = true];
  org.openmcf.shared.foreignkey.v1.StringValueOrRef optional_ref = 12;

  // ─── Map field (defaults applier must skip) ───────────────────────────────────

  map<string, string> labels = 13;

  // ─── Repeated field (defaults applier must skip) ──────────────────────────────

  repeated string commands = 14;
}

// TestGenericNestedMessage tests nested message defaults
message TestGenericNestedMessage {
  optional string nested_string = 1 [(org.openmcf.shared.options.default) = "nested-default"];
  optional int32 nested_int = 2 [(org.openmcf.shared.options.default) = "99"];
}
