syntax = "proto3";

package org.openmcf.provider._test.testcloudresourcegeneric.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/_test/testcloudresourcegeneric/v1/spec.proto";
import "org/openmcf/provider/_test/testcloudresourcegeneric/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// TestCloudResourceGeneric is permanent test infrastructure for generic (non-provider-specific)
// proto processing tests: defaults application, validation, serialization, reflection.
// For Kubernetes-specific testing, use TestCloudResourceKubernetes.
message TestCloudResourceGeneric {
  string api_version = 1 [(buf.validate.field).string.const = '_test.openmcf.org/v1'];
  string kind = 2 [(buf.validate.field).string.const = 'TestCloudResourceGeneric'];
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];
  TestCloudResourceGenericSpec spec = 4;
  TestCloudResourceGenericStatus status = 5;
}

message TestCloudResourceGenericStatus {
  TestCloudResourceGenericStackOutputs outputs = 1;
}
