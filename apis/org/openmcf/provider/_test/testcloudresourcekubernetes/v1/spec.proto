syntax = "proto3";

package org.openmcf.provider._test.testcloudresourcekubernetes.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/kubernetes/container_env.proto";
import "org/openmcf/provider/kubernetes/kubernetes.proto";
import "org/openmcf/provider/kubernetes/options.proto";
import "org/openmcf/provider/kubernetes/target_cluster.proto";
import "org/openmcf/shared/foreignkey/v1/foreign_key.proto";
import "org/openmcf/shared/options/options.proto";

// TestCloudResourceKubernetesSpec is permanent test infrastructure for
// Kubernetes-specific proto processing tests: ContainerResources defaults,
// KubernetesClusterSelector skip rules, ContainerEnv handling, and
// Flatten/HCL generation for Terraform modules.
//
// For generic (non-Kubernetes) test fields, use TestCloudResourceGeneric instead.
//
// Field coverage:
//   - KubernetesClusterSelector (Flatten skip-rule testing)
//   - StringValueOrRef namespace (singular flatten testing)
//   - ContainerResources with default_container_resources (default strategy testing)
//   - ContainerEnv with list-based variables/secrets
//   - map<string, StringValueOrRef> (Flatten map-value rule testing)
//   - repeated string command (plain repeated field)
//   - Scalar with default (schedule-like field for mixed testing)
message TestCloudResourceKubernetesSpec {
  // ─── Kubernetes target cluster (Flatten skip-rule testing) ────────────────────

  org.openmcf.provider.kubernetes.KubernetesClusterSelector target_cluster = 1;

  // ─── Namespace as StringValueOrRef ────────────────────────────────────────────

  org.openmcf.shared.foreignkey.v1.StringValueOrRef namespace = 2 [
    (buf.validate.field).required = true,
    (org.openmcf.shared.foreignkey.v1.default_kind) = KubernetesNamespace,
    (org.openmcf.shared.foreignkey.v1.default_kind_field_path) = "spec.name"
  ];

  bool create_namespace = 3;

  // ─── Container resources with default ─────────────────────────────────────────

  org.openmcf.provider.kubernetes.ContainerResources resources = 4 [(org.openmcf.provider.kubernetes.default_container_resources) = {
    limits: {
      cpu: "1000m"
      memory: "1Gi"
    }
    requests: {
      cpu: "50m"
      memory: "100Mi"
    }
  }];

  // ─── Container environment (list-based) ───────────────────────────────────────

  org.openmcf.provider.kubernetes.ContainerEnv env = 5;

  // ─── Map with StringValueOrRef values (Flatten map-value rule testing) ────────

  map<string, org.openmcf.shared.foreignkey.v1.StringValueOrRef> ref_map = 6;

  // ─── Plain repeated field ─────────────────────────────────────────────────────

  repeated string command = 7;

  // ─── Scalar with default ──────────────────────────────────────────────────────

  optional string schedule = 8 [(org.openmcf.shared.options.default) = "0 0 * * *"];
}
