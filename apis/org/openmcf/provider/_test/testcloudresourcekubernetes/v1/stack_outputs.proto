syntax = "proto3";

package org.openmcf.provider._test.testcloudresourcekubernetes.v1;

// Stack outputs for TestCloudResourceKubernetes.
// Mirrors the shape of real Kubernetes cloud resource outputs so that
// downstream consumers can test output loading, setting, getting, and
// state-building machinery against stable test infrastructure.
message TestCloudResourceKubernetesStackOutputs {
  string namespace = 1;
  string service = 2;
  string endpoint = 3;
  string port_forward_command = 4;
  string kube_endpoint = 5;
  string external_hostname = 6;
  string internal_hostname = 7;
  repeated string tags = 8;
}
