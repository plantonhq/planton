syntax = "proto3";

package org.openmcf.provider.scaleway.scalewaykapsulepool.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/scaleway/scalewaykapsulepool/v1/spec.proto";
import "org/openmcf/provider/scaleway/scalewaykapsulepool/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// scaleway-kapsule-pool
message ScalewayKapsulePool {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = "scaleway.openmcf.org/v1"];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = "ScalewayKapsulePool"];

  //metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  ScalewayKapsulePoolSpec spec = 4 [(buf.validate.field).required = true];

  //status
  ScalewayKapsulePoolStatus status = 5;
}

// scaleway-kapsule-pool status
message ScalewayKapsulePoolStatus {
  //stack-outputs
  //  scaleway-kapsule-pool stack-outputs
  ScalewayKapsulePoolStackOutputs outputs = 1;
}
