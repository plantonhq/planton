syntax = "proto3";

package org.openmcf.provider.scaleway.scalewayrdbinstance.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/scaleway/scalewayrdbinstance/v1/spec.proto";
import "org/openmcf/provider/scaleway/scalewayrdbinstance/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// scaleway-rdb-instance
message ScalewayRdbInstance {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = "scaleway.openmcf.org/v1"];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = "ScalewayRdbInstance"];

  //metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  ScalewayRdbInstanceSpec spec = 4 [(buf.validate.field).required = true];

  //status
  ScalewayRdbInstanceStatus status = 5;
}

// scaleway-rdb-instance status
message ScalewayRdbInstanceStatus {
  //stack-outputs
  //  scaleway-rdb-instance stack-outputs
  ScalewayRdbInstanceStackOutputs outputs = 1;
}
