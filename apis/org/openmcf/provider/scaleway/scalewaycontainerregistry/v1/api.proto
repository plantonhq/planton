syntax = "proto3";

package org.openmcf.provider.scaleway.scalewaycontainerregistry.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/scaleway/scalewaycontainerregistry/v1/spec.proto";
import "org/openmcf/provider/scaleway/scalewaycontainerregistry/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// scaleway-container-registry
message ScalewayContainerRegistry {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = "scaleway.openmcf.org/v1"];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = "ScalewayContainerRegistry"];

  //metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  ScalewayContainerRegistrySpec spec = 4 [(buf.validate.field).required = true];

  //status
  ScalewayContainerRegistryStatus status = 5;
}

// scaleway-container-registry status
message ScalewayContainerRegistryStatus {
  //stack-outputs
  //  scaleway-container-registry stack-outputs
  ScalewayContainerRegistryStackOutputs outputs = 1;
}
