syntax = "proto3";

package org.openmcf.provider.scaleway.scalewayrediscluster.v1;

// ScalewayRedisClusterStackOutputs captures the provisioned Redis cluster
// details needed by downstream resources and applications.
//
// The primary output is `cluster_id` (for downstream monitoring and
// management references).
//
// Two endpoint types are provided, depending on the networking mode:
//   - Public network (when NOT using Private Network): Public IPs and port.
//   - Private network (when using Private Network): Private IPs and port.
//
// Only one set of endpoints will be populated, matching the networking
// mode chosen in the spec (ACL = public, Private Network = private).
//
// Passwords are NOT exported as outputs. They are user-specified in the
// spec and should be managed through your organization's secrets workflow.
message ScalewayRedisClusterStackOutputs {
  // The unique identifier of the created Redis cluster.
  //
  // Format: zonal ID (e.g., "fr-par-1/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx").
  // This is the primary output referenced by downstream resources.
  string cluster_id = 1;

  // Public network port number.
  //
  // The TCP port for connecting to the cluster over the public network.
  // Populated when the cluster is NOT attached to a Private Network.
  // Zero when using Private Network mode.
  uint32 public_network_port = 2;

  // Public network IP addresses.
  //
  // The IPv4 addresses for connecting to the cluster over the public
  // network. Populated when the cluster is NOT attached to a Private
  // Network. Empty when using Private Network mode.
  repeated string public_network_ips = 3;

  // Private network port number.
  //
  // The TCP port for connecting to the cluster from the Private Network.
  // Populated when the cluster IS attached to a Private Network.
  // Zero when using public network mode.
  uint32 private_network_port = 4;

  // Private network IP addresses.
  //
  // The IPv4 addresses for connecting to the cluster from the Private
  // Network. Populated when the cluster IS attached to a Private Network.
  // Empty when using public network mode.
  repeated string private_network_ips = 5;

  // TLS certificate in PEM format for verifying the Redis server.
  //
  // Available only when `tls_enabled` is true in the spec. Clients
  // should use this CA certificate to establish encrypted connections
  // and verify the server's identity.
  //
  // Empty when TLS is disabled.
  string certificate = 6;
}
