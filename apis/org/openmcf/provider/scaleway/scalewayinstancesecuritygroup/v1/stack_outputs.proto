syntax = "proto3";

package org.openmcf.provider.scaleway.scalewayinstancesecuritygroup.v1;

// ScalewayInstanceSecurityGroupStackOutputs captures the outputs after
// provisioning a Scaleway Instance Security Group.
message ScalewayInstanceSecurityGroupStackOutputs {
  // The unique identifier of the created security group.
  //
  // This is the primary output referenced by downstream resources
  // (e.g., ScalewayInstance) via StringValueOrRef on the security_group_id field.
  //
  // Format: Scaleway zoned ID "{zone}/{uuid}" (e.g., "fr-par-1/11111111-1111-...")
  string security_group_id = 1;
}
