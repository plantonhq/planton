syntax = "proto3";

package org.openmcf.provider.scaleway.scalewayprivatenetwork.v1;

// ScalewayPrivateNetworkStackOutputs captures the provisioned Private Network details.
//
// The private_network_id is the most-referenced output in the Scaleway resource graph.
// It is consumed by Kapsule clusters, RDB instances, Redis clusters, Load Balancers,
// Instances, Public Gateways, MongoDB instances, and Serverless Containers -- all of
// which attach to a Private Network for secure, private communication.
message ScalewayPrivateNetworkStackOutputs {
  // The unique identifier (UUID) of the created Scaleway Private Network.
  //
  // This is the primary output referenced by downstream resources via StringValueOrRef.
  // In infra charts, downstream resources wire to this value using:
  //
  //   privateNetworkId:
  //     valueFrom:
  //       kind: ScalewayPrivateNetwork
  //       name: my-network
  //       fieldPath: status.outputs.private_network_id
  string private_network_id = 1;

  // The IPv4 subnet CIDR associated with this Private Network.
  //
  // If ipv4_subnet was specified in the spec, this reflects the requested CIDR.
  // If ipv4_subnet was omitted, this contains the CIDR auto-allocated by
  // Scaleway's IPAM service.
  string ipv4_subnet_cidr = 2;
}
