syntax = "proto3";

package org.openmcf.provider.scaleway.scalewayserverlessfunction.v1;

import "org/openmcf/provider/scaleway/provider.proto";
import "org/openmcf/provider/scaleway/scalewayserverlessfunction/v1/api.proto";

// ScalewayServerlessFunctionStackInput is the input to the IaC module.
// It contains the target resource and provider configuration.
message ScalewayServerlessFunctionStackInput {
  // target cloud-resource to be deployed
  ScalewayServerlessFunction target = 1;
  // provider-config for Scaleway authentication
  org.openmcf.provider.scaleway.ScalewayProviderConfig provider_config = 2;
}
