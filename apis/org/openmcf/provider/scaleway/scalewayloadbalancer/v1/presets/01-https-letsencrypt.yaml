apiVersion: scaleway.openmcf.org/v1
kind: ScalewayLoadBalancer
metadata:
  name: my-lb
spec:
  zone: fr-par-1
  type: LB-S  # recommended_default from spec
  privateNetworkId:
    value: "<your-private-network-id>"
  backends:
    - name: web
      serverIps:
        - "<backend-server-ip-1>"
        - "<backend-server-ip-2>"
      forwardPort: 80
      forwardProtocol: http  # recommended_default from spec
      forwardPortAlgorithm: roundrobin  # recommended_default from spec
      healthCheck:
        type: http
        uri: /health
        expectedCode: 200
        checkDelay: 5s  # recommended_default from spec
        checkTimeout: 3s  # recommended_default from spec
        checkMaxRetries: 3  # recommended_default from spec
  frontends:
    - name: https
      inboundPort: 443
      backendName: web
      certificateNames:
        - my-cert
    - name: http
      inboundPort: 80
      backendName: web
  certificates:
    - name: my-cert
      letsencrypt:
        commonName: <your-domain.com>
