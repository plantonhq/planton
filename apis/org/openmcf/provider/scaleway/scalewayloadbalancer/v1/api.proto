syntax = "proto3";

package org.openmcf.provider.scaleway.scalewayloadbalancer.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/scaleway/scalewayloadbalancer/v1/spec.proto";
import "org/openmcf/provider/scaleway/scalewayloadbalancer/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// ScalewayLoadBalancer represents a managed Scaleway Load Balancer that bundles
// a Flexible IP, the LB appliance, backend server pools, frontend listeners,
// and optional TLS certificates into a single declarative resource.
//
// This is a composite resource. Applying a single ScalewayLoadBalancer manifest
// creates up to 5 different Scaleway resource types under the hood:
//   - scaleway_lb_ip       -- Dedicated Flexible IP
//   - scaleway_lb          -- Load Balancer appliance
//   - scaleway_lb_backend  -- Backend server pool(s)
//   - scaleway_lb_frontend -- Frontend listener(s)
//   - scaleway_lb_certificate -- TLS certificate(s)
message ScalewayLoadBalancer {
  // api-version must be set to "scaleway.openmcf.org/v1".
  string api_version = 1 [(buf.validate.field).string.const = "scaleway.openmcf.org/v1"];

  // resource-kind must be set to "ScalewayLoadBalancer".
  string kind = 2 [(buf.validate.field).string.const = "ScalewayLoadBalancer"];

  // metadata captures identifying information (name, org, env, etc.)
  // and must pass standard validations for resource naming.
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec holds the Load Balancer configuration: zone, type, backends,
  // frontends, certificates, and optional Private Network attachment.
  ScalewayLoadBalancerSpec spec = 4 [(buf.validate.field).required = true];

  // status holds runtime information populated after provisioning.
  ScalewayLoadBalancerStatus status = 5;
}

// ScalewayLoadBalancerStatus holds post-deployment information.
message ScalewayLoadBalancerStatus {
  // stack_outputs captures the outputs returned by Pulumi/Terraform
  // after provisioning the Load Balancer composite.
  ScalewayLoadBalancerStackOutputs outputs = 1;
}
