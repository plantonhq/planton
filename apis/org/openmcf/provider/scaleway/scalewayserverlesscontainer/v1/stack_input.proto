syntax = "proto3";

package org.openmcf.provider.scaleway.scalewayserverlesscontainer.v1;

import "org/openmcf/provider/scaleway/provider.proto";
import "org/openmcf/provider/scaleway/scalewayserverlesscontainer/v1/api.proto";

// ScalewayServerlessContainerStackInput is the input to the IaC module.
// It contains the target resource and provider configuration.
message ScalewayServerlessContainerStackInput {
  // target cloud-resource to be deployed
  ScalewayServerlessContainer target = 1;
  // provider-config for Scaleway authentication
  org.openmcf.provider.scaleway.ScalewayProviderConfig provider_config = 2;
}
