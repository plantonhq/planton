syntax = "proto3";

package org.openmcf.provider.scaleway.scalewaydnsrecord.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/scaleway/scalewaydnsrecord/v1/spec.proto";
import "org/openmcf/provider/scaleway/scalewaydnsrecord/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// ScalewayDnsRecord is a Kubernetes Resource Model (KRM) style resource
// for managing individual DNS records within a Scaleway DNS zone.
//
// This is the **standalone** DNS record kind -- the DAG-friendly
// counterpart to ScalewayDnsZone's inline records. Use this kind when
// record values come from other infrastructure resources (A records
// pointing to a Load Balancer IP, CNAMEs to a Kapsule cluster endpoint)
// so that infra charts can express explicit dependency edges.
//
// Maps to a single `scaleway_domain_record` Terraform resource.
message ScalewayDnsRecord {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'scaleway.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'ScalewayDnsRecord'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  ScalewayDnsRecordSpec spec = 4 [(buf.validate.field).required = true];

  // status
  ScalewayDnsRecordStatus status = 5;
}

// ScalewayDnsRecordStatus represents the observed state of a Scaleway DNS record.
message ScalewayDnsRecordStatus {
  // stack-outputs from the IaC deployment
  ScalewayDnsRecordStackOutputs outputs = 1;
}
