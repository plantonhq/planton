syntax = "proto3";

package org.openmcf.provider.cloudflare.cloudflareemailroutingzone.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/cloudflare/cloudflareemailroutingzone/v1/spec.proto";
import "org/openmcf/provider/cloudflare/cloudflareemailroutingzone/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// cloudflare-email-routing-zone
message CloudflareEmailRoutingZone {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'cloudflare.openmcf.org/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'CloudflareEmailRoutingZone'];

  //metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  CloudflareEmailRoutingZoneSpec spec = 4 [(buf.validate.field).required = true];

  //status
  CloudflareEmailRoutingZoneStatus status = 5;
}

// cloudflare-email-routing-zone status
message CloudflareEmailRoutingZoneStatus {
  //stack-outputs
  //  cloudflare-email-routing-zone stack-outputs
  CloudflareEmailRoutingZoneStackOutputs outputs = 1;
}
