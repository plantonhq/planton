syntax = "proto3";

package org.openmcf.provider.cloudflare.cloudflareemailroutingzone.v1;

// CloudflareEmailRoutingZoneStackOutputs captures the outputs after enabling
// Email Routing on a zone.
message CloudflareEmailRoutingZoneStackOutputs {
  // The zone ID Email Routing was enabled on.
  string zone_id = 1;

  // Whether Email Routing is enabled on the zone.
  bool enabled = 2;

  // The Email Routing configuration status (e.g. ready, unconfigured,
  // misconfigured).
  string status = 3;

  // The zone's domain name.
  string name = 4;
}
