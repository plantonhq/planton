syntax = "proto3";

package org.openmcf.provider.cloudflare.cloudflareemailroutingzone.v1;

import "buf/validate/validate.proto";
import "org/openmcf/shared/foreignkey/v1/foreign_key.proto";

// The action a catch-all rule takes on mail that no other rule matched.
enum CloudflareEmailRoutingCatchAllActionType {
  catch_all_action_type_unspecified = 0; // Must not be used.
  drop = 1; // Silently discard unmatched mail (the default).
  forward = 2; // Forward to one or more verified destination addresses.
  worker = 3; // Hand the message to an Email Worker.
}

// CloudflareEmailRoutingZoneCatchAll configures the single catch-all rule that
// applies to mail addressed to the zone that no other routing rule matched.
message CloudflareEmailRoutingZoneCatchAll {
  // Whether the catch-all rule is active.
  bool enabled = 1;

  // What to do with unmatched mail.
  CloudflareEmailRoutingCatchAllActionType type = 2 [
    (buf.validate.field).enum.defined_only = true,
    (buf.validate.field).cel = {
      id: "catch_all.type_not_unspecified"
      message: "catch-all type must be one of drop, forward, worker"
      expression: "this != 0"
    }
  ];

  // Destination addresses to forward to (required when type is forward). Each is
  // a verified destination email, or a reference to a CloudflareEmailRoutingAddress.
  repeated org.openmcf.shared.foreignkey.v1.StringValueOrRef forward_to = 3 [
    (org.openmcf.shared.foreignkey.v1.default_kind) = CloudflareEmailRoutingAddress,
    (org.openmcf.shared.foreignkey.v1.default_kind_field_path) = "status.outputs.email"
  ];

  // The Email Worker script to invoke (required when type is worker). A script
  // name or a reference to a CloudflareWorker.
  org.openmcf.shared.foreignkey.v1.StringValueOrRef worker = 4 [
    (org.openmcf.shared.foreignkey.v1.default_kind) = CloudflareWorker,
    (org.openmcf.shared.foreignkey.v1.default_kind_field_path) = "status.outputs.script_name"
  ];

  // forward requires forward_to; worker requires worker.
  option (buf.validate.message).cel = {
    id: "catch_all.forward_requires_forward_to"
    message: "forward_to is required when catch-all type is forward"
    expression: "this.type != 2 || size(this.forward_to) > 0"
  };
  option (buf.validate.message).cel = {
    id: "catch_all.worker_requires_worker"
    message: "worker is required when catch-all type is worker"
    expression: "this.type != 3 || has(this.worker)"
  };
}

// CloudflareEmailRoutingZoneSpec enables Email Routing on a zone — the anchor for
// the Email Routing family. Enabling provisions the zone's required MX/SPF/DKIM
// DNS records automatically. The single per-zone catch-all rule is folded in
// (spec.catch_all) since it is 1:1 with the zone; individual routing rules and
// destination addresses are separate kinds (CloudflareEmailRoutingRule,
// CloudflareEmailRoutingAddress).
message CloudflareEmailRoutingZoneSpec {
  // The zone to enable Email Routing on. A literal zone ID or a reference to a
  // CloudflareDnsZone resource.
  org.openmcf.shared.foreignkey.v1.StringValueOrRef zone_id = 1 [
    (buf.validate.field).required = true,
    (org.openmcf.shared.foreignkey.v1.default_kind) = CloudflareDnsZone,
    (org.openmcf.shared.foreignkey.v1.default_kind_field_path) = "status.outputs.zone_id"
  ];

  // Optional catch-all rule for mail no other rule matched. Omit to leave the
  // zone's catch-all at Cloudflare's default (drop, disabled).
  CloudflareEmailRoutingZoneCatchAll catch_all = 2;

  // Lock the Email Routing DNS records so they cannot be modified out-of-band.
  // The records are created automatically on enable regardless; locking manages
  // them explicitly. Defaults to false.
  bool lock_dns_records = 3;
}
