apiVersion: cloudflare.openmcf.org/v1
kind: CloudflareZeroTrustAccessGroup
metadata:
  name: engineering-team
spec:
  # The Cloudflare account that owns this reusable group.
  accountId: "REPLACE_WITH_ACCOUNT_ID"
  name: engineering-team
  # Anyone with a corporate email at one of these domains is in the group...
  include:
    - emailDomain:
        domain: example.com
    - emailDomain:
        domain: eng.example.com
  # ...as long as they connect from an allowed country...
  require:
    - geo:
        countryCode: US
  # ...and they are not a known contractor account.
  exclude:
    - email:
        email: contractor@example.com
