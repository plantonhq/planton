apiVersion: cloudflare.openmcf.org/v1
kind: CloudflareZeroTrustAccessGroup
metadata:
  name: platform-admins
spec:
  accountId: "REPLACE_WITH_ACCOUNT_ID"
  name: platform-admins
  # Members of a specific Okta group, federated through a configured identity
  # provider, who additionally satisfy a hardware-key MFA login method.
  include:
    - okta:
        name: platform-admins
        identityProviderId: "REPLACE_WITH_IDP_ID"
  require:
    - authMethod:
        authMethod: hwk
