syntax = "proto3";

package org.openmcf.provider.cloudflare.cloudflarezerotrustaccessgroup.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/cloudflare/cloudflarezerotrustaccessgroup/v1/spec.proto";
import "org/openmcf/provider/cloudflare/cloudflarezerotrustaccessgroup/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// cloudflare-zero-trust-access-group
message CloudflareZeroTrustAccessGroup {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'cloudflare.openmcf.org/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'CloudflareZeroTrustAccessGroup'];

  //metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  CloudflareZeroTrustAccessGroupSpec spec = 4 [(buf.validate.field).required = true];

  //status
  CloudflareZeroTrustAccessGroupStatus status = 5;
}

// cloudflare-zero-trust-access-group status
message CloudflareZeroTrustAccessGroupStatus {
  //stack-outputs
  //  cloudflare-zero-trust-access-group stack-outputs
  CloudflareZeroTrustAccessGroupStackOutputs outputs = 1;
}
