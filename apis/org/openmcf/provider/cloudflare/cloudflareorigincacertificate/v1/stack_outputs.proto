syntax = "proto3";

package org.openmcf.provider.cloudflare.cloudflareorigincacertificate.v1;

// CloudflareOriginCaCertificateStackOutputs captures the outputs after issuing an
// Origin CA certificate.
message CloudflareOriginCaCertificateStackOutputs {
  // The Origin CA certificate identifier.
  string certificate_id = 1;

  // The issued Origin CA certificate in PEM format. This is public certificate
  // material (not a secret) — install it on the origin alongside the private key.
  string certificate = 2;

  // The PEM-encoded private key for the certificate. Populated only when the
  // module generated the key (i.e. when `spec.csr` was omitted); empty when a
  // user-supplied CSR was used. Sensitive — exported as a secret so a downstream
  // origin can mount it without the key ever living in plaintext.
  string private_key = 3;

  // RFC3339 timestamp of when the certificate expires.
  string expires_on = 4;
}
