apiVersion: cloudflare.openmcf.org/v1
kind: CloudflareLoadBalancer
metadata:
  name: lb-hack
spec:
  hostname: lb.openmcf-example.com
  zone_id:
    value: "0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d"
  origins:
    - name: origin-1
      address: 192.0.2.10
      weight: 1
    - name: origin-2
      address: 192.0.2.11
      weight: 1
  proxied: true
  healthProbePath: /healthz
  sessionAffinity: cookie
  steeringPolicy: random
