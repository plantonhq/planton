syntax = "proto3";

package org.openmcf.provider.cloudflare.cloudflareturnstilewidget.v1;

// CloudflareTurnstileWidgetStackOutputs captures the outputs after provisioning a
// Turnstile widget.
message CloudflareTurnstileWidgetStackOutputs {
  // The public site key. Embed this in the page's frontend Turnstile widget.
  string sitekey = 1;

  // The secret key used server-side to validate tokens via /siteverify.
  // Sensitive — exported as a secret so a Worker or backend can reference it.
  string secret = 2;

  // RFC3339 timestamp of when the widget was created.
  string created_on = 3;

  // RFC3339 timestamp of when the widget was last modified.
  string modified_on = 4;
}
