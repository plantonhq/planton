syntax = "proto3";

package org.openmcf.provider.cloudflare.cloudflarezerotrusttunnel.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/cloudflare/cloudflarezerotrusttunnel/v1/spec.proto";
import "org/openmcf/provider/cloudflare/cloudflarezerotrusttunnel/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// cloudflare-zero-trust-tunnel
message CloudflareZeroTrustTunnel {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'cloudflare.openmcf.org/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'CloudflareZeroTrustTunnel'];

  //metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  CloudflareZeroTrustTunnelSpec spec = 4 [(buf.validate.field).required = true];

  //status
  CloudflareZeroTrustTunnelStatus status = 5;
}

// cloudflare-zero-trust-tunnel status
message CloudflareZeroTrustTunnelStatus {
  //stack-outputs
  //  cloudflare-zero-trust-tunnel stack-outputs
  CloudflareZeroTrustTunnelStackOutputs outputs = 1;
}
