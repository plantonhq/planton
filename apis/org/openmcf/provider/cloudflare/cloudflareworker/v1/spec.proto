syntax = "proto3";

package org.openmcf.provider.cloudflare.cloudflareworker.v1;

import "buf/validate/validate.proto";
import "org/openmcf/shared/foreignkey/v1/foreign_key.proto";
import "org/openmcf/shared/options/options.proto";

// CloudflareWorkerSpec deploys a Cloudflare Worker script and everything that
// hangs off it: its resource bindings, routing (workers.dev, custom domains,
// routes), scheduled (cron) invocations, and runtime settings. Bindings are
// grouped by type (the wrangler.toml authoring grain) and each cross-resource
// binding accepts a literal value or a reference to the producing resource, so a
// Worker composes as a real node in the resource graph.
message CloudflareWorkerSpec {
  // Cross-field validation: a Worker must carry executable code, a static-asset
  // bundle, or both. Inline content and an R2 bundle are mutually exclusive (the
  // oneof enforces that); assets may stand alone (a pure static site) or sit
  // alongside a script (a full-stack app whose Functions serve dynamic routes).
  // This mirrors the Cloudflare API, which requires at least one of content or
  // assets on a script.
  option (buf.validate.message).cel = {
    id: "spec.code_or_assets_required"
    message: "provide a script source (content or r2_bundle) and/or a static-asset directory (assets)"
    expression: "has(this.content) || has(this.r2_bundle) || has(this.assets)"
  };

  // The Cloudflare account ID in which to create the worker.
  string account_id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.len = 32,
    (buf.validate.field).string.pattern = "^[0-9a-fA-F]{32}$"
  ];

  // The Worker script name, visible in the Cloudflare dashboard and used as the
  // target of service bindings and routes.
  string worker_name = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 63
  ];

  // Compatibility date (YYYY-MM-DD) pinning the Workers runtime behavior. When
  // unset, the module pins today's date at deploy.
  string compatibility_date = 3 [(buf.validate.field).string.pattern = "^([0-9]{4}-[0-9]{2}-[0-9]{2})?$"];

  // Script source — exactly one of the two cases below.
  oneof source {
    // Inline ES-module source. Convenient for small or generated scripts.
    string content = 4;

    // A pre-built script bundle stored in an R2 bucket (the CI build-artifact
    // flow). The module fetches the object and deploys it.
    CloudflareWorkerScriptBundle r2_bundle = 5;
  }

  // The entrypoint module filename within the bundle (module-format workers).
  string main_module = 6 [(org.openmcf.shared.options.recommended_default) = "index.js"];

  // Runtime compatibility flags (e.g. "nodejs_compat"). See the Cloudflare
  // compatibility-flags docs for the set valid on a given compatibility_date.
  repeated string compatibility_flags = 7;

  // Plain-text variable bindings: non-secret configuration exposed to the Worker
  // as env vars. Map key is the JS binding name, value is the literal string.
  map<string, string> vars = 8;

  // Secret bindings: sensitive values exposed to the Worker as env vars. Provide
  // each as a managed-secret reference; resolved just-in-time at deploy.
  repeated CloudflareWorkerSecretBinding secrets = 9;

  // KV namespace bindings. Each binds a CloudflareKvNamespace (by id or
  // reference) to a JS variable the Worker uses for edge key-value access.
  repeated CloudflareWorkerKvBinding kv_namespaces = 10;

  // R2 bucket bindings. Each binds a CloudflareR2Bucket (by name or reference)
  // for object storage access from the Worker.
  repeated CloudflareWorkerR2Binding r2_buckets = 11;

  // D1 database bindings. Each binds a CloudflareD1Database (by id or reference)
  // for serverless SQL access from the Worker.
  repeated CloudflareWorkerD1Binding d1_databases = 12;

  // Hyperdrive bindings. Each binds a CloudflareHyperdriveConfig (by id or
  // reference) for pooled, cached access to a regional SQL database.
  repeated CloudflareWorkerHyperdriveBinding hyperdrive_configs = 13;

  // Service bindings: bind another Worker (by name or reference) for direct
  // worker-to-worker calls without going over the public internet.
  repeated CloudflareWorkerServiceBinding services = 14;

  // Queue producer bindings: let the Worker enqueue messages to a Cloudflare
  // Queue by name.
  repeated CloudflareWorkerQueueBinding queues = 15;

  // Durable Object bindings: bind a Durable Object namespace (a class) for
  // strongly-consistent, stateful coordination.
  repeated CloudflareWorkerDurableObjectBinding durable_objects = 16;

  // Analytics Engine bindings: bind a dataset the Worker writes analytics data points to.
  repeated CloudflareWorkerAnalyticsEngineBinding analytics_engine_datasets = 17;

  // Vectorize bindings: bind a vector-search index for AI/embedding workloads.
  repeated CloudflareWorkerVectorizeBinding vectorize_indexes = 18;

  // Workers AI bindings: bind the account's AI inference gateway. Each entry is
  // just the JS variable name the Worker calls models through.
  repeated CloudflareWorkerAiBinding ai = 19;

  // Version-metadata bindings: expose the deployed version id/tag to the Worker
  // at runtime via the named binding.
  repeated CloudflareWorkerVersionMetadataBinding version_metadata = 20;

  // workers.dev subdomain exposure (e.g. <name>.<subdomain>.workers.dev).
  CloudflareWorkerWorkersDev workers_dev = 21;

  // Custom domains that route directly to this Worker (a managed hostname with
  // automatic TLS), distinct from pattern-based routes.
  repeated CloudflareWorkerCustomDomain custom_domains = 22;

  // Route patterns within a zone that map matching requests to this Worker.
  repeated CloudflareWorkerRoute routes = 23;

  // Cron schedules that invoke the Worker's scheduled handler. Each entry is a
  // cron expression (e.g. "0 * * * *").
  repeated string schedules = 24;

  // Observability (Workers Logs) configuration.
  CloudflareWorkerObservability observability = 25;

  // Smart Placement: let Cloudflare run the Worker closer to backend services it
  // calls, instead of closest to the user.
  CloudflareWorkerPlacement placement = 26;

  // Per-invocation resource limits.
  CloudflareWorkerLimits limits = 27;

  // Enable Logpush for the Worker's logs (push to a configured Logpush job).
  bool logpush = 28;

  // Tail consumers: other Workers that receive this Worker's tail (trace) events.
  repeated CloudflareWorkerTailConsumer tail_consumers = 29;

  // Static assets served by this Worker (Cloudflare Workers Static Assets). Point
  // it at a built site directory to host a static site or single-page app at the
  // edge; combine it with a script source above to run a full-stack app whose
  // Functions handle dynamic routes while everything else is served as a static
  // asset. When assets are set without a script source, the Worker is a pure
  // static site. This is Cloudflare's converged successor to Pages for the
  // "build-and-upload" hosting model.
  CloudflareWorkerAssets assets = 30;
}

// CloudflareWorkerScriptBundle references a pre-built script bundle in R2.
message CloudflareWorkerScriptBundle {
  // The R2 bucket name where the script bundle is stored.
  string bucket = 1 [(buf.validate.field).required = true];

  // The object key (path) of the script bundle within the bucket.
  string path = 2 [(buf.validate.field).required = true];
}

// CloudflareWorkerSecretBinding binds a secret value to a JS variable.
message CloudflareWorkerSecretBinding {
  // The JS binding (variable) name the Worker reads the secret through.
  string name = 1 [(buf.validate.field).required = true];

  // The secret value. Provide a managed-secret reference; the platform resolves
  // it just-in-time at deploy and never stores plaintext.
  org.openmcf.shared.foreignkey.v1.StringValueOrRef value = 2 [
    (buf.validate.field).required = true,
    (org.openmcf.shared.options.sensitive) = true
  ];
}

// CloudflareWorkerKvBinding binds a KV namespace to a JS variable.
message CloudflareWorkerKvBinding {
  // The JS binding (variable) name.
  string name = 1 [(buf.validate.field).required = true];

  // The KV namespace ID, or a reference to a CloudflareKvNamespace resource.
  org.openmcf.shared.foreignkey.v1.StringValueOrRef namespace_id = 2 [
    (buf.validate.field).required = true,
    (org.openmcf.shared.foreignkey.v1.default_kind) = CloudflareKvNamespace,
    (org.openmcf.shared.foreignkey.v1.default_kind_field_path) = "status.outputs.namespace_id"
  ];
}

// CloudflareWorkerR2Binding binds an R2 bucket to a JS variable.
message CloudflareWorkerR2Binding {
  // The JS binding (variable) name.
  string name = 1 [(buf.validate.field).required = true];

  // The R2 bucket name, or a reference to a CloudflareR2Bucket resource.
  org.openmcf.shared.foreignkey.v1.StringValueOrRef bucket_name = 2 [
    (buf.validate.field).required = true,
    (org.openmcf.shared.foreignkey.v1.default_kind) = CloudflareR2Bucket,
    (org.openmcf.shared.foreignkey.v1.default_kind_field_path) = "status.outputs.bucket_name"
  ];

  // Optional data-residency jurisdiction of the bucket. One of "eu", "fedramp",
  // or "fedramp-high"; leave empty for the default jurisdiction.
  string jurisdiction = 3 [(buf.validate.field).cel = {
    id: "r2_binding_jurisdiction.valid"
    message: "jurisdiction must be one of \"eu\", \"fedramp\", \"fedramp-high\""
    expression: "this == '' || this in ['eu', 'fedramp', 'fedramp-high']"
  }];
}

// CloudflareWorkerD1Binding binds a D1 database to a JS variable.
message CloudflareWorkerD1Binding {
  // The JS binding (variable) name.
  string name = 1 [(buf.validate.field).required = true];

  // The D1 database ID, or a reference to a CloudflareD1Database resource.
  org.openmcf.shared.foreignkey.v1.StringValueOrRef database_id = 2 [
    (buf.validate.field).required = true,
    (org.openmcf.shared.foreignkey.v1.default_kind) = CloudflareD1Database,
    (org.openmcf.shared.foreignkey.v1.default_kind_field_path) = "status.outputs.database_id"
  ];
}

// CloudflareWorkerHyperdriveBinding binds a Hyperdrive config to a JS variable.
message CloudflareWorkerHyperdriveBinding {
  // The JS binding (variable) name.
  string name = 1 [(buf.validate.field).required = true];

  // The Hyperdrive config ID, or a reference to a CloudflareHyperdriveConfig resource.
  org.openmcf.shared.foreignkey.v1.StringValueOrRef config_id = 2 [
    (buf.validate.field).required = true,
    (org.openmcf.shared.foreignkey.v1.default_kind) = CloudflareHyperdriveConfig,
    (org.openmcf.shared.foreignkey.v1.default_kind_field_path) = "status.outputs.hyperdrive_id"
  ];
}

// CloudflareWorkerServiceBinding binds another Worker for direct service-to-service calls.
message CloudflareWorkerServiceBinding {
  // The JS binding (variable) name.
  string name = 1 [(buf.validate.field).required = true];

  // The target Worker's script name, or a reference to a CloudflareWorker resource.
  org.openmcf.shared.foreignkey.v1.StringValueOrRef service = 2 [
    (buf.validate.field).required = true,
    (org.openmcf.shared.foreignkey.v1.default_kind) = CloudflareWorker,
    (org.openmcf.shared.foreignkey.v1.default_kind_field_path) = "status.outputs.script_name"
  ];

  // Optional environment of the target Worker to bind to.
  string environment = 3;

  // Optional named entrypoint (WorkerEntrypoint) to invoke on the target Worker.
  string entrypoint = 4;
}

// CloudflareWorkerQueueBinding lets the Worker produce messages to a Queue.
message CloudflareWorkerQueueBinding {
  // The JS binding (variable) name.
  string name = 1 [(buf.validate.field).required = true];

  // The Cloudflare Queue name to produce to, or a reference to a CloudflareQueue resource.
  org.openmcf.shared.foreignkey.v1.StringValueOrRef queue_name = 2 [
    (buf.validate.field).required = true,
    (org.openmcf.shared.foreignkey.v1.default_kind) = CloudflareQueue,
    (org.openmcf.shared.foreignkey.v1.default_kind_field_path) = "status.outputs.queue_name"
  ];
}

// CloudflareWorkerDurableObjectBinding binds a Durable Object namespace (class).
message CloudflareWorkerDurableObjectBinding {
  // The JS binding (variable) name.
  string name = 1 [(buf.validate.field).required = true];

  // The Durable Object class name that implements the namespace.
  string class_name = 2 [(buf.validate.field).required = true];

  // Script that defines the class, when it lives in a different Worker. Leave
  // empty when the class is defined in this Worker.
  string script_name = 3;

  // Optional environment of the defining script.
  string environment = 4;
}

// CloudflareWorkerAnalyticsEngineBinding binds an Analytics Engine dataset.
message CloudflareWorkerAnalyticsEngineBinding {
  // The JS binding (variable) name.
  string name = 1 [(buf.validate.field).required = true];

  // The Analytics Engine dataset the Worker writes data points to.
  string dataset = 2 [(buf.validate.field).required = true];
}

// CloudflareWorkerVectorizeBinding binds a Vectorize index.
message CloudflareWorkerVectorizeBinding {
  // The JS binding (variable) name.
  string name = 1 [(buf.validate.field).required = true];

  // The Vectorize index name.
  string index_name = 2 [(buf.validate.field).required = true];
}

// CloudflareWorkerAiBinding binds the Workers AI inference gateway.
message CloudflareWorkerAiBinding {
  // The JS binding (variable) name the Worker calls AI models through.
  string name = 1 [(buf.validate.field).required = true];
}

// CloudflareWorkerVersionMetadataBinding exposes the deployed version metadata.
message CloudflareWorkerVersionMetadataBinding {
  // The JS binding (variable) name exposing the version id/tag.
  string name = 1 [(buf.validate.field).required = true];
}

// CloudflareWorkerWorkersDev controls workers.dev subdomain exposure.
message CloudflareWorkerWorkersDev {
  // Expose the Worker at <name>.<account-subdomain>.workers.dev.
  bool enabled = 1;

  // Also enable per-version preview URLs (<version>-<name>.<subdomain>.workers.dev).
  bool previews_enabled = 2;
}

// CloudflareWorkerCustomDomain attaches a managed custom domain to the Worker.
message CloudflareWorkerCustomDomain {
  // The fully qualified hostname to route to the Worker (e.g. "api.example.com").
  // Cloudflare provisions and manages TLS for it automatically.
  string hostname = 1 [(buf.validate.field).required = true];

  // The Cloudflare Zone ID hosting the hostname, or a reference to a
  // CloudflareDnsZone. Optional — Cloudflare can infer the zone from the hostname.
  org.openmcf.shared.foreignkey.v1.StringValueOrRef zone_id = 2 [
    (org.openmcf.shared.foreignkey.v1.default_kind) = CloudflareDnsZone,
    (org.openmcf.shared.foreignkey.v1.default_kind_field_path) = "status.outputs.zone_id"
  ];
}

// CloudflareWorkerRoute maps a URL pattern within a zone to the Worker.
message CloudflareWorkerRoute {
  // The Cloudflare Zone ID the route belongs to, or a reference to a CloudflareDnsZone.
  org.openmcf.shared.foreignkey.v1.StringValueOrRef zone_id = 1 [
    (buf.validate.field).required = true,
    (org.openmcf.shared.foreignkey.v1.default_kind) = CloudflareDnsZone,
    (org.openmcf.shared.foreignkey.v1.default_kind_field_path) = "status.outputs.zone_id"
  ];

  // The route pattern (e.g. "api.example.com/webhooks/*").
  string pattern = 2 [(buf.validate.field).required = true];
}

// CloudflareWorkerObservability configures Workers Logs.
message CloudflareWorkerObservability {
  // Enable Workers Logs (structured logs visible in the dashboard / queryable).
  bool enabled = 1;

  // Fraction of requests sampled for logging, 0.0–1.0. Leave 0 for the default
  // (1.0 = sample all) when enabled.
  double head_sampling_rate = 2 [(buf.validate.field).cel = {
    id: "observability_head_sampling_rate.valid_range"
    message: "head_sampling_rate must be between 0 and 1"
    expression: "this >= 0 && this <= 1"
  }];
}

// CloudflareWorkerPlacement configures Smart Placement.
message CloudflareWorkerPlacement {
  // Placement mode. "smart" lets Cloudflare run the Worker near the backends it
  // calls. Leave empty to keep the default (run near the user).
  string mode = 1 [(buf.validate.field).cel = {
    id: "placement_mode.valid"
    message: "placement mode must be \"smart\""
    expression: "this == '' || this == 'smart'"
  }];
}

// CloudflareWorkerLimits sets per-invocation resource limits.
message CloudflareWorkerLimits {
  // CPU time limit in milliseconds per invocation. Leave 0 for the plan default.
  int64 cpu_ms = 1 [(buf.validate.field).cel = {
    id: "limits_cpu_ms.non_negative"
    message: "cpu_ms must be 0 (default) or positive"
    expression: "this >= 0"
  }];

  // Maximum number of subrequests the Worker may make per invocation. Leave 0
  // for the plan default.
  int64 subrequests = 2 [(buf.validate.field).cel = {
    id: "limits_subrequests.non_negative"
    message: "subrequests must be 0 (default) or positive"
    expression: "this >= 0"
  }];
}

// CloudflareWorkerTailConsumer names another Worker that consumes tail events.
message CloudflareWorkerTailConsumer {
  // The consuming Worker's service (script) name.
  string service = 1 [(buf.validate.field).required = true];

  // Optional environment of the consuming Worker.
  string environment = 2;

  // Optional dispatch namespace of the consuming Worker.
  string namespace = 3;
}

// CloudflareWorkerAssets configures Cloudflare Workers Static Assets: a built
// directory of files (HTML/CSS/JS/images) uploaded with the Worker and served
// directly from Cloudflare's edge. The module uploads the directory's contents
// and Cloudflare computes the asset manifest; a new deploy with a changed
// directory ships a new version of the site.
message CloudflareWorkerAssets {
  // Filesystem path to the directory of built assets to upload. Interpreted on
  // the deploy runner — point it at your build output (e.g. "dist" or "build").
  string directory = 1 [(buf.validate.field).required = true];

  // Behavior for serving the assets (header injection, redirects, HTML routing,
  // SPA handling). Optional; sensible Cloudflare defaults apply when omitted.
  CloudflareWorkerAssetsConfig config = 2;

  // When set, exposes the asset namespace to the Worker script as a binding of
  // this JS variable name (so code can call e.g. env.ASSETS.fetch(request)).
  // Leave empty for a pure static site that has no script. Only meaningful when
  // a script source is also provided.
  string binding_name = 3;
}

// CloudflareWorkerAssetsConfig controls how static assets are served.
message CloudflareWorkerAssetsConfig {
  // Cross-field validation: run_worker_first is either a single on/off switch or
  // a set of path rules — not both.
  option (buf.validate.message).cel = {
    id: "assets_config.run_worker_first_exclusive"
    message: "set run_worker_first (apply to all paths) or run_worker_first_rules (per-path), not both"
    expression: "!(this.run_worker_first && size(this.run_worker_first_rules) > 0)"
  };

  // Trailing-slash and rewrite behavior for HTML requests. One of
  // "auto-trailing-slash", "force-trailing-slash", "drop-trailing-slash", or
  // "none". Empty uses Cloudflare's default.
  string html_handling = 1 [(buf.validate.field).cel = {
    id: "assets_config_html_handling.valid"
    message: "html_handling must be one of \"auto-trailing-slash\", \"force-trailing-slash\", \"drop-trailing-slash\", \"none\""
    expression: "this == '' || this in ['auto-trailing-slash', 'force-trailing-slash', 'drop-trailing-slash', 'none']"
  }];

  // Response when a request matches no static asset and no Worker script handles
  // it. One of "none", "404-page" (serve /404.html), or "single-page-application"
  // (serve /index.html — the SPA fallback). Empty uses Cloudflare's default.
  string not_found_handling = 2 [(buf.validate.field).cel = {
    id: "assets_config_not_found_handling.valid"
    message: "not_found_handling must be one of \"none\", \"404-page\", \"single-page-application\""
    expression: "this == '' || this in ['none', '404-page', 'single-page-application']"
  }];

  // The contents of a `_headers` file: rules that attach custom headers to asset
  // responses. See Cloudflare's _headers syntax.
  string headers = 3;

  // The contents of a `_redirects` file: redirect/rewrite rules applied ahead of
  // asset serving. See Cloudflare's _redirects syntax.
  string redirects = 4;

  // Invoke the Worker script before attempting to serve any asset (applies to all
  // paths). Use this when the script must run on every request. Mutually
  // exclusive with run_worker_first_rules. When neither is set, Cloudflare serves
  // a matching asset first and falls back to the script.
  bool run_worker_first = 5;

  // Per-path control over whether the Worker runs before asset serving. Each
  // entry is a path rule; "/api/*" routes through the script, "!/api/docs/*"
  // (negative, higher precedence) excludes a subtree. Mutually exclusive with
  // run_worker_first.
  repeated string run_worker_first_rules = 6;
}
