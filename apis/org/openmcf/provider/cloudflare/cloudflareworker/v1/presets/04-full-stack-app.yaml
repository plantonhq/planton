apiVersion: cloudflare.openmcf.org/v1
kind: CloudflareWorker
metadata:
  name: full-stack-app
spec:
  accountId: <cloudflare-account-id>
  workerName: full-stack-app
  # Full-stack app: a script handles dynamic routes (API), static assets serve
  # everything else. The assets binding lets the script read assets in code.
  content: |
    export default {
      async fetch(request, env) {
        const url = new URL(request.url);
        if (url.pathname.startsWith("/api/")) {
          return Response.json({ ok: true });
        }
        return env.ASSETS.fetch(request);
      },
    };
  assets:
    directory: dist
    bindingName: ASSETS
    config:
      notFoundHandling: single-page-application
      # Route API paths through the Worker; serve everything else as an asset.
      runWorkerFirstRules:
        - /api/*
  kvNamespaces:
    - name: SESSIONS
      namespaceId:
        valueFrom:
          kind: CloudflareKvNamespace
          name: app-sessions
          fieldPath: status.outputs.namespace_id
