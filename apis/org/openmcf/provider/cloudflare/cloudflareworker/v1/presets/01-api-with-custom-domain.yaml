apiVersion: cloudflare.openmcf.org/v1
kind: CloudflareWorker
metadata:
  name: edge-api
spec:
  accountId: <cloudflare-account-id>
  workerName: edge-api
  r2Bundle:
    bucket: <build-artifacts-bucket>
    path: <path/to/worker-bundle.js>
  compatibilityDate: "2025-01-15"
  compatibilityFlags:
    - nodejs_compat
  vars:
    LOG_LEVEL: info
    API_VERSION: v1
  secrets:
    - name: API_KEY
      value: <managed-secret-reference>
  kvNamespaces:
    - name: CONFIG
      namespaceId:
        valueFrom:
          kind: CloudflareKvNamespace
          name: <kv-namespace-name>
          fieldPath: status.outputs.namespace_id
  d1Databases:
    - name: DB
      databaseId:
        valueFrom:
          kind: CloudflareD1Database
          name: <d1-database-name>
          fieldPath: status.outputs.database_id
  customDomains:
    - hostname: <api.example.com>
  observability:
    enabled: true
    headSamplingRate: 1
