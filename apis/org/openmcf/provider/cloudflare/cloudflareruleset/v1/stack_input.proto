syntax = "proto3";

package org.openmcf.provider.cloudflare.cloudflareruleset.v1;

import "org/openmcf/provider/cloudflare/cloudflareruleset/v1/api.proto";
import "org/openmcf/provider/cloudflare/provider.proto";

// CloudflareRulesetStackInput is the input to the IaC module.
// It contains the target resource and provider configuration.
message CloudflareRulesetStackInput {
  // target cloud-resource to be deployed
  CloudflareRuleset target = 1;
  // provider-config for Cloudflare authentication
  org.openmcf.provider.cloudflare.CloudflareProviderConfig provider_config = 2;
}
