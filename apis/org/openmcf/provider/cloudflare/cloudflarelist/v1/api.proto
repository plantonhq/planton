syntax = "proto3";

package org.openmcf.provider.cloudflare.cloudflarelist.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/cloudflare/cloudflarelist/v1/spec.proto";
import "org/openmcf/provider/cloudflare/cloudflarelist/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// cloudflare-list
message CloudflareList {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'cloudflare.openmcf.org/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'CloudflareList'];

  //metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  CloudflareListSpec spec = 4 [(buf.validate.field).required = true];

  //status
  CloudflareListStatus status = 5;
}

// cloudflare-list status
message CloudflareListStatus {
  //stack-outputs
  //  cloudflare-list stack-outputs
  CloudflareListStackOutputs outputs = 1;
}
