syntax = "proto3";

package org.openmcf.provider.cloudflare.cloudflarelist.v1;

// CloudflareListStackOutputs captures the outputs after provisioning a list.
message CloudflareListStackOutputs {
  // The Cloudflare-assigned identifier of the list. A CloudflareListItem
  // references this value to add entries to the list.
  string list_id = 1;

  // The list name (echoed; this is the identifier used in rule expressions).
  string name = 2;

  // The list kind (ip, redirect, hostname, or asn).
  string kind = 3;
}
