syntax = "proto3";

package org.openmcf.provider.cloudflare.cloudflarelistitem.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/cloudflare/cloudflarelistitem/v1/spec.proto";
import "org/openmcf/provider/cloudflare/cloudflarelistitem/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// cloudflare-list-item
message CloudflareListItem {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'cloudflare.openmcf.org/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'CloudflareListItem'];

  //metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  CloudflareListItemSpec spec = 4 [(buf.validate.field).required = true];

  //status
  CloudflareListItemStatus status = 5;
}

// cloudflare-list-item status
message CloudflareListItemStatus {
  //stack-outputs
  //  cloudflare-list-item stack-outputs
  CloudflareListItemStackOutputs outputs = 1;
}
