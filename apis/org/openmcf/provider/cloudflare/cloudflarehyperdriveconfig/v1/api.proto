syntax = "proto3";

package org.openmcf.provider.cloudflare.cloudflarehyperdriveconfig.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/cloudflare/cloudflarehyperdriveconfig/v1/spec.proto";
import "org/openmcf/provider/cloudflare/cloudflarehyperdriveconfig/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// cloudflare-hyperdrive-config
message CloudflareHyperdriveConfig {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'cloudflare.openmcf.org/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'CloudflareHyperdriveConfig'];

  //metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  CloudflareHyperdriveConfigSpec spec = 4 [(buf.validate.field).required = true];

  //status
  CloudflareHyperdriveConfigStatus status = 5;
}

// cloudflare-hyperdrive-config status
message CloudflareHyperdriveConfigStatus {
  //stack-outputs
  //  cloudflare-hyperdrive-config stack-outputs
  CloudflareHyperdriveConfigStackOutputs outputs = 1;
}
