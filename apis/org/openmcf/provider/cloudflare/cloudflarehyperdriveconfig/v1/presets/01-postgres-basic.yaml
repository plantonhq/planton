apiVersion: cloudflare.openmcf.org/v1
kind: CloudflareHyperdriveConfig
metadata:
  name: app-prod-pg
spec:
  accountId: <cloudflare-account-id>
  name: app-prod-pg
  origin:
    database: <database-name>
    scheme: postgres
    user: <database-user>
    host: <database-host>
    port: 5432
    password:
      value: <database-password>
  caching:
    disabled: false
    maxAge: 60
    staleWhileRevalidate: 15
