syntax = "proto3";

package org.openmcf.provider.cloudflare.cloudflarecertificatepack.v1;

// CloudflareCertificatePackStackOutputs captures the outputs after ordering a
// certificate pack.
message CloudflareCertificatePackStackOutputs {
  // The certificate pack identifier.
  string certificate_pack_id = 1;

  // The order/issuance status (e.g. "pending_validation", "active").
  string status = 2;

  // The identifier of the primary certificate in the pack.
  string primary_certificate = 3;
}
