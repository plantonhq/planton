apiVersion: cloudflare.openmcf.org/v1
kind: CloudflareLoadBalancerPool
metadata:
  name: web-pool
spec:
  accountId: <cloudflare-account-id>
  name: web-pool
  origins:
    - name: origin-1
      address:
        value: <origin-1-address>
      weight: 1
    - name: origin-2
      address:
        value: <origin-2-address>
      weight: 1
  monitor:
    valueFrom:
      kind: CloudflareLoadBalancerMonitor
      name: web-https
      fieldPath: status.outputs.monitor_id
  minimumOrigins: 1
