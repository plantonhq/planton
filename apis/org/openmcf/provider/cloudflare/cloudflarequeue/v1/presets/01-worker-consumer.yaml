apiVersion: cloudflare.openmcf.org/v1
kind: CloudflareQueue
metadata:
  name: orders-queue
spec:
  accountId: <cloudflare-account-id>
  queueName: orders-queue
  settings:
    messageRetentionPeriod: 86400
  consumer:
    type: worker
    scriptName:
      valueFrom:
        kind: CloudflareWorker
        name: <consumer-worker-name>
        fieldPath: status.outputs.script_name
    deadLetterQueue:
      value: orders-dlq
    settings:
      batchSize: 25
      maxConcurrency: 10
      maxRetries: 3
      maxWaitTimeMs: 1000
      retryDelay: 30
