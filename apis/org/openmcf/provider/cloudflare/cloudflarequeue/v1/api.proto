syntax = "proto3";

package org.openmcf.provider.cloudflare.cloudflarequeue.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/cloudflare/cloudflarequeue/v1/spec.proto";
import "org/openmcf/provider/cloudflare/cloudflarequeue/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// cloudflare-queue
message CloudflareQueue {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'cloudflare.openmcf.org/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'CloudflareQueue'];

  //metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  CloudflareQueueSpec spec = 4 [(buf.validate.field).required = true];

  //status
  CloudflareQueueStatus status = 5;
}

// cloudflare-queue status
message CloudflareQueueStatus {
  //stack-outputs
  //  cloudflare-queue stack-outputs
  CloudflareQueueStackOutputs outputs = 1;
}
