syntax = "proto3";

package org.openmcf.provider.cloudflare.cloudflarepagesproject.v1;

// CloudflarePagesProjectStackOutputs captures the outputs after deploying a
// Cloudflare Pages project. Deployment-specific values (per-build URLs, ids) are
// not exported: they do not exist until the first deployment is produced
// out-of-band (git push or `wrangler pages deploy`), so they are never populated
// at provision time.
message CloudflarePagesProjectStackOutputs {
  // The project name (echoed; downstream resources reference this value).
  string project_name = 1;

  // The project's `*.pages.dev` subdomain (e.g. "my-site.pages.dev").
  string subdomain = 2;

  // The custom domains attached to the project.
  repeated string domains = 3;

  // RFC3339 timestamp of when the project was created.
  string created_on = 4;
}
