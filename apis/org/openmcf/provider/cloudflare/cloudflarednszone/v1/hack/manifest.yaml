apiVersion: cloudflare.openmcf.org/v1
kind: CloudflareDnsZone
metadata:
  name: dns-zone-hack
spec:
  zoneName: openmcf-example.com
  accountId: 0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d
  paused: false
  records:
    - name: www
      type: A
      content: "192.0.2.1"
      proxied: true
      ttl: 1
    - name: "@"
      type: MX
      content: mail.openmcf-example.com
      ttl: 1
      priority: 10
  dnsSettings:
    flattenAllCnames: true
    zoneMode: standard
  dnssec:
    enabled: true
