apiVersion: gcp.openmcf.org/v1
kind: GcpRedisInstance
metadata:
  name: my-ha-redis
spec:
  projectId:
    value: "<gcp-project-id>"
  instanceName: <instance-name>
  region: <gcp-region>
  tier: STANDARD_HA
  memorySizeGb: 5
  authEnabled: true
  transitEncryptionMode: SERVER_AUTHENTICATION
  authorizedNetwork:
    value: "<vpc-network-self-link>"
  maintenanceWindow:
    day: SUNDAY
    hour: 3
  persistenceConfig:
    persistenceMode: RDB
    rdbSnapshotPeriod: TWELVE_HOURS
  deletionProtection: true
