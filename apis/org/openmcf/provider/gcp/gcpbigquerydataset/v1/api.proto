syntax = "proto3";

package org.openmcf.provider.gcp.gcpbigquerydataset.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/gcp/gcpbigquerydataset/v1/spec.proto";
import "org/openmcf/provider/gcp/gcpbigquerydataset/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

//gcp-bigquery-dataset
message GcpBigQueryDataset {
  string api_version = 1 [(buf.validate.field).string.const = 'gcp.openmcf.org/v1'];
  string kind = 2 [(buf.validate.field).string.const = 'GcpBigQueryDataset'];
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];
  GcpBigQueryDatasetSpec spec = 4 [(buf.validate.field).required = true];
  GcpBigQueryDatasetStatus status = 5;
}

message GcpBigQueryDatasetStatus {
  GcpBigQueryDatasetStackOutputs outputs = 1;
}
