apiVersion: gcp.openmcf.org/v1
kind: GcpCloudComposerEnvironment
metadata:
  name: my-prod-composer-private
spec:
  projectId:
    value: "<your-gcp-project-id>"
  region: us-central1
  environmentSize: ENVIRONMENT_SIZE_MEDIUM
  resilienceMode: HIGH_RESILIENCE
  nodeConfig:
    network:
      value: "<your-vpc-network-name>"
    subnetwork:
      value: "<your-vpc-subnetwork-name>"
    serviceAccount:
      value: "<your-service-account-email>"
  softwareConfig:
    imageVersion: "<composer-2-latest-airflow-version>"
  privateEnvironmentConfig:
    enablePrivateEndpoint: true
    connectionType: VPC_PEERING
  workloadsConfig:
    scheduler:
      cpu: 2.0
      memoryGb: 7.5
      storageGb: 5.0
      count: 2
    webServer:
      cpu: 2.0
      memoryGb: 7.5
      storageGb: 5.0
    triggerer:
      cpu: 0.5
      memoryGb: 1.0
      count: 2
    worker:
      cpu: 2.0
      memoryGb: 7.5
      storageGb: 5.0
      minCount: 2
      maxCount: 6
  maintenanceWindow:
    startTime: "2026-01-01T00:00:00Z"
    endTime: "2026-01-01T12:00:00Z"
    recurrence: "FREQ=WEEKLY;BYDAY=SA,SU"
