syntax = "proto3";

package org.openmcf.provider.gcp.gcppubsubtopic.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/gcp/gcppubsubtopic/v1/spec.proto";
import "org/openmcf/provider/gcp/gcppubsubtopic/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

//gcp-pubsub-topic
message GcpPubSubTopic {
  string api_version = 1 [(buf.validate.field).string.const = 'gcp.openmcf.org/v1'];
  string kind = 2 [(buf.validate.field).string.const = 'GcpPubSubTopic'];
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];
  GcpPubSubTopicSpec spec = 4 [(buf.validate.field).required = true];
  GcpPubSubTopicStatus status = 5;
}

message GcpPubSubTopicStatus {
  GcpPubSubTopicStackOutputs outputs = 1;
}
