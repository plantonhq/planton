apiVersion: gcp.openmcf.org/v1
kind: GcpVertexAiEndpoint
metadata:
  name: example
spec:
  projectId:
    value: "${PROJECT_ID}"
  location: us-central1
  displayName: PSC ML Endpoint
  description: Private Service Connect endpoint with project allowlist
  privateServiceConnectConfig:
    projectAllowlist:
      - "${CONSUMER_PROJECT_A}"
      - "${CONSUMER_PROJECT_B}"
  kmsKeyName:
    value: "projects/${PROJECT_ID}/locations/us-central1/keyRings/${KEY_RING}/cryptoKeys/${KEY_NAME}"
