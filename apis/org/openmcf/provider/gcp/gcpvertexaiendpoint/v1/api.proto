syntax = "proto3";

package org.openmcf.provider.gcp.gcpvertexaiendpoint.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/gcp/gcpvertexaiendpoint/v1/spec.proto";
import "org/openmcf/provider/gcp/gcpvertexaiendpoint/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

//gcp-vertex-ai-endpoint
message GcpVertexAiEndpoint {
  string api_version = 1 [(buf.validate.field).string.const = 'gcp.openmcf.org/v1'];
  string kind = 2 [(buf.validate.field).string.const = 'GcpVertexAiEndpoint'];
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];
  GcpVertexAiEndpointSpec spec = 4 [(buf.validate.field).required = true];
  GcpVertexAiEndpointStatus status = 5;
}

message GcpVertexAiEndpointStatus {
  GcpVertexAiEndpointStackOutputs outputs = 1;
}
