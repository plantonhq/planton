syntax = "proto3";

package org.openmcf.provider.gcp.gcpvertexaiendpoint.v1;

// Outputs produced after provisioning a GCP Vertex AI Endpoint.
message GcpVertexAiEndpointStackOutputs {
  // Fully qualified endpoint resource path.
  // Format: projects/{project}/locations/{location}/endpoints/{name}
  string endpoint_id = 1;

  // Display name of the endpoint (pass-through from spec for downstream
  // reference without needing to read the full resource).
  string display_name = 2;

  // DNS of the dedicated endpoint. Populated only when
  // dedicated_endpoint_enabled is true. Format:
  // https://{endpointId}.{region}-{projectNumber}.prediction.vertexai.goog
  string dedicated_endpoint_dns = 3;

  // RFC3339 timestamp of when the endpoint was created.
  string create_time = 4;
}
