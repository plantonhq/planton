apiVersion: gcp.openmcf.org/v1
kind: GcpGkeCluster
metadata:
  name: my-gke-cluster
spec:
  projectId:
    value: "<gcp-project-id>"
  networkSelfLink:
    value: "<vpc-network-self-link>"
  location: <gcp-region>
  subnetworkSelfLink:
    value: "<subnet-self-link>"
  clusterSecondaryRangeName:
    value: pods
  servicesSecondaryRangeName:
    value: services
  masterIpv4CidrBlock: 172.16.0.0/28  # /28 required; must not overlap with VPC CIDRs
  enablePublicNodes: false  # private nodes; internet egress via Cloud NAT
  releaseChannel: REGULAR  # default from spec; balanced stability and feature availability
  clusterName: <your-cluster-name>
  routerNatName:
    value: "<router-nat-name>"
