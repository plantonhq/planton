apiVersion: gcp.openmcf.org/v1
kind: GcpGkeCluster
metadata:
  name: my-dev-gke-cluster
spec:
  projectId:
    value: "<gcp-project-id>"
  networkSelfLink:
    value: "<vpc-network-self-link>"
  location: <gcp-region>
  subnetworkSelfLink:
    value: "<subnet-self-link>"
  clusterSecondaryRangeName:
    value: pods
  servicesSecondaryRangeName:
    value: services
  masterIpv4CidrBlock: 172.16.0.16/28  # different /28 block if sharing VPC with production cluster
  enablePublicNodes: false
  releaseChannel: RAPID  # earliest access to new Kubernetes versions and GKE features
  clusterName: <your-cluster-name>
  routerNatName:
    value: "<router-nat-name>"
