# pubsub-publisher: Publishes a message to a Pub/Sub topic on a schedule
#
# Use when: You need to trigger event-driven processing on a recurring
# schedule by publishing messages to a Pub/Sub topic.
#
# What it configures:
# - Pub/Sub target with topic reference
# - Base64-encoded message payload
# - Message attributes for routing/filtering
# - Retry configuration for reliability
#
# Typical use cases:
# - Triggering daily/hourly batch processing pipelines
# - Scheduling periodic data exports or ETL jobs
# - Publishing heartbeat or keepalive events
apiVersion: gcp.openmcf.org/v1
kind: GcpCloudSchedulerJob
metadata:
  name: ${name}
spec:
  projectId:
    value: ${project-id}
  location: ${location}
  schedule: "${schedule}"
  timeZone: Etc/UTC
  description: Publishes scheduled event to Pub/Sub topic
  pubsubTarget:
    topicName:
      value: ${topic-name}
    data: ${base64-encoded-data}
    attributes:
      source: cloud-scheduler
      type: ${event-type}
  retryConfig:
    retryCount: 3
    maxDoublings: 3
