# secure-cloud-run-trigger: OIDC-authenticated HTTP POST to a Cloud Run service
#
# Use when: You need to securely trigger a Cloud Run service on a recurring
# schedule with OIDC token authentication and custom retry behavior.
#
# What it configures:
# - HTTP POST to a Cloud Run endpoint
# - OIDC token authentication (for Cloud Run IAM)
# - Custom retry configuration with exponential backoff
# - JSON request body
# - Extended attempt deadline
#
# Typical use cases:
# - Triggering scheduled Cloud Run jobs (daily reports, ETL, cleanup)
# - Invoking authenticated Cloud Functions on a cron schedule
# - Periodic API calls to private endpoints
apiVersion: gcp.openmcf.org/v1
kind: GcpCloudSchedulerJob
metadata:
  name: ${name}
spec:
  projectId:
    value: ${project-id}
  location: ${location}
  schedule: "${schedule}"
  timeZone: ${time-zone}
  description: ${description}
  attemptDeadline: "600s"
  httpTarget:
    uri: ${cloud-run-url}
    httpMethod: POST
    body: ${base64-encoded-body}
    headers:
      Content-Type: application/json
    oidcToken:
      serviceAccountEmail:
        value: ${service-account-email}
      audience: ${cloud-run-url}
  retryConfig:
    retryCount: 3
    maxRetryDuration: "1800s"
    minBackoffDuration: "5s"
    maxBackoffDuration: "600s"
    maxDoublings: 3
