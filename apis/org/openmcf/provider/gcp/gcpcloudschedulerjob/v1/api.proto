syntax = "proto3";

package org.openmcf.provider.gcp.gcpcloudschedulerjob.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/gcp/gcpcloudschedulerjob/v1/spec.proto";
import "org/openmcf/provider/gcp/gcpcloudschedulerjob/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

//gcp-cloud-scheduler-job
message GcpCloudSchedulerJob {
  string api_version = 1 [(buf.validate.field).string.const = 'gcp.openmcf.org/v1'];
  string kind = 2 [(buf.validate.field).string.const = 'GcpCloudSchedulerJob'];
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];
  GcpCloudSchedulerJobSpec spec = 4 [(buf.validate.field).required = true];
  GcpCloudSchedulerJobStatus status = 5;
}

message GcpCloudSchedulerJobStatus {
  GcpCloudSchedulerJobStackOutputs outputs = 1;
}
