apiVersion: gcp.openmcf.org/v1
kind: GcpComputeInstance
metadata:
  name: my-production-vm
spec:
  projectId:
    value: "<gcp-project-id>"
  zone: <gcp-zone>
  machineType: e2-standard-2  # 2 vCPU, 8 GB RAM
  bootDisk:
    image: debian-cloud/debian-12
    sizeGb: 50
    type: pd-ssd  # SSD for production I/O performance
    autoDelete: true  # recommended_default from spec
  networkInterfaces:
    - subnetwork:
        value: "<subnet-self-link>"
  serviceAccount:
    email:
      value: "<service-account-email>"
    scopes:
      - https://www.googleapis.com/auth/cloud-platform
  deletionProtection: true  # prevents accidental deletion
  allowStoppingForUpdate: true  # recommended_default from spec
  labels:
    environment: production
    managed-by: openmcf
  tags:
    - <firewall-network-tag>
