syntax = "proto3";

package org.openmcf.provider.gcp.gcpspannerdatabase.v1;

// GcpSpannerDatabaseStackOutputs captures observable values produced after
// provisioning a Cloud Spanner database.
message GcpSpannerDatabaseStackOutputs {
  // Fully qualified database ID.
  // Format: projects/{project}/instances/{instance}/databases/{database}
  // This is the canonical identifier used for IAM bindings, API calls,
  // and connection strings.
  string database_id = 1;

  // Short database name. This is the value passed during creation and
  // can be used for display or logging purposes.
  string database_name = 2;

  // Database state: CREATING or READY.
  // CREATING indicates the database is being provisioned.
  // READY indicates the database is available for queries.
  string state = 3;
}
