syntax = "proto3";

package org.openmcf.provider.gcp.gcpspannerdatabase.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/gcp/gcpspannerdatabase/v1/spec.proto";
import "org/openmcf/provider/gcp/gcpspannerdatabase/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

//gcp-spanner-database
message GcpSpannerDatabase {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'gcp.openmcf.org/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'GcpSpannerDatabase'];

  //metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  GcpSpannerDatabaseSpec spec = 4 [(buf.validate.field).required = true];

  //status
  GcpSpannerDatabaseStatus status = 5;
}

//gcp-spanner-database status
message GcpSpannerDatabaseStatus {
  //stack-outputs
  GcpSpannerDatabaseStackOutputs outputs = 1;
}
