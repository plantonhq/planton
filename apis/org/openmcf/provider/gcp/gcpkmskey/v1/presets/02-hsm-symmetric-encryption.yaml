apiVersion: gcp.openmcf.org/v1
kind: GcpKmsKey
metadata:
  name: my-hsm-key
spec:
  keyRingId:
    value: "<key-ring-id>"  # e.g., projects/my-project/locations/us-central1/keyRings/compliance-keys
  keyName: <your-key-name>  # e.g., hsm-cmek-key
  rotationPeriod: "7776000s"  # 90 days
  versionTemplate:
    algorithm: GOOGLE_SYMMETRIC_ENCRYPTION
    protectionLevel: HSM
