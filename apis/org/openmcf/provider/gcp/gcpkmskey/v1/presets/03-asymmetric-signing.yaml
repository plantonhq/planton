apiVersion: gcp.openmcf.org/v1
kind: GcpKmsKey
metadata:
  name: my-signing-key
spec:
  keyRingId:
    value: "<key-ring-id>"  # e.g., projects/my-project/locations/us-central1/keyRings/signing-keys
  keyName: <your-key-name>  # e.g., artifact-signing-key
  purpose: ASYMMETRIC_SIGN
  versionTemplate:
    algorithm: EC_SIGN_P256_SHA256
