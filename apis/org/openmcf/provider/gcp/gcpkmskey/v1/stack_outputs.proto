syntax = "proto3";

package org.openmcf.provider.gcp.gcpkmskey.v1;

// Outputs produced after provisioning a GCP KMS key.
message GcpKmsKeyStackOutputs {
  // Fully qualified crypto key resource path.
  // Format: projects/{project}/locations/{location}/keyRings/{keyRing}/cryptoKeys/{name}
  // This is the primary CMEK reference used by BigQuery, Spanner, GKE, CloudSQL,
  // and other downstream resources for customer-managed encryption.
  string key_id = 1;

  // The short name of the key (same as the spec's key_name input).
  // Useful for display, logging, and human-readable references.
  string key_name = 2;
}
