syntax = "proto3";

package org.openmcf.provider.gcp.gcpkmskey.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/gcp/gcpkmskey/v1/spec.proto";
import "org/openmcf/provider/gcp/gcpkmskey/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

//gcp-kms-key
message GcpKmsKey {
  string api_version = 1 [(buf.validate.field).string.const = 'gcp.openmcf.org/v1'];
  string kind = 2 [(buf.validate.field).string.const = 'GcpKmsKey'];
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];
  GcpKmsKeySpec spec = 4 [(buf.validate.field).required = true];
  GcpKmsKeyStatus status = 5;
}

message GcpKmsKeyStatus {
  GcpKmsKeyStackOutputs outputs = 1;
}
