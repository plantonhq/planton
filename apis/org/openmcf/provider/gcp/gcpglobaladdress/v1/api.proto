syntax = "proto3";

package org.openmcf.provider.gcp.gcpglobaladdress.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/gcp/gcpglobaladdress/v1/spec.proto";
import "org/openmcf/provider/gcp/gcpglobaladdress/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

//gcp-global-address
message GcpGlobalAddress {
  string api_version = 1 [(buf.validate.field).string.const = 'gcp.openmcf.org/v1'];
  string kind = 2 [(buf.validate.field).string.const = 'GcpGlobalAddress'];
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];
  GcpGlobalAddressSpec spec = 4 [(buf.validate.field).required = true];
  GcpGlobalAddressStatus status = 5;
}

message GcpGlobalAddressStatus {
  GcpGlobalAddressStackOutputs outputs = 1;
}
