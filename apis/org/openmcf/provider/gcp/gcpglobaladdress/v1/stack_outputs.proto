syntax = "proto3";

package org.openmcf.provider.gcp.gcpglobaladdress.v1;

// Outputs produced after provisioning a GCP global address.
message GcpGlobalAddressStackOutputs {
  // The reserved IP address or the start of the reserved CIDR range.
  // For EXTERNAL addresses this is a public IP. For INTERNAL VPC_PEERING addresses
  // this is the first address in the reserved range.
  string address = 1;

  // The self-link URL of the global address resource.
  // Used to reference this address in other GCP resources like forwarding rules.
  string self_link = 2;

  // Creation timestamp in RFC3339 format.
  string creation_timestamp = 3;
}
