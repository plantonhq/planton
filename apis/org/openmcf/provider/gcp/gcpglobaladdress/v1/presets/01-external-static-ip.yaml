apiVersion: gcp.openmcf.org/v1
kind: GcpGlobalAddress
metadata:
  name: my-external-static-ip
spec:
  projectId:
    value: "<gcp-project-id>"
  addressName: <your-address-name>  # e.g., prod-lb-ip
  addressType: EXTERNAL  # default; reserves a public IPv4 address
  ipVersion: IPV4  # default
  description: Static external IP for HTTP(S) load balancer
