syntax = "proto3";

package org.openmcf.provider.gcp.gcpmemorystoreinstance.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/gcp/gcpmemorystoreinstance/v1/spec.proto";
import "org/openmcf/provider/gcp/gcpmemorystoreinstance/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

//gcp-memorystore-instance
message GcpMemorystoreInstance {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'gcp.openmcf.org/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'GcpMemorystoreInstance'];

  //metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  GcpMemorystoreInstanceSpec spec = 4 [(buf.validate.field).required = true];

  //status
  GcpMemorystoreInstanceStatus status = 5;
}

//gcp-memorystore-instance status
message GcpMemorystoreInstanceStatus {
  //stack-outputs
  GcpMemorystoreInstanceStackOutputs outputs = 1;
}
