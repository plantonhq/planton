syntax = "proto3";

package org.openmcf.provider.gcp.gcpalloydbcluster.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/gcp/gcpalloydbcluster/v1/spec.proto";
import "org/openmcf/provider/gcp/gcpalloydbcluster/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

//gcp-alloydb-cluster
message GcpAlloydbCluster {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'gcp.openmcf.org/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'GcpAlloydbCluster'];

  //metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  GcpAlloydbClusterSpec spec = 4 [(buf.validate.field).required = true];

  //status
  GcpAlloydbClusterStatus status = 5;
}

//gcp-alloydb-cluster status
message GcpAlloydbClusterStatus {
  //stack-outputs
  GcpAlloydbClusterStackOutputs outputs = 1;
}
