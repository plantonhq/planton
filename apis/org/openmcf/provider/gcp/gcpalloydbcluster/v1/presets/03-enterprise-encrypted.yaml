apiVersion: gcp.openmcf.org/v1
kind: GcpAlloydbCluster
metadata:
  name: my-enterprise-alloydb
spec:
  projectId:
    value: "<gcp-project-id>"
  clusterName: <cluster-name>
  location: <gcp-region>
  network:
    value: "<vpc-network-path>"
  deletionProtection: true
  kmsKeyName:
    value: "<kms-key-resource-name>"
  initialUser:
    user: postgres
    password: "<secure-password>"
  automatedBackupPolicy:
    enabled: true
    timeBasedRetentionPeriod: "2592000s"
    encryptionKmsKeyName:
      value: "<backup-kms-key-resource-name>"
  continuousBackupConfig:
    enabled: true
    recoveryWindowDays: 21
    encryptionKmsKeyName:
      value: "<continuous-backup-kms-key-resource-name>"
  maintenanceWindow:
    day: SUNDAY
    startHour: 3
  primaryInstance:
    instanceId: <primary-instance-id>
    cpuCount: 8
    availabilityType: REGIONAL
    sslMode: ENCRYPTED_ONLY
    requireConnectors: true
    queryInsightsConfig:
      queryPlansPerMinute: 5
      queryStringLength: 1024
      recordApplicationTags: true
      recordClientAddress: true
