syntax = "proto3";

package org.openmcf.provider.gcp.gcpbigtableinstance.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/gcp/gcpbigtableinstance/v1/spec.proto";
import "org/openmcf/provider/gcp/gcpbigtableinstance/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

//gcp-bigtable-instance
message GcpBigtableInstance {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'gcp.openmcf.org/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'GcpBigtableInstance'];

  //metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  GcpBigtableInstanceSpec spec = 4 [(buf.validate.field).required = true];

  //status
  GcpBigtableInstanceStatus status = 5;
}

//gcp-bigtable-instance status
message GcpBigtableInstanceStatus {
  //stack-outputs
  GcpBigtableInstanceStackOutputs outputs = 1;
}
