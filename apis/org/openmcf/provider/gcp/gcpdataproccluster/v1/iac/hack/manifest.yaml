apiVersion: gcp.openmcf.org/v1
kind: GcpDataprocCluster
metadata:
  name: test-dataproc
spec:
  projectId:
    value: "<your-gcp-project-id>"
  region: us-central1
  clusterName: test-spark-cluster
  clusterConfig:
    gceConfig:
      subnetwork:
        value: "<your-subnetwork-self-link>"
      internalIpOnly: true
    masterConfig:
      numInstances: 1
      machineType: n2-standard-4
      diskConfig:
        bootDiskSizeGb: 100
        bootDiskType: pd-ssd
    workerConfig:
      numInstances: 2
      machineType: n2-standard-4
      diskConfig:
        bootDiskSizeGb: 200
    softwareConfig:
      imageVersion: "2.2-debian12"
      optionalComponents:
        - JUPYTER
    endpointConfig:
      enableHttpPortAccess: true
    lifecycleConfig:
      idleDeleteTtl: "1800s"
