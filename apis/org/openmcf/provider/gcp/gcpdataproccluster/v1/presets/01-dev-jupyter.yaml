apiVersion: gcp.openmcf.org/v1
kind: GcpDataprocCluster
metadata:
  name: my-dev-spark
spec:
  projectId:
    value: "<your-gcp-project-id>"
  region: us-central1
  clusterName: my-dev-spark
  clusterConfig:
    masterConfig:
      numInstances: 1
      machineType: e2-standard-4
      diskConfig:
        bootDiskSizeGb: 100
    workerConfig:
      numInstances: 2
      machineType: e2-standard-4
      diskConfig:
        bootDiskSizeGb: 100
    softwareConfig:
      imageVersion: "2.2-debian12"
      optionalComponents:
        - JUPYTER
    endpointConfig:
      enableHttpPortAccess: true
    lifecycleConfig:
      idleDeleteTtl: "1800s" # Auto-delete after 30 minutes idle
