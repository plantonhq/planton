apiVersion: gcp.openmcf.org/v1
kind: GcpFirewallRule
metadata:
  name: my-allow-ssh-iap
spec:
  projectId:
    value: "<gcp-project-id>"
  network:
    value: "<vpc-network-name-or-self-link>"
  ruleName: <your-rule-name>  # e.g., allow-ssh-from-iap
  direction: INGRESS
  action: ALLOW
  rules:
    - protocol: tcp
      ports:
        - "22"
  sourceRanges:
    - 35.235.240.0/20  # Google Identity-Aware Proxy IP range
  targetTags:
    - allow-ssh  # only VMs with this network tag accept SSH; remove to apply network-wide
  priority: 1000
  description: Allow SSH access via Google Identity-Aware Proxy only
