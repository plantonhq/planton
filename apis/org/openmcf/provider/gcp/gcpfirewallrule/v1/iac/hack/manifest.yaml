apiVersion: gcp.openmcf.org/v1
kind: GcpFirewallRule
metadata:
  name: test-firewall
  labels:
    openmcf.org/provisioner: pulumi
    pulumi.openmcf.org/organization: test-org
    pulumi.openmcf.org/project: test-project
    pulumi.openmcf.org/stack.name: dev.GcpFirewallRule.test-firewall
spec:
  projectId:
    value: my-gcp-project-123
  network:
    value: default
  ruleName: allow-http-ingress
  direction: INGRESS
  action: ALLOW
  rules:
    - protocol: tcp
      ports:
        - "80"
        - "443"
  priority: 1000
  description: Allow HTTP and HTTPS traffic from the internet
  sourceRanges:
    - "0.0.0.0/0"
  targetTags:
    - web-server
