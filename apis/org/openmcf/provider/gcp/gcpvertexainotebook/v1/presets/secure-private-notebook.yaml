# secure-private-notebook: Enterprise-grade private notebook with encryption
#
# Use when: You need a security-hardened notebook for regulated environments
# with no public IP, CMEK encryption, and Shielded VM protection.
#
# What it configures:
# - e2-standard-4 machine type (4 vCPU, 16 GB RAM)
# - No public IP (private VPC access only)
# - Custom VPC network and subnet
# - Dedicated service account for VM identity
# - CMEK encryption on boot and data disks
# - Shielded VM with Secure Boot, vTPM, and integrity monitoring
# - Network tags for firewall rule targeting
#
# Typical use cases:
# - Notebooks handling PII or sensitive financial data
# - Healthcare/life sciences workloads requiring HIPAA compliance
# - Government or defense workloads requiring FedRAMP controls
# - Any environment where data-at-rest encryption is mandatory
#
# Prerequisites:
# - VPC network and subnet must exist
# - KMS key ring and key must exist in the same region
# - Service account must have necessary permissions
apiVersion: gcp.openmcf.org/v1
kind: GcpVertexAiNotebook
metadata:
  name: ${name}
spec:
  projectId:
    value: ${project-id}
  location: ${location}
  machineType: e2-standard-4
  disablePublicIp: true
  networkInterface:
    network:
      value: ${vpc-self-link}
    subnet:
      value: ${subnet-self-link}
  serviceAccount:
    value: ${service-account-email}
  bootDisk:
    diskType: PD_SSD
    diskSizeGb: 200
    kmsKey:
      value: ${kms-key-id}
  dataDisk:
    diskType: PD_BALANCED
    diskSizeGb: 500
    kmsKey:
      value: ${kms-key-id}
  shieldedInstanceConfig:
    enableSecureBoot: true
    enableVtpm: true
    enableIntegrityMonitoring: true
  tags:
    - notebook
    - no-public-ip
