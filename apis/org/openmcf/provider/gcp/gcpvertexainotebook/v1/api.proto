syntax = "proto3";

package org.openmcf.provider.gcp.gcpvertexainotebook.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/gcp/gcpvertexainotebook/v1/spec.proto";
import "org/openmcf/provider/gcp/gcpvertexainotebook/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

//gcp-vertex-ai-notebook
message GcpVertexAiNotebook {
  string api_version = 1 [(buf.validate.field).string.const = 'gcp.openmcf.org/v1'];
  string kind = 2 [(buf.validate.field).string.const = 'GcpVertexAiNotebook'];
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];
  GcpVertexAiNotebookSpec spec = 4 [(buf.validate.field).required = true];
  GcpVertexAiNotebookStatus status = 5;
}

message GcpVertexAiNotebookStatus {
  GcpVertexAiNotebookStackOutputs outputs = 1;
}
