syntax = "proto3";

package org.openmcf.provider.gcp.gcpcloudarmorpolicy.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/gcp/gcpcloudarmorpolicy/v1/spec.proto";
import "org/openmcf/provider/gcp/gcpcloudarmorpolicy/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

//gcp-cloud-armor-policy
message GcpCloudArmorPolicy {
  string api_version = 1 [(buf.validate.field).string.const = 'gcp.openmcf.org/v1'];
  string kind = 2 [(buf.validate.field).string.const = 'GcpCloudArmorPolicy'];
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];
  GcpCloudArmorPolicySpec spec = 4 [(buf.validate.field).required = true];
  GcpCloudArmorPolicyStatus status = 5;
}

message GcpCloudArmorPolicyStatus {
  GcpCloudArmorPolicyStackOutputs outputs = 1;
}
