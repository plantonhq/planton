apiVersion: gcp.openmcf.org/v1
kind: GcpCloudArmorPolicy
metadata:
  name: waf-owasp-protection
spec:
  projectId:
    value: my-gcp-project
  policyName: waf-owasp-protection
  description: OWASP WAF with SQLi/XSS protection, adaptive DDoS, and verbose logging
  type: CLOUD_ARMOR
  adaptiveProtectionConfig:
    enableLayer7DdosDefense: true
    ruleVisibility: STANDARD
  advancedOptionsConfig:
    jsonParsing: STANDARD
    logLevel: VERBOSE
  rules:
    - action: deny(403)
      priority: 1000
      description: Block SQL injection attacks
      match:
        expression: "evaluatePreconfiguredWaf('sqli-v33-stable', {'sensitivity': 1})"
    - action: deny(403)
      priority: 2000
      description: Block cross-site scripting attacks
      match:
        expression: "evaluatePreconfiguredWaf('xss-v33-stable', {'sensitivity': 1})"
    - action: allow
      priority: 2147483647
      description: Default allow all other traffic
      match:
        versionedExpr: SRC_IPS_V1
        srcIpRanges:
          - "*"
