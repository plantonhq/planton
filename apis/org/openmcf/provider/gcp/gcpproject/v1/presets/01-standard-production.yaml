apiVersion: gcp.openmcf.org/v1
kind: GcpProject
metadata:
  name: my-production-project
spec:
  projectId: <your-project-id>
  parentType: folder
  parentId: "<your-folder-id>"
  billingAccountId: "<AAAAAA-BBBBBB-CCCCCC>"
  labels:
    environment: production
    managed-by: openmcf
  disableDefaultNetwork: true  # default from spec; removes the insecure auto-created VPC
  deleteProtection: true  # prevents accidental project deletion
  enabledApis:
    - compute.googleapis.com
    - container.googleapis.com
    - dns.googleapis.com
    - secretmanager.googleapis.com
    - iam.googleapis.com
    - logging.googleapis.com
    - monitoring.googleapis.com
    - cloudresourcemanager.googleapis.com
    - servicenetworking.googleapis.com
  ownerMember: <owner-email>
