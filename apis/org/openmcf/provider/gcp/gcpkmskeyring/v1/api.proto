syntax = "proto3";

package org.openmcf.provider.gcp.gcpkmskeyring.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/gcp/gcpkmskeyring/v1/spec.proto";
import "org/openmcf/provider/gcp/gcpkmskeyring/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

//gcp-kms-key-ring
message GcpKmsKeyRing {
  string api_version = 1 [(buf.validate.field).string.const = 'gcp.openmcf.org/v1'];
  string kind = 2 [(buf.validate.field).string.const = 'GcpKmsKeyRing'];
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];
  GcpKmsKeyRingSpec spec = 4 [(buf.validate.field).required = true];
  GcpKmsKeyRingStatus status = 5;
}

message GcpKmsKeyRingStatus {
  GcpKmsKeyRingStackOutputs outputs = 1;
}
