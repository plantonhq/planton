apiVersion: digital-ocean.openmcf.org/v1
kind: DigitalOceanFirewall
metadata:
  name: my-web-tier-firewall
spec:
  name: web-tier
  inboundRules:
    - protocol: tcp
      portRange: "443"
      sourceAddresses:
        - 0.0.0.0/0
        - "::/0"
    - protocol: tcp
      portRange: "80"
      sourceAddresses:
        - 0.0.0.0/0
        - "::/0"
    - protocol: tcp
      portRange: "22"
      sourceAddresses:
        - "<your-management-cidr>"  # Restrict SSH to your IP/VPN
  outboundRules:
    - protocol: tcp
      portRange: 1-65535
      destinationAddresses:
        - 0.0.0.0/0
        - "::/0"
    - protocol: udp
      portRange: 1-65535
      destinationAddresses:
        - 0.0.0.0/0
        - "::/0"
    - protocol: icmp
      destinationAddresses:
        - 0.0.0.0/0
        - "::/0"
  tags:
    - web
