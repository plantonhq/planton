apiVersion: digital-ocean.openmcf.org/v1
kind: DigitalOceanFunction
metadata:
  name: my-scheduled-job
spec:
  functionName: my-scheduled-job
  region: nyc1
  runtime: python_311
  githubSource:
    repo: "<your-org>/<your-repo>"
    branch: main
    deployOnPush: true
  sourceDirectory: /functions/etl
  memoryMb: 512
  timeoutMs: 60000  # 60 seconds for batch processing
  isWeb: false  # Not an HTTP endpoint
  cronSchedule: "0 * * * *"  # Runs every hour
  secretEnvironmentVariables:
    DATABASE_URL: "<your-database-connection-string>"
