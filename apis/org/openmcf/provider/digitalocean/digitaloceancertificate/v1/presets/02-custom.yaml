apiVersion: digital-ocean.openmcf.org/v1
kind: DigitalOceanCertificate
metadata:
  name: my-custom-cert
spec:
  certificateName: my-custom-cert
  type: custom
  custom:
    leafCertificate: |
      -----BEGIN CERTIFICATE-----
      <paste-your-leaf-certificate-pem>
      -----END CERTIFICATE-----
    privateKey: |
      -----BEGIN PRIVATE KEY-----
      <paste-your-private-key-pem>
      -----END PRIVATE KEY-----
    certificateChain: |
      -----BEGIN CERTIFICATE-----
      <paste-intermediate-chain-pem-optional>
      -----END CERTIFICATE-----
