syntax = "proto3";

package org.openmcf.provider.aws.awselasticip.v1;

// AwsElasticIpStackOutputs captures observable identifiers from a provisioned Elastic IP.
//
// The primary output is `allocation_id`, which downstream resources use to wire
// dependencies via StringValueOrRef. For example, an AwsNetworkLoadBalancer uses
// the allocation_id in its subnet_mapping to bind a static public IP to the NLB.
message AwsElasticIpStackOutputs {
  // The allocation ID of the Elastic IP (e.g., "eipalloc-0123456789abcdef0").
  // This is the primary identifier used to reference the EIP in other AWS
  // resources such as NLB subnet mappings, NAT Gateways, and EIP associations.
  string allocation_id = 1;

  // The public IPv4 address assigned to this Elastic IP.
  string public_ip = 2;

  // The Amazon Resource Name (ARN) of the Elastic IP. Used for IAM policies
  // and resource-level permissions.
  string arn = 3;

  // The public DNS hostname associated with the Elastic IP
  // (e.g., "ec2-1-2-3-4.compute-1.amazonaws.com").
  string public_dns = 4;
}
