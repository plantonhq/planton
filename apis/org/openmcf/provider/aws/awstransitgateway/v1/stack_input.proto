syntax = "proto3";

package org.openmcf.provider.aws.awstransitgateway.v1;

import "org/openmcf/provider/aws/awstransitgateway/v1/api.proto";
import "org/openmcf/provider/aws/provider.proto";

// AwsTransitGatewayStackInput provides the inputs to the IaC modules
// (Pulumi or Terraform) that provision the Transit Gateway and its
// VPC attachments.
message AwsTransitGatewayStackInput {
  // target cloud-resource
  AwsTransitGateway target = 1;
  // provider-config
  org.openmcf.provider.aws.AwsProviderConfig provider_config = 2;
}
