syntax = "proto3";

package org.openmcf.provider.aws.awsfsxontapfilesystem.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/aws/awsfsxontapfilesystem/v1/spec.proto";
import "org/openmcf/provider/aws/awsfsxontapfilesystem/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// aws-fsx-ontap-file-system
message AwsFsxOntapFileSystem {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'aws.openmcf.org/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AwsFsxOntapFileSystem'];

  //metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  AwsFsxOntapFileSystemSpec spec = 4 [(buf.validate.field).required = true];

  //status
  AwsFsxOntapFileSystemStatus status = 5;
}

// aws-fsx-ontap-file-system status
message AwsFsxOntapFileSystemStatus {
  //stack-outputs
  AwsFsxOntapFileSystemStackOutputs outputs = 1;
}
