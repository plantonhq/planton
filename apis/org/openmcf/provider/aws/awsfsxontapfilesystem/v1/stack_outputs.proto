syntax = "proto3";

package org.openmcf.provider.aws.awsfsxontapfilesystem.v1;

// AwsFsxOntapFileSystemStackOutputs captures observable identifiers and
// endpoints from a provisioned FSx for ONTAP file system. These outputs are
// used by downstream resources to wire dependencies via StringValueOrRef.
//
// Primary consumers:
// - AwsFsxOntapStorageVirtualMachine: needs `file_system_id` as parent
// - AwsFsxOntapVolume: needs SVM (which needs file_system_id)
// - IAM policies: needs `file_system_arn`
// - SnapMirror replication: needs `intercluster_dns_name` and `intercluster_ip_addresses`
// - ONTAP CLI administration: needs `management_dns_name` or `management_ip_addresses`
// - Network troubleshooting: needs `network_interface_ids`, `vpc_id`
message AwsFsxOntapFileSystemStackOutputs {
  // The ID of the file system (e.g., "fs-0123456789abcdef0"). Primary
  // identifier used by Storage Virtual Machines and other AWS services.
  string file_system_id = 1;

  // The Amazon Resource Name of the file system. Used in IAM policies for
  // resource-level permissions.
  string file_system_arn = 2;

  // The DNS name for the file system (e.g.,
  // "fs-0123456789abcdef0.fsx.us-east-1.amazonaws.com").
  string dns_name = 3;

  // The management endpoint DNS name. Used for SSH (ONTAP CLI) and REST API
  // access to the file system. Connect via: ssh fsxadmin@<management_dns_name>
  string management_dns_name = 4;

  // The management endpoint IP addresses. Alternative to DNS for direct IP
  // access to the ONTAP management interface.
  repeated string management_ip_addresses = 5;

  // The intercluster endpoint DNS name. Used for NetApp SnapMirror replication
  // between FSx for ONTAP file systems (same or cross-region).
  string intercluster_dns_name = 6;

  // The intercluster endpoint IP addresses. Used for SnapMirror peering when
  // DNS resolution is not available.
  repeated string intercluster_ip_addresses = 7;

  // The network interface IDs created for the file system, in order. Single-AZ
  // creates 1 ENI per HA pair; multi-AZ creates 2 ENIs. Useful for security
  // group debugging and network troubleshooting.
  repeated string network_interface_ids = 8;

  // The VPC ID in which the file system was created. Computed from the subnets.
  // Useful for constructing security group rules and verifying network placement.
  string vpc_id = 9;

  // The AWS account ID of the file system owner.
  string owner_id = 10;
}
