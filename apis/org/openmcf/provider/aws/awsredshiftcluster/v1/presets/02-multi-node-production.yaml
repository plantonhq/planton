apiVersion: aws.openmcf.org/v1
kind: AwsRedshiftCluster
metadata:
  name: my-prod-warehouse
spec:
  nodeType: ra3.xlplus
  numberOfNodes: 2
  databaseName: analytics
  masterUsername: admin
  manageMasterPassword: true
  masterPasswordSecretKmsKeyId:
    value: "<kms-key-arn>"
  subnetIds:
    - value: "<private-subnet-id-az1>"
    - value: "<private-subnet-id-az2>"
  encrypted: true
  kmsKeyId:
    value: "<kms-key-arn>"
  enhancedVpcRouting: true
  automatedSnapshotRetentionPeriod: 7
  skipFinalSnapshot: false
  finalSnapshotIdentifier: my-prod-warehouse-final
  preferredMaintenanceWindow: "sat:03:00-sat:04:00"
  allowVersionUpgrade: true
  logging:
    logDestinationType: cloudwatch
    logExports:
      - connectionlog
      - useractivitylog
      - userlog
  parameters:
    - name: require_ssl
      value: "true"
    - name: enable_user_activity_logging
      value: "true"
  iamRoles:
    - value: "<redshift-s3-access-role-arn>"
