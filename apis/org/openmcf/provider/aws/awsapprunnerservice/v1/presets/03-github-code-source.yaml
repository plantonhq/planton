apiVersion: aws.openmcf.org/v1
kind: AwsAppRunnerService
metadata:
  name: my-nodejs-app
spec:
  # GitHub code source -- App Runner clones, builds, and deploys from the repository
  codeSource:
    repositoryUrl: "<github-repository-url>"
    branch: "<branch-name>"
    # App Runner Connection authorizing GitHub access (created via AWS Console/CLI)
    connectionArn:
      value: "<apprunner-connection-arn>"
    # API mode: build/runtime config is provided here (not from apprunner.yaml in the repo)
    configurationSource: "API"
    # Node.js 18 managed runtime
    runtime: "NODEJS_18"
    # Build command executed during the build phase
    buildCommand: "npm ci && npm run build"

  # Port the application listens on after build
  port: "<application-port>"
  # Start command executed to launch the application
  startCommand: "npm start"

  cpu: "1024"
  memory: "2048"

  environmentVariables:
    NODE_ENV: "production"

  # Auto-deploy: triggers a new build + deploy on every push to the branch
  autoDeploymentsEnabled: true
