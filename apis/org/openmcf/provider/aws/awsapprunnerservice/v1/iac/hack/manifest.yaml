apiVersion: aws.openmcf.org/v1
kind: AwsAppRunnerService
metadata:
  name: apprunner-demo
spec:
  region: us-east-1
  imageSource:
    imageIdentifier: "public.ecr.aws/nginx/nginx:latest"
    imageRepositoryType: "ECR_PUBLIC"
  port: "80"
  cpu: "1024"
  memory: "2048"
  environmentVariables:
    EXAMPLE: "true"
