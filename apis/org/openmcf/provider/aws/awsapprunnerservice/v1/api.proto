syntax = "proto3";

package org.openmcf.provider.aws.awsapprunnerservice.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/aws/awsapprunnerservice/v1/spec.proto";
import "org/openmcf/provider/aws/awsapprunnerservice/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// aws-app-runner-service
message AwsAppRunnerService {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'aws.openmcf.org/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AwsAppRunnerService'];

  //metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  AwsAppRunnerServiceSpec spec = 4 [(buf.validate.field).required = true];

  //status
  AwsAppRunnerServiceStatus status = 5;
}

// aws-app-runner-service status
message AwsAppRunnerServiceStatus {
  //stack-outputs
  AwsAppRunnerServiceStackOutputs outputs = 1;
}
