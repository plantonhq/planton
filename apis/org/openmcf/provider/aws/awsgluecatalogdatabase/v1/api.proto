syntax = "proto3";

package org.openmcf.provider.aws.awsgluecatalogdatabase.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/aws/awsgluecatalogdatabase/v1/spec.proto";
import "org/openmcf/provider/aws/awsgluecatalogdatabase/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// AwsGlueCatalogDatabase is the Kubernetes-style resource envelope for an AWS
// Glue Data Catalog database.
message AwsGlueCatalogDatabase {
  // api-version must be set to "aws.openmcf.org/v1".
  string api_version = 1 [(buf.validate.field).string.const = "aws.openmcf.org/v1"];

  // resource-kind for this Glue Data Catalog database, must be "AwsGlueCatalogDatabase".
  string kind = 2 [(buf.validate.field).string.const = "AwsGlueCatalogDatabase"];

  // metadata captures identifying information (name, org, env, id, labels, relationships).
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec holds the desired configuration for the Glue Data Catalog database.
  AwsGlueCatalogDatabaseSpec spec = 4 [(buf.validate.field).required = true];

  // status holds runtime or post-deployment information.
  AwsGlueCatalogDatabaseStatus status = 5;
}

// AwsGlueCatalogDatabaseStatus captures lifecycle, audit, job linkage, and observable outputs.
message AwsGlueCatalogDatabaseStatus {
  // stack-outputs
  AwsGlueCatalogDatabaseStackOutputs outputs = 1;
}
