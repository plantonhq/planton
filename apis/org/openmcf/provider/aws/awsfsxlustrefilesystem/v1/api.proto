syntax = "proto3";

package org.openmcf.provider.aws.awsfsxlustrefilesystem.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/aws/awsfsxlustrefilesystem/v1/spec.proto";
import "org/openmcf/provider/aws/awsfsxlustrefilesystem/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// aws-fsx-lustre-file-system
message AwsFsxLustreFileSystem {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'aws.openmcf.org/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AwsFsxLustreFileSystem'];

  //metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  AwsFsxLustreFileSystemSpec spec = 4 [(buf.validate.field).required = true];

  //status
  AwsFsxLustreFileSystemStatus status = 5;
}

// aws-fsx-lustre-file-system status
message AwsFsxLustreFileSystemStatus {
  //stack-outputs
  AwsFsxLustreFileSystemStackOutputs outputs = 1;
}
