syntax = "proto3";

package org.openmcf.provider.aws.awsfsxlustrefilesystem.v1;

// AwsFsxLustreFileSystemStackOutputs captures observable identifiers and endpoints
// from a provisioned FSx for Lustre file system. These outputs are used by
// downstream resources to wire dependencies via StringValueOrRef.
//
// Primary consumers:
// - EKS (PersistentVolume via FSx CSI driver): needs `file_system_id`
// - ECS (task definition FSx volumes): needs `file_system_id`
// - EC2 (direct Lustre mount): uses `dns_name` and `mount_name`
// - Batch (AWS Batch compute environments): needs `file_system_id`
// - Data repository associations: needs `file_system_id` and `file_system_arn`
//
// Mount command: mount -t lustre <dns_name>@tcp:/<mount_name> /mnt/fsx
message AwsFsxLustreFileSystemStackOutputs {
  // The ID of the file system (e.g., "fs-0123456789abcdef0"). This is the
  // primary identifier used by EKS PersistentVolumes, ECS task definitions,
  // and AWS Batch compute environments.
  string file_system_id = 1;

  // The Amazon Resource Name of the file system. Used in IAM policies for
  // resource-level permissions and for creating data repository associations.
  string file_system_arn = 2;

  // The DNS name for the file system (e.g.,
  // "fs-0123456789abcdef0.fsx.us-east-1.amazonaws.com"). Used in mount commands
  // together with `mount_name`:
  // mount -t lustre <dns_name>@tcp:/<mount_name> /mnt/fsx
  string dns_name = 3;

  // The Lustre mount name for the file system (e.g., "fsx" or "2p5wpbwj").
  // Used in the mount command together with `dns_name`. This value is
  // auto-generated by AWS and is required to construct the full mount path.
  string mount_name = 4;

  // The network interface IDs created for the file system, in order. Lustre
  // file systems create one ENI in the specified subnet. Useful for security
  // group debugging and network troubleshooting.
  repeated string network_interface_ids = 5;

  // The VPC ID in which the file system was created. Computed from the subnet.
  // Useful for constructing security group rules and verifying network placement.
  string vpc_id = 6;

  // The Lustre file system type version (e.g., "2.12", "2.15"). Reflects the
  // actual version deployed, which may differ from the requested version if
  // the field was left empty (AWS chooses the latest).
  string file_system_type_version = 7;

  // The AWS account ID of the file system owner.
  string owner_id = 8;
}
