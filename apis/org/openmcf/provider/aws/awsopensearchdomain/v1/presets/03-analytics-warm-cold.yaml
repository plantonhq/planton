apiVersion: aws.openmcf.org/v1
kind: AwsOpenSearchDomain
metadata:
  name: analytics-search
spec:
  region: us-east-1
  engineVersion: "OpenSearch_2.11"
  clusterConfig:
    instanceType: r6g.xlarge.search
    instanceCount: 3
    dedicatedMasterEnabled: true
    dedicatedMasterType: r6g.large.search
    dedicatedMasterCount: 3
    zoneAwarenessEnabled: true
    availabilityZoneCount: 3
    warmEnabled: true
    warmType: ultrawarm1.medium.search
    warmCount: 3
    coldStorageEnabled: true
  ebsOptions:
    ebsEnabled: true
    volumeType: gp3
    volumeSize: 200
    iops: 6000
    throughput: 250
  encryptAtRestEnabled: true
  nodeToNodeEncryptionEnabled: true
  vpcOptions:
    subnetIds:
      - valueFrom:
          kind: AwsSubnet
          name: <private-subnet-1-name>
          fieldPath: status.outputs.subnet_id
      - valueFrom:
          kind: AwsSubnet
          name: <private-subnet-2-name>
          fieldPath: status.outputs.subnet_id
      - valueFrom:
          kind: AwsSubnet
          name: <private-subnet-3-name>
          fieldPath: status.outputs.subnet_id
    securityGroupIds:
      - valueFrom:
          kind: AwsSecurityGroup
          name: <security-group-name>
          fieldPath: status.outputs.security_group_id
  domainEndpointOptions:
    enforceHttps: true
    tlsSecurityPolicy: "Policy-Min-TLS-1-2-PFS-2023-10"
  advancedSecurityOptions:
    enabled: true
    internalUserDatabaseEnabled: true
    masterUserName: admin
    masterUserPassword:
      value: "<master-password>"
  logPublishingOptions:
    - logType: INDEX_SLOW_LOGS
      cloudwatchLogGroupArn:
        value: "<index-slow-logs-log-group-arn>"
    - logType: SEARCH_SLOW_LOGS
      cloudwatchLogGroupArn:
        value: "<search-slow-logs-log-group-arn>"
    - logType: ES_APPLICATION_LOGS
      cloudwatchLogGroupArn:
        value: "<application-logs-log-group-arn>"
  autoTuneEnabled: true
