apiVersion: aws.openmcf.org/v1
kind: AwsEventBridgeRule
metadata:
  name: my-fanout-rule
spec:
  description: Route events to multiple targets with transformation and reliability
  eventBusName:
    value: <custom-bus-name>
  eventPattern:
    source:
      - com.myapp.orders
    detail-type:
      - OrderCreated
  targets:
    - name: order-processor
      arn:
        value: <lambda-function-arn>
      inputTransformer:
        inputPaths:
          orderId: "$.detail.order_id"
          customerId: "$.detail.customer_id"
        inputTemplate: '{"orderId": <orderId>, "customerId": <customerId>}'
      retryPolicy:
        maximumEventAgeInSeconds: 3600
        maximumRetryAttempts: 10
      deadLetterConfig:
        arn:
          value: <dlq-queue-arn>
    - name: analytics-queue
      arn:
        value: <sqs-queue-arn>
      inputPath: "$.detail"
