apiVersion: aws.openmcf.org/v1
kind: AwsDynamodb
metadata:
  name: my-on-demand-table
spec:
  billingMode: PAY_PER_REQUEST
  attributeDefinitions:
    - name: id
      type: S
  keySchema:
    - attributeName: id
      keyType: HASH
  pointInTimeRecoveryEnabled: true  # Recommended for production
  deletionProtectionEnabled: true
