syntax = "proto3";

package org.openmcf.provider.aws.awsstepfunction.v1;

import "org/openmcf/provider/aws/awsstepfunction/v1/api.proto";
import "org/openmcf/provider/aws/provider.proto";

// AwsStepFunctionStackInput is the input envelope passed to IaC modules for provisioning.
message AwsStepFunctionStackInput {
  // target is the fully-specified AwsStepFunction resource to provision.
  AwsStepFunction target = 1;

  // provider_config supplies AWS credentials and region for the deployment.
  // When nil the module falls back to ambient credentials (environment variables
  // or instance profile).
  org.openmcf.provider.aws.AwsProviderConfig provider_config = 2;
}
