syntax = "proto3";

package org.openmcf.provider.aws.awsstepfunction.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/aws/awsstepfunction/v1/spec.proto";
import "org/openmcf/provider/aws/awsstepfunction/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// AwsStepFunction is the Kubernetes-style resource envelope for an AWS Step
// Functions state machine.
message AwsStepFunction {
  // api-version must be set to "aws.openmcf.org/v1".
  string api_version = 1 [(buf.validate.field).string.const = "aws.openmcf.org/v1"];

  // resource-kind for this Step Functions state machine, must be "AwsStepFunction".
  string kind = 2 [(buf.validate.field).string.const = "AwsStepFunction"];

  // metadata captures identifying information (name, org, env, id, labels, relationships).
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec holds the desired configuration for the state machine.
  AwsStepFunctionSpec spec = 4 [(buf.validate.field).required = true];

  // status holds runtime or post-deployment information.
  AwsStepFunctionStatus status = 5;
}

// AwsStepFunctionStatus captures lifecycle, audit, job linkage, and observable outputs.
message AwsStepFunctionStatus {
  // stack-outputs
  AwsStepFunctionStackOutputs outputs = 1;
}
