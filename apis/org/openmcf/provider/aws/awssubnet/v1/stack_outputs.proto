syntax = "proto3";

package org.openmcf.provider.aws.awssubnet.v1;

// AwsSubnetStackOutputs contains the values produced by deploying an AwsSubnet.
// Downstream components (compute, load balancers, databases, EKS/ECS, ...)
// reference these via StringValueOrRef to compose a topology.
message AwsSubnetStackOutputs {
  // The subnet's id (e.g. "subnet-0abc123").
  string subnet_id = 1;

  // The subnet's ARN.
  string subnet_arn = 2;

  // The availability zone the subnet resides in (e.g. "us-west-2a").
  string availability_zone = 3;

  // The subnet's IPv4 CIDR block.
  string cidr_block = 4;

  // The id of the route table associated with this subnet: the inline table
  // created from routes, the externally referenced route_table_id, or the VPC's
  // main route table when neither is set.
  string route_table_id = 5;

  // The AWS region the subnet was created in. Echoed so downstream tooling and
  // verifiers can target the correct region.
  string region = 6;
}
