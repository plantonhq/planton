syntax = "proto3";

package org.openmcf.provider.aws.awsiamoidcprovider.v1;

// AwsIamOidcProviderStackOutputs describes the values returned by Pulumi/Terraform
// after provisioning an IAM OIDC identity provider.
message AwsIamOidcProviderStackOutputs {
  // provider_arn is the Amazon Resource Name (ARN) of the IAM OIDC provider
  // (e.g. "arn:aws:iam::123456789012:oidc-provider/oidc.eks.us-west-2.amazonaws.com/id/EXAMPLED").
  // This is the value an AwsIamRole trust policy references as a `Federated`
  // principal to grant web-identity (IRSA / CI federation) access.
  string provider_arn = 1;

  // provider_url is the issuer URL AWS stored for this provider, with the
  // "https://" scheme stripped (e.g. "oidc.eks.us-west-2.amazonaws.com/id/EXAMPLED").
  // It matches the `<provider-url>` segment of provider_arn and is the value used
  // to build the `<provider-url>:sub` / `<provider-url>:aud` condition keys in a
  // role's trust policy.
  string provider_url = 2;
}
