syntax = "proto3";

package org.openmcf.provider.aws.awscloudwatchalarm.v1;

import "org/openmcf/provider/aws/awscloudwatchalarm/v1/api.proto";
import "org/openmcf/provider/aws/provider.proto";

// AwsCloudwatchAlarmStackInput provides the inputs required by Pulumi/Terraform
// modules to provision a CloudWatch metric alarm.
message AwsCloudwatchAlarmStackInput {
  // target cloud-resource
  AwsCloudwatchAlarm target = 1;
  // provider-config
  org.openmcf.provider.aws.AwsProviderConfig provider_config = 2;
}
