apiVersion: aws.openmcf.org/v1
kind: AwsCloudwatchAlarm
metadata:
  name: error-rate-alarm
spec:
  comparisonOperator: GreaterThanThreshold
  evaluationPeriods: 3
  datapointsToAlarm: 2
  threshold: 5.0
  treatMissingData: notBreaching
  alarmDescription: "ALB 5xx error rate exceeds 5% — investigate backend failures"
  metricQueries:
    - id: errors
      metric:
        metricName: HTTPCode_Target_5XX_Count
        namespace: AWS/ApplicationELB
        period: 300
        stat: Sum
        dimensions:
          LoadBalancer: app/my-alb/1234567890abcdef
    - id: requests
      metric:
        metricName: RequestCount
        namespace: AWS/ApplicationELB
        period: 300
        stat: Sum
        dimensions:
          LoadBalancer: app/my-alb/1234567890abcdef
    - id: error_rate
      expression: "errors/requests*100"
      label: "Error Rate %"
      returnData: true
  alarmActions:
    - value: arn:aws:sns:us-east-1:123456789012:ops-alerts
