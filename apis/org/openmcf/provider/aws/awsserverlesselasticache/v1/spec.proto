syntax = "proto3";

package org.openmcf.provider.aws.awsserverlesselasticache.v1;

import "buf/validate/validate.proto";
import "org/openmcf/shared/foreignkey/v1/foreign_key.proto";

// AwsServerlessElasticacheSpec defines the desired configuration for an AWS
// ElastiCache Serverless cache.
//
// ElastiCache Serverless removes all node management. There are no instance
// types, no replica counts, no parameter groups, no maintenance windows.
// AWS automatically scales compute (measured in ElastiCache Processing Units,
// ECPU) and storage (measured in GB) within the limits you configure.
//
// This component supports all three ElastiCache engines:
//
// - **Redis** — in-memory data store with persistence, replication, and
//   fine-grained access control via Redis ACL user groups.
//
// - **Valkey** — open-source Redis-compatible engine with the same feature set.
//
// - **Memcached** — volatile key-value cache with no persistence, no
//   replication, and no authentication. Simpler and cheaper for pure caching.
//
// Engine-specific features (snapshots, user groups) are guarded by CEL
// validations and only valid for Redis/Valkey.
//
// Notes:
// - `kms_key_id` and `subnet_ids` are ForceNew — changing them destroys and
//   recreates the cache. Design encryption and networking choices upfront.
// - Credentials, region, and deployment workflow live outside this spec in
//   stack inputs.
message AwsServerlessElasticacheSpec {
  // The AWS region where the resource will be created.
  // Example: "us-west-2", "eu-west-1"
  string region = 1 [(buf.validate.field).string.min_len = 1];

  // ---------------------------------------------------------------------------
  // Engine
  // ---------------------------------------------------------------------------

  // Cache engine to use. Values: "redis", "valkey", "memcached".
  // Switching between redis and valkey is an in-place update. Switching
  // to/from memcached forces recreation.
  string engine = 2 [(buf.validate.field).required = true];

  // Major engine version. Examples: "7", "8" for Redis/Valkey; "1.6" for
  // Memcached. Leave empty to use the provider default for the chosen engine.
  string major_engine_version = 3;

  // Human-readable description of the serverless cache.
  string description = 4;

  // ---------------------------------------------------------------------------
  // Scaling limits — data storage
  // ---------------------------------------------------------------------------

  // Maximum data storage in GB. AWS auto-scales storage up to this limit.
  // Range: 1–5000. Leave as 0 to use the AWS default for the engine.
  int32 data_storage_max_gb = 5 [(buf.validate.field).int32 = {
    gte: 0
    lte: 5000
  }];

  // Minimum data storage in GB. AWS guarantees at least this capacity is
  // always provisioned. Range: 1–5000. Leave as 0 to use the AWS default.
  int32 data_storage_min_gb = 6 [(buf.validate.field).int32 = {
    gte: 0
    lte: 5000
  }];

  // ---------------------------------------------------------------------------
  // Scaling limits — compute (ECPU)
  // ---------------------------------------------------------------------------

  // Maximum ElastiCache Processing Units per second. AWS auto-scales compute
  // up to this limit. Range: 1000–15000000. Leave as 0 for AWS default.
  int32 ecpu_max = 7 [(buf.validate.field).int32 = {
    gte: 0
    lte: 15000000
  }];

  // Minimum ElastiCache Processing Units per second. AWS guarantees at least
  // this compute capacity. Range: 1000–15000000. Leave as 0 for AWS default.
  int32 ecpu_min = 8 [(buf.validate.field).int32 = {
    gte: 0
    lte: 15000000
  }];

  // ---------------------------------------------------------------------------
  // Networking
  // ---------------------------------------------------------------------------

  // Subnet IDs for the serverless cache's VPC endpoint. The cache creates
  // VPC endpoints in these subnets. ForceNew — changing this destroys and
  // recreates the cache.
  repeated org.openmcf.shared.foreignkey.v1.StringValueOrRef subnet_ids = 9 [
    (org.openmcf.shared.foreignkey.v1.default_kind) = AwsSubnet,
    (org.openmcf.shared.foreignkey.v1.default_kind_field_path) = "status.outputs.subnet_id"
  ];

  // VPC security groups to attach to the serverless cache endpoint.
  // Controls network-level access.
  repeated org.openmcf.shared.foreignkey.v1.StringValueOrRef security_group_ids = 10 [
    (org.openmcf.shared.foreignkey.v1.default_kind) = AwsSecurityGroup,
    (org.openmcf.shared.foreignkey.v1.default_kind_field_path) = "status.outputs.security_group_id"
  ];

  // ---------------------------------------------------------------------------
  // Encryption
  // ---------------------------------------------------------------------------

  // Customer-managed KMS key ARN for at-rest encryption. When set, ElastiCache
  // Serverless uses this key instead of the AWS-managed key. ForceNew —
  // changing this destroys and recreates the cache.
  org.openmcf.shared.foreignkey.v1.StringValueOrRef kms_key_id = 11 [
    (org.openmcf.shared.foreignkey.v1.default_kind) = AwsKmsKey,
    (org.openmcf.shared.foreignkey.v1.default_kind_field_path) = "status.outputs.key_arn"
  ];

  // ---------------------------------------------------------------------------
  // Snapshots (Redis/Valkey only)
  // ---------------------------------------------------------------------------

  // Daily automatic snapshot time in UTC. Format: "HH:mm" (e.g., "05:00").
  // Only valid for Redis/Valkey engines. Memcached has no persistence.
  string daily_snapshot_time = 12;

  // Number of days to retain automatic snapshots. Range: 0–35. 0 disables
  // snapshots. Only valid for Redis/Valkey engines.
  int32 snapshot_retention_limit = 13 [(buf.validate.field).int32 = {
    gte: 0
    lte: 35
  }];

  // ---------------------------------------------------------------------------
  // Authentication (Redis/Valkey only)
  // ---------------------------------------------------------------------------

  // Redis ACL user group ID for fine-grained access control. Only valid for
  // Redis/Valkey engines. Memcached has no authentication mechanism.
  string user_group_id = 14;

  // ---------------------------------------------------------------------------
  // CEL validations
  // ---------------------------------------------------------------------------

  // Engine must be redis, valkey, or memcached.
  option (buf.validate.message).cel = {
    id: "engine_valid_values"
    message: "engine must be 'redis', 'valkey', or 'memcached'"
    expression: "this.engine in ['redis', 'valkey', 'memcached']"
  };

  // data_storage_min_gb must not exceed data_storage_max_gb when both are set.
  option (buf.validate.message).cel = {
    id: "data_storage_min_max"
    message: "data_storage_min_gb must not exceed data_storage_max_gb when both are set"
    expression: "this.data_storage_min_gb == 0 || this.data_storage_max_gb == 0 || this.data_storage_min_gb <= this.data_storage_max_gb"
  };

  // ecpu_min must not exceed ecpu_max when both are set.
  option (buf.validate.message).cel = {
    id: "ecpu_min_max"
    message: "ecpu_min must not exceed ecpu_max when both are set"
    expression: "this.ecpu_min == 0 || this.ecpu_max == 0 || this.ecpu_min <= this.ecpu_max"
  };

  // daily_snapshot_time is only valid for Redis/Valkey.
  option (buf.validate.message).cel = {
    id: "snapshot_time_engine_guard"
    message: "daily_snapshot_time is only valid for redis or valkey engines"
    expression: "this.daily_snapshot_time == '' || this.engine in ['redis', 'valkey']"
  };

  // snapshot_retention_limit is only valid for Redis/Valkey.
  option (buf.validate.message).cel = {
    id: "snapshot_retention_engine_guard"
    message: "snapshot_retention_limit is only valid for redis or valkey engines"
    expression: "this.snapshot_retention_limit == 0 || this.engine in ['redis', 'valkey']"
  };

  // user_group_id is only valid for Redis/Valkey.
  option (buf.validate.message).cel = {
    id: "user_group_engine_guard"
    message: "user_group_id is only valid for redis or valkey engines"
    expression: "this.user_group_id == '' || this.engine in ['redis', 'valkey']"
  };

  // data_storage_min_gb must be at least 1 when set (non-zero).
  option (buf.validate.message).cel = {
    id: "data_storage_min_floor"
    message: "data_storage_min_gb must be at least 1 when set"
    expression: "this.data_storage_min_gb == 0 || this.data_storage_min_gb >= 1"
  };

  // data_storage_max_gb must be at least 1 when set (non-zero).
  option (buf.validate.message).cel = {
    id: "data_storage_max_floor"
    message: "data_storage_max_gb must be at least 1 when set"
    expression: "this.data_storage_max_gb == 0 || this.data_storage_max_gb >= 1"
  };

  // ecpu_min must be at least 1000 when set (non-zero).
  option (buf.validate.message).cel = {
    id: "ecpu_min_floor"
    message: "ecpu_min must be at least 1000 when set"
    expression: "this.ecpu_min == 0 || this.ecpu_min >= 1000"
  };

  // ecpu_max must be at least 1000 when set (non-zero).
  option (buf.validate.message).cel = {
    id: "ecpu_max_floor"
    message: "ecpu_max must be at least 1000 when set"
    expression: "this.ecpu_max == 0 || this.ecpu_max >= 1000"
  };
}
