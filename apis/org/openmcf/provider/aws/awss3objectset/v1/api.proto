syntax = "proto3";

package org.openmcf.provider.aws.awss3objectset.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/aws/awss3objectset/v1/spec.proto";
import "org/openmcf/provider/aws/awss3objectset/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

//aws-s3-object-set
message AwsS3ObjectSet {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'aws.openmcf.org/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AwsS3ObjectSet'];

  //metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  AwsS3ObjectSetSpec spec = 4 [(buf.validate.field).required = true];

  //status
  AwsS3ObjectSetStatus status = 5;
}

//aws-s3-object-set status
message AwsS3ObjectSetStatus {
  //stack-outputs
  AwsS3ObjectSetStackOutputs outputs = 1;
}
