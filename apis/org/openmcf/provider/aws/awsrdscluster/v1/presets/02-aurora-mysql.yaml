apiVersion: aws.openmcf.org/v1
kind: AwsRdsCluster
metadata:
  name: my-aurora-mysql
spec:
  subnetIds:
    - value: "<private-subnet-id-az1>"
    - value: "<private-subnet-id-az2>"
  securityGroupIds:
    - value: "<security-group-id>"
  engine: aurora-mysql
  engineVersion: "8.0.mysql_aurora.3.05.2"
  databaseName: <database-name>
  manageMasterUserPassword: true  # recommended_default from spec
  username: master  # default from spec
  storageEncrypted: true
  deletionProtection: true
  backupRetentionPeriod: 7
  skipFinalSnapshot: false
  finalSnapshotIdentifier: <final-snapshot-name>
  enabledCloudwatchLogsExports:
    - error
    - slowquery
  copyTagsToSnapshot: true
