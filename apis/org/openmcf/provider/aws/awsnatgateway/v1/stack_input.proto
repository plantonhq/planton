syntax = "proto3";

package org.openmcf.provider.aws.awsnatgateway.v1;

import "org/openmcf/provider/aws/awsnatgateway/v1/api.proto";
import "org/openmcf/provider/aws/provider.proto";

// AwsNatGatewayStackInput is the input to the IaC modules (Pulumi / Terraform)
// that deploy an AwsNatGateway resource.
message AwsNatGatewayStackInput {
  // target cloud-resource
  AwsNatGateway target = 1;
  // provider-config
  org.openmcf.provider.aws.AwsProviderConfig provider_config = 2;
}
