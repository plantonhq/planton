syntax = "proto3";

package org.openmcf.provider.aws.awsnatgateway.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/aws/awsnatgateway/v1/spec.proto";
import "org/openmcf/provider/aws/awsnatgateway/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// AwsNatGateway is the top-level resource representing a NAT gateway in an AWS
// Virtual Private Cloud (VPC).
message AwsNatGateway {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'aws.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AwsNatGateway'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AwsNatGatewaySpec spec = 4 [(buf.validate.field).required = true];

  // status
  AwsNatGatewayStatus status = 5;
}

// AwsNatGatewayStatus holds the outputs produced by deploying an AwsNatGateway.
message AwsNatGatewayStatus {
  // stack-outputs
  AwsNatGatewayStackOutputs outputs = 1;
}
