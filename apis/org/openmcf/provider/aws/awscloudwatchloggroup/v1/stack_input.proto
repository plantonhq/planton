syntax = "proto3";

package org.openmcf.provider.aws.awscloudwatchloggroup.v1;

import "org/openmcf/provider/aws/awscloudwatchloggroup/v1/api.proto";
import "org/openmcf/provider/aws/provider.proto";

// AwsCloudwatchLogGroupStackInput provides the inputs required by Pulumi/Terraform
// modules to provision a CloudWatch Logs log group.
message AwsCloudwatchLogGroupStackInput {
  // target cloud-resource
  AwsCloudwatchLogGroup target = 1;
  // provider-config
  org.openmcf.provider.aws.AwsProviderConfig provider_config = 2;
}
