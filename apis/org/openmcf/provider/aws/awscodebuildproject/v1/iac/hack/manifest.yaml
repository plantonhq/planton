apiVersion: aws.openmcf.org/v1
kind: AwsCodeBuildProject
metadata:
  name: test-codebuild
  id: test-codebuild
  org: test-org
  env: dev
  labels:
    openmcf.org/provisioner: pulumi
    pulumi.openmcf.org/organization: test
    pulumi.openmcf.org/project: test
    pulumi.openmcf.org/stack.name: dev.AwsCodeBuildProject.test-codebuild
spec:
  source:
    type: GITHUB
    location: https://github.com/example/repo.git
  environment:
    type: LINUX_CONTAINER
    computeType: BUILD_GENERAL1_SMALL
    image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
  artifacts:
    type: NO_ARTIFACTS
  serviceRole:
    value: arn:aws:iam::123456789012:role/codebuild-service-role
