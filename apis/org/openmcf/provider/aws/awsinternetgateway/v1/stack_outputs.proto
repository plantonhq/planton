syntax = "proto3";

package org.openmcf.provider.aws.awsinternetgateway.v1;

// AwsInternetGatewayStackOutputs contains the values produced by deploying an
// AwsInternetGateway. Downstream components reference these via StringValueOrRef
// -- most commonly an AwsSubnet route whose target is this gateway's id.
message AwsInternetGatewayStackOutputs {
  // The internet gateway's id (e.g. "igw-0abc123"). This is the value a subnet
  // route uses as its target_id when target_type is internet_gateway.
  string internet_gateway_id = 1;

  // The internet gateway's ARN.
  string internet_gateway_arn = 2;

  // The id of the VPC this gateway is attached to.
  string vpc_id = 3;

  // The AWS region the internet gateway was created in. Echoed so downstream
  // tooling and verifiers can target the correct region.
  string region = 4;
}
