syntax = "proto3";

package org.openmcf.provider.aws.awsinternetgateway.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/aws/awsinternetgateway/v1/spec.proto";
import "org/openmcf/provider/aws/awsinternetgateway/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// AwsInternetGateway is the top-level resource representing an internet gateway
// attached to an AWS Virtual Private Cloud (VPC).
message AwsInternetGateway {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'aws.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AwsInternetGateway'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AwsInternetGatewaySpec spec = 4 [(buf.validate.field).required = true];

  // status
  AwsInternetGatewayStatus status = 5;
}

// AwsInternetGatewayStatus holds the outputs produced by deploying an
// AwsInternetGateway.
message AwsInternetGatewayStatus {
  // stack-outputs
  AwsInternetGatewayStackOutputs outputs = 1;
}
