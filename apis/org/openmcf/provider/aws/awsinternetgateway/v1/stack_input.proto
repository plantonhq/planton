syntax = "proto3";

package org.openmcf.provider.aws.awsinternetgateway.v1;

import "org/openmcf/provider/aws/awsinternetgateway/v1/api.proto";
import "org/openmcf/provider/aws/provider.proto";

// AwsInternetGatewayStackInput is the input to the IaC modules (Pulumi /
// Terraform) that deploy an AwsInternetGateway resource.
message AwsInternetGatewayStackInput {
  // target cloud-resource
  AwsInternetGateway target = 1;
  // provider-config
  org.openmcf.provider.aws.AwsProviderConfig provider_config = 2;
}
