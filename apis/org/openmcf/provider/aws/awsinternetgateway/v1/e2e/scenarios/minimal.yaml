# Minimal AwsInternetGateway scenario. vpcId is a value_from reference to the
# AwsVpc prerequisite (declared via prerequisites: [AwsVpc] in the kind registry);
# the E2E harness deploys that VPC first and resolves this reference to the created
# vpc-id before the gateway is applied. Full metadata is supplied for
# tagging/orphan cleanup.
#
# NOTE: this scenario is not yet executed live (no harness entry funcs reference
# it). The AwsVpc prerequisite bundles its own internet gateway and AWS permits
# only one per VPC, so a live attach against it fails; this scenario is activated
# once AwsVpc no longer bundles an internet gateway. See ../profile.yaml.
apiVersion: aws.openmcf.org/v1
kind: AwsInternetGateway
metadata:
  name: planton-oss-e2e-awsinternetgateway-smoke
  id: planton-oss-e2e-awsinternetgateway-smoke
  org: planton-oss
  env: e2e
  labels:
    managed-by: openmcf-e2e
    e2e-component: awsinternetgateway
  annotations:
    openmcf.org/e2e: "true"
  tags:
    - openmcf-e2e
spec:
  region: us-west-2
  vpcId:
    valueFrom:
      kind: AwsVpc
      name: planton-oss-e2e-awsvpc-prereq
      fieldPath: status.outputs.vpc_id
