apiVersion: qa.openmcf.org/v1
kind: ComponentE2EProfile
metadata:
  name: awsinternetgateway
spec:
  # Live E2E is blocked, not failing: attaching a standalone internet gateway
  # needs a VPC that does not already have one, but the AwsVpc component (the only
  # VPC the harness can deploy as a prerequisite) unconditionally bundles its own
  # internet gateway, and AWS permits only one per VPC. The scenario below and the
  # harness entry funcs are activated once AwsVpc no longer bundles an internet
  # gateway, at which point this profile goes green on both engines. Until then the
  # component is validated offline (spec tests, outputs conformance/parity, tofu
  # validate, secret-coverage, bazel/nogo).
  tier: 1
  status: blocked
  validated_provisioners: []
  timeout_minutes: 10
