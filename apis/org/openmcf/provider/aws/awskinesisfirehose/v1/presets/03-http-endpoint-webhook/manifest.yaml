apiVersion: aws.openmcf.org/v1
kind: AwsKinesisFirehose
metadata:
  name: datadog-logs-firehose
  org: my-org
  env: prod
  id: datadog-logs-firehose-prod
spec:
  # Direct PUT source — applications send logs via PutRecord/PutRecordBatch
  httpEndpoint:
    url: https://http-intake.logs.datadoghq.com/v1/input
    name: Datadog Logs
    accessKey: "<your-datadog-api-key>"
    roleArn:
      value: arn:aws:iam::123456789012:role/firehose-http-delivery-role
    s3BackupMode: FailedDataOnly
    s3Config:
      bucketArn:
        value: arn:aws:s3:::my-firehose-backup-bucket
      roleArn:
        value: arn:aws:iam::123456789012:role/firehose-s3-backup-role
      prefix: http-backup/failed/
      compressionFormat: GZIP
    requestConfig:
      contentEncoding: GZIP
      commonAttributes:
        - name: env
          value: production
