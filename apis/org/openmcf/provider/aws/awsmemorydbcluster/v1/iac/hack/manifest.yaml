apiVersion: aws.openmcf.org/v1
kind: AwsMemorydbCluster
metadata:
  name: test-memorydb
  id: test-memorydb
  org: test-org
  env: dev
  labels:
    openmcf.org/provisioner: pulumi
    pulumi.openmcf.org/organization: test
    pulumi.openmcf.org/project: test
    pulumi.openmcf.org/stack.name: dev.AwsMemorydbCluster.test-memorydb
spec:
  region: us-west-2
  engine: redis
  engineVersion: "7.1"
  description: Test MemoryDB cluster
  nodeType: db.t4g.small
  numShards: 1
  numReplicasPerShard: 0
  aclName: open-access
  tlsEnabled: true
  subnetIds:
    - value: subnet-0a1b2c3d4e5f00001
    - value: subnet-0a1b2c3d4e5f00002
