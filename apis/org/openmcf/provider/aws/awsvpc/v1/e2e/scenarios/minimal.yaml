# Minimal standalone AwsVpc scenario: a single thin VPC with a primary IPv4 CIDR.
# AwsVpc has no prerequisites, so the harness applies this directly. Full metadata
# is supplied for tagging/orphan cleanup.
apiVersion: aws.openmcf.org/v1
kind: AwsVpc
metadata:
  name: planton-oss-e2e-awsvpc-smoke
  id: planton-oss-e2e-awsvpc-smoke
  org: planton-oss
  env: e2e
  labels:
    managed-by: openmcf-e2e
    e2e-component: awsvpc
  annotations:
    openmcf.org/e2e: "true"
  tags:
    - openmcf-e2e
spec:
  region: us-west-2
  cidrBlock: 10.0.0.0/16
  enableDnsHostnames: true
