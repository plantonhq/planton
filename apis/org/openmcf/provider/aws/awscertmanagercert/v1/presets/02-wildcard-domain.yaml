apiVersion: aws.openmcf.org/v1
kind: AwsCertManagerCert
metadata:
  name: my-wildcard-certificate
spec:
  primaryDomainName: "*.<your-domain.com>"
  alternateDomainNames:
    - <your-domain.com>
  route53HostedZoneId:
    value: "<route53-hosted-zone-id>"
  validationMethod: DNS  # default from spec; automated validation via Route53
