apiVersion: aws.openmcf.org/v1
kind: AwsCodePipeline
metadata:
  name: my-lambda-deploy
spec:
  pipelineType: V2
  executionMode: SUPERSEDED
  roleArn:
    value: "<codepipeline-service-role-arn>"
  artifactStores:
    - location:
        value: "<pipeline-artifacts-bucket-name>"
  stages:
    - name: Source
      actions:
        - name: S3Source
          category: Source
          owner: AWS
          provider: S3
          version: "1"
          configuration:
            S3Bucket: "<lambda-packages-bucket>"
            S3ObjectKey: "<path/to/function-package.zip>"
            PollForSourceChanges: "false"
          outputArtifacts:
            - LambdaPackage

    - name: Deploy
      actions:
        - name: UpdateLambda
          category: Invoke
          owner: AWS
          provider: Lambda
          version: "1"
          configuration:
            FunctionName: "<deployer-lambda-function-name>"
            UserParameters: '{"targetFunction":"<target-lambda-function-name>","alias":"live"}'
          inputArtifacts:
            - LambdaPackage
