apiVersion: qa.openmcf.org/v1
kind: ComponentE2EProfile
metadata:
  name: awss3bucket
spec:
  # Walking skeleton for the AWS harness, live-validated on both provisioners
  # (deploy -> HeadBucket verify -> destroy -> verify-destroyed) against the AWS
  # test account via keyless SSO credentials.
  tier: 1
  status: green
  validated_provisioners:
    - pulumi
    - terraform
  timeout_minutes: 5
