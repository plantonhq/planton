syntax = "proto3";

package org.openmcf.provider.aws;

import "buf/validate/validate.proto";

// AwsProviderConfig message represents the specification required to connect an AWS Account.
// This message consolidates all necessary input parameters to establish a connection with an AWS Account, ensuring
// accurate configuration and validation of credentials.
// Fields include details like AWS account ID, access credentials, and the region, providing a complete set of
// information for securely connecting to AWS.
// Detailed validation rules have been applied to these fields to ensure input correctness and adherence to
// security protocols.
message AwsProviderConfig {
  // The AWS Account ID, which uniquely identifies the AWS account.
  // This is a mandatory field and must be a numeric string.
  // The value cannot be empty and must only contain numbers (0-9).
  // For more information do refer this link https://docs.aws.amazon.com/accounts/latest/reference/manage-acct-identifiers.html
  string account_id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).cel = {
      id: "spec.aws.account_id"
      message: "Only numbers (0-9) are allowed"
      expression: "this.matches('^[0-9]+$')"
    }
  ];

  // The AWS Access Key ID, which is used to authenticate API requests to AWS services.
  // Required for static-credential auth; left empty for keyless web-identity auth
  // (see web_identity below). When present, it must start with either 'AKIA'
  // (long-term credentials) or 'ASIA' (temporary security credentials) followed by
  // 16 alphanumeric characters, for a total of 20 characters. The format rules are
  // skipped when the field is empty (IGNORE_IF_ZERO_VALUE) so keyless configs validate.
  // For more information do refer this link https://docs.aws.amazon.com/IAM/latest/UserGuide/access-keys-admin-managed.html
  string access_key_id = 2 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.len = 20,
    (buf.validate.field).cel = {
      id: "spec.access_key_id.prefix"
      message: "Must start with 'AKIA' (long-term) or 'ASIA' (temporary)"
      // https://regex101.com/r/QgVmCf/1
      expression: "this.matches('^A(K|S)IA.*')"
    },
    (buf.validate.field).cel = {
      id: "spec.access_key_id.format"
      message: "Must start with 'AKIA' or 'ASIA' followed by 16 alphanumeric characters"
      // https://regex101.com/r/LybhZA/1
      expression: "this.matches('^.{4}[a-zA-Z0-9]{16}$')"
    }
  ];

  // The AWS Secret Access Key, used together with the access key ID to authenticate API requests to AWS services.
  // Required for static-credential auth; left empty for keyless web-identity auth
  // (see web_identity below). When present, the value must be exactly 40 characters
  // consisting of numbers, lowercase and uppercase letters, slashes (/), and plus
  // signs (+). The format rule is skipped when the field is empty (IGNORE_IF_ZERO_VALUE).
  // For more information do refer this link https://docs.aws.amazon.com/IAM/latest/UserGuide/access-keys-admin-managed.html
  string secret_access_key = 3 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.len = 40,
    (buf.validate.field).cel = {
      id: "spec.aws.secret_access_key"
      message: "The provided AWS Secret Access Key is invalid. It must contain exactly 40 characters consisting of numbers, lowercase and uppercase letters, slashes (/), and plus signs (+). Please double-check your input and try again."
      //https://regex101.com/r/YlvVRM/1
      expression: "this.matches('^[0-9a-zA-Z/+]{40}$')"
    }
  ];

  // The AWS region to be used when configuring this AWS credential.
  // This optional field allows specifying the region in which resources will be created or managed.
  // For more information do refer this link https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/Concepts.RegionsAndAvailabilityZones.html
  string region = 4 [(buf.validate.field).required = true];

  // The AWS Session Token, required when using temporary security credentials.
  // This field is optional and only needed when using temporary credentials obtained through
  // AWS STS operations (e.g., AssumeRole, GetSessionToken).
  // Temporary credentials have Access Key IDs starting with 'ASIA'.
  // For more information refer to https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_temp.html
  string session_token = 5;

  // Keyless web-identity (OIDC) authentication. When set, the provider authenticates
  // via STS AssumeRoleWithWebIdentity instead of static access keys -- so access_key_id
  // and secret_access_key are left empty in this mode. Exactly one of {static keys,
  // web_identity} is populated; if neither is set the provider is built with region only.
  AwsWebIdentityProviderConfig web_identity = 6;
}

// AwsWebIdentityProviderConfig holds the inputs for keyless OIDC federation: the caller mints
// a short-lived OIDC JWT from an issuer it controls, and the AWS provider exchanges it for
// credentials via STS AssumeRoleWithWebIdentity. The token is opaque to OpenMCF, which is
// agnostic to the issuer (a platform-owned issuer, GitHub Actions, GitLab CI, etc.).
//
// It powers two auth modes with one mechanism:
//   - single hop: assume the target role directly with the web identity.
//   - two hops: assume a base role with the web identity (role_arn below), then role-chain
//     into the target role via chained_assume_roles (capped at a 1h session by AWS).
//
// The token is carried in memory (web_identity_token) and never written to disk: a stack
// job's runtime stays within the token TTL, so no file-based provider refresh is needed.
//
// Exchange site differs by provider: the pulumi-aws "classic" provider performs the exchange
// itself from web_identity_token, whereas pulumi-aws-native has no web-identity support
// (upstream pulumi/pulumi-aws-native#1042) so its builder performs the STS exchange and injects
// the resulting temporary credentials.
message AwsWebIdentityProviderConfig {
  // The minted OIDC JWT presented to STS. Maps to pulumi-aws
  // ProviderAssumeRoleWithWebIdentity.WebIdentityToken.
  string web_identity_token = 1 [(buf.validate.field).required = true];

  // ARN of the first-hop role assumed with the web identity:
  //   - single hop: the target (customer) role.
  //   - two hops: the base role (in cross-account-trust, a role in the platform's account),
  //     from which chained_assume_roles reaches the target role.
  string role_arn = 2 [(buf.validate.field).required = true];

  // Optional session name for the web-identity assumption. Provider default applies when empty.
  string session_name = 3;

  // Optional session duration string (e.g. "1h"). Provider default applies when empty.
  string duration = 4;

  // Optional chained role hops applied after the web-identity assumption, in order.
  // Used by cross_account_trust for the second hop into the customer role; empty for oidc.
  repeated AwsAssumeRoleConfig chained_assume_roles = 5;
}

// AwsAssumeRoleConfig describes a single STS AssumeRole hop chained off an already-assumed
// identity (e.g. the cross-account-trust hop from a base role into the target role).
message AwsAssumeRoleConfig {
  // ARN of the role to assume in this hop.
  string role_arn = 1 [(buf.validate.field).required = true];

  // Optional external ID for confused-deputy prevention, embedded in the target role's
  // trust policy as an sts:ExternalId condition.
  string external_id = 2;

  // Optional session name for this hop. Provider default applies when empty.
  string session_name = 3;

  // Optional session duration string (e.g. "1h"). Role chaining caps the session at 1h.
  string duration = 4;
}
