apiVersion: aws.openmcf.org/v1
kind: AwsSnsTopic
metadata:
  name: test-topic
  org: test-org
  env: dev
  id: test-topic-dev
  labels:
    openmcf.org/provisioner: pulumi
    pulumi.openmcf.org/organization: test-org
    pulumi.openmcf.org/project: test-project
    pulumi.openmcf.org/stack.name: dev.AwsSnsTopic.test-topic
spec:
  region: us-west-2
  signatureVersion: 2
  subscriptions:
    - name: test-queue
      protocol: sqs
      endpoint:
        value: arn:aws:sqs:us-east-1:123456789012:test-queue
      rawMessageDelivery: true
