apiVersion: aws.openmcf.org/v1
kind: AwsSnsTopic
metadata:
  name: order-events
spec:
  signatureVersion: 2
  subscriptions:
    - name: fulfillment-queue
      protocol: sqs
      endpoint:
        valueFrom:
          kind: AwsSqsQueue
          name: fulfillment-events
          fieldPath: status.outputs.queue_arn
      filterPolicy:
        event_type:
          - order_placed
          - order_shipped
      filterPolicyScope: MessageAttributes
      rawMessageDelivery: true
    - name: billing-queue
      protocol: sqs
      endpoint:
        valueFrom:
          kind: AwsSqsQueue
          name: billing-events
          fieldPath: status.outputs.queue_arn
      filterPolicy:
        event_type:
          - payment_received
          - refund_issued
      filterPolicyScope: MessageAttributes
      rawMessageDelivery: true
