syntax = "proto3";

package org.openmcf.provider.aws.awssnstopic.v1;

import "org/openmcf/provider/aws/awssnstopic/v1/api.proto";
import "org/openmcf/provider/aws/provider.proto";

// AwsSnsTopicStackInput is the input envelope passed to IaC modules for provisioning.
message AwsSnsTopicStackInput {
  // target is the fully-specified AwsSnsTopic resource to provision.
  AwsSnsTopic target = 1;

  // provider_config supplies AWS credentials and region for the deployment.
  // When nil the module falls back to ambient credentials (environment variables
  // or instance profile).
  org.openmcf.provider.aws.AwsProviderConfig provider_config = 2;
}
