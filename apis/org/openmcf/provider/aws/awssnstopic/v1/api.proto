syntax = "proto3";

package org.openmcf.provider.aws.awssnstopic.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/aws/awssnstopic/v1/spec.proto";
import "org/openmcf/provider/aws/awssnstopic/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// AwsSnsTopic is the Kubernetes-style resource envelope for an AWS SNS topic.
message AwsSnsTopic {
  // api-version must be set to "aws.openmcf.org/v1".
  string api_version = 1 [(buf.validate.field).string.const = "aws.openmcf.org/v1"];

  // resource-kind for this SNS topic resource, must be "AwsSnsTopic".
  string kind = 2 [(buf.validate.field).string.const = "AwsSnsTopic"];

  // metadata captures identifying information (name, org, env, id, labels, relationships).
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec holds the desired configuration for the SNS topic.
  AwsSnsTopicSpec spec = 4 [(buf.validate.field).required = true];

  // status holds runtime or post-deployment information.
  AwsSnsTopicStatus status = 5;
}

// AwsSnsTopicStatus captures lifecycle, audit, job linkage, and observable outputs.
message AwsSnsTopicStatus {
  // stack-outputs
  AwsSnsTopicStackOutputs outputs = 1;
}
