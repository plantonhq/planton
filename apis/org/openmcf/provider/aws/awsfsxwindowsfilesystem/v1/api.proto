syntax = "proto3";

package org.openmcf.provider.aws.awsfsxwindowsfilesystem.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/aws/awsfsxwindowsfilesystem/v1/spec.proto";
import "org/openmcf/provider/aws/awsfsxwindowsfilesystem/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// aws-fsx-windows-file-system
message AwsFsxWindowsFileSystem {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'aws.openmcf.org/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AwsFsxWindowsFileSystem'];

  //metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  AwsFsxWindowsFileSystemSpec spec = 4 [(buf.validate.field).required = true];

  //status
  AwsFsxWindowsFileSystemStatus status = 5;
}

// aws-fsx-windows-file-system status
message AwsFsxWindowsFileSystemStatus {
  //stack-outputs
  AwsFsxWindowsFileSystemStackOutputs outputs = 1;
}
