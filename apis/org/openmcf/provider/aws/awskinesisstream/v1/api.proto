syntax = "proto3";

package org.openmcf.provider.aws.awskinesisstream.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/aws/awskinesisstream/v1/spec.proto";
import "org/openmcf/provider/aws/awskinesisstream/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// AwsKinesisStream is the Kubernetes-style resource envelope for an Amazon
// Kinesis Data Stream.
message AwsKinesisStream {
  // api-version must be set to "aws.openmcf.org/v1".
  string api_version = 1 [(buf.validate.field).string.const = "aws.openmcf.org/v1"];

  // resource-kind for this Kinesis stream resource, must be "AwsKinesisStream".
  string kind = 2 [(buf.validate.field).string.const = "AwsKinesisStream"];

  // metadata captures identifying information (name, org, env, id, labels, relationships).
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec holds the desired configuration for the Kinesis stream.
  AwsKinesisStreamSpec spec = 4 [(buf.validate.field).required = true];

  // status holds runtime or post-deployment information.
  AwsKinesisStreamStatus status = 5;
}

// AwsKinesisStreamStatus captures lifecycle, audit, job linkage, and observable outputs.
message AwsKinesisStreamStatus {
  // stack-outputs
  AwsKinesisStreamStackOutputs outputs = 1;
}
