syntax = "proto3";

package org.openmcf.provider.aws.awsneptunecluster.v1;

import "org/openmcf/provider/aws/awsneptunecluster/v1/api.proto";
import "org/openmcf/provider/aws/provider.proto";

// AwsNeptuneClusterStackInput is the input for the IaC modules that deploy the Neptune cluster.
message AwsNeptuneClusterStackInput {
  // target is the AwsNeptuneCluster resource to deploy.
  AwsNeptuneCluster target = 1;
  // provider_config contains the AWS provider credentials and configuration.
  org.openmcf.provider.aws.AwsProviderConfig provider_config = 2;
}
