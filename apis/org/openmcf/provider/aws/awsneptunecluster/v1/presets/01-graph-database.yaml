apiVersion: aws.openmcf.org/v1
kind: AwsNeptuneCluster
metadata:
  name: my-graph-database
spec:
  subnetIds:
    - value: "<private-subnet-id-az1>"
    - value: "<private-subnet-id-az2>"
  securityGroupIds:
    - value: "<security-group-id>"
  vpcId:
    value: "<vpc-id>"
  engineVersion: "1.3.0.0"  # default from spec
  port: 8182  # default from spec
  instanceCount: 1  # Single instance for standard graph workload
  instanceClass: db.r6g.large  # default from spec; 2 vCPUs, 16 GiB RAM
  storageEncrypted: true  # default from spec
  backupRetentionPeriod: 7  # default from spec
  skipFinalSnapshot: true  # No snapshot needed for dev/non-prod
