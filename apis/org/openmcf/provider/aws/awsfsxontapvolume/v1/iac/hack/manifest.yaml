apiVersion: aws.openmcf.org/v1
kind: AwsFsxOntapVolume
metadata:
  name: test-ontap-volume
  id: awsfxov-test123
  org: test-org
  env: test
spec:
  region: us-west-2
  storage_virtual_machine_id:
    value: svm-0123456789abcdef0
  name: vol_test
  size_in_megabytes: 1024
  junction_path: /test
  security_style: UNIX
  storage_efficiency_enabled: true
  tiering_policy:
    name: AUTO
    cooling_period: 31
