apiVersion: aws.openmcf.org/v1
kind: AwsFsxOntapVolume
metadata:
  name: <REPLACE>
  id: <REPLACE>
  org: <REPLACE>
  env: <REPLACE>
spec:
  storage_virtual_machine_id:
    value: svm-0123456789abcdef0
  name: vol_compliance
  size_in_megabytes: 512000
  junction_path: /compliance
  security_style: UNIX
  storage_efficiency_enabled: true
  tiering_policy:
    name: SNAPSHOT_ONLY
  snaplock_configuration:
    snaplock_type: COMPLIANCE
    autocommit_period:
      type: DAYS
      value: 1
    retention_period:
      default_retention:
        type: YEARS
        value: 5
      minimum_retention:
        type: YEARS
        value: 1
      maximum_retention:
        type: YEARS
        value: 10
