syntax = "proto3";

package org.openmcf.provider.aws.awswafwebacl.v1;

import "org/openmcf/provider/aws/awswafwebacl/v1/api.proto";
import "org/openmcf/provider/aws/provider.proto";

// AwsWafWebAclStackInput provides the inputs required by Pulumi/Terraform
// modules to provision a WAFv2 Web ACL.
message AwsWafWebAclStackInput {
  // target cloud-resource
  AwsWafWebAcl target = 1;
  // provider-config
  org.openmcf.provider.aws.AwsProviderConfig provider_config = 2;
}
