syntax = "proto3";

package org.openmcf.provider.aws.awskinesisstreamconsumer.v1;

import "org/openmcf/provider/aws/awskinesisstreamconsumer/v1/api.proto";
import "org/openmcf/provider/aws/provider.proto";

// AwsKinesisStreamConsumerStackInput is the input envelope passed to IaC
// modules for provisioning.
message AwsKinesisStreamConsumerStackInput {
  // target is the fully-specified AwsKinesisStreamConsumer resource to provision.
  AwsKinesisStreamConsumer target = 1;

  // provider_config supplies AWS credentials and region for the deployment.
  // When nil the module falls back to ambient credentials (environment variables
  // or instance profile).
  org.openmcf.provider.aws.AwsProviderConfig provider_config = 2;
}
