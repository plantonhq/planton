syntax = "proto3";

package org.openmcf.provider.aws.awsnetworkloadbalancer.v1;

import "org/openmcf/provider/aws/awsnetworkloadbalancer/v1/api.proto";
import "org/openmcf/provider/aws/provider.proto";

// AwsNetworkLoadBalancerStackInput provides the inputs to the IaC modules
// (Pulumi or Terraform) that provision the Network Load Balancer.
message AwsNetworkLoadBalancerStackInput {
  // target cloud-resource
  AwsNetworkLoadBalancer target = 1;
  // provider-config
  org.openmcf.provider.aws.AwsProviderConfig provider_config = 2;
}
