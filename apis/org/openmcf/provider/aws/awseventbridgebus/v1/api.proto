syntax = "proto3";

package org.openmcf.provider.aws.awseventbridgebus.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/aws/awseventbridgebus/v1/spec.proto";
import "org/openmcf/provider/aws/awseventbridgebus/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// AwsEventBridgeBus is the Kubernetes-style resource envelope for an AWS
// EventBridge custom event bus.
message AwsEventBridgeBus {
  // api-version must be set to "aws.openmcf.org/v1".
  string api_version = 1 [(buf.validate.field).string.const = "aws.openmcf.org/v1"];

  // resource-kind for this EventBridge bus resource, must be "AwsEventBridgeBus".
  string kind = 2 [(buf.validate.field).string.const = "AwsEventBridgeBus"];

  // metadata captures identifying information (name, org, env, id, labels, relationships).
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec holds the desired configuration for the EventBridge bus.
  AwsEventBridgeBusSpec spec = 4 [(buf.validate.field).required = true];

  // status holds runtime or post-deployment information.
  AwsEventBridgeBusStatus status = 5;
}

// AwsEventBridgeBusStatus captures lifecycle, audit, job linkage, and
// observable outputs.
message AwsEventBridgeBusStatus {
  // stack-outputs
  AwsEventBridgeBusStackOutputs outputs = 1;
}
