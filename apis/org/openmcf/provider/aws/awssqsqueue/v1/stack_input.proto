syntax = "proto3";

package org.openmcf.provider.aws.awssqsqueue.v1;

import "org/openmcf/provider/aws/awssqsqueue/v1/api.proto";
import "org/openmcf/provider/aws/provider.proto";

// AwsSqsQueueStackInput is the input envelope passed to IaC modules for provisioning.
message AwsSqsQueueStackInput {
  // target is the fully-specified AwsSqsQueue resource to provision.
  AwsSqsQueue target = 1;

  // provider_config supplies AWS credentials and region for the deployment.
  // When nil the module falls back to ambient credentials (environment variables
  // or instance profile).
  org.openmcf.provider.aws.AwsProviderConfig provider_config = 2;
}
