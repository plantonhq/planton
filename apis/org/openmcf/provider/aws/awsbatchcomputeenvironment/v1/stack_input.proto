syntax = "proto3";

package org.openmcf.provider.aws.awsbatchcomputeenvironment.v1;

import "org/openmcf/provider/aws/awsbatchcomputeenvironment/v1/api.proto";
import "org/openmcf/provider/aws/provider.proto";

// AwsBatchComputeEnvironmentStackInput is the input for the IaC modules that
// deploy the Batch compute environment, job queues, and scheduling policy.
message AwsBatchComputeEnvironmentStackInput {
  // target is the AwsBatchComputeEnvironment resource to deploy.
  AwsBatchComputeEnvironment target = 1;
  // provider_config contains the AWS provider credentials and configuration.
  org.openmcf.provider.aws.AwsProviderConfig provider_config = 2;
}
