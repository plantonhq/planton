apiVersion: aws.openmcf.org/v1
kind: AwsBatchComputeEnvironment
metadata:
  name: test-batch
  id: test-batch
  org: test-org
  env: dev
  labels:
    openmcf.org/provisioner: pulumi
    pulumi.openmcf.org/organization: test
    pulumi.openmcf.org/project: test
    pulumi.openmcf.org/stack.name: dev.AwsBatchComputeEnvironment.test-batch
spec:
  computeResources:
    type: FARGATE
    maxVcpus: 256
    subnetIds:
      - value: subnet-0a1b2c3d4e5f00001
      - value: subnet-0a1b2c3d4e5f00002
    securityGroupIds:
      - value: sg-0a1b2c3d4e5f00001
  jobQueues:
    - name: default
      priority: 1
