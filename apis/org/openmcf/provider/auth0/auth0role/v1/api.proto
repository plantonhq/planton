syntax = "proto3";

package org.openmcf.provider.auth0.auth0role.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/auth0/auth0role/v1/spec.proto";
import "org/openmcf/provider/auth0/auth0role/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// Auth0Role is a deployment component that manages an Auth0 Role.
// Roles are named collections of permissions (scopes) that implement Auth0's
// role-based access control (RBAC). A role groups permissions defined on one or
// more Auth0 Resource Servers (APIs) and can then be assigned to users.
//
// This component creates the role and sets its complete permission list in a
// single deployment.
//
// Use cases:
// - Define standard access tiers (Administrator, Editor, Viewer) for an application
// - Group API scopes into reusable roles for assignment to users or groups
// - Manage role-to-permission mappings as version-controlled infrastructure
//
// Example manifest for a simple role:
// ```yaml
// apiVersion: auth0.openmcf.org/v1
// kind: Auth0Role
// metadata:
//   name: viewer
//   org: my-organization
// spec:
//   name: Viewer
//   description: Read-only access to the orders API
//   permissions:
//     - name: read:orders
//       resource_server_identifier: https://api.example.com/
// ```
//
// Example manifest for an administrator role spanning multiple APIs:
// ```yaml
// apiVersion: auth0.openmcf.org/v1
// kind: Auth0Role
// metadata:
//   name: administrator
//   org: my-organization
//   env: production
// spec:
//   name: Administrator
//   description: Full administrative access across the orders and billing APIs
//   permissions:
//     - name: read:orders
//       resource_server_identifier: https://api.example.com/orders
//     - name: write:orders
//       resource_server_identifier: https://api.example.com/orders
//     - name: delete:orders
//       resource_server_identifier: https://api.example.com/orders
//     - name: manage:billing
//       resource_server_identifier: https://api.example.com/billing
// ```
message Auth0Role {
  // api_version is the version of the Auth0 API resource.
  // Must be "auth0.openmcf.org/v1" for this version.
  string api_version = 1 [(buf.validate.field).string.const = 'auth0.openmcf.org/v1'];

  // kind is the Kubernetes Resource Model (KRM) kind.
  // Must be "Auth0Role" for this resource type.
  string kind = 2 [(buf.validate.field).string.const = 'Auth0Role'];

  // metadata contains standard cloud resource metadata.
  // - name: Unique identifier for the role within OpenMCF (default role name when spec.name is empty)
  // - org: Organization that owns this role
  // - env: Environment (development, staging, production)
  // - labels: Key-value pairs for filtering and organization
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec contains the desired configuration for the Auth0 role.
  // This includes the role name, description, and the set of granted permissions.
  Auth0RoleSpec spec = 4 [(buf.validate.field).required = true];

  // status contains the current state of the Auth0 role.
  // This is populated by the system after deployment and includes
  // the role ID and other runtime information.
  Auth0RoleStatus status = 5;
}

// Auth0RoleStatus represents the current state of an Auth0 Role resource.
// This is populated by the deployment system and contains read-only outputs.
message Auth0RoleStatus {
  // outputs contains the stack outputs from the Auth0 role deployment.
  // These values are populated after successful deployment and include
  // the role ID, name, and description.
  Auth0RoleStackOutputs outputs = 1;
}
