apiVersion: auth0.openmcf.org/v1
kind: Auth0EventStream
metadata:
  name: e2e-webhook-stream
  org: e2e-org
  env: testing
spec:
  destination_type: webhook
  subscriptions:
    - user.created
    - user.updated
  webhook_configuration:
    webhook_endpoint: "https://google.com"
    webhook_authorization:
      method: bearer
      token: "e2e-test-token"
