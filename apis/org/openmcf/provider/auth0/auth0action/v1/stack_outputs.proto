syntax = "proto3";

package org.openmcf.provider.auth0.auth0action.v1;

// Auth0ActionStackOutputs contains the outputs from an Auth0 Action deployment.
// These outputs provide essential identifiers and status information for referencing
// the action in trigger bindings and monitoring its deployment state.
//
// https://registry.terraform.io/providers/auth0/auth0/latest/docs/resources/action#attributes-reference
// https://www.pulumi.com/registry/packages/auth0/api-docs/action/#outputs
message Auth0ActionStackOutputs {
  // id is the unique identifier of the Auth0 action.
  // This is assigned by Auth0 and used to reference the action in trigger bindings
  // and API calls.
  string id = 1;

  // name is the name of the action as configured in metadata.name.
  string name = 2;

  // version_id is the identifier of the currently deployed version.
  // Only populated when deploy is true. Each deployment creates a new
  // immutable version with a unique ID.
  string version_id = 3;

  // runtime is the resolved Node.js runtime version.
  // Reflects the actual runtime used, which may differ from the requested
  // value if Auth0 assigns a default.
  string runtime = 4;
}
