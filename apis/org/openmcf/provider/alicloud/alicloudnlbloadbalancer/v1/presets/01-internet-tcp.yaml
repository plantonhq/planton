apiVersion: alicloud.openmcf.org/v1
kind: AlicloudNlbLoadBalancer
metadata:
  name: <your-nlb-name>
spec:
  region: <alibaba-cloud-region>
  vpcId:
    value: <your-vpc-id>
  zoneMappings:
    - zoneId: <zone-a>
      vswitchId:
        value: <your-vswitch-id-a>
    - zoneId: <zone-b>
      vswitchId:
        value: <your-vswitch-id-b>
  serverGroups:
    - name: tcp-backend
      healthCheck:
        healthCheckEnabled: true
  listeners:
    - listenerPort: 80
      listenerProtocol: TCP
      serverGroupName: tcp-backend
