apiVersion: alicloud.openmcf.org/v1
kind: AlicloudNlbLoadBalancer
metadata:
  name: <your-nlb-name>
  org: <your-org>
  env: production
spec:
  region: <alibaba-cloud-region>
  vpcId:
    valueFrom:
      name: <your-vpc-resource-name>
  zoneMappings:
    - zoneId: <zone-a>
      vswitchId:
        valueFrom:
          name: <your-vswitch-resource-a>
      allocationId:
        valueFrom:
          name: <your-eip-resource-a>
    - zoneId: <zone-b>
      vswitchId:
        valueFrom:
          name: <your-vswitch-resource-b>
      allocationId:
        valueFrom:
          name: <your-eip-resource-b>
  tags:
    team: <your-team>
    cost-center: <your-cost-center>
  serverGroups:
    - name: secure-backend
      protocol: TCPSSL
      scheduler: Wlc
      connectionDrainEnabled: true
      connectionDrainTimeout: 300
      healthCheck:
        healthCheckEnabled: true
        healthCheckType: HTTP
        healthCheckUrl: /healthz
        httpCheckMethod: GET
        healthCheckInterval: 10
        healthyThreshold: 3
        unhealthyThreshold: 2
        healthCheckHttpCodes:
          - http_2xx
  listeners:
    - listenerPort: 443
      listenerProtocol: TCPSSL
      serverGroupName: secure-backend
      certificateIds:
        - <your-certificate-id>
      securityPolicyId: tls_cipher_policy_1_2_strict
      listenerDescription: Production TCPSSL listener
