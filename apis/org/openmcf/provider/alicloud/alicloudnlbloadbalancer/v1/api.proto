syntax = "proto3";

package org.openmcf.provider.alicloud.alicloudnlbloadbalancer.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/alicloud/alicloudnlbloadbalancer/v1/spec.proto";
import "org/openmcf/provider/alicloud/alicloudnlbloadbalancer/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// alicloud-nlb-load-balancer
message AlicloudNlbLoadBalancer {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'alicloud.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AlicloudNlbLoadBalancer'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AlicloudNlbLoadBalancerSpec spec = 4 [(buf.validate.field).required = true];

  // status
  AlicloudNlbLoadBalancerStatus status = 5;
}

// alicloud-nlb-load-balancer status
message AlicloudNlbLoadBalancerStatus {
  // stack-outputs
  AlicloudNlbLoadBalancerStackOutputs outputs = 1;
}
