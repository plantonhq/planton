syntax = "proto3";

package org.openmcf.provider.alicloud.alicloudkubernetescluster.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/alicloud/alicloudkubernetescluster/v1/spec.proto";
import "org/openmcf/provider/alicloud/alicloudkubernetescluster/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// alicloud-kubernetes-cluster
message AliCloudKubernetesCluster {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'ali-cloud.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AliCloudKubernetesCluster'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AliCloudKubernetesClusterSpec spec = 4 [(buf.validate.field).required = true];

  // status
  AliCloudKubernetesClusterStatus status = 5;
}

// alicloud-kubernetes-cluster status
message AliCloudKubernetesClusterStatus {
  // stack-outputs
  AliCloudKubernetesClusterStackOutputs outputs = 1;
}
