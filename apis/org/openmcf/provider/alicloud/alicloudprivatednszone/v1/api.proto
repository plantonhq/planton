syntax = "proto3";

package org.openmcf.provider.alicloud.alicloudprivatednszone.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/alicloud/alicloudprivatednszone/v1/spec.proto";
import "org/openmcf/provider/alicloud/alicloudprivatednszone/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// alicloud-private-dns-zone
message AlicloudPrivateDnsZone {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'alicloud.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AlicloudPrivateDnsZone'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AlicloudPrivateDnsZoneSpec spec = 4 [(buf.validate.field).required = true];

  // status
  AlicloudPrivateDnsZoneStatus status = 5;
}

// alicloud-private-dns-zone status
message AlicloudPrivateDnsZoneStatus {
  // stack-outputs
  AlicloudPrivateDnsZoneStackOutputs outputs = 1;
}
