apiVersion: alicloud.openmcf.org/v1
kind: AlicloudFunction
metadata:
  name: my-container-function
spec:
  region: <alibaba-cloud-region>
  functionName: <your-function-name>
  handler: not-applicable
  runtime: custom-container
  description: Containerized function with custom runtime
  cpu: 2.0
  memorySize: 4096
  timeout: 120
  customContainerConfig:
    image: <your-container-image-uri>
    port: 8080
    healthCheckConfig:
      httpGetUrl: /healthz
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
      successThreshold: 1
  instanceLifecycleConfig:
    initializer:
      handler: index.initializer
      timeout: 30
    preStop:
      handler: index.cleanup
      timeout: 15
  tags:
    team: <your-team>
