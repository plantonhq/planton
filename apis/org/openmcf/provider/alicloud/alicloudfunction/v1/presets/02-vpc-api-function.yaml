apiVersion: alicloud.openmcf.org/v1
kind: AlicloudFunction
metadata:
  name: my-api-function
spec:
  region: <alibaba-cloud-region>
  functionName: <your-function-name>
  handler: index.handler
  runtime: nodejs20
  description: API handler with VPC access to private resources
  cpu: 1.0
  memorySize: 2048
  timeout: 30
  instanceConcurrency: 10
  internetAccess: true
  code:
    ossBucketName: <your-code-bucket>
    ossObjectName: <your-code-object-key>
  role:
    value: <your-execution-role-arn>
  vpcConfig:
    vpcId:
      value: <your-vpc-id>
    vswitchIds:
      - value: <vswitch-id-zone-a>
      - value: <vswitch-id-zone-b>
    securityGroupId:
      value: <your-security-group-id>
  logConfig:
    project:
      value: <your-log-project-name>
    logstore: <your-logstore-name>
    logBeginRule: DefaultRegex
    enableInstanceMetrics: true
    enableRequestMetrics: true
  environmentVariables:
    DB_HOST: <your-database-endpoint>
    NODE_ENV: production
  tags:
    team: <your-team>
    service: <your-service-name>
