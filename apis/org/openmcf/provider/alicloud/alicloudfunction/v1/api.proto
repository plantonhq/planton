syntax = "proto3";

package org.openmcf.provider.alicloud.alicloudfunction.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/alicloud/alicloudfunction/v1/spec.proto";
import "org/openmcf/provider/alicloud/alicloudfunction/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// alicloud-function
message AlicloudFunction {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'alicloud.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AlicloudFunction'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AlicloudFunctionSpec spec = 4 [(buf.validate.field).required = true];

  // status
  AlicloudFunctionStatus status = 5;
}

// alicloud-function status
message AlicloudFunctionStatus {
  // stack-outputs
  AlicloudFunctionStackOutputs outputs = 1;
}
