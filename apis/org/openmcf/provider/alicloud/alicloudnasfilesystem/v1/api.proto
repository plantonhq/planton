syntax = "proto3";

package org.openmcf.provider.alicloud.alicloudnasfilesystem.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/alicloud/alicloudnasfilesystem/v1/spec.proto";
import "org/openmcf/provider/alicloud/alicloudnasfilesystem/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// alicloud-nas-file-system
message AlicloudNasFileSystem {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'alicloud.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AlicloudNasFileSystem'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AlicloudNasFileSystemSpec spec = 4 [(buf.validate.field).required = true];

  // status
  AlicloudNasFileSystemStatus status = 5;
}

// alicloud-nas-file-system status
message AlicloudNasFileSystemStatus {
  // stack-outputs
  AlicloudNasFileSystemStackOutputs outputs = 1;
}
