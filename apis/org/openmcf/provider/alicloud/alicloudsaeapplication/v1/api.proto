syntax = "proto3";

package org.openmcf.provider.alicloud.alicloudsaeapplication.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/alicloud/alicloudsaeapplication/v1/spec.proto";
import "org/openmcf/provider/alicloud/alicloudsaeapplication/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// alicloud-sae-application
message AlicloudSaeApplication {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'alicloud.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AlicloudSaeApplication'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AlicloudSaeApplicationSpec spec = 4 [(buf.validate.field).required = true];

  // status
  AlicloudSaeApplicationStatus status = 5;
}

// alicloud-sae-application status
message AlicloudSaeApplicationStatus {
  // stack-outputs
  AlicloudSaeApplicationStackOutputs outputs = 1;
}
