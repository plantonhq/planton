apiVersion: alicloud.openmcf.org/v1
kind: AlicloudSaeApplication
metadata:
  name: my-java-service
spec:
  region: <alibaba-cloud-region>
  appName: <your-app-name>
  appDescription: <your-app-description>
  packageType: FatJar
  replicas: 3
  cpu: 4000
  memory: 8192
  packageUrl: <your-jar-url>
  packageVersion: <your-jar-version>
  jdk: Open JDK 17
  jarStartOptions: "-Xms1g -Xmx4g -XX:+UseG1GC"
  programmingLanguage: java
  timezone: Asia/Shanghai
  terminationGracePeriodSeconds: 30
  minReadyInstances: 2
  vpcId:
    value: <your-vpc-id>
  vswitchId:
    value: <your-vswitch-id>
  securityGroupId:
    value: <your-security-group-id>
  envs:
    SPRING_PROFILES_ACTIVE: prod
  liveness:
    httpGet:
      path: /actuator/health/liveness
      port: 8080
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    httpGet:
      path: /actuator/health/readiness
      port: 8080
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 3
  updateStrategy:
    type: BatchUpdate
    batchUpdate:
      batch: 2
      batchWaitTime: 10
      releaseType: auto
  tags:
    team: <your-team>
    service: <your-service-name>
