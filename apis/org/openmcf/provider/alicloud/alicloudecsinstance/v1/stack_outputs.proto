syntax = "proto3";

package org.openmcf.provider.alicloud.alicloudecsinstance.v1;

// AlicloudEcsInstanceStackOutputs captures the outputs from deploying an
// Alibaba Cloud ECS instance.
message AlicloudEcsInstanceStackOutputs {
  // The ECS instance ID assigned by Alibaba Cloud (e.g., "i-bp1xxxxx").
  string instance_id = 1;

  // The primary private IP address assigned to the instance within its VSwitch.
  string private_ip = 2;

  // The public IP address allocated to the instance. Empty when
  // internet_max_bandwidth_out is 0 (no public IP requested).
  string public_ip = 3;
}
