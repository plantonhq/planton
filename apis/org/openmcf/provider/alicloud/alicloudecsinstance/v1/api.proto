syntax = "proto3";

package org.openmcf.provider.alicloud.alicloudecsinstance.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/alicloud/alicloudecsinstance/v1/spec.proto";
import "org/openmcf/provider/alicloud/alicloudecsinstance/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// alicloud-ecs-instance
message AlicloudEcsInstance {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'alicloud.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AlicloudEcsInstance'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AlicloudEcsInstanceSpec spec = 4 [(buf.validate.field).required = true];

  // status
  AlicloudEcsInstanceStatus status = 5;
}

// alicloud-ecs-instance status
message AlicloudEcsInstanceStatus {
  // stack-outputs
  AlicloudEcsInstanceStackOutputs outputs = 1;
}
