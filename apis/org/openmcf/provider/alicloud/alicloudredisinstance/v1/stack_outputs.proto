syntax = "proto3";

package org.openmcf.provider.alicloud.alicloudredisinstance.v1;

// AliCloudRedisInstanceStackOutputs captures the outputs from deploying an
// Alibaba Cloud Redis (KVStore) instance.
message AliCloudRedisInstanceStackOutputs {
  // The Redis instance ID assigned by Alibaba Cloud (e.g., "r-xxxxx").
  string instance_id = 1;

  // The intranet (VPC-internal) connection domain for the Redis instance.
  // Applications within the same VPC use this domain to connect.
  string connection_domain = 2;

  // The private connection port for the Redis instance (default: "6379").
  string private_connection_port = 3;

  // The private IP address assigned to the Redis instance within the VSwitch.
  string private_ip = 4;
}
