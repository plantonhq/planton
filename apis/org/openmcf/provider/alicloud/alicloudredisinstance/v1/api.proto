syntax = "proto3";

package org.openmcf.provider.alicloud.alicloudredisinstance.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/alicloud/alicloudredisinstance/v1/spec.proto";
import "org/openmcf/provider/alicloud/alicloudredisinstance/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// alicloud-redis-instance
message AliCloudRedisInstance {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'alicloud.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AliCloudRedisInstance'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AliCloudRedisInstanceSpec spec = 4 [(buf.validate.field).required = true];

  // status
  AliCloudRedisInstanceStatus status = 5;
}

// alicloud-redis-instance status
message AliCloudRedisInstanceStatus {
  // stack-outputs
  AliCloudRedisInstanceStackOutputs outputs = 1;
}
