apiVersion: alicloud.openmcf.org/v1
kind: AlicloudRedisInstance
metadata:
  name: <your-instance-name>
  org: <your-organization>
  env: production
spec:
  region: <alibaba-cloud-region>
  instanceClass: redis.master.large.default
  password: <your-password>
  vswitchId:
    valueFrom:
      name: <your-vswitch-resource-name>
  engineVersion: "7.0"
  zoneId: <primary-zone-id>
  secondaryZoneId: <standby-zone-id>
  paymentType: PrePaid
  period: "12"
  autoRenew: true
  autoRenewPeriod: 3
  sslEnable: Enable
  tdeStatus: Enabled
  encryptionKey: <your-kms-key-id>
  securityIps:
    - <your-application-cidr>
  instanceReleaseProtection: true
  maintainStartTime: "02:00Z"
  maintainEndTime: "04:00Z"
  backupPeriod:
    - Monday
    - Tuesday
    - Wednesday
    - Thursday
    - Friday
    - Saturday
    - Sunday
  backupTime: "02:00Z-03:00Z"
  tags:
    compliance: <your-compliance-standard>
    data-class: confidential
