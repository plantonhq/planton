apiVersion: alicloud.openmcf.org/v1
kind: AliCloudRamPolicy
metadata:
  name: my-cicd-deploy-pipeline
spec:
  region: <alibaba-cloud-region>
  policyName: <your-policy-name>
  description: CI/CD pipeline permissions for building images, deploying to ACK, and writing logs
  policyDocument: |
    {
      "Version": "1",
      "Statement": [
        {
          "Effect": "Allow",
          "Action": [
            "cr:GetRepository",
            "cr:PushRepository",
            "cr:PullRepository",
            "cr:GetNamespace",
            "cr:ListRepository"
          ],
          "Resource": [
            "acs:cr:*:*:repository/<your-registry-namespace>/*"
          ]
        },
        {
          "Effect": "Allow",
          "Action": [
            "cs:DescribeClusterDetail",
            "cs:GetClusterKubeconfig",
            "cs:DescribeClusterNodes",
            "cs:DescribeClusterResources"
          ],
          "Resource": [
            "acs:cs:*:*:cluster/*"
          ]
        },
        {
          "Effect": "Allow",
          "Action": [
            "log:PostLogStoreLogs",
            "log:GetLogStore",
            "log:ListLogStores"
          ],
          "Resource": [
            "acs:log:*:*:project/<your-log-project-name>/*"
          ]
        }
      ]
    }
  rotateStrategy: DeleteOldestNonDefaultVersionWhenLimitExceeded
  force: true
  tags:
    managedBy: openmcf
    purpose: cicd
