apiVersion: alicloud.openmcf.org/v1
kind: AlicloudRamPolicy
metadata:
  name: my-scoped-oss-access
spec:
  region: <alibaba-cloud-region>
  policyName: <your-policy-name>
  description: Grants read/write access to a specific OSS bucket and its objects
  policyDocument: |
    {
      "Version": "1",
      "Statement": [
        {
          "Effect": "Allow",
          "Action": [
            "oss:GetObject",
            "oss:PutObject",
            "oss:DeleteObject",
            "oss:ListObjects",
            "oss:GetBucket",
            "oss:ListMultipartUploads",
            "oss:AbortMultipartUpload"
          ],
          "Resource": [
            "acs:oss:*:*:<your-bucket-name>",
            "acs:oss:*:*:<your-bucket-name>/*"
          ]
        }
      ]
    }
  rotateStrategy: DeleteOldestNonDefaultVersionWhenLimitExceeded
  tags:
    managedBy: openmcf
