apiVersion: alicloud.openmcf.org/v1
kind: AlicloudOssBucket
metadata:
  name: my-archive-bucket
  env: production
spec:
  region: <alibaba-cloud-region>
  bucketName: <globally-unique-bucket-name>
  versioningEnabled: true
  serverSideEncryption:
    sseAlgorithm: AES256
  lifecycleRules:
    - prefix: ""
      enabled: true
      expirationDays: 365
      transitions:
        - days: 30
          storageClass: IA
        - days: 90
          storageClass: Archive
      abortMultipartUploadDays: 7
      noncurrentVersionExpirationDays: 30
  tags:
    purpose: <bucket-purpose>
    retention: 1-year
