apiVersion: alicloud.openmcf.org/v1
kind: AliCloudSecurityGroup
metadata:
  name: <your-sg-name>
spec:
  region: <alibaba-cloud-region>
  vpcId:
    value: <your-vpc-id>
  securityGroupName: <your-sg-name>
  description: Database tier security group restricting access to VPC-internal traffic
  innerAccessPolicy: Drop
  rules:
    - type: ingress
      ipProtocol: tcp
      portRange: "3306/3306"
      cidrIp: <your-vpc-cidr>
      priority: 1
      description: Allow MySQL from VPC
    - type: ingress
      ipProtocol: tcp
      portRange: "5432/5432"
      cidrIp: <your-vpc-cidr>
      priority: 2
      description: Allow PostgreSQL from VPC
    - type: ingress
      ipProtocol: tcp
      portRange: "6379/6379"
      cidrIp: <your-vpc-cidr>
      priority: 3
      description: Allow Redis from VPC
