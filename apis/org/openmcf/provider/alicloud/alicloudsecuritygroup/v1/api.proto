syntax = "proto3";

package org.openmcf.provider.alicloud.alicloudsecuritygroup.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/alicloud/alicloudsecuritygroup/v1/spec.proto";
import "org/openmcf/provider/alicloud/alicloudsecuritygroup/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// alicloud-security-group
message AlicloudSecurityGroup {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'alicloud.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AlicloudSecurityGroup'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AlicloudSecurityGroupSpec spec = 4 [(buf.validate.field).required = true];

  // status
  AlicloudSecurityGroupStatus status = 5;
}

// alicloud-security-group status
message AlicloudSecurityGroupStatus {
  // stack-outputs
  AlicloudSecurityGroupStackOutputs outputs = 1;
}
