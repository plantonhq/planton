apiVersion: alicloud.openmcf.org/v1
kind: AlicloudCdnDomain
metadata:
  name: my-assets-cdn
spec:
  region: <alibaba-cloud-region>
  domainName: <your-cdn-domain>
  cdnType: web
  sources:
    - type: oss
      content: <your-bucket-name>.oss-<bucket-region>.aliyuncs.com
  checkUrl: http://<your-bucket-name>.oss-<bucket-region>.aliyuncs.com/health.txt
