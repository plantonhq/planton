apiVersion: alicloud.openmcf.org/v1
kind: AliCloudCdnDomain
metadata:
  name: my-cdn-domain
spec:
  region: <alibaba-cloud-region>
  domainName: <your-cdn-domain>
  cdnType: web
  scope: domestic
  sources:
    - type: domain
      content: <your-origin-domain>
      port: 443
      priority: 20
  certificateConfig:
    certType: cas
    certId: <your-cas-certificate-id>
    certRegion: cn-hangzhou
    serverCertificateStatus: "on"
  tags:
    team: <your-team>
