syntax = "proto3";

package org.openmcf.provider.alicloud;

import "buf/validate/validate.proto";

// AuthenticationType selects which credential sub-message is active in AlicloudProviderConfig.
// Defined at package scope to avoid protobuf C++ scoping conflicts between enum values
// and message field names (both share the enclosing message scope when nested).
enum AuthenticationType {
  authentication_type_unspecified = 0;
  static_credentials = 1;
  sts_token = 2;
  ecs_role = 3;
  assume_role = 4;
  assume_role_with_oidc = 5;
  shared_credentials = 6;
  sidecar_credentials = 7;
}

// AlicloudProviderConfig defines the credentials and connection parameters required to interact
// with Alibaba Cloud infrastructure. This message supports seven authentication methods via
// an explicit AuthenticationType enum discriminator, with a separate sub-message per method.
//
// Consumers MUST check authentication_type to determine which sub-message to read.
// Only the sub-message corresponding to the active authentication_type is populated;
// the remaining sub-message fields should be ignored.
//
// Supported authentication methods:
//   1. static_credentials   -- Long-lived IAM access key pair.
//   2. sts_token            -- Temporary credentials from STS (access key + security token).
//   3. ecs_role             -- Credentials retrieved from ECS instance metadata service.
//   4. assume_role          -- RAM role assumption using base access key credentials.
//   5. assume_role_with_oidc -- RAM role assumption via OIDC federation (no access key needed).
//   6. shared_credentials   -- Credentials loaded from a shared credentials file / profile.
//   7. sidecar_credentials  -- Credentials fetched from a sidecar HTTP endpoint.
//
// Common fields (region, account_id, account_type) apply to all authentication methods
// and are emitted as environment variables regardless of which method is active.
//
// Environment variable convention: All fields use the modern ALIBABA_CLOUD_* prefix.
// Deprecated ALICLOUD_* names are intentionally omitted.
//
// For more information:
// - Terraform provider docs: https://registry.terraform.io/providers/aliyun/alicloud/latest/docs
// - Alibaba Cloud authentication: https://registry.terraform.io/providers/aliyun/alicloud/latest/docs#authentication
message AlicloudProviderConfig {
  // authentication_type selects the active credential sub-message.
  // Consumers switch on this value to determine which sub-message to read.
  AuthenticationType authentication_type = 1 [(buf.validate.field).required = true];

  // --- Common fields (apply to all authentication methods) ---

  // region is the Alibaba Cloud region for API requests.
  // Examples: "cn-hangzhou", "cn-beijing", "us-west-1", "eu-central-1"
  // If omitted, the Terraform provider defaults to "cn-beijing".
  // Environment variable: ALIBABA_CLOUD_REGION
  string region = 2;

  // account_id is the Alibaba Cloud account ID.
  // Used for cross-account operations and resource ownership.
  // If omitted, the provider auto-retrieves it from the authenticated identity.
  // Environment variable: ALIBABA_CLOUD_ACCOUNT_ID
  string account_id = 3;

  // account_type controls the account site type.
  // Valid values: "Domestic" (China site, default) or "International" (international site).
  // This affects which API endpoints and services are available.
  // Environment variable: ALIBABA_CLOUD_ACCOUNT_TYPE
  string account_type = 4;

  // --- Authentication method sub-messages (exactly one should be populated) ---

  // static_credentials is populated when authentication_type is static_credentials.
  AlicloudStaticCredentials static_credentials = 10;

  // sts_token is populated when authentication_type is sts_token.
  AlicloudStsTokenCredentials sts_token = 11;

  // ecs_role is populated when authentication_type is ecs_role.
  AlicloudEcsRoleCredentials ecs_role = 12;

  // assume_role is populated when authentication_type is assume_role.
  AlicloudAssumeRoleCredentials assume_role = 13;

  // assume_role_with_oidc is populated when authentication_type is assume_role_with_oidc.
  AlicloudAssumeRoleWithOidcCredentials assume_role_with_oidc = 14;

  // shared_credentials is populated when authentication_type is shared_credentials.
  AlicloudSharedCredentials shared_credentials = 15;

  // sidecar_credentials is populated when authentication_type is sidecar_credentials.
  AlicloudSidecarCredentials sidecar_credentials = 16;
}

// AlicloudStaticCredentials provides authentication via a long-lived IAM access key pair.
// This is the simplest and most common authentication method.
//
// Environment variable mapping:
//   access_key -> ALIBABA_CLOUD_ACCESS_KEY_ID
//   secret_key -> ALIBABA_CLOUD_ACCESS_KEY_SECRET
message AlicloudStaticCredentials {
  // access_key is the Alibaba Cloud access key ID.
  // Created in the RAM console under AccessKey Management.
  // Environment variable: ALIBABA_CLOUD_ACCESS_KEY_ID
  string access_key = 1 [(buf.validate.field).required = true];

  // secret_key is the Alibaba Cloud access key secret paired with the access key.
  // Must be kept confidential.
  // Environment variable: ALIBABA_CLOUD_ACCESS_KEY_SECRET
  string secret_key = 2 [(buf.validate.field).required = true];
}

// AlicloudStsTokenCredentials provides authentication via temporary STS credentials.
// STS credentials include an access key pair plus a short-lived security token,
// typically obtained from AssumeRole, federation, or other STS APIs.
//
// Environment variable mapping:
//   access_key     -> ALIBABA_CLOUD_ACCESS_KEY_ID
//   secret_key     -> ALIBABA_CLOUD_ACCESS_KEY_SECRET
//   security_token -> ALIBABA_CLOUD_SECURITY_TOKEN
message AlicloudStsTokenCredentials {
  // access_key is the temporary access key ID from STS.
  // Environment variable: ALIBABA_CLOUD_ACCESS_KEY_ID
  string access_key = 1 [(buf.validate.field).required = true];

  // secret_key is the temporary access key secret from STS.
  // Environment variable: ALIBABA_CLOUD_ACCESS_KEY_SECRET
  string secret_key = 2 [(buf.validate.field).required = true];

  // security_token is the STS security token that accompanies the temporary key pair.
  // Environment variable: ALIBABA_CLOUD_SECURITY_TOKEN
  string security_token = 3 [(buf.validate.field).required = true];
}

// AlicloudEcsRoleCredentials provides authentication via an ECS instance RAM role.
// When running on an ECS instance with an attached RAM role, the provider retrieves
// temporary credentials from the instance metadata service automatically.
//
// Environment variable mapping:
//   ecs_role_name -> ALIBABA_CLOUD_ECS_METADATA
message AlicloudEcsRoleCredentials {
  // ecs_role_name is the name of the RAM role attached to the ECS instance.
  // The provider fetches credentials from http://100.100.100.200/latest/meta-data/ram/security-credentials/<role_name>.
  // Environment variable: ALIBABA_CLOUD_ECS_METADATA
  string ecs_role_name = 1 [(buf.validate.field).required = true];
}

// AlicloudAssumeRoleCredentials provides authentication by assuming a RAM role.
// The provider first authenticates with the base access key pair, then calls STS
// AssumeRole to obtain temporary credentials scoped to the target role.
//
// Environment variable mapping:
//   access_key         -> ALIBABA_CLOUD_ACCESS_KEY_ID
//   secret_key         -> ALIBABA_CLOUD_ACCESS_KEY_SECRET
//   role_arn           -> ALIBABA_CLOUD_ROLE_ARN
//   session_name       -> ALIBABA_CLOUD_ROLE_SESSION_NAME
//   session_expiration -> ALICLOUD_ASSUME_ROLE_SESSION_EXPIRATION (deprecated naming, no modern equivalent)
//   policy             -> (no environment variable)
//   external_id        -> (no environment variable)
message AlicloudAssumeRoleCredentials {
  // access_key is the base access key ID used to call STS AssumeRole.
  // Environment variable: ALIBABA_CLOUD_ACCESS_KEY_ID
  string access_key = 1 [(buf.validate.field).required = true];

  // secret_key is the base access key secret.
  // Environment variable: ALIBABA_CLOUD_ACCESS_KEY_SECRET
  string secret_key = 2 [(buf.validate.field).required = true];

  // role_arn is the ARN of the RAM role to assume.
  // Format: acs:ram::<account_id>:role/<role_name>
  // Environment variable: ALIBABA_CLOUD_ROLE_ARN
  string role_arn = 3 [(buf.validate.field).required = true];

  // session_name identifies the assume-role session.
  // Defaults to "terraform" if omitted.
  // Environment variable: ALIBABA_CLOUD_ROLE_SESSION_NAME
  string session_name = 4;

  // policy is an optional RAM policy (JSON) that further restricts the assumed role's permissions.
  // No environment variable mapping; only configurable via provider config.
  string policy = 5;

  // session_expiration is the validity period of the STS token in seconds.
  // Valid range: 900-43200. Defaults to 3600 if omitted.
  // Environment variable: ALICLOUD_ASSUME_ROLE_SESSION_EXPIRATION (deprecated naming)
  int32 session_expiration = 6;

  // external_id is an optional external ID for RAM role assumption.
  // Used for cross-account access with third-party trust.
  // No environment variable mapping; only configurable via provider config.
  string external_id = 7;
}

// AlicloudAssumeRoleWithOidcCredentials provides authentication by assuming a RAM role
// via OIDC federation. This method does not require an access key pair -- the OIDC token
// from a trusted identity provider is exchanged for temporary RAM credentials.
//
// Environment variable mapping:
//   oidc_provider_arn -> ALIBABA_CLOUD_OIDC_PROVIDER_ARN
//   role_arn          -> ALIBABA_CLOUD_ROLE_ARN
//   oidc_token        -> ALIBABA_CLOUD_OIDC_TOKEN
//   oidc_token_file   -> ALIBABA_CLOUD_OIDC_TOKEN_FILE
//   session_name      -> ALIBABA_CLOUD_ROLE_SESSION_NAME
//   policy            -> (no environment variable)
//   session_expiration -> (no environment variable)
message AlicloudAssumeRoleWithOidcCredentials {
  // oidc_provider_arn is the ARN of the OIDC identity provider in RAM.
  // Format: acs:ram::<account_id>:oidc-provider/<provider_name>
  // Environment variable: ALIBABA_CLOUD_OIDC_PROVIDER_ARN
  string oidc_provider_arn = 1 [(buf.validate.field).required = true];

  // role_arn is the ARN of the RAM role to assume via OIDC.
  // Format: acs:ram::<account_id>:role/<role_name>
  // Environment variable: ALIBABA_CLOUD_ROLE_ARN
  string role_arn = 2 [(buf.validate.field).required = true];

  // oidc_token is the OIDC token value from the identity provider.
  // Provide either oidc_token or oidc_token_file, not both.
  // Environment variable: ALIBABA_CLOUD_OIDC_TOKEN
  string oidc_token = 3;

  // oidc_token_file is the path to a file containing the OIDC token.
  // Provide either oidc_token or oidc_token_file, not both.
  // Environment variable: ALIBABA_CLOUD_OIDC_TOKEN_FILE
  string oidc_token_file = 4;

  // session_name identifies the assume-role session.
  // Defaults to "terraform" if omitted.
  // Environment variable: ALIBABA_CLOUD_ROLE_SESSION_NAME
  string session_name = 5;

  // policy is an optional RAM policy (JSON) that further restricts the assumed role's permissions.
  // No environment variable mapping; only configurable via provider config.
  string policy = 6;

  // session_expiration is the validity period of the STS token in seconds.
  // Minimum: 900. Defaults to 3600 if omitted.
  // No environment variable mapping for OIDC; only configurable via provider config.
  int32 session_expiration = 7;
}

// AlicloudSharedCredentials provides authentication via a shared credentials file.
// The file (default: ~/.aliyun/config.json) can contain multiple named profiles,
// each with its own authentication method and credentials.
//
// Environment variable mapping:
//   credentials_file -> ALIBABA_CLOUD_CREDENTIALS_FILE
//   profile          -> ALIBABA_CLOUD_PROFILE
message AlicloudSharedCredentials {
  // credentials_file is the path to the shared credentials file.
  // Defaults to ~/.aliyun/config.json if omitted.
  // Environment variable: ALIBABA_CLOUD_CREDENTIALS_FILE
  string credentials_file = 1;

  // profile is the named profile to use from the credentials file.
  // If omitted, the default profile is used.
  // Environment variable: ALIBABA_CLOUD_PROFILE
  string profile = 2;
}

// AlicloudSidecarCredentials provides authentication via a sidecar credentials service.
// The provider fetches temporary credentials by calling the specified HTTP URI.
// This is useful in containerized environments where a sidecar manages credential rotation.
//
// Environment variable mapping:
//   credentials_uri -> ALIBABA_CLOUD_CREDENTIALS_URI
message AlicloudSidecarCredentials {
  // credentials_uri is the HTTP URI of the sidecar credentials service.
  // The provider makes a GET request to this URI and expects an STS credential response.
  // Environment variable: ALIBABA_CLOUD_CREDENTIALS_URI
  string credentials_uri = 1 [(buf.validate.field).required = true];
}
