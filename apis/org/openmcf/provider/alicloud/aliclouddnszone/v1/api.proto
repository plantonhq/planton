syntax = "proto3";

package org.openmcf.provider.alicloud.aliclouddnszone.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/alicloud/aliclouddnszone/v1/spec.proto";
import "org/openmcf/provider/alicloud/aliclouddnszone/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// alicloud-dns-zone
message AliCloudDnsZone {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'alicloud.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AliCloudDnsZone'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AliCloudDnsZoneSpec spec = 4 [(buf.validate.field).required = true];

  // status
  AliCloudDnsZoneStatus status = 5;
}

// alicloud-dns-zone status
message AliCloudDnsZoneStatus {
  // stack-outputs
  AliCloudDnsZoneStackOutputs outputs = 1;
}
