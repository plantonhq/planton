apiVersion: alicloud.openmcf.org/v1
kind: AlicloudPolardbCluster
metadata:
  name: <your-cluster-name>
  org: <your-organization>
  env: production
spec:
  region: <alibaba-cloud-region>
  dbType: PostgreSQL
  dbVersion: "14"
  dbNodeClass: polar.pg.x4.large
  vswitchId:
    valueFrom:
      name: <your-vswitch-resource>
  dbNodeCount: 3
  securityIps:
    - <your-vpc-cidr>
  maintainTime: "03:00Z-04:00Z"
  deletionLock: 1
  backupRetentionPolicyOnClusterDeletion: LATEST
  tags:
    team: <your-team>
  databases:
    - dbName: <your-database-name>
      characterSetName: UTF8
      collate: en_US.UTF-8
      ctype: en_US.UTF-8
  accounts:
    - accountName: <your-account-name>
      accountPassword: <your-password>
      privileges:
        - dbNames: [<your-database-name>]
          accountPrivilege: ReadWrite
