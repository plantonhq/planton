apiVersion: alicloud.openmcf.org/v1
kind: AlicloudPolardbCluster
metadata:
  name: <your-cluster-name>
  org: <your-organization>
  env: production
spec:
  region: <alibaba-cloud-region>
  dbType: MySQL
  dbVersion: "8.0"
  dbNodeClass: polar.mysql.x4.xlarge
  vswitchId:
    valueFrom:
      name: <your-vswitch-resource>
  dbNodeCount: 4
  creationCategory: Normal
  subCategory: Exclusive
  securityIps:
    - <your-vpc-cidr>
  maintainTime: "02:00Z-03:00Z"
  tdeStatus: Enabled
  encryptionKey: <your-kms-key-id>
  deletionLock: 1
  collectorStatus: Enable
  backupRetentionPolicyOnClusterDeletion: LATEST
  tags:
    team: <your-team>
    cost-center: <your-cost-center>
  databases:
    - dbName: <your-database-name>
      characterSetName: utf8mb4
  accounts:
    - accountName: <your-account-name>
      accountPassword: <your-password>
      privileges:
        - dbNames: [<your-database-name>]
          accountPrivilege: ReadWrite
