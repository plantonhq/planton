syntax = "proto3";

package org.openmcf.provider.alicloud.alicloudpolardbcluster.v1;

// AlicloudPolardbClusterStackOutputs captures the outputs from deploying an
// Alibaba Cloud PolarDB cluster with its databases and accounts.
message AlicloudPolardbClusterStackOutputs {
  // The PolarDB cluster ID assigned by Alibaba Cloud (e.g., "pc-xxxxx").
  string cluster_id = 1;

  // The primary endpoint connection string for the PolarDB cluster.
  // Applications connect to this endpoint for read-write operations.
  string connection_string = 2;

  // The database service port (e.g., "3306" for MySQL, "5432" for
  // PostgreSQL/Oracle).
  string port = 3;

  // Map of database names to their IDs within the PolarDB cluster.
  // Keys are the names specified in spec.databases[].db_name.
  map<string, string> database_ids = 4;
}
