syntax = "proto3";

package org.openmcf.provider.alicloud.alicloudpolardbcluster.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/alicloud/alicloudpolardbcluster/v1/spec.proto";
import "org/openmcf/provider/alicloud/alicloudpolardbcluster/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// alicloud-polardb-cluster
message AlicloudPolardbCluster {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'alicloud.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AlicloudPolardbCluster'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AlicloudPolardbClusterSpec spec = 4 [(buf.validate.field).required = true];

  // status
  AlicloudPolardbClusterStatus status = 5;
}

// alicloud-polardb-cluster status
message AlicloudPolardbClusterStatus {
  // stack-outputs
  AlicloudPolardbClusterStackOutputs outputs = 1;
}
