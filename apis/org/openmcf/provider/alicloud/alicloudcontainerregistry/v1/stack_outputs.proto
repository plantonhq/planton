syntax = "proto3";

package org.openmcf.provider.alicloud.alicloudcontainerregistry.v1;

// AliCloudContainerRegistryStackOutputs captures the outputs from deploying an
// Alibaba Cloud Container Registry (ACR) Enterprise Edition instance.
message AliCloudContainerRegistryStackOutputs {
  // The ACR Enterprise Edition instance ID.
  // Referenced by downstream resources that need to interact with this registry.
  string instance_id = 1;

  // The registry instance name as created.
  string instance_name = 2;

  // The internet-facing registry endpoint domain.
  // Used for docker login, push, and pull from outside VPC.
  // Example: "myregistry-registry.cn-hangzhou.cr.aliyuncs.com"
  string public_endpoint = 3;

  // The VPC-internal registry endpoint domain.
  // Used for pulling images from within the same VPC (e.g., from ACK nodes)
  // for faster transfer and no internet egress cost.
  string vpc_endpoint = 4;

  // Map of created namespace names to their IDs.
  map<string, string> namespace_ids = 5;
}
