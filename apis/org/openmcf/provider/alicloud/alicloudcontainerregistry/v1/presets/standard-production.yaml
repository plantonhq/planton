apiVersion: alicloud.openmcf.org/v1
kind: AlicloudContainerRegistry
metadata:
  name: prod-registry
spec:
  region: cn-shanghai
  instanceName: prod-acr
  instanceType: Standard
  paymentType: Subscription
  period: 12
  namespaces:
    - name: platform
      autoCreate: true
      defaultVisibility: PRIVATE
    - name: backend
      autoCreate: true
      defaultVisibility: PRIVATE
    - name: frontend
      autoCreate: false
      defaultVisibility: PRIVATE
