apiVersion: ali-cloud.openmcf.org/v1
kind: AliCloudVpnGateway
metadata:
  name: alicloudvpngateway-demo
spec:
  region: cn-hangzhou
  vpcId:
    value: vpc-demo123
  vswitchId:
    value: vsw-demo123
  vpnGatewayName: demo-vpn
  description: Demo VPN Gateway for local testing
  bandwidth: 10
  connections:
    - name: demo-site
      customerGatewayIp: "203.0.113.1"
      localSubnets:
        - "10.0.0.0/8"
      remoteSubnets:
        - "192.168.0.0/16"
