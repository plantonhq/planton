syntax = "proto3";

package org.openmcf.provider.alicloud.alicloudvpngateway.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/alicloud/alicloudvpngateway/v1/spec.proto";
import "org/openmcf/provider/alicloud/alicloudvpngateway/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// alicloud-vpn-gateway
message AlicloudVpnGateway {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'alicloud.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AlicloudVpnGateway'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AlicloudVpnGatewaySpec spec = 4 [(buf.validate.field).required = true];

  // status
  AlicloudVpnGatewayStatus status = 5;
}

// alicloud-vpn-gateway status
message AlicloudVpnGatewayStatus {
  // stack-outputs
  AlicloudVpnGatewayStackOutputs outputs = 1;
}
