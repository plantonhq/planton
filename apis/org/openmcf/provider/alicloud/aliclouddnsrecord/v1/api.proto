syntax = "proto3";

package org.openmcf.provider.alicloud.aliclouddnsrecord.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/alicloud/aliclouddnsrecord/v1/spec.proto";
import "org/openmcf/provider/alicloud/aliclouddnsrecord/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// alicloud-dns-record
message AliCloudDnsRecord {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'ali-cloud.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AliCloudDnsRecord'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AliCloudDnsRecordSpec spec = 4 [(buf.validate.field).required = true];

  // status
  AliCloudDnsRecordStatus status = 5;
}

// alicloud-dns-record status
message AliCloudDnsRecordStatus {
  // stack-outputs
  AliCloudDnsRecordStackOutputs outputs = 1;
}
