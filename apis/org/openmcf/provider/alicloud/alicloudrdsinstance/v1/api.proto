syntax = "proto3";

package org.openmcf.provider.alicloud.alicloudrdsinstance.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/alicloud/alicloudrdsinstance/v1/spec.proto";
import "org/openmcf/provider/alicloud/alicloudrdsinstance/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// alicloud-rds-instance
message AlicloudRdsInstance {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'alicloud.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AlicloudRdsInstance'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AlicloudRdsInstanceSpec spec = 4 [(buf.validate.field).required = true];

  // status
  AlicloudRdsInstanceStatus status = 5;
}

// alicloud-rds-instance status
message AlicloudRdsInstanceStatus {
  // stack-outputs
  AlicloudRdsInstanceStackOutputs outputs = 1;
}
