syntax = "proto3";

package org.openmcf.provider.alicloud.alicloudvpc.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/alicloud/alicloudvpc/v1/spec.proto";
import "org/openmcf/provider/alicloud/alicloudvpc/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// alicloud-vpc
message AlicloudVpc {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'alicloud.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AlicloudVpc'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AlicloudVpcSpec spec = 4 [(buf.validate.field).required = true];

  // status
  AlicloudVpcStatus status = 5;
}

// alicloud-vpc status
message AlicloudVpcStatus {
  // stack-outputs
  AlicloudVpcStackOutputs outputs = 1;
}
