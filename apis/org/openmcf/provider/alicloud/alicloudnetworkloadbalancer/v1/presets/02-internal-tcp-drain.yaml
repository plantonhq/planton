apiVersion: alicloud.openmcf.org/v1
kind: AlicloudNetworkLoadBalancer
metadata:
  name: <your-nlb-name>
  org: <your-org>
  env: <your-env>
spec:
  region: <alibaba-cloud-region>
  vpcId:
    valueFrom:
      name: <your-vpc-resource-name>
  addressType: Intranet
  zoneMappings:
    - zoneId: <zone-a>
      vswitchId:
        valueFrom:
          name: <your-vswitch-resource-a>
    - zoneId: <zone-b>
      vswitchId:
        valueFrom:
          name: <your-vswitch-resource-b>
  tags:
    team: <your-team>
  serverGroups:
    - name: service-backend
      scheduler: Sch
      connectionDrainEnabled: true
      connectionDrainTimeout: 60
      preserveClientIpEnabled: true
      healthCheck:
        healthCheckEnabled: true
        healthCheckType: TCP
        healthCheckInterval: 5
        healthyThreshold: 2
        unhealthyThreshold: 2
  listeners:
    - listenerPort: 8080
      listenerProtocol: TCP
      serverGroupName: service-backend
      idleTimeout: 600
      proxyProtocolEnabled: true
      listenerDescription: Internal TCP with connection draining
