syntax = "proto3";

package org.openmcf.provider.alicloud.alicloudnetworkloadbalancer.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/alicloud/alicloudnetworkloadbalancer/v1/spec.proto";
import "org/openmcf/provider/alicloud/alicloudnetworkloadbalancer/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// alicloud-network-load-balancer
message AlicloudNetworkLoadBalancer {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'alicloud.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AlicloudNetworkLoadBalancer'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AlicloudNetworkLoadBalancerSpec spec = 4 [(buf.validate.field).required = true];

  // status
  AlicloudNetworkLoadBalancerStatus status = 5;
}

// alicloud-network-load-balancer status
message AlicloudNetworkLoadBalancerStatus {
  // stack-outputs
  AlicloudNetworkLoadBalancerStackOutputs outputs = 1;
}
