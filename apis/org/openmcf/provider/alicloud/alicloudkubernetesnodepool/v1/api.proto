syntax = "proto3";

package org.openmcf.provider.alicloud.alicloudkubernetesnodepool.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/alicloud/alicloudkubernetesnodepool/v1/spec.proto";
import "org/openmcf/provider/alicloud/alicloudkubernetesnodepool/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// alicloud-kubernetes-node-pool
message AlicloudKubernetesNodePool {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'alicloud.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AlicloudKubernetesNodePool'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AlicloudKubernetesNodePoolSpec spec = 4 [(buf.validate.field).required = true];

  // status
  AlicloudKubernetesNodePoolStatus status = 5;
}

// alicloud-kubernetes-node-pool status
message AlicloudKubernetesNodePoolStatus {
  // stack-outputs
  AlicloudKubernetesNodePoolStackOutputs outputs = 1;
}
