syntax = "proto3";

package org.openmcf.provider.alicloud.alicloudkmskey.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/alicloud/alicloudkmskey/v1/spec.proto";
import "org/openmcf/provider/alicloud/alicloudkmskey/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// alicloud-kms-key
message AlicloudKmsKey {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'alicloud.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AlicloudKmsKey'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AlicloudKmsKeySpec spec = 4 [(buf.validate.field).required = true];

  // status
  AlicloudKmsKeyStatus status = 5;
}

// alicloud-kms-key status
message AlicloudKmsKeyStatus {
  // stack-outputs
  AlicloudKmsKeyStackOutputs outputs = 1;
}
