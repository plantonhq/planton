syntax = "proto3";

package org.openmcf.provider.alicloud.alicloudprivatezone.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/alicloud/alicloudprivatezone/v1/spec.proto";
import "org/openmcf/provider/alicloud/alicloudprivatezone/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// alicloud-private-zone
message AlicloudPrivateZone {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'alicloud.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AlicloudPrivateZone'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AlicloudPrivateZoneSpec spec = 4 [(buf.validate.field).required = true];

  // status
  AlicloudPrivateZoneStatus status = 5;
}

// alicloud-private-zone status
message AlicloudPrivateZoneStatus {
  // stack-outputs
  AlicloudPrivateZoneStackOutputs outputs = 1;
}
