syntax = "proto3";

package org.openmcf.provider.alicloud.alicloudnatgateway.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/alicloud/alicloudnatgateway/v1/spec.proto";
import "org/openmcf/provider/alicloud/alicloudnatgateway/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// alicloud-nat-gateway
message AlicloudNatGateway {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'alicloud.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AlicloudNatGateway'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AlicloudNatGatewaySpec spec = 4 [(buf.validate.field).required = true];

  // status
  AlicloudNatGatewayStatus status = 5;
}

// alicloud-nat-gateway status
message AlicloudNatGatewayStatus {
  // stack-outputs
  AlicloudNatGatewayStackOutputs outputs = 1;
}
