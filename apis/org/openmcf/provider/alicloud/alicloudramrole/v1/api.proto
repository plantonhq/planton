syntax = "proto3";

package org.openmcf.provider.alicloud.alicloudramrole.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/alicloud/alicloudramrole/v1/spec.proto";
import "org/openmcf/provider/alicloud/alicloudramrole/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// alicloud-ram-role
message AlicloudRamRole {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'alicloud.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AlicloudRamRole'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AlicloudRamRoleSpec spec = 4 [(buf.validate.field).required = true];

  // status
  AlicloudRamRoleStatus status = 5;
}

// alicloud-ram-role status
message AlicloudRamRoleStatus {
  // stack-outputs
  AlicloudRamRoleStackOutputs outputs = 1;
}
