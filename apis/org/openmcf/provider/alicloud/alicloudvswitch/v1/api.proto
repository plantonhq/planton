syntax = "proto3";

package org.openmcf.provider.alicloud.alicloudvswitch.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/alicloud/alicloudvswitch/v1/spec.proto";
import "org/openmcf/provider/alicloud/alicloudvswitch/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// alicloud-vswitch
message AliCloudVswitch {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'alicloud.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AliCloudVswitch'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AliCloudVswitchSpec spec = 4 [(buf.validate.field).required = true];

  // status
  AliCloudVswitchStatus status = 5;
}

// alicloud-vswitch status
message AliCloudVswitchStatus {
  // stack-outputs
  AliCloudVswitchStackOutputs outputs = 1;
}
