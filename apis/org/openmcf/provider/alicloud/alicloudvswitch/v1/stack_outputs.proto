syntax = "proto3";

package org.openmcf.provider.alicloud.alicloudvswitch.v1;

// AliCloudVswitchStackOutputs captures the outputs from deploying an
// Alibaba Cloud VSwitch.
message AliCloudVswitchStackOutputs {
  // The VSwitch ID assigned by Alibaba Cloud.
  // Referenced by downstream components (NatGateway, EcsInstance, AckManagedCluster,
  // RdsInstance, PolardbCluster, RedisInstance, etc.) via StringValueOrRef.
  string vswitch_id = 1;

  // The VSwitch name as created.
  string vswitch_name = 2;

  // The IPv4 CIDR block of the VSwitch.
  // Useful for security group rules and network planning.
  string cidr_block = 3;

  // The availability zone in which the VSwitch resides.
  string zone_id = 4;

  // The IPv6 CIDR block allocated to the VSwitch.
  // Only populated when IPv6 is enabled on both the parent VPC and this VSwitch.
  string ipv6_cidr_block = 5;
}
