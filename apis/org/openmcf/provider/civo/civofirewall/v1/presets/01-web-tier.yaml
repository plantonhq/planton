apiVersion: civo.openmcf.org/v1
kind: CivoFirewall
metadata:
  name: my-web-firewall
spec:
  name: my-web-firewall
  networkId:
    value: "<vpc-network-id>"
  inboundRules:
    - protocol: tcp
      portRange: "80"
      cidrs:
        - 0.0.0.0/0
      action: allow
      label: HTTP
    - protocol: tcp
      portRange: "443"
      cidrs:
        - 0.0.0.0/0
      action: allow
      label: HTTPS
    - protocol: tcp
      portRange: "22"
      cidrs:
        - "<your-admin-cidr>/32"
      action: allow
      label: SSH admin
  tags:
    - web
