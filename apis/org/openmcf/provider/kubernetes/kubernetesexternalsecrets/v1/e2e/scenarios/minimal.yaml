apiVersion: kubernetes.openmcf.org/v1
kind: KubernetesExternalSecrets
metadata:
  name: e2e-eso
spec:
  namespace:
    value: external-secrets
  create_namespace: true
  container:
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "250m"
        memory: "256Mi"
