syntax = "proto3";

package org.openmcf.provider.kubernetes.kubernetestelemetry.v1;

import "org/openmcf/provider/kubernetes/kubernetestelemetry/v1/api.proto";
import "org/openmcf/provider/kubernetes/provider.proto";

// KubernetesTelemetryStackInput provides the inputs for creating the Telemetry
// resource on a Kubernetes cluster.
message KubernetesTelemetryStackInput {
  // target cloud-resource
  KubernetesTelemetry target = 1;
  // provider-config
  org.openmcf.provider.kubernetes.KubernetesProviderConfig provider_config = 2;
}
