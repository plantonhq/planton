apiVersion: kubernetes.openmcf.org/v1
kind: KubernetesTelemetry
metadata:
  name: e2e-telemetry
spec:
  namespace:
    value: default
  selector:
    match_labels:
      app: reviews
  tracing:
    - match:
        mode: CLIENT_AND_SERVER
      random_sampling_percentage: 10
      custom_tags:
        my_literal_tag:
          literal:
            value: foo
        my_env_tag:
          environment:
            name: POD_NAME
            default_value: unknown
  metrics:
    - providers:
        - name: prometheus
      overrides:
        - match:
            metric: REQUEST_COUNT
            mode: SERVER
          tag_overrides:
            request_method:
              operation: UPSERT
              value: request.method
            response_code:
              operation: REMOVE
  access_logging:
    - providers:
        - name: envoy
      filter:
        expression: "response.code >= 400"
