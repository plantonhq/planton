syntax = "proto3";

package org.openmcf.provider.kubernetes.kubernetestelemetry.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/kubernetes/kubernetestelemetry/v1/spec.proto";
import "org/openmcf/provider/kubernetes/kubernetestelemetry/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// KubernetesTelemetry is an Istio Telemetry resource: a namespaced configuration of
// how traces, metrics, and access logs are generated for the workloads it selects.
message KubernetesTelemetry {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'kubernetes.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'KubernetesTelemetry'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  KubernetesTelemetrySpec spec = 4 [(buf.validate.field).required = true];

  // status
  KubernetesTelemetryStatus status = 5;
}

// KubernetesTelemetryStatus holds the deployment status and outputs.
message KubernetesTelemetryStatus {
  // stack-outputs
  KubernetesTelemetryStackOutputs outputs = 1;
}
