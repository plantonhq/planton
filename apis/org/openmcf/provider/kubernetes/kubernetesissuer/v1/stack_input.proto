syntax = "proto3";

package org.openmcf.provider.kubernetes.kubernetesissuer.v1;

import "org/openmcf/provider/kubernetes/kubernetesissuer/v1/api.proto";
import "org/openmcf/provider/kubernetes/provider.proto";

// Input for the KubernetesIssuer IaC stack.
message KubernetesIssuerStackInput {
  // Target cloud-resource.
  KubernetesIssuer target = 1;
  // Kubernetes provider configuration (cluster credentials).
  org.openmcf.provider.kubernetes.KubernetesProviderConfig provider_config = 2;
}
