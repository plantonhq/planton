syntax = "proto3";

package org.openmcf.provider.kubernetes.kubernetesissuer.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/kubernetes/kubernetesissuer/v1/spec.proto";
import "org/openmcf/provider/kubernetes/kubernetesissuer/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// KubernetesIssuer is a namespace-scoped cert-manager Issuer for CA or self-signed certificate signing.
message KubernetesIssuer {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'kubernetes.openmcf.org/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'KubernetesIssuer'];

  //metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  KubernetesIssuerSpec spec = 4 [(buf.validate.field).required = true];

  //status
  KubernetesIssuerStatus status = 5;
}

// KubernetesIssuerStatus holds the deployment status and outputs.
message KubernetesIssuerStatus {
  //stack-outputs
  KubernetesIssuerStackOutputs outputs = 1;
}
