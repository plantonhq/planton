syntax = "proto3";

package org.openmcf.provider.kubernetes.kubernetesenvoyfilter.v1;

import "org/openmcf/provider/kubernetes/kubernetesenvoyfilter/v1/api.proto";
import "org/openmcf/provider/kubernetes/provider.proto";

// KubernetesEnvoyFilterStackInput provides the inputs for creating the EnvoyFilter on a
// Kubernetes cluster.
message KubernetesEnvoyFilterStackInput {
  // target cloud-resource
  KubernetesEnvoyFilter target = 1;
  // provider-config
  org.openmcf.provider.kubernetes.KubernetesProviderConfig provider_config = 2;
}
