syntax = "proto3";

package org.openmcf.provider.kubernetes.kubernetesenvoyfilter.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/kubernetes/kubernetesenvoyfilter/v1/spec.proto";
import "org/openmcf/provider/kubernetes/kubernetesenvoyfilter/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// KubernetesEnvoyFilter is an Istio EnvoyFilter: a namespaced, expert-only escape hatch that
// applies low-level patches to the Envoy proxy configuration istiod generates for selected
// workloads.
message KubernetesEnvoyFilter {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'kubernetes.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'KubernetesEnvoyFilter'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  KubernetesEnvoyFilterSpec spec = 4 [(buf.validate.field).required = true];

  // status
  KubernetesEnvoyFilterStatus status = 5;
}

// KubernetesEnvoyFilterStatus holds the deployment status and outputs.
message KubernetesEnvoyFilterStatus {
  // stack-outputs
  KubernetesEnvoyFilterStackOutputs outputs = 1;
}
