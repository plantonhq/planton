syntax = "proto3";

package org.openmcf.provider.kubernetes.kubernetesgateway.v1;

import "org/openmcf/provider/kubernetes/kubernetesgateway/v1/api.proto";
import "org/openmcf/provider/kubernetes/provider.proto";

// Input for the KubernetesGateway IaC stack. The platform resolves all
// StringValueOrRef references (namespace, gateway_class_name) to literal
// strings before passing this to the IaC engine.
message KubernetesGatewayStackInput {
  // Target cloud-resource.
  KubernetesGateway target = 1;
  // Kubernetes provider configuration (cluster credentials).
  org.openmcf.provider.kubernetes.KubernetesProviderConfig provider_config = 2;
}
