syntax = "proto3";

package org.openmcf.provider.kubernetes.kubernetesgateway.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/kubernetes/kubernetesgateway/v1/spec.proto";
import "org/openmcf/provider/kubernetes/kubernetesgateway/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// KubernetesGateway is a Kubernetes Gateway API Gateway: a namespaced instance
// of traffic-handling infrastructure that binds Listeners to addresses,
// programmed by the controller behind its GatewayClass.
message KubernetesGateway {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'kubernetes.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'KubernetesGateway'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  KubernetesGatewaySpec spec = 4 [(buf.validate.field).required = true];

  // status
  KubernetesGatewayStatus status = 5;
}

// KubernetesGatewayStatus holds the deployment status and outputs.
message KubernetesGatewayStatus {
  // stack-outputs
  KubernetesGatewayStackOutputs outputs = 1;
}
