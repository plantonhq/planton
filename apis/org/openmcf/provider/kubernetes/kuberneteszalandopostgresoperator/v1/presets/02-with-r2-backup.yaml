apiVersion: kubernetes.openmcf.org/v1
kind: KubernetesZalandoPostgresOperator
metadata:
  name: my-zalando-postgres-operator
spec:
  namespace:
    value: zalando-postgres-system
  createNamespace: true
  container:
    resources:
      requests:
        cpu: 50m
        memory: 100Mi
      limits:
        cpu: 1000m
        memory: 1Gi
  backupConfig:
    # Bucket holding backups for every database on the cluster. A literal name, or a
    # reference to any S3-compatible bucket resource's output, e.g.:
    #   bucket:
    #     valueFrom:
    #       kind: CloudflareR2Bucket
    #       name: my-r2-backup-bucket
    #       fieldPath: status.outputs.bucket_name
    bucket:
      value: "<your-r2-backup-bucket>"
    # Base path under the bucket; the module appends the per-cluster/per-version suffix.
    objectPrefix: backups
    schedule: "0 2 * * *"  # daily at 2:00 AM UTC
    enableWalGBackup: true
    enableWalGRestore: true
    enableCloneWalGRestore: true
    credentials:
      cloudflareAccountId: "<your-cloudflare-account-id>"
      accessKeyId: "<your-r2-access-key-id>"
      secretAccessKey: "<your-r2-secret-access-key>"
