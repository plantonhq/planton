apiVersion: kubernetes.openmcf.org/v1
kind: KubernetesGrpcRoute
metadata:
  name: my-grpc-canary-route
spec:
  namespace:
    value: app-ns
  parentRefs:
    - name: <gateway-name>
  hostnames:
    - <api-hostname>
  rules:
    - matches:
        - method:
            service: <grpc-service>
      backendRefs:
        - name: <stable-service-name>
          port: 9000
          weight: 90
        - name: <canary-service-name>
          port: 9000
          weight: 10
