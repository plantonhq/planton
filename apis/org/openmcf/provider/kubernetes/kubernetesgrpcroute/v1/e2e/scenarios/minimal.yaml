apiVersion: kubernetes.openmcf.org/v1
kind: KubernetesGrpcRoute
metadata:
  name: e2e-grpc-route
spec:
  namespace:
    value: default
  parent_refs:
    - name: e2e-gateway
  hostnames:
    - api.example.com
  rules:
    - matches:
        - method:
            service: helloworld.Greeter
      backend_refs:
        - name: greeter
          port: 9000
