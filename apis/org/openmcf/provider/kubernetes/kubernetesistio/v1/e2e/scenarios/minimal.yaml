apiVersion: kubernetes.openmcf.org/v1
kind: KubernetesIstio
metadata:
  name: e2e-istio
spec:
  namespace:
    value: istio-system
  create_namespace: true
  container:
    resources:
      requests:
        cpu: "50m"
        memory: "100Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
