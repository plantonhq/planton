syntax = "proto3";

package org.openmcf.provider.kubernetes.kubernetesrequestauthentication.v1;

import "org/openmcf/provider/kubernetes/kubernetesrequestauthentication/v1/api.proto";
import "org/openmcf/provider/kubernetes/provider.proto";

// KubernetesRequestAuthenticationStackInput provides the inputs for creating the
// RequestAuthentication on a Kubernetes cluster.
message KubernetesRequestAuthenticationStackInput {
  // target cloud-resource
  KubernetesRequestAuthentication target = 1;
  // provider-config
  org.openmcf.provider.kubernetes.KubernetesProviderConfig provider_config = 2;
}
