syntax = "proto3";

package org.openmcf.provider.kubernetes.kubernetesrequestauthentication.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/kubernetes/kubernetesrequestauthentication/v1/spec.proto";
import "org/openmcf/provider/kubernetes/kubernetesrequestauthentication/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// KubernetesRequestAuthentication is an Istio RequestAuthentication: a namespaced
// policy that defines which JSON Web Tokens (JWTs) are accepted on the workloads it
// selects.
message KubernetesRequestAuthentication {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'kubernetes.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'KubernetesRequestAuthentication'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  KubernetesRequestAuthenticationSpec spec = 4 [(buf.validate.field).required = true];

  // status
  KubernetesRequestAuthenticationStatus status = 5;
}

// KubernetesRequestAuthenticationStatus holds the deployment status and outputs.
message KubernetesRequestAuthenticationStatus {
  // stack-outputs
  KubernetesRequestAuthenticationStackOutputs outputs = 1;
}
