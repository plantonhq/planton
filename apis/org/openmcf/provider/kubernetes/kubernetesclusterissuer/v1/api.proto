syntax = "proto3";

package org.openmcf.provider.kubernetes.kubernetesclusterissuer.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/kubernetes/kubernetesclusterissuer/v1/spec.proto";
import "org/openmcf/provider/kubernetes/kubernetesclusterissuer/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// KubernetesClusterIssuer is a cert-manager ClusterIssuer for a single DNS domain.
message KubernetesClusterIssuer {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'kubernetes.openmcf.org/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'KubernetesClusterIssuer'];

  //metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  KubernetesClusterIssuerSpec spec = 4 [(buf.validate.field).required = true];

  //status
  KubernetesClusterIssuerStatus status = 5;
}

// KubernetesClusterIssuerStatus holds the deployment status and outputs.
message KubernetesClusterIssuerStatus {
  //stack-outputs
  KubernetesClusterIssuerStackOutputs outputs = 1;
}
