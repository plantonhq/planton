syntax = "proto3";

package org.openmcf.provider.kubernetes.kubernetesclusterissuer.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/kubernetes/target_cluster.proto";
import "org/openmcf/shared/foreignkey/v1/foreign_key.proto";
import "org/openmcf/shared/options/options.proto";

// KubernetesClusterIssuerSpec defines configuration for a single cert-manager
// ClusterIssuer on any Kubernetes cluster. Each instance creates one ClusterIssuer
// for one DNS domain using ACME DNS-01 challenges.
//
// The ClusterIssuer Kubernetes resource is named after the dns_domain field
// (e.g., "example.com"), matching the convention used by all OpenMCF ingress
// components to derive issuer names from hostnames.
message KubernetesClusterIssuerSpec {
  // Target Kubernetes Cluster where cert-manager is installed.
  org.openmcf.provider.kubernetes.KubernetesClusterSelector target_cluster = 1;

  // Namespace where cert-manager is installed.
  // Required for creating credential Secrets (Cloudflare API tokens) and
  // where cert-manager places ACME account key Secrets.
  org.openmcf.shared.foreignkey.v1.StringValueOrRef cert_manager_namespace = 2 [
    (buf.validate.field).required = true,
    (org.openmcf.shared.foreignkey.v1.default_kind) = KubernetesCertManager,
    (org.openmcf.shared.foreignkey.v1.default_kind_field_path) = "status.outputs.namespace"
  ];

  // DNS domain this issuer manages (e.g., "example.com").
  // Becomes the ClusterIssuer's Kubernetes resource name.
  string dns_domain = 3 [(buf.validate.field).required = true];

  // ACME configuration for certificate issuance.
  ClusterIssuerAcmeConfig acme = 4 [(buf.validate.field).required = true];

  // DNS-01 solver provider configuration. Exactly one must be set.
  oneof provider {
    // Cloudflare DNS provider. Creates a Secret with the API token
    // in the cert-manager namespace.
    CloudflareDnsSolver cloudflare = 100;
    // Google Cloud DNS provider. Requires GKE Workload Identity
    // configured on the cert-manager ServiceAccount (via KubernetesCertManager).
    GcpCloudDnsSolver gcp_cloud_dns = 101;
    // AWS Route53 provider. Requires EKS IRSA configured on the
    // cert-manager ServiceAccount (via KubernetesCertManager).
    AwsRoute53Solver aws_route53 = 102;
    // Azure DNS provider. Requires AKS Workload Identity configured
    // on the cert-manager ServiceAccount (via KubernetesCertManager).
    AzureDnsSolver azure_dns = 103;
  }
}

// ClusterIssuerAcmeConfig defines ACME (Automatic Certificate Management
// Environment) settings for certificate issuance from a CA like Let's Encrypt.
message ClusterIssuerAcmeConfig {
  // ACME account email for registration and certificate expiry notifications.
  string email = 1 [(buf.validate.field).required = true];

  // ACME server URL. Defaults to Let's Encrypt production.
  // Use https://acme-staging-v02.api.letsencrypt.org/directory for testing.
  optional string server = 2 [(org.openmcf.shared.options.default) = "https://acme-v02.api.letsencrypt.org/directory"];
}

// CloudflareDnsSolver configures Cloudflare for DNS-01 ACME challenges.
// A Kubernetes Secret containing the API token will be created in the
// cert-manager namespace.
message CloudflareDnsSolver {
  // Cloudflare API token with Zone:Zone:Read and Zone:DNS:Edit permissions.
  // Scope the token to the specific zone for security best practices.
  string api_token = 1 [
    (buf.validate.field).required = true,
    (org.openmcf.shared.options.sensitive) = true
  ];
}

// GcpCloudDnsSolver configures Google Cloud DNS for DNS-01 ACME challenges.
// Authentication uses Workload Identity on the cert-manager ServiceAccount.
message GcpCloudDnsSolver {
  // GCP project ID that contains the Cloud DNS zone.
  string project_id = 1 [(buf.validate.field).required = true];
}

// AwsRoute53Solver configures AWS Route53 for DNS-01 ACME challenges.
// Authentication uses IAM Roles for Service Accounts (IRSA) on the
// cert-manager ServiceAccount.
message AwsRoute53Solver {
  // AWS region where Route53 is configured.
  string region = 1 [(buf.validate.field).required = true];
}

// AzureDnsSolver configures Azure DNS for DNS-01 ACME challenges.
// Authentication uses Managed Identity on the cert-manager ServiceAccount.
message AzureDnsSolver {
  // Azure subscription ID containing the DNS zone.
  string subscription_id = 1 [(buf.validate.field).required = true];
  // Azure resource group containing the DNS zone.
  string resource_group = 2 [(buf.validate.field).required = true];
}
