apiVersion: kubernetes.openmcf.org/v1
kind: KubernetesDestinationRule
metadata:
  name: e2e-destination-rule
spec:
  namespace:
    value: default
  host: reviews.default.svc.cluster.local
  traffic_policy:
    load_balancer:
      simple: LEAST_REQUEST
    connection_pool:
      tcp:
        max_connections: 100
    outlier_detection:
      consecutive_5xx_errors: 7
      interval: 5m
      base_ejection_time: 15m
