syntax = "proto3";

package org.openmcf.provider.kubernetes.kubernetesdestinationrule.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/kubernetes/kubernetesdestinationrule/v1/spec.proto";
import "org/openmcf/provider/kubernetes/kubernetesdestinationrule/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// KubernetesDestinationRule is an Istio DestinationRule: a namespaced resource configuring
// load balancing, connection pools, circuit breaking, and client TLS for traffic to a
// service after routing has occurred, plus optional named subsets.
message KubernetesDestinationRule {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'kubernetes.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'KubernetesDestinationRule'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  KubernetesDestinationRuleSpec spec = 4 [(buf.validate.field).required = true];

  // status
  KubernetesDestinationRuleStatus status = 5;
}

// KubernetesDestinationRuleStatus holds the deployment status and outputs.
message KubernetesDestinationRuleStatus {
  // stack-outputs
  KubernetesDestinationRuleStackOutputs outputs = 1;
}
