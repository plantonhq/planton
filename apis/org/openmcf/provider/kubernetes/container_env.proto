syntax = "proto3";

package org.openmcf.provider.kubernetes;

import "buf/validate/validate.proto";
import "org/openmcf/provider/kubernetes/kubernetes_secret.proto";
import "org/openmcf/shared/foreignkey/v1/foreign_key.proto";

/**
 * **EnvVar** represents a single environment variable for a container.
 *
 * Supports all Kubernetes-native value sources plus OpenMCF cross-resource references.
 * Exactly one source must be set for each entry.
 *
 * Example (YAML):
 * ```yaml
 * variables:
 *   - name: DATABASE_HOST
 *     value: "db.example.com"
 *   - name: DATABASE_PORT
 *     valueFrom:
 *       kind: PostgresCluster
 *       name: my-postgres
 *       fieldPath: "status.outputs.port"
 *   - name: APP_SETTING
 *     configMapKeyRef:
 *       name: app-config
 *       key: setting-key
 *   - name: POD_NAME
 *     fieldRef:
 *       fieldPath: "metadata.name"
 *   - name: CPU_LIMIT
 *     resourceFieldRef:
 *       resource: "limits.cpu"
 * ```
 */
message EnvVar {
  // The environment variable name.
  // Must be a valid C_IDENTIFIER: starts with a letter or underscore,
  // followed by letters, digits, or underscores.
  string name = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).cel = {
      id: "env.var.name.format"
      message: "Must be a valid C_IDENTIFIER (start with letter/underscore, contain only letters, digits, underscores)"
      expression: "this.matches('^[A-Za-z_][A-Za-z0-9_]*$')"
    }
  ];

  oneof source {
    // Direct literal value.
    string value = 2;

    // Reference to another OpenMCF resource's field.
    // The orchestrator resolves this and populates the value before invoking IaC modules.
    org.openmcf.shared.foreignkey.v1.ValueFromRef value_from = 3;

    // Reference to a key in a Kubernetes ConfigMap.
    ConfigMapKeyRef config_map_key_ref = 4;

    // Reference to a pod-level field (metadata.name, status.podIP, etc.).
    ObjectFieldRef field_ref = 5;

    // Reference to container resource limits or requests (limits.cpu, requests.memory, etc.).
    ResourceFieldRef resource_field_ref = 6;
  }
}

/**
 * **SecretEnvVar** represents a single secret environment variable for a container.
 *
 * The value is either provided as a literal (which triggers automatic creation of a
 * Kubernetes Secret), referenced from an existing Kubernetes Secret, or resolved
 * from another OpenMCF resource's output.
 *
 * Example (YAML):
 * ```yaml
 * secrets:
 *   - name: DATABASE_PASSWORD
 *     value: "my-password"
 *   - name: API_KEY
 *     secretRef:
 *       name: my-secrets
 *       key: api-key
 *   - name: CONNECTION_STRING
 *     valueFrom:
 *       kind: PostgresCluster
 *       name: my-postgres
 *       fieldPath: "status.outputs.connection_string"
 * ```
 */
message SecretEnvVar {
  // The environment variable name.
  string name = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).cel = {
      id: "env.secret.name.format"
      message: "Must be a valid C_IDENTIFIER (start with letter/underscore, contain only letters, digits, underscores)"
      expression: "this.matches('^[A-Za-z_][A-Za-z0-9_]*$')"
    }
  ];

  oneof source {
    // Literal string value.
    // A Kubernetes Secret is automatically created and the environment variable
    // references that secret.
    string value = 2;

    // Reference to a key within an existing Kubernetes Secret.
    KubernetesSecretKeyRef secret_ref = 3;

    // Reference to another OpenMCF resource's secret output field.
    // The orchestrator resolves this before invoking IaC modules.
    org.openmcf.shared.foreignkey.v1.ValueFromRef value_from = 4;
  }
}

/**
 * **EnvFromSource** imports all keys from a ConfigMap or Secret as environment variables.
 *
 * Example (YAML):
 * ```yaml
 * envFrom:
 *   - configMapRef:
 *       name: app-environment
 *   - secretRef:
 *       name: app-secrets
 *     prefix: "SECRET_"
 * ```
 */
message EnvFromSource {
  // Optional prefix prepended to each imported key name.
  // For example, prefix "APP_" with key "PORT" produces env var "APP_PORT".
  string prefix = 1;

  oneof source {
    // Import all keys from a ConfigMap.
    ConfigMapRef config_map_ref = 2;

    // Import all keys from a Secret.
    SecretRef secret_ref = 3;
  }
}

/**
 * **ContainerEnv** groups all environment configuration for a container.
 *
 * Environment variables are separated into non-sensitive `variables` and sensitive `secrets`
 * to enable appropriate handling (e.g., masking in logs, encryption at rest). The `env_from`
 * field supports bulk import of all keys from ConfigMaps or Secrets.
 */
message ContainerEnv {
  // Individual environment variables (non-sensitive).
  repeated EnvVar variables = 1;

  // Individual secret environment variables (sensitive).
  repeated SecretEnvVar secrets = 2;

  // Bulk import of environment variables from ConfigMaps or Secrets.
  repeated EnvFromSource env_from = 3;
}

/**
 * **ConfigMapKeyRef** selects a specific key from a Kubernetes ConfigMap.
 */
message ConfigMapKeyRef {
  // Name of the ConfigMap.
  string name = 1 [(buf.validate.field).required = true];

  // Key within the ConfigMap.
  string key = 2 [(buf.validate.field).required = true];

  // If true, the env var is silently skipped when the ConfigMap or key does not exist
  // (instead of blocking pod startup).
  bool optional = 3;
}

/**
 * **ConfigMapRef** references an entire Kubernetes ConfigMap for bulk envFrom import.
 */
message ConfigMapRef {
  // Name of the ConfigMap.
  string name = 1 [(buf.validate.field).required = true];

  // If true, the ConfigMap is allowed to not exist without blocking pod startup.
  bool optional = 2;
}

/**
 * **SecretRef** references an entire Kubernetes Secret for bulk envFrom import.
 */
message SecretRef {
  // Name of the Secret.
  string name = 1 [(buf.validate.field).required = true];

  // If true, the Secret is allowed to not exist without blocking pod startup.
  bool optional = 2;
}

/**
 * **ObjectFieldRef** selects a field from the pod specification or status.
 *
 * Supported fields include:
 *   metadata.name, metadata.namespace, metadata.uid,
 *   metadata.labels['<KEY>'], metadata.annotations['<KEY>'],
 *   spec.nodeName, spec.serviceAccountName,
 *   status.hostIP, status.podIP, status.podIPs
 */
message ObjectFieldRef {
  // Version of the schema. Defaults to "v1".
  string api_version = 1;

  // Path of the field to select (e.g., "metadata.name", "status.podIP").
  string field_path = 2 [(buf.validate.field).required = true];
}

/**
 * **ResourceFieldRef** selects a resource quantity from the container spec.
 *
 * Supported resources: limits.cpu, limits.memory, limits.ephemeral-storage,
 * requests.cpu, requests.memory, requests.ephemeral-storage.
 */
message ResourceFieldRef {
  // Container name. Required for init containers; defaults to the current
  // container for regular containers.
  string container_name = 1;

  // Resource to select (e.g., "limits.cpu", "requests.memory").
  string resource = 2 [(buf.validate.field).required = true];

  // Specifies the output format of the exposed resource.
  // For CPU: "1" means cores. For memory: "1", "1Ki", "1Mi", "1Gi".
  string divisor = 3;
}
