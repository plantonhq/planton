syntax = "proto3";

package org.openmcf.provider.kubernetes.kuberneteshttproute.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/kubernetes/gateway_api.proto";
import "org/openmcf/provider/kubernetes/target_cluster.proto";
import "org/openmcf/shared/foreignkey/v1/foreign_key.proto";

// KubernetesHttpRouteSpec defines a Kubernetes Gateway API HTTPRoute: a
// namespaced set of rules that match HTTP requests (by hostname, path, header,
// query param, or method), optionally transform them with filters, and forward
// them to backend Services. Routes attach to a Gateway through parent_refs.
//
// 100% fidelity with the upstream Gateway API v1.5.1 HTTPRouteSpec
// (kubernetes-sigs/gateway-api apis/v1/httproute_types.go), standard channel.
// Upstream spec fields are flattened after the OpenMCF namespaced envelope
// (target_cluster, namespace). Experimental fields are intentionally excluded
// because they are absent from the standard-channel CRD and the typed Pulumi
// resource OpenMCF provisions with, so they would have no deployable target:
//   - CommonRouteSpec.useDefaultGateways
//   - HTTPRouteRule.retry and HTTPRouteRule.sessionPersistence
//   - the ExternalAuth filter variant (and its sub-config)
message KubernetesHttpRouteSpec {
  // Target Kubernetes cluster where this HTTPRoute is created. The Gateway API
  // CRDs (KubernetesGatewayApiCrds) and a Gateway the route attaches to must
  // already be present on the cluster.
  org.openmcf.provider.kubernetes.KubernetesClusterSelector target_cluster = 1;

  // Namespace in which the HTTPRoute is created. Backends in other namespaces,
  // and Gateways in other namespaces, are subject to the usual same-namespace /
  // ReferenceGrant rules.
  org.openmcf.shared.foreignkey.v1.StringValueOrRef namespace = 2 [
    (buf.validate.field).required = true,
    (org.openmcf.shared.foreignkey.v1.default_kind) = KubernetesNamespace,
    (org.openmcf.shared.foreignkey.v1.default_kind_field_path) = "spec.name"
  ];

  // References to the parent resources (usually Gateways) this route attaches
  // to. Each parent must allow attachment from HTTPRoutes of this namespace.
  // parent_refs are plain references (not OpenMCF foreign keys): they are arrays
  // of multi-field objects, so InfraChart DAG ordering -- not a StringValueOrRef
  // wrapper -- sequences the Gateway before the routes that target it.
  //
  // Flattened from the upstream CommonRouteSpec; the experimental
  // useDefaultGateways field is excluded (standard channel only).
  repeated org.openmcf.provider.kubernetes.KubernetesGatewayApiParentReference parent_refs = 3 [(buf.validate.field).repeated.max_items = 32];

  // Hostnames matched against the HTTP Host header to select this route. A
  // leading wildcard label (for example "*.example.com") is a suffix match.
  // When empty, the route matches any hostname permitted by its parent
  // listeners. Upstream support level: Core.
  //
  // Each value is an RFC 1123 hostname (IPs not allowed). Pattern (wildcard
  // prefix allowed): ^(\*\.)?[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
  repeated string hostnames = 4 [(buf.validate.field).repeated = {
    max_items: 16
    items: {
      string: {
        min_len: 1
        max_len: 253
        pattern: "^(\\*\\.)?[a-z0-9]([-a-z0-9]*[a-z0-9])?(\\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$"
      }
    }
  }];

  // Routing rules: each rule matches requests, optionally applies filters, and
  // forwards to one or more backends. At least one rule is required. Upstream
  // allows up to 16 rules (and up to 64 matches per rule).
  repeated KubernetesHttpRouteRule rules = 5 [(buf.validate.field).repeated = {
    min_items: 1
    max_items: 16
  }];
}

// KubernetesHttpRouteRule matches HTTP requests (matches), processes them
// (filters), and forwards them to backends (backend_refs).
//
// Upstream: HTTPRouteRule in apis/v1/httproute_types.go (standard channel:
// retry and sessionPersistence are experimental and excluded).
message KubernetesHttpRouteRule {
  // a rule may not combine a RequestRedirect filter with backends -- a redirect
  // terminates the request, so there is nothing to forward.
  option (buf.validate.message).cel = {
    id: "http_route_rule.redirect_excludes_backends"
    message: "a rule using a RequestRedirect filter must not also specify backend_refs"
    expression: "size(this.backend_refs) > 0 ? this.filters.all(f, f.type != 'RequestRedirect') : true"
  };
  // RequestRedirect and URLRewrite both rewrite the request line and cannot be
  // used together on the same rule.
  option (buf.validate.message).cel = {
    id: "http_route_rule.redirect_xor_rewrite"
    message: "a rule may use either a RequestRedirect or a URLRewrite filter, but not both"
    expression: "!(this.filters.exists(f, f.type == 'RequestRedirect') && this.filters.exists(f, f.type == 'URLRewrite'))"
  };
  // filters that are not additive may appear at most once per rule.
  option (buf.validate.message).cel = {
    id: "http_route_rule.request_header_modifier_not_repeated"
    message: "the RequestHeaderModifier filter may be specified at most once per rule"
    expression: "this.filters.filter(f, f.type == 'RequestHeaderModifier').size() <= 1"
  };
  option (buf.validate.message).cel = {
    id: "http_route_rule.response_header_modifier_not_repeated"
    message: "the ResponseHeaderModifier filter may be specified at most once per rule"
    expression: "this.filters.filter(f, f.type == 'ResponseHeaderModifier').size() <= 1"
  };
  option (buf.validate.message).cel = {
    id: "http_route_rule.request_redirect_not_repeated"
    message: "the RequestRedirect filter may be specified at most once per rule"
    expression: "this.filters.filter(f, f.type == 'RequestRedirect').size() <= 1"
  };
  option (buf.validate.message).cel = {
    id: "http_route_rule.url_rewrite_not_repeated"
    message: "the URLRewrite filter may be specified at most once per rule"
    expression: "this.filters.filter(f, f.type == 'URLRewrite').size() <= 1"
  };
  option (buf.validate.message).cel = {
    id: "http_route_rule.cors_not_repeated"
    message: "the CORS filter may be specified at most once per rule"
    expression: "this.filters.filter(f, f.type == 'CORS').size() <= 1"
  };
  // a ReplacePrefixMatch path rewrite/redirect requires exactly one PathPrefix
  // match to define the prefix being replaced.
  option (buf.validate.message).cel = {
    id: "http_route_rule.redirect_replace_prefix_requires_path_prefix"
    message: "a RequestRedirect filter using path.replace_prefix_match requires the rule to have exactly one match whose path type is PathPrefix"
    expression: "this.filters.exists_one(f, f.type == 'RequestRedirect' && has(f.request_redirect.path) && f.request_redirect.path.type == 'ReplacePrefixMatch' && has(f.request_redirect.path.replace_prefix_match)) ? (size(this.matches) == 1 && has(this.matches[0].path) && (!has(this.matches[0].path.type) || this.matches[0].path.type == '' || this.matches[0].path.type == 'PathPrefix')) : true"
  };
  option (buf.validate.message).cel = {
    id: "http_route_rule.rewrite_replace_prefix_requires_path_prefix"
    message: "a URLRewrite filter using path.replace_prefix_match requires the rule to have exactly one match whose path type is PathPrefix"
    expression: "this.filters.exists_one(f, f.type == 'URLRewrite' && has(f.url_rewrite.path) && f.url_rewrite.path.type == 'ReplacePrefixMatch' && has(f.url_rewrite.path.replace_prefix_match)) ? (size(this.matches) == 1 && has(this.matches[0].path) && (!has(this.matches[0].path.type) || this.matches[0].path.type == '' || this.matches[0].path.type == 'PathPrefix')) : true"
  };

  // Name of the route rule; must be unique within the route if set. Upstream
  // support level: Extended.
  //
  // Upstream SectionName constraints: 1-253 chars, lowercase RFC 1123 subdomain.
  // Pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
  optional string name = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 253
    pattern: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$"
  }];

  // Conditions for matching requests. A request matches the rule if ANY one of
  // the matches is satisfied (matches are ORed; conditions within a match are
  // ANDed). When empty, the controller defaults to a PathPrefix match on "/".
  repeated KubernetesHttpRouteMatch matches = 2 [(buf.validate.field).repeated.max_items = 64];

  // Filters applied to requests matching this rule (header modification,
  // redirect, rewrite, mirror, CORS, or an implementation-specific extension).
  repeated KubernetesHttpRouteFilter filters = 3 [(buf.validate.field).repeated.max_items = 16];

  // Backends matching requests are forwarded to. When multiple backends are
  // given, traffic is split by weight. Upstream support level: Core for
  // Kubernetes Service.
  repeated KubernetesHttpRouteBackendRef backend_refs = 4 [(buf.validate.field).repeated.max_items = 16];

  // Request and per-backend-request timeouts for this rule. Upstream support
  // level: Extended.
  KubernetesHttpRouteTimeouts timeouts = 5;
}

// KubernetesHttpRouteMatch defines a predicate for matching a request. All
// specified conditions (path, headers, query_params, method) are ANDed.
//
// Upstream: HTTPRouteMatch in apis/v1/httproute_types.go
message KubernetesHttpRouteMatch {
  // header match names must be unique within a match (only the first of any
  // duplicate is honored upstream).
  option (buf.validate.message).cel = {
    id: "http_route_match.header_names_unique"
    message: "each header match name must be unique within a match"
    expression: "this.headers.all(h1, this.headers.exists_one(h2, h1.name == h2.name))"
  };
  // query-param match names must be unique within a match.
  option (buf.validate.message).cel = {
    id: "http_route_match.query_param_names_unique"
    message: "each query parameter match name must be unique within a match"
    expression: "this.query_params.all(q1, this.query_params.exists_one(q2, q1.name == q2.name))"
  };

  // Request path matcher. When unset, the controller defaults to a PathPrefix
  // match on "/".
  KubernetesHttpRoutePathMatch path = 1;

  // Request header matchers. A request must match all listed headers.
  repeated KubernetesHttpRouteHeaderMatch headers = 2 [(buf.validate.field).repeated.max_items = 16];

  // Request query-parameter matchers. A request must match all listed params.
  // Upstream support level: Extended.
  repeated KubernetesHttpRouteQueryParamMatch query_params = 3 [(buf.validate.field).repeated.max_items = 16];

  // HTTP method matcher. When set, the request method must equal this value.
  // Upstream support level: Extended.
  //
  // Closed enum (external standard exception -- matches the HTTP method tokens).
  optional string method = 4 [(buf.validate.field).cel = {
    id: "http_route_match.method_enum"
    message: "method must be one of GET, HEAD, POST, PUT, DELETE, CONNECT, OPTIONS, TRACE, or PATCH"
    expression: "this == '' || this in ['GET', 'HEAD', 'POST', 'PUT', 'DELETE', 'CONNECT', 'OPTIONS', 'TRACE', 'PATCH']"
  }];
}

// KubernetesHttpRoutePathMatch matches against the request path.
//
// Upstream: HTTPPathMatch in apis/v1/httproute_types.go
message KubernetesHttpRoutePathMatch {
  // for Exact and PathPrefix matches (the default when type is unset), the
  // value must be a valid, normalized absolute path.
  option (buf.validate.message).cel = {
    id: "http_path_match.absolute_path"
    message: "for Exact and PathPrefix matches, value must be an absolute path beginning with '/'"
    expression: "(has(this.value) && (!has(this.type) || this.type == '' || this.type in ['Exact', 'PathPrefix'])) ? this.value.startsWith('/') : true"
  };
  option (buf.validate.message).cel = {
    id: "http_path_match.no_dot_segments"
    message: "for Exact and PathPrefix matches, value must not contain '//', '/./', or '/../' segments"
    expression: "(has(this.value) && (!has(this.type) || this.type == '' || this.type in ['Exact', 'PathPrefix'])) ? (!this.value.contains('//') && !this.value.contains('/./') && !this.value.contains('/../')) : true"
  };
  option (buf.validate.message).cel = {
    id: "http_path_match.no_unsafe_chars"
    message: "for Exact and PathPrefix matches, value must not contain '#', '%2f', or '%2F'"
    expression: "(has(this.value) && (!has(this.type) || this.type == '' || this.type in ['Exact', 'PathPrefix'])) ? (!this.value.contains('#') && !this.value.contains('%2f') && !this.value.contains('%2F')) : true"
  };
  option (buf.validate.message).cel = {
    id: "http_path_match.no_trailing_dot_segment"
    message: "for Exact and PathPrefix matches, value must not end with '/.' or '/..'"
    expression: "(has(this.value) && (!has(this.type) || this.type == '' || this.type in ['Exact', 'PathPrefix'])) ? (!this.value.endsWith('/.') && !this.value.endsWith('/..')) : true"
  };
  // valid path characters regex from upstream HTTPPathMatch.
  option (buf.validate.message).cel = {
    id: "http_path_match.valid_chars"
    message: "for Exact and PathPrefix matches, value may only contain valid path characters (unreserved, sub-delims, ':@/' or percent-encoded octets)"
    expression: "(has(this.value) && (!has(this.type) || this.type == '' || this.type in ['Exact', 'PathPrefix'])) ? this.value.matches('^(?:[-A-Za-z0-9/._~!$&\\'()*+,;=:@]|[%][0-9a-fA-F]{2})+$') : true"
  };

  // How the path is compared. "Exact" and "PathPrefix" (default) have Core
  // support; "RegularExpression" is implementation-specific.
  //
  // Upstream default: "PathPrefix". Closed enum.
  optional string type = 1 [(buf.validate.field).cel = {
    id: "http_path_match.type_enum"
    message: "path match type must be one of 'Exact', 'PathPrefix', or 'RegularExpression'"
    expression: "this == '' || this in ['Exact', 'PathPrefix', 'RegularExpression']"
  }];

  // Path value to match against.
  //
  // Upstream default: "/".
  optional string value = 2 [(buf.validate.field).string.max_len = 1024];
}

// KubernetesHttpRouteHeaderMatch matches against a request header.
//
// Upstream: HTTPHeaderMatch in apis/v1/httproute_types.go
message KubernetesHttpRouteHeaderMatch {
  // How the header value is compared. "Exact" (default) has Core support;
  // "RegularExpression" is implementation-specific.
  //
  // Upstream default: "Exact". Closed enum.
  optional string type = 1 [(buf.validate.field).cel = {
    id: "http_header_match.type_enum"
    message: "header match type must be either 'Exact' or 'RegularExpression'"
    expression: "this == '' || this in ['Exact', 'RegularExpression']"
  }];

  // Name of the header to match (case-insensitive).
  //
  // Upstream HeaderName pattern: ^[A-Za-z0-9!#$%&'*+\-.^_`|~]+$ (1-256 chars).
  string name = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 256
      pattern: "^[A-Za-z0-9!#$%&'*+\\-.^_`|~]+$"
    }
  ];

  // Value the header is matched against.
  string value = 3 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 4096
    }
  ];
}

// KubernetesHttpRouteQueryParamMatch matches against a request query parameter.
//
// Upstream: HTTPQueryParamMatch in apis/v1/httproute_types.go
message KubernetesHttpRouteQueryParamMatch {
  // How the query-param value is compared. "Exact" (default) has Extended
  // support; "RegularExpression" is implementation-specific.
  //
  // Upstream default: "Exact". Closed enum.
  optional string type = 1 [(buf.validate.field).cel = {
    id: "http_query_param_match.type_enum"
    message: "query parameter match type must be either 'Exact' or 'RegularExpression'"
    expression: "this == '' || this in ['Exact', 'RegularExpression']"
  }];

  // Name of the query parameter to match (exact string match).
  //
  // Upstream HeaderName pattern: ^[A-Za-z0-9!#$%&'*+\-.^_`|~]+$ (1-256 chars).
  string name = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 256
      pattern: "^[A-Za-z0-9!#$%&'*+\\-.^_`|~]+$"
    }
  ];

  // Value the query parameter is matched against.
  string value = 3 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 1024
    }
  ];
}

// KubernetesHttpRouteFilter is a processing step applied to a matching request.
// It is a discriminated union: the type field selects exactly one of the
// configuration fields below (discriminator + fields, not a proto oneof, to
// preserve the upstream JSON structure).
//
// Upstream: HTTPRouteFilter in apis/v1/httproute_types.go (standard channel:
// the ExternalAuth variant is experimental and excluded).
message KubernetesHttpRouteFilter {
  // each configuration field must be populated when -- and only when -- the type
  // discriminator selects it. (Equivalent to the upstream pair of "must be nil
  // if type != X" / "must be set if type == X" rules, expressed as one
  // biconditional per variant.)
  option (buf.validate.message).cel = {
    id: "http_route_filter.request_header_modifier_consistency"
    message: "request_header_modifier must be set when type is 'RequestHeaderModifier' and must be unset otherwise"
    expression: "has(this.request_header_modifier) == (this.type == 'RequestHeaderModifier')"
  };
  option (buf.validate.message).cel = {
    id: "http_route_filter.response_header_modifier_consistency"
    message: "response_header_modifier must be set when type is 'ResponseHeaderModifier' and must be unset otherwise"
    expression: "has(this.response_header_modifier) == (this.type == 'ResponseHeaderModifier')"
  };
  option (buf.validate.message).cel = {
    id: "http_route_filter.request_mirror_consistency"
    message: "request_mirror must be set when type is 'RequestMirror' and must be unset otherwise"
    expression: "has(this.request_mirror) == (this.type == 'RequestMirror')"
  };
  option (buf.validate.message).cel = {
    id: "http_route_filter.request_redirect_consistency"
    message: "request_redirect must be set when type is 'RequestRedirect' and must be unset otherwise"
    expression: "has(this.request_redirect) == (this.type == 'RequestRedirect')"
  };
  option (buf.validate.message).cel = {
    id: "http_route_filter.url_rewrite_consistency"
    message: "url_rewrite must be set when type is 'URLRewrite' and must be unset otherwise"
    expression: "has(this.url_rewrite) == (this.type == 'URLRewrite')"
  };
  option (buf.validate.message).cel = {
    id: "http_route_filter.cors_consistency"
    message: "cors must be set when type is 'CORS' and must be unset otherwise"
    expression: "has(this.cors) == (this.type == 'CORS')"
  };
  option (buf.validate.message).cel = {
    id: "http_route_filter.extension_ref_consistency"
    message: "extension_ref must be set when type is 'ExtensionRef' and must be unset otherwise"
    expression: "has(this.extension_ref) == (this.type == 'ExtensionRef')"
  };

  // Which filter to apply. Selects exactly one configuration field below.
  //
  // Closed enum (external standard exception -- matches Gateway API filter type
  // constants). The experimental "ExternalAuth" type is excluded.
  string type = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).cel = {
      id: "http_route_filter.type_enum"
      message: "filter type must be one of 'RequestHeaderModifier', 'ResponseHeaderModifier', 'RequestMirror', 'RequestRedirect', 'URLRewrite', 'CORS', or 'ExtensionRef'"
      expression: "this in ['RequestHeaderModifier', 'ResponseHeaderModifier', 'RequestMirror', 'RequestRedirect', 'URLRewrite', 'CORS', 'ExtensionRef']"
    }
  ];

  // Modifies request headers before forwarding. Set when type is
  // "RequestHeaderModifier". Upstream support level: Core.
  KubernetesHttpRouteHeaderFilter request_header_modifier = 2;

  // Modifies response headers before returning to the client. Set when type is
  // "ResponseHeaderModifier". Upstream support level: Extended.
  KubernetesHttpRouteHeaderFilter response_header_modifier = 3;

  // Mirrors the request to an additional backend (responses ignored). Set when
  // type is "RequestMirror". Upstream support level: Extended.
  KubernetesHttpRouteRequestMirrorFilter request_mirror = 4;

  // Responds with an HTTP redirect. Set when type is "RequestRedirect". Cannot
  // be combined with backends or a URLRewrite filter. Upstream support: Core.
  KubernetesHttpRouteRequestRedirectFilter request_redirect = 5;

  // Rewrites the request line during forwarding. Set when type is "URLRewrite".
  // Cannot be combined with a RequestRedirect filter. Upstream support:
  // Extended.
  KubernetesHttpRouteUrlRewriteFilter url_rewrite = 6;

  // Adds CORS headers to the response. Set when type is "CORS". Upstream
  // support level: Extended.
  KubernetesHttpRouteCorsFilter cors = 7;

  // Implementation-specific extension filter. Set when type is "ExtensionRef".
  // Must not be used for core or extended filters. Upstream support:
  // Implementation-specific.
  org.openmcf.provider.kubernetes.KubernetesGatewayApiLocalObjectReference extension_ref = 8;
}

// KubernetesHttpRouteHeaderFilter adds, sets, or removes HTTP headers.
//
// Upstream: HTTPHeaderFilter in apis/v1/httproute_types.go
message KubernetesHttpRouteHeaderFilter {
  // header names in 'set' must be unique.
  option (buf.validate.message).cel = {
    id: "http_header_filter.set_names_unique"
    message: "each header name in 'set' must be unique"
    expression: "this.set.all(h1, this.set.exists_one(h2, h1.name == h2.name))"
  };
  // header names in 'add' must be unique.
  option (buf.validate.message).cel = {
    id: "http_header_filter.add_names_unique"
    message: "each header name in 'add' must be unique"
    expression: "this.add.all(h1, this.add.exists_one(h2, h1.name == h2.name))"
  };

  // Headers to overwrite (set) on the message, replacing any existing values.
  repeated KubernetesHttpRouteHeader set = 1 [(buf.validate.field).repeated.max_items = 16];

  // Headers to append, adding to any existing values for the same name.
  repeated KubernetesHttpRouteHeader add = 2 [(buf.validate.field).repeated.max_items = 16];

  // Header names to remove from the message.
  repeated string remove = 3 [(buf.validate.field).repeated = {
    max_items: 16
    unique: true
  }];
}

// KubernetesHttpRouteHeader is an HTTP header name/value pair.
//
// Upstream: HTTPHeader in apis/v1/httproute_types.go
message KubernetesHttpRouteHeader {
  // Name of the header (case-insensitive).
  //
  // Upstream HeaderName pattern: ^[A-Za-z0-9!#$%&'*+\-.^_`|~]+$ (1-256 chars).
  string name = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 256
      pattern: "^[A-Za-z0-9!#$%&'*+\\-.^_`|~]+$"
    }
  ];

  // Value of the header.
  string value = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 4096
    }
  ];
}

// KubernetesHttpRoutePathModifier defines how a path is rewritten in a redirect
// or URL-rewrite filter.
//
// Upstream: HTTPPathModifier in apis/v1/httproute_types.go
message KubernetesHttpRoutePathModifier {
  // replace_full_path is required for, and only valid with, ReplaceFullPath.
  option (buf.validate.message).cel = {
    id: "http_path_modifier.replace_full_path_consistency"
    message: "replace_full_path must be set when type is 'ReplaceFullPath' and must be unset otherwise"
    expression: "has(this.replace_full_path) == (this.type == 'ReplaceFullPath')"
  };
  // replace_prefix_match is required for, and only valid with, ReplacePrefixMatch.
  option (buf.validate.message).cel = {
    id: "http_path_modifier.replace_prefix_match_consistency"
    message: "replace_prefix_match must be set when type is 'ReplacePrefixMatch' and must be unset otherwise"
    expression: "has(this.replace_prefix_match) == (this.type == 'ReplacePrefixMatch')"
  };

  // Kind of path modification.
  //
  // Closed enum: ReplaceFullPath | ReplacePrefixMatch.
  string type = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).cel = {
      id: "http_path_modifier.type_enum"
      message: "path modifier type must be either 'ReplaceFullPath' or 'ReplacePrefixMatch'"
      expression: "this in ['ReplaceFullPath', 'ReplacePrefixMatch']"
    }
  ];

  // Value that replaces the entire path. Valid only with ReplaceFullPath.
  optional string replace_full_path = 2 [(buf.validate.field).string.max_len = 1024];

  // Value that replaces the matched path prefix. Valid only with
  // ReplacePrefixMatch (and a PathPrefix match on the same rule).
  optional string replace_prefix_match = 3 [(buf.validate.field).string.max_len = 1024];
}

// KubernetesHttpRouteRequestRedirectFilter responds to a request with an HTTP
// redirect.
//
// Upstream: HTTPRequestRedirectFilter in apis/v1/httproute_types.go
message KubernetesHttpRouteRequestRedirectFilter {
  // Scheme of the redirect Location. When empty, the request scheme is used.
  // Upstream support level: Extended.
  //
  // Closed enum: http | https.
  optional string scheme = 1 [(buf.validate.field).cel = {
    id: "http_request_redirect.scheme_enum"
    message: "redirect scheme must be either 'http' or 'https'"
