  // level: Implementation-specific (prefer rule-level filters for portability).
  repeated KubernetesHttpRouteFilter filters = 7 [(buf.validate.field).repeated.max_items = 16];
}

// KubernetesHttpRouteTimeouts configures request timeouts for a rule. Values are
// Gateway API Duration strings (GEP-2257), for example "10s", "1m", "500ms".
//
// Upstream: HTTPRouteTimeouts in apis/v1/httproute_types.go
message KubernetesHttpRouteTimeouts {
  // backend_request cannot exceed the overall request timeout (which
  // encompasses it). A request timeout of "0s" disables the limit, so the
  // comparison is skipped in that case.
  option (buf.validate.message).cel = {
    id: "http_route_timeouts.backend_request_within_request"
    message: "backend_request timeout cannot be longer than the request timeout"
    expression: "!(has(this.request) && has(this.backend_request) && duration(this.request) != duration('0s') && duration(this.backend_request) > duration(this.request))"
  };

  // Maximum duration for the gateway to respond to a client request. "0s"
  // disables the timeout. Upstream support level: Extended.
  //
  // Upstream Duration pattern: ^([0-9]{1,5}(h|m|s|ms)){1,4}$
  optional string request = 1 [(buf.validate.field).string.pattern = "^([0-9]{1,5}(h|m|s|ms)){1,4}$"];

  // Maximum duration for an individual gateway-to-backend request. "0s"
  // disables the timeout. Must not exceed request. Upstream support level:
  // Extended.
  //
  // Upstream Duration pattern: ^([0-9]{1,5}(h|m|s|ms)){1,4}$
  optional string backend_request = 2 [(buf.validate.field).string.pattern = "^([0-9]{1,5}(h|m|s|ms)){1,4}$"];
}
