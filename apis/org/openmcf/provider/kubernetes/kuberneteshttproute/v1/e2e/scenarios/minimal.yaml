apiVersion: kubernetes.openmcf.org/v1
kind: KubernetesHttpRoute
metadata:
  name: e2e-route
spec:
  namespace:
    value: default
  parent_refs:
    - name: e2e-gateway
  hostnames:
    - app.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backend_refs:
        - name: web
          port: 80
