apiVersion: kubernetes.openmcf.org/v1
kind: KubernetesRedis
metadata:
  name: e2e-redis-minimal
spec:
  namespace:
    value: e2e-redis-minimal
  create_namespace: true
  container:
    replicas: 1
    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 64Mi
    persistence_enabled: false
