syntax = "proto3";

package org.openmcf.provider.kubernetes.kubernetesreferencegrant.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/kubernetes/target_cluster.proto";
import "org/openmcf/shared/foreignkey/v1/foreign_key.proto";

// KubernetesReferenceGrantSpec defines a Kubernetes Gateway API ReferenceGrant:
// a namespaced authorization that permits resources in OTHER namespaces to
// reference specified kinds of resources in THIS grant's namespace. It is a form
// of runtime verification -- all cross-namespace references in the Gateway API
// (except cross-namespace Gateway-route attachment) require a ReferenceGrant in
// the referenced (the "to") namespace.
//
// 100% fidelity with the upstream Gateway API v1.5.1 ReferenceGrantSpec
// (kubernetes-sigs/gateway-api apis/v1/referencegrant_types.go), standard channel,
// served as gateway.networking.k8s.io/v1. Upstream spec fields are flattened after
// the OpenMCF namespaced envelope (target_cluster, namespace).
//
// Unlike the route kinds, ReferenceGrant has NO parent_refs/backend_refs and does
// not reuse the shared gateway_api.proto reference types: its from/to entries are
// trust assertions about KINDS of resources, not pointers to specific objects.
// Upstream deliberately omits a status subresource on ReferenceGrant, so there is
// no controller-managed status to surface.
message KubernetesReferenceGrantSpec {
  // Target Kubernetes cluster where this ReferenceGrant is created. The Gateway
  // API CRDs (KubernetesGatewayApiCrds) must already be present on the cluster.
  org.openmcf.provider.kubernetes.KubernetesClusterSelector target_cluster = 1;

  // Namespace the ReferenceGrant is created in. This is the namespace being
  // referenced INTO (the "to" side): the grant lives alongside the resources it
  // authorizes inbound references to, and revoking the grant revokes that access.
  org.openmcf.shared.foreignkey.v1.StringValueOrRef namespace = 2 [
    (buf.validate.field).required = true,
    (org.openmcf.shared.foreignkey.v1.default_kind) = KubernetesNamespace,
    (org.openmcf.shared.foreignkey.v1.default_kind_field_path) = "spec.name"
  ];

  // The trusted namespaces and kinds that may reference the resources described in
  // `to`. Entries are combined with OR -- each is an additional place inbound
  // references are valid from. At least one entry is required (upstream MinItems=1),
  // at most 16. Upstream support level: Core.
  repeated KubernetesReferenceGrantFrom from = 3 [(buf.validate.field).repeated = {
    min_items: 1
    max_items: 16
  }];

  // The resources in this grant's namespace that may be referenced by the
  // resources described in `from`. Entries are combined with OR. At least one
  // entry is required (upstream MinItems=1), at most 16. Upstream support
  // level: Core.
  repeated KubernetesReferenceGrantTo to = 4 [(buf.validate.field).repeated = {
    min_items: 1
    max_items: 16
  }];
}

// KubernetesReferenceGrantFrom describes one trusted source: a (group, kind,
// namespace) tuple whose resources are permitted to reference into this grant's
// namespace.
//
// Upstream: ReferenceGrantFrom in apis/v1/referencegrant_types.go.
message KubernetesReferenceGrantFrom {
  // Group of the referent. The empty string ("") infers the Kubernetes core API
  // group. Upstream marks this field required (the key must be present) but its
  // Group type explicitly allows the empty value, so it is NOT a buf.validate
  // `required` field here -- requiring it would wrongly reject the legitimate
  // core-group "" value. Pattern: empty or an RFC 1123 subdomain (max 253).
  //
  // INFRA-CHART COMPOSABILITY (DD-009): group is a trust assertion about a KIND of
  // resource, not a pointer to a specific OpenMCF resource instance -- do NOT add a
  // metadata.relationships hint for it.
  string group = 1 [(buf.validate.field).string = {
    max_len: 253
    pattern: "^$|^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$"
  }];

  // Kind of the referent. Required. Core-supported source kinds: Gateway (when
  // permitting a SecretObjectReference) and GRPCRoute / HTTPRoute / TCPRoute /
  // TLSRoute / UDPRoute (when permitting a BackendObjectReference). Pattern: 1-63
  // chars, ^[a-zA-Z]([-a-zA-Z0-9]*[a-zA-Z0-9])?$.
  //
  // INFRA-CHART COMPOSABILITY (DD-009): kind is a trust assertion about a KIND, not
  // an instance pointer -- no metadata.relationships hint applies.
  string kind = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 63
      pattern: "^[a-zA-Z]([-a-zA-Z0-9]*[a-zA-Z0-9])?$"
    }
  ];

  // Namespace of the referent: the source namespace trusted to reference into this
  // grant's namespace. Required. Pattern: an RFC 1123 label (1-63 chars).
  //
  // INFRA-CHART COMPOSABILITY (DD-009): this is the one genuine cross-resource
  // reference in from/to -- it names another KubernetesNamespace. It stays a PLAIN
  // string (not a StringValueOrRef foreign key) because it is a field inside an
  // array of multi-field upstream objects; wrapping it would break 100% fidelity
  // (DD-001) and distort the typed CRD shape (dont-do #6). Because a plain string
  // creates NO automatic DAG edge, when the source namespace is OpenMCF-managed an
  // infra-chart author should express the edge via metadata.relationships, e.g.:
  //   metadata:
  //     relationships:
  //       - kind: KubernetesNamespace
  //         name: "{{ values.source_ns }}"
  //         type: uses
  string namespace = 3 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 63
      pattern: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"
    }
  ];
}

// KubernetesReferenceGrantTo describes one referenceable target in this grant's
// namespace: a (group, kind) pair and an optional specific name.
//
// Upstream: ReferenceGrantTo in apis/v1/referencegrant_types.go.
message KubernetesReferenceGrantTo {
  // Group of the referent. The empty string ("") infers the Kubernetes core API
  // group (e.g. for the Secret and Service kinds). Modeled like from.group: not
  // buf.validate `required` so the legitimate core-group "" value is accepted.
  // Pattern: empty or an RFC 1123 subdomain (max 253).
  //
  // INFRA-CHART COMPOSABILITY (DD-009): a trust assertion about a KIND, not an
  // instance pointer -- no metadata.relationships hint applies.
  string group = 1 [(buf.validate.field).string = {
    max_len: 253
    pattern: "^$|^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$"
  }];

  // Kind of the referent. Required. Core-supported target kinds: Secret (when
  // permitting a SecretObjectReference) and Service (when permitting a
  // BackendObjectReference). Pattern: 1-63 chars.
  //
  // INFRA-CHART COMPOSABILITY (DD-009): a trust assertion about a KIND, not an
  // instance pointer -- no metadata.relationships hint applies.
  string kind = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 63
      pattern: "^[a-zA-Z]([-a-zA-Z0-9]*[a-zA-Z0-9])?$"
    }
  ];

  // Name of the referent. When unspecified, the grant refers to ALL resources of
  // the specified group and kind in this grant's namespace; when set, it narrows
  // the grant to a single named resource. Optional (so absence -- meaning
  // "all resources" -- is distinct from any concrete name). Upstream ObjectName
  // has a length bound only (1-253) and no character pattern, so none is invented.
  //
  // INFRA-CHART COMPOSABILITY (DD-009): even when set, this is an in-namespace
  // filter on the trust grant, not a deploy-ordered OpenMCF foreign key -- no
  // metadata.relationships hint applies.
  optional string name = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 253
  }];
}
