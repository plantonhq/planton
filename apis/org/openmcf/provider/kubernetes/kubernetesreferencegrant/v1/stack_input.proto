syntax = "proto3";

package org.openmcf.provider.kubernetes.kubernetesreferencegrant.v1;

import "org/openmcf/provider/kubernetes/kubernetesreferencegrant/v1/api.proto";
import "org/openmcf/provider/kubernetes/provider.proto";

// Input for the KubernetesReferenceGrant IaC stack. The platform resolves all
// StringValueOrRef references (namespace) to literal strings before passing this
// to the IaC engine.
message KubernetesReferenceGrantStackInput {
  // Target cloud-resource.
  KubernetesReferenceGrant target = 1;
  // Kubernetes provider configuration (cluster credentials).
  org.openmcf.provider.kubernetes.KubernetesProviderConfig provider_config = 2;
}
