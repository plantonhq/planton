syntax = "proto3";

package org.openmcf.provider.kubernetes.kubernetessecret.v1;

/**
 * **KubernetesSecretStackOutputs** captures observable outputs from a Kubernetes Secret deployment.
 * These outputs provide essential information for referencing the secret in other resources.
 */
message KubernetesSecretStackOutputs {
  /**
   * The name of the created Kubernetes Secret.
   * This is the primary identifier for referencing the secret in other resources.
   */
  string secret_name = 1;

  /**
   * The namespace where the Kubernetes Secret was created.
   */
  string secret_namespace = 2;

  /**
   * The Kubernetes secret type string.
   * Possible values: "Opaque", "kubernetes.io/tls", "kubernetes.io/dockerconfigjson",
   * "kubernetes.io/basic-auth", "kubernetes.io/ssh-auth"
   */
  string secret_type = 3;
}
