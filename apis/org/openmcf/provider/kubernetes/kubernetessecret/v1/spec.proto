syntax = "proto3";

package org.openmcf.provider.kubernetes.kubernetessecret.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/kubernetes/target_cluster.proto";
import "org/openmcf/shared/options/options.proto";

/**
 * **KubernetesSecretSpec** defines the configuration for creating and managing a Kubernetes Secret.
 * This spec implements a "Secret-as-a-Service" pattern, providing type-safe configuration for all
 * common Kubernetes secret types while keeping values as plain strings matching the Kubernetes API.
 *
 * The type-safe oneof design ensures that exactly one secret type is configured per resource,
 * with type-specific fields and validations for each variant.
 */
message KubernetesSecretSpec {
  // The Kubernetes cluster in which the secret should be created.
  org.openmcf.provider.kubernetes.KubernetesClusterSelector target_cluster = 1;

  /**
   * The name of the Kubernetes Secret.
   * Must be a valid DNS subdomain name (lowercase alphanumeric, hyphens, and dots).
   */
  string name = 2 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 253,
    (buf.validate.field).cel = {
      id: "name.dns_subdomain"
      message: "Name must be a valid DNS subdomain (lowercase alphanumeric, hyphens, and dots, no leading/trailing dots or hyphens)"
      expression: "this.matches('^[a-z0-9]([a-z0-9.-]{0,251}[a-z0-9])?$')"
    }
  ];

  /**
   * The namespace where the secret will be created.
   * Default: default
   */
  optional string namespace = 3 [
    (org.openmcf.shared.options.default) = "default",
    (buf.validate.field).string.max_len = 63,
    (buf.validate.field).cel = {
      id: "namespace.dns_label"
      message: "Namespace must be a valid DNS label (lowercase alphanumeric and hyphens, no leading/trailing hyphens)"
      expression: "this == '' || this.matches('^[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?$')"
    }
  ];

  /**
   * Additional labels to apply to the secret.
   * These are merged with standard OpenMCF labels for resource tracking and governance.
   */
  map<string, string> labels = 4;

  /**
   * Additional annotations to apply to the secret.
   */
  map<string, string> annotations = 5;

  /**
   * When true, the secret data cannot be updated after creation.
   * Immutable secrets provide protection against accidental updates and
   * improve cluster performance by reducing watch load on the API server.
   */
  bool immutable = 6;

  /**
   * Type-safe secret data. Exactly one variant must be provided.
   * The variant determines the Kubernetes secret type and required fields.
   */
  oneof secret_data {
    // Opaque secret with arbitrary key-value string data.
    // Maps to Kubernetes secret type "Opaque".
    KubernetesSecretOpaqueData opaque = 7;

    // TLS secret containing a certificate and private key.
    // Maps to Kubernetes secret type "kubernetes.io/tls".
    KubernetesSecretTlsData tls = 8;

    // Docker registry credentials for image pulls.
    // Maps to Kubernetes secret type "kubernetes.io/dockerconfigjson".
    KubernetesSecretDockerConfigJsonData docker_config_json = 9;

    // Basic authentication credentials (username/password).
    // Maps to Kubernetes secret type "kubernetes.io/basic-auth".
    KubernetesSecretBasicAuthData basic_auth = 10;

    // SSH authentication credentials (private key).
    // Maps to Kubernetes secret type "kubernetes.io/ssh-auth".
    KubernetesSecretSshAuthData ssh_auth = 11;
  }

  // Message-level validation: exactly one secret_data variant must be set
  option (buf.validate.message).cel = {
    id: "secret_data_required"
    message: "Exactly one secret data type must be provided (opaque, tls, docker_config_json, basic_auth, or ssh_auth)"
    expression: "has(this.opaque) || has(this.tls) || has(this.docker_config_json) || has(this.basic_auth) || has(this.ssh_auth)"
  };
}

/**
 * **KubernetesSecretOpaqueData** defines data for an Opaque secret.
 * This is the most common secret type, used for arbitrary key-value pairs.
 */
message KubernetesSecretOpaqueData {
  /**
   * Key-value pairs of secret data.
   * Values are plain strings (Kubernetes stringData semantics).
   * At least one entry is required.
   */
  map<string, string> data = 1 [(buf.validate.field).map.min_pairs = 1];
}

/**
 * **KubernetesSecretTlsData** defines data for a TLS secret.
 * Used for storing TLS certificates and private keys, commonly consumed by
 * Ingress controllers and other TLS-terminating services.
 */
message KubernetesSecretTlsData {
  /**
   * PEM-encoded TLS certificate (or certificate chain).
   * Stored as the "tls.crt" key in the Kubernetes Secret.
   */
  string tls_crt = 1 [(buf.validate.field).string.min_len = 1];

  /**
   * PEM-encoded TLS private key.
   * Stored as the "tls.key" key in the Kubernetes Secret.
   */
  string tls_key = 2 [(buf.validate.field).string.min_len = 1];
}

/**
 * **KubernetesSecretDockerConfigJsonData** defines data for a Docker registry secret.
 * Used for authenticating with container registries during image pulls.
 * The IaC module constructs the .dockerconfigjson JSON from these fields.
 */
message KubernetesSecretDockerConfigJsonData {
  /**
   * Docker registry server URL (e.g., "https://index.docker.io/v1/", "gcr.io", "ghcr.io").
   */
  string registry_server = 1 [(buf.validate.field).string.min_len = 1];

  /**
   * Username for registry authentication.
   */
  string username = 2 [(buf.validate.field).string.min_len = 1];

  /**
   * Password or access token for registry authentication.
   */
  string password = 3 [(buf.validate.field).string.min_len = 1];

  /**
   * Optional email associated with the registry account.
   */
  string email = 4;
}

/**
 * **KubernetesSecretBasicAuthData** defines data for a basic authentication secret.
 * Used for services that require username/password authentication.
 */
message KubernetesSecretBasicAuthData {
  /**
   * Username for basic authentication.
   * Stored as the "username" key in the Kubernetes Secret.
   */
  string username = 1 [(buf.validate.field).string.min_len = 1];

  /**
   * Password for basic authentication.
   * Stored as the "password" key in the Kubernetes Secret.
   */
  string password = 2 [(buf.validate.field).string.min_len = 1];
}

/**
 * **KubernetesSecretSshAuthData** defines data for an SSH authentication secret.
 * Used for Git operations, SSH tunneling, and other SSH-based authentication.
 */
message KubernetesSecretSshAuthData {
  /**
   * PEM-encoded SSH private key.
   * Stored as the "ssh-privatekey" key in the Kubernetes Secret.
   */
  string ssh_private_key = 1 [(buf.validate.field).string.min_len = 1];
}
