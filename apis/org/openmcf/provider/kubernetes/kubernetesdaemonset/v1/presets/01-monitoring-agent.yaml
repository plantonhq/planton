apiVersion: kubernetes.openmcf.org/v1
kind: KubernetesDaemonSet
metadata:
  name: my-monitoring-agent
spec:
  namespace:
    value: "<your-namespace>"
  createNamespace: false
  container:
    app:
      image:
        repo: "<your-container-registry>/<your-agent-image>"
        tag: "<your-image-tag>"
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
