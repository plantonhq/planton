apiVersion: kubernetes.openmcf.org/v1
kind: KubernetesStatefulSet
metadata:
  name: e2e-sts-env
spec:
  namespace:
    value: e2e-sts-env-ns
  create_namespace: true
  container:
    app:
      image:
        repo: nginx
        tag: "1.27-alpine"
      resources:
        requests:
          cpu: "10m"
          memory: "32Mi"
        limits:
          cpu: "100m"
          memory: "64Mi"
      ports:
        - name: http
          container_port: 80
          network_protocol: TCP
          app_protocol: http
          service_port: 80
      env:
        variables:
          APP_ENV:
            value: "test"
          LOG_LEVEL:
            value: "debug"
