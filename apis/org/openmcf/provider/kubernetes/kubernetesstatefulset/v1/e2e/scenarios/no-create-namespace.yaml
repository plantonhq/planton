# Validates create_namespace: false -- the module must NOT create the namespace and must
# deploy into the pre-existing `default` namespace. Guards the proto3 zero-value fix:
# create_namespace now defaults to false, so an explicit (or omitted) false is honored.

apiVersion: kubernetes.openmcf.org/v1
kind: KubernetesStatefulSet
metadata:
  name: e2e-sts-nocreatens
spec:
  namespace:
    value: default
  create_namespace: false
  container:
    app:
      image:
        repo: nginx
        tag: "1.27-alpine"
      resources:
        requests:
          cpu: "10m"
          memory: "32Mi"
        limits:
          cpu: "100m"
          memory: "64Mi"
      ports:
        - name: http
          container_port: 80
          network_protocol: TCP
          app_protocol: http
          service_port: 80
