apiVersion: kubernetes.openmcf.org/v1
kind: KubernetesPostgres
metadata:
  name: my-postgres
spec:
  namespace:
    value: "<your-namespace>"
  createNamespace: false
  container:
    replicas: 2
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 2000m
        memory: 4Gi
    diskSize: 50Gi
  databases:
    - name: app
      ownerRole: app_owner
  users:
    - name: app_owner
      flags:
        - LOGIN
        - CREATEDB
  backupConfig:
    enabled: true
    schedule: "0 2 * * *"
    retainCount: 14
    # Bucket holding backups. A literal name, or a reference to any S3-compatible
    # bucket resource's output, e.g.:
    #   bucket:
    #     valueFrom:
    #       kind: CloudflareR2Bucket
    #       name: my-postgres-backups
    #       fieldPath: status.outputs.bucket_name
    bucket:
      value: my-postgres-backups
    # Base path under the bucket; the module appends the per-cluster/per-version suffix.
    objectPrefix: production
    # Credentials WAL-G uses to write backups. The module creates a Secret from these
    # and references it via secretKeyRef in the pod env.
    credentials:
      cloudflareAccountId: "<cloudflare-account-id>"
      accessKeyId: "<r2-access-key-id>"
      secretAccessKey: "<r2-secret-access-key>"
