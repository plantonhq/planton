apiVersion: kubernetes.openmcf.org/v1
kind: KubernetesPostgres
metadata:
  name: my-postgres
spec:
  namespace:
    value: "<your-namespace>"
  createNamespace: false
  container:
    replicas: 2
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 2000m
        memory: 4Gi
    diskSize: 50Gi
  databases:
    - name: app
      ownerRole: app_owner
  users:
    - name: app_owner
      flags:
        - LOGIN
        - CREATEDB
  backupConfig:
    enableBackup: true
    backupSchedule: "0 2 * * *"
    backupRetainCount: 14
    # s3Prefix is the full s3://<bucket>/<path> target when r2Config is set
    # (prefer Zalando's $(SCOPE)/$(PGVERSION) substitution in the path).
    s3Prefix: my-postgres-backups/$(SCOPE)/$(PGVERSION)
    # Dedicated R2 credentials for this database's backups, independent of any
    # operator-level S3 configuration. The module creates a Secret from these and
    # references it via secretKeyRef in the pod env.
    r2Config:
      cloudflareAccountId: "<cloudflare-account-id>"
      accessKeyId: "<r2-access-key-id>"
      secretAccessKey: "<r2-secret-access-key>"
