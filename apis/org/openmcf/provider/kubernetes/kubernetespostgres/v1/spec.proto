syntax = "proto3";

package org.openmcf.provider.kubernetes.kubernetespostgres.v1;

import "buf/validate/validate.proto";
import "google/protobuf/descriptor.proto";
import "org/openmcf/provider/kubernetes/kubernetes.proto";
import "org/openmcf/provider/kubernetes/target_cluster.proto";
import "org/openmcf/shared/foreignkey/v1/foreign_key.proto";
import "org/openmcf/shared/options/options.proto";

extend google.protobuf.FieldOptions {
  KubernetesPostgresContainer default_container = 534001;
}

// R2/S3-compatible storage credentials for BACKUP (WAL-G push) operations.
// Kept separate from the restore-side message so backup and restore evolve
// independently. Today this targets Cloudflare R2; it is intentionally a discrete
// typed message to allow future S3-compatible backup backends (e.g. AWS S3, GCS)
// to be added as siblings without disruption.
message KubernetesPostgresBackupR2Config {
  // Cloudflare account ID for R2 endpoint construction.
  // Used to build: https://<account_id>.r2.cloudflarestorage.com
  string cloudflare_account_id = 1 [(buf.validate.field).required = true];

  // R2 access-key ID. A public identifier (like a username), not a secret.
  string access_key_id = 2 [(buf.validate.field).required = true];

  // R2 secret access key. Secret: must be provided as a managed-secret reference
  // and resolved just-in-time at deploy (never plaintext).
  string secret_access_key = 3 [
    (buf.validate.field).required = true,
    (org.openmcf.shared.options.sensitive) = true
  ];
}

// R2/S3-compatible storage credentials for RESTORE (standby bootstrap / PITR)
// operations. Kept separate from the backup-side message so the two evolve
// independently.
message KubernetesPostgresRestoreR2Config {
  // Cloudflare account ID for R2 endpoint construction.
  // Used to build: https://<account_id>.r2.cloudflarestorage.com
  string cloudflare_account_id = 1 [(buf.validate.field).required = true];

  // R2 access-key ID. A public identifier (like a username), not a secret.
  string access_key_id = 2 [(buf.validate.field).required = true];

  // R2 secret access key. Secret: must be provided as a managed-secret reference
  // and resolved just-in-time at deploy (never plaintext).
  string secret_access_key = 3 [
    (buf.validate.field).required = true,
    (org.openmcf.shared.options.sensitive) = true
  ];
}

// Technology-agnostic disaster recovery restore configuration
// Enables database restoration from S3/R2 backup files independent of source cluster
//
// Usage Pattern (Two-Stage Workflow):
// Stage 1 - Bootstrap from Backup:
//   Set enabled=true to restore from backup (read-only validation mode)
// Stage 2 - Promote to Primary:
//   Set enabled=false to promote to read-write primary
//
// Operator Implementation:
// - Zalando: enabled=true → spec:standby, enabled=false → remove spec:standby
// - Percona: enabled=true → spec:dataSource, enabled=false → normal bootstrap
// - CloudNativePG: enabled=true → spec:bootstrap.recovery, enabled=false → normal start
message KubernetesPostgresRestoreConfig {
  // Enable or disable restore mode
  // When enabled: Database bootstraps from backup (implementation varies by operator)
  // When disabled or unset: Database runs as normal primary
  bool enabled = 1;

  // S3/R2 bucket name for backup source
  // Optional: If not specified, uses operator-level bucket configuration
  // If operator-level bucket also not configured, deployment will fail
  optional string bucket_name = 2;

  // S3 path to backup directory (without s3:// prefix or bucket name)
  // Required when enabled=true
  // Example: "backups/db-app-prod-main/14"
  // Path should contain operator-specific backup structure (e.g., basebackups_005/, wal_005/)
  string s3_path = 3;

  // R2/S3 credentials for restore access
  // Optional: Allows per-database independent credentials for disaster recovery
  // If not specified, operators may use shared credentials or fail
  // Recommended: Provide credentials for true cross-cluster independence
  optional KubernetesPostgresRestoreR2Config r2_config = 4;
}

// Manager-agnostic backup configuration for a PostgreSQL database.
// This configuration allows per-database backup overrides independent of the operator implementation.
// When specified, these settings override operator-level backup configuration.
message KubernetesPostgresBackupConfig {
  // Optional: Enable or disable backups for this specific database -> USE_WALG_BACKUP.
  // If true, backups are explicitly enabled (overrides operator setting).
  // If false, backups are explicitly disabled for this database.
  // If not specified, uses operator-level setting (or defaults to true when r2_config is set).
  optional bool enable_backup = 1;

  // Optional: Custom S3/R2 prefix path for this database's backups -> WALG_S3_PREFIX.
  // When r2_config is set, this is the FULL s3://<bucket>/<path> target for the
  // dedicated bucket (prefer Zalando's $(SCOPE)/$(PGVERSION) substitution in the path).
  // When r2_config is unset, it overrides the operator-level prefix as before.
  // Example: "backups/my-app/production/postgres/$(PGVERSION)"
  string s3_prefix = 2;

  // Optional: Custom backup schedule in cron format -> BACKUP_SCHEDULE.
  // If not specified, uses operator-level schedule.
  // Example: "0 3 * * *" for 3 AM daily backups
  string backup_schedule = 3;

  // Optional: Number of base backups to retain -> BACKUP_NUM_TO_RETAIN.
  // If not specified, uses the operator default. For a financial datastore,
  // set this explicitly (e.g. 14).
  optional int32 backup_retain_count = 4;

  // Optional: Dedicated R2 credentials + endpoint for THIS database's backups,
  // independent of any operator-level S3 configuration. When set, the module
  // provisions the backup target with these credentials (a generated Kubernetes
  // Secret referenced via secretKeyRef) rather than inheriting the cluster
  // operator's bucket/credentials. The bucket is taken from s3_prefix.
  optional KubernetesPostgresBackupR2Config r2_config = 5;

  // Disaster recovery restore configuration
  // When set, enables cross-cluster database restoration from backup files
  optional KubernetesPostgresRestoreConfig restore_config = 6;
}

// PostgreSQL user/role definition
message KubernetesPostgresUser {
  // Username/role name (e.g., "app_user", "openfga")
  // This name can be referenced as a database owner in the databases field
  string name = 1 [(buf.validate.field).required = true];

  // User permission flags. Common values:
  // - "createdb": Can create databases
  // - "superuser": Superuser privileges (use with caution)
  // - "createrole": Can create other roles
  // - "inherit": Inherits privileges of roles it is a member of
  // - "login": Can log in (default for users)
  // - "replication": Can initiate streaming replication
  // Empty array means standard user with login privileges only.
  repeated string flags = 2;
}

// PostgreSQL database definition
message KubernetesPostgresDatabase {
  // Database name (e.g., "app_database", "analytics_db")
  // The operator will create this database during cluster initialization.
  string name = 1 [(buf.validate.field).required = true];

  // Owner role name (e.g., "app_user", "analytics_role")
  // This role must be declared in the 'users' field before being referenced here.
  // If not specified, the database will be owned by the default postgres user.
  string owner_role = 2;
}

/**
 * **KubernetesPostgresSpec** defines the configuration for deploying PostgreSQL on a Kubernetes cluster.
 * This message specifies the parameters needed to create and manage a PostgreSQL deployment within a Kubernetes environment.
 * It includes container specifications and ingress settings to control resource allocation and external access.
 */
message KubernetesPostgresSpec {
  // Target Kubernetes Cluster
  org.openmcf.provider.kubernetes.KubernetesClusterSelector target_cluster = 1;

  // Kubernetes Namespace
  org.openmcf.shared.foreignkey.v1.StringValueOrRef namespace = 2 [
    (buf.validate.field).required = true,
    (org.openmcf.shared.foreignkey.v1.default_kind) = KubernetesNamespace,
    (org.openmcf.shared.foreignkey.v1.default_kind_field_path) = "spec.name"
  ];

  // flag to indicate if the namespace should be created
  bool create_namespace = 3;

  // The container specifications for the PostgreSQL deployment.
  KubernetesPostgresContainer container = 4 [(default_container) = {
    replicas: 1
    resources: {
      limits: {
        cpu: "1000m"
        memory: "1Gi"
      }
      requests: {
        cpu: "50m"
        memory: "100Mi"
      }
    }
    disk_size: "1Gi"
  }];

  //The ingress configuration for the PostgreSQL deployment.
  KubernetesPostgresIngress ingress = 5;

  // Optional: Per-database backup configuration
  // When specified, these settings override the operator-level backup configuration
  // If not specified, the database inherits operator-level backup settings
  KubernetesPostgresBackupConfig backup_config = 6;

  // List of databases to create.
  // The operator will create these databases during cluster initialization.
  // If not specified, only the default "postgres" database will be available.
  // Note: Owner roles must be declared in the 'users' field before being referenced here.
  // Example:
  //   databases:
  //     - name: app_database
  //       owner_role: app_user
  //     - name: analytics_db
  //       owner_role: analytics_role
  repeated KubernetesPostgresDatabase databases = 7;

  // List of PostgreSQL users/roles to create.
  // Users must be declared here before being used as database owners in the 'databases' field.
  // The operator creates these users during cluster initialization.
  repeated KubernetesPostgresUser users = 8;
}

/**
 * **KubernetesPostgresContainer** specifies the container configuration for the PostgreSQL application.
 * It includes resource allocations for CPU and memory, the number of replicas, and disk size for data persistence.
 * Proper configuration ensures optimal performance and data reliability for your PostgreSQL deployment.
 */
message KubernetesPostgresContainer {
  // The number of replicas of PostgreSQL pods.
  int32 replicas = 1;

  // The CPU and memory resources allocated to the PostgreSQL container.
  org.openmcf.provider.kubernetes.ContainerResources resources = 2;

  /**
   * The storage size to allocate for each PostgreSQL instance (e.g., "1Gi").
   * A default value is set if the client does not provide a value.
   */
  string disk_size = 3 [(buf.validate.field).cel = {
    id: "spec.container.disk_size.required"
    message: "Disk size value is invalid"
    // Validation regex for disk size.
    expression: "this.matches('^\\\\d+(\\\\.\\\\d+)?\\\\s?(Ki|Mi|Gi|Ti|Pi|Ei|K|M|G|T|P|E)$') && size(this) > 0"
  }];
}

/**
 * **KubernetesPostgresIngress** defines the ingress configuration for PostgreSQL.
 * It allows enabling external access via LoadBalancer with hostname-based routing.
 */
message KubernetesPostgresIngress {
  // Flag to enable or disable ingress.
  // When enabled, creates a LoadBalancer service with external-dns annotations.
  bool enabled = 1;

  // The full hostname for external access (e.g., "postgres.example.com").
  // This hostname will be configured automatically via external-dns.
  // Required when enabled is true.
  string hostname = 2;

  option (buf.validate.message).cel = {
    id: "spec.ingress.hostname.required"
    expression: "!this.enabled || size(this.hostname) > 0"
    message: "hostname is required when ingress is enabled"
  };
}
