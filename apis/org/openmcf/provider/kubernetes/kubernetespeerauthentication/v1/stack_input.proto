syntax = "proto3";

package org.openmcf.provider.kubernetes.kubernetespeerauthentication.v1;

import "org/openmcf/provider/kubernetes/kubernetespeerauthentication/v1/api.proto";
import "org/openmcf/provider/kubernetes/provider.proto";

// KubernetesPeerAuthenticationStackInput provides the inputs for creating the
// PeerAuthentication on a Kubernetes cluster.
message KubernetesPeerAuthenticationStackInput {
  // target cloud-resource
  KubernetesPeerAuthentication target = 1;
  // provider-config
  org.openmcf.provider.kubernetes.KubernetesProviderConfig provider_config = 2;
}
