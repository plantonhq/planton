apiVersion: kubernetes.openmcf.org/v1
kind: KubernetesAuthorizationPolicy
metadata:
  name: e2e-authorization-policy
spec:
  namespace:
    value: default
  action: ALLOW
  rules:
    - from:
        - source:
            request_principals:
              - "*"
      to:
        - operation:
            methods:
              - GET
            paths:
              - /info*
      when:
        - key: request.auth.claims[iss]
          values:
            - https://accounts.example.com
