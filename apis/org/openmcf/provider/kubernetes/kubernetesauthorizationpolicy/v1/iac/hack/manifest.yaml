apiVersion: kubernetes.openmcf.org/v1
kind: KubernetesAuthorizationPolicy
metadata:
  name: test-authorization-policy
spec:
  namespace:
    value: test-namespace
  selector:
    match_labels:
      app: httpbin
  action: ALLOW
  rules:
    - from:
        - source:
            request_principals:
              - "*"
        - source:
            namespaces:
              - test-namespace
      to:
        - operation:
            methods:
              - GET
              - POST
            paths:
              - /info*
              - /data
      when:
        - key: request.auth.claims[iss]
          values:
            - https://accounts.example.com
