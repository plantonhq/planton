apiVersion: kubernetes.openmcf.org/v1
kind: KubernetesGitlab
metadata:
  name: e2e-gitlab-minimal
spec:
  namespace:
    value: e2e-gitlab-minimal
  create_namespace: true
  container:
    resources:
      limits:
        cpu: "2000m"
        memory: 4Gi
      requests:
        cpu: 100m
        memory: 256Mi
