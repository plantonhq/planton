syntax = "proto3";

package org.openmcf.provider.kubernetes.kubernetesserviceentry.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/kubernetes/kubernetesserviceentry/v1/spec.proto";
import "org/openmcf/provider/kubernetes/kubernetesserviceentry/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// KubernetesServiceEntry is an Istio ServiceEntry: a namespaced resource that adds entries
// into Istio's internal service registry so mesh workloads can route to and apply policy
// against services not part of the platform's own service discovery.
message KubernetesServiceEntry {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'kubernetes.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'KubernetesServiceEntry'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  KubernetesServiceEntrySpec spec = 4 [(buf.validate.field).required = true];

  // status
  KubernetesServiceEntryStatus status = 5;
}

// KubernetesServiceEntryStatus holds the deployment status and outputs.
message KubernetesServiceEntryStatus {
  // stack-outputs
  KubernetesServiceEntryStackOutputs outputs = 1;
}
