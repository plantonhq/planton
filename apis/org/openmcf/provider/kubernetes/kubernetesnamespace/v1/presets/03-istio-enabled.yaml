apiVersion: kubernetes.openmcf.org/v1
kind: KubernetesNamespace
metadata:
  name: my-istio-namespace
spec:
  name: my-istio-namespace
  labels:
    team: "<your-team-name>"
  resourceProfile:
    preset: medium
  podSecurityStandard: baseline
  serviceMeshConfig:
    enabled: true
    meshType: istio
