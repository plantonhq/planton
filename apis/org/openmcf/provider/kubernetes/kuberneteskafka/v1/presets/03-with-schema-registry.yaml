apiVersion: kubernetes.openmcf.org/v1
kind: KubernetesKafka
metadata:
  name: my-kafka
spec:
  namespace:
    value: "<your-namespace>"
  createNamespace: false
  brokerContainer:
    replicas: 3
    resources:
      requests:
        cpu: 250m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi
    diskSize: 50Gi
  zookeeperContainer:
    replicas: 3
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    diskSize: 5Gi
  schemaRegistryContainer:
    isEnabled: true
    replicas: 1
  isDeployKafkaUi: true
  kafkaTopics:
    - name: events
      partitions: 6
      replicas: 3
