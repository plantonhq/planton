apiVersion: qa.openmcf.org/v1
kind: ComponentE2EProfile
metadata:
  name: kubernetestcproute
spec:
  tier: 4
  status: deferred
  deferred_reason: "Requires the Gateway API EXPERIMENTAL-channel CRDs (KubernetesGatewayApiCrds with install_channel: experimental -- TCPRoute is not in the standard channel) and a programmed Gateway (KubernetesGateway with a TCP listener, plus a controller-backed GatewayClass) on the test substrate before a TCPRoute can be applied and attach to a parent. The current E2E harness runs each component on a bare kind cluster and does not yet provision registered prerequisites, so this is deferred until prerequisite provisioning is supported. Both Pulumi and Terraform modules build and validate clean."
  validated_provisioners:
    - pulumi
    - terraform
  timeout_minutes: 15
