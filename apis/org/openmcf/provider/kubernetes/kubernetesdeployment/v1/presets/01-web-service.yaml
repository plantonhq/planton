apiVersion: kubernetes.openmcf.org/v1
kind: KubernetesDeployment
metadata:
  name: my-web-service
spec:
  namespace:
    value: "<your-namespace>"
  createNamespace: false
  version: latest
  container:
    app:
      image:
        repo: "<your-container-registry>/<your-image>"
        tag: "<your-image-tag>"
      resources:
        requests:
          cpu: 50m
          memory: 100Mi
        limits:
          cpu: 1000m
          memory: 1Gi
      ports:
        - name: http
          containerPort: 8080
          networkProtocol: TCP
          appProtocol: http
          servicePort: 80
          isIngressPort: true
  ingress:
    enabled: true
    hostname: "<your-app.example.com>"
  availability:
    minReplicas: 1
