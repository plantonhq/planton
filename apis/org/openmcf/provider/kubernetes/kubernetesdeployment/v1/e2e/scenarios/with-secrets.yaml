apiVersion: kubernetes.openmcf.org/v1
kind: KubernetesDeployment
metadata:
  name: e2e-dep-secrets
spec:
  namespace:
    value: e2e-dep-secrets-ns
  create_namespace: true
  version: main
  container:
    app:
      image:
        repo: nginx
        tag: "1.27-alpine"
      resources:
        requests:
          cpu: "10m"
          memory: "32Mi"
        limits:
          cpu: "100m"
          memory: "64Mi"
      ports:
        - name: http
          container_port: 80
          network_protocol: TCP
          app_protocol: http
          service_port: 80
      env:
        secrets:
          DB_PASSWORD:
            value: "e2e-test-password"
          API_KEY:
            value: "e2e-test-api-key"
