apiVersion: kubernetes.openmcf.org/v1
kind: KubernetesDeployment
metadata:
  name: e2e-dep-cmd
spec:
  namespace:
    value: e2e-dep-cmd-ns
  create_namespace: true
  version: main
  container:
    app:
      image:
        repo: busybox
        tag: "1.37"
      resources:
        requests:
          cpu: "10m"
          memory: "16Mi"
        limits:
          cpu: "50m"
          memory: "32Mi"
      ports:
        - name: http
          container_port: 8080
          network_protocol: TCP
          app_protocol: http
          service_port: 8080
      command:
        - "/bin/sh"
        - "-c"
      args:
        - "while true; do echo hello; sleep 10; done"
