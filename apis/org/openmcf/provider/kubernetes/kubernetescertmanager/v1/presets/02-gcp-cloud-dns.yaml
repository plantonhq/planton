apiVersion: kubernetes.openmcf.org/v1
kind: KubernetesCertManager
metadata:
  name: my-cert-manager
spec:
  namespace:
    value: cert-manager
  createNamespace: true
  acme:
    email: "<your-acme-email@example.com>"
    server: https://acme-v02.api.letsencrypt.org/directory
  dnsProviders:
    - name: gcp-primary
      dnsZones:
        - "<your-domain.com>"
      gcpCloudDns:
        projectId: "<your-gcp-project-id>"
        serviceAccountEmail: "<your-gsa-email@your-project.iam.gserviceaccount.com>"
