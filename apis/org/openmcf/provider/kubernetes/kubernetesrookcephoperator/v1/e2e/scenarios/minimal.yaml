apiVersion: kubernetes.openmcf.org/v1
kind: KubernetesRookCephOperator
metadata:
  name: e2e-rook-op
spec:
  namespace:
    value: rook-ceph
  create_namespace: true
  container:
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "250m"
        memory: "256Mi"
  csi:
    enable_rbd_driver: true
    enable_cephfs_driver: true
