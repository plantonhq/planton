syntax = "proto3";

package org.openmcf.provider.kubernetes.kubernetestlsroute.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/kubernetes/gateway_api.proto";
import "org/openmcf/provider/kubernetes/target_cluster.proto";
import "org/openmcf/shared/foreignkey/v1/foreign_key.proto";

// KubernetesTlsRouteSpec defines a Kubernetes Gateway API TLSRoute: a namespaced
// set of rules that match TLS connections by their SNI hostname and forward them,
// unmodified, to backend Services (TLS passthrough). The route attaches to a
// Gateway listener of protocol TLS through parent_refs.
//
// 100% fidelity with the upstream Gateway API v1.5.1 TLSRouteSpec
// (kubernetes-sigs/gateway-api apis/v1/tlsroute_types.go), standard channel.
// TLSRoute graduated to the standard channel and is served as
// gateway.networking.k8s.io/v1 (it was experimental v1alpha2/v1alpha3 in earlier
// releases). Upstream spec fields are flattened after the OpenMCF namespaced
// envelope (target_cluster, namespace).
//
// TLSRoute is a layer-4 (connection) route: it has no path/header/method matches
// and no filters. Each rule simply forwards to one or more backends, so it reuses
// the shared KubernetesGatewayApiBackendRef directly rather than defining its own
// per-route backend ref.
message KubernetesTlsRouteSpec {
  // Target Kubernetes cluster where this TLSRoute is created. The Gateway API
  // CRDs (KubernetesGatewayApiCrds) and a Gateway the route attaches to must
  // already be present on the cluster.
  org.openmcf.provider.kubernetes.KubernetesClusterSelector target_cluster = 1;

  // Namespace in which the TLSRoute is created. Backends in other namespaces,
  // and Gateways in other namespaces, are subject to the usual same-namespace /
  // ReferenceGrant rules.
  org.openmcf.shared.foreignkey.v1.StringValueOrRef namespace = 2 [
    (buf.validate.field).required = true,
    (org.openmcf.shared.foreignkey.v1.default_kind) = KubernetesNamespace,
    (org.openmcf.shared.foreignkey.v1.default_kind_field_path) = "spec.name"
  ];

  // References to the parent resources (usually Gateways) this route attaches
  // to. Each parent must have a TLS listener that allows attachment from
  // TLSRoutes of this namespace.
  //
  // INFRA-CHART COMPOSABILITY (DD-009): parent_refs is a PLAIN reference, not an
  // OpenMCF foreign key (StringValueOrRef). It is an array of multi-field upstream
  // objects, so wrapping its scalars in StringValueOrRef would break 100% upstream
  // fidelity (DD-001) and distort the typed CRD shape (dont-do #6). Because a plain
  // string creates NO automatic DAG edge, an infra-chart author MUST express the
  // route -> Gateway dependency via metadata.relationships, e.g.:
  //   metadata:
  //     relationships:
  //       - kind: KubernetesGateway
  //         name: "{{ values.env }}-gateway"
  //         type: depends_on
  // The plain `name` here is then the literal Gateway name. See the component's
  // "Composing in Infra Charts" docs for the full pattern.
  //
  // Flattened from the upstream CommonRouteSpec.
  repeated org.openmcf.provider.kubernetes.KubernetesGatewayApiParentReference parent_refs = 3 [(buf.validate.field).repeated.max_items = 32];

  // SNI hostnames matched against the SNI attribute of the TLS ClientHello during
  // the handshake. A leading wildcard label (for example "*.example.com") is a
  // suffix match. At least one hostname is required (upstream requires hostnames
  // for TLSRoute, unlike HTTP/GRPC routes where it is optional). Upstream support
  // level: Core.
  //
  // Each value is an RFC 1123 hostname; per RFC 6066, SNI hostnames may not be IP
  // addresses. The per-item pattern enforces the RFC 1123 + wildcard-first-label
  // shape; the list-level CEL below additionally rejects IPv4 literals. This
  // no-IP rule is specific to TLS SNI (RFC 6066) and is genuinely absent from the
  // upstream HTTP/GRPC hostname rules -- so translating it here is fidelity to the
  // TLSRoute spec, not divergence from the sibling routes.
  //
  // Upstream expresses this as `!isIP(h)`. OpenMCF's buf-lint CEL environment does
  // not register protovalidate's isIp() format function, so we use an equivalent
  // IPv4 dotted-quad regex: any value containing ':' (IPv6) is already rejected by
  // the per-item hostname pattern above, so an IPv4 guard fully covers the
  // reachable input space.
  repeated string hostnames = 4 [
    (buf.validate.field).repeated = {
      min_items: 1
      max_items: 16
      items: {
        string: {
          min_len: 1
          max_len: 253
          pattern: "^(\\*\\.)?[a-z0-9]([-a-z0-9]*[a-z0-9])?(\\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$"
        }
      }
    },
    (buf.validate.field).cel = {
      id: "tls_route.hostnames_no_ip"
      message: "SNI hostnames cannot be IP addresses (RFC 6066)"
      expression: "this.all(h, !h.matches('^([0-9]{1,3}\\\\.){3}[0-9]{1,3}$'))"
    }
  ];

  // Routing rules. Each rule forwards matching connections to one or more
  // backends. Upstream allows exactly one rule for a TLSRoute (max_items 1): a
  // TLS passthrough route has no layer-7 matching, so a second rule would be
  // ambiguous. At least one rule is required.
  repeated KubernetesTlsRouteRule rules = 5 [(buf.validate.field).repeated = {
    min_items: 1
    max_items: 1
  }];
}

// KubernetesTlsRouteRule forwards matching TLS connections to one or more
// backends (backend_refs). There are no matches or filters for TLS routes.
//
// Upstream: TLSRouteRule in apis/v1/tlsroute_types.go.
message KubernetesTlsRouteRule {
  // Name of the route rule; must be unique within the route if set. Upstream
  // support level: Extended.
  //
  // Upstream SectionName constraints: 1-253 chars, lowercase RFC 1123 subdomain.
  // Pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
  optional string name = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 253
    pattern: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$"
  }];

  // Backends matching connections are forwarded to. When multiple backends are
  // given, traffic is split by weight. At least one backend is required.
  // Upstream support level: Core for Kubernetes Service.
  //
  // INFRA-CHART COMPOSABILITY (DD-009): backend_refs is a PLAIN reference, not an
  // OpenMCF foreign key (StringValueOrRef). It is an array of multi-field upstream
  // objects, so wrapping its scalars would break 100% fidelity (DD-001) and distort
  // the typed CRD shape (dont-do #6). Because a plain string creates NO automatic
  // DAG edge, an infra-chart author MUST express the route -> backend dependency via
  // metadata.relationships when the backend is an OpenMCF-managed resource, e.g.:
  //   metadata:
  //     relationships:
  //       - kind: KubernetesService   # or the backend's actual kind
  //         name: "{{ values.service_name }}"
  //         type: uses
  // The plain `name` here is then the literal Kubernetes Service name. See the
  // component's "Composing in Infra Charts" docs for the full pattern.
  repeated org.openmcf.provider.kubernetes.KubernetesGatewayApiBackendRef backend_refs = 2 [(buf.validate.field).repeated = {
    min_items: 1
    max_items: 16
  }];
}
