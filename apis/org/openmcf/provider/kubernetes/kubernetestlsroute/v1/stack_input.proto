syntax = "proto3";

package org.openmcf.provider.kubernetes.kubernetestlsroute.v1;

import "org/openmcf/provider/kubernetes/kubernetestlsroute/v1/api.proto";
import "org/openmcf/provider/kubernetes/provider.proto";

// Input for the KubernetesTlsRoute IaC stack. The platform resolves all
// StringValueOrRef references (namespace) to literal strings before passing this
// to the IaC engine.
message KubernetesTlsRouteStackInput {
  // Target cloud-resource.
  KubernetesTlsRoute target = 1;
  // Kubernetes provider configuration (cluster credentials).
  org.openmcf.provider.kubernetes.KubernetesProviderConfig provider_config = 2;
}
