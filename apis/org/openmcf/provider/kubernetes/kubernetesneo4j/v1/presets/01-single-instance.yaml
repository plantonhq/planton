apiVersion: kubernetes.openmcf.org/v1
kind: KubernetesNeo4j
metadata:
  name: my-neo4j
spec:
  namespace:
    value: "<your-namespace>"
  createNamespace: false
  container:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 2000m
        memory: 4Gi
    diskSize: 10Gi
