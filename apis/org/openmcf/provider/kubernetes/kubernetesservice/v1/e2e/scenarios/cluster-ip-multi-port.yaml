apiVersion: kubernetes.openmcf.org/v1
kind: KubernetesService
metadata:
  name: e2e-svc-multiport
spec:
  namespace: default
  name: e2e-svc-multiport
  selector:
    app: test-app
  ports:
    - name: http
      port: 80
      target_port: "8080"
    - name: grpc
      port: 9090
      target_port: "9090"
    - name: metrics
      port: 9102
      target_port: "9102"
