apiVersion: kubernetes.openmcf.org/v1
kind: KubernetesService
metadata:
  name: my-headless-service
spec:
  namespace: "<your-namespace>"
  name: my-headless-service
  type: cluster_ip
  headless: true
  selector:
    app: "<your-app-label>"
  ports:
    - name: tcp
      port: 9090
      targetPort: "9090"
      protocol: TCP
