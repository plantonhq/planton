apiVersion: snowflake.openmcf.org/v1
kind: SnowflakeDatabase
metadata:
  name: my-dev-db
spec:
  name: DEVELOPMENT
  comment: Development database with minimal retention
  isTransient: true
  dataRetentionTimeInDays: 1
  logLevel: DEBUG
  traceLevel: ON_EVENT
  enableConsoleOutput: true
  dropPublicSchemaOnCreation: true
