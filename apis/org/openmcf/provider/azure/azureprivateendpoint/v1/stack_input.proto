syntax = "proto3";

package org.openmcf.provider.azure.azureprivateendpoint.v1;

import "org/openmcf/provider/azure/azureprivateendpoint/v1/api.proto";
import "org/openmcf/provider/azure/provider.proto";

// AzurePrivateEndpointStackInput is the input to the IaC module.
// It contains the target resource and provider configuration.
message AzurePrivateEndpointStackInput {
  // target cloud-resource to be deployed
  AzurePrivateEndpoint target = 1;
  // provider-config for Azure authentication
  org.openmcf.provider.azure.AzureProviderConfig provider_config = 2;
}
