syntax = "proto3";

package org.openmcf.provider.azure.azureprivateendpoint.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/azure/azureprivateendpoint/v1/spec.proto";
import "org/openmcf/provider/azure/azureprivateendpoint/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// AzurePrivateEndpoint is the top-level API resource for an Azure Private Endpoint.
// Private endpoints provide secure, private connectivity to Azure PaaS services
// over the Microsoft backbone network, using a private IP from your VNet.
message AzurePrivateEndpoint {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'azure.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AzurePrivateEndpoint'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AzurePrivateEndpointSpec spec = 4 [(buf.validate.field).required = true];

  // status
  AzurePrivateEndpointStatus status = 5;
}

// AzurePrivateEndpointStatus holds the deployment status and outputs.
message AzurePrivateEndpointStatus {
  // stack-outputs
  AzurePrivateEndpointStackOutputs outputs = 1;
}
