apiVersion: azure.openmcf.org/v1
kind: AzurePrivateEndpoint
metadata:
  name: my-kv-private-endpoint
spec:
  region: <azure-region>
  resourceGroup:
    value: "<your-resource-group-name>"
  name: <your-pe-name>
  subnetId:
    value: "<subnet-resource-id>"
  privateConnectionResourceId:
    value: "<key-vault-resource-id>"
  subresourceNames:
    - vault
  privateDnsZoneId:
    value: "<private-dns-zone-id>"
