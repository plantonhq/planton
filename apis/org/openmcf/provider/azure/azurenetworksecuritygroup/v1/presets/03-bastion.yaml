apiVersion: azure.openmcf.org/v1
kind: AzureNetworkSecurityGroup
metadata:
  name: my-bastion-nsg
spec:
  region: <azure-region>
  resourceGroup:
    value: "<your-resource-group-name>"
  name: <your-nsg-name>
  securityRules:
    - name: allow-ssh-inbound
      description: Allow SSH from trusted IPs only
      priority: 100
      direction: Inbound
      access: Allow
      protocol: Tcp
      destinationPortRange: "22"
      sourceAddressPrefix: <your-trusted-cidr>
    - name: allow-rdp-inbound
      description: Allow RDP from trusted IPs only
      priority: 110
      direction: Inbound
      access: Allow
      protocol: Tcp
      destinationPortRange: "3389"
      sourceAddressPrefix: <your-trusted-cidr>
    - name: deny-all-internet-inbound
      description: Deny all other internet traffic
      priority: 4000
      direction: Inbound
      access: Deny
      protocol: "*"
      destinationPortRange: "*"
      sourceAddressPrefix: Internet
