apiVersion: azure.openmcf.org/v1
kind: AzureNetworkSecurityGroup
metadata:
  name: my-database-nsg
spec:
  region: <azure-region>
  resourceGroup:
    value: "<your-resource-group-name>"
  name: <your-nsg-name>
  securityRules:
    - name: allow-postgresql-from-vnet
      description: Allow PostgreSQL from VNet resources
      priority: 100
      direction: Inbound
      access: Allow
      protocol: Tcp
      destinationPortRange: "5432"
      sourceAddressPrefix: VirtualNetwork
    - name: allow-mysql-from-vnet
      description: Allow MySQL from VNet resources
      priority: 110
      direction: Inbound
      access: Allow
      protocol: Tcp
      destinationPortRange: "3306"
      sourceAddressPrefix: VirtualNetwork
    - name: deny-internet-inbound
      description: Explicitly deny all internet inbound traffic
      priority: 4000
      direction: Inbound
      access: Deny
      protocol: "*"
      destinationPortRange: "*"
      sourceAddressPrefix: Internet
