apiVersion: azure.openmcf.org/v1
kind: AzureNetworkSecurityGroup
metadata:
  name: test-nsg
spec:
  region: eastus
  resource_group: test-rg
  name: test-nsg
  security_rules:
    - name: allow-https
      priority: 100
      direction: Inbound
      access: Allow
      protocol: Tcp
      destination_port_range: "443"
    - name: deny-all-inbound
      priority: 4096
      direction: Inbound
      access: Deny
      protocol: "*"
      destination_port_range: "*"
