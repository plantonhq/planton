apiVersion: azure.openmcf.org/v1
kind: AzurePostgresqlFlexibleServer
metadata:
  name: my-ha-postgresql-server
spec:
  region: <azure-region>
  resourceGroup:
    value: "<your-resource-group-name>"
  name: <your-server-name>
  administratorLogin: <admin-username>
  administratorPassword:
    value: "<admin-password>"
  version: "16"  # default from spec
  skuName: GP_Standard_D4ds_v4  # 4 vCPU, 16 GiB — recommended for HA production
  storageMb: 65536  # 64 GB
  autoGrowEnabled: false  # default from spec
  zone: "1"  # primary in zone 1
  highAvailability:
    mode: ZoneRedundant
    standbyAvailabilityZone: "2"  # standby in zone 2
  backupRetentionDays: 14
  geoRedundantBackupEnabled: true  # cross-region backup for DR
  databases:
    - name: <your-database-name>
      charset: UTF8  # default from spec
      collation: en_US.utf8  # default from spec
  firewallRules:
    - name: allow-azure-services
      startIpAddress: 0.0.0.0
      endIpAddress: 0.0.0.0
