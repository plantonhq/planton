apiVersion: azure.openmcf.org/v1
kind: AzureStorageAccount
metadata:
  name: my-storage-account
spec:
  region: <azure-region>
  resourceGroup:
    value: "<your-resource-group-name>"
  accountKind: STORAGE_V2  # default from spec
  accountTier: STANDARD  # default from spec
  replicationType: LRS  # default from spec; locally redundant
  accessTier: HOT  # default from spec
  enableHttpsTrafficOnly: true  # default from spec
  minTlsVersion: TLS1_2  # default from spec
  networkRules:
    defaultAction: DENY  # default from spec
    bypassAzureServices: true  # default from spec
  blobProperties:
    enableVersioning: true
    softDeleteRetentionDays: 7  # default from spec
    containerSoftDeleteRetentionDays: 7  # default from spec
  containers:
    - name: data
    - name: backups
