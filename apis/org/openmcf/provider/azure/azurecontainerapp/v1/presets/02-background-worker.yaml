apiVersion: azure.openmcf.org/v1
kind: AzureContainerApp
metadata:
  name: my-worker
spec:
  resourceGroup:
    value: "<your-resource-group-name>"
  name: my-worker
  containerAppEnvironmentId:
    value: "<container-app-environment-id>"
  containers:
    - name: worker
      image: my-registry/my-worker:latest
      cpu: 0.25
      memory: "0.5Gi"
      env:
        - name: QUEUE_CONNECTION
          secretName: queue-connection
  minReplicas: 0
  maxReplicas: 5
  customScaleRules:
    - name: queue-depth
      customRuleType: azure-servicebus
      metadata:
        queueName: my-queue
        messageCount: "10"
      authentication:
        - secretName: queue-connection
          triggerParameter: connection
  secrets:
    - name: queue-connection
      value: "Endpoint=sb://my-namespace.servicebus.windows.net/;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=..."
