syntax = "proto3";

package org.openmcf.provider.azure.azureloganalyticsworkspace.v1;

import "buf/validate/validate.proto";
import "org/openmcf/shared/foreignkey/v1/foreign_key.proto";
import "org/openmcf/shared/options/options.proto";

// **AzureLogAnalyticsWorkspaceSpec** defines the configuration for creating an
// Azure Log Analytics Workspace.
//
// Log Analytics Workspaces are the central data platform for Azure Monitor. They
// collect, store, and analyze log and performance data from Azure resources,
// on-premises servers, and third-party services. Workspaces are the foundation
// for monitoring in Azure -- they power Container Insights (AKS), Application
// Insights, Microsoft Sentinel (SIEM), and dozens of other Azure monitoring solutions.
//
// This spec follows the 80/20 principle: exposing the essential fields that cover
// the vast majority of deployment scenarios while keeping the configuration minimal.
message AzureLogAnalyticsWorkspaceSpec {
  // The Azure region where the Log Analytics Workspace will be deployed.
  // Examples: "eastus", "westus2", "westeurope", "southeastasia".
  // Choose a region close to the resources that will send logs to this workspace
  // to minimize data egress costs and latency.
  string region = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1
  ];

  // The Azure Resource Group where the workspace will be created.
  // Can be a literal string or a reference to an AzureResourceGroup output.
  org.openmcf.shared.foreignkey.v1.StringValueOrRef resource_group = 2 [
    (buf.validate.field).required = true,
    (org.openmcf.shared.foreignkey.v1.default_kind) = AzureResourceGroup,
    (org.openmcf.shared.foreignkey.v1.default_kind_field_path) = "status.outputs.resource_group_name"
  ];

  // The name of the Log Analytics Workspace.
  // Must be unique within the resource group.
  // Allowed characters: alphanumeric and hyphens. Must start with a letter.
  // Length: 4 to 63 characters.
  string name = 3 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 4,
    (buf.validate.field).string.max_len = 63
  ];

  // The pricing tier (SKU) of the workspace.
  // - "PerGB2018": Pay-as-you-go pricing per GB ingested (recommended for most workloads)
  // - "CapacityReservation": Commitment tier with discount (requires reservation_capacity_in_gb_per_day)
  // - "Standalone": Legacy per-node pricing
  // - "PerNode": Legacy OMS per-node pricing
  // Default: PerGB2018
  optional string sku = 4 [(org.openmcf.shared.options.default) = "PerGB2018"];

  // The number of days to retain data in the workspace.
  // Range: 30 to 730 days.
  // Free tier allows 7 days. PerGB2018 includes 31 days free; beyond that, retention
  // is billed per GB per month. For compliance workloads, 90-365 days is typical.
  // Default: 30
  optional int32 retention_in_days = 5 [
    (buf.validate.field).int32 = {
      gte: 30
      lte: 730
    },
    (org.openmcf.shared.options.default) = "30"
  ];

  // The daily ingestion quota in GB.
  // Set to -1 for unlimited ingestion (no cap).
  // Set to a positive value to cap daily ingestion and prevent cost overruns.
  // When the cap is reached, ingestion stops until the next UTC day.
  // Default: -1 (unlimited)
  optional double daily_quota_gb = 6 [
    (buf.validate.field).double.gte = -1,
    (org.openmcf.shared.options.default) = "-1"
  ];
}
