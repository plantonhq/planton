syntax = "proto3";

package org.openmcf.provider.azure.azuremysqlflexibleserver.v1;

import "org/openmcf/provider/azure/azuremysqlflexibleserver/v1/api.proto";
import "org/openmcf/provider/azure/provider.proto";

// AzureMysqlFlexibleServerStackInput is the input to the IaC module.
// It contains the target resource and provider configuration.
message AzureMysqlFlexibleServerStackInput {
  // target cloud-resource to be deployed
  AzureMysqlFlexibleServer target = 1;
  // provider-config for Azure authentication
  org.openmcf.provider.azure.AzureProviderConfig provider_config = 2;
}
