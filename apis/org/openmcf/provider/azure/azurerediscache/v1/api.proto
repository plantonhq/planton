syntax = "proto3";

package org.openmcf.provider.azure.azurerediscache.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/azure/azurerediscache/v1/spec.proto";
import "org/openmcf/provider/azure/azurerediscache/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// AzureRedisCache is the top-level API resource for an Azure Cache for Redis.
// Azure Cache for Redis provides a fully managed, in-memory data store based
// on the open-source Redis engine. It supports caching, session management,
// real-time analytics, and message brokering with sub-millisecond latency.
message AzureRedisCache {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'azure.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AzureRedisCache'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AzureRedisCacheSpec spec = 4 [(buf.validate.field).required = true];

  // status
  AzureRedisCacheStatus status = 5;
}

// AzureRedisCacheStatus holds the deployment status and outputs.
message AzureRedisCacheStatus {
  // stack-outputs
  AzureRedisCacheStackOutputs outputs = 1;
}
