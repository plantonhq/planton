syntax = "proto3";

package org.openmcf.provider.azure.azurecosmosdbaccount.v1;

import "org/openmcf/provider/azure/azurecosmosdbaccount/v1/api.proto";
import "org/openmcf/provider/azure/provider.proto";

// AzureCosmosdbAccountStackInput is the input to the IaC module.
// It contains the target resource and provider configuration.
message AzureCosmosdbAccountStackInput {
  // target cloud-resource to be deployed
  AzureCosmosdbAccount target = 1;
  // provider-config for Azure authentication
  org.openmcf.provider.azure.AzureProviderConfig provider_config = 2;
}
