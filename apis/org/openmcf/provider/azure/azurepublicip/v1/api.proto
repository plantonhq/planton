syntax = "proto3";

package org.openmcf.provider.azure.azurepublicip.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/azure/azurepublicip/v1/spec.proto";
import "org/openmcf/provider/azure/azurepublicip/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// AzurePublicIp is the top-level API resource for an Azure Public IP Address.
// Public IPs provide static, internet-routable IPv4 addresses that can be attached
// to load balancers, application gateways, NAT gateways, and virtual machines.
message AzurePublicIp {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'azure.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AzurePublicIp'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AzurePublicIpSpec spec = 4 [(buf.validate.field).required = true];

  // status
  AzurePublicIpStatus status = 5;
}

// AzurePublicIpStatus holds the deployment status and outputs.
message AzurePublicIpStatus {
  // stack-outputs
  AzurePublicIpStackOutputs outputs = 1;
}
