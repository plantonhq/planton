syntax = "proto3";

package org.openmcf.provider.azure.azureresourcegroup.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/azure/azureresourcegroup/v1/spec.proto";
import "org/openmcf/provider/azure/azureresourcegroup/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// AzureResourceGroup is the top-level API resource for an Azure Resource Group.
// Resource groups are the foundational organizational unit in Azure -- every other
// Azure resource lives inside one.
message AzureResourceGroup {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'azure.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AzureResourceGroup'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AzureResourceGroupSpec spec = 4 [(buf.validate.field).required = true];

  // status
  AzureResourceGroupStatus status = 5;
}

// AzureResourceGroupStatus holds the deployment status and outputs.
message AzureResourceGroupStatus {
  // stack-outputs
  AzureResourceGroupStackOutputs outputs = 1;
}
