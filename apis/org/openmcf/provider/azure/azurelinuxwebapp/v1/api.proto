syntax = "proto3";

package org.openmcf.provider.azure.azurelinuxwebapp.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/azure/azurelinuxwebapp/v1/spec.proto";
import "org/openmcf/provider/azure/azurelinuxwebapp/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// AzureLinuxWebApp is the top-level API resource for an Azure Linux Web App.
// A web app is a fully managed web hosting platform for running HTTP-based
// applications, supporting multiple language runtimes (Node.js, Python, .NET,
// Java, PHP, Ruby, Go) and custom Docker containers.
//
// It runs on an AzureServicePlan and provides built-in load balancing,
// auto-scaling, and CI/CD integration.
message AzureLinuxWebApp {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'azure.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AzureLinuxWebApp'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AzureLinuxWebAppSpec spec = 4 [(buf.validate.field).required = true];

  // status
  AzureLinuxWebAppStatus status = 5;
}

// AzureLinuxWebAppStatus holds the deployment status and outputs.
message AzureLinuxWebAppStatus {
  // stack-outputs
  AzureLinuxWebAppStackOutputs outputs = 1;
}
