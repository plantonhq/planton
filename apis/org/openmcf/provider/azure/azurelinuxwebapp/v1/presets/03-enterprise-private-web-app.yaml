apiVersion: azure.openmcf.org/v1
kind: AzureLinuxWebApp
metadata:
  name: my-enterprise-webapp
spec:
  region: eastus
  resource_group:
    value: "<your-resource-group-name>"
  name: my-enterprise-webapp
  service_plan_id:
    value: "<your-premium-plan-id>"
  application_insights_connection_string:
    value: "<your-app-insights-connection-string>"
  https_only: true
  public_network_access_enabled: true
  virtual_network_subnet_id:
    value: "<your-vnet-subnet-id>"
  identity:
    type: SystemAssigned
  app_settings:
    ENVIRONMENT: production
    DB_CONNECTION: "@Microsoft.KeyVault(SecretUri=https://<your-keyvault>.vault.azure.net/secrets/db-connection)"
  logs:
    application_logs:
      file_system_level: Information
    http_logs:
      retention_in_mb: 50
      retention_in_days: 7
    failed_request_tracing: true
    detailed_error_messages: false
  site_config:
    application_stack:
      python_version: "3.12"
    always_on: true
    health_check_path: /health
    health_check_eviction_time_in_min: 5
    worker_count: 3
    minimum_tls_version: "1.2"
    ftps_state: Disabled
    http2_enabled: true
    vnet_route_all_enabled: true
    ip_restrictions:
      - name: allow-office
        priority: 100
        action: Allow
        ip_address: 203.0.113.0/24
        description: Corporate office CIDR
      - name: allow-vpn
        priority: 200
        action: Allow
        ip_address: 198.51.100.0/24
        description: VPN gateway CIDR
    ip_restriction_default_action: Deny
    scm_use_main_ip_restriction: true
    cors:
      allowed_origins:
        - https://portal.example.com
      support_credentials: true
