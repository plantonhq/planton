syntax = "proto3";

package org.openmcf.provider.azure.azureserviceplan.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/azure/azureserviceplan/v1/spec.proto";
import "org/openmcf/provider/azure/azureserviceplan/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// AzureServicePlan is the top-level API resource for an Azure App Service Plan.
// An App Service Plan defines the compute resources (region, VM size, instance
// count, pricing tier) that host Azure Web Apps, Function Apps, and Logic Apps.
message AzureServicePlan {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'azure.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AzureServicePlan'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AzureServicePlanSpec spec = 4 [(buf.validate.field).required = true];

  // status
  AzureServicePlanStatus status = 5;
}

// AzureServicePlanStatus holds the deployment status and outputs.
message AzureServicePlanStatus {
  // stack-outputs
  AzureServicePlanStackOutputs outputs = 1;
}
