syntax = "proto3";

package org.openmcf.provider.hetznercloud.hetznercloudvolume.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/hetznercloud/hetznercloudvolume/v1/spec.proto";
import "org/openmcf/provider/hetznercloud/hetznercloudvolume/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// hetznercloud-volume
message HetznerCloudVolume {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = "hetzner-cloud.openmcf.org/v1"];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = "HetznerCloudVolume"];

  //metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  HetznerCloudVolumeSpec spec = 4 [(buf.validate.field).required = true];

  //status
  HetznerCloudVolumeStatus status = 5;
}

// hetznercloud-volume status
message HetznerCloudVolumeStatus {
  //stack-outputs
  //  hetznercloud-volume stack-outputs
  HetznerCloudVolumeStackOutputs outputs = 1;
}
