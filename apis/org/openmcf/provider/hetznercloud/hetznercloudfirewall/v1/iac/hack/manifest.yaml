apiVersion: hetznercloud.openmcf.org/v1
kind: HetznerCloudFirewall
metadata:
  name: hetznercloudfirewall-demo
spec:
  rules:
    - direction: in
      protocol: tcp
      port: "22"
      sourceIps:
        - "0.0.0.0/0"
        - "::/0"
      description: "allow SSH from anywhere"
    - direction: in
      protocol: tcp
      port: "80"
      sourceIps:
        - "0.0.0.0/0"
        - "::/0"
      description: "allow HTTP"
    - direction: in
      protocol: tcp
      port: "443"
      sourceIps:
        - "0.0.0.0/0"
        - "::/0"
      description: "allow HTTPS"
    - direction: in
      protocol: icmp
      sourceIps:
        - "0.0.0.0/0"
        - "::/0"
      description: "allow ping"
    - direction: out
      protocol: tcp
      port: "any"
      destinationIps:
        - "0.0.0.0/0"
        - "::/0"
      description: "allow all outbound TCP"
    - direction: out
      protocol: udp
      port: "any"
      destinationIps:
        - "0.0.0.0/0"
        - "::/0"
      description: "allow all outbound UDP"
