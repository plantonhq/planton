syntax = "proto3";

package org.openmcf.provider.hetznercloud.hetznercloudplacementgroup.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/hetznercloud/hetznercloudplacementgroup/v1/spec.proto";
import "org/openmcf/provider/hetznercloud/hetznercloudplacementgroup/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// hetznercloud-placement-group
message HetznerCloudPlacementGroup {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = "hetznercloud.openmcf.org/v1"];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = "HetznerCloudPlacementGroup"];

  //metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  HetznerCloudPlacementGroupSpec spec = 4 [(buf.validate.field).required = true];

  //status
  HetznerCloudPlacementGroupStatus status = 5;
}

// hetznercloud-placement-group status
message HetznerCloudPlacementGroupStatus {
  //stack-outputs
  //  hetznercloud-placement-group stack-outputs
  HetznerCloudPlacementGroupStackOutputs outputs = 1;
}
