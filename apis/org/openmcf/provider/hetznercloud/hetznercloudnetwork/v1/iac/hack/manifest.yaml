apiVersion: hetznercloud.openmcf.org/v1
kind: HetznerCloudNetwork
metadata:
  name: hetznercloudnetwork-demo
spec:
  ipRange: "10.0.0.0/16"
  subnets:
    - type: cloud
      networkZone: eu-central
      ipRange: "10.0.1.0/24"
    - type: server
      networkZone: eu-central
      ipRange: "10.0.2.0/24"
  routes:
    - destination: "172.16.0.0/12"
      gateway: "10.0.0.1"
