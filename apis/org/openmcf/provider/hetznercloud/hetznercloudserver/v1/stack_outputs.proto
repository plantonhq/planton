syntax = "proto3";

package org.openmcf.provider.hetznercloud.hetznercloudserver.v1;

// HetznerCloudServerStackOutputs captures the resulting server identifiers
// and addresses after provisioning.
message HetznerCloudServerStackOutputs {
  // The Hetzner Cloud numeric ID of the created server (as a string).
  // Referenced by HetznerCloudVolume, HetznerCloudSnapshot,
  // HetznerCloudFloatingIp (assignment), and HetznerCloudLoadBalancer
  // (targets) via StringValueOrRef.
  string server_id = 1;

  // The public IPv4 address assigned to the server.
  // Empty if public IPv4 is disabled via public_net.ipv4_enabled = false.
  string ipv4_address = 2;

  // The first IPv6 address of the server's assigned /64 network.
  // Empty if public IPv6 is disabled via public_net.ipv6_enabled = false.
  string ipv6_address = 3;

  // The current status of the server (e.g., "running", "off",
  // "rebuilding", "migrating").
  string status = 4;
}
