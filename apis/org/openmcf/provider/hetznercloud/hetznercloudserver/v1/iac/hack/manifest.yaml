apiVersion: hetznercloud.openmcf.org/v1
kind: HetznerCloudServer
metadata:
  name: hetznercloudserver-demo
  org: demo-org
  env: dev
  labels:
    team: platform
spec:
  serverType: cx22
  image: ubuntu-24.04
  location: fsn1
  sshKeys:
    - value: "my-ssh-key"
  userData: |
    #!/bin/bash
    apt-get update && apt-get install -y nginx
  firewallIds:
    - value: "12345"
  networks:
    - networkId:
        value: "67890"
      ip: "10.0.1.5"
  backups: true
  dnsPtr: demo.example.com
