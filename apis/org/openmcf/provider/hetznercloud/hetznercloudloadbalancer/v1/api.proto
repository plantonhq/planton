syntax = "proto3";

package org.openmcf.provider.hetznercloud.hetznercloudloadbalancer.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/hetznercloud/hetznercloudloadbalancer/v1/spec.proto";
import "org/openmcf/provider/hetznercloud/hetznercloudloadbalancer/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// hetznercloud-load-balancer
message HetznerCloudLoadBalancer {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = "hetznercloud.openmcf.org/v1"];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = "HetznerCloudLoadBalancer"];

  //metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  HetznerCloudLoadBalancerSpec spec = 4 [(buf.validate.field).required = true];

  //status
  HetznerCloudLoadBalancerStatus status = 5;
}

// hetznercloud-load-balancer status
message HetznerCloudLoadBalancerStatus {
  //stack-outputs
  //  hetznercloud-load-balancer stack-outputs
  HetznerCloudLoadBalancerStackOutputs outputs = 1;
}
