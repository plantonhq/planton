syntax = "proto3";

package org.openmcf.provider.openstack.openstackservergroup.v1;

// OpenStackServerGroupStackOutputs captures the observable outputs after
// provisioning an OpenStack Compute server group.
//
// The server_group_id is the primary output referenced by downstream components:
// - OpenStackInstance (server_group_id -> scheduler_hints.group)
message OpenStackServerGroupStackOutputs {
  // server_group_id is the unique identifier (UUID) of the server group in OpenStack.
  // This is the primary output used as a foreign key by OpenStackInstance.
  string server_group_id = 1;

  // name is the name of the server group (derived from metadata.name).
  string name = 2;

  // members is the list of instance UUIDs that belong to this server group.
  // This is computed by OpenStack -- instances join the group when they are
  // launched with scheduler_hints referencing this server group's ID.
  // The list is empty at creation time and grows as instances are added.
  repeated string members = 3;

  // region is the OpenStack region where the server group was created.
  string region = 4;
}
