syntax = "proto3";

package org.openmcf.provider.openstack.openstackproject.v1;

// OpenStackProjectStackOutputs captures the observable outputs after
// provisioning an OpenStack Identity (Keystone) project.
//
// The project_id is the primary output referenced by downstream components:
// - OpenStackRoleAssignment (project_id FK)
// - InfraCharts for tenant-level resource provisioning
message OpenStackProjectStackOutputs {
  // project_id is the unique identifier (UUID) of the project in OpenStack.
  // This is the primary output used as a foreign key by OpenStackRoleAssignment
  // and other downstream resources that need to reference the project.
  string project_id = 1;

  // name is the name of the project (derived from metadata.name).
  string name = 2;

  // domain_id is the Keystone domain to which this project belongs.
  // Computed by OpenStack if not specified in the spec.
  string domain_id = 3;

  // enabled indicates whether the project is currently active.
  bool enabled = 4;

  // region is the OpenStack region where the project was created.
  string region = 5;
}
