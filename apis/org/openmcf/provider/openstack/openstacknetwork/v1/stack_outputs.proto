syntax = "proto3";

package org.openmcf.provider.openstack.openstacknetwork.v1;

// OpenStackNetworkStackOutputs captures the observable outputs after provisioning
// an OpenStack Neutron network.
//
// The network_id is the primary output referenced by downstream components:
// - OpenStackSubnet (network_id)
// - OpenStackRouter (external_network_id)
// - OpenStackNetworkPort (network_id)
// - OpenStackFloatingIp (floating_network_id)
// - OpenStackInstance (networks[].uuid)
message OpenStackNetworkStackOutputs {
  // network_id is the unique identifier (UUID) of the network in OpenStack.
  // This is the primary output used as a foreign key by downstream components.
  string network_id = 1;

  // name is the name of the network (derived from metadata.name).
  string name = 2;

  // region is the OpenStack region where the network was created.
  string region = 3;
}
