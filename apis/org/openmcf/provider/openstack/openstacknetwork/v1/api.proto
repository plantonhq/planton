syntax = "proto3";

package org.openmcf.provider.openstack.openstacknetwork.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/openstack/openstacknetwork/v1/spec.proto";
import "org/openmcf/provider/openstack/openstacknetwork/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// OpenStackNetwork is a Kubernetes Resource Model (KRM) style resource for managing
// Neutron networks in OpenStack.
//
// Networks are the foundational networking primitive in OpenStack, providing isolated
// Layer 2 broadcast domains. All other networking resources (subnets, ports, routers,
// security groups) attach to or reference a network.
message OpenStackNetwork {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'openstack.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'OpenStackNetwork'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  OpenStackNetworkSpec spec = 4 [(buf.validate.field).required = true];

  // status
  OpenStackNetworkStatus status = 5;
}

// OpenStackNetworkStatus represents the observed state of an OpenStack Neutron network.
message OpenStackNetworkStatus {
  // stack-outputs from the IaC deployment
  OpenStackNetworkStackOutputs outputs = 1;
}
