syntax = "proto3";

package org.openmcf.provider.openstack.openstackinstance.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/openstack/openstackinstance/v1/spec.proto";
import "org/openmcf/provider/openstack/openstackinstance/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// OpenStackInstance is a Kubernetes Resource Model (KRM) style resource
// for managing OpenStack Compute instances.
//
// An instance is a virtual machine running on an OpenStack cloud. It is the
// fundamental compute resource -- every developer workload, application server,
// database, and CI runner is an instance.
//
// Instances bind together networking (networks/ports), storage (images/volumes),
// access control (keypairs/security groups), and placement (server groups/AZs)
// into a running virtual machine.
message OpenStackInstance {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'openstack.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'OpenStackInstance'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  OpenStackInstanceSpec spec = 4 [(buf.validate.field).required = true];

  // status
  OpenStackInstanceStatus status = 5;
}

// OpenStackInstanceStatus represents the observed state of an OpenStack instance.
message OpenStackInstanceStatus {
  // stack-outputs from the IaC deployment
  OpenStackInstanceStackOutputs outputs = 1;
}
