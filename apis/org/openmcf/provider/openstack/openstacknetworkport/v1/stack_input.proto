syntax = "proto3";

package org.openmcf.provider.openstack.openstacknetworkport.v1;

import "org/openmcf/provider/openstack/openstacknetworkport/v1/api.proto";
import "org/openmcf/provider/openstack/provider.proto";

// OpenStackNetworkPortStackInput is the input to the IaC module.
// It contains the target resource and provider configuration.
message OpenStackNetworkPortStackInput {
  // target cloud-resource to be deployed
  OpenStackNetworkPort target = 1;
  // provider-config for OpenStack authentication
  org.openmcf.provider.openstack.OpenStackProviderConfig provider_config = 2;
}
