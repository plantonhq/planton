syntax = "proto3";

package org.openmcf.provider.openstack.openstackdnszone.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/openstack/openstackdnszone/v1/spec.proto";
import "org/openmcf/provider/openstack/openstackdnszone/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// OpenStackDnsZone is a Kubernetes Resource Model (KRM) style resource for managing
// Designate DNS zones in OpenStack.
//
// A DNS zone represents an authoritative domain managed by the OpenStack Designate
// service. It can optionally include inline DNS records that are provisioned alongside
// the zone. For independently managed records (DAG-visible in InfraCharts), use the
// standalone OpenStackDnsRecord component.
message OpenStackDnsZone {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'openstack.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'OpenStackDnsZone'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  OpenStackDnsZoneSpec spec = 4 [(buf.validate.field).required = true];

  // status
  OpenStackDnsZoneStatus status = 5;
}

// OpenStackDnsZoneStatus represents the observed state of a Designate DNS zone.
message OpenStackDnsZoneStatus {
  // stack-outputs from the IaC deployment
  OpenStackDnsZoneStackOutputs outputs = 1;
}
