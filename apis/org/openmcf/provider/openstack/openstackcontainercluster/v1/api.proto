syntax = "proto3";

package org.openmcf.provider.openstack.openstackcontainercluster.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/openstack/openstackcontainercluster/v1/spec.proto";
import "org/openmcf/provider/openstack/openstackcontainercluster/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// OpenStackContainerCluster is a Kubernetes Resource Model (KRM) style resource
// for managing Magnum container clusters in OpenStack.
//
// A Magnum cluster provisions a fully functional Kubernetes cluster using a
// cluster template as a blueprint. The cluster manages master and worker nodes,
// networking, and outputs the kubeconfig needed to access the Kubernetes API.
//
// Important: Almost all fields are ForceNew. Only node_count (scale) and
// cluster_template (upgrade) can be updated after creation.
message OpenStackContainerCluster {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'openstack.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'OpenStackContainerCluster'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  OpenStackContainerClusterSpec spec = 4 [(buf.validate.field).required = true];

  // status
  OpenStackContainerClusterStatus status = 5;
}

// OpenStackContainerClusterStatus represents the observed state of a Magnum cluster.
message OpenStackContainerClusterStatus {
  // stack-outputs from the IaC deployment
  OpenStackContainerClusterStackOutputs outputs = 1;
}
