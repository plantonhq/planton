syntax = "proto3";

package org.openmcf.provider.openstack.openstackcontainercluster.v1;

// OpenStackContainerClusterStackOutputs captures the observable outputs after
// provisioning a Magnum container cluster in OpenStack.
//
// Several outputs contain sensitive credentials (kubeconfig fields) and are
// marked as secret in the IaC modules.
message OpenStackContainerClusterStackOutputs {
  // cluster_id is the unique identifier (UUID) of the cluster.
  string cluster_id = 1;

  // name is the name of the cluster (derived from metadata.name).
  string name = 2;

  // api_address is the Kubernetes API server endpoint URL.
  // Example: "https://10.0.0.5:6443"
  // This is the primary endpoint for kubectl and K8s client access.
  string api_address = 3;

  // coe_version is the version of the container orchestration engine.
  // Example: "v1.28.4" for Kubernetes.
  string coe_version = 4;

  // master_addresses is the list of IP addresses for master nodes.
  repeated string master_addresses = 5;

  // node_addresses is the list of IP addresses for worker nodes.
  repeated string node_addresses = 6;

  // kubeconfig_raw is the full kubeconfig YAML for accessing the cluster.
  // Contains all credentials needed for kubectl access.
  // SENSITIVE: This field contains private keys and certificates.
  string kubeconfig_raw = 7;

  // kubeconfig_host is the Kubernetes API server URL from the kubeconfig.
  // Example: "https://10.0.0.5:6443"
  string kubeconfig_host = 8;

  // kubeconfig_cluster_ca_cert is the cluster CA certificate in PEM format.
  // Used to verify the identity of the Kubernetes API server.
  // SENSITIVE: This is a certificate.
  string kubeconfig_cluster_ca_cert = 9;

  // kubeconfig_client_cert is the client certificate in PEM format.
  // Used for client authentication to the Kubernetes API server.
  // SENSITIVE: This is a certificate.
  string kubeconfig_client_cert = 10;

  // kubeconfig_client_key is the client private key in PEM format.
  // Used for client authentication to the Kubernetes API server.
  // SENSITIVE: This is a private key.
  string kubeconfig_client_key = 11;

  // region is the OpenStack region where the cluster was created.
  string region = 12;
}
