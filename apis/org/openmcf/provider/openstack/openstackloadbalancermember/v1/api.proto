syntax = "proto3";

package org.openmcf.provider.openstack.openstackloadbalancermember.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/openstack/openstackloadbalancermember/v1/spec.proto";
import "org/openmcf/provider/openstack/openstackloadbalancermember/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// OpenStackLoadBalancerMember is a Kubernetes Resource Model (KRM) style resource
// for managing Octavia pool members in OpenStack.
//
// A member represents a backend server in a load balancer pool. It defines the
// IP address and port where the backend listens, along with an optional weight
// for weighted load distribution. Members can be on the same subnet as the VIP
// or on a different subnet (cross-subnet routing via Octavia).
message OpenStackLoadBalancerMember {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'openstack.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'OpenStackLoadBalancerMember'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  OpenStackLoadBalancerMemberSpec spec = 4 [(buf.validate.field).required = true];

  // status
  OpenStackLoadBalancerMemberStatus status = 5;
}

// OpenStackLoadBalancerMemberStatus represents the observed state of an Octavia pool member.
message OpenStackLoadBalancerMemberStatus {
  // stack-outputs from the IaC deployment
  OpenStackLoadBalancerMemberStackOutputs outputs = 1;
}
