syntax = "proto3";

package org.openmcf.provider.openstack.openstackloadbalancermember.v1;

import "org/openmcf/provider/openstack/openstackloadbalancermember/v1/api.proto";
import "org/openmcf/provider/openstack/provider.proto";

// OpenStackLoadBalancerMemberStackInput is the input to the IaC module.
// It contains the target resource and provider configuration.
message OpenStackLoadBalancerMemberStackInput {
  // target cloud-resource to be deployed
  OpenStackLoadBalancerMember target = 1;
  // provider-config for OpenStack authentication
  org.openmcf.provider.openstack.OpenStackProviderConfig provider_config = 2;
}
