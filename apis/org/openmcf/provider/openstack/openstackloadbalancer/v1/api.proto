syntax = "proto3";

package org.openmcf.provider.openstack.openstackloadbalancer.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/openstack/openstackloadbalancer/v1/spec.proto";
import "org/openmcf/provider/openstack/openstackloadbalancer/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// OpenStackLoadBalancer is a Kubernetes Resource Model (KRM) style resource for managing
// Octavia load balancers in OpenStack.
//
// An Octavia load balancer provides a Virtual IP (VIP) endpoint on a subnet.
// Listeners, pools, members, and health monitors are attached to it to distribute
// traffic across backend servers. The VIP can be associated with a floating IP
// for external access.
message OpenStackLoadBalancer {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'openstack.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'OpenStackLoadBalancer'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  OpenStackLoadBalancerSpec spec = 4 [(buf.validate.field).required = true];

  // status
  OpenStackLoadBalancerStatus status = 5;
}

// OpenStackLoadBalancerStatus represents the observed state of an Octavia load balancer.
message OpenStackLoadBalancerStatus {
  // stack-outputs from the IaC deployment
  OpenStackLoadBalancerStackOutputs outputs = 1;
}
