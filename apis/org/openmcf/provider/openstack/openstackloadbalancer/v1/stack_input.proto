syntax = "proto3";

package org.openmcf.provider.openstack.openstackloadbalancer.v1;

import "org/openmcf/provider/openstack/openstackloadbalancer/v1/api.proto";
import "org/openmcf/provider/openstack/provider.proto";

// OpenStackLoadBalancerStackInput is the input to the IaC module.
// It contains the target resource and provider configuration.
message OpenStackLoadBalancerStackInput {
  // target cloud-resource to be deployed
  OpenStackLoadBalancer target = 1;
  // provider-config for OpenStack authentication
  org.openmcf.provider.openstack.OpenStackProviderConfig provider_config = 2;
}
