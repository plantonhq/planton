syntax = "proto3";

package org.openmcf.provider.openstack.openstackapplicationcredential.v1;

// OpenStackApplicationCredentialStackOutputs captures the observable outputs
// after provisioning an OpenStack application credential.
//
// WARNING: The secret output is sensitive. It is generated once at creation
// time and cannot be retrieved again from the OpenStack API. Both Pulumi and
// Terraform mark this field as sensitive in their state files.
message OpenStackApplicationCredentialStackOutputs {
  // id is the unique identifier of the application credential in Keystone.
  string id = 1;

  // name is the name of the application credential (from metadata.name).
  string name = 2;

  // secret is the application credential secret.
  // SENSITIVE: This value is generated once at creation time. If a user-provided
  // secret was specified in the spec, this echoes that value. Otherwise, it
  // contains the auto-generated secret from OpenStack.
  // This value is essential for downstream automation that uses this credential.
  string secret = 3;

  // project_id is the UUID of the project this credential is scoped to.
  // Computed from the authentication scope used during creation.
  string project_id = 4;

  // region is the OpenStack region where the credential was created.
  string region = 5;
}
