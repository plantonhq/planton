apiVersion: openstack.openmcf.org/v1
kind: OpenStackLoadBalancerPool
metadata:
  name: my-sticky-pool
spec:
  listenerId:
    value: <listener-id>
  protocol: HTTP
  lbMethod: ROUND_ROBIN
  persistence:
    type: HTTP_COOKIE
  description: Round-robin HTTP pool with cookie-based session persistence
