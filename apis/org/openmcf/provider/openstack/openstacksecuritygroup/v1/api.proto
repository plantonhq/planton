syntax = "proto3";

package org.openmcf.provider.openstack.openstacksecuritygroup.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/openstack/openstacksecuritygroup/v1/spec.proto";
import "org/openmcf/provider/openstack/openstacksecuritygroup/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// OpenStackSecurityGroup is a Kubernetes Resource Model (KRM) style resource for
// managing Neutron security groups in OpenStack.
//
// A security group acts as a virtual firewall for instances and ports, controlling
// ingress and egress traffic through a set of rules. This component supports
// inline rules for convenience (rules defined in the spec) and is also referenced
// by the standalone OpenStackSecurityGroupRule component for DAG-visible rule
// management in InfraCharts.
//
// Security groups are referenced by network ports, instances, and other networking
// resources as the primary mechanism for network-level access control.
message OpenStackSecurityGroup {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'openstack.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'OpenStackSecurityGroup'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  OpenStackSecurityGroupSpec spec = 4 [(buf.validate.field).required = true];

  // status
  OpenStackSecurityGroupStatus status = 5;
}

// OpenStackSecurityGroupStatus represents the observed state of an OpenStack
// Neutron security group.
message OpenStackSecurityGroupStatus {
  // stack-outputs from the IaC deployment
  OpenStackSecurityGroupStackOutputs outputs = 1;
}
