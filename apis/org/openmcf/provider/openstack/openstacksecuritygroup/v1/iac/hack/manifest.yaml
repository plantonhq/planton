apiVersion: openstack.openmcf.org/v1
kind: OpenStackSecurityGroup
metadata:
  name: test-sg
spec:
  description: "Test security group for local development"
  delete_default_rules: true
  rules:
    - key: allow-ssh
      direction: ingress
      ethertype: IPv4
      protocol: tcp
      port_range_min: 22
      port_range_max: 22
      remote_ip_prefix: "0.0.0.0/0"
      description: "Allow SSH from anywhere"
    - key: allow-http
      direction: ingress
      ethertype: IPv4
      protocol: tcp
      port_range_min: 80
      port_range_max: 80
      remote_ip_prefix: "0.0.0.0/0"
      description: "Allow HTTP from anywhere"
    - key: egress-all-ipv4
      direction: egress
      ethertype: IPv4
