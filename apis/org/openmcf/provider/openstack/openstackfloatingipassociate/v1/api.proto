syntax = "proto3";

package org.openmcf.provider.openstack.openstackfloatingipassociate.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/openstack/openstackfloatingipassociate/v1/spec.proto";
import "org/openmcf/provider/openstack/openstackfloatingipassociate/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// OpenStackFloatingIpAssociate is a Kubernetes Resource Model (KRM) style
// resource for associating an OpenStack Neutron floating IP with a port.
//
// This is a "join" resource that connects two independently managed resources:
//   - A floating IP (allocated via OpenStackFloatingIp)
//   - A port (created via OpenStackNetworkPort)
//
// In InfraCharts, this component appears as a visible DAG node with dependency
// edges to both the floating IP and the port, making the association relationship
// explicit and transparent.
//
// Use this component when:
//   - The floating IP and port are managed as separate InfraChart components
//   - You need DAG visibility of the association relationship
//   - The floating IP allocation is decoupled from its use
//
// Use OpenStackFloatingIp.spec.port_id instead when:
//   - Allocation and association happen together in a single manifest
//   - DAG visibility of the association is not needed
message OpenStackFloatingIpAssociate {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'openstack.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'OpenStackFloatingIpAssociate'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  OpenStackFloatingIpAssociateSpec spec = 4 [(buf.validate.field).required = true];

  // status
  OpenStackFloatingIpAssociateStatus status = 5;
}

// OpenStackFloatingIpAssociateStatus represents the observed state of an
// OpenStack floating IP association.
message OpenStackFloatingIpAssociateStatus {
  // stack-outputs from the IaC deployment
  OpenStackFloatingIpAssociateStackOutputs outputs = 1;
}
