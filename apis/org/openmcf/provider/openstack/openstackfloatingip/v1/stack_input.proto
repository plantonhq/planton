syntax = "proto3";

package org.openmcf.provider.openstack.openstackfloatingip.v1;

import "org/openmcf/provider/openstack/openstackfloatingip/v1/api.proto";
import "org/openmcf/provider/openstack/provider.proto";

// OpenStackFloatingIpStackInput is the input to the IaC module.
// It contains the target resource and provider configuration.
message OpenStackFloatingIpStackInput {
  // target cloud-resource to be deployed
  OpenStackFloatingIp target = 1;
  // provider-config for OpenStack authentication
  org.openmcf.provider.openstack.OpenStackProviderConfig provider_config = 2;
}
