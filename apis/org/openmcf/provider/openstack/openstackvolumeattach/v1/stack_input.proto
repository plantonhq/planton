syntax = "proto3";

package org.openmcf.provider.openstack.openstackvolumeattach.v1;

import "org/openmcf/provider/openstack/openstackvolumeattach/v1/api.proto";
import "org/openmcf/provider/openstack/provider.proto";

// OpenStackVolumeAttachStackInput is the input to the IaC module.
// It contains the target resource and provider configuration.
message OpenStackVolumeAttachStackInput {
  // target cloud-resource to be deployed
  OpenStackVolumeAttach target = 1;
  // provider-config for OpenStack authentication
  org.openmcf.provider.openstack.OpenStackProviderConfig provider_config = 2;
}
