syntax = "proto3";

package org.openmcf.provider.openstack.openstackdnsrecord.v1;

import "org/openmcf/provider/openstack/openstackdnsrecord/v1/api.proto";
import "org/openmcf/provider/openstack/provider.proto";

// OpenStackDnsRecordStackInput is the input to the IaC module.
// It contains the target resource and provider configuration.
message OpenStackDnsRecordStackInput {
  // target cloud-resource to be deployed
  OpenStackDnsRecord target = 1;
  // provider-config for OpenStack authentication
  org.openmcf.provider.openstack.OpenStackProviderConfig provider_config = 2;
}
