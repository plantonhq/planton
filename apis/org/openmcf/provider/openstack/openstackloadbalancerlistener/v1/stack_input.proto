syntax = "proto3";

package org.openmcf.provider.openstack.openstackloadbalancerlistener.v1;

import "org/openmcf/provider/openstack/openstackloadbalancerlistener/v1/api.proto";
import "org/openmcf/provider/openstack/provider.proto";

// OpenStackLoadBalancerListenerStackInput is the input to the IaC module.
// It contains the target resource and provider configuration.
message OpenStackLoadBalancerListenerStackInput {
  // target cloud-resource to be deployed
  OpenStackLoadBalancerListener target = 1;
  // provider-config for OpenStack authentication
  org.openmcf.provider.openstack.OpenStackProviderConfig provider_config = 2;
}
