apiVersion: openstack.openmcf.org/v1
kind: OpenStackSecurityGroupRule
metadata:
  name: test-allow-ssh
spec:
  security_group_id:
    value: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
  direction: ingress
  ethertype: IPv4
  protocol: tcp
  port_range_min: 22
  port_range_max: 22
  remote_ip_prefix: "0.0.0.0/0"
  description: "Test rule -- allow SSH from anywhere"
