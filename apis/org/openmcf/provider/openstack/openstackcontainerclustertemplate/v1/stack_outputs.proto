syntax = "proto3";

package org.openmcf.provider.openstack.openstackcontainerclustertemplate.v1;

// OpenStackContainerClusterTemplateStackOutputs captures the observable outputs
// after provisioning a Magnum cluster template in OpenStack.
//
// The template_id is the primary output referenced by downstream components:
// - OpenStackContainerCluster (cluster_template)
message OpenStackContainerClusterTemplateStackOutputs {
  // template_id is the unique identifier (UUID) of the cluster template.
  // This is the primary output used as a foreign key by cluster components.
  string template_id = 1;

  // name is the name of the cluster template (derived from metadata.name).
  string name = 2;

  // coe is the Container Orchestration Engine configured in the template.
  // Example: "kubernetes"
  string coe = 3;

  // region is the OpenStack region where the template was created.
  string region = 4;
}
