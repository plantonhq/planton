syntax = "proto3";

package org.openmcf.provider.openstack.openstackcontainerclustertemplate.v1;

import "org/openmcf/provider/openstack/openstackcontainerclustertemplate/v1/api.proto";
import "org/openmcf/provider/openstack/provider.proto";

// OpenStackContainerClusterTemplateStackInput is the input to the IaC module.
// It contains the target resource and provider configuration.
message OpenStackContainerClusterTemplateStackInput {
  // target cloud-resource to be deployed
  OpenStackContainerClusterTemplate target = 1;
  // provider-config for OpenStack authentication
  org.openmcf.provider.openstack.OpenStackProviderConfig provider_config = 2;
}
