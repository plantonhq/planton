syntax = "proto3";

package org.openmcf.provider.oci.ocicompartment.v1;

import "org/openmcf/provider/oci/ocicompartment/v1/api.proto";
import "org/openmcf/provider/oci/provider.proto";

// OciCompartmentStackInput is the input to the IaC modules (Pulumi / Terraform)
// that deploy an OciCompartment resource.
message OciCompartmentStackInput {
  // target cloud-resource
  OciCompartment target = 1;
  // provider-config
  org.openmcf.provider.oci.OciProviderConfig provider_config = 2;
}
