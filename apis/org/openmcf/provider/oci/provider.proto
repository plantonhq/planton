syntax = "proto3";

package org.openmcf.provider.oci;

import "buf/validate/validate.proto";

// AuthenticationType selects which credential sub-message is active in OciProviderConfig.
// Defined at package scope to avoid protobuf C++ scoping conflicts between enum values
// and message field names (both share the enclosing message scope when nested).
enum AuthenticationType {
  authentication_type_unspecified = 0;
  api_key = 1;
  instance_principal = 2;
  security_token = 3;
  resource_principal = 4;
  oke_workload_identity = 5;
}

// OciProviderConfig defines the credentials and connection parameters required to interact
// with Oracle Cloud Infrastructure (OCI). This message supports five authentication methods
// via an explicit AuthenticationType enum discriminator, with separate sub-messages for methods
// that carry credential fields.
//
// Consumers MUST check authentication_type to determine which sub-message to read.
// Only the sub-message corresponding to the active authentication_type is populated;
// the remaining sub-message fields should be ignored.
//
// Supported authentication methods:
//   1. api_key              -- API key-based auth using tenancy/user OCID, fingerprint, and private key.
//   2. instance_principal   -- Ambient auth on OCI compute instances (no credential fields).
//   3. security_token       -- Session-based auth using an OCI CLI config file profile.
//   4. resource_principal   -- Ambient auth for OCI Functions and other OCI resources (no credential fields).
//   5. oke_workload_identity -- Ambient auth for pods running on OKE (no credential fields).
//
// InstancePrincipalWithCerts is intentionally excluded -- it requires physical certificate files
// on the local machine and is rarely used outside testing environments.
//
// The region field applies to all authentication methods and is emitted as OCI_REGION.
// The authentication_type value maps to OCI_AUTH with the canonical Terraform provider string
// (e.g., api_key -> "ApiKey", instance_principal -> "InstancePrincipal").
//
// Environment variable convention: All fields use the OCI_* prefix (e.g., OCI_TENANCY_OCID).
// The Terraform OCI provider also accepts TF_VAR_* but OCI_* is used for consistency with
// how other OpenMCF providers use provider-specific prefixes (AWS_*, SCW_*, OS_*).
//
// For more information:
// - Terraform provider docs: https://registry.terraform.io/providers/oracle/oci/latest/docs
// - OCI API signing key: https://docs.oracle.com/en-us/iaas/Content/API/Concepts/apisigningkey.htm
message OciProviderConfig {
  // authentication_type selects the active credential sub-message.
  // Consumers switch on this value to determine which sub-message to read.
  AuthenticationType authentication_type = 1 [(buf.validate.field).required = true];

  // --- Common fields (apply to all authentication methods) ---

  // region is the OCI region identifier for API requests.
  // Examples: "us-ashburn-1", "us-phoenix-1", "eu-frankfurt-1", "ap-tokyo-1"
  // Environment variable: OCI_REGION
  string region = 2;

  // --- Authentication method sub-messages ---

  // api_key is populated when authentication_type is api_key.
  OciApiKeyAuth api_key = 10;

  // security_token is populated when authentication_type is security_token.
  OciSecurityTokenAuth security_token = 11;

  // instance_principal, resource_principal, and oke_workload_identity have no credential
  // fields beyond region -- the enum value alone is sufficient. No sub-messages needed.
}

// OciApiKeyAuth provides authentication via an OCI API signing key.
// This is the most common authentication method for OCI and requires generating
// an API key pair in the OCI Console (Identity > Users > API Keys).
//
// The private key can be provided either inline (private_key) or as a file path
// (private_key_path). When storing credentials in OpenMCF, only private_key (inline)
// is used; private_key_path is available for CLI config file usage.
//
// Environment variable mapping:
//   tenancy_ocid         -> OCI_TENANCY_OCID
//   user_ocid            -> OCI_USER_OCID
//   fingerprint          -> OCI_FINGERPRINT
//   private_key          -> OCI_PRIVATE_KEY
//   private_key_path     -> OCI_PRIVATE_KEY_PATH
//   private_key_password -> OCI_PRIVATE_KEY_PASSWORD
message OciApiKeyAuth {
  // tenancy_ocid is the OCID of the tenancy.
  // Format: ocid1.tenancy.oc1..<unique_id>
  // Environment variable: OCI_TENANCY_OCID
  string tenancy_ocid = 1 [(buf.validate.field).required = true];

  // user_ocid is the OCID of the user.
  // Format: ocid1.user.oc1..<unique_id>
  // Environment variable: OCI_USER_OCID
  string user_ocid = 2 [(buf.validate.field).required = true];

  // fingerprint is the MD5 fingerprint of the API signing key.
  // Format: aa:bb:cc:dd:ee:ff:00:11:22:33:44:55:66:77:88:99
  // Environment variable: OCI_FINGERPRINT
  string fingerprint = 3 [(buf.validate.field).required = true];

  // private_key is the PEM-formatted RSA private key content.
  // Provide either private_key or private_key_path, not both.
  // Environment variable: OCI_PRIVATE_KEY
  string private_key = 4;

  // private_key_path is the filesystem path to the PEM-formatted private key file.
  // Provide either private_key or private_key_path, not both.
  // Only usable via --provider-config CLI flag; not stored in credential storage.
  // Environment variable: OCI_PRIVATE_KEY_PATH
  string private_key_path = 5;

  // private_key_password is the passphrase for an encrypted private key.
  // Leave empty if the private key is not encrypted.
  // Environment variable: OCI_PRIVATE_KEY_PASSWORD
  string private_key_password = 6;
}

// OciSecurityTokenAuth provides authentication via an OCI CLI security token session.
// The user first authenticates with `oci session authenticate` which creates a token
// stored in the OCI config file (~/.oci/config) under a named profile.
//
// Environment variable mapping:
//   config_file_profile  -> OCI_CONFIG_FILE_PROFILE
//   private_key_password -> OCI_PRIVATE_KEY_PASSWORD
message OciSecurityTokenAuth {
  // config_file_profile is the name of the profile in ~/.oci/config to use.
  // The profile must contain a valid security token from `oci session authenticate`.
  // Environment variable: OCI_CONFIG_FILE_PROFILE
  string config_file_profile = 1 [(buf.validate.field).required = true];

  // private_key_password is the passphrase for the private key referenced by the profile.
  // Leave empty if the private key is not encrypted.
  // Environment variable: OCI_PRIVATE_KEY_PASSWORD
  string private_key_password = 2;
}
