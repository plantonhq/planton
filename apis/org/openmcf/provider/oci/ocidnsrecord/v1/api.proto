syntax = "proto3";

package org.openmcf.provider.oci.ocidnsrecord.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/oci/ocidnsrecord/v1/spec.proto";
import "org/openmcf/provider/oci/ocidnsrecord/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// OciDnsRecord is the top-level resource representing an OCI DNS
// Record Set (RRSet) -- a set of DNS resource records sharing the
// same domain and record type within an OCI DNS zone.
message OciDnsRecord {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'oci.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'OciDnsRecord'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  OciDnsRecordSpec spec = 4 [(buf.validate.field).required = true];

  // status
  OciDnsRecordStatus status = 5;
}

// OciDnsRecordStatus holds the outputs produced by deploying an OciDnsRecord.
message OciDnsRecordStatus {
  // stack-outputs
  OciDnsRecordStackOutputs outputs = 1;
}
