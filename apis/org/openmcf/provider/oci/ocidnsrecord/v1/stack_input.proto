syntax = "proto3";

package org.openmcf.provider.oci.ocidnsrecord.v1;

import "org/openmcf/provider/oci/ocidnsrecord/v1/api.proto";
import "org/openmcf/provider/oci/provider.proto";

// OciDnsRecordStackInput is the input to the IaC modules
// (Pulumi / Terraform) that deploy an OciDnsRecord resource.
message OciDnsRecordStackInput {
  // target cloud-resource
  OciDnsRecord target = 1;
  // provider-config
  org.openmcf.provider.oci.OciProviderConfig provider_config = 2;
}
