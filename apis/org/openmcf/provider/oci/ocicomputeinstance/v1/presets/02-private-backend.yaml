apiVersion: oci.openmcf.org/v1
kind: OciComputeInstance
metadata:
  name: my-private-backend-instance
spec:
  compartmentId:
    value: <compartment-ocid>
  availabilityDomain: <availability-domain>
  shape: VM.Standard.E4.Flex
  shapeConfig:
    ocpus: 2
    memoryInGbs: 32
  sourceDetails:
    sourceType: image
    sourceId: <image-ocid>
    bootVolumeSizeInGbs: 100
    bootVolumeVpusPerGb: 20
  createVnicDetails:
    subnetId:
      value: <private-subnet-ocid>
    nsgIds:
      - value: <nsg-ocid>
    assignPublicIp: false
    hostnameLabel: mybackend
    assignPrivateDnsRecord: true
  isPvEncryptionInTransitEnabled: true
  instanceOptions:
    areLegacyImdsEndpointsDisabled: true
  availabilityConfig:
    isLiveMigrationPreferred: true
    recoveryAction: restore_instance
  metadata:
    ssh_authorized_keys: <ssh-public-key>
