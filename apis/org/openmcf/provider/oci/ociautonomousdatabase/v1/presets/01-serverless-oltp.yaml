apiVersion: oci.openmcf.org/v1
kind: OciAutonomousDatabase
metadata:
  name: my-atp
spec:
  compartmentId:
    value: <compartment-ocid>
  dbName: myatpdb
  displayName: atp
  dbWorkload: oltp
  databaseEdition: standard_edition
  licenseModel: license_included
  computeModel: ecpu
  computeCount: 4
  dataStorageSizeInTbs: 1
  isAutoScalingEnabled: true
  isAutoScalingForStorageEnabled: true
  adminPassword: <admin-password>
  subnetId:
    value: <private-subnet-ocid>
  nsgIds:
    - value: <db-nsg-ocid>
  privateEndpointLabel: atp
  isMtlsConnectionRequired: false # Allow TLS-only connections for simpler client configuration
  autonomousMaintenanceScheduleType: regular
