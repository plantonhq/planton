syntax = "proto3";

package org.openmcf.provider.oci.ociblockvolume.v1;

import "org/openmcf/provider/oci/ociblockvolume/v1/api.proto";
import "org/openmcf/provider/oci/provider.proto";

// OciBlockVolumeStackInput is the input to the IaC modules
// (Pulumi / Terraform) that deploy an OciBlockVolume resource.
message OciBlockVolumeStackInput {
  // target cloud-resource
  OciBlockVolume target = 1;
  // provider-config
  org.openmcf.provider.oci.OciProviderConfig provider_config = 2;
}
