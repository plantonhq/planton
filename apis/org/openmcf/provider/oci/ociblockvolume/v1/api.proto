syntax = "proto3";

package org.openmcf.provider.oci.ociblockvolume.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/oci/ociblockvolume/v1/spec.proto";
import "org/openmcf/provider/oci/ociblockvolume/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// OciBlockVolume is the top-level resource representing an OCI Block Volume
// with optional backup policy assignment and cross-region replicas.
message OciBlockVolume {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'oci.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'OciBlockVolume'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  OciBlockVolumeSpec spec = 4 [(buf.validate.field).required = true];

  // status
  OciBlockVolumeStatus status = 5;
}

// OciBlockVolumeStatus holds the outputs produced by deploying
// an OciBlockVolume.
message OciBlockVolumeStatus {
  // stack-outputs
  OciBlockVolumeStackOutputs outputs = 1;
}
