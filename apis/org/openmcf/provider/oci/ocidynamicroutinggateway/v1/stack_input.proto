syntax = "proto3";

package org.openmcf.provider.oci.ocidynamicroutinggateway.v1;

import "org/openmcf/provider/oci/ocidynamicroutinggateway/v1/api.proto";
import "org/openmcf/provider/oci/provider.proto";

// OciDynamicRoutingGatewayStackInput is the input to the IaC modules
// (Pulumi / Terraform) that deploy an OciDynamicRoutingGateway resource.
message OciDynamicRoutingGatewayStackInput {
  // target cloud-resource
  OciDynamicRoutingGateway target = 1;
  // provider-config
  org.openmcf.provider.oci.OciProviderConfig provider_config = 2;
}
