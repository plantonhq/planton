syntax = "proto3";

package org.openmcf.provider.oci.ocikmsvault.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/oci/ocikmsvault/v1/spec.proto";
import "org/openmcf/provider/oci/ocikmsvault/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// OciKmsVault is the top-level resource representing an OCI KMS Vault
// that provides an HSM-backed container for encryption keys.
message OciKmsVault {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'oci.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'OciKmsVault'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  OciKmsVaultSpec spec = 4 [(buf.validate.field).required = true];

  // status
  OciKmsVaultStatus status = 5;
}

// OciKmsVaultStatus holds the outputs produced by deploying
// an OciKmsVault.
message OciKmsVaultStatus {
  // stack-outputs
  OciKmsVaultStackOutputs outputs = 1;
}
