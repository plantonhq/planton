syntax = "proto3";

package org.openmcf.provider.oci.ocikmsvault.v1;

import "org/openmcf/provider/oci/ocikmsvault/v1/api.proto";
import "org/openmcf/provider/oci/provider.proto";

// OciKmsVaultStackInput is the input to the IaC modules
// (Pulumi / Terraform) that deploy an OciKmsVault resource.
message OciKmsVaultStackInput {
  // target cloud-resource
  OciKmsVault target = 1;
  // provider-config
  org.openmcf.provider.oci.OciProviderConfig provider_config = 2;
}
