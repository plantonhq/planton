syntax = "proto3";

package org.openmcf.provider.oci.ociloadbalancer.v1;

import "org/openmcf/provider/oci/ociloadbalancer/v1/api.proto";
import "org/openmcf/provider/oci/provider.proto";

// OciLoadBalancerStackInput is the input to the IaC modules
// (Pulumi / Terraform) that deploy an OciLoadBalancer resource.
message OciLoadBalancerStackInput {
  // target cloud-resource
  OciLoadBalancer target = 1;
  // provider-config
  org.openmcf.provider.oci.OciProviderConfig provider_config = 2;
}
