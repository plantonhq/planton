syntax = "proto3";

package org.openmcf.provider.oci.ociloadbalancer.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/oci/ociloadbalancer/v1/spec.proto";
import "org/openmcf/provider/oci/ociloadbalancer/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// OciLoadBalancer is the top-level resource representing an Oracle Cloud
// Infrastructure Application Load Balancer (Layer 7).
message OciLoadBalancer {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'oci.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'OciLoadBalancer'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  OciLoadBalancerSpec spec = 4 [(buf.validate.field).required = true];

  // status
  OciLoadBalancerStatus status = 5;
}

// OciLoadBalancerStatus holds the outputs produced by deploying an
// OciLoadBalancer.
message OciLoadBalancerStatus {
  // stack-outputs
  OciLoadBalancerStackOutputs outputs = 1;
}
