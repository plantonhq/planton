apiVersion: oci.openmcf.org/v1
kind: OciLoadBalancer
metadata:
  name: my-internal-lb
spec:
  compartmentId:
    value: <compartment-ocid>
  displayName: internal-lb
  shape: flexible
  shapeDetails:
    minimumBandwidthInMbps: 10
    maximumBandwidthInMbps: 50
  subnetIds:
    - value: <private-subnet-ocid>
  isPrivate: true
  networkSecurityGroupIds:
    - value: <internal-lb-nsg-ocid>
  backendSets:
    - name: api-backend
      policy: least_connections
      healthChecker:
        protocol: http
        port: 8080
        urlPath: /health
        returnCode: 200
        intervalMs: 30000 # 30 seconds
        timeoutInMillis: 3000 # 3 seconds
        retries: 3
      backends:
        - ipAddress: <backend-ip-1>
          port: 8080
        - ipAddress: <backend-ip-2>
          port: 8080
  listeners:
    - name: http
      port: 80
      protocol: http
      defaultBackendSetName: api-backend
