syntax = "proto3";

package org.openmcf.provider.oci.ocipublicip.v1;

import "org/openmcf/provider/oci/ocipublicip/v1/api.proto";
import "org/openmcf/provider/oci/provider.proto";

// OciPublicIpStackInput is the input to the IaC modules (Pulumi / Terraform)
// that deploy an OciPublicIp resource.
message OciPublicIpStackInput {
  // target cloud-resource
  OciPublicIp target = 1;
  // provider-config
  org.openmcf.provider.oci.OciProviderConfig provider_config = 2;
}
