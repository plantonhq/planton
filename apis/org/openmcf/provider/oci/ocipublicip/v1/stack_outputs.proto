syntax = "proto3";

package org.openmcf.provider.oci.ocipublicip.v1;

// OciPublicIpStackOutputs contains the outputs produced after deploying
// an OciPublicIp. The ip_address is the primary output consumed by DNS
// records, firewall rules, and documentation.
message OciPublicIpStackOutputs {
  // OCID of the created public IP resource.
  string public_ip_id = 1;

  // The allocated IPv4 address (e.g. "203.0.113.2").
  string ip_address = 2;
}
