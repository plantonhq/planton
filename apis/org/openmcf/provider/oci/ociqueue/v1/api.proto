syntax = "proto3";

package org.openmcf.provider.oci.ociqueue.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/oci/ociqueue/v1/spec.proto";
import "org/openmcf/provider/oci/ociqueue/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// OciQueue is the top-level resource representing an OCI Queue -- a
// fully managed, serverless message queue for asynchronous
// communication between decoupled services.
message OciQueue {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'oci.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'OciQueue'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  OciQueueSpec spec = 4 [(buf.validate.field).required = true];

  // status
  OciQueueStatus status = 5;
}

// OciQueueStatus holds the outputs produced by deploying an OciQueue.
message OciQueueStatus {
  // stack-outputs
  OciQueueStackOutputs outputs = 1;
}
