syntax = "proto3";

package org.openmcf.provider.oci.ociqueue.v1;

import "org/openmcf/provider/oci/ociqueue/v1/api.proto";
import "org/openmcf/provider/oci/provider.proto";

// OciQueueStackInput is the input to the IaC modules
// (Pulumi / Terraform) that deploy an OciQueue resource.
message OciQueueStackInput {
  // target cloud-resource
  OciQueue target = 1;
  // provider-config
  org.openmcf.provider.oci.OciProviderConfig provider_config = 2;
}
