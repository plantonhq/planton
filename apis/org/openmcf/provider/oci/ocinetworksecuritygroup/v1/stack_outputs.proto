syntax = "proto3";

package org.openmcf.provider.oci.ocinetworksecuritygroup.v1;

// OciNetworkSecurityGroupStackOutputs contains the outputs produced after
// deploying an OciNetworkSecurityGroup.
// These values are used by downstream components (OciComputeInstance,
// OciContainerEngineCluster, OciLoadBalancer, etc.) for composability via
// StringValueOrRef.
message OciNetworkSecurityGroupStackOutputs {
  // OCID of the network security group.
  string network_security_group_id = 1;
}
