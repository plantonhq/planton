syntax = "proto3";

package org.openmcf.provider.oci.ocinetworksecuritygroup.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/oci/ocinetworksecuritygroup/v1/spec.proto";
import "org/openmcf/provider/oci/ocinetworksecuritygroup/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// OciNetworkSecurityGroup is the top-level resource representing an Oracle
// Cloud Infrastructure Network Security Group with inline security rules.
message OciNetworkSecurityGroup {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'oci.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'OciNetworkSecurityGroup'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  OciNetworkSecurityGroupSpec spec = 4 [(buf.validate.field).required = true];

  // status
  OciNetworkSecurityGroupStatus status = 5;
}

// OciNetworkSecurityGroupStatus holds the outputs produced by deploying an
// OciNetworkSecurityGroup.
message OciNetworkSecurityGroupStatus {
  // stack-outputs
  OciNetworkSecurityGroupStackOutputs outputs = 1;
}
