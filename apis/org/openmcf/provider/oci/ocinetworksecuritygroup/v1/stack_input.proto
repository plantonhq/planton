syntax = "proto3";

package org.openmcf.provider.oci.ocinetworksecuritygroup.v1;

import "org/openmcf/provider/oci/ocinetworksecuritygroup/v1/api.proto";
import "org/openmcf/provider/oci/provider.proto";

// OciNetworkSecurityGroupStackInput is the input to the IaC modules
// (Pulumi / Terraform) that deploy an OciNetworkSecurityGroup resource.
message OciNetworkSecurityGroupStackInput {
  // target cloud-resource
  OciNetworkSecurityGroup target = 1;
  // provider-config
  org.openmcf.provider.oci.OciProviderConfig provider_config = 2;
}
