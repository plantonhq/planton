apiVersion: oci.openmcf.org/v1
kind: OciNetworkSecurityGroup
metadata:
  name: my-web-tier-nsg
spec:
  compartmentId:
    value: <compartment-ocid>
  vcnId:
    value: <vcn-ocid>
  displayName: web-tier-nsg
  ingressRules:
    - source: 0.0.0.0/0
      sourceType: cidr_block
      protocol: tcp
      description: Allow HTTPS from anywhere
      tcpOptions:
        destinationPortRange:
          min: 443
          max: 443
    - source: 0.0.0.0/0
      sourceType: cidr_block
      protocol: tcp
      description: Allow HTTP from anywhere
      tcpOptions:
        destinationPortRange:
          min: 80
          max: 80
    - source: 0.0.0.0/0
      sourceType: cidr_block
      protocol: icmp
      description: Path MTU discovery (prevents silent TCP failures)
      icmpOptions:
        type: 3
        code: 4
  egressRules:
    - destination: 0.0.0.0/0
      destinationType: cidr_block
      protocol: all
      description: Allow all outbound traffic
