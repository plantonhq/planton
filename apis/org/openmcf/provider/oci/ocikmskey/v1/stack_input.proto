syntax = "proto3";

package org.openmcf.provider.oci.ocikmskey.v1;

import "org/openmcf/provider/oci/ocikmskey/v1/api.proto";
import "org/openmcf/provider/oci/provider.proto";

// OciKmsKeyStackInput is the input to the IaC modules
// (Pulumi / Terraform) that deploy an OciKmsKey resource.
message OciKmsKeyStackInput {
  // target cloud-resource
  OciKmsKey target = 1;
  // provider-config
  org.openmcf.provider.oci.OciProviderConfig provider_config = 2;
}
