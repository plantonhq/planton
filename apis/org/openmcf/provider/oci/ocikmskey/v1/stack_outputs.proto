syntax = "proto3";

package org.openmcf.provider.oci.ocikmskey.v1;

// OciKmsKeyStackOutputs contains the outputs produced after
// deploying an OciKmsKey.
// The key_id is consumed by encryption-capable resources (OciBlockVolume,
// OciObjectStorageBucket, OciAutonomousDatabase, etc.) for customer-managed
// encryption key configuration via StringValueOrRef.
message OciKmsKeyStackOutputs {
  // OCID of the KMS key.
  string key_id = 1;

  // OCID of the currently active key version.
  string current_key_version = 2;
}
