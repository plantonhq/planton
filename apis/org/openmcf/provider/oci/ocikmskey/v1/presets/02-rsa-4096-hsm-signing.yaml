apiVersion: oci.openmcf.org/v1
kind: OciKmsKey
metadata:
  name: my-signing-key
spec:
  compartmentId:
    value: <compartment-ocid>
  managementEndpoint:
    value: <vault-management-endpoint>
  keyShape:
    algorithm: rsa
    length: 512 # 4096-bit RSA key (length is in bytes: 512 bytes = 4096 bits)
  protectionMode: hsm # FIPS 140-2 Level 3 hardware security module
  isAutoRotationEnabled: false # Asymmetric key rotation requires coordinated consumer updates
