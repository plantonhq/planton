syntax = "proto3";

package org.openmcf.provider.oci.ocikmskey.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/oci/ocikmskey/v1/spec.proto";
import "org/openmcf/provider/oci/ocikmskey/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// OciKmsKey is the top-level resource representing an OCI KMS Key
// that provides cryptographic operations (encrypt, decrypt, sign, verify)
// backed by a vault's HSM, software, or external key manager.
message OciKmsKey {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'oci.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'OciKmsKey'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  OciKmsKeySpec spec = 4 [(buf.validate.field).required = true];

  // status
  OciKmsKeyStatus status = 5;
}

// OciKmsKeyStatus holds the outputs produced by deploying an OciKmsKey.
message OciKmsKeyStatus {
  // stack-outputs
  OciKmsKeyStackOutputs outputs = 1;
}
