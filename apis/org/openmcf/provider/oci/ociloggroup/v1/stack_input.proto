syntax = "proto3";

package org.openmcf.provider.oci.ociloggroup.v1;

import "org/openmcf/provider/oci/ociloggroup/v1/api.proto";
import "org/openmcf/provider/oci/provider.proto";

// OciLogGroupStackInput is the input to the IaC modules
// (Pulumi / Terraform) that deploy an OciLogGroup resource.
message OciLogGroupStackInput {
  // target cloud-resource
  OciLogGroup target = 1;
  // provider-config
  org.openmcf.provider.oci.OciProviderConfig provider_config = 2;
}
