syntax = "proto3";

package org.openmcf.provider.oci.ociloggroup.v1;

// OciLogGroupStackOutputs contains the outputs produced after deploying
// an OciLogGroup.
// These values are used by downstream components for composability via
// StringValueOrRef.
message OciLogGroupStackOutputs {
  // OCID of the log group.
  string log_group_id = 1;
}
