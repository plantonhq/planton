syntax = "proto3";

package org.openmcf.provider.oci.ocirediscluster.v1;

import "org/openmcf/provider/oci/ocirediscluster/v1/api.proto";
import "org/openmcf/provider/oci/provider.proto";

// OciRedisClusterStackInput is the input to the IaC modules
// (Pulumi / Terraform) that deploy an OciRedisCluster resource.
message OciRedisClusterStackInput {
  // target cloud-resource
  OciRedisCluster target = 1;
  // provider-config
  org.openmcf.provider.oci.OciProviderConfig provider_config = 2;
}
