apiVersion: oci.openmcf.org/v1
kind: OciFunctionsApplication
metadata:
  name: my-secure-functions-app
spec:
  compartmentId:
    value: <compartment-ocid>
  subnetIds:
    - value: <private-subnet-ocid>
  displayName: secure-functions-app
  shape: generic_x86
  networkSecurityGroupIds:
    - value: <functions-nsg-ocid>
  imagePolicyConfig:
    isPolicyEnabled: true
    keyDetails:
      - kmsKeyId:
          value: <image-signing-key-ocid>
  traceConfig:
    isEnabled: true
    domainId: <apm-domain-ocid>
