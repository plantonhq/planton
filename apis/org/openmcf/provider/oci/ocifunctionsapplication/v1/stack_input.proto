syntax = "proto3";

package org.openmcf.provider.oci.ocifunctionsapplication.v1;

import "org/openmcf/provider/oci/ocifunctionsapplication/v1/api.proto";
import "org/openmcf/provider/oci/provider.proto";

// OciFunctionsApplicationStackInput is the input to the IaC modules
// (Pulumi / Terraform) that deploy an OciFunctionsApplication resource.
message OciFunctionsApplicationStackInput {
  // target cloud-resource
  OciFunctionsApplication target = 1;
  // provider-config
  org.openmcf.provider.oci.OciProviderConfig provider_config = 2;
}
