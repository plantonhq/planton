syntax = "proto3";

package org.openmcf.provider.oci.ocifunctionsapplication.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/oci/ocifunctionsapplication/v1/spec.proto";
import "org/openmcf/provider/oci/ocifunctionsapplication/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// OciFunctionsApplication is the top-level resource representing an OCI
// Functions Application -- the organizational container for serverless
// functions in Oracle Cloud Infrastructure.
message OciFunctionsApplication {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'oci.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'OciFunctionsApplication'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  OciFunctionsApplicationSpec spec = 4 [(buf.validate.field).required = true];

  // status
  OciFunctionsApplicationStatus status = 5;
}

// OciFunctionsApplicationStatus holds the outputs produced by deploying
// an OciFunctionsApplication.
message OciFunctionsApplicationStatus {
  // stack-outputs
  OciFunctionsApplicationStackOutputs outputs = 1;
}
