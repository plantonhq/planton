apiVersion: oci.openmcf.org/v1
kind: OciVaultSecret
metadata:
  name: my-db-credential
spec:
  compartmentId:
    value: <compartment-ocid>
  secretName: <secret-name>
  vaultId:
    value: <vault-ocid>
  keyId:
    value: <encryption-key-ocid>
  description: Auto-generated database credential with scheduled rotation
  enableAutoGeneration: true
  secretGenerationContext:
    generationType: passphrase
    generationTemplate: SECRET_TPL_DBAAS_DEFAULT
    passphraseLength: 32
  rotationConfig:
    isScheduledRotationEnabled: true
    rotationInterval: P30D # Rotate every 30 days
    targetSystemDetails:
      targetSystemType: adb
      adbId:
        value: <autonomous-database-ocid>
  secretRules:
    - ruleType: secret_reuse_rule
      isEnforcedOnDeletedSecretVersions: true
