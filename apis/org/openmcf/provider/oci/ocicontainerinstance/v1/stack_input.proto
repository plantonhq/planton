syntax = "proto3";

package org.openmcf.provider.oci.ocicontainerinstance.v1;

import "org/openmcf/provider/oci/ocicontainerinstance/v1/api.proto";
import "org/openmcf/provider/oci/provider.proto";

// OciContainerInstanceStackInput is the input to the IaC modules
// (Pulumi / Terraform) that deploy an OciContainerInstance resource.
message OciContainerInstanceStackInput {
  // target cloud-resource
  OciContainerInstance target = 1;
  // provider-config
  org.openmcf.provider.oci.OciProviderConfig provider_config = 2;
}
