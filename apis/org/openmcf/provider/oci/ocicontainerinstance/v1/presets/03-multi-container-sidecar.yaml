apiVersion: oci.openmcf.org/v1
kind: OciContainerInstance
metadata:
  name: my-app-with-sidecar
spec:
  compartmentId:
    value: <compartment-ocid>
  availabilityDomain: <availability-domain>
  shape: CI.Standard.E4.Flex
  shapeConfig:
    ocpus: 2
    memoryInGbs: 4
  containerRestartPolicy: always
  containers:
    - imageUrl: <app-container-image-url>
      displayName: app
      resourceConfig:
        memoryLimitInGbs: 3
        vcpusLimit: 3
      environmentVariables:
        LOG_DIR: /var/log/app
      healthChecks:
        - healthCheckType: http
          port: 8080
          path: /healthz
          initialDelayInSeconds: 10
          intervalInSeconds: 15
          timeoutInSeconds: 5
          failureThreshold: 3
          successThreshold: 1
      volumeMounts:
        - mountPath: /var/log/app
          volumeName: shared-logs
        - mountPath: /etc/app
          volumeName: app-config
          isReadOnly: true
    - imageUrl: <log-forwarder-image-url>
      displayName: log-forwarder
      resourceConfig:
        memoryLimitInGbs: 0.5
        vcpusLimit: 0.5
      volumeMounts:
        - mountPath: /var/log/app
          volumeName: shared-logs
          isReadOnly: true
  volumes:
    - name: shared-logs
      volumeType: emptydir
      backingStore: EPHEMERAL_STORAGE
    - name: app-config
      volumeType: configfile
      configs:
        - fileName: config.yaml
          data: <base64-encoded-config>
  vnics:
    - subnetId:
        value: <subnet-ocid>
