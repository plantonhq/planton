syntax = "proto3";

package org.openmcf.provider.oci.ocidbsystem.v1;

// OciDbSystemStackOutputs contains the outputs produced after
// deploying an OciDbSystem.
// These values are used by downstream components for composability via
// StringValueOrRef.
message OciDbSystemStackOutputs {
  // OCID of the DB System.
  string db_system_id = 1;

  // OCID of the first DB Home created with the DB System.
  string db_home_id = 2;

  // OCID of the initial database created within the first DB Home.
  string database_id = 3;

  // TCP port on which the database listener accepts connections.
  int32 listener_port = 4;
}
