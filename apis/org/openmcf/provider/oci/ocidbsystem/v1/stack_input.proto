syntax = "proto3";

package org.openmcf.provider.oci.ocidbsystem.v1;

import "org/openmcf/provider/oci/ocidbsystem/v1/api.proto";
import "org/openmcf/provider/oci/provider.proto";

// OciDbSystemStackInput is the input to the IaC modules
// (Pulumi / Terraform) that deploy an OciDbSystem resource.
message OciDbSystemStackInput {
  // target cloud-resource
  OciDbSystem target = 1;
  // provider-config
  org.openmcf.provider.oci.OciProviderConfig provider_config = 2;
}
