syntax = "proto3";

package org.openmcf.provider.oci.ocidbsystem.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/oci/ocidbsystem/v1/spec.proto";
import "org/openmcf/provider/oci/ocidbsystem/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// OciDbSystem is the top-level resource representing an Oracle Cloud
// Infrastructure Database System -- a managed Oracle Database running on
// Virtual Machine or Bare Metal infrastructure with full control over
// compute shape, storage layout, patching, and Oracle Database edition.
message OciDbSystem {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'oci.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'OciDbSystem'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  OciDbSystemSpec spec = 4 [(buf.validate.field).required = true];

  // status
  OciDbSystemStatus status = 5;
}

// OciDbSystemStatus holds the outputs produced by deploying an OciDbSystem.
message OciDbSystemStatus {
  // stack-outputs
  OciDbSystemStackOutputs outputs = 1;
}
