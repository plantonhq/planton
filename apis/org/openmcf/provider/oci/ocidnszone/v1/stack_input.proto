syntax = "proto3";

package org.openmcf.provider.oci.ocidnszone.v1;

import "org/openmcf/provider/oci/ocidnszone/v1/api.proto";
import "org/openmcf/provider/oci/provider.proto";

// OciDnsZoneStackInput is the input to the IaC modules
// (Pulumi / Terraform) that deploy an OciDnsZone resource.
message OciDnsZoneStackInput {
  // target cloud-resource
  OciDnsZone target = 1;
  // provider-config
  org.openmcf.provider.oci.OciProviderConfig provider_config = 2;
}
