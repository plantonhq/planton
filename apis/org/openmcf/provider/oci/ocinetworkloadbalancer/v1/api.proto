syntax = "proto3";

package org.openmcf.provider.oci.ocinetworkloadbalancer.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/oci/ocinetworkloadbalancer/v1/spec.proto";
import "org/openmcf/provider/oci/ocinetworkloadbalancer/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

message OciNetworkLoadBalancer {
  string api_version = 1 [(buf.validate.field).string.const = 'oci.openmcf.org/v1'];
  string kind = 2 [(buf.validate.field).string.const = 'OciNetworkLoadBalancer'];
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];
  OciNetworkLoadBalancerSpec spec = 4 [(buf.validate.field).required = true];
  OciNetworkLoadBalancerStatus status = 5;
}

message OciNetworkLoadBalancerStatus {
  OciNetworkLoadBalancerStackOutputs outputs = 1;
}
