apiVersion: oci.openmcf.org/v1
kind: OciNetworkLoadBalancer
metadata:
  name: my-private-nlb
spec:
  compartmentId:
    value: <compartment-ocid>
  subnetId:
    value: <private-subnet-ocid>
  isPrivate: true
  networkSecurityGroupIds:
    - value: <internal-nlb-nsg-ocid>
  backendSets:
    - name: app-backend
      policy: five_tuple
      healthChecker:
        protocol: tcp
        port: 8080
        intervalInMillis: 10000 # 10 seconds
        timeoutInMillis: 3000 # 3 seconds
        retries: 3
      backends:
        - ipAddress: <backend-ip-1>
          port: 8080
        - ipAddress: <backend-ip-2>
          port: 8080
  listeners:
    - name: tcp
      port: 8080
      protocol: tcp
      defaultBackendSetName: app-backend
