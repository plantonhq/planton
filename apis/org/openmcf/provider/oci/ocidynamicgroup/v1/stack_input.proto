syntax = "proto3";

package org.openmcf.provider.oci.ocidynamicgroup.v1;

import "org/openmcf/provider/oci/ocidynamicgroup/v1/api.proto";
import "org/openmcf/provider/oci/provider.proto";

// OciDynamicGroupStackInput is the input to the IaC modules (Pulumi / Terraform)
// that deploy an OciDynamicGroup resource.
message OciDynamicGroupStackInput {
  // target cloud-resource
  OciDynamicGroup target = 1;
  // provider-config
  org.openmcf.provider.oci.OciProviderConfig provider_config = 2;
}
