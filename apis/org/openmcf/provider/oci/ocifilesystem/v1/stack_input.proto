syntax = "proto3";

package org.openmcf.provider.oci.ocifilesystem.v1;

import "org/openmcf/provider/oci/ocifilesystem/v1/api.proto";
import "org/openmcf/provider/oci/provider.proto";

// OciFileSystemStackInput is the input to the IaC modules
// (Pulumi / Terraform) that deploy an OciFileSystem resource.
message OciFileSystemStackInput {
  // target cloud-resource
  OciFileSystem target = 1;
  // provider-config
  org.openmcf.provider.oci.OciProviderConfig provider_config = 2;
}
