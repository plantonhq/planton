syntax = "proto3";

package org.openmcf.provider.oci.ocibastion.v1;

import "org/openmcf/provider/oci/ocibastion/v1/api.proto";
import "org/openmcf/provider/oci/provider.proto";

// OciBastionStackInput is the input to the IaC modules
// (Pulumi / Terraform) that deploy an OciBastion resource.
message OciBastionStackInput {
  // target cloud-resource
  OciBastion target = 1;
  // provider-config
  org.openmcf.provider.oci.OciProviderConfig provider_config = 2;
}
