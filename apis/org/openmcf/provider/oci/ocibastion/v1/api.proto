syntax = "proto3";

package org.openmcf.provider.oci.ocibastion.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/oci/ocibastion/v1/spec.proto";
import "org/openmcf/provider/oci/ocibastion/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// OciBastion is the top-level resource representing an OCI Bastion
// that provides secure, time-limited access to private subnet resources.
message OciBastion {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'oci.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'OciBastion'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  OciBastionSpec spec = 4 [(buf.validate.field).required = true];

  // status
  OciBastionStatus status = 5;
}

// OciBastionStatus holds the outputs produced by deploying
// an OciBastion.
message OciBastionStatus {
  // stack-outputs
  OciBastionStackOutputs outputs = 1;
}
