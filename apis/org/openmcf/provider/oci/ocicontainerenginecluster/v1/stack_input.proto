syntax = "proto3";

package org.openmcf.provider.oci.ocicontainerenginecluster.v1;

import "org/openmcf/provider/oci/ocicontainerenginecluster/v1/api.proto";
import "org/openmcf/provider/oci/provider.proto";

// OciContainerEngineClusterStackInput is the input to the IaC modules
// (Pulumi / Terraform) that deploy an OciContainerEngineCluster resource.
message OciContainerEngineClusterStackInput {
  // target cloud-resource
  OciContainerEngineCluster target = 1;
  // provider-config
  org.openmcf.provider.oci.OciProviderConfig provider_config = 2;
}
