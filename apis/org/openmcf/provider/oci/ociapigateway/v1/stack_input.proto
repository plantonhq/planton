syntax = "proto3";

package org.openmcf.provider.oci.ociapigateway.v1;

import "org/openmcf/provider/oci/ociapigateway/v1/api.proto";
import "org/openmcf/provider/oci/provider.proto";

// OciApiGatewayStackInput is the input to the IaC modules
// (Pulumi / Terraform) that deploy an OciApiGateway resource.
message OciApiGatewayStackInput {
  // target cloud-resource
  OciApiGateway target = 1;
  // provider-config
  org.openmcf.provider.oci.OciProviderConfig provider_config = 2;
}
