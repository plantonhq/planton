syntax = "proto3";

package org.openmcf.provider.oci.ocidevopsproject.v1;

// OciDevopsProjectStackOutputs contains the outputs produced after
// deploying an OciDevopsProject.
// These values are used by downstream components for composability via
// StringValueOrRef.
message OciDevopsProjectStackOutputs {
  // OCID of the DevOps project.
  string project_id = 1;

  // Namespace associated with the project, used in container registry
  // paths and artifact references.
  string namespace = 2;
}
