syntax = "proto3";

package org.openmcf.provider.oci.ocistreampool.v1;

import "org/openmcf/provider/oci/ocistreampool/v1/api.proto";
import "org/openmcf/provider/oci/provider.proto";

// OciStreamPoolStackInput is the input to the IaC modules
// (Pulumi / Terraform) that deploy an OciStreamPool resource.
message OciStreamPoolStackInput {
  // target cloud-resource
  OciStreamPool target = 1;
  // provider-config
  org.openmcf.provider.oci.OciProviderConfig provider_config = 2;
}
