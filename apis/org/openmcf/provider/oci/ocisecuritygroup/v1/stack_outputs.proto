syntax = "proto3";

package org.openmcf.provider.oci.ocisecuritygroup.v1;

// OciSecurityGroupStackOutputs contains the outputs produced after
// deploying an OciSecurityGroup.
// These values are used by downstream components (OciComputeInstance,
// OciContainerEngineCluster, OciApplicationLoadBalancer, etc.) for composability via
// StringValueOrRef.
message OciSecurityGroupStackOutputs {
  // OCID of the network security group.
  string network_security_group_id = 1;
}
