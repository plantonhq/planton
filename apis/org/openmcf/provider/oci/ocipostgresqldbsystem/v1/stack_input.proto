syntax = "proto3";

package org.openmcf.provider.oci.ocipostgresqldbsystem.v1;

import "org/openmcf/provider/oci/ocipostgresqldbsystem/v1/api.proto";
import "org/openmcf/provider/oci/provider.proto";

// OciPostgresqlDbSystemStackInput is the input to the IaC modules
// (Pulumi / Terraform) that deploy an OciPostgresqlDbSystem resource.
message OciPostgresqlDbSystemStackInput {
  // target cloud-resource
  OciPostgresqlDbSystem target = 1;
  // provider-config
  org.openmcf.provider.oci.OciProviderConfig provider_config = 2;
}
