syntax = "proto3";

package org.openmcf.provider.oci.ocipostgresqldbsystem.v1;

import "buf/validate/validate.proto";
import "org/openmcf/provider/oci/ocipostgresqldbsystem/v1/spec.proto";
import "org/openmcf/provider/oci/ocipostgresqldbsystem/v1/stack_outputs.proto";
import "org/openmcf/shared/metadata.proto";

// OciPostgresqlDbSystem is the top-level resource representing an Oracle Cloud
// Infrastructure PostgreSQL Database System -- a fully managed PostgreSQL
// service with configurable compute, storage, and backup policies.
message OciPostgresqlDbSystem {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'oci.openmcf.org/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'OciPostgresqlDbSystem'];

  // metadata
  org.openmcf.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  OciPostgresqlDbSystemSpec spec = 4 [(buf.validate.field).required = true];

  // status
  OciPostgresqlDbSystemStatus status = 5;
}

// OciPostgresqlDbSystemStatus holds the outputs produced by deploying an
// OciPostgresqlDbSystem.
message OciPostgresqlDbSystemStatus {
  // stack-outputs
  OciPostgresqlDbSystemStackOutputs outputs = 1;
}
