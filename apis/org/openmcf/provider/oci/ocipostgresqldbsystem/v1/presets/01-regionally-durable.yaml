apiVersion: oci.openmcf.org/v1
kind: OciPostgresqlDbSystem
metadata:
  name: my-postgres
spec:
  compartmentId:
    value: <compartment-ocid>
  displayName: postgres
  dbVersion: "16"
  shape: VM.Standard.E4.Flex
  instanceOcpuCount: 4
  instanceMemorySizeInGbs: 32
  instanceCount: 2 # Primary + 1 read replica
  networkDetails:
    subnetId:
      value: <private-subnet-ocid>
    nsgIds:
      - value: <db-nsg-ocid>
    isReaderEndpointEnabled: true
  storageDetails:
    isRegionallyDurable: true
  credentials:
    username: postgres
    passwordDetails:
      passwordType: vault_secret
      secretId:
        value: <vault-secret-ocid>
  managementPolicy:
    backupPolicy:
      kind: daily
      backupStart: "03:00"
      retentionDays: 30
    maintenanceWindowStart: sun 04:00:00
