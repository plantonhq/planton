syntax = "proto3";

package org.openmcf.provider.oci.ocicontainerenginenodepool.v1;

import "org/openmcf/provider/oci/ocicontainerenginenodepool/v1/api.proto";
import "org/openmcf/provider/oci/provider.proto";

// OciContainerEngineNodePoolStackInput is the input to the IaC modules
// (Pulumi / Terraform) that deploy an OciContainerEngineNodePool resource.
message OciContainerEngineNodePoolStackInput {
  // target cloud-resource
  OciContainerEngineNodePool target = 1;
  // provider-config
  org.openmcf.provider.oci.OciProviderConfig provider_config = 2;
}
