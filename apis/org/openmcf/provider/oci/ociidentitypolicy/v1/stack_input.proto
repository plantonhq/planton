syntax = "proto3";

package org.openmcf.provider.oci.ociidentitypolicy.v1;

import "org/openmcf/provider/oci/ociidentitypolicy/v1/api.proto";
import "org/openmcf/provider/oci/provider.proto";

// OciIdentityPolicyStackInput is the input to the IaC modules (Pulumi / Terraform)
// that deploy an OciIdentityPolicy resource.
message OciIdentityPolicyStackInput {
  // target cloud-resource
  OciIdentityPolicy target = 1;
  // provider-config
  org.openmcf.provider.oci.OciProviderConfig provider_config = 2;
}
