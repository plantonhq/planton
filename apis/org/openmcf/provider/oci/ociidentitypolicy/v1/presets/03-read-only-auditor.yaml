apiVersion: oci.openmcf.org/v1
kind: OciIdentityPolicy
metadata:
  name: my-read-only-auditor-policy
spec:
  compartmentId:
    value: <tenancy-ocid>
  description: Grants read-only visibility across the tenancy for compliance and security auditing
  statements:
    - Allow group <auditor-group-name> to inspect all-resources in tenancy
    - Allow group <auditor-group-name> to read audit-events in tenancy
