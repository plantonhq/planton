apiVersion: oci.openmcf.org/v1
kind: OciIdentityPolicy
metadata:
  name: my-compartment-admin-policy
spec:
  compartmentId:
    value: <compartment-ocid>
  description: Grants administrative access to the project compartment
  statements:
    - Allow group <admin-group-name> to manage all-resources in compartment <compartment-name>
