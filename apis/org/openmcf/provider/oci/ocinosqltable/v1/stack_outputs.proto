syntax = "proto3";

package org.openmcf.provider.oci.ocinosqltable.v1;

// OciNosqlTableStackOutputs contains the outputs produced after
// deploying an OciNosqlTable.
// These values are used by downstream components for composability via
// StringValueOrRef.
message OciNosqlTableStackOutputs {
  // OCID of the NoSQL table.
  string table_id = 1;
}
