syntax = "proto3";

package org.openmcf.provider.oci.ocialarm.v1;

// OciAlarmStackOutputs contains the outputs produced after deploying
// an OciAlarm.
// These values are used by downstream components for composability via
// StringValueOrRef.
message OciAlarmStackOutputs {
  // OCID of the alarm.
  string alarm_id = 1;
}
