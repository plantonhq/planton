apiVersion: oci.openmcf.org/v1
kind: OciAlarm
metadata:
  name: my-high-cpu-alarm
spec:
  compartmentId:
    value: <compartment-ocid>
  metricCompartmentId:
    value: <compartment-ocid>
  namespace: oci_computeagent
  query: CpuUtilization[5m].mean() > 80
  severity: critical
  destinations:
    - <ons-topic-ocid>
  isEnabled: true
  body: "CPU utilization exceeded 80% for 5 minutes. Investigate workload scaling or instance resizing."
  pendingDuration: PT5M
  messageFormat: pretty_json
