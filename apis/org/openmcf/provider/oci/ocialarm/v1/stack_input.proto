syntax = "proto3";

package org.openmcf.provider.oci.ocialarm.v1;

import "org/openmcf/provider/oci/ocialarm/v1/api.proto";
import "org/openmcf/provider/oci/provider.proto";

// OciAlarmStackInput is the input to the IaC modules
// (Pulumi / Terraform) that deploy an OciAlarm resource.
message OciAlarmStackInput {
  // target cloud-resource
  OciAlarm target = 1;
  // provider-config
  org.openmcf.provider.oci.OciProviderConfig provider_config = 2;
}
