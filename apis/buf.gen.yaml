version: v2
managed:
  enabled: true
  disable:
    - file_option: go_package
      module: google/protobuf/empty
    - file_option: go_package
      module: google/protobuf/timestamp
    - file_option: go_package
      module: buf.build/bufbuild/protovalidate
    # Prevent managed mode from overriding the java_package for protovalidate.
    # The protovalidate Maven artifact (build.buf:protovalidate) uses
    # build.buf.validate as its Java package. Without this disable, managed
    # mode transforms it to com.buf.validate, causing a classpath mismatch.
    - file_option: java_package
      module: buf.build/bufbuild/protovalidate
  override:
    - file_option: optimize_for
      value: SPEED
    - file_option: go_package_prefix
      value: github.com/plantonhq/openmcf/apis
plugins:
  - remote: buf.build/protocolbuffers/go:v1.36.6
    out: generated/stubs/go
  - remote: buf.build/grpc/go:v1.5.1
    out: generated/stubs/go
  # Generate TypeScript protobuf types compatible with Connect RPC binary format
  - remote: buf.build/bufbuild/es:v2.2.2
    out: generated/stubs/ts
    opt:
      - target=ts
    include_imports: true
  # Generate TypeScript code for Connect RPC
  - remote: buf.build/connectrpc/es:v1.6.1
    out: generated/stubs/ts
    opt:
      - target=ts
  # Generate Java stubs to catch reserved keyword conflicts early (e.g., 'static', 'class')
  # These are NOT committed - generated/stubs/java is gitignored
  - remote: buf.build/protocolbuffers/java:v30.1
    out: generated/stubs/java
  - remote: buf.build/grpc/java:v1.65.0
    out: generated/stubs/java
