apiVersion: azure.planton.dev/v1
kind: AzureVirtualMachine
metadata:
  name: my-windows-vm
spec:
  region: <azure-region>
  resourceGroup:
    value: "<your-resource-group-name>"
  vmSize: Standard_D2s_v3  # recommended_default from spec
  subnetId:
    value: "<subnet-id>"
  image:
    publisher: MicrosoftWindowsServer
    offer: WindowsServer
    sku: 2022-datacenter-g2
    version: latest  # default from spec
  osDisk:
    sizeGb: 128
    storageType: premium_lrs  # default from spec
    caching: read_write  # default from spec
  adminUsername: azureadmin
  adminPassword:
    value: "<your-admin-password>"
  network:
    enablePublicIp: true
    publicIpSku: standard  # default from spec
    publicIpAllocation: public_static  # default from spec
    enableAcceleratedNetworking: true  # default from spec
  availabilityZone: "1"
  enableBootDiagnostics: true  # default from spec
