apiVersion: azure.planton.dev/v1
kind: AzureApplicationInsights
metadata:
  name: my-production-insights
spec:
  region: <azure-region>
  resourceGroup:
    value: "<your-resource-group-name>"
  name: <your-app-insights-name>
  applicationType: web
  workspaceId:
    value: "<log-analytics-workspace-id>"
  retentionInDays: 90
  dailyDataCapInGb: 10  # 10 GB daily cap to control costs
  samplingPercentage: 25  # 25% sampling; statistically representative at lower cost
