syntax = "proto3";

package dev.planton.provider.azure.azureapplicationinsights.v1;

import "buf/validate/validate.proto";
import "dev/planton/shared/foreignkey/v1/foreign_key.proto";
import "dev/planton/shared/options/options.proto";

// **AzureApplicationInsightsSpec** defines the configuration for creating an
// Azure Application Insights resource.
//
// Application Insights is Azure's Application Performance Management (APM) service.
// It provides deep observability into web applications and services -- tracking
// request rates, response times, failure rates, dependency calls, exceptions,
// page views, and custom telemetry. It is the standard APM layer in Azure, consumed
// by Function Apps, Web Apps, Container Apps, and any application instrumented with
// the Application Insights SDK or OpenTelemetry.
//
// This resource requires a Log Analytics Workspace (workspace-based Application
// Insights). Classic (non-workspace) Application Insights is deprecated by Microsoft
// and is not supported by this component.
//
// This spec follows the 80/20 principle: exposing the essential fields that cover
// the vast majority of deployment scenarios while keeping the configuration minimal.
message AzureApplicationInsightsSpec {
  // The Azure region where Application Insights will be deployed.
  // Examples: "eastus", "westus2", "westeurope", "southeastasia".
  // Should match the region of the application(s) being monitored to minimize
  // telemetry ingestion latency and data residency concerns.
  string region = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1
  ];

  // The Azure Resource Group where Application Insights will be created.
  // Can be a literal string or a reference to an AzureResourceGroup output.
  dev.planton.shared.foreignkey.v1.StringValueOrRef resource_group = 2 [
    (buf.validate.field).required = true,
    (dev.planton.shared.foreignkey.v1.default_kind) = AzureResourceGroup,
    (dev.planton.shared.foreignkey.v1.default_kind_field_path) = "status.outputs.resource_group_name"
  ];

  // The name of the Application Insights resource.
  // Must be unique within the resource group.
  // Length: 1 to 260 characters.
  string name = 3 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 260
  ];

  // The type of application being monitored.
  // Uses exact Azure API values -- no conversion needed in IaC modules.
  // - "web": Web applications (ASP.NET, Spring Boot, Django, Express, etc.)
  // - "java": Java applications (standalone, not web)
  // - "Node.JS": Node.js applications
  // - "other": All other application types
  // Default: web
  // Note: This field is ForceNew in Azure -- changing it requires resource recreation.
  optional string application_type = 4 [
    (buf.validate.field).string = {
      in: [
        "web",
        "java",
        "Node.JS",
        "other"
      ]
    },
    (dev.planton.shared.options.default) = "web"
  ];

  // The Log Analytics Workspace to store Application Insights data.
  // Required -- workspace-based Application Insights is the only supported mode.
  // Classic (non-workspace) Application Insights is deprecated by Microsoft.
  // Can be a literal workspace resource ID or a reference to an
  // AzureLogAnalyticsWorkspace output.
  dev.planton.shared.foreignkey.v1.StringValueOrRef workspace_id = 5 [
    (buf.validate.field).required = true,
    (dev.planton.shared.foreignkey.v1.default_kind) = AzureLogAnalyticsWorkspace,
    (dev.planton.shared.foreignkey.v1.default_kind_field_path) = "status.outputs.workspace_id"
  ];

  // The number of days to retain telemetry data.
  // Azure only allows specific values: 30, 60, 90, 120, 180, 270, 365, 550, 730.
  // Free tier includes 90 days. Beyond that, retention is billed per GB per month.
  // Default: 90
  optional int32 retention_in_days = 6 [
    (buf.validate.field).int32 = {
      in: [
        30,
        60,
        90,
        120,
        180,
        270,
        365,
        550,
        730
      ]
    },
    (dev.planton.shared.options.default) = "90"
  ];

  // The daily telemetry data cap in GB.
  // When the cap is reached, telemetry ingestion stops until the next UTC day.
  // Set to control costs in development or staging environments.
  // Default: 100 (Azure's default)
  optional double daily_data_cap_in_gb = 7 [
    (buf.validate.field).double.gte = 0,
    (dev.planton.shared.options.default) = "100"
  ];

  // The percentage of telemetry data to sample (0-100).
  // Reducing sampling percentage lowers data volume and cost while still providing
  // statistically representative telemetry. Common production values are 25-50%.
  // Set to 100 for full fidelity (all telemetry collected).
  // Default: 100
  optional double sampling_percentage = 8 [
    (buf.validate.field).double = {
      gte: 0
      lte: 100
    },
    (dev.planton.shared.options.default) = "100"
  ];
}
