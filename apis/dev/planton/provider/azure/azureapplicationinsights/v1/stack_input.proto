syntax = "proto3";

package dev.planton.provider.azure.azureapplicationinsights.v1;

import "dev/planton/provider/azure/azureapplicationinsights/v1/api.proto";
import "dev/planton/provider/azure/provider.proto";

// AzureApplicationInsightsStackInput is the input to the IaC modules (Pulumi/Terraform).
// It contains the target resource definition and Azure provider credentials.
message AzureApplicationInsightsStackInput {
  // The Application Insights resource to deploy.
  AzureApplicationInsights target = 1;

  // Azure provider configuration (credentials).
  dev.planton.provider.azure.AzureProviderConfig provider_config = 2;
}
