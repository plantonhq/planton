apiVersion: azure.planton.dev/v1
kind: AzureApplicationGateway
metadata:
  name: test-agw
spec:
  region: eastus
  resource_group: test-rg
  name: test-agw
  subnet_id: /subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/test-rg/providers/Microsoft.Network/virtualNetworks/test-vnet/subnets/agw-subnet
  public_ip_id: /subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/test-rg/providers/Microsoft.Network/publicIPAddresses/test-pip
  sku: Standard_v2
  backend_address_pools:
    - name: default
      fqdns:
        - backend.contoso.com
  backend_http_settings:
    - name: http-settings
      port: 80
      protocol: Http
  http_listeners:
    - name: http-listener
      port: 80
      protocol: Http
  request_routing_rules:
    - name: http-rule
      http_listener_name: http-listener
      backend_address_pool_name: default
      backend_http_settings_name: http-settings
      priority: 100
  probes:
    - name: health-probe
      protocol: Http
      path: /health
