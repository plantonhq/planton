syntax = "proto3";

package dev.planton.provider.azure.azureapplicationgateway.v1;

import "dev/planton/provider/azure/azureapplicationgateway/v1/api.proto";
import "dev/planton/provider/azure/provider.proto";

// AzureApplicationGatewayStackInput is the input to the IaC module.
// It contains the target resource and provider configuration.
message AzureApplicationGatewayStackInput {
  // target cloud-resource to be deployed
  AzureApplicationGateway target = 1;
  // provider-config for Azure authentication
  dev.planton.provider.azure.AzureProviderConfig provider_config = 2;
}
