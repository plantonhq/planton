syntax = "proto3";

package dev.planton.provider.azure.azuresubnet.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/azure/azuresubnet/v1/spec.proto";
import "dev/planton/provider/azure/azuresubnet/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// AzureSubnet is the top-level API resource for an Azure Subnet.
// Subnets partition a Virtual Network's address space into segments for different
// workloads, tiers, or service delegations. This is the most widely referenced
// networking resource in the Azure resource collection.
message AzureSubnet {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'azure.planton.dev/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AzureSubnet'];

  // metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AzureSubnetSpec spec = 4 [(buf.validate.field).required = true];

  // status
  AzureSubnetStatus status = 5;
}

// AzureSubnetStatus holds the deployment status and outputs.
message AzureSubnetStatus {
  // stack-outputs
  AzureSubnetStackOutputs outputs = 1;
}
