syntax = "proto3";

package dev.planton.provider.azure.azurefrontdoorprofile.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/azure/azurefrontdoorprofile/v1/spec.proto";
import "dev/planton/provider/azure/azurefrontdoorprofile/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// AzureFrontDoorProfile is the top-level API resource for an Azure Front Door
// profile. Azure Front Door is a global, scalable CDN and application delivery
// network that combines HTTP load balancing, SSL offloading, caching, and
// application acceleration across Microsoft's worldwide edge network.
message AzureFrontDoorProfile {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'azure.planton.dev/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AzureFrontDoorProfile'];

  // metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AzureFrontDoorProfileSpec spec = 4 [(buf.validate.field).required = true];

  // status
  AzureFrontDoorProfileStatus status = 5;
}

// AzureFrontDoorProfileStatus holds the deployment status and outputs.
message AzureFrontDoorProfileStatus {
  // stack-outputs
  AzureFrontDoorProfileStackOutputs outputs = 1;
}
