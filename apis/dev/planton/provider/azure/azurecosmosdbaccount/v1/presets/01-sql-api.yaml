apiVersion: azure.planton.dev/v1
kind: AzureCosmosdbAccount
metadata:
  name: my-cosmosdb-account
spec:
  region: <azure-region>
  resourceGroup:
    value: "<your-resource-group-name>"
  name: <your-account-name>
  kind: GlobalDocumentDB  # default from spec; SQL/NoSQL API
  consistencyPolicy:
    consistencyLevel: Session  # default from spec
  geoLocations:
    - location: <azure-region>
      failoverPriority: 0
      zoneRedundant: false  # default from spec
  freeTierEnabled: false  # default from spec
  automaticFailoverEnabled: false  # default from spec
  multipleWriteLocationsEnabled: false  # default from spec
  publicNetworkAccessEnabled: true  # default from spec
  sqlDatabases:
    - name: <your-database-name>
      throughput: 400
      containers:
        - name: <your-container-name>
          partitionKeyPaths:
            - /partitionKey
          partitionKeyKind: Hash  # default from spec
