apiVersion: azure.planton.dev/v1
kind: AzureAksCluster
metadata:
  name: my-aks-cluster
spec:
  region: <azure-region>
  resourceGroup:
    value: "<your-resource-group-name>"
  vnetSubnetId:
    value: "<nodes-subnet-id>"
  kubernetesVersion: "1.30"  # recommended_default from spec
  controlPlaneSku: STANDARD
  networkPlugin: AZURE_CNI
  networkPluginMode: OVERLAY
  privateClusterEnabled: false
  systemNodePool:
    vmSize: Standard_D4s_v5  # recommended_default from spec
    autoscaling:
      minCount: 3
      maxCount: 5
    availabilityZones:
      - "1"
      - "2"
      - "3"
  userNodePools:
    - name: general
      vmSize: Standard_D8s_v5
      autoscaling:
        minCount: 2
        maxCount: 10
      availabilityZones:
        - "1"
        - "2"
        - "3"
  addons:
    enableContainerInsights: true
    enableKeyVaultCsiDriver: true
    enableAzurePolicy: true
    enableWorkloadIdentity: true
    logAnalyticsWorkspaceId: <log-analytics-workspace-id>
