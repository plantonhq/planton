syntax = "proto3";

package dev.planton.provider.azure.azureresourcegroup.v1;

import "dev/planton/provider/azure/azureresourcegroup/v1/api.proto";
import "dev/planton/provider/azure/provider.proto";

// AzureResourceGroupStackInput is the input to the IaC module.
// It contains the target resource and provider configuration.
message AzureResourceGroupStackInput {
  // target cloud-resource to be deployed
  AzureResourceGroup target = 1;
  // provider-config for Azure authentication
  dev.planton.provider.azure.AzureProviderConfig provider_config = 2;
}
