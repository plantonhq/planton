syntax = "proto3";

package dev.planton.provider.azure.azurepostgresqlflexibleserver.v1;

import "dev/planton/provider/azure/azurepostgresqlflexibleserver/v1/api.proto";
import "dev/planton/provider/azure/provider.proto";

// AzurePostgresqlFlexibleServerStackInput is the input to the IaC module.
