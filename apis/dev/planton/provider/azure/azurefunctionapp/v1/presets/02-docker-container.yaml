apiVersion: azure.planton.dev/v1
kind: AzureFunctionApp
metadata:
  name: my-container-fn
spec:
  region: eastus
  resource_group:
    value: "<your-resource-group-name>"
  name: my-container-fn
  service_plan_id:
    value: "<your-elastic-premium-plan-id>"
  storage_account_name:
    value: "<your-storage-account-name>"
  storage_account_access_key:
    value: "<your-storage-access-key>"
  https_only: true
  identity:
    type: SystemAssigned
  site_config:
    application_stack:
      docker:
        registry_url: https://<your-registry>.azurecr.io
        image_name: <your-org>/<your-function-app>
        image_tag: latest
    container_registry_use_managed_identity: true
    health_check_path: /api/health
    always_on: true
    minimum_tls_version: "1.2"
    ftps_state: Disabled
