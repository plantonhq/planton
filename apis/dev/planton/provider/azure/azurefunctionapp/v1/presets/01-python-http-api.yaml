apiVersion: azure.planton.dev/v1
kind: AzureFunctionApp
metadata:
  name: my-python-api
spec:
  region: eastus
  resource_group:
    value: "<your-resource-group-name>"
  name: my-python-api
  service_plan_id:
    value: "<your-service-plan-id>"
  storage_account_name:
    value: "<your-storage-account-name>"
  storage_account_access_key:
    value: "<your-storage-access-key>"
  application_insights_connection_string:
    value: "<your-app-insights-connection-string>"
  https_only: true
  app_settings:
    PYTHON_ENABLE_WORKER_EXTENSIONS: "1"
  site_config:
    application_stack:
      python_version: "3.12"
    health_check_path: /api/health
    minimum_tls_version: "1.2"
    ftps_state: Disabled
    cors:
      allowed_origins:
        - https://myapp.example.com
