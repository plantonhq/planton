syntax = "proto3";

package dev.planton.provider.azure.azurednsrecord.v1;

import "dev/planton/provider/azure/azurednsrecord/v1/api.proto";
import "dev/planton/provider/azure/provider.proto";

// AzureDnsRecordStackInput provides all inputs required to deploy an Azure DNS Record.
message AzureDnsRecordStackInput {
