apiVersion: azure.planton.dev/v1
kind: AzureMysqlFlexibleServer
metadata:
  name: my-mysql-server
spec:
  region: <azure-region>
  resourceGroup:
    value: "<your-resource-group-name>"
  name: <your-server-name>
  administratorLogin: <admin-username>
  administratorPassword:
    value: "<admin-password>"
  version: "8.0.21"  # default from spec
  skuName: GP_Standard_D2ds_v4
  storageSizeGb: 32
  autoGrowEnabled: true  # default from spec
  delegatedSubnetId:
    value: "<delegated-subnet-resource-id>"
  privateDnsZoneId:
    value: "<private-dns-zone-resource-id>"
  backupRetentionDays: 7  # default from spec
  geoRedundantBackupEnabled: false  # default from spec
  databases:
    - name: <your-database-name>
      charset: utf8mb4  # default from spec
      collation: utf8mb4_0900_ai_ci  # default from spec
