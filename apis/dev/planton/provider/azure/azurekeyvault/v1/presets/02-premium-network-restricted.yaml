apiVersion: azure.planton.dev/v1
kind: AzureKeyVault
metadata:
  name: my-restricted-key-vault
spec:
  region: <azure-region>
  resourceGroup:
    value: "<your-resource-group-name>"
  sku: PREMIUM
  enableRbacAuthorization: true
  enablePurgeProtection: true
  softDeleteRetentionDays: 90
  networkAcls:
    defaultAction: DENY  # default from spec; deny all unless explicitly allowed
    bypassAzureServices: true  # default from spec; allow Azure Backup, Monitor, etc.
    ipRules:
      - <your-office-cidr>
    virtualNetworkSubnetIds:
      - <your-subnet-resource-id>
  secretNames:
    - <your-secret-name-1>
    - <your-secret-name-2>
