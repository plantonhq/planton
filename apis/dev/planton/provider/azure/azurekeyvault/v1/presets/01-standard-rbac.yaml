apiVersion: azure.planton.dev/v1
kind: AzureKeyVault
metadata:
  name: my-key-vault
spec:
  region: <azure-region>
  resourceGroup:
    value: "<your-resource-group-name>"
  sku: STANDARD  # default from spec
  enableRbacAuthorization: true  # default from spec; recommended over access policies
  enablePurgeProtection: true  # default from spec; prevents permanent deletion
  softDeleteRetentionDays: 90  # default from spec; maximum retention
  secretNames:
    - <your-secret-name-1>
    - <your-secret-name-2>
