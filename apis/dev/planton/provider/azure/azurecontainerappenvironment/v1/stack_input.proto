syntax = "proto3";

package dev.planton.provider.azure.azurecontainerappenvironment.v1;

import "dev/planton/provider/azure/azurecontainerappenvironment/v1/api.proto";
import "dev/planton/provider/azure/provider.proto";

// AzureContainerAppEnvironmentStackInput is the input to the IaC module.
// It contains the target resource and provider configuration.
message AzureContainerAppEnvironmentStackInput {
  // target cloud-resource to be deployed
  AzureContainerAppEnvironment target = 1;
  // provider-config for Azure authentication
  dev.planton.provider.azure.AzureProviderConfig provider_config = 2;
}
