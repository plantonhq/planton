apiVersion: azure.planton.dev/v1
kind: AzureUserAssignedIdentity
metadata:
  name: my-identity
spec:
  region: <azure-region>
  resourceGroup:
    value: "<your-resource-group-name>"
  name: <your-identity-name>
  roleAssignments:
    - scope:
        value: "<target-resource-id>"
      roleDefinitionName: Key Vault Secrets User
