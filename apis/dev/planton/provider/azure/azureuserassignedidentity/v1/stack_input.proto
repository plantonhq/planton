syntax = "proto3";

package dev.planton.provider.azure.azureuserassignedidentity.v1;

import "dev/planton/provider/azure/azureuserassignedidentity/v1/api.proto";
import "dev/planton/provider/azure/provider.proto";

// AzureUserAssignedIdentityStackInput is the input to the IaC modules (Pulumi/Terraform).
// It contains the target resource definition and Azure provider credentials.
message AzureUserAssignedIdentityStackInput {
  // The User-Assigned Managed Identity resource to deploy.
  AzureUserAssignedIdentity target = 1;

  // Azure provider configuration (credentials).
  dev.planton.provider.azure.AzureProviderConfig provider_config = 2;
}
