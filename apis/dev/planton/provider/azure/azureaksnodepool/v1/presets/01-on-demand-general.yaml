apiVersion: azure.planton.dev/v1
kind: AzureAksNodePool
metadata:
  name: my-node-pool
spec:
  clusterName:
    value: "<aks-cluster-name>"
  resourceGroup:
    value: "<your-resource-group-name>"
  vmSize: Standard_D4s_v5
  initialNodeCount: 3
  autoscaling:
    minNodes: 2
    maxNodes: 10
  availabilityZones:
    - "1"
    - "2"
    - "3"
  osType: LINUX
  mode: USER
