apiVersion: azure.planton.dev/v1
kind: AzureEventHubNamespace
metadata:
  name: test-eh
spec:
  region: eastus
  resource_group: test-rg
  name: test-eventhubs-ns
  sku: Standard
  event_hubs:
    - name: telemetry-events
      partition_count: 4
      message_retention: 1
      consumer_groups:
        - name: analytics-consumer
        - name: archiver-consumer
          user_metadata: "Archives events to blob storage"
    - name: audit-events
      partition_count: 2
      message_retention: 7
