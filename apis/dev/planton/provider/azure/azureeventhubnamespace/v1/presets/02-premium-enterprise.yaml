apiVersion: azure.planton.dev/v1
kind: AzureEventHubNamespace
metadata:
  name: my-enterprise-streaming
spec:
  region: <azure-region>
  resourceGroup:
    value: "<your-resource-group-name>"
  name: <your-namespace-name>
  sku: Premium
  capacity: 1  # 1 processing unit
  zoneRedundant: true
  minimumTlsVersion: "1.2"  # default from spec
  publicNetworkAccessEnabled: false  # private networking
  eventHubs:
    - name: domain-events
      partitionCount: 16
      messageRetention: 7
      consumerGroups:
        - name: saga-orchestrator
          userMetadata: "Distributed transaction saga processor"
        - name: projection-builder
          userMetadata: "CQRS read-model projections"
    - name: integration-events
      partitionCount: 8
      messageRetention: 3
      consumerGroups:
        - name: partner-sync
          userMetadata: "External partner data synchronization"
