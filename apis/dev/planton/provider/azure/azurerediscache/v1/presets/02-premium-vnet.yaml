apiVersion: azure.planton.dev/v1
kind: AzureRedisCache
metadata:
  name: my-redis-cache
spec:
  region: <azure-region>
  resourceGroup:
    value: "<your-resource-group-name>"
  name: <your-redis-name>
  skuName: Premium
  capacity: 1  # P1: 6 GB cache size per shard
  redisVersion: "6"  # default from spec
  subnetId:
    value: "<redis-subnet-resource-id>"
  nonSslPortEnabled: false  # default from spec
  minimumTlsVersion: "1.2"  # default from spec
  publicNetworkAccessEnabled: false
  maxmemoryPolicy: volatile-lru  # default from spec
