syntax = "proto3";

package dev.planton.provider.azure.azuremssqlserver.v1;

import "buf/validate/validate.proto";
import "dev/planton/shared/foreignkey/v1/foreign_key.proto";
import "dev/planton/shared/options/options.proto";

// **AzureMssqlServerSpec** defines the configuration for creating an Azure SQL
// Database logical server with optional databases and firewall rules.
//
// Azure SQL Database is a fully managed platform-as-a-service (PaaS) database
// engine that handles most database management functions -- upgrading, patching,
// backups, and monitoring -- without user involvement. It runs on the latest
// stable version of the SQL Server database engine and patched OS with 99.99%
// availability.
//
// **Architecture**: Unlike PostgreSQL and MySQL Flexible Servers (which are
// physical servers with compute and storage), Azure SQL uses a **logical server
// + database** model:
// - The **server** is a logical administrative container: it defines the login
//   endpoint, firewall rules, TLS policy, and connection policy. It has no
//   compute or storage of its own.
// - Each **database** carries its own compute SKU, maximum storage size, zone
//   redundancy, and license type. Databases are billed independently.
//
// This component bundles the logical server (`azurerm_mssql_server`) with its
// databases (`azurerm_mssql_database`) and firewall rules
// (`azurerm_mssql_firewall_rule`) because a server without at least one
// database and a connection path has no practical utility. This follows DD03
// (Composite Bundling Rules).
//
// **Network access**: Azure SQL does not support VNet delegation like PostgreSQL
// and MySQL Flexible Servers. Private connectivity is exclusively through
// AzurePrivateEndpoint (a separate resource). The `public_network_access_enabled`
// boolean controls whether the server is reachable over the public internet.
// When set to false, only private endpoints can reach the server.
//
// **Authentication**: SQL authentication (login + password) is always enabled.
// Azure Active Directory authentication is not exposed in v1 and can be
// configured post-deployment via the Azure portal for advanced scenarios.
//
// **ForceNew fields** (changing these destroys and recreates the server):
// `name` (server name is immutable after creation).
message AzureMssqlServerSpec {
  // The Azure region where the SQL Server will be created.
  // Examples: "eastus", "westus2", "westeurope", "southeastasia".
  string region = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1
  ];

  // The Azure Resource Group where the SQL Server will be created.
  // Can be a literal string or a reference to an AzureResourceGroup output.
  dev.planton.shared.foreignkey.v1.StringValueOrRef resource_group = 2 [
    (buf.validate.field).required = true,
    (dev.planton.shared.foreignkey.v1.default_kind) = AzureResourceGroup,
    (dev.planton.shared.foreignkey.v1.default_kind_field_path) = "status.outputs.resource_group_name"
  ];

  // The name of the SQL Server.
  // Must be globally unique across Azure. Used as the server hostname:
  // `{name}.database.windows.net`
  // Allowed characters: lowercase letters, numbers, and hyphens.
  // Must start with a letter. Cannot start or end with a hyphen.
  // Length: 3 to 63 characters.
  //
  // **ForceNew**: Changing this destroys and recreates the server.
  string name = 3 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 63,
    (buf.validate.field).cel = {
      id: "server_name_format"
      message: "Server name must start with a letter and contain only lowercase letters, numbers, and hyphens"
      expression: "this.matches('^[a-z][a-z0-9-]*$')"
    }
  ];

  // The administrator login name for the server.
  // Cannot be "admin", "administrator", "sa", "root", "dbmanager",
  // "loginmanager", "dbo", "guest", or "public".
  // Must start with a letter.
  string administrator_login = 4 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1
  ];

  // The administrator password for the server.
  // Can be a literal value or a reference to another resource's output
  // (e.g., a generated random password or a Key Vault secret value).
  //
  // Password requirements: 8-128 characters, must contain characters from
  // at least three of: uppercase, lowercase, digits, special characters.
  //
  // This is a polymorphic StringValueOrRef with no default_kind because
  // the password source varies (literal, chart variable, external secret).
  dev.planton.shared.foreignkey.v1.StringValueOrRef administrator_password = 5 [
    (buf.validate.field).required = true,
    (dev.planton.shared.options.sensitive) = true
  ];

  // The version of SQL Server.
  // Azure SQL Database supports two version identifiers:
  // - "12.0": Current version (SQL Server 2022 / Azure SQL Database)
  // - "2.0": Legacy (SQL Server 2005 era, virtually unused)
  //
  // Default: "12.0" (the only version used in practice)
  optional string version = 6 [
    (dev.planton.shared.options.default) = "12.0",
    (buf.validate.field).cel = {
      id: "version_valid"
      message: "version must be one of: 2.0, 12.0"
      expression: "this in ['2.0', '12.0']"
    }
  ];

  // The minimum TLS version for all client connections.
  // Azure SQL Database enforces TLS encryption for all connections.
  //
  // Valid values:
  // - "1.2": TLS 1.2 (recommended, industry standard since 2018)
  // - "1.0": TLS 1.0 (legacy, only for applications that cannot use TLS 1.2)
  //
  // Default: "1.2"
  optional string minimum_tls_version = 7 [
    (dev.planton.shared.options.default) = "1.2",
    (buf.validate.field).cel = {
      id: "tls_version_valid"
      message: "minimum_tls_version must be one of: 1.0, 1.2"
      expression: "this in ['1.0', '1.2']"
    }
  ];

  // Whether the server is accessible over the public internet.
  // When true: the server has a public endpoint and firewall rules control access.
  // When false: the server is only reachable via AzurePrivateEndpoint.
  //
  // Unlike PostgreSQL/MySQL Flexible Servers (which derive this from
  // delegated_subnet_id), Azure SQL requires an explicit boolean because
  // it does not support VNet delegation.
  //
  // Default: true
  optional bool public_network_access_enabled = 8 [(dev.planton.shared.options.default) = "true"];

  // The connection policy for the server.
  // Controls how clients establish connections to the Azure SQL server.
  //
  // Valid values:
  // - "Default": Uses Redirect for connections from within Azure, Proxy for external
  // - "Proxy": All connections are proxied through the Azure SQL gateway (higher latency)
  // - "Redirect": Connections are redirected to the database node (lower latency, requires
  //   ports 11000-11999 open in addition to 1433)
  //
  // "Redirect" is recommended for Azure-to-Azure workloads for best performance.
  // "Proxy" is simpler for external clients that cannot open the port range.
  //
  // Default: "Default"
  optional string connection_policy = 9 [
    (dev.planton.shared.options.default) = "Default",
    (buf.validate.field).cel = {
      id: "connection_policy_valid"
      message: "connection_policy must be one of: Default, Proxy, Redirect"
      expression: "this in ['Default', 'Proxy', 'Redirect']"
    }
  ];

  // Databases to create on the server.
  // Each database is a separate `azurerm_mssql_database` resource with its own
  // compute SKU, storage, and lifecycle.
  //
  // **Important**: Unlike PostgreSQL/MySQL where the server defines compute,
  // in Azure SQL each database carries its own compute tier (sku_name) and
  // maximum storage size (max_size_gb). The server is only a logical container.
  //
  // If omitted, only the system databases exist (master, tempdb, etc.).
  // Most applications create at least one application database.
  repeated AzureMssqlDatabase databases = 10;

  // Firewall rules for public access mode.
  // Only effective when `public_network_access_enabled` is true.
  // Each rule allows connections from a range of IP addresses.
  //
  // To allow all Azure services: start_ip_address = "0.0.0.0", end_ip_address = "0.0.0.0"
  // To allow a single IP: set both start and end to the same address.
  repeated AzureMssqlFirewallRule firewall_rules = 11;
}

// AzureMssqlDatabase defines a database to create on the Azure SQL logical server.
//
// Each database is a separate Azure resource with its own compute tier (SKU),
// maximum storage, zone redundancy, and license type. This is fundamentally
// different from PostgreSQL/MySQL Flexible Server databases, which are lightweight
// objects (just name + charset + collation) because the server carries the compute.
//
// **SKU naming convention**:
// - DTU-based: "Basic", "S0"-"S12" (Standard), "P1"-"P15" (Premium)
// - vCore-based: "{SERVICE_TIER}_Gen5_{VCORES}" where SERVICE_TIER is:
//   - "GP" (General Purpose): e.g., "GP_Gen5_2", "GP_Gen5_4", "GP_Gen5_8"
//   - "BC" (Business Critical): e.g., "BC_Gen5_2", "BC_Gen5_4"
//   - "HS" (Hyperscale): e.g., "HS_Gen5_2", "HS_Gen5_4"
// - Serverless: "GP_S_Gen5_1", "GP_S_Gen5_2" (auto-pause capable)
// - Free: "Free" (one free database per subscription)
message AzureMssqlDatabase {
  // The name of the database.
  // Must be unique within the server. Cannot contain special characters
  // `<>*%&:\/?` and cannot end with a period or space.
  // Maximum length: 128 characters.
  string name = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 128
  ];

  // The SKU name defining the compute tier and performance level.
  // This is the most important field -- it determines compute capacity and cost.
  //
  // DTU-based tiers (simpler, bundled compute/IO/storage):
  //   "Basic" (~5 DTU), "S0" (10 DTU), "S1" (20 DTU), "S2" (50 DTU),
  //   "S3" (100 DTU), "P1" (125 DTU), "P2" (250 DTU), "P4" (500 DTU)
  //
  // vCore-based tiers (flexible, independent compute/storage):
  //   "GP_Gen5_2" (2 vCores), "GP_Gen5_4", "GP_Gen5_8", "GP_Gen5_16"
  //   "BC_Gen5_2", "BC_Gen5_4" (Business Critical with local SSD)
  //   "HS_Gen5_2", "HS_Gen5_4" (Hyperscale, up to 100 TB)
  //
  // Serverless (auto-pause, pay-per-second):
  //   "GP_S_Gen5_1", "GP_S_Gen5_2", "GP_S_Gen5_4"
  string sku_name = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1
  ];

  // The maximum size of the database in gigabytes.
  // If omitted, Azure uses the default for the chosen SKU.
  //
  // For DTU-based: varies by tier (Basic: 2 GB, S0-S2: 250 GB, P1: 500 GB)
  // For vCore-based: up to 4096 GB (GP), 4096 GB (BC), 100 TB (HS)
  //
  // Fractional values (0.5 GB) are supported by Azure but this field uses
  // int32 for simplicity. Use the Azure portal for sub-GB sizing.
  optional int32 max_size_gb = 3 [(buf.validate.field).int32.gte = 1];

  // The collation of the database.
  // Determines sort order and string comparison behavior.
  //
  // Default: "SQL_Latin1_General_CP1_CI_AS" (case-insensitive, accent-sensitive;
  // the default for Azure SQL Database and most SQL Server deployments).
  //
  // Common alternatives:
  // - "SQL_Latin1_General_CP1_CS_AS" (case-sensitive)
  // - "Latin1_General_100_CI_AS_SC_UTF8" (UTF-8 with supplementary characters)
  //
  // **ForceNew**: Changing collation after creation destroys and recreates the database.
  optional string collation = 4 [(dev.planton.shared.options.default) = "SQL_Latin1_General_CP1_CI_AS"];

  // Enable zone redundancy for the database.
  // When true, database replicas are spread across availability zones for
  // higher availability. Supported on Premium (DTU) and Business Critical (vCore).
  // Not supported on Basic, Standard, or General Purpose tiers.
  //
  // Default: false
  optional bool zone_redundant = 5 [(dev.planton.shared.options.default) = "false"];

  // The license type for Azure Hybrid Benefit.
  // Allows customers with existing SQL Server licenses (with Software Assurance)
  // to save up to 55% on Azure SQL Database costs.
  //
  // Valid values:
  // - "BasePrice": Azure Hybrid Benefit applied (bring your own license, lower cost)
  // - "LicenseIncluded": Full Azure SQL license cost included (pay-as-you-go)
  //
  // If omitted, Azure defaults to "LicenseIncluded".
  // Not applicable to serverless (GP_S_*) or Free SKUs.
  optional string license_type = 6 [(buf.validate.field).cel = {
    id: "license_type_valid"
    message: "license_type must be one of: BasePrice, LicenseIncluded"
    expression: "this in ['BasePrice', 'LicenseIncluded']"
  }];

  // The storage account type for backup redundancy.
  // Controls where database backups are replicated for disaster recovery.
  //
  // Valid values:
  // - "Geo": Geo-redundant (default, backups replicated to paired region)
  // - "GeoZone": Geo-zone-redundant (backups across zones and regions)
  // - "Local": Locally-redundant (backups stay in the same region)
  // - "Zone": Zone-redundant (backups across availability zones, same region)
  //
  // Default: "Geo"
  optional string storage_account_type = 7 [
    (dev.planton.shared.options.default) = "Geo",
    (buf.validate.field).cel = {
      id: "storage_account_type_valid"
      message: "storage_account_type must be one of: Geo, GeoZone, Local, Zone"
      expression: "this in ['Geo', 'GeoZone', 'Local', 'Zone']"
    }
  ];
}

// AzureMssqlFirewallRule defines a firewall rule for public access mode.
// Each rule allows connections from a contiguous range of IPv4 addresses.
message AzureMssqlFirewallRule {
  // The name of the firewall rule.
  // Must be unique within the server.
  // Examples: "allow-office", "allow-azure-services", "allow-dev-machine".
  string name = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1
  ];

  // The start of the IP address range (inclusive).
  // Must be a valid IPv4 address.
  // Use "0.0.0.0" with end "0.0.0.0" to allow all Azure services.
  string start_ip_address = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 7
  ];

  // The end of the IP address range (inclusive).
  // Must be a valid IPv4 address and >= start_ip_address.
  // Set equal to start_ip_address for a single IP rule.
  string end_ip_address = 3 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 7
  ];
}
