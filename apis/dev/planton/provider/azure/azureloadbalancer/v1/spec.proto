syntax = "proto3";

package dev.planton.provider.azure.azureloadbalancer.v1;

import "buf/validate/validate.proto";
import "dev/planton/shared/foreignkey/v1/foreign_key.proto";
import "dev/planton/shared/options/options.proto";

// **AzureLoadBalancerSpec** defines the configuration for creating an Azure
// Load Balancer with backend pools, health probes, and load balancing rules.
//
// Azure Load Balancer is a Layer 4 (TCP/UDP) load balancer that distributes
// incoming traffic across healthy backend instances. It supports both public
// (internet-facing) and internal (private VNet) configurations, determined by
// whether `public_ip_id` or `subnet_id` is provided.
//
// This component bundles the load balancer (`azurerm_lb`) with its backend
// address pools (`azurerm_lb_backend_address_pool`), health probes
// (`azurerm_lb_probe`), and load balancing rules (`azurerm_lb_rule`) because
// an LB without these sub-resources is non-functional. This follows DD03
// (Composite Bundling Rules).
//
// **SKU**: Standard SKU is hardcoded in the IaC modules. Basic SKU was retired
// by Azure in September 2025 and lacks zone redundancy, outbound rules, and SLA
// guarantees. Gateway SKU is for NVA chaining (extremely niche). This follows
// the same approach as AzurePublicIp which hardcodes Standard for the same reasons.
//
// **Public vs Internal**: The LB mode is determined by which frontend field is set:
// - `public_ip_id` set --> public (internet-facing) load balancer
// - `subnet_id` set --> internal (private VNet) load balancer
// There is no `is_internal` boolean. A CEL validation enforces that exactly one
// of the two fields is set, eliminating any contradiction risk.
//
// **Backend pools**: Only the pool name is defined here. Actual backend members
// (VMs, VMSS instances, NICs) are added through other mechanisms -- AKS node pools,
// VMSS associations, or NIC-to-pool bindings. This keeps the LB lifecycle clean.
//
// **NAT rules and outbound rules** are omitted per 80/20 scoping. NAT rules
// handle port forwarding to individual VMs (niche for Standard LB deployments),
// and outbound rules configure explicit SNAT (advanced networking). Both can be
// added via the Azure portal or CLI without modifying the LB component.
message AzureLoadBalancerSpec {
  // The Azure region where the Load Balancer will be created.
  // Must match the region of the backend resources (VMs, VMSS, AKS).
  // Examples: "eastus", "westus2", "westeurope", "southeastasia".
  string region = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1
  ];

  // The Azure Resource Group where the Load Balancer will be created.
  // Can be a literal string or a reference to an AzureResourceGroup output.
  dev.planton.shared.foreignkey.v1.StringValueOrRef resource_group = 2 [
    (buf.validate.field).required = true,
    (dev.planton.shared.foreignkey.v1.default_kind) = AzureResourceGroup,
    (dev.planton.shared.foreignkey.v1.default_kind_field_path) = "status.outputs.resource_group_name"
  ];

  // The name of the Load Balancer.
  // Must be unique within the resource group.
  // Allowed characters: alphanumeric, underscores, hyphens, and periods.
  // Must start with alphanumeric. Length: 1 to 80 characters.
  string name = 3 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 80
  ];

  // The ID of a public IP address to use for the frontend configuration.
  // Set this for a **public (internet-facing)** load balancer.
  // Mutually exclusive with `subnet_id` -- exactly one must be set.
  //
  // Can be a literal Azure resource ID or a reference to an AzurePublicIp output.
  // The referenced public IP must use Standard SKU (hardcoded in AzurePublicIp).
  dev.planton.shared.foreignkey.v1.StringValueOrRef public_ip_id = 4 [
    (dev.planton.shared.foreignkey.v1.default_kind) = AzurePublicIp,
    (dev.planton.shared.foreignkey.v1.default_kind_field_path) = "status.outputs.public_ip_id"
  ];

  // The ID of a subnet to use for the frontend configuration.
  // Set this for an **internal (private VNet)** load balancer.
  // Mutually exclusive with `public_ip_id` -- exactly one must be set.
  //
  // Can be a literal Azure resource ID or a reference to an AzureSubnet output.
  dev.planton.shared.foreignkey.v1.StringValueOrRef subnet_id = 5 [
    (dev.planton.shared.foreignkey.v1.default_kind) = AzureSubnet,
    (dev.planton.shared.foreignkey.v1.default_kind_field_path) = "status.outputs.subnet_id"
  ];

  // Optional static private IP address for an internal load balancer.
  // Only valid when `subnet_id` is set. The IP must fall within the subnet's
  // address range.
  //
  // If omitted, Azure dynamically allocates a private IP from the subnet.
  // Use a static IP when DNS resolution, firewall rules, or service discovery
  // require a predictable address.
  string private_ip_address = 6;

  // Backend address pools that receive load-balanced traffic.
  // At least one pool is required. Each pool is created as a separate
  // `azurerm_lb_backend_address_pool` resource.
  //
  // Pool membership (adding VMs, VMSS instances, or NICs) is managed outside
  // this component -- via AKS node pools, VMSS configurations, or NIC-to-pool
  // associations. This keeps the LB definition focused on routing topology.
  //
  // For the common case, a single pool named "default" is sufficient.
  repeated AzureBackendPool backend_pools = 7 [(buf.validate.field).repeated.min_items = 1];

  // Health probes that check backend instance availability.
  // At least one probe is required. Each probe is created as a separate resource.
  //
  // Probes run at `interval_in_seconds` intervals. After `number_of_probes`
  // consecutive failures, the backend is marked unhealthy and removed from
  // the rotation. Healthy backends are automatically re-added.
  repeated AzureHealthProbe health_probes = 8 [(buf.validate.field).repeated.min_items = 1];

  // Load balancing rules that define how traffic is routed from the frontend
  // to backend pools. At least one rule is required.
  //
  // Each rule maps a frontend port/protocol combination to a backend pool
  // and health probe. The frontend IP configuration name is auto-derived
  // from `metadata.name` (as "{name}-frontend") and does not need to be
  // specified in rules.
  repeated AzureLoadBalancingRule rules = 9 [(buf.validate.field).repeated.min_items = 1];
}

// AzureBackendPool defines a backend address pool on the load balancer.
// Pools are named containers that hold references to backend instances.
// The actual instance membership is managed externally (via VMSS, AKS, or NIC binding).
message AzureBackendPool {
  // The name of the backend pool.
  // Must be unique within the load balancer. Used by load balancing rules
  // to target traffic to this pool.
  // Examples: "default", "web-servers", "api-pool".
  string name = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 80
  ];
}

// AzureHealthProbe defines how the load balancer checks backend health.
// Unhealthy backends are removed from the rotation until they recover.
message AzureHealthProbe {
  // The name of the health probe.
  // Must be unique within the load balancer. Referenced by load balancing rules.
  // Examples: "http-probe", "tcp-8080-probe", "https-health".
  string name = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 80
  ];

  // The protocol used for the health probe.
  // Uses Azure's exact API values for provider authenticity.
  //
  // Valid values:
  // - "Tcp" -- TCP connection check (port open = healthy)
  // - "Http" -- HTTP GET to `request_path` (200 OK = healthy)
  // - "Https" -- HTTPS GET to `request_path` (200 OK = healthy)
  string protocol = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).cel = {
      id: "probe_protocol_valid"
      message: "protocol must be one of: Tcp, Http, Https"
      expression: "this in ['Tcp', 'Http', 'Https']"
    }
  ];

  // The port number to probe on the backend instances.
  // Range: 1 to 65535.
  // Examples: 80 (HTTP), 443 (HTTPS), 8080 (app), 3306 (MySQL).
  int32 port = 3 [
    (buf.validate.field).required = true,
    (buf.validate.field).int32 = {
      gte: 1
      lte: 65535
    }
  ];

  // The URI path for HTTP/HTTPS probes.
  // Required when protocol is "Http" or "Https", ignored for "Tcp".
  // The probe sends a GET request to this path and expects HTTP 200.
  // Examples: "/health", "/api/healthz", "/ready".
  string request_path = 4;

  // The interval between probe attempts, in seconds.
  // Lower values detect failures faster but generate more probe traffic.
  // Default: 15 seconds. Minimum: 5 seconds.
  optional int32 interval_in_seconds = 5 [
    (dev.planton.shared.options.default) = "15",
    (buf.validate.field).int32.gte = 5
  ];

  // The number of consecutive probe failures before marking a backend unhealthy.
  // After this many failures, the backend is removed from rotation.
  // Default: 2 (Azure default). Minimum: 1.
  optional int32 number_of_probes = 6 [
    (dev.planton.shared.options.default) = "2",
    (buf.validate.field).int32.gte = 1
  ];
}

// AzureLoadBalancingRule defines how traffic arriving at the frontend is
// distributed to a backend pool. Each rule maps a frontend port/protocol
// to a backend port and references a health probe for backend health checks.
message AzureLoadBalancingRule {
  // The name of the load balancing rule.
  // Must be unique within the load balancer.
  // Examples: "http-rule", "https-rule", "tcp-3306-rule".
  string name = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 80
  ];

  // The transport protocol for the rule.
  // Uses Azure's exact API values.
  //
  // Valid values:
  // - "Tcp" -- TCP traffic
  // - "Udp" -- UDP traffic
  // - "All" -- all protocols (HA ports rule, requires frontend_port = 0 and backend_port = 0)
  string protocol = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).cel = {
      id: "rule_protocol_valid"
      message: "protocol must be one of: Tcp, Udp, All"
      expression: "this in ['Tcp', 'Udp', 'All']"
    }
  ];

  // The port on the frontend (public IP or internal IP) that receives traffic.
  // Range: 0 to 65534. Use 0 for HA ports (protocol "All").
  int32 frontend_port = 3 [(buf.validate.field).int32 = {
    gte: 0
    lte: 65534
  }];

  // The port on the backend instances that receives forwarded traffic.
  // Range: 0 to 65535. Use 0 for HA ports (protocol "All").
  int32 backend_port = 4 [(buf.validate.field).int32 = {
    gte: 0
    lte: 65535
  }];

  // The name of the backend pool to route traffic to.
  // Must match a pool name defined in `backend_pools`.
  string backend_pool_name = 5 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1
  ];

  // The name of the health probe to use for backend health checks.
  // Must match a probe name defined in `health_probes`.
  string probe_name = 6 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1
  ];

  // The TCP idle timeout in minutes. Connections idle longer than this are closed.
  // Default: 4 minutes. Range: 4 to 100 minutes.
  // Higher values suit long-lived connections (WebSocket, database pools).
  optional int32 idle_timeout_in_minutes = 7 [
    (dev.planton.shared.options.default) = "4",
    (buf.validate.field).int32 = {
      gte: 4
      lte: 100
    }
  ];

  // Enable floating IP (Direct Server Return).
  // When enabled, Azure does not rewrite the destination IP in packets --
  // the backend receives the original frontend IP. Required for SQL AlwaysOn
  // availability groups and some HA clustering scenarios.
  // Default: false.
  optional bool enable_floating_ip = 8 [(dev.planton.shared.options.default) = "false"];

  // Disable outbound SNAT for this rule's backend pool.
  // By default, Standard LB provides SNAT for outbound traffic from backends.
  // Disable this when using explicit outbound rules or a NAT Gateway for
  // outbound connectivity, to avoid SNAT port exhaustion.
  // Default: false.
  optional bool disable_outbound_snat = 9 [(dev.planton.shared.options.default) = "false"];
}
