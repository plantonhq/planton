syntax = "proto3";

package dev.planton.provider.azure.azureloadbalancer.v1;

import "dev/planton/provider/azure/azureloadbalancer/v1/api.proto";
import "dev/planton/provider/azure/provider.proto";

// AzureLoadBalancerStackInput is the input to the IaC module.
// It contains the target resource and provider configuration.
message AzureLoadBalancerStackInput {
  // target cloud-resource to be deployed
  AzureLoadBalancer target = 1;
  // provider-config for Azure authentication
  dev.planton.provider.azure.AzureProviderConfig provider_config = 2;
}
