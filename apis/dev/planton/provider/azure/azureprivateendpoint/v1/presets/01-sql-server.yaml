apiVersion: azure.planton.dev/v1
kind: AzurePrivateEndpoint
metadata:
  name: my-sql-private-endpoint
spec:
  region: <azure-region>
  resourceGroup:
    value: "<your-resource-group-name>"
  name: <your-pe-name>
  subnetId:
    value: "<subnet-resource-id>"
  privateConnectionResourceId:
    value: "<sql-server-resource-id>"
  subresourceNames:
    - sqlServer
  privateDnsZoneId:
    value: "<private-dns-zone-id>"
