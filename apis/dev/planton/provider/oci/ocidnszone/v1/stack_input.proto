syntax = "proto3";

package dev.planton.provider.oci.ocidnszone.v1;

import "dev/planton/provider/oci/ocidnszone/v1/api.proto";
import "dev/planton/provider/oci/provider.proto";

// OciDnsZoneStackInput is the input to the IaC modules
// (Pulumi / Terraform) that deploy an OciDnsZone resource.
message OciDnsZoneStackInput {
  // target cloud-resource
  OciDnsZone target = 1;
  // provider-config
  dev.planton.provider.oci.OciProviderConfig provider_config = 2;
}
