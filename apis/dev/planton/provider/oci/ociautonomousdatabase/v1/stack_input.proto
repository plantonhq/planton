syntax = "proto3";

package dev.planton.provider.oci.ociautonomousdatabase.v1;

import "dev/planton/provider/oci/ociautonomousdatabase/v1/api.proto";
import "dev/planton/provider/oci/provider.proto";

// OciAutonomousDatabaseStackInput is the input to the IaC modules
// (Pulumi / Terraform) that deploy an OciAutonomousDatabase resource.
message OciAutonomousDatabaseStackInput {
  // target cloud-resource
  OciAutonomousDatabase target = 1;
  // provider-config
  dev.planton.provider.oci.OciProviderConfig provider_config = 2;
}
