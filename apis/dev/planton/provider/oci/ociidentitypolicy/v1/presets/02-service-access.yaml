apiVersion: oci.planton.dev/v1
kind: OciIdentityPolicy
metadata:
  name: my-service-access-policy
spec:
  compartmentId:
    value: <compartment-ocid>
  description: Grants a dynamic group access to specific OCI services for workload identity
  statements:
    - Allow dynamic-group <dynamic-group-name> to read secret-family in compartment <compartment-name>
    - Allow dynamic-group <dynamic-group-name> to use keys in compartment <compartment-name>
    - Allow dynamic-group <dynamic-group-name> to manage object-family in compartment <compartment-name>
    - Allow dynamic-group <dynamic-group-name> to use virtual-network-family in compartment <compartment-name>
