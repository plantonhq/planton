syntax = "proto3";

package dev.planton.provider.oci.ociidentitypolicy.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/oci/ociidentitypolicy/v1/spec.proto";
import "dev/planton/provider/oci/ociidentitypolicy/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// OciIdentityPolicy is the top-level resource representing an Oracle Cloud
// Infrastructure IAM policy for granting access to compartment resources.
message OciIdentityPolicy {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'oci.planton.dev/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'OciIdentityPolicy'];

  // metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  OciIdentityPolicySpec spec = 4 [(buf.validate.field).required = true];

  // status
  OciIdentityPolicyStatus status = 5;
}

// OciIdentityPolicyStatus holds the outputs produced by deploying an OciIdentityPolicy.
message OciIdentityPolicyStatus {
  // stack-outputs
  OciIdentityPolicyStackOutputs outputs = 1;
}
