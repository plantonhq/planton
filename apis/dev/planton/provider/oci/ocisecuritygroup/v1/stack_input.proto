syntax = "proto3";

package dev.planton.provider.oci.ocisecuritygroup.v1;

import "dev/planton/provider/oci/ocisecuritygroup/v1/api.proto";
import "dev/planton/provider/oci/provider.proto";

// OciSecurityGroupStackInput is the input to the IaC modules
// (Pulumi / Terraform) that deploy an OciSecurityGroup resource.
message OciSecurityGroupStackInput {
  // target cloud-resource
  OciSecurityGroup target = 1;
  // provider-config
  dev.planton.provider.oci.OciProviderConfig provider_config = 2;
}
