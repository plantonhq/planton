apiVersion: oci.planton.dev/v1
kind: OciKmsKey
metadata:
  name: my-encryption-key
spec:
  compartmentId:
    value: <compartment-ocid>
  managementEndpoint:
    value: <vault-management-endpoint>
  keyShape:
    algorithm: aes
    length: 32 # 256-bit key
  protectionMode: hsm # FIPS 140-2 Level 3 hardware security module
  isAutoRotationEnabled: true
  autoKeyRotationDetails:
    rotationIntervalInDays: 90
