apiVersion: oci.planton.dev/v1
kind: OciContainerEngineNodePool
metadata:
  name: my-hardened-oke-node-pool
spec:
  compartmentId:
    value: <compartment-ocid>
  clusterId:
    value: <oke-cluster-ocid>
  kubernetesVersion: <kubernetes-version>
  nodeShape: VM.Standard.E4.Flex
  nodeShapeConfig:
    ocpus: 4
    memoryInGbs: 64 # 16 GB per OCPU; higher density for fewer, larger nodes
  nodeSourceDetails:
    imageId: <node-image-ocid>
    bootVolumeSizeInGbs: 100 # larger boot volume for audit logs and ephemeral storage
  nodeConfigDetails:
    size: 3
    placementConfigs:
      - availabilityDomain: <availability-domain-1>
        subnetId:
          value: <private-worker-subnet-ocid>
        faultDomains:
          - FAULT-DOMAIN-1
          - FAULT-DOMAIN-2
      - availabilityDomain: <availability-domain-2>
        subnetId:
          value: <private-worker-subnet-ocid>
        faultDomains:
          - FAULT-DOMAIN-1
          - FAULT-DOMAIN-2
      - availabilityDomain: <availability-domain-3>
        subnetId:
          value: <private-worker-subnet-ocid>
        faultDomains:
          - FAULT-DOMAIN-1
          - FAULT-DOMAIN-2
    nsgIds:
      - value: <worker-nsg-ocid>
    kmsKeyId:
      value: <kms-key-ocid>
    isPvEncryptionInTransitEnabled: true
    podNetworkOptionDetails:
      cniType: oci_vcn_ip_native
      maxPodsPerNode: 31
      podSubnetIds:
        - value: <pod-subnet-ocid>
      podNsgIds:
        - value: <pod-nsg-ocid>
  initialNodeLabels:
    - key: pool
      value: hardened
  nodeEvictionSettings:
    evictionGraceDuration: PT30M # shorter grace; regulated environments need timely upgrade completion
    isForceDeleteAfterGraceDuration: true
  nodePoolCyclingDetails:
    isNodeCyclingEnabled: true
    maximumSurge: "1"
    maximumUnavailable: "0"
