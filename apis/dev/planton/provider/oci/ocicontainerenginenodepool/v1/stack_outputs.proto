syntax = "proto3";

package dev.planton.provider.oci.ocicontainerenginenodepool.v1;

// OciContainerEngineNodePoolStackOutputs contains the outputs produced after
// deploying an OciContainerEngineNodePool.
// These values are used by downstream components and infra charts for
// composability via StringValueOrRef.
message OciContainerEngineNodePoolStackOutputs {
  // OCID of the node pool.
  string node_pool_id = 1;

  // Kubernetes version running on the nodes in this pool.
  // Matches the cluster version when not explicitly overridden.
  string kubernetes_version = 2;
}
