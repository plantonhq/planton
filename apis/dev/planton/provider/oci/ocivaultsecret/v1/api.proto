syntax = "proto3";

package dev.planton.provider.oci.ocivaultsecret.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/oci/ocivaultsecret/v1/spec.proto";
import "dev/planton/provider/oci/ocivaultsecret/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// OciVaultSecret is the Kubernetes Resource Model (KRM) envelope for
// deploying a secret into an OCI KMS Vault.
message OciVaultSecret {
  // Must be "oci.planton.dev/v1".
  string api_version = 1 [(buf.validate.field).string.const = 'oci.planton.dev/v1'];

  // Must be "OciVaultSecret".
  string kind = 2 [(buf.validate.field).string.const = 'OciVaultSecret'];

  // Standard Planton resource metadata.
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // Desired state of the Vault Secret.
  OciVaultSecretSpec spec = 4 [(buf.validate.field).required = true];

  // Observed state populated after deployment.
  OciVaultSecretStatus status = 5;
}

// OciVaultSecretStatus holds the observed state of the Vault Secret
// after deployment.
message OciVaultSecretStatus {
  OciVaultSecretStackOutputs outputs = 1;
}
