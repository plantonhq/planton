apiVersion: oci.planton.dev/v1
kind: OciVaultSecret
metadata:
  name: my-secret
spec:
  compartmentId:
    value: <compartment-ocid>
  secretName: <secret-name>
  vaultId:
    value: <vault-ocid>
  keyId:
    value: <encryption-key-ocid>
  description: Application credential managed by Planton
  secretContent:
    content: <base64-encoded-secret-value>
    stage: CURRENT
  secretRules:
    - ruleType: secret_expiry_rule
      secretVersionExpiryInterval: P90D # Versions expire after 90 days
      isSecretContentRetrievalBlockedOnExpiry: true
