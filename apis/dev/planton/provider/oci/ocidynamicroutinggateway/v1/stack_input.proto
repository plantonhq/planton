syntax = "proto3";

package dev.planton.provider.oci.ocidynamicroutinggateway.v1;

import "dev/planton/provider/oci/ocidynamicroutinggateway/v1/api.proto";
import "dev/planton/provider/oci/provider.proto";

// OciDynamicRoutingGatewayStackInput is the input to the IaC modules
// (Pulumi / Terraform) that deploy an OciDynamicRoutingGateway resource.
message OciDynamicRoutingGatewayStackInput {
  // target cloud-resource
  OciDynamicRoutingGateway target = 1;
  // provider-config
  dev.planton.provider.oci.OciProviderConfig provider_config = 2;
}
