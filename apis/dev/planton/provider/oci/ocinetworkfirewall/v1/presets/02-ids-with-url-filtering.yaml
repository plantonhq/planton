apiVersion: oci.planton.dev/v1
kind: OciNetworkFirewall
metadata:
  name: my-ids-firewall
spec:
  compartmentId:
    value: <compartment-ocid>
  subnetId:
    value: <firewall-subnet-ocid>
  networkSecurityGroupIds:
    - value: <firewall-nsg-ocid>
  policy:
    displayName: ids-url-filtering-policy
    description: IDS-enabled policy with URL filtering for regulated environments
    addressLists:
      - name: any-ipv4
        type: ip
        addresses:
          - 0.0.0.0/0
        description: All IPv4 addresses
      - name: internal-networks
        type: ip
        addresses:
          - 10.0.0.0/8
        description: Internal VCN address space
      - name: blocked-destinations
        type: fqdn
        addresses:
          - malware.example.com
          - phishing.example.com
        description: Known malicious FQDNs (replace with actual threat intelligence)
    services:
      - name: https
        type: tcp_service
        portRanges:
          - minimumPort: 443
        description: HTTPS traffic
      - name: http
        type: tcp_service
        portRanges:
          - minimumPort: 80
        description: HTTP traffic
      - name: dns
        type: udp_service
        portRanges:
          - minimumPort: 53
        description: DNS queries
    serviceLists:
      - name: web-traffic
        services:
          - https
          - http
        description: Combined HTTP and HTTPS
    urlLists:
      - name: blocked-urls
        urls:
          - pattern: "*.malware.example.com"
          - pattern: "*.phishing.example.com"
        description: URL patterns to block (replace with actual threat intelligence)
    securityRules:
      - name: block-malicious-urls
        action: reject
        condition:
          urls:
            - blocked-urls
        description: Reject HTTP/HTTPS requests matching blocked URL patterns
      - name: inspect-web-traffic
        action: inspect
        condition:
          sourceAddresses:
            - any-ipv4
          destinationAddresses:
            - internal-networks
          services:
            - web-traffic
        inspection: intrusion_detection
        description: Inspect inbound web traffic for known attack signatures
      - name: allow-dns
        action: allow
        condition:
          sourceAddresses:
            - internal-networks
          services:
            - dns
        description: Allow DNS resolution from internal networks
      - name: allow-outbound
        action: allow
        condition:
          sourceAddresses:
            - internal-networks
          destinationAddresses:
            - any-ipv4
        description: Allow all outbound from internal networks
      - name: deny-all
        action: drop
        condition:
          sourceAddresses:
            - any-ipv4
          destinationAddresses:
            - any-ipv4
        description: Drop all unmatched traffic
