syntax = "proto3";

package dev.planton.provider.oci.ocinetworkfirewall.v1;

// OciNetworkFirewallStackOutputs contains the outputs produced after
// deploying an OciNetworkFirewall.
// These values are used by downstream components for composability via
// StringValueOrRef.
message OciNetworkFirewallStackOutputs {
  // OCID of the network firewall.
  string firewall_id = 1;

  // IPv4 address of the firewall appliance. Used for configuring route
  // table entries to direct traffic through the firewall.
  string ipv4_address = 2;

  // OCID of the firewall policy.
  string policy_id = 3;
}
