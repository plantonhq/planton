syntax = "proto3";

package dev.planton.provider.oci.ocinetworkfirewall.v1;

import "dev/planton/provider/oci/ocinetworkfirewall/v1/api.proto";
import "dev/planton/provider/oci/provider.proto";

// OciNetworkFirewallStackInput is the input to the IaC modules
// (Pulumi / Terraform) that deploy an OciNetworkFirewall resource.
message OciNetworkFirewallStackInput {
  // target cloud-resource
  OciNetworkFirewall target = 1;
  // provider-config
  dev.planton.provider.oci.OciProviderConfig provider_config = 2;
}
