syntax = "proto3";

package dev.planton.provider.oci.ocivcn.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/oci/ocivcn/v1/spec.proto";
import "dev/planton/provider/oci/ocivcn/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// OciVcn is the top-level resource representing an Oracle Cloud Infrastructure
// Virtual Cloud Network with optional gateway sub-resources.
message OciVcn {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'oci.planton.dev/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'OciVcn'];

  // metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  OciVcnSpec spec = 4 [(buf.validate.field).required = true];

  // status
  OciVcnStatus status = 5;
}

// OciVcnStatus holds the outputs produced by deploying an OciVcn.
message OciVcnStatus {
  // stack-outputs
  OciVcnStackOutputs outputs = 1;
}
