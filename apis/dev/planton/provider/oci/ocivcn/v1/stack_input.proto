syntax = "proto3";

package dev.planton.provider.oci.ocivcn.v1;

import "dev/planton/provider/oci/ocivcn/v1/api.proto";
import "dev/planton/provider/oci/provider.proto";

// OciVcnStackInput is the input to the IaC modules (Pulumi / Terraform)
// that deploy an OciVcn resource.
message OciVcnStackInput {
  // target cloud-resource
  OciVcn target = 1;
  // provider-config
  dev.planton.provider.oci.OciProviderConfig provider_config = 2;
}
