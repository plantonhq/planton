apiVersion: oci.planton.dev/v1
kind: OciVcn
metadata:
  name: my-private-vcn
spec:
  compartmentId:
    value: <compartment-ocid>
  cidrBlocks:
    - 10.0.0.0/16
  displayName: private-vcn
  dnsLabel: privvcn
  isIpv6Enabled: false
  isInternetGatewayEnabled: false # No direct inbound internet access
  isNatGatewayEnabled: true # Private subnets can initiate outbound internet connections
  isServiceGatewayEnabled: true # Private access to OCI services without internet transit
