syntax = "proto3";

package dev.planton.provider.oci.ocicomputeinstance.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/oci/ocicomputeinstance/v1/spec.proto";
import "dev/planton/provider/oci/ocicomputeinstance/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// OciComputeInstance is the top-level resource representing an Oracle Cloud
// Infrastructure compute instance (virtual machine or bare metal host).
message OciComputeInstance {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'oci.planton.dev/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'OciComputeInstance'];

  // metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  OciComputeInstanceSpec spec = 4 [(buf.validate.field).required = true];

  // status
  OciComputeInstanceStatus status = 5;
}

// OciComputeInstanceStatus holds the outputs produced by deploying an
// OciComputeInstance.
message OciComputeInstanceStatus {
  // stack-outputs
  OciComputeInstanceStackOutputs outputs = 1;
}
