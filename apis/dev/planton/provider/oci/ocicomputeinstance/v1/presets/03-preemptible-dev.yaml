apiVersion: oci.planton.dev/v1
kind: OciComputeInstance
metadata:
  name: my-preemptible-dev-instance
spec:
  compartmentId:
    value: <compartment-ocid>
  availabilityDomain: <availability-domain>
  shape: VM.Standard.E4.Flex
  shapeConfig:
    ocpus: 1
    memoryInGbs: 8
  sourceDetails:
    sourceType: image
    sourceId: <image-ocid>
  createVnicDetails:
    subnetId:
      value: <subnet-ocid>
    assignPublicIp: true
  preemptibleInstanceConfig:
    preserveBootVolume: true
  metadata:
    ssh_authorized_keys: <ssh-public-key>
