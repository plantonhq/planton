apiVersion: oci.planton.dev/v1
kind: OciObjectStorageBucket
metadata:
  name: my-public-bucket
spec:
  compartmentId:
    value: <compartment-ocid>
  namespace: <object-storage-namespace>
  name: <bucket-name>
  accessType: object_read_without_list # Individual objects are readable but the bucket cannot be listed
  storageTier: standard
  versioning: disabled
  objectEventsEnabled: true # Track downloads and changes via OCI Events
  lifecycleRules:
    - name: cleanup-incomplete-uploads
      action: lifecycle_abort
      isEnabled: true
      timeAmount: 3
      timeUnit: days
      target: multipart-uploads
