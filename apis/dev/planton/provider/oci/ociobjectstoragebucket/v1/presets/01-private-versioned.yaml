apiVersion: oci.planton.dev/v1
kind: OciObjectStorageBucket
metadata:
  name: my-app-bucket
spec:
  compartmentId:
    value: <compartment-ocid>
  namespace: <object-storage-namespace>
  name: <bucket-name>
  accessType: no_public_access
  storageTier: standard
  versioning: enabled
  autoTiering: infrequent_access # Automatically tier infrequently accessed objects to save costs
  kmsKeyId:
    value: <kms-key-ocid>
  lifecycleRules:
    - name: archive-old-versions
      action: lifecycle_archive
      isEnabled: true
      timeAmount: 90
      timeUnit: days
      target: previous-object-versions
    - name: cleanup-incomplete-uploads
      action: lifecycle_abort
      isEnabled: true
      timeAmount: 7
      timeUnit: days
      target: multipart-uploads
