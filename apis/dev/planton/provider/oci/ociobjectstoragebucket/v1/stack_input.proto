syntax = "proto3";

package dev.planton.provider.oci.ociobjectstoragebucket.v1;

import "dev/planton/provider/oci/ociobjectstoragebucket/v1/api.proto";
import "dev/planton/provider/oci/provider.proto";

// OciObjectStorageBucketStackInput is the input to the IaC modules
// (Pulumi / Terraform) that deploy an OciObjectStorageBucket resource.
message OciObjectStorageBucketStackInput {
  // target cloud-resource
  OciObjectStorageBucket target = 1;
  // provider-config
  dev.planton.provider.oci.OciProviderConfig provider_config = 2;
}
