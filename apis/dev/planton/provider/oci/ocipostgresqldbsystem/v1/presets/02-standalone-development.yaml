apiVersion: oci.planton.dev/v1
kind: OciPostgresqlDbSystem
metadata:
  name: my-postgres-dev
spec:
  compartmentId:
    value: <compartment-ocid>
  displayName: postgres-dev
  dbVersion: "16"
  shape: VM.Standard.E4.Flex
  instanceOcpuCount: 1
  instanceMemorySizeInGbs: 8
  instanceCount: 1
  networkDetails:
    subnetId:
      value: <private-subnet-ocid>
  storageDetails:
    isRegionallyDurable: false
    availabilityDomain: <availability-domain>
  credentials:
    username: postgres
    passwordDetails:
      passwordType: plain_text
      password: <admin-password>
  managementPolicy:
    backupPolicy:
      kind: daily
      backupStart: "03:00"
      retentionDays: 7
