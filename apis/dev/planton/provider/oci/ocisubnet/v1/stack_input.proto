syntax = "proto3";

package dev.planton.provider.oci.ocisubnet.v1;

import "dev/planton/provider/oci/ocisubnet/v1/api.proto";
import "dev/planton/provider/oci/provider.proto";

// OciSubnetStackInput is the input to the IaC modules (Pulumi / Terraform)
// that deploy an OciSubnet resource.
message OciSubnetStackInput {
  // target cloud-resource
  OciSubnet target = 1;
  // provider-config
  dev.planton.provider.oci.OciProviderConfig provider_config = 2;
}
