syntax = "proto3";

package dev.planton.provider.oci.ocidbsystem.v1;

import "dev/planton/provider/oci/ocidbsystem/v1/api.proto";
import "dev/planton/provider/oci/provider.proto";

// OciDbSystemStackInput is the input to the IaC modules
// (Pulumi / Terraform) that deploy an OciDbSystem resource.
message OciDbSystemStackInput {
  // target cloud-resource
  OciDbSystem target = 1;
  // provider-config
  dev.planton.provider.oci.OciProviderConfig provider_config = 2;
}
