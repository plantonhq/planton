syntax = "proto3";

package dev.planton.provider.oci.ocicompartment.v1;

import "dev/planton/provider/oci/ocicompartment/v1/api.proto";
import "dev/planton/provider/oci/provider.proto";

// OciCompartmentStackInput is the input to the IaC modules (Pulumi / Terraform)
// that deploy an OciCompartment resource.
message OciCompartmentStackInput {
  // target cloud-resource
  OciCompartment target = 1;
  // provider-config
  dev.planton.provider.oci.OciProviderConfig provider_config = 2;
}
