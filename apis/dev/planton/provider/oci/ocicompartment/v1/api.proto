syntax = "proto3";

package dev.planton.provider.oci.ocicompartment.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/oci/ocicompartment/v1/spec.proto";
import "dev/planton/provider/oci/ocicompartment/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// OciCompartment is the top-level resource representing an Oracle Cloud
// Infrastructure compartment for hierarchical resource isolation.
message OciCompartment {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'oci.planton.dev/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'OciCompartment'];

  // metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  OciCompartmentSpec spec = 4 [(buf.validate.field).required = true];

  // status
  OciCompartmentStatus status = 5;
}

// OciCompartmentStatus holds the outputs produced by deploying an OciCompartment.
message OciCompartmentStatus {
  // stack-outputs
  OciCompartmentStackOutputs outputs = 1;
}
