syntax = "proto3";

package dev.planton.provider.oci.ocicompartment.v1;

// OciCompartmentStackOutputs contains the outputs produced after deploying
// an OciCompartment. The compartment_id is the primary output consumed by
// virtually every other OCI component via StringValueOrRef.
message OciCompartmentStackOutputs {
  // OCID of the created compartment.
  string compartment_id = 1;
}
