syntax = "proto3";

package dev.planton.provider.oci.ocifilesystem.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/oci/ocifilesystem/v1/spec.proto";
import "dev/planton/provider/oci/ocifilesystem/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// OciFileSystem is the top-level resource representing an OCI File Storage
// file system with a dedicated mount target and NFS exports.
message OciFileSystem {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'oci.planton.dev/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'OciFileSystem'];

  // metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  OciFileSystemSpec spec = 4 [(buf.validate.field).required = true];

  // status
  OciFileSystemStatus status = 5;
}

// OciFileSystemStatus holds the outputs produced by deploying
// an OciFileSystem.
message OciFileSystemStatus {
  // stack-outputs
  OciFileSystemStackOutputs outputs = 1;
}
