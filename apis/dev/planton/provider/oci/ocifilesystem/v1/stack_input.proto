syntax = "proto3";

package dev.planton.provider.oci.ocifilesystem.v1;

import "dev/planton/provider/oci/ocifilesystem/v1/api.proto";
import "dev/planton/provider/oci/provider.proto";

// OciFileSystemStackInput is the input to the IaC modules
// (Pulumi / Terraform) that deploy an OciFileSystem resource.
message OciFileSystemStackInput {
  // target cloud-resource
  OciFileSystem target = 1;
  // provider-config
  dev.planton.provider.oci.OciProviderConfig provider_config = 2;
}
