syntax = "proto3";

package dev.planton.provider.oci.ociloggroup.v1;

import "dev/planton/provider/oci/ociloggroup/v1/api.proto";
import "dev/planton/provider/oci/provider.proto";

// OciLogGroupStackInput is the input to the IaC modules
// (Pulumi / Terraform) that deploy an OciLogGroup resource.
message OciLogGroupStackInput {
  // target cloud-resource
  OciLogGroup target = 1;
  // provider-config
  dev.planton.provider.oci.OciProviderConfig provider_config = 2;
}
