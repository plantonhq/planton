apiVersion: oci.planton.dev/v1
kind: OciLogGroup
metadata:
  name: my-network-logs
spec:
  compartmentId:
    value: <compartment-ocid>
  description: VCN flow logs for network traffic auditing
  logs:
    - displayName: vcn-flow-log
      logType: service
      isEnabled: true
      retentionDuration: 90
      configuration:
        service: flowlogs
        resource:
          value: <vcn-subnet-ocid>
        category: all
