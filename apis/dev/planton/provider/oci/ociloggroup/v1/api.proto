syntax = "proto3";

package dev.planton.provider.oci.ociloggroup.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/oci/ociloggroup/v1/spec.proto";
import "dev/planton/provider/oci/ociloggroup/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// OciLogGroup is the top-level resource representing an OCI Logging
// log group -- an organizational container for related logs with
// bundled service and custom log sub-resources.
message OciLogGroup {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'oci.planton.dev/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'OciLogGroup'];

  // metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  OciLogGroupSpec spec = 4 [(buf.validate.field).required = true];

  // status
  OciLogGroupStatus status = 5;
}

// OciLogGroupStatus holds the outputs produced by deploying an OciLogGroup.
message OciLogGroupStatus {
  // stack-outputs
  OciLogGroupStackOutputs outputs = 1;
}
