syntax = "proto3";

package dev.planton.provider.oci.ocifunctionsapplication.v1;

import "dev/planton/provider/oci/ocifunctionsapplication/v1/api.proto";
import "dev/planton/provider/oci/provider.proto";

// OciFunctionsApplicationStackInput is the input to the IaC modules
// (Pulumi / Terraform) that deploy an OciFunctionsApplication resource.
message OciFunctionsApplicationStackInput {
  // target cloud-resource
  OciFunctionsApplication target = 1;
  // provider-config
  dev.planton.provider.oci.OciProviderConfig provider_config = 2;
}
