apiVersion: oci.planton.dev/v1
kind: OciBastion
metadata:
  name: my-bastion
spec:
  compartmentId:
    value: <compartment-ocid>
  targetSubnetId:
    value: <private-subnet-ocid>
  displayName: bastion
  clientCidrBlockAllowList:
    - <allowed-cidr> # e.g., 10.0.0.0/16 for VPN range or 203.0.113.0/24 for office IP range
  maxSessionTtlInSeconds: 10800 # 3 hours (OCI default)
