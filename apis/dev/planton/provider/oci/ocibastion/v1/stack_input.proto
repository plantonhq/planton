syntax = "proto3";

package dev.planton.provider.oci.ocibastion.v1;

import "dev/planton/provider/oci/ocibastion/v1/api.proto";
import "dev/planton/provider/oci/provider.proto";

// OciBastionStackInput is the input to the IaC modules
// (Pulumi / Terraform) that deploy an OciBastion resource.
message OciBastionStackInput {
  // target cloud-resource
  OciBastion target = 1;
  // provider-config
  dev.planton.provider.oci.OciProviderConfig provider_config = 2;
}
