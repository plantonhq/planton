syntax = "proto3";

package dev.planton.provider.oci.ocidnsrecord.v1;

import "dev/planton/provider/oci/ocidnsrecord/v1/api.proto";
import "dev/planton/provider/oci/provider.proto";

// OciDnsRecordStackInput is the input to the IaC modules
// (Pulumi / Terraform) that deploy an OciDnsRecord resource.
message OciDnsRecordStackInput {
  // target cloud-resource
  OciDnsRecord target = 1;
  // provider-config
  dev.planton.provider.oci.OciProviderConfig provider_config = 2;
}
