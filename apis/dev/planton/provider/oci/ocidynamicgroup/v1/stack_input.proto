syntax = "proto3";

package dev.planton.provider.oci.ocidynamicgroup.v1;

import "dev/planton/provider/oci/ocidynamicgroup/v1/api.proto";
import "dev/planton/provider/oci/provider.proto";

// OciDynamicGroupStackInput is the input to the IaC modules (Pulumi / Terraform)
// that deploy an OciDynamicGroup resource.
message OciDynamicGroupStackInput {
  // target cloud-resource
  OciDynamicGroup target = 1;
  // provider-config
  dev.planton.provider.oci.OciProviderConfig provider_config = 2;
}
