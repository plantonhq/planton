syntax = "proto3";

package dev.planton.provider.oci.ociapplicationloadbalancer.v1;

import "dev/planton/provider/oci/ociapplicationloadbalancer/v1/api.proto";
import "dev/planton/provider/oci/provider.proto";

// OciApplicationLoadBalancerStackInput is the input to the IaC modules
// (Pulumi / Terraform) that deploy an OciApplicationLoadBalancer resource.
message OciApplicationLoadBalancerStackInput {
  // target cloud-resource
  OciApplicationLoadBalancer target = 1;
  // provider-config
  dev.planton.provider.oci.OciProviderConfig provider_config = 2;
}
