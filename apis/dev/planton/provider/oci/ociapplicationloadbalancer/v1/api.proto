syntax = "proto3";

package dev.planton.provider.oci.ociapplicationloadbalancer.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/oci/ociapplicationloadbalancer/v1/spec.proto";
import "dev/planton/provider/oci/ociapplicationloadbalancer/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// OciApplicationLoadBalancer is the top-level resource representing an Oracle Cloud
// Infrastructure Application Load Balancer (Layer 7).
message OciApplicationLoadBalancer {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'oci.planton.dev/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'OciApplicationLoadBalancer'];

  // metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  OciApplicationLoadBalancerSpec spec = 4 [(buf.validate.field).required = true];

  // status
  OciApplicationLoadBalancerStatus status = 5;
}

// OciApplicationLoadBalancerStatus holds the outputs produced by deploying an
// OciApplicationLoadBalancer.
message OciApplicationLoadBalancerStatus {
  // stack-outputs
  OciApplicationLoadBalancerStackOutputs outputs = 1;
}
