apiVersion: oci.planton.dev/v1
kind: OciApplicationLoadBalancer
metadata:
  name: my-dev-lb
spec:
  compartmentId:
    value: <compartment-ocid>
  displayName: dev-lb
  shape: flexible
  shapeDetails:
    minimumBandwidthInMbps: 10
    maximumBandwidthInMbps: 10
  subnetIds:
    - value: <public-subnet-ocid>
  isPrivate: false
  backendSets:
    - name: app-backend
      policy: round_robin
      healthChecker:
        protocol: tcp
        port: 80
  listeners:
    - name: http
      port: 80
      protocol: http
      defaultBackendSetName: app-backend
