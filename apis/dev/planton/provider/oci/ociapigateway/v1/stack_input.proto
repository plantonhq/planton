syntax = "proto3";

package dev.planton.provider.oci.ociapigateway.v1;

import "dev/planton/provider/oci/ociapigateway/v1/api.proto";
import "dev/planton/provider/oci/provider.proto";

// OciApiGatewayStackInput is the input to the IaC modules
// (Pulumi / Terraform) that deploy an OciApiGateway resource.
message OciApiGatewayStackInput {
  // target cloud-resource
  OciApiGateway target = 1;
  // provider-config
  dev.planton.provider.oci.OciProviderConfig provider_config = 2;
}
