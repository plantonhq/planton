syntax = "proto3";

package dev.planton.provider.oci.ociapigateway.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/oci/ociapigateway/v1/spec.proto";
import "dev/planton/provider/oci/ociapigateway/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// OciApiGateway is the top-level resource representing an OCI API Gateway
// bundled with a single API deployment -- providing managed REST API
// endpoints with routing, authentication, CORS, and rate limiting.
message OciApiGateway {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'oci.planton.dev/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'OciApiGateway'];

  // metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  OciApiGatewaySpec spec = 4 [(buf.validate.field).required = true];

  // status
  OciApiGatewayStatus status = 5;
}

// OciApiGatewayStatus holds the outputs produced by deploying an OciApiGateway.
message OciApiGatewayStatus {
  // stack-outputs
  OciApiGatewayStackOutputs outputs = 1;
}
