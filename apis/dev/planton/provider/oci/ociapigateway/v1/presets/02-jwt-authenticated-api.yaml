apiVersion: oci.planton.dev/v1
kind: OciApiGateway
metadata:
  name: my-authenticated-api
spec:
  compartmentId:
    value: <compartment-ocid>
  endpointType: endpoint_type_public
  subnetId:
    value: <public-subnet-ocid>
  displayName: authenticated-api
  networkSecurityGroupIds:
    - value: <gateway-nsg-ocid>
  deployment:
    pathPrefix: /api/v1
    displayName: authenticated-api-deployment
    loggingPolicies:
      accessLog:
        isEnabled: true
      executionLog:
        isEnabled: true
        logLevel: info
    requestPolicies:
      authentication:
        issuers:
          - <token-issuer-url>
        audiences:
          - <api-audience>
        tokenHeader: Authorization
        tokenAuthScheme: Bearer
        maxClockSkewInSeconds: 60
        publicKeys:
          type: remote_jwks
          uri: <jwks-uri>
          maxCacheDurationInHours: 1
        verifyClaims:
          - key: scope
            isRequired: true
      cors:
        allowedOrigins:
          - https://<frontend-domain>
        allowedMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        allowedHeaders:
          - Content-Type
          - Authorization
        isAllowCredentialsEnabled: true
        maxAgeInSeconds: 3600
      rateLimiting:
        rateInRequestsPerSecond: 100
        rateKey: client_ip
    routes:
      - path: /public/health
        methods:
          - GET
        backend:
          type: stock_response
          status: 200
          body: '{"status":"ok"}'
        authorization:
          type: anonymous
      - path: /users/{userId}
        methods:
          - GET
          - PUT
        backend:
          type: http
          url: <backend-url>
          connectTimeoutInSeconds: 10
          readTimeoutInSeconds: 30
          sendTimeoutInSeconds: 30
        authorization:
          type: authentication_only
      - path: /admin/{path*}
        methods:
          - GET
          - POST
          - PUT
          - DELETE
        backend:
          type: http
          url: <backend-url>
          connectTimeoutInSeconds: 10
          readTimeoutInSeconds: 30
          sendTimeoutInSeconds: 30
        authorization:
          type: any_of
          allowedScope:
            - admin
