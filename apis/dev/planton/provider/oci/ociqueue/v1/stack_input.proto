syntax = "proto3";

package dev.planton.provider.oci.ociqueue.v1;

import "dev/planton/provider/oci/ociqueue/v1/api.proto";
import "dev/planton/provider/oci/provider.proto";

// OciQueueStackInput is the input to the IaC modules
// (Pulumi / Terraform) that deploy an OciQueue resource.
message OciQueueStackInput {
  // target cloud-resource
  OciQueue target = 1;
  // provider-config
  dev.planton.provider.oci.OciProviderConfig provider_config = 2;
}
