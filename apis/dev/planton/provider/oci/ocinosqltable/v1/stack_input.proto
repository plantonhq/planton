syntax = "proto3";

package dev.planton.provider.oci.ocinosqltable.v1;

import "dev/planton/provider/oci/ocinosqltable/v1/api.proto";
import "dev/planton/provider/oci/provider.proto";

// OciNosqlTableStackInput is the input to the IaC modules
// (Pulumi / Terraform) that deploy an OciNosqlTable resource.
message OciNosqlTableStackInput {
  // target cloud-resource
  OciNosqlTable target = 1;
  // provider-config
  dev.planton.provider.oci.OciProviderConfig provider_config = 2;
}
