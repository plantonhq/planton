apiVersion: oci.planton.dev/v1
kind: OciMysqlDbSystem
metadata:
  name: my-mysql-dev
spec:
  compartmentId:
    value: <compartment-ocid>
  displayName: mysql-dev
  availabilityDomain: <availability-domain>
  shapeName: MySQL.VM.Standard.E4.1.8GB
  subnetId:
    value: <private-subnet-ocid>
  adminUsername: admin
  adminPassword: <admin-password>
  isHighlyAvailable: false
  dataStorage:
    dataStorageSizeInGb: 50
  backupPolicy:
    isEnabled: true
    retentionInDays: 7
  deletionPolicy:
    isDeleteProtected: false
    automaticBackupRetention: DELETE
    finalBackup: SKIP_FINAL_BACKUP
  encryptData:
    keyGenerationType: system
  secureConnections:
    certificateGenerationType: system_cert
