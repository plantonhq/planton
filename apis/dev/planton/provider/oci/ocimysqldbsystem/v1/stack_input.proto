syntax = "proto3";

package dev.planton.provider.oci.ocimysqldbsystem.v1;

import "dev/planton/provider/oci/ocimysqldbsystem/v1/api.proto";
import "dev/planton/provider/oci/provider.proto";

// OciMysqlDbSystemStackInput is the input to the IaC modules
// (Pulumi / Terraform) that deploy an OciMysqlDbSystem resource.
message OciMysqlDbSystemStackInput {
  // target cloud-resource
  OciMysqlDbSystem target = 1;
  // provider-config
  dev.planton.provider.oci.OciProviderConfig provider_config = 2;
}
