syntax = "proto3";

package dev.planton.provider.oci.ocimysqldbsystem.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/oci/ocimysqldbsystem/v1/spec.proto";
import "dev/planton/provider/oci/ocimysqldbsystem/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// OciMysqlDbSystem is the top-level resource representing an Oracle Cloud
// Infrastructure MySQL HeatWave Database System -- a fully managed MySQL
// database service with optional in-memory analytics acceleration.
message OciMysqlDbSystem {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'oci.planton.dev/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'OciMysqlDbSystem'];

  // metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  OciMysqlDbSystemSpec spec = 4 [(buf.validate.field).required = true];

  // status
  OciMysqlDbSystemStatus status = 5;
}

// OciMysqlDbSystemStatus holds the outputs produced by deploying an
// OciMysqlDbSystem.
message OciMysqlDbSystemStatus {
  // stack-outputs
  OciMysqlDbSystemStackOutputs outputs = 1;
}
