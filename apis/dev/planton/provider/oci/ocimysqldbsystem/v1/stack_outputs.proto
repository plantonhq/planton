syntax = "proto3";

package dev.planton.provider.oci.ocimysqldbsystem.v1;

// OciMysqlDbSystemStackOutputs contains the outputs produced after
// deploying an OciMysqlDbSystem.
// These values are used by downstream components for composability via
// StringValueOrRef.
message OciMysqlDbSystemStackOutputs {
  // OCID of the MySQL DB System.
  string db_system_id = 1;

  // Hostname of the primary (read/write) endpoint.
  string endpoint_hostname = 2;

  // Private IP address of the primary (read/write) endpoint.
  string endpoint_ip_address = 3;

  // TCP port of the primary (read/write) endpoint.
  int32 endpoint_port = 4;
}
