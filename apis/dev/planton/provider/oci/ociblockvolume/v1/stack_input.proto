syntax = "proto3";

package dev.planton.provider.oci.ociblockvolume.v1;

import "dev/planton/provider/oci/ociblockvolume/v1/api.proto";
import "dev/planton/provider/oci/provider.proto";

// OciBlockVolumeStackInput is the input to the IaC modules
// (Pulumi / Terraform) that deploy an OciBlockVolume resource.
message OciBlockVolumeStackInput {
  // target cloud-resource
  OciBlockVolume target = 1;
  // provider-config
  dev.planton.provider.oci.OciProviderConfig provider_config = 2;
}
