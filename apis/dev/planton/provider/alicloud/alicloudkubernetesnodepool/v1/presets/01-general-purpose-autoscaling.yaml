apiVersion: alicloud.planton.dev/v1
kind: AliCloudKubernetesNodePool
metadata:
  name: my-general-pool
spec:
  region: <alibaba-cloud-region>
  clusterId:
    value: <your-cluster-id>
  name: general-pool
  vswitchIds:
    - value: <vswitch-id-zone-a>
    - value: <vswitch-id-zone-b>
    - value: <vswitch-id-zone-c>
  instanceTypes:
    - ecs.g7.2xlarge
    - ecs.g7.xlarge
  desiredSize: 3
  imageType: AliyunLinux3 # default from spec
  systemDisk:
    category: cloud_essd # default from spec
    size: 120 # default from spec
    performanceLevel: PL1
  keyName: <your-ssh-key-pair>
  labels:
    workloadType: general
  scalingConfig:
    enable: true
    minSize: 2
    maxSize: 20
  multiAzPolicy: BALANCE
  management:
    enable: true
    autoRepair: true
    autoUpgrade: true
    maxUnavailable: 2
  installCloudMonitor: true # default from spec
  tags:
    team: <your-team>
    costCenter: <your-cost-center>
