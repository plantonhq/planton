syntax = "proto3";

package dev.planton.provider.alicloud.alicloudkubernetesnodepool.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/alicloud/alicloudkubernetesnodepool/v1/spec.proto";
import "dev/planton/provider/alicloud/alicloudkubernetesnodepool/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// alicloud-kubernetes-node-pool
message AliCloudKubernetesNodePool {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'alicloud.planton.dev/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AliCloudKubernetesNodePool'];

  // metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AliCloudKubernetesNodePoolSpec spec = 4 [(buf.validate.field).required = true];

  // status
  AliCloudKubernetesNodePoolStatus status = 5;
}

// alicloud-kubernetes-node-pool status
message AliCloudKubernetesNodePoolStatus {
  // stack-outputs
  AliCloudKubernetesNodePoolStackOutputs outputs = 1;
}
