syntax = "proto3";

package dev.planton.provider.alicloud.alicloudeipaddress.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/alicloud/alicloudeipaddress/v1/spec.proto";
import "dev/planton/provider/alicloud/alicloudeipaddress/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// alicloud-eip-address
message AliCloudEipAddress {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'alicloud.planton.dev/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AliCloudEipAddress'];

  // metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AliCloudEipAddressSpec spec = 4 [(buf.validate.field).required = true];

  // status
  AliCloudEipAddressStatus status = 5;
}

// alicloud-eip-address status
message AliCloudEipAddressStatus {
  // stack-outputs
  AliCloudEipAddressStackOutputs outputs = 1;
}
