syntax = "proto3";

package dev.planton.provider.alicloud.alicloudecsinstance.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/alicloud/alicloudecsinstance/v1/spec.proto";
import "dev/planton/provider/alicloud/alicloudecsinstance/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// alicloud-ecs-instance
message AliCloudEcsInstance {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'alicloud.planton.dev/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AliCloudEcsInstance'];

  // metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AliCloudEcsInstanceSpec spec = 4 [(buf.validate.field).required = true];

  // status
  AliCloudEcsInstanceStatus status = 5;
}

// alicloud-ecs-instance status
message AliCloudEcsInstanceStatus {
  // stack-outputs
  AliCloudEcsInstanceStackOutputs outputs = 1;
}
