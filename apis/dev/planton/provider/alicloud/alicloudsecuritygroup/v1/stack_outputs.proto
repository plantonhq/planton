syntax = "proto3";

package dev.planton.provider.alicloud.alicloudsecuritygroup.v1;

// AliCloudSecurityGroupStackOutputs captures the outputs from deploying an
// Alibaba Cloud Security Group.
message AliCloudSecurityGroupStackOutputs {
  // The security group ID assigned by Alibaba Cloud.
  // Referenced by downstream components (EcsInstance, AckManagedCluster, etc.)
  // via StringValueOrRef.
  string security_group_id = 1;

  // The security group name as created.
  string security_group_name = 2;
}
