syntax = "proto3";

package dev.planton.provider.alicloud.alicloudrdsinstance.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/alicloud/alicloudrdsinstance/v1/spec.proto";
import "dev/planton/provider/alicloud/alicloudrdsinstance/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// alicloud-rds-instance
message AliCloudRdsInstance {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'alicloud.planton.dev/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AliCloudRdsInstance'];

  // metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AliCloudRdsInstanceSpec spec = 4 [(buf.validate.field).required = true];

  // status
  AliCloudRdsInstanceStatus status = 5;
}

// alicloud-rds-instance status
message AliCloudRdsInstanceStatus {
  // stack-outputs
  AliCloudRdsInstanceStackOutputs outputs = 1;
}
