syntax = "proto3";

package dev.planton.provider.alicloud.alicloudprivatednszone.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/alicloud/alicloudprivatednszone/v1/spec.proto";
import "dev/planton/provider/alicloud/alicloudprivatednszone/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// alicloud-private-dns-zone
message AliCloudPrivateDnsZone {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'alicloud.planton.dev/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AliCloudPrivateDnsZone'];

  // metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AliCloudPrivateDnsZoneSpec spec = 4 [(buf.validate.field).required = true];

  // status
  AliCloudPrivateDnsZoneStatus status = 5;
}

// alicloud-private-dns-zone status
message AliCloudPrivateDnsZoneStatus {
  // stack-outputs
  AliCloudPrivateDnsZoneStackOutputs outputs = 1;
}
