syntax = "proto3";

package dev.planton.provider.alicloud.alicloudcdndomain.v1;

// AliCloudCdnDomainStackOutputs captures the outputs from deploying an
// Alibaba Cloud CDN accelerated domain.
message AliCloudCdnDomainStackOutputs {
  // The accelerated domain name as registered in CDN.
  string domain_name = 1;

  // The CNAME assigned by Alibaba Cloud CDN.
  // Create a CNAME record at your DNS provider pointing domain_name to this value
  // for CDN acceleration to take effect.
  string cname = 2;

  // The current status of the CDN domain.
  // Typical values: "online", "offline", "configuring", "checking", "check_failed".
  string status = 3;
}
