syntax = "proto3";

package dev.planton.provider.alicloud.alicloudrocketmqinstance.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/alicloud/alicloudrocketmqinstance/v1/spec.proto";
import "dev/planton/provider/alicloud/alicloudrocketmqinstance/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// alicloud-rocketmq-instance
message AliCloudRocketmqInstance {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'alicloud.planton.dev/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AliCloudRocketmqInstance'];

  // metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AliCloudRocketmqInstanceSpec spec = 4 [(buf.validate.field).required = true];

  // status
  AliCloudRocketmqInstanceStatus status = 5;
}

// alicloud-rocketmq-instance status
message AliCloudRocketmqInstanceStatus {
  // stack-outputs
  AliCloudRocketmqInstanceStackOutputs outputs = 1;
}
