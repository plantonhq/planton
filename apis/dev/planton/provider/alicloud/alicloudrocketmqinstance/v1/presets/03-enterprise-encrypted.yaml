apiVersion: alicloud.planton.dev/v1
kind: AliCloudRocketmqInstance
metadata:
  name: my-enterprise-rocketmq
spec:
  region: <alibaba-cloud-region>
  seriesCode: ultimate
  subSeriesCode: cluster_ha
  vpcId:
    value: <your-vpc-id>
  vswitchId:
    value: <your-vswitch-id>
  securityGroupId: <your-security-group-id>
  paymentType: Subscription
  period: 12
  periodUnit: Month
  autoRenew: true
  autoRenewPeriod: 3
  msgProcessSpec: <msg-process-spec>
  productInfo:
    messageRetentionTime: 336
    autoScaling: true
    traceOn: true
    storageEncryption: true
    storageSecretKey: <your-kms-key-id>
  internetInfo:
    enabled: true
    flowOutType: payByTraffic  # default from spec
  ipWhitelists:
    - <your-vpc-cidr>
    - <your-external-access-cidr>
  tags:
    compliance: <your-compliance-standard>
    data-class: confidential
  topics:
    - topicName: <your-transaction-topic>
      messageType: TRANSACTION
      remark: Two-phase commit messages for distributed transactions
    - topicName: <your-delay-topic>
      messageType: DELAY
      remark: Scheduled delivery for time-sensitive workflows
  consumerGroups:
    - consumerGroupId: <your-transaction-consumer-group>
      deliveryOrderType: Orderly
      consumeRetryPolicy:
        retryPolicy: FixedRetryPolicy
        maxRetryTimes: 10
        deadLetterTargetTopic: <your-dead-letter-topic>
    - consumerGroupId: <your-delay-consumer-group>
      deliveryOrderType: Concurrently
