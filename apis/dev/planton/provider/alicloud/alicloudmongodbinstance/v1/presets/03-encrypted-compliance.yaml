apiVersion: alicloud.planton.dev/v1
kind: AliCloudMongodbInstance
metadata:
  name: secure-mongodb
  org: fintech-corp
  env: production
spec:
  region: cn-hangzhou
  engineVersion: "7.0"
  dbInstanceClass: mongo.x8.xlarge
  dbInstanceStorage: 500
  accountPassword: "${MONGODB_PASSWORD}"
  vswitchId:
    value: vsw-secure
  zoneId: cn-hangzhou-a
  secondaryZoneId: cn-hangzhou-b
  hiddenZoneId: cn-hangzhou-c
  replicationFactor: 3
  storageType: cloud_essd3
  instanceChargeType: PrePaid
  period: 12
  autoRenew: true
  autoRenewDuration: 3
  sslAction: Open
  tdeStatus: enabled
  encryptionKey: kms-key-abc123
  securityIpList:
    - "172.16.0.0/12"
  dbInstanceReleaseProtection: true
  backupPeriod:
    - Monday
    - Tuesday
    - Wednesday
    - Thursday
    - Friday
    - Saturday
    - Sunday
  backupTime: "02:00Z-03:00Z"
  tags:
    compliance: pci-dss
    data-class: confidential
