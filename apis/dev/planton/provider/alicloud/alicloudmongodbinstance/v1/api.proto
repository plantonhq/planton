syntax = "proto3";

package dev.planton.provider.alicloud.alicloudmongodbinstance.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/alicloud/alicloudmongodbinstance/v1/spec.proto";
import "dev/planton/provider/alicloud/alicloudmongodbinstance/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// alicloud-mongodb-instance
message AliCloudMongodbInstance {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'alicloud.planton.dev/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AliCloudMongodbInstance'];

  // metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AliCloudMongodbInstanceSpec spec = 4 [(buf.validate.field).required = true];

  // status
  AliCloudMongodbInstanceStatus status = 5;
}

// alicloud-mongodb-instance status
message AliCloudMongodbInstanceStatus {
  // stack-outputs
  AliCloudMongodbInstanceStackOutputs outputs = 1;
}
