syntax = "proto3";

package dev.planton.provider.alicloud.alicloudpolardbcluster.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/alicloud/alicloudpolardbcluster/v1/spec.proto";
import "dev/planton/provider/alicloud/alicloudpolardbcluster/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// alicloud-polardb-cluster
message AliCloudPolardbCluster {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'alicloud.planton.dev/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AliCloudPolardbCluster'];

  // metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AliCloudPolardbClusterSpec spec = 4 [(buf.validate.field).required = true];

  // status
  AliCloudPolardbClusterStatus status = 5;
}

// alicloud-polardb-cluster status
message AliCloudPolardbClusterStatus {
  // stack-outputs
  AliCloudPolardbClusterStackOutputs outputs = 1;
}
