apiVersion: alicloud.planton.dev/v1
kind: AliCloudCenInstance
metadata:
  name: my-cross-region-cen
spec:
  region: <api-routing-region>
  cenInstanceName: <your-cen-name>
  description: Global backbone connecting VPCs across multiple regions
  protectionLevel: REDUCED
  tags:
    team: <your-team>
    purpose: global-connectivity
  attachments:
    - childInstanceId:
        value: <china-vpc-id>
      childInstanceRegionId: <china-region>
    - childInstanceId:
        value: <secondary-vpc-id>
      childInstanceRegionId: <secondary-region>
    - childInstanceId:
        value: <international-vpc-id>
      childInstanceRegionId: <international-region>
