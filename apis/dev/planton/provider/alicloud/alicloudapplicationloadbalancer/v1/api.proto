syntax = "proto3";

package dev.planton.provider.alicloud.alicloudapplicationloadbalancer.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/alicloud/alicloudapplicationloadbalancer/v1/spec.proto";
import "dev/planton/provider/alicloud/alicloudapplicationloadbalancer/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// alicloud-application-load-balancer
message AliCloudApplicationLoadBalancer {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'alicloud.planton.dev/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AliCloudApplicationLoadBalancer'];

  // metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AliCloudApplicationLoadBalancerSpec spec = 4 [(buf.validate.field).required = true];

  // status
  AliCloudApplicationLoadBalancerStatus status = 5;
}

// alicloud-application-load-balancer status
message AliCloudApplicationLoadBalancerStatus {
  // stack-outputs
  AliCloudApplicationLoadBalancerStackOutputs outputs = 1;
}
