syntax = "proto3";

package dev.planton.provider.alicloud.alicloudvpngateway.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/alicloud/alicloudvpngateway/v1/spec.proto";
import "dev/planton/provider/alicloud/alicloudvpngateway/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// alicloud-vpn-gateway
message AliCloudVpnGateway {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'alicloud.planton.dev/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AliCloudVpnGateway'];

  // metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AliCloudVpnGatewaySpec spec = 4 [(buf.validate.field).required = true];

  // status
  AliCloudVpnGatewayStatus status = 5;
}

// alicloud-vpn-gateway status
message AliCloudVpnGatewayStatus {
  // stack-outputs
  AliCloudVpnGatewayStackOutputs outputs = 1;
}
