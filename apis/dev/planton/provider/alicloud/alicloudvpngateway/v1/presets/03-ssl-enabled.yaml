apiVersion: alicloud.planton.dev/v1
kind: AliCloudVpnGateway
metadata:
  name: <your-vpn-name>
spec:
  region: <alibaba-cloud-region>
  vpcId:
    value: <your-vpc-id>
  vswitchId:
    value: <your-vswitch-id>
  vpnGatewayName: <your-vpn-name>
  description: VPN Gateway with SSL VPN for remote client access
  bandwidth: 50
  enableSsl: true
  sslConnections: 50
  connections:
    - name: <site-connection-name>
      customerGatewayIp: "<remote-device-public-ip>"
      localSubnets:
        - "<vpc-cidr>"
      remoteSubnets:
        - "<remote-network-cidr>"
