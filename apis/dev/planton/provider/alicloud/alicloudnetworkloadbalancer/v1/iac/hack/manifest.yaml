apiVersion: alicloud.planton.dev/v1
kind: AliCloudNetworkLoadBalancer
metadata:
  name: test-nlb
spec:
  region: cn-hangzhou
  vpcId:
    value: vpc-test123
  zoneMappings:
    - zoneId: cn-hangzhou-a
      vswitchId:
        value: vsw-test-a
    - zoneId: cn-hangzhou-b
      vswitchId:
        value: vsw-test-b
  serverGroups:
    - name: test-backend
      healthCheck:
        healthCheckEnabled: true
  listeners:
    - listenerPort: 80
      listenerProtocol: TCP
      serverGroupName: test-backend
