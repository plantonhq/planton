syntax = "proto3";

package dev.planton.provider.alicloud.alicloudkmskey.v1;

// AliCloudKmsKeyStackOutputs captures the outputs from creating an
// Alibaba Cloud KMS customer-managed key.
message AliCloudKmsKeyStackOutputs {
  // The KMS key ID assigned by Alibaba Cloud.
  // This is the primary identifier used by downstream components (RDS, OSS,
  // ECS) when configuring encryption with a customer-managed key.
  string key_id = 1;

  // The key ARN (Alibaba Cloud Resource Name).
  // Format: acs:kms:{region}:{account-id}:key/{key-id}
  // Used in RAM policies to grant encrypt/decrypt permissions on this key.
  string arn = 2;
}
