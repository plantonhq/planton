syntax = "proto3";

package dev.planton.provider.alicloud.alicloudkmskey.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/alicloud/alicloudkmskey/v1/spec.proto";
import "dev/planton/provider/alicloud/alicloudkmskey/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// alicloud-kms-key
message AliCloudKmsKey {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'alicloud.planton.dev/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AliCloudKmsKey'];

  // metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AliCloudKmsKeySpec spec = 4 [(buf.validate.field).required = true];

  // status
  AliCloudKmsKeyStatus status = 5;
}

// alicloud-kms-key status
message AliCloudKmsKeyStatus {
  // stack-outputs
  AliCloudKmsKeyStackOutputs outputs = 1;
}
