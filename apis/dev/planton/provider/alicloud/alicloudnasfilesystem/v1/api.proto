syntax = "proto3";

package dev.planton.provider.alicloud.alicloudnasfilesystem.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/alicloud/alicloudnasfilesystem/v1/spec.proto";
import "dev/planton/provider/alicloud/alicloudnasfilesystem/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// alicloud-nas-file-system
message AliCloudNasFileSystem {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'alicloud.planton.dev/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AliCloudNasFileSystem'];

  // metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AliCloudNasFileSystemSpec spec = 4 [(buf.validate.field).required = true];

  // status
  AliCloudNasFileSystemStatus status = 5;
}

// alicloud-nas-file-system status
message AliCloudNasFileSystemStatus {
  // stack-outputs
  AliCloudNasFileSystemStackOutputs outputs = 1;
}
