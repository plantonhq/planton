syntax = "proto3";

package dev.planton.provider.scaleway.scalewaypublicgateway.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/scaleway/scalewaypublicgateway/v1/spec.proto";
import "dev/planton/provider/scaleway/scalewaypublicgateway/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// scaleway-public-gateway
message ScalewayPublicGateway {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = "scaleway.planton.dev/v1"];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = "ScalewayPublicGateway"];

  //metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  ScalewayPublicGatewaySpec spec = 4 [(buf.validate.field).required = true];

  //status
  ScalewayPublicGatewayStatus status = 5;
}

// scaleway-public-gateway status
message ScalewayPublicGatewayStatus {
  //stack-outputs
  //  scaleway-public-gateway stack-outputs
  ScalewayPublicGatewayStackOutputs outputs = 1;
}
