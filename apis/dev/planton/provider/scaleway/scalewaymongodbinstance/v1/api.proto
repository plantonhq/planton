syntax = "proto3";

package dev.planton.provider.scaleway.scalewaymongodbinstance.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/scaleway/scalewaymongodbinstance/v1/spec.proto";
import "dev/planton/provider/scaleway/scalewaymongodbinstance/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// scaleway-mongodb-instance
message ScalewayMongodbInstance {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = "scaleway.planton.dev/v1"];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = "ScalewayMongodbInstance"];

  //metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  ScalewayMongodbInstanceSpec spec = 4 [(buf.validate.field).required = true];

  //status
  ScalewayMongodbInstanceStatus status = 5;
}

// scaleway-mongodb-instance status
message ScalewayMongodbInstanceStatus {
  //stack-outputs
  //  scaleway-mongodb-instance stack-outputs
  ScalewayMongodbInstanceStackOutputs outputs = 1;
}
