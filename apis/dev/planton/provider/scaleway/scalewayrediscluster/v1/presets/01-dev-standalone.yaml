apiVersion: scaleway.planton.dev/v1
kind: ScalewayRedisCluster
metadata:
  name: my-redis
spec:
  zone: fr-par-1
  version: 7.2.5
  nodeType: RED1-MICRO
  clusterSize: 1  # recommended_default from spec
  userName: <your-redis-user>
  password: <your-redis-password>
  aclRules:
    - ip: 0.0.0.0/0
      description: Allow all (development only)
