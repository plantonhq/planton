syntax = "proto3";

package dev.planton.provider.scaleway.scalewayrediscluster.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/scaleway/scalewayrediscluster/v1/spec.proto";
import "dev/planton/provider/scaleway/scalewayrediscluster/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// scaleway-redis-cluster
message ScalewayRedisCluster {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = "scaleway.planton.dev/v1"];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = "ScalewayRedisCluster"];

  //metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  ScalewayRedisClusterSpec spec = 4 [(buf.validate.field).required = true];

  //status
  ScalewayRedisClusterStatus status = 5;
}

// scaleway-redis-cluster status
message ScalewayRedisClusterStatus {
  //stack-outputs
  //  scaleway-redis-cluster stack-outputs
  ScalewayRedisClusterStackOutputs outputs = 1;
}
