syntax = "proto3";

package dev.planton.provider.scaleway.scalewaydnszone.v1;

// ScalewayDnsZoneStackOutputs captures the provisioned DNS zone details
// needed by downstream resources, infra chart templates, and domain
// registrar configuration.
//
// The primary output `zone_name` is what downstream ScalewayDnsRecord
// resources reference via StringValueOrRef with:
//   default_kind = ScalewayDnsZone
//   default_kind_field_path = "status.outputs.zone_name"
//
// The `name_servers` output is critical for users to configure DNS
// delegation at their domain registrar.
message ScalewayDnsZoneStackOutputs {
  // The computed zone name.
  //
  // Format: "{subdomain}.{domain}" for subdomain zones, or just
  // "{domain}" for root zones.
  //
  // Examples:
  //   Root zone: "example.com"
  //   Subdomain zone: "staging.example.com"
  //
  // This is the primary output for downstream cross-resource references.
  // ScalewayDnsRecord resources reference this value to identify which
  // zone their records belong to.
  string zone_name = 1;

  // Nameservers assigned by Scaleway for this zone.
  //
  // These are the NS records that must be configured at the domain
  // registrar for DNS delegation. Until delegation is complete, DNS
  // queries for this zone will not resolve through Scaleway.
  //
  // Typically contains 2-4 Scaleway nameserver addresses.
  repeated string name_servers = 2;

  // Scaleway's default nameservers for this zone.
  //
  // These are the standard NS records assigned by Scaleway's DNS
  // infrastructure. Usually identical to `name_servers` unless
  // custom nameservers have been configured.
  repeated string name_servers_default = 3;

  // Master nameservers for this zone.
  //
  // For standard zones, this is typically the same as the default
  // nameservers. For zones with secondary/slave configurations,
  // this identifies the primary nameserver(s).
  repeated string name_servers_master = 4;

  // Zone status.
  //
  // Indicates the current state of the DNS zone in Scaleway's
  // infrastructure. Common values:
  //   "active" -- zone is operational and serving DNS queries
  //   "pending" -- zone is being provisioned
  //   "error" -- zone has configuration issues
  //
  // Exported for observability and health monitoring.
  string status = 5;
}
