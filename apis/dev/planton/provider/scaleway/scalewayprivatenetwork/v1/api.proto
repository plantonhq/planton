syntax = "proto3";

package dev.planton.provider.scaleway.scalewayprivatenetwork.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/scaleway/scalewayprivatenetwork/v1/spec.proto";
import "dev/planton/provider/scaleway/scalewayprivatenetwork/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// scaleway-private-network
message ScalewayPrivateNetwork {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = "scaleway.planton.dev/v1"];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = "ScalewayPrivateNetwork"];

  //metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  ScalewayPrivateNetworkSpec spec = 4 [(buf.validate.field).required = true];

  //status
  ScalewayPrivateNetworkStatus status = 5;
}

// scaleway-private-network status
message ScalewayPrivateNetworkStatus {
  //stack-outputs
  //  scaleway-private-network stack-outputs
  ScalewayPrivateNetworkStackOutputs outputs = 1;
}
