apiVersion: scaleway.planton.dev/v1
kind: ScalewayLoadBalancer
metadata:
  name: my-lb
spec:
  zone: fr-par-1
  type: LB-S  # recommended_default from spec
  backends:
    - name: web
      serverIps:
        - "<backend-server-ip>"
      forwardPort: 8080
      forwardProtocol: http  # recommended_default from spec
      forwardPortAlgorithm: roundrobin  # recommended_default from spec
      healthCheck:
        type: tcp  # recommended_default from spec
        checkDelay: 5s  # recommended_default from spec
        checkTimeout: 3s  # recommended_default from spec
        checkMaxRetries: 3  # recommended_default from spec
  frontends:
    - name: http
      inboundPort: 80
      backendName: web
