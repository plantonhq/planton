syntax = "proto3";

package dev.planton.provider.scaleway.scalewaykapsulecluster.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/scaleway/scalewaykapsulecluster/v1/spec.proto";
import "dev/planton/provider/scaleway/scalewaykapsulecluster/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// scaleway-kapsule-cluster
message ScalewayKapsuleCluster {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = "scaleway.planton.dev/v1"];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = "ScalewayKapsuleCluster"];

  //metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  ScalewayKapsuleClusterSpec spec = 4 [(buf.validate.field).required = true];

  //status
  ScalewayKapsuleClusterStatus status = 5;
}

// scaleway-kapsule-cluster status
message ScalewayKapsuleClusterStatus {
  //stack-outputs
  //  scaleway-kapsule-cluster stack-outputs
  ScalewayKapsuleClusterStackOutputs outputs = 1;
}
