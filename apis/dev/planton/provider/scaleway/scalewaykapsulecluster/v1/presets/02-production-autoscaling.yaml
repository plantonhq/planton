apiVersion: scaleway.planton.dev/v1
kind: ScalewayKapsuleCluster
metadata:
  name: my-cluster
spec:
  region: fr-par
  kubernetesVersion: "1.32"
  cni: cilium  # recommended_default from spec
  privateNetworkId:
    value: "<your-private-network-id>"
  type: kapsule  # recommended_default from spec
  deleteAdditionalResources: true  # recommended_default from spec
  autoUpgrade:
    enable: true
    maintenanceWindowStartHour: 3
    maintenanceWindowDay: sunday
  defaultNodePool:
    name: default
    nodeType: PRO2-S
    size: 3
    autoScale: true
    minSize: 2
    maxSize: 10
    autohealing: true
    containerRuntime: containerd  # recommended_default from spec
    publicIpDisabled: true  # Recommended for production
