syntax = "proto3";

package dev.planton.provider.scaleway.scalewaykapsulecluster.v1;

// ScalewayKapsuleClusterStackOutputs captures the provisioned Kapsule cluster
// and default node pool details.
//
// The primary outputs are `cluster_id` (referenced by ScalewayKapsulePool
// resources) and `kubeconfig` (used by infra charts to configure the
// Kubernetes provider for addon deployments).
//
// The `cluster_ca_certificate` and `apiserver_url` are also critical for
// infra charts that set up a Kubernetes provider separately (e.g., when
// deploying Helm charts or Kubernetes manifests as part of the same DAG).
message ScalewayKapsuleClusterStackOutputs {
  // The unique identifier of the created Kapsule cluster.
  //
  // Format: regional ID (e.g., "fr-par/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx").
  // This is the primary output referenced by downstream resources:
  //   - ScalewayKapsulePool resources (via StringValueOrRef on cluster_id)
  //   - Monitoring and management tools
  //
  // In infra charts, downstream pools wire to this value using:
  //
  //   clusterId:
  //     valueFrom:
  //       kind: ScalewayKapsuleCluster
  //       name: my-cluster
  //       fieldPath: status.outputs.cluster_id
  string cluster_id = 1;

  // Raw kubeconfig file content for connecting to the cluster.
  //
  // Contains the API server URL, CA certificate, and authentication
  // token needed to interact with the Kubernetes API. Can be written
  // directly to `~/.kube/config` or passed to kubectl via
  // `KUBECONFIG` environment variable.
  //
  // SENSITIVE: This output contains authentication credentials.
  // Handle with care in CI/CD pipelines and logging.
  string kubeconfig = 2;

  // The URL of the Kubernetes API server.
  //
  // Format: "https://<uuid>.api.k8s.fr-par.scw.cloud:6443"
  //
  // Use this output when configuring Kubernetes providers in IaC tools
  // (Pulumi, Terraform) or when setting up external monitoring and
  // CI/CD systems that need direct API access.
  string apiserver_url = 3;

  // The CA certificate of the Kubernetes API server (base64-encoded).
  //
  // Used together with `apiserver_url` and a token to configure
  // Kubernetes providers in IaC tools without the full kubeconfig.
  // This is the recommended approach for infra charts that deploy
  // Kubernetes addons (cert-manager, ingress-nginx, etc.) as part
  // of the same deployment DAG.
  string cluster_ca_certificate = 4;

  // DNS wildcard for ready nodes in the cluster.
  //
  // Format: "*.xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx.nodes.k8s.fr-par.scw.cloud"
  //
  // Can be used for DNS-based service discovery or as a CNAME target
  // for external-facing services.
  string wildcard_dns = 5;

  // The unique identifier of the default node pool.
  //
  // Format: regional ID. Useful for management, monitoring, and
  // distinguishing the default pool from additional pools.
  string default_pool_id = 6;
}
