syntax = "proto3";

package dev.planton.provider.scaleway.scalewayblockvolume.v1;

// ScalewayBlockVolumeStackOutputs captures the provisioned volume
// details needed by downstream resources and infra charts.
//
// The primary output is `volume_id`, which can be referenced by
// ScalewayInstance (future `StringValueOrRef` on `sbs_volume_ids`) to
// compose block volumes into compute environments.
//
// The `zone` output enables downstream resources to verify zone
// co-location (a block volume can only attach to an Instance in the
// same Availability Zone).
message ScalewayBlockVolumeStackOutputs {
  // The unique identifier of the created volume.
  //
  // Format: "{zone}/{uuid}" (e.g., "fr-par-1/11111111-1111-1111-1111-111111111111").
  // This is the zoned ID used by the Scaleway API and Terraform state.
  //
  // This is the primary output for downstream cross-resource references.
  string volume_id = 1;

  // The name of the volume as it exists in Scaleway Block Storage.
  //
  // Derived from `metadata.name`. Exported for observability and
  // downstream reference convenience (e.g., dashboards, alerts).
  string volume_name = 2;

  // The Availability Zone where the volume is deployed.
  //
  // Exported for downstream resources that need to verify zone
  // co-location (block volumes can only attach to Instances in the
  // same zone).
  string zone = 3;
}
