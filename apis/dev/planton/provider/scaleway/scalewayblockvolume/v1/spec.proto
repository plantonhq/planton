syntax = "proto3";

package dev.planton.provider.scaleway.scalewayblockvolume.v1;

import "buf/validate/validate.proto";

// ScalewayBlockVolumeSpec defines the specification for a Scaleway Block
// Storage volume.
//
// Scaleway Block Storage provides network-attached SSD volumes that can
// be attached to Instances for persistent, high-performance storage.
// Block volumes are independent of the Instance lifecycle -- they persist
// when an Instance is stopped or deleted, and can be moved between
// Instances in the same Availability Zone.
//
// This is a **standalone resource** wrapping a single
// `scaleway_block_volume` Terraform resource. It covers the 80% use case
// of provisioning a block volume with a chosen performance tier and size.
//
// Block Storage volumes are **zonal** resources. A volume can only be
// attached to an Instance in the same Availability Zone. Example zones:
//   - "fr-par-1", "fr-par-2", "fr-par-3" (Paris)
//   - "nl-ams-1", "nl-ams-2", "nl-ams-3" (Amsterdam)
//   - "pl-waw-1", "pl-waw-2", "pl-waw-3" (Warsaw)
//
// **Raw block devices:** Unlike DigitalOcean or AWS EBS, Scaleway block
// volumes are raw block devices with no pre-formatting option. The user
// must format the volume (`mkfs.ext4`, `mkfs.xfs`, etc.) and mount it
// after attaching to an Instance.
//
// **Attachment:** Volumes are attached to Instances via the Instance API
// (the `additional_volume_ids` field on `scaleway_instance_server`), not
// via Block Storage itself. A volume must be in the "available" state
// (not attached) to be attached to a different Instance.
//
// **Resize:** Volumes can be increased in size in-place (no downtime
// from the API side). However, shrinking is not supported -- the provider
// will reject any plan that decreases `size_gb`. After increasing via
// Terraform/Pulumi, grow the partition and filesystem inside the OS
// (`growpart`, `resize2fs`, `xfs_growfs`).
//
// **Performance tier changes:** The performance tier (IOPS) can be
// changed in-place without recreating the volume.
//
// **Deferred features (not in v1):**
//   - Instance volume migration (`instance_volume_id`) -- one-time
//     migration of legacy `b_ssd` volumes to the Block Storage API.
//     This is an operational migration tool, not declarative infra.
//   - Block snapshots (`scaleway_block_snapshot`) -- separate lifecycle
//     resource; can be added as a future kind.
//
// **Composition pattern:** This is a leaf resource with no upstream
// `StringValueOrRef` dependencies. The primary output `volume_id` can
// be referenced by ScalewayInstance (future enhancement) to compose
// block volumes into compute environments via infra charts.
message ScalewayBlockVolumeSpec {
  // ── Placement ──────────────────────────────────────────────────────

  // The Scaleway Availability Zone where the volume will be created.
  //
  // The volume can only be attached to Instances in the same zone.
  // Choose a zone that matches your target Instance's zone.
  //
  // Examples: "fr-par-1", "nl-ams-1", "pl-waw-2"
  //
  // Cannot be changed after creation (would require recreating the
  // volume and migrating data).
  string zone = 1 [(buf.validate.field).required = true];

  // ── Size ───────────────────────────────────────────────────────────

  // Volume size in gigabytes.
  //
  // Range: 5 GB (minimum) to 10240 GB (10 TB maximum).
  //
  // Can be increased in-place after creation (hot resize). Cannot be
  // shrunk -- the Scaleway provider rejects plans that decrease size.
  //
  // After increasing via IaC, you must also grow the partition and
  // filesystem inside the OS (`growpart`, `resize2fs`, `xfs_growfs`).
  //
  // When creating from a snapshot (`snapshot_id`), the size must be >=
  // the snapshot's source volume size.
  uint32 size_gb = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).uint32.gte = 5,
    (buf.validate.field).uint32.lte = 10240
  ];

  // ── Performance ────────────────────────────────────────────────────

  // The performance tier determines the volume's IOPS capability.
  //
  // Scaleway offers two Block Storage tiers built on modern NVMe disks:
  //   - sbs_5k:  5,000 IOPS (combined read + write). Standard tier.
  //   - sbs_15k: 15,000 IOPS (combined read + write). High-performance
  //              tier for databases and latency-sensitive workloads.
  //
  // The performance tier can be changed in-place after creation without
  // recreating the volume.
  //
  // Note: For sbs_15k volumes, the Instance must have at least 3 GiB/s
  // of block bandwidth to fully utilize the IOPS.
  ScalewayBlockVolumePerformanceTier performance_tier = 3 [
    (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true
  ];

  // ── Snapshot ───────────────────────────────────────────────────────

  // Optional ID of a Block Storage snapshot to create this volume from.
  //
  // When set, the volume is cloned from the snapshot. The snapshot must
  // be in the same zone as the target volume. The volume size (`size_gb`)
  // must be >= the snapshot's source volume size.
  //
  // If omitted, a blank volume is created.
  //
  // Format: standard Scaleway snapshot UUID (or zoned format
  // "{zone}/{uuid}"). The provider handles zone/UUID parsing.
  string snapshot_id = 4;
}

// ScalewayBlockVolumePerformanceTier defines the IOPS performance tiers
// available for Scaleway Block Storage volumes.
//
// Each tier maps to a Scaleway product:
//   - sbs_5k:  "SBS 5K"  -- standard performance on NVMe disks
//   - sbs_15k: "SBS 15K" -- high performance on NVMe disks
//
// The legacy "b_ssd" tier (Instance API) is not available through the
// Block Storage API and is not represented here.
enum ScalewayBlockVolumePerformanceTier {
  // Unspecified -- must be explicitly set.
  unspecified = 0;

  // Standard performance: 5,000 IOPS (combined read + write).
  //
  // Suitable for general-purpose workloads: web servers, application
  // data, development environments, CI/CD artifacts.
  sbs_5k = 1;

  // High performance: 15,000 IOPS (combined read + write).
  //
  // Suitable for databases (PostgreSQL, MySQL, MongoDB), message
  // queues, real-time analytics, and latency-sensitive applications.
  //
  // Requires an Instance with >= 3 GiB/s block bandwidth to fully
  // utilize the IOPS capacity.
  sbs_15k = 2;
}
