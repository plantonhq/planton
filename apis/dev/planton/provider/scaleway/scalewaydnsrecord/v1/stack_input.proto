syntax = "proto3";

package dev.planton.provider.scaleway.scalewaydnsrecord.v1;

import "dev/planton/provider/scaleway/provider.proto";
import "dev/planton/provider/scaleway/scalewaydnsrecord/v1/api.proto";

// ScalewayDnsRecordStackInput is the input to the IaC module.
// It contains the target resource and provider configuration.
message ScalewayDnsRecordStackInput {
  // target cloud-resource to be deployed
  ScalewayDnsRecord target = 1;
  // provider-config for Scaleway authentication
  dev.planton.provider.scaleway.ScalewayProviderConfig provider_config = 2;
}
