syntax = "proto3";

package dev.planton.provider.scaleway.scalewayinstancesecuritygroup.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/scaleway/scalewayinstancesecuritygroup/v1/spec.proto";
import "dev/planton/provider/scaleway/scalewayinstancesecuritygroup/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// scaleway-instance-security-group
message ScalewayInstanceSecurityGroup {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = "scaleway.planton.dev/v1"];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = "ScalewayInstanceSecurityGroup"];

  //metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  ScalewayInstanceSecurityGroupSpec spec = 4 [(buf.validate.field).required = true];

  //status
  ScalewayInstanceSecurityGroupStatus status = 5;
}

// scaleway-instance-security-group status
message ScalewayInstanceSecurityGroupStatus {
  //stack-outputs
  //  scaleway-instance-security-group stack-outputs
  ScalewayInstanceSecurityGroupStackOutputs outputs = 1;
}
