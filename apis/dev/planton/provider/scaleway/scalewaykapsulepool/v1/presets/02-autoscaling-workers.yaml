apiVersion: scaleway.planton.dev/v1
kind: ScalewayKapsulePool
metadata:
  name: my-pool
spec:
  region: fr-par
  clusterId:
    value: "<your-kapsule-cluster-id>"
  nodeType: PRO2-M
  size: 2
  autoScale: true
  minSize: 1
  maxSize: 8
  autohealing: true
  containerRuntime: containerd  # recommended_default from spec
  publicIpDisabled: true  # Recommended for production
  kubernetesLabels:
    pool: workers
  upgradePolicy:
    maxSurge: 1
    maxUnavailable: 1
