syntax = "proto3";

package dev.planton.provider.scaleway.scalewaykapsulepool.v1;

// ScalewayKapsulePoolStackOutputs captures the provisioned node pool details.
//
// The primary output is `pool_id`, which can be used for monitoring,
// management, and distinguishing pools within a cluster.
message ScalewayKapsulePoolStackOutputs {
  // The unique identifier of the created node pool.
  //
  // Format: regional ID (e.g., "fr-par/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx").
  // Useful for management, monitoring, and API calls.
  string pool_id = 1;

  // The actual Kubernetes version running on pool nodes.
  //
  // May differ from the cluster's version during rolling upgrades or
  // when the pool was created at a different time than the cluster.
  string pool_version = 2;

  // The actual number of nodes currently in the pool.
  //
  // When autoscaling is enabled, this may differ from the `size` field
  // in the spec. Reflects the autoscaler's current decision.
  int32 current_size = 3;
}
