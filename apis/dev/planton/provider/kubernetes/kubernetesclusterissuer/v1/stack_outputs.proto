syntax = "proto3";

package dev.planton.provider.kubernetes.kubernetesclusterissuer.v1;

// KubernetesClusterIssuerStackOutputs captures observable outputs after
// the ClusterIssuer is created.
message KubernetesClusterIssuerStackOutputs {
  // Name of the created ClusterIssuer (equals spec.dns_domain).
  // Use this name in Certificate resources' issuerRef.name field.
  string cluster_issuer_name = 1;
  // Name of the ACME account private key Secret
  // (created by cert-manager in the cert-manager namespace).
  string acme_account_key_secret_name = 2;
}
