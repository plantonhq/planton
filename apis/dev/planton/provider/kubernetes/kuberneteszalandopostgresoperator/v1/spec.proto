syntax = "proto3";

package dev.planton.provider.kubernetes.kuberneteszalandopostgresoperator.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/kubernetes/kubernetes.proto";
import "dev/planton/provider/kubernetes/options.proto";
import "dev/planton/provider/kubernetes/target_cluster.proto";
import "dev/planton/shared/foreignkey/v1/foreign_key.proto";
import "dev/planton/shared/options/options.proto";

// **KubernetesZalandoPostgresOperatorSpec** defines the configuration for deploying the Zalando Postgres Operator on a Kubernetes cluster.
// This message specifies the parameters needed to create and manage the operator deployment within a Kubernetes environment.
// It includes container specifications and backup configuration settings to control resource allocation and data protection.
message KubernetesZalandoPostgresOperatorSpec {
  // Target Kubernetes Cluster
  dev.planton.provider.kubernetes.KubernetesClusterSelector target_cluster = 1;

  // Kubernetes Namespace
  dev.planton.shared.foreignkey.v1.StringValueOrRef namespace = 2 [
    (buf.validate.field).required = true,
    (dev.planton.shared.foreignkey.v1.default_kind) = KubernetesNamespace,
    (dev.planton.shared.foreignkey.v1.default_kind_field_path) = "spec.name"
  ];

  // flag to indicate if the namespace should be created
  bool create_namespace = 3;

  // The container specifications for the operator deployment.
  KubernetesZalandoPostgresOperatorSpecContainer container = 4 [(buf.validate.field).required = true];
  // Optional: Backup configuration for all databases managed by this operator
  KubernetesZalandoPostgresOperatorBackupConfig backup_config = 5;
}

// **KubernetesZalandoPostgresOperatorSpecContainer** specifies the container configuration for the Zalando Postgres Operator.
// It includes resource allocations for CPU and memory to ensure the operator runs efficiently.
message KubernetesZalandoPostgresOperatorSpecContainer {
  // The CPU and memory resources allocated to the operator container.
  dev.planton.provider.kubernetes.ContainerResources resources = 1 [(dev.planton.provider.kubernetes.default_container_resources) = {
    limits: {
      cpu: "1000m"
      memory: "1Gi"
    }
    requests: {
      cpu: "50m"
      memory: "100Mi"
    }
  }];
}

// R2/S3-compatible storage credentials that authenticate WAL-G against the backup
// bucket. Cloudflare R2 is the storage backend: the S3 API endpoint is derived from
// the account ID as https://<cloudflare_account_id>.r2.cloudflarestorage.com, with
// region "auto" and path-style addressing.
message KubernetesZalandoPostgresOperatorR2Credentials {
  // Cloudflare account ID that owns the R2 bucket, used to construct the S3 API
  // endpoint. An account identifier, not a secret.
  string cloudflare_account_id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1
  ];

  // R2 access-key ID. A public identifier (like a username), not a secret.
  string access_key_id = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1
  ];

  // R2 secret access key. Provided as a managed-secret reference and resolved
  // just-in-time at deploy: the module writes it to a Kubernetes Secret, never
  // as plaintext in the operator configmap or pod spec.
  string secret_access_key = 3 [
    (dev.planton.shared.options.sensitive) = true,
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1
  ];
}

// Cluster-wide backup configuration for every PostgreSQL database the operator
// manages. It configures the pod_environment_configmap the Zalando operator injects
// into each database for WAL-G backups. The module composes the full WAL-G target as
// s3://<bucket>/<object_prefix>/$(SCOPE)/$(PGVERSION); one configmap serves every
// database, so the per-cluster and per-version segments are substituted at runtime.
message KubernetesZalandoPostgresOperatorBackupConfig {
  // Bucket that stores backups for every database on this cluster. A literal bucket
  // name, or a reference (value_from) to any S3-compatible bucket resource's output --
  // for example a CloudflareR2Bucket's status.outputs.bucket_name. Set the referenced
  // kind explicitly; this field assumes no single provider.
  dev.planton.shared.foreignkey.v1.StringValueOrRef bucket = 1 [(buf.validate.field).required = true];

  // Base path under the bucket for backups. The module appends the per-cluster and
  // per-version segments, so every database on the cluster shares the bucket without
  // collision.
  string object_prefix = 2;

  // Cron schedule for base backups, for example "0 2 * * *" for 02:00 daily. Maps to
  // the operator's BACKUP_SCHEDULE environment variable.
  string schedule = 3 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1
  ];

  // Enable WAL-G for backups (default: true). Maps to USE_WALG_BACKUP.
  bool enable_wal_g_backup = 4;

  // Enable WAL-G for restores (default: true). Maps to USE_WALG_RESTORE.
  bool enable_wal_g_restore = 5;

  // Enable WAL-G for clone operations (default: true). Maps to CLONE_USE_WALG_RESTORE.
  bool enable_clone_wal_g_restore = 6;

  // Credentials WAL-G uses to read and write backups for every database on the cluster.
  KubernetesZalandoPostgresOperatorR2Credentials credentials = 7 [(buf.validate.field).required = true];
}
