apiVersion: kubernetes.planton.dev/v1
kind: KubernetesZalandoPostgresOperator
metadata:
  name: postgres-operator
  id: pgop-dev-001
  labels:
    org: planton
    env: development
    team: platform
spec:
  container:
    resources:
      requests:
        cpu: 50m
        memory: 100Mi
      limits:
        cpu: 1000m
        memory: 1Gi
