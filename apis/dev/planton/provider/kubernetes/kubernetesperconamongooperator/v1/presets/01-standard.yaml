apiVersion: kubernetes.planton.dev/v1
kind: KubernetesPerconaMongoOperator
metadata:
  name: my-percona-mongo-operator
spec:
  namespace:
    value: percona-system
  createNamespace: true
  container:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi
