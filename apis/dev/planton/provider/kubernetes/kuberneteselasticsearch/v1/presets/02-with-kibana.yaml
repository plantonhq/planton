apiVersion: kubernetes.planton.dev/v1
kind: KubernetesElasticsearch
metadata:
  name: my-elasticsearch
spec:
  namespace:
    value: "<your-namespace>"
  createNamespace: false
  elasticsearch:
    container:
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          cpu: 2000m
          memory: 4Gi
      persistenceEnabled: true
      diskSize: 10Gi
  kibana:
    enabled: true
    container:
      replicas: 1
      resources:
        requests:
          cpu: 50m
          memory: 100Mi
        limits:
          cpu: 1000m
          memory: 1Gi
    ingress:
      enabled: true
      hostname: "<your-kibana.example.com>"
