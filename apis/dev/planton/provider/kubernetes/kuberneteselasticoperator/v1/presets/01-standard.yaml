apiVersion: kubernetes.planton.dev/v1
kind: KubernetesElasticOperator
metadata:
  name: my-elastic-operator
spec:
  namespace:
    value: elastic-system
  createNamespace: true
  container:
    resources:
      requests:
        cpu: 50m
        memory: 100Mi
      limits:
        cpu: 1000m
        memory: 1Gi
