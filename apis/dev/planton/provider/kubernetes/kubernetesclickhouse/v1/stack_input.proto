syntax = "proto3";

package dev.planton.provider.kubernetes.kubernetesclickhouse.v1;

import "dev/planton/provider/kubernetes/kubernetesclickhouse/v1/api.proto";
import "dev/planton/provider/kubernetes/provider.proto";

// click-house-kubernetes stack-input
message KubernetesClickHouseStackInput {
  // target cloud-resource
  KubernetesClickHouse target = 1;
  // provider-credential
  dev.planton.provider.kubernetes.KubernetesProviderConfig provider_config = 2;
  // kubernetes namespace
  string kubernetes_namespace = 3;
}
