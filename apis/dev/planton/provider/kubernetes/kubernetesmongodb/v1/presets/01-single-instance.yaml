apiVersion: kubernetes.planton.dev/v1
kind: KubernetesMongodb
metadata:
  name: my-mongodb
spec:
  namespace:
    value: "<your-namespace>"
  createNamespace: false
  container:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 100Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    persistenceEnabled: true
    diskSize: 10Gi
