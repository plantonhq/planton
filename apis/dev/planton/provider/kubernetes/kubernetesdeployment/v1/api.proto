syntax = "proto3";

package dev.planton.provider.kubernetes.kubernetesdeployment.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/kubernetes/kubernetesdeployment/v1/spec.proto";
import "dev/planton/provider/kubernetes/kubernetesdeployment/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

//microservice-kubernetes
message KubernetesDeployment {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'kubernetes.planton.dev/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'KubernetesDeployment'];

  //metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  KubernetesDeploymentSpec spec = 4 [(buf.validate.field).required = true];

  //status
  KubernetesDeploymentStatus status = 5;
}

//microservice-kubernetes-status
message KubernetesDeploymentStatus {
  //stack-outputs
  KubernetesDeploymentStackOutputs outputs = 1;
}
