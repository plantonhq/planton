apiVersion: kubernetes.planton.dev/v1
kind: KubernetesDeployment
metadata:
  name: e2e-dep-probes
spec:
  namespace:
    value: e2e-dep-probes-ns
  create_namespace: true
  version: main
  container:
    app:
      image:
        repo: nginx
        tag: "1.27-alpine"
      resources:
        requests:
          cpu: "10m"
          memory: "32Mi"
        limits:
          cpu: "100m"
          memory: "64Mi"
      ports:
        - name: http
          container_port: 80
          network_protocol: TCP
          app_protocol: http
          service_port: 80
      liveness_probe:
        http_get:
          path: /
          port_number: 80
        initial_delay_seconds: 5
        period_seconds: 10
      readiness_probe:
        http_get:
          path: /
          port_number: 80
        initial_delay_seconds: 3
        period_seconds: 5
