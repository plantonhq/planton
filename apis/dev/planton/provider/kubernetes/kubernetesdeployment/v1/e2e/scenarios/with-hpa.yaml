apiVersion: kubernetes.planton.dev/v1
kind: KubernetesDeployment
metadata:
  name: e2e-dep-hpa
spec:
  namespace:
    value: e2e-dep-hpa-ns
  create_namespace: true
  version: main
  container:
    app:
      image:
        repo: nginx
        tag: "1.27-alpine"
      resources:
        requests:
          cpu: "10m"
          memory: "32Mi"
        limits:
          cpu: "100m"
          memory: "64Mi"
      ports:
        - name: http
          container_port: 80
          network_protocol: TCP
          app_protocol: http
          service_port: 80
  availability:
    min_replicas: 1
    horizontal_pod_autoscaling:
      is_enabled: true
      target_cpu_utilization_percent: 70.0
