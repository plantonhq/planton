apiVersion: kubernetes.planton.dev/v1
kind: KubernetesDeployment
metadata:
  name: my-web-service
spec:
  namespace:
    value: "<your-namespace>"
  createNamespace: false
  version: latest
  container:
    app:
      image:
        repo: "<your-container-registry>/<your-image>"
        tag: "<your-image-tag>"
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 1000m
          memory: 1Gi
      ports:
        - name: http
          containerPort: 8080
          networkProtocol: TCP
          appProtocol: http
          servicePort: 80
          isIngressPort: true
  ingress:
    enabled: true
    hostname: "<your-app.example.com>"
  availability:
    minReplicas: 2
    horizontalPodAutoscaling:
      isEnabled: true
      targetCpuUtilizationPercent: 70
    deploymentStrategy:
      maxUnavailable: "0"
      maxSurge: "1"
    podDisruptionBudget:
      enabled: true
      minAvailable: "1"
