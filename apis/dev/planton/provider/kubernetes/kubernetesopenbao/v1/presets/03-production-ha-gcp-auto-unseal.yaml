apiVersion: kubernetes.planton.dev/v1
kind: KubernetesOpenBao
metadata:
  name: my-openbao
spec:
  namespace:
    value: openbao
  createNamespace: true
  serverContainer:
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    dataStorageSize: "50Gi"
  highAvailability:
    enabled: true
    replicas: 3
  autoUnseal:
    gcpKms:
      project:
        value: "<gcp-project-id>"
      region: "<gcp-region>"
      keyRing:
        value: "<kms-key-ring-name>"
      cryptoKey:
        value: "<kms-crypto-key-name>"
      workloadIdentityServiceAccount:
        value: "<gcp-service-account-email>"
  uiEnabled: true
  tlsEnabled: true
  ingress:
    enabled: true
    hostname: "<your-openbao.example.com>"
