apiVersion: kubernetes.planton.dev/v1
kind: KubernetesOpenBao
metadata:
  name: my-openbao
spec:
  namespace:
    value: openbao
  createNamespace: true
  serverContainer:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi
  highAvailability:
    enabled: true
    replicas: 3
  uiEnabled: true
  tlsEnabled: true
  injector:
    enabled: true
  ingress:
    enabled: true
    hostname: "<your-openbao.example.com>"
