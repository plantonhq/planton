apiVersion: kubernetes.planton.dev/v1
kind: KubernetesOpenFga
metadata:
  name: my-openfga
spec:
  namespace:
    value: openfga
  createNamespace: true
  container:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 100Mi
      limits:
        cpu: 500m
        memory: 512Mi
  dataStore:
    engine: postgres
    host: "<your-postgres-host>"
    port: 5432
    database: openfga
    username: "<your-postgres-username>"
    password: "<your-postgres-password>"
  ingress:
    enabled: true
    hostname: "<your-openfga.example.com>"
