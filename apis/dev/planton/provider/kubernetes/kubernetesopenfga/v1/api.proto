syntax = "proto3";

package dev.planton.provider.kubernetes.kubernetesopenfga.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/kubernetes/kubernetesopenfga/v1/spec.proto";
import "dev/planton/provider/kubernetes/kubernetesopenfga/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

//open-fga-kubernetes
message KubernetesOpenFga {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'kubernetes.planton.dev/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'KubernetesOpenFga'];

  //metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  KubernetesOpenFgaSpec spec = 4 [(buf.validate.field).required = true];

  //status
  KubernetesOpenFgaStatus status = 5;
}

//open-fga-kubernetes status.
message KubernetesOpenFgaStatus {
  //stack-outputs
  KubernetesOpenFgaStackOutputs outputs = 1;
}
