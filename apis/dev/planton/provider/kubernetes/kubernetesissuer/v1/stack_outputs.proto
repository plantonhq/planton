syntax = "proto3";

package dev.planton.provider.kubernetes.kubernetesissuer.v1;

// KubernetesIssuerStackOutputs captures observable outputs after
// the Issuer is created.
message KubernetesIssuerStackOutputs {
  // Namespace where the Issuer was created.
  string namespace = 1;
  // Issuer resource name (equals metadata.name).
  // Use in Certificate issuerRef.name when issuerRef.kind=Issuer.
  string issuer_name = 2;
}
