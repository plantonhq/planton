syntax = "proto3";

package dev.planton.provider.kubernetes.kubernetespeerauthentication.v1;

import "dev/planton/provider/kubernetes/kubernetespeerauthentication/v1/api.proto";
import "dev/planton/provider/kubernetes/provider.proto";

// KubernetesPeerAuthenticationStackInput provides the inputs for creating the
// PeerAuthentication on a Kubernetes cluster.
message KubernetesPeerAuthenticationStackInput {
  // target cloud-resource
  KubernetesPeerAuthentication target = 1;
  // provider-config
  dev.planton.provider.kubernetes.KubernetesProviderConfig provider_config = 2;
}
