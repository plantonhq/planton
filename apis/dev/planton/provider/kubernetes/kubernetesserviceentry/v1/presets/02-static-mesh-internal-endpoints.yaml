apiVersion: kubernetes.planton.dev/v1
kind: KubernetesServiceEntry
metadata:
  name: static-mesh-internal-service
spec:
  namespace:
    value: <namespace>
  hosts:
    - <internal-host>
  addresses:
    - <cidr-or-ip>
  location: MESH_INTERNAL
  resolution: STATIC
  ports:
    - number: 5432
      name: tcp-postgres
      protocol: TCP
  endpoints:
    - address: <endpoint-ip-1>
      ports:
        tcp-postgres: 5432
    - address: <endpoint-ip-2>
      ports:
        tcp-postgres: 5432
