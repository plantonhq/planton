syntax = "proto3";

package dev.planton.provider.kubernetes.kubernetesexternalsecrets.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/kubernetes/kubernetes.proto";
import "dev/planton/provider/kubernetes/options.proto";
import "dev/planton/provider/kubernetes/target_cluster.proto";
import "dev/planton/shared/foreignkey/v1/foreign_key.proto";
import "dev/planton/shared/options/options.proto";

// KubernetesExternalSecretsSpec defines configuration for the External Secrets
// Operator (ESO) on any Kubernetes cluster.
message KubernetesExternalSecretsSpec {
  // Target Kubernetes Cluster
  dev.planton.provider.kubernetes.KubernetesClusterSelector target_cluster = 1;

  // Kubernetes Namespace
  dev.planton.shared.foreignkey.v1.StringValueOrRef namespace = 2 [
    (buf.validate.field).required = true,
    (dev.planton.shared.foreignkey.v1.default_kind) = KubernetesNamespace,
    (dev.planton.shared.foreignkey.v1.default_kind_field_path) = "spec.name"
  ];

  // flag to indicate if the namespace should be created
  bool create_namespace = 3;

  // How often the controller polls the backing secret store (in seconds).
  // Very small values can incur high cloud‑API costs.
  optional uint32 poll_interval_seconds = 4 [
    (dev.planton.shared.options.default) = "10",
    (buf.validate.field).uint32.gt = 0
  ];

  // CPU / memory tuning for the ESO controller container.
  KubernetesExternalSecretsSpecContainer container = 5 [(buf.validate.field).required = true];

  // Provider‑specific glue.  Exactly one block should be set.
  oneof provider_config {
    // Google Cloud Secrets Manager + Workload Identity.
    KubernetesExternalSecretsGkeConfig gke = 100;

    // AWS Secrets Manager + IRSA.
    KubernetesExternalSecretsEksConfig eks = 101;

    // Azure Key Vault + Workload / Managed Identity.
    KubernetesExternalSecretsAksConfig aks = 102;
  }
}

// Resource limits / requests for the controller container.
message KubernetesExternalSecretsSpecContainer {
  dev.planton.provider.kubernetes.ContainerResources resources = 1 [(dev.planton.provider.kubernetes.default_container_resources) = {
    limits: {
      cpu: "1000m"
      memory: "1Gi"
    }
    requests: {
      cpu: "50m"
      memory: "100Mi"
    }
  }];
}

// -----------------------------------------------------------------------------
// Provider‑specific blocks
// -----------------------------------------------------------------------------

// GKE + Google Cloud Secrets Manager.
message KubernetesExternalSecretsGkeConfig {
  // GCP project hosting both the secrets and the GKE cluster.
  dev.planton.shared.foreignkey.v1.StringValueOrRef project_id = 1 [
    (buf.validate.field).required = true,
    (dev.planton.shared.foreignkey.v1.default_kind) = GcpProject,
    (dev.planton.shared.foreignkey.v1.default_kind_field_path) = "status.outputs.project_id"
  ];

  // Google service‑account e‑mail used via Workload Identity.
  string gsa_email = 2 [
    (buf.validate.field).required = true,
    (dev.planton.shared.foreignkey.v1.default_kind) = GcpServiceAccount,
    (dev.planton.shared.foreignkey.v1.default_kind_field_path) = "status.outputs.email"
  ];
}

// EKS + AWS Secrets Manager.
message KubernetesExternalSecretsEksConfig {
  // AWS region containing the secret store (defaults to cluster region if empty).
  string region = 1;

  // Optional existing IAM role ARN for IRSA; auto‑created if left blank.
  string irsa_role_arn_override = 2;
}

// AKS + Azure Key Vault.
message KubernetesExternalSecretsAksConfig {
  // Azure Key Vault resource ID that stores the secrets.
  string key_vault_resource_id = 1;

  // Optional client ID of an existing managed identity to bind to ESO.
  string managed_identity_client_id = 2;
}
