apiVersion: kubernetes.planton.dev/v1
kind: KubernetesExternalSecrets
metadata:
  name: my-external-secrets
spec:
  namespace:
    value: external-secrets
  createNamespace: true
  container:
    resources:
      requests:
        cpu: 50m
        memory: 100Mi
      limits:
        cpu: 1000m
        memory: 1Gi
  eks:
    region: "<your-aws-region>"
