apiVersion: kubernetes.planton.dev/v1
kind: KubernetesSolrOperator
metadata:
  name: my-solr-operator
spec:
  namespace:
    value: solr-system
  createNamespace: true
  container:
    resources:
      requests:
        cpu: 50m
        memory: 100Mi
      limits:
        cpu: 1000m
        memory: 1Gi
