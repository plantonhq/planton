syntax = "proto3";

package dev.planton.provider.kubernetes.kubernetespostgres.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/kubernetes/kubernetes.proto";
import "dev/planton/provider/kubernetes/target_cluster.proto";
import "dev/planton/shared/foreignkey/v1/foreign_key.proto";
import "dev/planton/shared/options/options.proto";
import "google/protobuf/descriptor.proto";

extend google.protobuf.FieldOptions {
  KubernetesPostgresContainer default_container = 534001;
}

// R2/S3-compatible storage credentials that authenticate WAL-G against the backup
// bucket. Cloudflare R2 is the storage backend: the S3 API endpoint is derived from
// the account ID as https://<cloudflare_account_id>.r2.cloudflarestorage.com, with
// region "auto" and path-style addressing. The same credential shape authenticates
// both writing backups and reading them back during a restore.
message KubernetesPostgresR2Credentials {
  // Cloudflare account ID that owns the R2 bucket, used to construct the S3 API
  // endpoint. An account identifier, not a secret.
  string cloudflare_account_id = 1 [(buf.validate.field).required = true];

  // R2 access-key ID. A public identifier (like a username), not a secret.
  string access_key_id = 2 [(buf.validate.field).required = true];

  // R2 secret access key. Provided as a managed-secret reference and resolved
  // just-in-time at deploy: it is written to a Kubernetes Secret and injected via
  // secretKeyRef, never as plaintext in the postgresql custom resource or pod spec.
  string secret_access_key = 3 [
    (buf.validate.field).required = true,
    (dev.planton.shared.options.sensitive) = true
  ];
}

// Disaster-recovery restore configuration. When enabled, the database bootstraps as
// a read-only standby that replays an existing backup from the bucket instead of
// initializing empty; disabling it (after the standby has caught up) promotes the
// database to a read-write primary. The module locates the source backup at
// s3://<bucket>/<object_prefix> and authenticates with restore credentials that are
// independent of the ongoing-backup credentials, so a cluster can restore from a
// bucket it does not itself back up to.
message KubernetesPostgresRestoreConfig {
  option (buf.validate.message).cel = {
    id: "restore.requires_source"
    expression: "!this.enabled || (has(this.bucket) && this.object_prefix != '' && has(this.credentials))"
    message: "to restore, set bucket, object_prefix, and credentials so the module can locate and read the source backup"
  };

  // Bootstrap this database from an existing backup. When true the database starts
  // as a read-only standby replaying the source backup; set false once it has caught
  // up to promote it to a read-write primary.
  bool enabled = 1;

  // Bucket holding the source backup to restore from. A literal bucket name, or a
  // reference (value_from) to any S3-compatible bucket resource's output -- for
  // example a CloudflareR2Bucket's status.outputs.bucket_name. Set the referenced
  // kind explicitly; this field assumes no single provider.
  dev.planton.shared.foreignkey.v1.StringValueOrRef bucket = 2;

  // Path under the bucket locating the source backup (for example the originating
  // environment). This is the explicit source key: unlike the ongoing-backup path it
  // carries no runtime substitution, because the source scope is historical.
  string object_prefix = 3;

  // Credentials used to read the source backup during standby bootstrap.
  KubernetesPostgresR2Credentials credentials = 4;
}

// Per-database backup configuration. WAL-G streams base backups and WAL to an
// S3-compatible bucket on the configured schedule. The module composes the full
// WAL-G target as s3://<bucket>/<object_prefix>/<cluster-scope>/<pg-version>,
// appending the per-cluster and per-version segments itself so that backups from
// many clusters and versions can share one bucket without collision; callers specify
// only the bucket and an optional object_prefix.
message KubernetesPostgresBackupConfig {
  option (buf.validate.message).cel = {
    id: "backup.credentials_require_bucket"
    expression: "!has(this.credentials) || has(this.bucket)"
    message: "set a bucket when backup credentials are provided, so WAL-G has a target to write to"
  };

  // Enable continuous WAL-G backups for this database.
  bool enabled = 1;

  // Bucket that stores this database's backups. A literal bucket name, or a
  // reference (value_from) to any S3-compatible bucket resource's output -- for
  // example a CloudflareR2Bucket's status.outputs.bucket_name. Set the referenced
  // kind explicitly; this field assumes no single provider.
  dev.planton.shared.foreignkey.v1.StringValueOrRef bucket = 2;

  // Base path under the bucket for this database's backups (for example the
  // environment). The module appends the per-cluster and per-version segments.
  string object_prefix = 3;

  // Cron schedule for base backups, for example "0 2 * * *" for 02:00 daily. WAL is
  // archived continuously between base backups.
  string schedule = 4;

  // Number of base backups to retain before the oldest is pruned. For a financial
  // datastore set this explicitly (for example 14).
  int32 retain_count = 5;

  // Credentials WAL-G uses to write backups to the bucket.
  KubernetesPostgresR2Credentials credentials = 6;

  // Disaster-recovery restore configuration for bootstrapping this database from an
  // existing backup.
  KubernetesPostgresRestoreConfig restore = 7;
}

// PostgreSQL user/role definition
message KubernetesPostgresUser {
  // Username/role name (e.g., "app_user", "openfga")
  // This name can be referenced as a database owner in the databases field
  string name = 1 [(buf.validate.field).required = true];

  // User permission flags. Common values:
  // - "createdb": Can create databases
  // - "superuser": Superuser privileges (use with caution)
  // - "createrole": Can create other roles
  // - "inherit": Inherits privileges of roles it is a member of
  // - "login": Can log in (default for users)
  // - "replication": Can initiate streaming replication
  // Empty array means standard user with login privileges only.
  repeated string flags = 2;
}

// PostgreSQL database definition
message KubernetesPostgresDatabase {
  // Database name (e.g., "app_database", "analytics_db")
  // The operator will create this database during cluster initialization.
  string name = 1 [(buf.validate.field).required = true];

  // Owner role name (e.g., "app_user", "analytics_role")
  // This role must be declared in the 'users' field before being referenced here.
  // If not specified, the database will be owned by the default postgres user.
  string owner_role = 2;
}

/**
 * **KubernetesPostgresSpec** defines the configuration for deploying PostgreSQL on a Kubernetes cluster.
 * This message specifies the parameters needed to create and manage a PostgreSQL deployment within a Kubernetes environment.
 * It includes container specifications and ingress settings to control resource allocation and external access.
 */
message KubernetesPostgresSpec {
  // Target Kubernetes Cluster
  dev.planton.provider.kubernetes.KubernetesClusterSelector target_cluster = 1;

  // Kubernetes Namespace
  dev.planton.shared.foreignkey.v1.StringValueOrRef namespace = 2 [
    (buf.validate.field).required = true,
    (dev.planton.shared.foreignkey.v1.default_kind) = KubernetesNamespace,
    (dev.planton.shared.foreignkey.v1.default_kind_field_path) = "spec.name"
  ];

  // flag to indicate if the namespace should be created
  bool create_namespace = 3;

  // The container specifications for the PostgreSQL deployment.
  KubernetesPostgresContainer container = 4 [(default_container) = {
    replicas: 1
    resources: {
      limits: {
        cpu: "1000m"
        memory: "1Gi"
      }
      requests: {
        cpu: "50m"
        memory: "100Mi"
      }
    }
    disk_size: "1Gi"
  }];

  //The ingress configuration for the PostgreSQL deployment.
  KubernetesPostgresIngress ingress = 5;

  // Optional: Per-database backup configuration
  // When specified, these settings override the operator-level backup configuration
  // If not specified, the database inherits operator-level backup settings
  KubernetesPostgresBackupConfig backup_config = 6;

  // List of databases to create.
  // The operator will create these databases during cluster initialization.
  // If not specified, only the default "postgres" database will be available.
  // Note: Owner roles must be declared in the 'users' field before being referenced here.
  // Example:
  //   databases:
  //     - name: app_database
  //       owner_role: app_user
  //     - name: analytics_db
  //       owner_role: analytics_role
  repeated KubernetesPostgresDatabase databases = 7;

  // List of PostgreSQL users/roles to create.
  // Users must be declared here before being used as database owners in the 'databases' field.
  // The operator creates these users during cluster initialization.
  repeated KubernetesPostgresUser users = 8;
}

/**
 * **KubernetesPostgresContainer** specifies the container configuration for the PostgreSQL application.
 * It includes resource allocations for CPU and memory, the number of replicas, and disk size for data persistence.
 * Proper configuration ensures optimal performance and data reliability for your PostgreSQL deployment.
 */
message KubernetesPostgresContainer {
  // The number of replicas of PostgreSQL pods.
  int32 replicas = 1;

  // The CPU and memory resources allocated to the PostgreSQL container.
  dev.planton.provider.kubernetes.ContainerResources resources = 2;

  /**
   * The storage size to allocate for each PostgreSQL instance (e.g., "1Gi").
   * A default value is set if the client does not provide a value.
   */
  string disk_size = 3 [(buf.validate.field).cel = {
    id: "spec.container.disk_size.required"
    message: "Disk size value is invalid"
    // Validation regex for disk size.
    expression: "this.matches('^\\\\d+(\\\\.\\\\d+)?\\\\s?(Ki|Mi|Gi|Ti|Pi|Ei|K|M|G|T|P|E)$') && size(this) > 0"
  }];
}

/**
 * **KubernetesPostgresIngress** defines the ingress configuration for PostgreSQL.
 * It allows enabling external access via LoadBalancer with hostname-based routing.
 */
message KubernetesPostgresIngress {
  // Flag to enable or disable ingress.
  // When enabled, creates a LoadBalancer service with external-dns annotations.
  bool enabled = 1;

  // The full hostname for external access (e.g., "postgres.example.com").
  // This hostname will be configured automatically via external-dns.
  // Required when enabled is true.
  string hostname = 2;

  option (buf.validate.message).cel = {
    id: "spec.ingress.hostname.required"
    expression: "!this.enabled || size(this.hostname) > 0"
    message: "hostname is required when ingress is enabled"
  };
}
