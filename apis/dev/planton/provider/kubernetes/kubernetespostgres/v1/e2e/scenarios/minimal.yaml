apiVersion: kubernetes.planton.dev/v1
kind: KubernetesPostgres
metadata:
  name: e2e-pg-minimal
spec:
  namespace:
    value: e2e-pg-minimal
  create_namespace: true
  container:
    replicas: 1
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 50m
        memory: 128Mi
    disk_size: 1Gi
