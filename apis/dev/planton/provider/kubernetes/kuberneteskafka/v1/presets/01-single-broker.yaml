apiVersion: kubernetes.planton.dev/v1
kind: KubernetesKafka
metadata:
  name: my-kafka
spec:
  namespace:
    value: "<your-namespace>"
  createNamespace: false
  brokerContainer:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 2Gi
    diskSize: 10Gi
  zookeeperContainer:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 100Mi
      limits:
        cpu: 500m
        memory: 512Mi
    diskSize: 1Gi
  isDeployKafkaUi: true
  kafkaTopics:
    - name: events
