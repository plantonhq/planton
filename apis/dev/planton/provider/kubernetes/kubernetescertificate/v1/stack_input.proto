syntax = "proto3";

package dev.planton.provider.kubernetes.kubernetescertificate.v1;

import "dev/planton/provider/kubernetes/kubernetescertificate/v1/api.proto";
import "dev/planton/provider/kubernetes/provider.proto";

// Input for the KubernetesCertificate IaC stack.
message KubernetesCertificateStackInput {
  // Target cloud-resource.
  KubernetesCertificate target = 1;
  // Kubernetes provider configuration (cluster credentials).
  dev.planton.provider.kubernetes.KubernetesProviderConfig provider_config = 2;
}
