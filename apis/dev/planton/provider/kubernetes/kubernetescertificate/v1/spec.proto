syntax = "proto3";

package dev.planton.provider.kubernetes.kubernetescertificate.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/kubernetes/target_cluster.proto";
import "dev/planton/shared/foreignkey/v1/foreign_key.proto";
import "dev/planton/shared/options/options.proto";

// KubernetesCertificateSpec defines configuration for a cert-manager Certificate
// on any Kubernetes cluster. Each instance creates one Certificate resource that
// requests a signed TLS certificate from a specified Issuer or ClusterIssuer.
//
// The resulting TLS certificate and private key are stored in a Kubernetes Secret
// named by secret_name. Consumers (Ingress, Gateway, CA Issuer) reference that
// Secret directly.
message KubernetesCertificateSpec {
  // Target Kubernetes Cluster where cert-manager is installed.
  dev.planton.provider.kubernetes.KubernetesClusterSelector target_cluster = 1;

  // Namespace where the Certificate resource will be created.
  dev.planton.shared.foreignkey.v1.StringValueOrRef namespace = 2 [
    (buf.validate.field).required = true,
    (dev.planton.shared.foreignkey.v1.default_kind) = KubernetesNamespace,
    (dev.planton.shared.foreignkey.v1.default_kind_field_path) = "spec.name"
  ];

  // DNS Subject Alternative Names. At least one required.
  repeated string dns_names = 3 [(buf.validate.field).repeated.min_items = 1];

  // Kubernetes Secret name where the signed certificate and private key will be stored.
  string secret_name = 4 [(buf.validate.field).required = true];

  // Issuer that will sign this certificate.
  CertificateIssuerRef issuer_ref = 5 [(buf.validate.field).required = true];

  // Certificate lifetime and renewal timing.
  optional CertificateDuration duration_config = 6;

  // Private key algorithm, size, encoding, and rotation.
  optional CertificatePrivateKey private_key = 7;

  // When true, the issued certificate is a CA certificate (adds cert-sign usage).
  // Used for bootstrapping internal PKI: create a self-signed root CA cert, then
  // use it as the signing key for a CA Issuer.
  bool is_ca = 8;
}

// CertificateIssuerRef selects either a cluster-scoped or namespace-scoped issuer
// to sign the certificate. Exactly one must be provided.
message CertificateIssuerRef {
  option (buf.validate.message).cel = {
    id: "issuer_ref.one_required"
    message: "An issuer reference is required -- choose 'cluster_issuer' for public TLS certificates via ACME (e.g., Let's Encrypt), or 'issuer' for namespace-scoped certificates from an internal CA or self-signed issuer"
    expression: "has(this.cluster_issuer) || has(this.issuer)"
  };

  oneof issuer_type {
    // ClusterIssuer reference (cluster-scoped, typically ACME / Let's Encrypt).
    ClusterIssuerRef cluster_issuer = 1;
    // Issuer reference (namespace-scoped, typically internal CA or self-signed).
    NamespacedIssuerRef issuer = 2;
  }
}

// ClusterIssuerRef references a cluster-scoped ClusterIssuer by name.
message ClusterIssuerRef {
  // Name of the ClusterIssuer resource.
  dev.planton.shared.foreignkey.v1.StringValueOrRef name = 1 [
    (buf.validate.field).required = true,
    (dev.planton.shared.foreignkey.v1.default_kind) = KubernetesClusterIssuer,
    (dev.planton.shared.foreignkey.v1.default_kind_field_path) = "status.outputs.cluster_issuer_name"
  ];
}

// NamespacedIssuerRef references a namespace-scoped Issuer by name.
message NamespacedIssuerRef {
  // Name of the Issuer resource.
  dev.planton.shared.foreignkey.v1.StringValueOrRef name = 1 [
    (buf.validate.field).required = true,
    (dev.planton.shared.foreignkey.v1.default_kind) = KubernetesIssuer,
    (dev.planton.shared.foreignkey.v1.default_kind_field_path) = "status.outputs.issuer_name"
  ];
}

// CertificateDuration configures the certificate lifetime and renewal window.
message CertificateDuration {
  // Certificate lifetime (Go duration format, e.g., '2160h' = 90 days).
  optional string duration = 1 [(dev.planton.shared.options.default) = "2160h"];

  // Renew this long before expiry (e.g., '360h' = 15 days).
  optional string renew_before = 2 [(dev.planton.shared.options.default) = "360h"];
}

// CertificatePrivateKey configures the private key algorithm, size, encoding,
// and rotation policy for the certificate.
message CertificatePrivateKey {
  // Private key algorithm.
  enum PrivateKeyAlgorithm {
    private_key_algorithm_unspecified = 0;
    rsa = 1;
    ecdsa = 2;
    ed25519 = 3;
  }

  // Private key encoding format.
  enum PrivateKeyEncoding {
    private_key_encoding_unspecified = 0;
    pkcs1 = 1;
    pkcs8 = 2;
  }

  // Controls whether the private key is regenerated on renewal.
  enum PrivateKeyRotationPolicy {
    private_key_rotation_policy_unspecified = 0;
    always = 1;
    never = 2;
  }

  optional PrivateKeyAlgorithm algorithm = 1 [(dev.planton.shared.options.default) = "rsa"];
  optional int32 size = 2 [(dev.planton.shared.options.default) = "2048"];
  optional PrivateKeyEncoding encoding = 3 [(dev.planton.shared.options.default) = "pkcs1"];
  optional PrivateKeyRotationPolicy rotation_policy = 4 [(dev.planton.shared.options.default) = "always"];
}
