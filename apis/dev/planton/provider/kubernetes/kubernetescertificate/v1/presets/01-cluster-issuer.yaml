apiVersion: kubernetes.planton.dev/v1
kind: KubernetesCertificate
metadata:
  name: my-certificate
spec:
  namespace:
    value: "<your-namespace>"
  dnsNames:
    - "<your-hostname.example.com>"
  secretName: "<your-hostname>-tls"
  issuerRef:
    clusterIssuer:
      name:
        value: "<your-cluster-issuer>"
