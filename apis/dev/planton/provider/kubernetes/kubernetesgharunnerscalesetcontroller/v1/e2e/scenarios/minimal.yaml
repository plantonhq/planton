apiVersion: kubernetes.planton.dev/v1
kind: KubernetesGhaRunnerScaleSetController
metadata:
  name: e2e-arc-ctrl
spec:
  namespace:
    value: arc-system
  create_namespace: true
  helm_chart_version: "0.13.1"
  replica_count: 1
  container:
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "250m"
        memory: "256Mi"
