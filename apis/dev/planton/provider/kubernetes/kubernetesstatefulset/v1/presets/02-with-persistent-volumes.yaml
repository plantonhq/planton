apiVersion: kubernetes.planton.dev/v1
kind: KubernetesStatefulSet
metadata:
  name: my-statefulset
spec:
  namespace:
    value: "<your-namespace>"
  createNamespace: false
  container:
    app:
      image:
        repo: "<your-container-registry>/<your-image>"
        tag: "<your-image-tag>"
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 1000m
          memory: 1Gi
      ports:
        - name: http
          containerPort: 8080
          networkProtocol: TCP
          appProtocol: http
          servicePort: 80
          isIngressPort: false
      volumeMounts:
        - name: data
          mountPath: /data
  availability:
    minReplicas: 3
    podDisruptionBudget:
      enabled: true
      minAvailable: "2"
  volumeClaimTemplates:
    - name: data
      storageClassName: "<your-storage-class>"
      accessModes:
        - ReadWriteOnce
      storage: 10Gi
