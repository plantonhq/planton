apiVersion: kubernetes.planton.dev/v1
kind: KubernetesStatefulSet
metadata:
  name: test-statefulset
spec:
  namespace:
    value: test-statefulset-ns
  create_namespace: true
  container:
    app:
      image:
        repo: nginx
        tag: "1.27-alpine"
      resources:
        requests:
          cpu: "10m"
          memory: "32Mi"
        limits:
          cpu: "100m"
          memory: "64Mi"
      ports:
        - name: http
          container_port: 80
          network_protocol: TCP
          app_protocol: http
          service_port: 80
