apiVersion: kubernetes.planton.dev/v1
kind: KubernetesTlsRoute
metadata:
  name: my-tls-route
spec:
  namespace:
    value: app-ns
  parentRefs:
    - name: <gateway-name>
      sectionName: tls
  hostnames:
    - <sni-hostname>
  rules:
    - backendRefs:
        - name: <stable-service>
          port: 8443
          weight: 90
        - name: <canary-service>
          port: 8443
          weight: 10
