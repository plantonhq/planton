apiVersion: kubernetes.planton.dev/v1
kind: KubernetesJob
metadata:
  name: my-batch-job
spec:
  namespace:
    value: "<your-namespace>"
  createNamespace: false
  image:
    repo: "<your-container-registry>/<your-image>"
    tag: "<your-image-tag>"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  completions: 1
  parallelism: 1
  backoffLimit: 3
  restartPolicy: Never
  ttlSecondsAfterFinished: 3600  # auto-cleanup after 1 hour
