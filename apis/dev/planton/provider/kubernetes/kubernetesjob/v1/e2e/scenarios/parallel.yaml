apiVersion: kubernetes.planton.dev/v1
kind: KubernetesJob
metadata:
  name: e2e-job-parallel
spec:
  namespace:
    value: e2e-job-parallel-ns
  create_namespace: true
  image:
    repo: busybox
    tag: "1.36"
  resources:
    requests:
      cpu: "10m"
      memory: "32Mi"
    limits:
      cpu: "50m"
      memory: "64Mi"
  parallelism: 2
  completions: 2
  backoff_limit: 3
  restart_policy: Never
  command:
    - /bin/sh
    - -c
    - echo "parallel-worker" && sleep 1
