apiVersion: kubernetes.planton.dev/v1
kind: KubernetesRedis
metadata:
  name: my-redis
spec:
  namespace:
    value: "<your-namespace>"
  createNamespace: false
  container:
    replicas: 3
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 2Gi
    persistenceEnabled: true
    diskSize: 5Gi
