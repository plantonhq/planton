apiVersion: kubernetes.planton.dev/v1
kind: KubernetesGrafana
metadata:
  name: my-grafana
spec:
  namespace:
    value: monitoring
  createNamespace: true
  container:
    resources:
      requests:
        cpu: 50m
        memory: 100Mi
      limits:
        cpu: 1000m
        memory: 1Gi
  ingress:
    enabled: true
    hostname: "<your-grafana.example.com>"
