syntax = "proto3";

package dev.planton.provider.kubernetes.kubernetestekton.v1;

import "dev/planton/provider/kubernetes/kubernetestekton/v1/api.proto";
import "dev/planton/provider/kubernetes/provider.proto";

// KubernetesTektonStackInput provides the input for the Tekton IaC stack.
message KubernetesTektonStackInput {
  // target cloud-resource
  KubernetesTekton target = 1;
  // provider-config for Kubernetes provider
  dev.planton.provider.kubernetes.KubernetesProviderConfig provider_config = 2;
}
