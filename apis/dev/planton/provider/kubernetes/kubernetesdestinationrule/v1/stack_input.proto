syntax = "proto3";

package dev.planton.provider.kubernetes.kubernetesdestinationrule.v1;

import "dev/planton/provider/kubernetes/kubernetesdestinationrule/v1/api.proto";
import "dev/planton/provider/kubernetes/provider.proto";

// KubernetesDestinationRuleStackInput provides the inputs for creating the DestinationRule on
// a Kubernetes cluster.
message KubernetesDestinationRuleStackInput {
  // target cloud-resource
  KubernetesDestinationRule target = 1;
  // provider-config
  dev.planton.provider.kubernetes.KubernetesProviderConfig provider_config = 2;
}
