apiVersion: kubernetes.planton.dev/v1
kind: KubernetesNamespace
metadata:
  name: e2e-ns-custom-q
spec:
  name: e2e-ns-custom-q
  resource_profile:
    custom:
      cpu:
        requests: "2"
        limits: "4"
      memory:
        requests: "4Gi"
        limits: "8Gi"
      object_counts:
        pods: 20
        services: 10
        configmaps: 50
        secrets: 50
        persistent_volume_claims: 5
        load_balancers: 2
