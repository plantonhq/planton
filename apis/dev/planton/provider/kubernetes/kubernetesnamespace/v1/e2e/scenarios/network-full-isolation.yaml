apiVersion: kubernetes.planton.dev/v1
kind: KubernetesNamespace
metadata:
  name: e2e-ns-net-full
spec:
  name: e2e-ns-net-full
  network_config:
    isolate_ingress: true
    restrict_egress: true
    allowed_ingress_namespaces:
      - "kube-system"
      - "istio-system"
    allowed_egress_cidrs:
      - "10.0.0.0/8"
