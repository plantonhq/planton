apiVersion: kubernetes.planton.dev/v1
kind: KubernetesNamespace
metadata:
  name: e2e-ns-def-lim
spec:
  name: e2e-ns-def-lim
  resource_profile:
    custom:
      cpu:
        requests: "2"
        limits: "4"
      memory:
        requests: "4Gi"
        limits: "8Gi"
      object_counts:
        pods: 20
        services: 10
        configmaps: 50
        secrets: 50
        persistent_volume_claims: 5
        load_balancers: 2
      default_limits:
        default_cpu_request: "100m"
        default_cpu_limit: "500m"
        default_memory_request: "128Mi"
        default_memory_limit: "512Mi"
