syntax = "proto3";

package dev.planton.provider.kubernetes.kubernetesrequestauthentication.v1;

import "dev/planton/provider/kubernetes/kubernetesrequestauthentication/v1/api.proto";
import "dev/planton/provider/kubernetes/provider.proto";

// KubernetesRequestAuthenticationStackInput provides the inputs for creating the
// RequestAuthentication on a Kubernetes cluster.
message KubernetesRequestAuthenticationStackInput {
  // target cloud-resource
  KubernetesRequestAuthentication target = 1;
  // provider-config
  dev.planton.provider.kubernetes.KubernetesProviderConfig provider_config = 2;
}
