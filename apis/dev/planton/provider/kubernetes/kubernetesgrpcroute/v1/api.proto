syntax = "proto3";

package dev.planton.provider.kubernetes.kubernetesgrpcroute.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/kubernetes/kubernetesgrpcroute/v1/spec.proto";
import "dev/planton/provider/kubernetes/kubernetesgrpcroute/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// KubernetesGrpcRoute is a Kubernetes Gateway API GRPCRoute: a namespaced set of
// gRPC routing rules that attach to a Gateway and forward matching requests to
// backend Services.
message KubernetesGrpcRoute {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'kubernetes.planton.dev/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'KubernetesGrpcRoute'];

  // metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  KubernetesGrpcRouteSpec spec = 4 [(buf.validate.field).required = true];

  // status
  KubernetesGrpcRouteStatus status = 5;
}

// KubernetesGrpcRouteStatus holds the deployment status and outputs.
message KubernetesGrpcRouteStatus {
  // stack-outputs
  KubernetesGrpcRouteStackOutputs outputs = 1;
}
