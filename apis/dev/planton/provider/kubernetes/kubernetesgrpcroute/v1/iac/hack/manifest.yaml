apiVersion: kubernetes.planton.dev/v1
kind: KubernetesGrpcRoute
metadata:
  name: test-grpc-route
spec:
  namespace:
    value: test-namespace
  parentRefs:
    - name: test-gateway
  hostnames:
    - api.example.com
  rules:
    - matches:
        - method:
            service: helloworld.Greeter
      backendRefs:
        - name: greeter
          port: 9000
