syntax = "proto3";

package dev.planton.provider.kubernetes.kubernetesgateway.v1;

// KubernetesGatewayStackOutputs captures observable outputs after the Gateway
// is created on the target cluster. Controller-managed status (assigned
// addresses, listener conditions) is reconciled asynchronously by the Gateway
// implementation and read via kubectl, so it is intentionally not stored here.
message KubernetesGatewayStackOutputs {
  // Name of the created Gateway (equals metadata.name). Routes attach to this
  // Gateway by referencing this name in their parentRefs; in InfraCharts it
  // orders the Gateway before the Routes that target it.
  string gateway_name = 1;

  // Namespace the Gateway was created in (the resolved spec.namespace). Routes
  // and TLS Secrets that reference this Gateway are subject to same-namespace
  // and ReferenceGrant rules relative to this value.
  string namespace = 2;

  // Name of the GatewayClass this Gateway belongs to (the resolved
  // spec.gateway_class_name), exposed for observability and to confirm which
  // controller implementation programs this Gateway.
  string gateway_class_name = 3;
}
