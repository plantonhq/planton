apiVersion: kubernetes.planton.dev/v1
kind: KubernetesGateway
metadata:
  name: my-multi-protocol-gateway
spec:
  namespace:
    value: istio-ingress
  gatewayClassName:
    value: istio
  listeners:
    - name: http
      port: 80
      protocol: HTTP
    - name: https
      hostname: <app-hostname>
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: <tls-secret-name>
    - name: postgres
      port: 5432
      protocol: TCP
