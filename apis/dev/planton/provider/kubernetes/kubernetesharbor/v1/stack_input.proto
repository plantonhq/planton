syntax = "proto3";

package dev.planton.provider.kubernetes.kubernetesharbor.v1;

import "dev/planton/provider/kubernetes/kubernetesharbor/v1/api.proto";
import "dev/planton/provider/kubernetes/provider.proto";

// harbor-kubernetes stack-input
message KubernetesHarborStackInput {
  // target cloud-resource
  KubernetesHarbor target = 1;
  // provider-credential
  dev.planton.provider.kubernetes.KubernetesProviderConfig provider_config = 2;
  // kubernetes namespace
  string kubernetes_namespace = 3;
}
