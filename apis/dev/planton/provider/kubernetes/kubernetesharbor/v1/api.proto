syntax = "proto3";

package dev.planton.provider.kubernetes.kubernetesharbor.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/kubernetes/kubernetesharbor/v1/spec.proto";
import "dev/planton/provider/kubernetes/kubernetesharbor/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// harbor-kubernetes
message KubernetesHarbor {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'kubernetes.planton.dev/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'KubernetesHarbor'];

  // metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  KubernetesHarborSpec spec = 4 [(buf.validate.field).required = true];

  // status
  KubernetesHarborStatus status = 5;
}

// harbor-kubernetes status
message KubernetesHarborStatus {
  // stack-outputs
  KubernetesHarborStackOutputs outputs = 1;
}
