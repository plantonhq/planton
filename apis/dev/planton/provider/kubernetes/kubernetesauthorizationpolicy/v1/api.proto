syntax = "proto3";

package dev.planton.provider.kubernetes.kubernetesauthorizationpolicy.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/kubernetes/kubernetesauthorizationpolicy/v1/spec.proto";
import "dev/planton/provider/kubernetes/kubernetesauthorizationpolicy/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// KubernetesAuthorizationPolicy is an Istio AuthorizationPolicy: a namespaced policy
// that enforces access control (ALLOW / DENY / AUDIT / CUSTOM) on the workloads it
// selects.
message KubernetesAuthorizationPolicy {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'kubernetes.planton.dev/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'KubernetesAuthorizationPolicy'];

  // metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  KubernetesAuthorizationPolicySpec spec = 4 [(buf.validate.field).required = true];

  // status
  KubernetesAuthorizationPolicyStatus status = 5;
}

// KubernetesAuthorizationPolicyStatus holds the deployment status and outputs.
message KubernetesAuthorizationPolicyStatus {
  // stack-outputs
  KubernetesAuthorizationPolicyStackOutputs outputs = 1;
}
