syntax = "proto3";

package dev.planton.provider.kubernetes.kubernetesauthorizationpolicy.v1;

import "dev/planton/provider/kubernetes/kubernetesauthorizationpolicy/v1/api.proto";
import "dev/planton/provider/kubernetes/provider.proto";

// KubernetesAuthorizationPolicyStackInput provides the inputs for creating the
// AuthorizationPolicy on a Kubernetes cluster.
message KubernetesAuthorizationPolicyStackInput {
  // target cloud-resource
  KubernetesAuthorizationPolicy target = 1;
  // provider-config
  dev.planton.provider.kubernetes.KubernetesProviderConfig provider_config = 2;
}
