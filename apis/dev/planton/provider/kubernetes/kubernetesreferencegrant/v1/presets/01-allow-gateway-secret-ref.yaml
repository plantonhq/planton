apiVersion: kubernetes.planton.dev/v1
kind: KubernetesReferenceGrant
metadata:
  name: allow-gateway-secret-ref
spec:
  namespace:
    value: <cert-namespace>
  from:
    - group: gateway.networking.k8s.io
      kind: Gateway
      namespace: <gateway-namespace>
  to:
    - group: ""
      kind: Secret
