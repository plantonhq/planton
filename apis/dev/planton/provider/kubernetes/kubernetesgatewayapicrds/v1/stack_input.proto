syntax = "proto3";

package dev.planton.provider.kubernetes.kubernetesgatewayapicrds.v1;

import "dev/planton/provider/kubernetes/kubernetesgatewayapicrds/v1/api.proto";
import "dev/planton/provider/kubernetes/provider.proto";

// KubernetesGatewayApiCrdsStackInput provides the inputs for deploying
// Gateway API CRDs to a Kubernetes cluster.
message KubernetesGatewayApiCrdsStackInput {
  // target cloud-resource
  KubernetesGatewayApiCrds target = 1;
  // provider-config
  dev.planton.provider.kubernetes.KubernetesProviderConfig provider_config = 2;
}
