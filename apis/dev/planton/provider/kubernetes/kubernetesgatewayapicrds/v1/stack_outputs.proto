syntax = "proto3";

package dev.planton.provider.kubernetes.kubernetesgatewayapicrds.v1;

// KubernetesGatewayApiCrdsStackOutputs captures observable outputs from the
// Gateway API CRDs installation.
message KubernetesGatewayApiCrdsStackOutputs {
  // Gateway API version that was installed (e.g., "v1.2.1", "v1.3.0").
  string installed_version = 1;

  // Installation channel that was used (standard or experimental).
  string installed_channel = 2;

  // Full URL of the Gateway API CRD bundle that was applied. This is the exact
  // artifact installed -- it encodes both the version and the channel in a single
  // value (e.g. ".../releases/download/v1.5.1/experimental-install.yaml"), so it
  // is the authoritative record of what landed on the cluster.
  string installed_manifest_url = 3;
}
