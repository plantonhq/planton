apiVersion: kubernetes.planton.dev/v1
kind: KubernetesStrimziKafkaOperator
metadata:
  name: my-strimzi-kafka-operator
spec:
  namespace:
    value: strimzi-system
  createNamespace: true
  container:
    resources:
      requests:
        cpu: 50m
        memory: 100Mi
      limits:
        cpu: 1000m
        memory: 1Gi
