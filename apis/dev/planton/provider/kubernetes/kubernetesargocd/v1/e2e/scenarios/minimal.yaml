apiVersion: kubernetes.planton.dev/v1
kind: KubernetesArgocd
metadata:
  name: e2e-argocd-minimal
spec:
  namespace:
    value: e2e-argocd-minimal
  create_namespace: true
  container:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi
