apiVersion: kubernetes.planton.dev/v1
kind: KubernetesTelemetry
metadata:
  name: test-telemetry
spec:
  namespace:
    value: test-namespace
  selector:
    match_labels:
      app: reviews
  tracing:
    - match:
        mode: CLIENT
      providers:
        - name: zipkin
      random_sampling_percentage: 10
      disable_span_reporting: false
      enable_istio_tags: true
      custom_tags:
        my_literal_tag:
          literal:
            value: foo
        my_env_tag:
          environment:
            name: POD_NAME
            default_value: unknown
        my_header_tag:
          header:
            name: x-request-id
  metrics:
    - providers:
        - name: prometheus
      reporting_interval: 5s
      overrides:
        - match:
            metric: REQUEST_COUNT
            mode: SERVER
          tag_overrides:
            request_method:
              operation: UPSERT
              value: request.method
            response_code:
              operation: REMOVE
        - match:
            custom_metric: my_custom_metric
          disabled: true
  access_logging:
    - match:
        mode: SERVER
      providers:
        - name: envoy
      filter:
        expression: "response.code >= 400"
