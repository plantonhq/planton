syntax = "proto3";

package dev.planton.provider.kubernetes.kubernetestelemetry.v1;

import "dev/planton/provider/kubernetes/kubernetestelemetry/v1/api.proto";
import "dev/planton/provider/kubernetes/provider.proto";

// KubernetesTelemetryStackInput provides the inputs for creating the Telemetry
// resource on a Kubernetes cluster.
message KubernetesTelemetryStackInput {
  // target cloud-resource
  KubernetesTelemetry target = 1;
  // provider-config
  dev.planton.provider.kubernetes.KubernetesProviderConfig provider_config = 2;
}
