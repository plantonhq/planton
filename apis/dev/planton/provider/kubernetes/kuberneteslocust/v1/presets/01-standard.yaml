apiVersion: kubernetes.planton.dev/v1
kind: KubernetesLocust
metadata:
  name: my-locust
spec:
  namespace:
    value: load-testing
  createNamespace: true
  masterContainer:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi
  workerContainer:
    replicas: 2
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi
  ingress:
    enabled: true
    hostname: "<your-locust.example.com>"
  loadTest:
    name: my-load-test
    mainPyContent: |
      from locust import HttpUser, task, between

      class WebUser(HttpUser):
          wait_time = between(1, 3)

          @task
          def index(self):
              self.client.get("/")
