apiVersion: kubernetes.planton.dev/v1
kind: KubernetesLocust
metadata:
  name: e2e-locust-minimal
spec:
  namespace:
    value: e2e-locust-minimal
  create_namespace: true
  masterContainer:
    replicas: 1
    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 64Mi
  workerContainer:
    replicas: 1
    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 64Mi
  loadTest:
    name: e2e-test
    mainPyContent: |
      from locust import HttpUser, task, between

      class SimpleUser(HttpUser):
          wait_time = between(1, 2)

          @task
          def get_index(self):
              self.client.get("/")
    libFilesContent:
      "__init__.py": ""
