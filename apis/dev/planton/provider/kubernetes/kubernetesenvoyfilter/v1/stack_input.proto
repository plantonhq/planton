syntax = "proto3";

package dev.planton.provider.kubernetes.kubernetesenvoyfilter.v1;

import "dev/planton/provider/kubernetes/kubernetesenvoyfilter/v1/api.proto";
import "dev/planton/provider/kubernetes/provider.proto";

// KubernetesEnvoyFilterStackInput provides the inputs for creating the EnvoyFilter on a
// Kubernetes cluster.
message KubernetesEnvoyFilterStackInput {
  // target cloud-resource
  KubernetesEnvoyFilter target = 1;
  // provider-config
  dev.planton.provider.kubernetes.KubernetesProviderConfig provider_config = 2;
}
