apiVersion: kubernetes.planton.dev/v1
kind: KubernetesNats
metadata:
  name: my-nats
spec:
  namespace:
    value: "<your-namespace>"
  createNamespace: false
  serverContainer:
    replicas: 3
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 2Gi
    diskSize: 10Gi
  disableJetStream: false
  disableNatsBox: true
