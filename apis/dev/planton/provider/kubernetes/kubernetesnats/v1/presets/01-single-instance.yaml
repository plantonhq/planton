apiVersion: kubernetes.planton.dev/v1
kind: KubernetesNats
metadata:
  name: my-nats
spec:
  namespace:
    value: "<your-namespace>"
  createNamespace: false
  serverContainer:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 100Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    diskSize: 1Gi
  disableJetStream: false  # JetStream enabled
  disableNatsBox: false
