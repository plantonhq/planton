syntax = "proto3";

package dev.planton.provider.kubernetes.kubernetesistio.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/kubernetes/kubernetes.proto";
import "dev/planton/provider/kubernetes/options.proto";
import "dev/planton/provider/kubernetes/target_cluster.proto";
import "dev/planton/shared/foreignkey/v1/foreign_key.proto";
import "dev/planton/shared/options/options.proto";

// **KubernetesIstioSpec** defines the configuration for deploying Istio service mesh on a Kubernetes cluster.
// This message specifies the parameters needed to create and manage an Istio deployment within a Kubernetes environment.
// It includes container specifications for resource allocation to the Istio control plane (istiod).
message KubernetesIstioSpec {
  // Target Kubernetes Cluster
  dev.planton.provider.kubernetes.KubernetesClusterSelector target_cluster = 1;

  // Kubernetes Namespace
  dev.planton.shared.foreignkey.v1.StringValueOrRef namespace = 2 [
    (buf.validate.field).required = true,
    (dev.planton.shared.foreignkey.v1.default_kind) = KubernetesNamespace,
    (dev.planton.shared.foreignkey.v1.default_kind_field_path) = "spec.name"
  ];

  // flag to indicate if the namespace should be created
  bool create_namespace = 3;

  // The container specifications for the Istio control plane (istiod) deployment.
  KubernetesIstioSpecContainer container = 4 [(buf.validate.field).required = true];

  // Istio version to deploy (full patch, e.g. "1.26.8"). Drives the chart version
  // of the istio/base, istiod, and ingress-gateway Helm releases installed for the mesh.
  //
  // Defaults to "1.26.8" -- the Istio version this Planton release targets and the
  // version its typed Istio API components (KubernetesDestinationRule,
  // KubernetesPeerAuthentication, etc.) are generated against.
  //
  // IMPORTANT (upgrades): Istio only supports sequential, single-minor upgrades
  // (e.g. 1.24 -> 1.25 -> 1.26); skipping minors is unsupported. An existing mesh on
  // an older minor MUST pin its currently-running version here (e.g. version: "1.22.3")
  // before redeploying, otherwise it would attempt an unsupported multi-minor in-place
  // jump to the default. Must be a full patch version (X.Y.Z), not a bare minor.
  optional string version = 5 [
    (dev.planton.shared.options.default) = "1.26.8",
    (buf.validate.field).string = {pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"}
  ];
}

// **KubernetesIstioSpecContainer** specifies the container configuration for the Istio control plane (istiod).
// It includes resource allocations for CPU and memory to ensure the service mesh control plane runs efficiently.
message KubernetesIstioSpecContainer {
  // The CPU and memory resources allocated to the Istio control plane (istiod) container.
  dev.planton.provider.kubernetes.ContainerResources resources = 1 [(dev.planton.provider.kubernetes.default_container_resources) = {
    limits: {
      cpu: "1000m"
      memory: "1Gi"
    }
    requests: {
      cpu: "50m"
      memory: "100Mi"
    }
  }];
}
