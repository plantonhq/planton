syntax = "proto3";

package dev.planton.provider.kubernetes.kubernetesistiobasecrds.v1;

import "dev/planton/provider/kubernetes/kubernetesistiobasecrds/v1/api.proto";
import "dev/planton/provider/kubernetes/provider.proto";

// KubernetesIstioBaseCrdsStackInput provides the inputs for installing the Istio CRDs
// on a Kubernetes cluster.
message KubernetesIstioBaseCrdsStackInput {
  // target cloud-resource
  KubernetesIstioBaseCrds target = 1;
  // provider-config
  dev.planton.provider.kubernetes.KubernetesProviderConfig provider_config = 2;
}
