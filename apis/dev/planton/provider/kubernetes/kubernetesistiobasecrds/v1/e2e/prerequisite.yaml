# Dependency-install profile for the Istio base CRDs.
#
# The E2E harness deploys this manifest (via the registry prerequisite graph -- the seven
# Istio API kinds declare `prerequisites: [KubernetesIstioBaseCrds]`) before applying any
# DestinationRule / ServiceEntry / PeerAuthentication / RequestAuthentication /
# AuthorizationPolicy / Telemetry / EnvoyFilter scenario.
#
# There is no version field: the installed CRD set is pinned (module IstioRelease) to the
# crd2pulumi-generated typed SDK, so the cluster schema always matches the typed CRs --
# fields are validated against, not silently pruned by, the CRDs.
apiVersion: kubernetes.planton.dev/v1
kind: KubernetesIstioBaseCrds
metadata:
  name: e2e-istio-base-crds-prereq
spec: {}
