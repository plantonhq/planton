syntax = "proto3";

package dev.planton.provider.kubernetes.kubernetescertmanager.v1;

// KubernetesCertManagerStackOutputs captures observable outputs after
// cert-manager installation.
message KubernetesCertManagerStackOutputs {
  // Kubernetes namespace where cert-manager was deployed.
  string namespace = 1;
  // Helm release name.
  string release_name = 2;
  // Name of the cert-manager controller ServiceAccount.
  string service_account_name = 3;
}
