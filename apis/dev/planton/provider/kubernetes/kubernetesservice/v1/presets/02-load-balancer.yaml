apiVersion: kubernetes.planton.dev/v1
kind: KubernetesService
metadata:
  name: my-lb-service
spec:
  namespace: "<your-namespace>"
  name: my-lb-service
  type: load_balancer
  selector:
    app: "<your-app-label>"
  ports:
    - name: https
      port: 443
      targetPort: "8443"
      protocol: TCP
    - name: http
      port: 80
      targetPort: "8080"
      protocol: TCP
