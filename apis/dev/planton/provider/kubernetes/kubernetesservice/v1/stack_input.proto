syntax = "proto3";

package dev.planton.provider.kubernetes.kubernetesservice.v1;

import "dev/planton/provider/kubernetes/kubernetesservice/v1/api.proto";
import "dev/planton/provider/kubernetes/provider.proto";

/**
 * **KubernetesServiceStackInput** defines the input structure for deploying a Kubernetes Service.
 * This message contains the target service specification and the Kubernetes cluster configuration
 * required by the IaC modules (Pulumi and Terraform) to create and configure the service.
 */
message KubernetesServiceStackInput {
  /**
   * The target Kubernetes Service resource to be created.
   * Contains the complete specification including metadata, desired configuration,
   * service type, ports, selector, and routing settings.
   */
  KubernetesService target = 1;

  /**
   * Kubernetes cluster configuration.
   * Contains connection details and credentials for the target Kubernetes cluster
   * where the service will be created.
   */
  dev.planton.provider.kubernetes.KubernetesProviderConfig provider_config = 2;
}
