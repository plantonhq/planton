apiVersion: cloudflare.planton.dev/v1
kind: CloudflareHyperdriveConfig
metadata:
  name: app-prod-pg-mtls
spec:
  accountId: <cloudflare-account-id>
  name: app-prod-pg-mtls
  origin:
    database: <database-name>
    scheme: postgres
    user: <database-user>
    host: <database-host>
    port: 5432
    password:
      value: <database-password>
  mtls:
    caCertificateId: <ca-certificate-id>
    mtlsCertificateId: <client-certificate-id>
    sslmode: verify-full
  caching:
    disabled: false
  originConnectionLimit: 25
