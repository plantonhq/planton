syntax = "proto3";

package dev.planton.provider.cloudflare.cloudflareturnstilewidget.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/cloudflare/cloudflareturnstilewidget/v1/spec.proto";
import "dev/planton/provider/cloudflare/cloudflareturnstilewidget/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// cloudflare-turnstile-widget
message CloudflareTurnstileWidget {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'cloudflare.planton.dev/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'CloudflareTurnstileWidget'];

  //metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  CloudflareTurnstileWidgetSpec spec = 4 [(buf.validate.field).required = true];

  //status
  CloudflareTurnstileWidgetStatus status = 5;
}

// cloudflare-turnstile-widget status
message CloudflareTurnstileWidgetStatus {
  //stack-outputs
  //  cloudflare-turnstile-widget stack-outputs
  CloudflareTurnstileWidgetStackOutputs outputs = 1;
}
