syntax = "proto3";

package dev.planton.provider.cloudflare.cloudflarepagesproject.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/cloudflare/cloudflarepagesproject/v1/spec.proto";
import "dev/planton/provider/cloudflare/cloudflarepagesproject/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// cloudflare-pages-project
message CloudflarePagesProject {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'cloudflare.planton.dev/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'CloudflarePagesProject'];

  //metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  CloudflarePagesProjectSpec spec = 4 [(buf.validate.field).required = true];

  //status
  CloudflarePagesProjectStatus status = 5;
}

// cloudflare-pages-project status
message CloudflarePagesProjectStatus {
  //stack-outputs
  //  cloudflare-pages-project stack-outputs
  CloudflarePagesProjectStackOutputs outputs = 1;
}
