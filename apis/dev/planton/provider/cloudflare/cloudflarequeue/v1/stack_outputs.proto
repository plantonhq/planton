syntax = "proto3";

package dev.planton.provider.cloudflare.cloudflarequeue.v1;

// CloudflareQueueStackOutputs captures the outputs after deploying a Cloudflare Queue.
message CloudflareQueueStackOutputs {
  // The Cloudflare-assigned identifier of the queue. A consumer references this value.
  string queue_id = 1;

  // The queue name (echoed; a Worker's producer binding and R2 event notifications
  // reference this value).
  string queue_name = 2;

  // RFC3339 timestamp of when the queue was created.
  string created_on = 3;

  // RFC3339 timestamp of when the queue was last modified.
  string modified_on = 4;
}
