apiVersion: cloudflare.planton.dev/v1
kind: CloudflareQueue
metadata:
  name: test-queue
spec:
  accountId: "0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d"
  queueName: orders-queue
  settings:
    deliveryDelay: 0
    deliveryPaused: false
    messageRetentionPeriod: 86400
  consumer:
    type: worker
    scriptName:
      value: orders-consumer
    settings:
      batchSize: 25
      maxConcurrency: 10
      maxRetries: 3
      maxWaitTimeMs: 1000
      retryDelay: 30
