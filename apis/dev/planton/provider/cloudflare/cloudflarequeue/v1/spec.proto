syntax = "proto3";

package dev.planton.provider.cloudflare.cloudflarequeue.v1;

import "buf/validate/validate.proto";
import "dev/planton/shared/foreignkey/v1/foreign_key.proto";

// CloudflareQueueSpec configures a Cloudflare Queue: a managed, guaranteed-delivery
// message queue for Cloudflare Workers. Producers (a Worker's `queues` binding or an R2
// bucket's event notifications) write messages; a single consumer reads them.
//
// A queue has at most one consumer at the resource level, so the consumer is modeled as
// a nested `consumer` block rather than a separate kind: it has no lifecycle independent
// of the queue and is meaningless without it. The deployment still provisions the
// underlying consumer as its own provider resource, so editing the consumer never
// recreates the queue.
message CloudflareQueueSpec {
  // The Cloudflare account ID that owns this queue.
  string account_id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.len = 32,
    (buf.validate.field).string.pattern = "^[0-9a-fA-F]{32}$"
  ];

  // The queue name (shown in the dashboard; referenced by a Worker's `queues`
  // producer binding and by R2 event notifications).
  string queue_name = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 63,
    (buf.validate.field).string.pattern = "^[a-zA-Z0-9][a-zA-Z0-9-]*$"
  ];

  // Queue-level delivery settings. Omit to accept Cloudflare's defaults.
  CloudflareQueueSettings settings = 3;

  // The queue's single consumer. Omit when nothing consumes the queue yet (producers
  // can still write to it). A push (worker) consumer runs a Worker automatically; a
  // pull (http_pull) consumer is read over HTTP by external clients.
  CloudflareQueueConsumer consumer = 4;
}

// CloudflareQueueSettings holds queue-level delivery configuration.
message CloudflareQueueSettings {
  // Seconds to delay delivery of every message to the consumer. Leave 0 for no delay.
  int64 delivery_delay = 1 [(buf.validate.field).cel = {
    id: "settings_delivery_delay.valid_range"
    message: "delivery_delay must be between 0 and 86400 seconds (24h)"
    expression: "this >= 0 && this <= 86400"
  }];

  // Pause delivery to the consumer. Producers can still enqueue while paused.
  bool delivery_paused = 2;

  // Seconds an unconsumed message is retained before it is dropped. Leave 0 to use
  // Cloudflare's default; otherwise it must be between 60 seconds and 1 day. (The
  // v5 API rejects values above 86400; revisit if Cloudflare raises the ceiling.)
  int64 message_retention_period = 3 [(buf.validate.field).cel = {
    id: "settings_message_retention_period.valid_range"
    message: "message_retention_period must be 0 (default) or between 60 and 86400 seconds (1 day)"
    expression: "this == 0 || (this >= 60 && this <= 86400)"
  }];
}

// CloudflareQueueConsumer configures the queue's single consumer.
message CloudflareQueueConsumer {
  // Consumer delivery type.
  enum ConsumerType {
    consumer_type_unspecified = 0;
    // Push consumer: a Worker is invoked automatically with batches of messages.
    worker = 1;
    // Pull consumer: external HTTP clients pull batches over the REST API.
    http_pull = 2;
  }

  // Whether the queue is consumed by a Worker (push) or pulled over HTTP.
  ConsumerType type = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true,
    (buf.validate.field).cel = {
      id: "consumer_type.not_unspecified"
      message: "consumer type must be one of worker, http_pull"
      expression: "this != 0"
    }
  ];

  // The consuming Worker's script name, or a reference to a CloudflareWorker resource.
  // Required for worker (push) consumers; leave unset for http_pull consumers.
  dev.planton.shared.foreignkey.v1.StringValueOrRef script_name = 2 [
    (dev.planton.shared.foreignkey.v1.default_kind) = CloudflareWorker,
    (dev.planton.shared.foreignkey.v1.default_kind_field_path) = "status.outputs.script_name"
  ];

  // Optional dead-letter queue name, or a reference to another CloudflareQueue.
  // Messages that exhaust their retries are delivered here instead of being dropped.
  dev.planton.shared.foreignkey.v1.StringValueOrRef dead_letter_queue = 3 [
    (dev.planton.shared.foreignkey.v1.default_kind) = CloudflareQueue,
    (dev.planton.shared.foreignkey.v1.default_kind_field_path) = "status.outputs.queue_name"
  ];

  // Consumer batching and retry settings.
  CloudflareQueueConsumerSettings settings = 4;

  // A worker (push) consumer requires the `script_name` field.
  option (buf.validate.message).cel = {
    id: "consumer.script_name_required_for_worker_type"
    message: "script_name is required when consumer type is worker"
    expression: "this.type != 1 || has(this.script_name)"
  };

  // The `script_name` field applies only to worker (push) consumers.
  option (buf.validate.message).cel = {
    id: "consumer.script_name_only_for_worker_type"
    message: "script_name may only be set when consumer type is worker"
    expression: "this.type == 1 || !has(this.script_name)"
  };
}

// CloudflareQueueConsumerSettings holds consumer batching and retry configuration.
// Some fields apply only to one consumer type, as noted.
message CloudflareQueueConsumerSettings {
  // Maximum messages per batch. Leave 0 for the default (10 for worker, 5 for pull);
  // the maximum is 100.
  int64 batch_size = 1 [(buf.validate.field).cel = {
    id: "consumer_settings_batch_size.valid_range"
    message: "batch_size must be 0 (default) or between 1 and 100"
    expression: "this == 0 || (this >= 1 && this <= 100)"
  }];

  // Maximum concurrent consumer invocations (worker consumers only). Leave 0 to let
  // Cloudflare autoscale (recommended); the maximum is 250.
  int64 max_concurrency = 2 [(buf.validate.field).cel = {
    id: "consumer_settings_max_concurrency.valid_range"
    message: "max_concurrency must be 0 (autoscale) or between 1 and 250"
    expression: "this == 0 || (this >= 1 && this <= 250)"
  }];

  // Maximum number of retries for a message before it is dropped or sent to the
  // dead-letter queue. Leave 0 for the default; the maximum is 100.
  int64 max_retries = 3 [(buf.validate.field).cel = {
    id: "consumer_settings_max_retries.valid_range"
    message: "max_retries must be between 0 and 100"
    expression: "this >= 0 && this <= 100"
  }];

  // Milliseconds to wait for a batch to fill before delivering it (worker consumers
  // only). Leave 0 for the default; the maximum is 60000 (60s).
  int64 max_wait_time_ms = 4 [(buf.validate.field).cel = {
    id: "consumer_settings_max_wait_time_ms.valid_range"
    message: "max_wait_time_ms must be between 0 and 60000"
    expression: "this >= 0 && this <= 60000"
  }];

  // Seconds to delay re-delivery of a message after a failed attempt. Leave 0 for no
  // additional delay; the maximum is 42300 seconds.
  int64 retry_delay = 5 [(buf.validate.field).cel = {
    id: "consumer_settings_retry_delay.valid_range"
    message: "retry_delay must be between 0 and 42300 seconds"
    expression: "this >= 0 && this <= 42300"
  }];

  // Milliseconds a pulled message is leased exclusively before it becomes available
  // again (http_pull consumers only). Leave 0 for the default (30s); the maximum is
  // 43200000 (12h).
  int64 visibility_timeout_ms = 6 [(buf.validate.field).cel = {
    id: "consumer_settings_visibility_timeout_ms.valid_range"
    message: "visibility_timeout_ms must be between 0 and 43200000 (12h)"
    expression: "this >= 0 && this <= 43200000"
  }];
}
