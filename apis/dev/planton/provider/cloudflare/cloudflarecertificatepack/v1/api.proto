syntax = "proto3";

package dev.planton.provider.cloudflare.cloudflarecertificatepack.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/cloudflare/cloudflarecertificatepack/v1/spec.proto";
import "dev/planton/provider/cloudflare/cloudflarecertificatepack/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// cloudflare-certificate-pack
message CloudflareCertificatePack {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'cloudflare.planton.dev/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'CloudflareCertificatePack'];

  //metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  CloudflareCertificatePackSpec spec = 4 [(buf.validate.field).required = true];

  //status
  CloudflareCertificatePackStatus status = 5;
}

// cloudflare-certificate-pack status
message CloudflareCertificatePackStatus {
  //stack-outputs
  //  cloudflare-certificate-pack stack-outputs
  CloudflareCertificatePackStackOutputs outputs = 1;
}
