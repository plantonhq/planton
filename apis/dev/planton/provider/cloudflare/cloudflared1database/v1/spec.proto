syntax = "proto3";

package dev.planton.provider.cloudflare.cloudflared1database.v1;

import "buf/validate/validate.proto";

// CloudflareD1DatabaseSpec provisions a Cloudflare D1 database: a serverless
// SQLite database that a Worker queries via a `d1` binding. Placement is fixed at
// creation by an optional region hint or a data-residency jurisdiction; schema
// (tables, indexes) is managed by the application via Wrangler migrations, not at
// this layer.
message CloudflareD1DatabaseSpec {
  // Cross-field validation: region and jurisdiction both fix placement and are
  // mutually exclusive — jurisdiction implies a residency-constrained location.
  option (buf.validate.message).cel = {
    id: "spec.region_xor_jurisdiction"
    message: "set at most one of region or jurisdiction (jurisdiction already constrains placement)"
    expression: "!(this.jurisdiction != '' && this.region != 0)"
  };

  // The Cloudflare account ID in which to create the database.
  string account_id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.len = 32,
    (buf.validate.field).string.pattern = "^[0-9a-fA-F]{32}$"
  ];

  // The unique name for the D1 database, unique within the account.
  string database_name = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.max_len = 64
  ];

  // Region hint for the database's primary instance (maps to
  // primary_location_hint). Fixed at creation. Leave unspecified to let
  // Cloudflare choose, or use jurisdiction for a data-residency constraint.
  CloudflareD1Region region = 3;

  // Configures D1 Read Replication: read-only replicas in multiple regions for
  // lower global read latency. WARNING: enabling replication requires the Worker
  // to use the D1 Sessions API for consistency; omit to disable.
  CloudflareD1ReadReplication read_replication = 4;

  // Data-residency jurisdiction, fixed at creation. One of "eu" (European Union)
  // or "fedramp" (US FedRAMP). Constrains where the database is placed; mutually
  // exclusive with region. Leave empty for no residency constraint.
  string jurisdiction = 5 [(buf.validate.field).cel = {
    id: "jurisdiction.valid"
    message: "jurisdiction must be one of \"eu\", \"fedramp\""
    expression: "this == '' || this in ['eu', 'fedramp']"
  }];
}

// Region hint for a D1 database's primary instance. Value names map to the
// Cloudflare API primary_location_hint values and are used directly via .String().
enum CloudflareD1Region {
  // Unspecified region (Cloudflare selects a default).
  cloudflare_d1_region_unspecified = 0;
  // Western Europe.
  weur = 1;
  // Eastern Europe.
  eeur = 2;
  // Asia-Pacific.
  apac = 3;
  // Oceania.
  oc = 4;
  // Western North America.
  wnam = 5;
  // Eastern North America.
  enam = 6;
}

// Read-replication mode for a D1 database. Value names match the Cloudflare API
// strings exactly and are used directly via .String().
enum CloudflareD1ReadReplicationMode {
  // Unspecified (treated as the API default).
  read_replication_mode_unspecified = 0;
  // Automatic read replication across regions.
  auto = 1;
  // Replication disabled (single primary).
  disabled = 2;
}

// CloudflareD1ReadReplication configures D1 Read Replication.
message CloudflareD1ReadReplication {
  // Replication mode. `auto` enables cross-region read replicas; `disabled`
  // keeps a single primary.
  CloudflareD1ReadReplicationMode mode = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true,
    (buf.validate.field).cel = {
      id: "mode.not_unspecified"
      message: "read_replication.mode must be \"auto\" or \"disabled\""
      expression: "this != 0"
    }
  ];
}
