syntax = "proto3";

package dev.planton.provider.cloudflare.cloudflareruleset.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/cloudflare/cloudflareruleset/v1/spec.proto";
import "dev/planton/provider/cloudflare/cloudflareruleset/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// CloudflareRuleset is a KRM-style resource for managing Cloudflare Rulesets.
//
// Rulesets are ordered collections of rules that execute during specific phases of HTTP
// request processing on the Cloudflare edge. A single component can model Origin Rules,
// WAF Custom Rules, Cache Rules, Redirect Rules, Transform Rules, and more -- the phase
// and action fields determine the behavior.
message CloudflareRuleset {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'cloudflare.planton.dev/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'CloudflareRuleset'];

  // metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  CloudflareRulesetSpec spec = 4 [(buf.validate.field).required = true];

  // status
  CloudflareRulesetStatus status = 5;
}

// CloudflareRulesetStatus represents the observed state of a Cloudflare Ruleset.
message CloudflareRulesetStatus {
  // stack-outputs from the IaC deployment
  CloudflareRulesetStackOutputs outputs = 1;
}
