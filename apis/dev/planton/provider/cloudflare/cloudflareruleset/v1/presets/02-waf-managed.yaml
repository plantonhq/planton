apiVersion: cloudflare.planton.dev/v1
kind: CloudflareRuleset
metadata:
  name: my-managed-waf
spec:
  zone_id:
    value: "<cloudflare-zone-id>"
  ruleset_kind: zone
  phase: http_request_firewall_managed
  name: "Managed WAF protection"
  rules:
    - ref: "execute-cloudflare-managed"
      expression: "true"
      action: execute
      description: "Execute Cloudflare Managed Ruleset"
      enabled: true
      action_parameters:
        id: "efb7b8c949ac4650a09736fc376e9aee"
    - ref: "execute-owasp-core"
      expression: "true"
      action: execute
      description: "Execute OWASP Core Ruleset"
      enabled: true
      action_parameters:
        id: "4814384a9e5d4991b9815dcfc25d2f1f"
        overrides:
          sensitivity_level: "medium"
