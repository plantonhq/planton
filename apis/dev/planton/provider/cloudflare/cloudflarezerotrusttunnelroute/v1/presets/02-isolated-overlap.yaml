apiVersion: cloudflare.planton.dev/v1
kind: CloudflareZeroTrustTunnelRoute
metadata:
  name: tenant-a-subnet
spec:
  accountId: <cloudflare-account-id>
  network: 10.0.0.0/8
  tunnelId:
    valueFrom:
      kind: CloudflareZeroTrustTunnel
      name: <tenant-a-tunnel>
      fieldPath: status.outputs.tunnel_id
  virtualNetworkId:
    valueFrom:
      kind: CloudflareZeroTrustTunnelVirtualNetwork
      name: <tenant-a-vnet>
      fieldPath: status.outputs.virtual_network_id
  comment: Tenant A 10.0.0.0/8 isolated in its own virtual network
