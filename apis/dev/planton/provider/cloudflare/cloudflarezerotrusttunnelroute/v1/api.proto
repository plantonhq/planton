syntax = "proto3";

package dev.planton.provider.cloudflare.cloudflarezerotrusttunnelroute.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/cloudflare/cloudflarezerotrusttunnelroute/v1/spec.proto";
import "dev/planton/provider/cloudflare/cloudflarezerotrusttunnelroute/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// cloudflare-zero-trust-tunnel-route
message CloudflareZeroTrustTunnelRoute {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'cloudflare.planton.dev/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'CloudflareZeroTrustTunnelRoute'];

  //metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  CloudflareZeroTrustTunnelRouteSpec spec = 4 [(buf.validate.field).required = true];

  //status
  CloudflareZeroTrustTunnelRouteStatus status = 5;
}

// cloudflare-zero-trust-tunnel-route status
message CloudflareZeroTrustTunnelRouteStatus {
  //stack-outputs
  //  cloudflare-zero-trust-tunnel-route stack-outputs
  CloudflareZeroTrustTunnelRouteStackOutputs outputs = 1;
}
