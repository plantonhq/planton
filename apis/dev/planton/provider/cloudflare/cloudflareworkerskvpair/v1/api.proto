syntax = "proto3";

package dev.planton.provider.cloudflare.cloudflareworkerskvpair.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/cloudflare/cloudflareworkerskvpair/v1/spec.proto";
import "dev/planton/provider/cloudflare/cloudflareworkerskvpair/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// cloudflare-workers-kv-pair
message CloudflareWorkersKvPair {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'cloudflare.planton.dev/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'CloudflareWorkersKvPair'];

  //metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  CloudflareWorkersKvPairSpec spec = 4 [(buf.validate.field).required = true];

  //status
  CloudflareWorkersKvPairStatus status = 5;
}

// cloudflare-workers-kv-pair status
message CloudflareWorkersKvPairStatus {
  //stack-outputs
  //  cloudflare-workers-kv-pair stack-outputs
  CloudflareWorkersKvPairStackOutputs outputs = 1;
}
