syntax = "proto3";

package dev.planton.provider.cloudflare.cloudflareemailroutingaddress.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/cloudflare/cloudflareemailroutingaddress/v1/spec.proto";
import "dev/planton/provider/cloudflare/cloudflareemailroutingaddress/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// cloudflare-email-routing-address
message CloudflareEmailRoutingAddress {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'cloudflare.planton.dev/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'CloudflareEmailRoutingAddress'];

  //metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  CloudflareEmailRoutingAddressSpec spec = 4 [(buf.validate.field).required = true];

  //status
  CloudflareEmailRoutingAddressStatus status = 5;
}

// cloudflare-email-routing-address status
message CloudflareEmailRoutingAddressStatus {
  //stack-outputs
  //  cloudflare-email-routing-address stack-outputs
  CloudflareEmailRoutingAddressStackOutputs outputs = 1;
}
