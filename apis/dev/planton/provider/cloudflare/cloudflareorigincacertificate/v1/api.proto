syntax = "proto3";

package dev.planton.provider.cloudflare.cloudflareorigincacertificate.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/cloudflare/cloudflareorigincacertificate/v1/spec.proto";
import "dev/planton/provider/cloudflare/cloudflareorigincacertificate/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// cloudflare-origin-ca-certificate
message CloudflareOriginCaCertificate {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'cloudflare.planton.dev/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'CloudflareOriginCaCertificate'];

  //metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  CloudflareOriginCaCertificateSpec spec = 4 [(buf.validate.field).required = true];

  //status
  CloudflareOriginCaCertificateStatus status = 5;
}

// cloudflare-origin-ca-certificate status
message CloudflareOriginCaCertificateStatus {
  //stack-outputs
  //  cloudflare-origin-ca-certificate stack-outputs
  CloudflareOriginCaCertificateStackOutputs outputs = 1;
}
