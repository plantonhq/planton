syntax = "proto3";

package dev.planton.provider.cloudflare.cloudflareemailroutingzone.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/cloudflare/cloudflareemailroutingzone/v1/spec.proto";
import "dev/planton/provider/cloudflare/cloudflareemailroutingzone/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// cloudflare-email-routing-zone
message CloudflareEmailRoutingZone {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'cloudflare.planton.dev/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'CloudflareEmailRoutingZone'];

  //metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  CloudflareEmailRoutingZoneSpec spec = 4 [(buf.validate.field).required = true];

  //status
  CloudflareEmailRoutingZoneStatus status = 5;
}

// cloudflare-email-routing-zone status
message CloudflareEmailRoutingZoneStatus {
  //stack-outputs
  //  cloudflare-email-routing-zone stack-outputs
  CloudflareEmailRoutingZoneStackOutputs outputs = 1;
}
