syntax = "proto3";

package dev.planton.provider.cloudflare.cloudflarelistitem.v1;

// CloudflareListItemStackOutputs captures the outputs after writing a list entry.
message CloudflareListItemStackOutputs {
  // The Cloudflare-assigned identifier of the list item.
  string item_id = 1;

  // The list ID the entry was written to.
  string list_id = 2;
}
