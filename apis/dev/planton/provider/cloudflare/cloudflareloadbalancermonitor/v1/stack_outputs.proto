syntax = "proto3";

package dev.planton.provider.cloudflare.cloudflareloadbalancermonitor.v1;

// CloudflareLoadBalancerMonitorStackOutputs captures the outputs after deploying
// a Cloudflare Load Balancer monitor.
message CloudflareLoadBalancerMonitorStackOutputs {
  // The Cloudflare-assigned identifier of the monitor. A
  // CloudflareLoadBalancerPool references this value via its `monitor` field.
  string monitor_id = 1;

  // The health-check protocol of the monitor (echoed for convenience).
  string monitor_type = 2;
}
