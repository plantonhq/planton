apiVersion: cloudflare.planton.dev/v1
kind: CloudflareR2Bucket
metadata:
  name: my-public-cdn-bucket
spec:
  bucketName: <bucket-name>
  accountId: <cloudflare-account-id>
  location: auto
  publicAccess: true
  customDomains:
    - enabled: true
      zoneId:
        value: <cloudflare-zone-id>
      domain: <cdn-subdomain>.<your-domain.com>
      minTls: "1.2"
  cors:
    rules:
      - allowed:
          methods: [GET, HEAD]
          origins:
            - "*"
        maxAgeSeconds: 3600
