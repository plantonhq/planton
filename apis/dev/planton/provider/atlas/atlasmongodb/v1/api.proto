syntax = "proto3";

package dev.planton.provider.atlas.atlasmongodb.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/atlas/atlasmongodb/v1/spec.proto";
import "dev/planton/provider/atlas/atlasmongodb/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

//atlas-mongodb
message AtlasMongodb {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'atlas.planton.dev/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AtlasMongodb'];

  //metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  AtlasMongodbSpec spec = 4 [(buf.validate.field).required = true];

  //status
  AtlasMongodbStatus status = 5;
}

//atlas-mongodb status
message AtlasMongodbStatus {
  //stack-outputs
  AtlasMongodbStackOutputs outputs = 1;
}
