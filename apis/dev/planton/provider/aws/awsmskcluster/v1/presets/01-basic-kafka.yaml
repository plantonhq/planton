apiVersion: aws.planton.dev/v1
kind: AwsMskCluster
metadata:
  name: basic-kafka
spec:
  region: <aws-region>
  kafkaVersion: "3.6.0"
  numberOfBrokerNodes: 3
  instanceType: kafka.t3.small
  subnetIds:
    - value: "<private-subnet-id-az1>"
    - value: "<private-subnet-id-az2>"
    - value: "<private-subnet-id-az3>"
  authentication:
    saslIamEnabled: true
