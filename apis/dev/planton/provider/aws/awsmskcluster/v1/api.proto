syntax = "proto3";

package dev.planton.provider.aws.awsmskcluster.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/aws/awsmskcluster/v1/spec.proto";
import "dev/planton/provider/aws/awsmskcluster/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// aws-msk-cluster
message AwsMskCluster {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'aws.planton.dev/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AwsMskCluster'];

  //metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  AwsMskClusterSpec spec = 4 [(buf.validate.field).required = true];

  //status
  AwsMskClusterStatus status = 5;
}

// aws-msk-cluster status
message AwsMskClusterStatus {
  //stack-outputs
  AwsMskClusterStackOutputs outputs = 1;
}
