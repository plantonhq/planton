apiVersion: qa.planton.dev/v1
kind: ComponentE2EProfile
metadata:
  name: awsiaminstanceprofile
spec:
  # An instance profile under live E2E: the harness first deploys the
  # AwsIamRole prerequisite (declared in the kind registry), resolves the
  # profile's role reference against its outputs, then runs deploy ->
  # GetInstanceProfile verify -> destroy -> verify-destroyed on both
  # provisioners. This is the composed identity chain (role -> profile)
  # exercised live. IAM is global and free.
  tier: 1
  status: green
  validated_provisioners:
    - pulumi
    - terraform
  timeout_minutes: 15
