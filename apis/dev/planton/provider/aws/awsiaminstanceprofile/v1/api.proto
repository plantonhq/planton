syntax = "proto3";

package dev.planton.provider.aws.awsiaminstanceprofile.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/aws/awsiaminstanceprofile/v1/spec.proto";
import "dev/planton/provider/aws/awsiaminstanceprofile/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

//aws-iam-instance-profile
message AwsIamInstanceProfile {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'aws.planton.dev/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AwsIamInstanceProfile'];

  //metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  AwsIamInstanceProfileSpec spec = 4 [(buf.validate.field).required = true];

  //status
  AwsIamInstanceProfileStatus status = 5;
}

//aws-iam-instance-profile status
message AwsIamInstanceProfileStatus {
  //stack-outputs
  AwsIamInstanceProfileStackOutputs outputs = 1;
}
