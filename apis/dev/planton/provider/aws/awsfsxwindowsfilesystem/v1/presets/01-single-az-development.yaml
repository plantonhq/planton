apiVersion: aws.planton.dev/v1
kind: AwsFsxWindowsFileSystem
metadata:
  org: example-org
  env: dev
  name: dev-windows-fs
  id: awsfxw-dev-windows-fs-dev
spec:
  region: <aws-region>
  deployment_type: SINGLE_AZ_2
  storage_capacity_gib: 32
  storage_type: SSD
  throughput_capacity: 32
  subnet_ids:
    - value: subnet-0123456789abcdef0
  security_group_ids:
    - value: sg-0123456789abcdef0
  active_directory_id:
    value: d-0123456789
  automatic_backup_retention_days: 0
