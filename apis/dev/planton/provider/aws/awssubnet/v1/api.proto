syntax = "proto3";

package dev.planton.provider.aws.awssubnet.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/aws/awssubnet/v1/spec.proto";
import "dev/planton/provider/aws/awssubnet/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// AwsSubnet is the top-level resource representing a single subnet within an AWS
// Virtual Private Cloud (VPC).
message AwsSubnet {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'aws.planton.dev/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AwsSubnet'];

  // metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AwsSubnetSpec spec = 4 [(buf.validate.field).required = true];

  // status
  AwsSubnetStatus status = 5;
}

// AwsSubnetStatus holds the outputs produced by deploying an AwsSubnet.
message AwsSubnetStatus {
  // stack-outputs
  AwsSubnetStackOutputs outputs = 1;
}
