apiVersion: qa.planton.dev/v1
kind: ComponentE2EProfile
metadata:
  name: awssubnet
spec:
  # First composed AWS topology under live E2E: the harness deploys an AwsVpc
  # prerequisite, resolves the subnet's vpc_id from its outputs, then runs
  # deploy -> DescribeSubnets verify -> destroy -> verify-destroyed on both
  # provisioners against the AWS test account via keyless SSO/OIDC credentials.
  tier: 1
  status: green
  validated_provisioners:
    - pulumi
    - terraform
  timeout_minutes: 10
