# Minimal AwsSubnet scenario. vpcId is a value_from reference to the AwsVpc
# prerequisite (declared via prerequisites: [AwsVpc] in the kind registry); the
# E2E harness deploys that VPC first and resolves this reference to the created
# vpc-id before the subnet is applied. The CIDR (10.0.100.0/24) is chosen to not
# overlap the subnets the prerequisite VPC creates (10.0.0.0/24, 10.0.1.0/24).
# Full metadata is supplied for tagging/orphan cleanup.
apiVersion: aws.planton.dev/v1
kind: AwsSubnet
metadata:
  name: planton-oss-e2e-awssubnet-smoke
  id: planton-oss-e2e-awssubnet-smoke
  org: planton-oss
  env: e2e
  labels:
    managed-by: planton-e2e
    e2e-component: awssubnet
  annotations:
    planton.dev/e2e: "true"
  tags:
    - planton-e2e
spec:
  region: us-west-2
  vpcId:
    valueFrom:
      kind: AwsVpc
      name: planton-oss-e2e-awsvpc-prereq
      fieldPath: status.outputs.vpc_id
  availabilityZone: us-west-2a
  cidrBlock: 10.0.100.0/24
