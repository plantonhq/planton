apiVersion: aws.planton.dev/v1
kind: AwsSubnet
metadata:
  name: app-private-usw2a
spec:
  region: us-west-2
  vpcId:
    value: <vpc-id>
  availabilityZone: us-west-2a
  cidrBlock: 10.0.1.0/24
  routes:
    - destinationCidrBlock: 0.0.0.0/0
      targetType: nat_gateway
      targetId:
        value: <nat-gateway-id>
