syntax = "proto3";

package dev.planton.provider.aws.awssubnet.v1;

import "dev/planton/provider/aws/awssubnet/v1/api.proto";
import "dev/planton/provider/aws/provider.proto";

// AwsSubnetStackInput is the input to the IaC modules (Pulumi / Terraform) that
// deploy an AwsSubnet resource.
message AwsSubnetStackInput {
  // target cloud-resource
  AwsSubnet target = 1;
  // provider-config
  dev.planton.provider.aws.AwsProviderConfig provider_config = 2;
}
