apiVersion: aws.planton.dev/v1
kind: AwsCodeBuildProject
metadata:
  name: my-docker-build
spec:
  source:
    type: GITHUB
    location: "<github-repo-https-url>"
    gitCloneDepth: 1
    reportBuildStatus: true
  environment:
    type: LINUX_CONTAINER
    computeType: BUILD_GENERAL1_LARGE
    image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
    privilegedMode: true
    environmentVariables:
      - name: ECR_REPO
        value: "<ecr-repository-uri>"
      - name: DOCKER_BUILDKIT
        value: "1"
  artifacts:
    type: NO_ARTIFACTS
  serviceRole:
    value: "<codebuild-service-role-arn>"
  buildTimeout: 30
  cache:
    type: LOCAL
    modes:
      - LOCAL_DOCKER_LAYER_CACHE
      - LOCAL_SOURCE_CACHE
  logsConfig:
    cloudwatchLogs:
      status: ENABLED
  webhook:
    filterGroups:
      - filters:
          - type: EVENT
            pattern: PUSH
          - type: HEAD_REF
            pattern: ^refs/heads/(main|release/.*)$
