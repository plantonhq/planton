syntax = "proto3";

package dev.planton.provider.aws.awscodebuildproject.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/aws/awscodebuildproject/v1/spec.proto";
import "dev/planton/provider/aws/awscodebuildproject/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// AwsCodeBuildProject is a deployment component for creating and managing
// AWS CodeBuild projects with an optional webhook for source-triggered builds.
// CodeBuild compiles source code, runs tests, and produces deployable artifacts
// in fully managed build containers.
message AwsCodeBuildProject {
  // api_version specifies the API version for this resource.
  string api_version = 1 [(buf.validate.field).string.const = 'aws.planton.dev/v1'];

  // kind identifies this resource type.
  string kind = 2 [(buf.validate.field).string.const = 'AwsCodeBuildProject'];

  // metadata contains standard resource metadata including name, labels, and annotations.
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec defines the desired state of the CodeBuild project.
  AwsCodeBuildProjectSpec spec = 4 [(buf.validate.field).required = true];

  // status contains the observed state and outputs from the deployment.
  AwsCodeBuildProjectStatus status = 5;
}

// AwsCodeBuildProjectStatus contains the status and outputs for the
// CodeBuild project.
message AwsCodeBuildProjectStatus {
  // outputs contains the values exported from the IaC stack after deployment.
  AwsCodeBuildProjectStackOutputs outputs = 1;
}
