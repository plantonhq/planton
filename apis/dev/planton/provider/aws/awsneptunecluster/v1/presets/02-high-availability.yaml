apiVersion: aws.planton.dev/v1
kind: AwsNeptuneCluster
metadata:
  name: my-neptune-ha
spec:
  region: <aws-region>
  subnetIds:
    - value: "<private-subnet-id-az1>"
    - value: "<private-subnet-id-az2>"
  securityGroupIds:
    - value: "<security-group-id>"
  vpcId:
    value: "<vpc-id>"
  engineVersion: "1.3.0.0"
  port: 8182
  instanceCount: 2  # Primary + 1 read replica for HA
  instanceClass: db.r6g.large
  storageEncrypted: true
  iamDatabaseAuthenticationEnabled: true  # IAM auth for secure access
  backupRetentionPeriod: 14
  preferredBackupWindow: "03:00-04:00"
  preferredMaintenanceWindow: "sun:05:00-sun:06:00"
  deletionProtection: true
  skipFinalSnapshot: false
  finalSnapshotIdentifier: "<final-snapshot-name>"
  enabledCloudwatchLogsExports:
    - audit
    - slowquery
  copyTagsToSnapshot: true
