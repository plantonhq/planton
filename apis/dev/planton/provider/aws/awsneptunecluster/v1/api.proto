syntax = "proto3";

package dev.planton.provider.aws.awsneptunecluster.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/aws/awsneptunecluster/v1/spec.proto";
import "dev/planton/provider/aws/awsneptunecluster/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// AwsNeptuneCluster is a deployment component for creating and managing
// Amazon Neptune graph database clusters. Neptune supports property-graph
// queries via Apache TinkerPop Gremlin and RDF queries via SPARQL.
message AwsNeptuneCluster {
  // api_version specifies the API version for this resource.
  string api_version = 1 [(buf.validate.field).string.const = 'aws.planton.dev/v1'];

  // kind identifies this resource type.
  string kind = 2 [(buf.validate.field).string.const = 'AwsNeptuneCluster'];

  // metadata contains standard resource metadata including name, labels, and annotations.
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec defines the desired state of the Neptune cluster.
  AwsNeptuneClusterSpec spec = 4 [(buf.validate.field).required = true];

  // status contains the observed state and outputs from the deployment.
  AwsNeptuneClusterStatus status = 5;
}

// AwsNeptuneClusterStatus contains the status and outputs for the Neptune cluster.
message AwsNeptuneClusterStatus {
  // outputs contains the values exported from the IaC stack after deployment.
  AwsNeptuneClusterStackOutputs outputs = 1;
}
