syntax = "proto3";

package dev.planton.provider.aws.awsdynamodb.v1;

import "dev/planton/provider/aws/awsdynamodb/v1/api.proto";
import "dev/planton/provider/aws/provider.proto";

// AwsDynamodbStackInput is the input envelope passed to IaC modules for provisioning.
message AwsDynamodbStackInput {
  // target
  AwsDynamodb target = 1;
  // provider-credential
  dev.planton.provider.aws.AwsProviderConfig provider_config = 2;
}
