syntax = "proto3";

package dev.planton.provider.aws.awscodepipeline.v1;

// AwsCodePipelineStackOutputs captures observable identifiers from the
// AWS CodePipeline deployment.
message AwsCodePipelineStackOutputs {
  // The Amazon Resource Name (ARN) of the pipeline.
  // Use this for IAM policies, EventBridge targets, and cross-resource references.
  string pipeline_arn = 1;

  // The name of the pipeline. Use this when referencing the pipeline in
  // action configurations of other pipelines or in CLI commands.
  string pipeline_name = 2;
}
