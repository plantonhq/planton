syntax = "proto3";

package dev.planton.provider.aws.awsmemcachedelasticache.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/aws/awsmemcachedelasticache/v1/spec.proto";
import "dev/planton/provider/aws/awsmemcachedelasticache/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// aws-memcached-elasticache
message AwsMemcachedElasticache {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'aws.planton.dev/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AwsMemcachedElasticache'];

  //metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  AwsMemcachedElasticacheSpec spec = 4 [(buf.validate.field).required = true];

  //status
  AwsMemcachedElasticacheStatus status = 5;
}

// aws-memcached-elasticache status
message AwsMemcachedElasticacheStatus {
  //stack-outputs
  AwsMemcachedElasticacheStackOutputs outputs = 1;
}
