apiVersion: aws.planton.dev/v1
kind: AwsEksCluster
metadata:
  name: my-private-eks-cluster
spec:
  region: <aws-region>
  subnetIds:
    - value: "<private-subnet-id-az1>"
    - value: "<private-subnet-id-az2>"
  clusterRoleArn:
    value: "<eks-cluster-role-arn>"
  version: "1.30"
  disablePublicEndpoint: true  # API server only accessible within VPC
  enableControlPlaneLogs: true
