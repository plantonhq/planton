apiVersion: aws.planton.dev/v1
kind: AwsEventBridgeRule
metadata:
  name: my-event-rule
spec:
  region: <aws-region>
  description: Route matching events to an SQS queue with dead letter queue
  eventPattern:
    source:
      - aws.ec2
    detail-type:
      - "EC2 Instance State-change Notification"
    detail:
      state:
        - running
        - stopped
  targets:
    - name: event-queue
      arn:
        value: <sqs-queue-arn>
      deadLetterConfig:
        arn:
          value: <dlq-queue-arn>
