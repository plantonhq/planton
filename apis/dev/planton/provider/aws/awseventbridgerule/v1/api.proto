syntax = "proto3";

package dev.planton.provider.aws.awseventbridgerule.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/aws/awseventbridgerule/v1/spec.proto";
import "dev/planton/provider/aws/awseventbridgerule/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// AwsEventBridgeRule is the Kubernetes-style resource envelope for an AWS
// EventBridge rule with bundled targets.
message AwsEventBridgeRule {
  // api-version must be set to "aws.planton.dev/v1".
  string api_version = 1 [(buf.validate.field).string.const = "aws.planton.dev/v1"];

  // resource-kind for this EventBridge rule resource, must be "AwsEventBridgeRule".
  string kind = 2 [(buf.validate.field).string.const = "AwsEventBridgeRule"];

  // metadata captures identifying information (name, org, env, id, labels, relationships).
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec holds the desired configuration for the EventBridge rule and its targets.
  AwsEventBridgeRuleSpec spec = 4 [(buf.validate.field).required = true];

  // status holds runtime or post-deployment information.
  AwsEventBridgeRuleStatus status = 5;
}

// AwsEventBridgeRuleStatus captures lifecycle, audit, job linkage, and
// observable outputs.
message AwsEventBridgeRuleStatus {
  // stack-outputs
  AwsEventBridgeRuleStackOutputs outputs = 1;
}
