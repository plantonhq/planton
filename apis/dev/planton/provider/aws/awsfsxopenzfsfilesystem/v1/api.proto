syntax = "proto3";

package dev.planton.provider.aws.awsfsxopenzfsfilesystem.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/aws/awsfsxopenzfsfilesystem/v1/spec.proto";
import "dev/planton/provider/aws/awsfsxopenzfsfilesystem/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// aws-fsx-openzfs-file-system
message AwsFsxOpenzfsFileSystem {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'aws.planton.dev/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AwsFsxOpenzfsFileSystem'];

  //metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  AwsFsxOpenzfsFileSystemSpec spec = 4 [(buf.validate.field).required = true];

  //status
  AwsFsxOpenzfsFileSystemStatus status = 5;
}

// aws-fsx-openzfs-file-system status
message AwsFsxOpenzfsFileSystemStatus {
  //stack-outputs
  AwsFsxOpenzfsFileSystemStackOutputs outputs = 1;
}
