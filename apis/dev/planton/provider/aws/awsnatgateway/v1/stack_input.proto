syntax = "proto3";

package dev.planton.provider.aws.awsnatgateway.v1;

import "dev/planton/provider/aws/awsnatgateway/v1/api.proto";
import "dev/planton/provider/aws/provider.proto";

// AwsNatGatewayStackInput is the input to the IaC modules (Pulumi / Terraform)
// that deploy an AwsNatGateway resource.
message AwsNatGatewayStackInput {
  // target cloud-resource
  AwsNatGateway target = 1;
  // provider-config
  dev.planton.provider.aws.AwsProviderConfig provider_config = 2;
}
