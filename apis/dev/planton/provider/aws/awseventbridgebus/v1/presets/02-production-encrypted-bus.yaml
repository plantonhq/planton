apiVersion: aws.planton.dev/v1
kind: AwsEventBridgeBus
metadata:
  name: my-events
spec:
  region: <aws-region>
  description: Production event bus with encryption, DLQ, and logging
  kmsKeyIdentifier:
    value: <kms-key-arn>
  deadLetterConfig:
    arn:
      value: <dlq-queue-arn>
  logConfig:
    level: ERROR
    includeDetail: NONE
