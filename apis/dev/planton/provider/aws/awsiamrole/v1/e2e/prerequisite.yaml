# AwsIamRole install profile used as a prerequisite by composed components
# (AwsIamInstanceProfile, declared via prerequisites: [AwsIamRole] in the kind
# registry). The E2E harness deploys this role first (via its Pulumi module),
# captures its outputs, and resolves the dependent's role reference against
# them. Full metadata is supplied and the managed-by label tags resources for
# orphan cleanup.
apiVersion: aws.planton.dev/v1
kind: AwsIamRole
metadata:
  name: planton-oss-e2e-awsiamrole-prereq
  id: planton-oss-e2e-awsiamrole-prereq
  org: planton-oss
  env: e2e
  labels:
    managed-by: planton-e2e
    e2e-component: awsiamrole
  annotations:
    planton.dev/e2e: "true"
  tags:
    - planton-e2e
spec:
  region: us-west-2
  description: Planton E2E prerequisite role for instance-profile composition
  trustPolicy:
    Version: "2012-10-17"
    Statement:
      - Effect: Allow
        Principal:
          Service: ec2.amazonaws.com
        Action: sts:AssumeRole
