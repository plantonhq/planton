apiVersion: aws.planton.dev/v1
kind: AwsIamRole
metadata:
  name: my-ecs-task-execution-role
spec:
  region: <aws-region>
  description: ECS task execution role for pulling images and writing logs
  path: /  # recommended_default from spec
  trustPolicy:
    Version: "2012-10-17"
    Statement:
      - Effect: Allow
        Principal:
          Service: ecs-tasks.amazonaws.com
        Action: sts:AssumeRole
  managedPolicyArns:
    # AWS-managed policies attach by literal ARN; reference an AwsIamPolicy's
    # policy_arn output via valueFrom for policies defined in Planton.
    - value: arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
