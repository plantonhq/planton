apiVersion: aws.planton.dev/v1
kind: AwsIamRole
metadata:
  name: my-ec2-ssm-role
spec:
  region: <aws-region>
  description: EC2 instance role with SSM Session Manager and CloudWatch Agent access
  path: /  # recommended_default from spec
  trustPolicy:
    Version: "2012-10-17"
    Statement:
      - Effect: Allow
        Principal:
          Service: ec2.amazonaws.com
        Action: sts:AssumeRole
  managedPolicyArns:
    # AWS-managed policies attach by literal ARN; reference an AwsIamPolicy's
    # policy_arn output via valueFrom for policies defined in Planton.
    - value: arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
    - value: arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
