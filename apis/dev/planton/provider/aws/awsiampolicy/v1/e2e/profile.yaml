apiVersion: qa.planton.dev/v1
kind: ComponentE2EProfile
metadata:
  name: awsiampolicy
spec:
  # A customer-managed policy under live E2E: the harness runs deploy ->
  # GetPolicy verify -> destroy -> verify-destroyed on both provisioners against
  # the AWS test account via keyless SSO/OIDC credentials. IAM is global and
  # free; the policy has no prerequisites -- it is the leaf of the identity graph.
  tier: 1
  status: green
  validated_provisioners:
    - pulumi
    - terraform
  timeout_minutes: 10
