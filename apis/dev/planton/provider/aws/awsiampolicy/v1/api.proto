syntax = "proto3";

package dev.planton.provider.aws.awsiampolicy.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/aws/awsiampolicy/v1/spec.proto";
import "dev/planton/provider/aws/awsiampolicy/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

//aws-iam-policy
message AwsIamPolicy {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'aws.planton.dev/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AwsIamPolicy'];

  //metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  AwsIamPolicySpec spec = 4 [(buf.validate.field).required = true];

  //status
  AwsIamPolicyStatus status = 5;
}

//aws-iam-policy status
message AwsIamPolicyStatus {
  //stack-outputs
  AwsIamPolicyStackOutputs outputs = 1;
}
