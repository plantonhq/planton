syntax = "proto3";

package dev.planton.provider.aws.awselasticip.v1;

import "dev/planton/provider/aws/awselasticip/v1/api.proto";
import "dev/planton/provider/aws/provider.proto";

// AwsElasticIpStackInput provides the inputs required by Pulumi/Terraform modules
// to provision an Elastic IP.
message AwsElasticIpStackInput {
  // target cloud-resource
  AwsElasticIp target = 1;
  // provider-config
  dev.planton.provider.aws.AwsProviderConfig provider_config = 2;
}
