syntax = "proto3";

package dev.planton.provider.aws.awselasticip.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/aws/awselasticip/v1/spec.proto";
import "dev/planton/provider/aws/awselasticip/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// AwsElasticIp represents a static public IPv4 address allocated from Amazon's
// pool or a Bring-Your-Own-IP (BYOIP) pool. Elastic IPs persist until explicitly
// released, providing stable public endpoints for Network Load Balancers, NAT
// Gateways, and EC2 instances.
message AwsElasticIp {
  // api-version must be set to "aws.planton.dev/v1".
  string api_version = 1 [(buf.validate.field).string.const = "aws.planton.dev/v1"];

  // resource-kind for this Elastic IP resource, must be "AwsElasticIp".
  string kind = 2 [(buf.validate.field).string.const = "AwsElasticIp"];

  // metadata captures identifying information (name, org, version, etc.)
  // and must pass standard validations for resource naming.
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec holds the desired configuration for the Elastic IP allocation.
  AwsElasticIpSpec spec = 4 [(buf.validate.field).required = true];

  // status holds runtime or post-deployment information.
  AwsElasticIpStatus status = 5;
}

// AwsElasticIpStatus describes the status fields for an Elastic IP resource.
message AwsElasticIpStatus {
  // stack_outputs captures the outputs returned by Pulumi/Terraform after provisioning.
  AwsElasticIpStackOutputs outputs = 1;
}
