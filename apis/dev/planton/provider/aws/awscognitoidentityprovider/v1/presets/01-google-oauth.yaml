apiVersion: aws.planton.dev/v1
kind: AwsCognitoIdentityProvider
metadata:
  name: google-idp
spec:
  userPoolId: "${USER_POOL_ID}"
  providerName: Google
  providerType: Google
  google:
    clientId: "${GOOGLE_CLIENT_ID}"
    clientSecret: "${GOOGLE_CLIENT_SECRET}"
    authorizeScopes: "email profile openid"
  attributeMapping:
    email: email
    username: sub
