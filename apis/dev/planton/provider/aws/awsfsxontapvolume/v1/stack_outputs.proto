syntax = "proto3";

package dev.planton.provider.aws.awsfsxontapvolume.v1;

// AwsFsxOntapVolumeStackOutputs captures observable identifiers from a
// provisioned FSx for ONTAP Volume. These outputs are used by downstream
// resources and monitoring tools.
//
// ONTAP Volumes are typically leaf resources — they serve data to clients
// directly. The primary consumers of these outputs are:
// - IAM policies: needs `arn` for resource-level permissions
// - SnapMirror: needs `uuid` for replication relationships
// - Monitoring: needs `volume_id` for CloudWatch metrics
// - FlexCache: needs `flexcache_endpoint_type` to identify origin volumes
message AwsFsxOntapVolumeStackOutputs {
  // The ID of the volume (e.g., "fsvol-0123456789abcdef0"). Primary identifier
  // used in AWS APIs and CloudWatch metrics for this volume.
  string volume_id = 1;

  // The Amazon Resource Name of the volume. Used in IAM policies for
  // resource-level permissions (e.g., restricting backup or snapshot operations
  // to specific volumes).
  string arn = 2;

  // The universally unique identifier of the volume in ONTAP. Used for
  // SnapMirror replication relationships, ONTAP REST API operations, and
  // cross-cluster volume identification.
  string uuid = 3;

  // The file system ID that this volume belongs to (e.g., "fs-0123456789abcdef0").
  // Computed from the SVM's parent file system — useful for constructing
  // CloudWatch metric dimensions or cross-referencing with the file system
  // component.
  string file_system_id = 4;

  // The FlexCache endpoint type for this volume.
  //
  // - "NONE": Not participating in any FlexCache relationship.
  // - "ORIGIN": This volume is the origin (source of truth) for one or more
  //   FlexCache volumes.
  // - "CACHE": This volume is a FlexCache (read cache) of a remote origin.
  string flexcache_endpoint_type = 5;

  // The ONTAP volume type confirmation. Either "RW" (read-write) or "DP"
  // (data protection / SnapMirror destination).
  string ontap_volume_type = 6;
}
