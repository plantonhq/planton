syntax = "proto3";

package dev.planton.provider.aws.awsgluecatalogdatabase.v1;

import "dev/planton/provider/aws/awsgluecatalogdatabase/v1/api.proto";
import "dev/planton/provider/aws/provider.proto";

// AwsGlueCatalogDatabaseStackInput is the input envelope passed to IaC modules for provisioning.
message AwsGlueCatalogDatabaseStackInput {
  // target is the fully-specified AwsGlueCatalogDatabase resource to provision.
  AwsGlueCatalogDatabase target = 1;

  // provider_config supplies AWS credentials and region for the deployment.
  // When nil the module falls back to ambient credentials (environment variables
  // or instance profile).
  dev.planton.provider.aws.AwsProviderConfig provider_config = 2;
}
