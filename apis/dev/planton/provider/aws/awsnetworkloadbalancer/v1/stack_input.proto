syntax = "proto3";

package dev.planton.provider.aws.awsnetworkloadbalancer.v1;

import "dev/planton/provider/aws/awsnetworkloadbalancer/v1/api.proto";
import "dev/planton/provider/aws/provider.proto";

// AwsNetworkLoadBalancerStackInput provides the inputs to the IaC modules
// (Pulumi or Terraform) that provision the Network Load Balancer.
message AwsNetworkLoadBalancerStackInput {
  // target cloud-resource
  AwsNetworkLoadBalancer target = 1;
  // provider-config
  dev.planton.provider.aws.AwsProviderConfig provider_config = 2;
}
