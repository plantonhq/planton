apiVersion: aws.planton.dev/v1
kind: AwsStepFunction
metadata:
  name: <workflow-name>
  org: <organization>
  env: prod
  id: <resource-id>
spec:
  region: <aws-region>
  type: STANDARD
  description: <workflow-description>
  roleArn:
    valueFrom:
      kind: AwsIamRole
      name: <iam-role-resource-name>
      fieldPath: status.outputs.role_arn
  definition:
    StartAt: Step1
    States:
      Step1:
        Type: Task
        Resource: <lambda-function-arn>
        Next: Step2
        Retry:
          - ErrorEquals: ["States.TaskFailed"]
            IntervalSeconds: 3
            MaxAttempts: 3
            BackoffRate: 2
        Catch:
          - ErrorEquals: ["States.ALL"]
            Next: HandleError
      Step2:
        Type: Task
        Resource: <lambda-function-arn-2>
        End: true
        Retry:
          - ErrorEquals: ["States.TaskFailed"]
            IntervalSeconds: 5
            MaxAttempts: 2
            BackoffRate: 2
      HandleError:
        Type: Task
        Resource: <error-handler-lambda-arn>
        End: true
  tracingEnabled: true
  logging:
    level: ALL
    includeExecutionData: true
    logDestination:
      valueFrom:
        kind: AwsCloudwatchLogGroup
        name: <log-group-resource-name>
        fieldPath: status.outputs.log_group_arn
  encryption:
    kmsKeyId:
      valueFrom:
        kind: AwsKmsKey
        name: <kms-key-resource-name>
        fieldPath: status.outputs.key_arn
    kmsDataKeyReusePeriodSeconds: 600
