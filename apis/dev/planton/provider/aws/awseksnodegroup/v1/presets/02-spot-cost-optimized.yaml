apiVersion: aws.planton.dev/v1
kind: AwsEksNodeGroup
metadata:
  name: my-spot-node-group
spec:
  region: <aws-region>
  clusterName:
    value: "<eks-cluster-name>"
  nodeRoleArn:
    value: "<node-role-arn>"
  subnetIds:
    - value: "<private-subnet-id-az1>"
    - value: "<private-subnet-id-az2>"
  instanceType: t3.large
  scaling:
    minSize: 2
    maxSize: 10
    desiredSize: 3
  capacityType: spot
  diskSizeGb: 100  # recommended_default from spec
  labels:
    node-lifecycle: spot
