syntax = "proto3";

package dev.planton.provider.aws.awsmemorydbcluster.v1;

import "dev/planton/provider/aws/awsmemorydbcluster/v1/api.proto";
import "dev/planton/provider/aws/provider.proto";

// AwsMemorydbClusterStackInput is the input for the IaC modules that deploy the MemoryDB cluster.
message AwsMemorydbClusterStackInput {
  // target is the AwsMemorydbCluster resource to deploy.
  AwsMemorydbCluster target = 1;
  // provider_config contains the AWS provider credentials and configuration.
  dev.planton.provider.aws.AwsProviderConfig provider_config = 2;
}
