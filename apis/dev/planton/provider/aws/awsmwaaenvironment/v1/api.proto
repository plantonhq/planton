syntax = "proto3";

package dev.planton.provider.aws.awsmwaaenvironment.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/aws/awsmwaaenvironment/v1/spec.proto";
import "dev/planton/provider/aws/awsmwaaenvironment/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// aws-mwaa-environment
message AwsMwaaEnvironment {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'aws.planton.dev/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AwsMwaaEnvironment'];

  //metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  AwsMwaaEnvironmentSpec spec = 4 [(buf.validate.field).required = true];

  //status
  AwsMwaaEnvironmentStatus status = 5;
}

// aws-mwaa-environment status
message AwsMwaaEnvironmentStatus {
  //stack-outputs
  AwsMwaaEnvironmentStackOutputs outputs = 1;
}
