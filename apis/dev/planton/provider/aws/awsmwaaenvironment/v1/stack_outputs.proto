syntax = "proto3";

package dev.planton.provider.aws.awsmwaaenvironment.v1;

// AwsMwaaEnvironmentStackOutputs captures observable identifiers and endpoints from a deployed
// Amazon MWAA environment. These outputs enable downstream consumers (CI/CD pipelines,
// monitoring dashboards, documentation) to reference the Airflow UI, connect to the
// environment, and integrate with security and observability workflows.
message AwsMwaaEnvironmentStackOutputs {
  // environment_arn is the Amazon Resource Name of the MWAA environment,
  // used in IAM policies and cross-service references.
  string environment_arn = 1;

  // environment_name is the human-readable name of the environment.
  string environment_name = 2;

  // webserver_url is the URL of the Airflow web UI.
  // Format: "{random-id}.{region}.airflow.amazonaws.com".
  // Access depends on webserver_access_mode (PRIVATE_ONLY requires VPC access, PUBLIC_ONLY is internet-accessible).
  string webserver_url = 3;

  // airflow_version is the effective Apache Airflow version running in the environment.
  string airflow_version = 4;

  // service_role_arn is the ARN of the AWS service role created by MWAA
  // for managing environment infrastructure (VPC endpoints, CloudWatch Logs, etc.).
  string service_role_arn = 5;

  // environment_class is the effective environment class (compute capacity).
  string environment_class = 6;

  // status is the current status of the MWAA environment
  // (e.g., "AVAILABLE", "CREATING", "UPDATING", "DELETING").
  string status = 7;

  // security_group_id is the ID of the managed security group, if one was created
  // from security_group_ids or allowed_cidr_blocks in the spec.
  string security_group_id = 8;
}
