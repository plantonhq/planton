syntax = "proto3";

package dev.planton.provider.aws.awssagemakerdomain.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/aws/awssagemakerdomain/v1/spec.proto";
import "dev/planton/provider/aws/awssagemakerdomain/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// aws-sagemaker-domain
message AwsSagemakerDomain {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'aws.planton.dev/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AwsSagemakerDomain'];

  //metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  AwsSagemakerDomainSpec spec = 4 [(buf.validate.field).required = true];

  //status
  AwsSagemakerDomainStatus status = 5;
}

// aws-sagemaker-domain status
message AwsSagemakerDomainStatus {
  //stack-outputs
  AwsSagemakerDomainStackOutputs outputs = 1;
}
