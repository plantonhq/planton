syntax = "proto3";

package dev.planton.provider.aws.awsrediselasticache.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/aws/awsrediselasticache/v1/spec.proto";
import "dev/planton/provider/aws/awsrediselasticache/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// aws-redis-elasticache
message AwsRedisElasticache {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'aws.planton.dev/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AwsRedisElasticache'];

  //metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  AwsRedisElasticacheSpec spec = 4 [(buf.validate.field).required = true];

  //status
  AwsRedisElasticacheStatus status = 5;
}

// aws-redis-elasticache status
message AwsRedisElasticacheStatus {
  //stack-outputs
  AwsRedisElasticacheStackOutputs outputs = 1;
}
