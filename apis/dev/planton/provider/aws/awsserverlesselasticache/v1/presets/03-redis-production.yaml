apiVersion: aws.planton.dev/v1
kind: AwsServerlessElasticache
metadata:
  name: ${name}
  org: ${org}
  env: prod
  id: ${name}-prod
spec:
  region: us-east-1
  engine: redis
  majorEngineVersion: "7"
  description: Production Redis cache with encryption, snapshots, and access control
  dataStorageMinGb: 5
  dataStorageMaxGb: 200
  ecpuMin: 5000
  ecpuMax: 500000
  kmsKeyId:
    valueFrom:
      kind: AwsKmsKey
      name: ${kms_key_name}
      fieldPath: status.outputs.key_arn
  subnetIds:
    - valueFrom:
        kind: AwsSubnet
        name: ${private_subnet_1_name}
        fieldPath: status.outputs.subnet_id
    - valueFrom:
        kind: AwsSubnet
        name: ${private_subnet_2_name}
        fieldPath: status.outputs.subnet_id
    - valueFrom:
        kind: AwsSubnet
        name: ${private_subnet_3_name}
        fieldPath: status.outputs.subnet_id
  securityGroupIds:
    - valueFrom:
        kind: AwsSecurityGroup
        name: ${sg_name}
        fieldPath: status.outputs.security_group_id
  dailySnapshotTime: "03:00"
  snapshotRetentionLimit: 14
  userGroupId: ${user_group_id}
