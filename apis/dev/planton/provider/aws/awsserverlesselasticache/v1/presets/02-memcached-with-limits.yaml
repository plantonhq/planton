apiVersion: aws.planton.dev/v1
kind: AwsServerlessElasticache
metadata:
  name: ${name}
  org: ${org}
  env: ${env}
  id: ${name}-${env}
spec:
  region: us-west-2
  engine: memcached
  description: Memcached cache with explicit scaling bounds
  dataStorageMinGb: 1
  dataStorageMaxGb: 50
  ecpuMin: 1000
  ecpuMax: 25000
