syntax = "proto3";

package dev.planton.provider.aws.awsserverlesselasticache.v1;

// AwsServerlessElasticacheStackOutputs captures observable identifiers and
// endpoints from a provisioned ElastiCache Serverless cache. These outputs
// are used by downstream resources to wire dependencies via StringValueOrRef.
message AwsServerlessElasticacheStackOutputs {
  // The Amazon Resource Name of the serverless cache. Used in IAM policies
  // and cross-service permissions.
  string arn = 1;

  // The primary connection endpoint DNS address. All clients connect here
  // for read-write operations.
  string endpoint_address = 2;

  // The port of the primary connection endpoint.
  int32 endpoint_port = 3;

  // The reader endpoint DNS address. Distributes read traffic for
  // Redis/Valkey engines. Empty for Memcached (no read replicas).
  string reader_endpoint_address = 4;

  // The port of the reader endpoint.
  int32 reader_endpoint_port = 5;

  // The full engine version string (e.g., "7.1.0"). Useful for confirming
  // the exact version deployed when only major_engine_version was specified.
  string full_engine_version = 6;

  // The name of the serverless cache. Matches the metadata ID used during
  // creation. Useful for downstream references and data source lookups.
  string name = 7;
}
