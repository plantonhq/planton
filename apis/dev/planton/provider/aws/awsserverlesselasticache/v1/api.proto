syntax = "proto3";

package dev.planton.provider.aws.awsserverlesselasticache.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/aws/awsserverlesselasticache/v1/spec.proto";
import "dev/planton/provider/aws/awsserverlesselasticache/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// aws-serverless-elasticache
message AwsServerlessElasticache {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'aws.planton.dev/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AwsServerlessElasticache'];

  //metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  AwsServerlessElasticacheSpec spec = 4 [(buf.validate.field).required = true];

  //status
  AwsServerlessElasticacheStatus status = 5;
}

// aws-serverless-elasticache status
message AwsServerlessElasticacheStatus {
  //stack-outputs
  AwsServerlessElasticacheStackOutputs outputs = 1;
}
