syntax = "proto3";

package dev.planton.provider.aws.awswafwebacl.v1;

import "dev/planton/provider/aws/awswafwebacl/v1/api.proto";
import "dev/planton/provider/aws/provider.proto";

// AwsWafWebAclStackInput provides the inputs required by Pulumi/Terraform
// modules to provision a WAFv2 Web ACL.
message AwsWafWebAclStackInput {
  // target cloud-resource
  AwsWafWebAcl target = 1;
  // provider-config
  dev.planton.provider.aws.AwsProviderConfig provider_config = 2;
}
