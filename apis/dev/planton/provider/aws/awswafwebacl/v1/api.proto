syntax = "proto3";

package dev.planton.provider.aws.awswafwebacl.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/aws/awswafwebacl/v1/spec.proto";
import "dev/planton/provider/aws/awswafwebacl/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// AwsWafWebAcl represents an AWS WAFv2 Web Access Control List that protects
// web applications from common exploits, bots, and volumetric attacks. The
// Web ACL contains an ordered set of rules that inspect incoming requests and
// take actions based on matching conditions.
//
// Associate the Web ACL with ALB, API Gateway, CloudFront, AppSync, Cognito,
// or App Runner by referencing the web_acl_arn output via StringValueOrRef.
message AwsWafWebAcl {
  // api-version must be set to "aws.planton.dev/v1".
  string api_version = 1 [(buf.validate.field).string.const = "aws.planton.dev/v1"];

  // resource-kind for this Web ACL resource, must be "AwsWafWebAcl".
  string kind = 2 [(buf.validate.field).string.const = "AwsWafWebAcl"];

  // metadata captures identifying information (name, org, version, etc.)
  // and must pass standard validations for resource naming.
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec holds the desired configuration for the Web ACL.
  AwsWafWebAclSpec spec = 4 [(buf.validate.field).required = true];

  // status holds runtime or post-deployment information.
  AwsWafWebAclStatus status = 5;
}

// AwsWafWebAclStatus describes the status fields for a Web ACL resource.
message AwsWafWebAclStatus {
  // stack_outputs captures the outputs returned by Pulumi/Terraform after provisioning.
  AwsWafWebAclStackOutputs outputs = 1;
}
