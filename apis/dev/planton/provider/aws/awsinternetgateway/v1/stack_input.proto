syntax = "proto3";

package dev.planton.provider.aws.awsinternetgateway.v1;

import "dev/planton/provider/aws/awsinternetgateway/v1/api.proto";
import "dev/planton/provider/aws/provider.proto";

// AwsInternetGatewayStackInput is the input to the IaC modules (Pulumi /
// Terraform) that deploy an AwsInternetGateway resource.
message AwsInternetGatewayStackInput {
  // target cloud-resource
  AwsInternetGateway target = 1;
  // provider-config
  dev.planton.provider.aws.AwsProviderConfig provider_config = 2;
}
