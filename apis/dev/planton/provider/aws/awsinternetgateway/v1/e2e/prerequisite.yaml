# AwsInternetGateway install profile used as a prerequisite by composed
# components (e.g. a public AwsNatGateway, whose VPC must have an internet
# gateway attached before the gateway can be created). The E2E harness deploys
# the AwsVpc prerequisite first and resolves this gateway's vpc_id against its
# outputs. Full metadata is supplied; the managed-by label tags resources for
# orphan cleanup.
apiVersion: aws.planton.dev/v1
kind: AwsInternetGateway
metadata:
  name: planton-oss-e2e-awsinternetgateway-prereq
  id: planton-oss-e2e-awsinternetgateway-prereq
  org: planton-oss
  env: e2e
  labels:
    managed-by: planton-e2e
    e2e-component: awsinternetgateway
  annotations:
    planton.dev/e2e: "true"
  tags:
    - planton-e2e
spec:
  region: us-west-2
  vpcId:
    valueFrom:
      kind: AwsVpc
      name: planton-oss-e2e-awsvpc-prereq
      fieldPath: status.outputs.vpc_id
