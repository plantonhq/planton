syntax = "proto3";

package dev.planton.provider.aws.awshttpapigateway.v1;

// AwsHttpApiGatewayStackOutputs captures observable identifiers from a provisioned
// AWS API Gateway HTTP API. These outputs are used by downstream resources
// (e.g., CloudFront distributions, CloudWatch alarms, Lambda permissions) to wire
// dependencies via StringValueOrRef.
message AwsHttpApiGatewayStackOutputs {
  // The API Gateway API identifier. Used for constructing resource ARNs
  // and referencing the API in other AWS services.
  string api_id = 1;

  // The default endpoint URL of the API. Format:
  // https://{api-id}.execute-api.{region}.amazonaws.com
  // Clients use this URL to invoke the API when no custom domain is configured.
  string api_endpoint = 2;

  // The Amazon Resource Name (ARN) of the API. Used for IAM policies
  // and resource-based permissions.
  string api_arn = 3;

  // The execution ARN prefix for the API. Used in Lambda resource-based policies
  // to grant API Gateway permission to invoke Lambda functions. Format:
  // arn:aws:execute-api:{region}:{account-id}:{api-id}
  // Append "/*/*" for all stages and routes, or "/{stage}/{method}/{path}" for
  // specific permissions.
  string execution_arn = 4;

  // The invoke URL for the deployed stage. For the "$default" stage this is the
  // same as api_endpoint. For named stages the URL includes the stage name:
  // https://{api-id}.execute-api.{region}.amazonaws.com/{stage-name}
  string stage_invoke_url = 5;

  // The name of the deployed stage (e.g., "$default", "prod").
  string stage_name = 6;
}
