apiVersion: aws.planton.dev/v1
kind: AwsS3Bucket
metadata:
  name: my-private-bucket
spec:
  region: <aws-region>
  isPublic: false  # Block Public Access enabled
  versioningEnabled: true  # Recommended for production
  encryptionType: ENCRYPTION_TYPE_SSE_S3  # Free AES-256 encryption
  forceDestroy: false  # Prevents accidental data loss
