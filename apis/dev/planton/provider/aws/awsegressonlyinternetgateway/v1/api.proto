syntax = "proto3";

package dev.planton.provider.aws.awsegressonlyinternetgateway.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/aws/awsegressonlyinternetgateway/v1/spec.proto";
import "dev/planton/provider/aws/awsegressonlyinternetgateway/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// AwsEgressOnlyInternetGateway is the top-level resource representing an
// egress-only (IPv6 outbound-only) internet gateway attached to an AWS Virtual
// Private Cloud (VPC).
message AwsEgressOnlyInternetGateway {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'aws.planton.dev/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AwsEgressOnlyInternetGateway'];

  // metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  AwsEgressOnlyInternetGatewaySpec spec = 4 [(buf.validate.field).required = true];

  // status
  AwsEgressOnlyInternetGatewayStatus status = 5;
}

// AwsEgressOnlyInternetGatewayStatus holds the outputs produced by deploying an
// AwsEgressOnlyInternetGateway.
message AwsEgressOnlyInternetGatewayStatus {
  // stack-outputs
  AwsEgressOnlyInternetGatewayStackOutputs outputs = 1;
}
