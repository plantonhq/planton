syntax = "proto3";

package dev.planton.provider.aws.awsegressonlyinternetgateway.v1;

// AwsEgressOnlyInternetGatewayStackOutputs contains the values produced by
// deploying an AwsEgressOnlyInternetGateway. Downstream components reference
// these via StringValueOrRef -- most commonly an AwsSubnet IPv6 route whose
// target is this gateway's id.
message AwsEgressOnlyInternetGatewayStackOutputs {
  // The egress-only internet gateway's id (e.g. "eigw-0abc123"). This is the
  // value a subnet route uses as its target_id when target_type is
  // egress_only_internet_gateway. AWS exposes no ARN for this resource.
  string egress_only_internet_gateway_id = 1;

  // The id of the VPC this gateway is attached to.
  string vpc_id = 2;

  // The AWS region the egress-only internet gateway was created in. Echoed so
  // downstream tooling and verifiers can target the correct region.
  string region = 3;
}
