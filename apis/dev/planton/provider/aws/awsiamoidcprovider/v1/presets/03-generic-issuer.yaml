apiVersion: aws.planton.dev/v1
kind: AwsIamOidcProvider
metadata:
  name: partner-oidc
spec:
  region: <aws-region>
  url:
    value: <https-issuer-url>
  clientIdList:
    - <audience>
  # Supply thumbprints only when the issuer's root CA is NOT publicly trusted.
  # For well-known CAs (EKS, GitHub, Google), omit this entirely and AWS derives it.
  thumbprintList:
    - <40-char-sha1-thumbprint>
