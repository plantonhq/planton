apiVersion: qa.planton.dev/v1
kind: ComponentE2EProfile
metadata:
  name: awsiamuser
spec:
  # An IAM user under live E2E: the harness runs deploy -> GetUser verify ->
  # destroy -> verify-destroyed on both provisioners against the AWS test
  # account via keyless SSO/OIDC credentials. The scenario creates the default
  # access key (the usual reason a user exists) and force_destroy guarantees
  # teardown succeeds. IAM is global and free.
  tier: 1
  status: green
  validated_provisioners:
    - pulumi
    - terraform
  timeout_minutes: 10
