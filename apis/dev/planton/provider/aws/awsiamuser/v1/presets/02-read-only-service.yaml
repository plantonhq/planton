apiVersion: aws.planton.dev/v1
kind: AwsIamUser
metadata:
  name: my-read-only-user
spec:
  region: <aws-region>
  userName: <service-user-name>
  managedPolicyArns:
    # AWS-managed policies attach by literal ARN; reference an AwsIamPolicy's
    # policy_arn output via valueFrom for policies defined in Planton.
    - value: arn:aws:iam::aws:policy/ReadOnlyAccess
  disableAccessKeys: true
