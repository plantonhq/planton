syntax = "proto3";

package dev.planton.provider.aws.awslambda.v1;

import "dev/planton/provider/aws/awslambda/v1/api.proto";
import "dev/planton/provider/aws/provider.proto";

// AwsLambdaStackInput defines the inputs passed to IaC to provision an AWS Lambda resource.
message AwsLambdaStackInput {
  // target
  AwsLambda target = 1;

  // provider-credential
  dev.planton.provider.aws.AwsProviderConfig provider_config = 2;
}
