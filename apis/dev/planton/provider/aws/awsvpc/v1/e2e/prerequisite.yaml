# AwsVpc install profile used as a prerequisite by composed components (e.g.
# AwsSubnet, AwsNatGateway, AwsInternetGateway). The E2E harness deploys this VPC
# first (via its Pulumi module), captures its outputs, and resolves the
# dependent's vpc_id reference against them. Full metadata is supplied and the
# managed-by label tags resources for orphan cleanup.
apiVersion: aws.planton.dev/v1
kind: AwsVpc
metadata:
  name: planton-oss-e2e-awsvpc-prereq
  id: planton-oss-e2e-awsvpc-prereq
  org: planton-oss
  env: e2e
  labels:
    managed-by: planton-e2e
    e2e-component: awsvpc
  annotations:
    planton.dev/e2e: "true"
  tags:
    - planton-e2e
spec:
  region: us-west-2
  cidrBlock: 10.0.0.0/16
  enableDnsHostnames: true
  enableDnsSupport: true
