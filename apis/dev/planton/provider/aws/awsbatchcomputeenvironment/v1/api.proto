syntax = "proto3";

package dev.planton.provider.aws.awsbatchcomputeenvironment.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/aws/awsbatchcomputeenvironment/v1/spec.proto";
import "dev/planton/provider/aws/awsbatchcomputeenvironment/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// AwsBatchComputeEnvironment is a deployment component for creating and managing
// AWS Batch compute environments with bundled job queues and an optional
// fair-share scheduling policy. This component covers MANAGED compute
// environments with EC2, SPOT, FARGATE, and FARGATE_SPOT resource types.
message AwsBatchComputeEnvironment {
  // api_version specifies the API version for this resource.
  string api_version = 1 [(buf.validate.field).string.const = 'aws.planton.dev/v1'];

  // kind identifies this resource type.
  string kind = 2 [(buf.validate.field).string.const = 'AwsBatchComputeEnvironment'];

  // metadata contains standard resource metadata including name, labels, and annotations.
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec defines the desired state of the Batch compute environment.
  AwsBatchComputeEnvironmentSpec spec = 4 [(buf.validate.field).required = true];

  // status contains the observed state and outputs from the deployment.
  AwsBatchComputeEnvironmentStatus status = 5;
}

// AwsBatchComputeEnvironmentStatus contains the status and outputs for the
// Batch compute environment.
message AwsBatchComputeEnvironmentStatus {
  // outputs contains the values exported from the IaC stack after deployment.
  AwsBatchComputeEnvironmentStackOutputs outputs = 1;
}
