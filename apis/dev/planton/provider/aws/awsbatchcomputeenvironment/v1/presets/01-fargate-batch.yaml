apiVersion: aws.planton.dev/v1
kind: AwsBatchComputeEnvironment
metadata:
  name: my-fargate-batch
spec:
  computeResources:
    type: FARGATE
    maxVcpus: 256
    subnetIds:
      - value: "<private-subnet-id-az1>"
      - value: "<private-subnet-id-az2>"
    securityGroupIds:
      - value: "<security-group-id>"
  jobQueues:
    - name: default
      priority: 1
