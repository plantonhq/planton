apiVersion: aws.planton.dev/v1
kind: AwsBatchComputeEnvironment
metadata:
  name: my-ec2-batch
spec:
  computeResources:
    type: EC2
    maxVcpus: 512
    minVcpus: 0
    instanceTypes:
      - optimal
    allocationStrategy: BEST_FIT_PROGRESSIVE
    subnetIds:
      - value: "<private-subnet-id-az1>"
      - value: "<private-subnet-id-az2>"
    securityGroupIds:
      - value: "<security-group-id>"
    instanceRole:
      value: "<ecs-instance-profile-arn>"
  updatePolicy:
    terminateJobsOnUpdate: false
    jobExecutionTimeoutMinutes: 60
  jobQueues:
    - name: high-priority
      priority: 10
    - name: low-priority
      priority: 1
