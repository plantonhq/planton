apiVersion: aws.planton.dev/v1
kind: AwsCloudFront
metadata:
  name: my-s3-static-website
spec:
  region: <aws-region>
  enabled: true
  priceClass: PRICE_CLASS_100  # US, Canada, Europe; lowest cost
  origins:
    - domainName: <s3-bucket-domain-name>
      isDefault: true
  defaultRootObject: index.html
