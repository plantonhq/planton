syntax = "proto3";

package dev.planton.provider.aws.awscloudwatchalarm.v1;

import "dev/planton/provider/aws/awscloudwatchalarm/v1/api.proto";
import "dev/planton/provider/aws/provider.proto";

// AwsCloudwatchAlarmStackInput provides the inputs required by Pulumi/Terraform
// modules to provision a CloudWatch metric alarm.
message AwsCloudwatchAlarmStackInput {
  // target cloud-resource
  AwsCloudwatchAlarm target = 1;
  // provider-config
  dev.planton.provider.aws.AwsProviderConfig provider_config = 2;
}
