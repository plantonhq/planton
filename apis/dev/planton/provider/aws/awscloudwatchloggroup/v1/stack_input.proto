syntax = "proto3";

package dev.planton.provider.aws.awscloudwatchloggroup.v1;

import "dev/planton/provider/aws/awscloudwatchloggroup/v1/api.proto";
import "dev/planton/provider/aws/provider.proto";

// AwsCloudwatchLogGroupStackInput provides the inputs required by Pulumi/Terraform
// modules to provision a CloudWatch Logs log group.
message AwsCloudwatchLogGroupStackInput {
  // target cloud-resource
  AwsCloudwatchLogGroup target = 1;
  // provider-config
  dev.planton.provider.aws.AwsProviderConfig provider_config = 2;
}
