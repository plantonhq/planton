syntax = "proto3";

package dev.planton.provider.aws.awscloudwatchloggroup.v1;

// AwsCloudwatchLogGroupStackOutputs captures observable identifiers from a
// provisioned CloudWatch Logs log group.
//
// The primary output is `log_group_arn`, which downstream resources use to wire
// dependencies via StringValueOrRef. For example, an AwsStepFunction uses the
// log group ARN as its logging destination, and an AwsHttpApiGateway uses it
// for access log delivery.
//
// Note: The ARN returned here does NOT include the `:*` suffix that the AWS API
// sometimes appends. Services that require the `:*` suffix (e.g., Step Functions)
// should handle this in their IaC module, not in the log group outputs.
message AwsCloudwatchLogGroupStackOutputs {
  // The Amazon Resource Name (ARN) of the log group. This is the primary
  // identifier used to reference the log group in other AWS resources such
  // as Step Functions logging, API Gateway access logs, and OpenSearch log
  // publishing.
  string log_group_arn = 1;

  // The name of the log group. Some AWS services (e.g., ElastiCache log
  // delivery, ECS awslogs driver) reference log groups by name rather than ARN.
  string log_group_name = 2;
}
