apiVersion: aws.planton.dev/v1
kind: AwsOpenSearchDomain
metadata:
  name: my-search
spec:
  region: us-west-2
  engineVersion: "OpenSearch_2.11"
  clusterConfig:
    instanceType: t3.small.search
  ebsOptions:
    ebsEnabled: true
    volumeType: gp3
    volumeSize: 10
  encryptAtRestEnabled: true
  nodeToNodeEncryptionEnabled: true
