syntax = "proto3";

package dev.planton.provider.aws.awsopensearchdomain.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/aws/awsopensearchdomain/v1/spec.proto";
import "dev/planton/provider/aws/awsopensearchdomain/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// aws-opensearch-domain
message AwsOpenSearchDomain {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'aws.planton.dev/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AwsOpenSearchDomain'];

  //metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  AwsOpenSearchDomainSpec spec = 4 [(buf.validate.field).required = true];

  //status
  AwsOpenSearchDomainStatus status = 5;
}

// aws-opensearch-domain status
message AwsOpenSearchDomainStatus {
  //stack-outputs
  AwsOpenSearchDomainStackOutputs outputs = 1;
}
