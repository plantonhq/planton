apiVersion: aws.planton.dev/v1
kind: AwsGlobalAccelerator
metadata:
  name: game-server-ga
  labels:
    planton.dev/provisioner: pulumi
spec:
  region: <aws-region>
  listeners:
    - name: udp-game
      protocol: UDP
      clientAffinity: SOURCE_IP
      portRanges:
        - fromPort: 7000
          toPort: 8000
      endpointGroups:
        - name: us-west-2
          endpointGroupRegion: us-west-2
          healthCheckProtocol: TCP
          healthCheckPort: 8080
          healthCheckIntervalSeconds: 10
          thresholdCount: 2
          endpoints:
            - endpointId: "<eip-allocation-id-1>"
              weight: 128
            - endpointId: "<eip-allocation-id-2>"
              weight: 128
