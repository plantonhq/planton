syntax = "proto3";

package dev.planton.provider.aws.awsglobalaccelerator.v1;

import "dev/planton/provider/aws/awsglobalaccelerator/v1/api.proto";
import "dev/planton/provider/aws/provider.proto";

// AwsGlobalAcceleratorStackInput is the input for the IaC modules that deploy
// the Global Accelerator.
message AwsGlobalAcceleratorStackInput {
  // target is the AwsGlobalAccelerator resource to deploy.
  AwsGlobalAccelerator target = 1;
  // provider_config contains the AWS provider credentials and configuration.
  dev.planton.provider.aws.AwsProviderConfig provider_config = 2;
}
