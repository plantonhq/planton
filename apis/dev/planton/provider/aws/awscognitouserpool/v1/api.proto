syntax = "proto3";

package dev.planton.provider.aws.awscognitouserpool.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/aws/awscognitouserpool/v1/spec.proto";
import "dev/planton/provider/aws/awscognitouserpool/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// aws-cognito-user-pool
message AwsCognitoUserPool {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'aws.planton.dev/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'AwsCognitoUserPool'];

  //metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  AwsCognitoUserPoolSpec spec = 4 [(buf.validate.field).required = true];

  //status
  AwsCognitoUserPoolStatus status = 5;
}

// aws-cognito-user-pool status
message AwsCognitoUserPoolStatus {
  //stack-outputs
  AwsCognitoUserPoolStackOutputs outputs = 1;
}
