apiVersion: aws.planton.dev/v1
kind: AwsCognitoUserPool
metadata:
  name: ${name}
  org: ${org}
  env: ${env}
  id: ${id}
  labels:
    planton.dev/provisioner: pulumi
    planton.dev/stack: ${env}.AwsCognitoUserPool.${name}
spec:
  region: <aws-region>
  usernameAttributes:
    - email
  autoVerifiedAttributes:
    - email
  accountRecoveryMechanisms:
    - name: verified_email
      priority: 1
  clients:
    - name: web-app
      explicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
