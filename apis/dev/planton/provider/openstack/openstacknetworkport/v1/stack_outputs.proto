syntax = "proto3";

package dev.planton.provider.openstack.openstacknetworkport.v1;

// OpenStackNetworkPortStackOutputs captures the observable outputs after
// provisioning an OpenStack Neutron port.
//
// The critical output is `port_id` -- the UUID of the created port.
// This is the FK target for:
//   - OpenStackFloatingIp.spec.port_id
//   - OpenStackFloatingIpAssociate.spec.port_id
//   - OpenStackInstance.spec.networks[].port (future)
message OpenStackNetworkPortStackOutputs {
  // port_id is the unique identifier (UUID) of the port resource in OpenStack.
  // This is the primary FK target for downstream components.
  string port_id = 1;

  // mac_address is the MAC address assigned to the port.
  // Auto-generated by OpenStack unless explicitly set in the spec.
  string mac_address = 2;

  // all_fixed_ips is the computed list of all IP addresses assigned to this port.
  // Includes both explicitly requested IPs and auto-assigned IPs.
  // Example: ["192.168.1.10", "10.0.0.5"]
  repeated string all_fixed_ips = 3;

  // all_security_group_ids is the computed list of all security group UUIDs
  // applied to this port, including the default SG if no explicit SGs were set.
  repeated string all_security_group_ids = 4;

  // region is the OpenStack region where the port was created.
  string region = 5;
}
