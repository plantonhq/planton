syntax = "proto3";

package dev.planton.provider.openstack.openstacknetworkport.v1;

import "dev/planton/provider/openstack/openstacknetworkport/v1/api.proto";
import "dev/planton/provider/openstack/provider.proto";

// OpenStackNetworkPortStackInput is the input to the IaC module.
// It contains the target resource and provider configuration.
message OpenStackNetworkPortStackInput {
  // target cloud-resource to be deployed
  OpenStackNetworkPort target = 1;
  // provider-config for OpenStack authentication
  dev.planton.provider.openstack.OpenStackProviderConfig provider_config = 2;
}
