apiVersion: openstack.planton.dev/v1
kind: OpenStackSecurityGroup
metadata:
  name: my-restrictive-sg
spec:
  description: Zero-trust security group with explicit rules only
  deleteDefaultRules: true
  rules:
    - key: allow-ssh
      direction: ingress
      ethertype: IPv4
      protocol: tcp
      portRangeMin: 22
      portRangeMax: 22
      remoteIpPrefix: <trusted-cidr>
      description: SSH from trusted network only
    - key: egress-all-ipv4
      direction: egress
      ethertype: IPv4
      description: Allow all outbound IPv4 traffic
