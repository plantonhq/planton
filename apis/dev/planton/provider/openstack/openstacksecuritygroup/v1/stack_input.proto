syntax = "proto3";

package dev.planton.provider.openstack.openstacksecuritygroup.v1;

import "dev/planton/provider/openstack/openstacksecuritygroup/v1/api.proto";
import "dev/planton/provider/openstack/provider.proto";

// OpenStackSecurityGroupStackInput is the input to the IaC module.
// It contains the target resource and provider configuration.
message OpenStackSecurityGroupStackInput {
  // target cloud-resource to be deployed
  OpenStackSecurityGroup target = 1;
  // provider-config for OpenStack authentication
  dev.planton.provider.openstack.OpenStackProviderConfig provider_config = 2;
}
