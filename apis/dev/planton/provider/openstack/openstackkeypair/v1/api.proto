syntax = "proto3";

package dev.planton.provider.openstack.openstackkeypair.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/openstack/openstackkeypair/v1/spec.proto";
import "dev/planton/provider/openstack/openstackkeypair/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// OpenStackKeypair is a Kubernetes Resource Model (KRM) style resource for managing
// SSH keypairs in OpenStack Nova (Compute service).
//
// Keypairs are used to authenticate SSH access to compute instances. This component supports
// both importing existing public keys and generating new keypairs via OpenStack.
message OpenStackKeypair {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'openstack.planton.dev/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'OpenStackKeypair'];

  // metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  OpenStackKeypairSpec spec = 4 [(buf.validate.field).required = true];

  // status
  OpenStackKeypairStatus status = 5;
}

// OpenStackKeypairStatus represents the observed state of an OpenStack compute keypair.
message OpenStackKeypairStatus {
  // stack-outputs from the IaC deployment
  OpenStackKeypairStackOutputs outputs = 1;
}
