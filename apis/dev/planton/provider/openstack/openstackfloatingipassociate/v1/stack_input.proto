syntax = "proto3";

package dev.planton.provider.openstack.openstackfloatingipassociate.v1;

import "dev/planton/provider/openstack/openstackfloatingipassociate/v1/api.proto";
import "dev/planton/provider/openstack/provider.proto";

// OpenStackFloatingIpAssociateStackInput is the input to the IaC module.
// It contains the target resource and provider configuration.
message OpenStackFloatingIpAssociateStackInput {
  // target cloud-resource to be deployed
  OpenStackFloatingIpAssociate target = 1;
  // provider-config for OpenStack authentication
  dev.planton.provider.openstack.OpenStackProviderConfig provider_config = 2;
}
