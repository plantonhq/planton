syntax = "proto3";

package dev.planton.provider.openstack.openstackloadbalancerpool.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/openstack/openstackloadbalancerpool/v1/spec.proto";
import "dev/planton/provider/openstack/openstackloadbalancerpool/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// OpenStackLoadBalancerPool is a Kubernetes Resource Model (KRM) style resource
// for managing Octavia backend pools in OpenStack.
//
// A pool groups backend members and defines how traffic from a listener is distributed
// across those members. The pool specifies the protocol, load-balancing algorithm,
// and optional session persistence. Members and health monitors attach to the pool.
message OpenStackLoadBalancerPool {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'openstack.planton.dev/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'OpenStackLoadBalancerPool'];

  // metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  OpenStackLoadBalancerPoolSpec spec = 4 [(buf.validate.field).required = true];

  // status
  OpenStackLoadBalancerPoolStatus status = 5;
}

// OpenStackLoadBalancerPoolStatus represents the observed state of an Octavia pool.
message OpenStackLoadBalancerPoolStatus {
  // stack-outputs from the IaC deployment
  OpenStackLoadBalancerPoolStackOutputs outputs = 1;
}
