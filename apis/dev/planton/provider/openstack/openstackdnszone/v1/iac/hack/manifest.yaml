apiVersion: openstack.planton.dev/v1
kind: OpenStackDnsZone
metadata:
  name: test-zone
spec:
  domain_name: "example.com"
  email: "admin@example.com"
  description: "Test DNS zone for local development"
  records:
    - record_type: 1
      record_name: "www.example.com."
      values:
        - "192.0.2.1"
      ttl: 300
