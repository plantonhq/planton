syntax = "proto3";

package dev.planton.provider.openstack.openstackapplicationcredential.v1;

import "dev/planton/provider/openstack/openstackapplicationcredential/v1/api.proto";
import "dev/planton/provider/openstack/provider.proto";

// OpenStackApplicationCredentialStackInput is the input to the IaC module.
// It contains the target resource and provider configuration.
message OpenStackApplicationCredentialStackInput {
  // target cloud-resource to be deployed
  OpenStackApplicationCredential target = 1;
  // provider-config for OpenStack authentication
  dev.planton.provider.openstack.OpenStackProviderConfig provider_config = 2;
}
