syntax = "proto3";

package dev.planton.provider.openstack.openstackapplicationcredential.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/openstack/openstackapplicationcredential/v1/spec.proto";
import "dev/planton/provider/openstack/openstackapplicationcredential/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// OpenStackApplicationCredential is a Kubernetes Resource Model (KRM) style
// resource for managing OpenStack Identity application credentials.
//
// Application credentials allow applications to authenticate to OpenStack
// without using a user's password. They are scoped to the project that was
// active during creation and can be restricted to specific roles and API
// access patterns.
//
// IMPORTANT: This is an immutable resource. Any change to the spec requires
// destroying and recreating the credential, which generates a new secret.
message OpenStackApplicationCredential {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'openstack.planton.dev/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'OpenStackApplicationCredential'];

  // metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  OpenStackApplicationCredentialSpec spec = 4 [(buf.validate.field).required = true];

  // status
  OpenStackApplicationCredentialStatus status = 5;
}

// OpenStackApplicationCredentialStatus represents the observed state of
// an OpenStack application credential.
message OpenStackApplicationCredentialStatus {
  // stack-outputs from the IaC deployment
  OpenStackApplicationCredentialStackOutputs outputs = 1;
}
