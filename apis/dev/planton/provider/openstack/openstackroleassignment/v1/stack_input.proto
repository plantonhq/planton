syntax = "proto3";

package dev.planton.provider.openstack.openstackroleassignment.v1;

import "dev/planton/provider/openstack/openstackroleassignment/v1/api.proto";
import "dev/planton/provider/openstack/provider.proto";

// OpenStackRoleAssignmentStackInput is the input to the IaC module.
// It contains the target resource and provider configuration.
message OpenStackRoleAssignmentStackInput {
  // target cloud-resource to be deployed
  OpenStackRoleAssignment target = 1;
  // provider-config for OpenStack authentication
  dev.planton.provider.openstack.OpenStackProviderConfig provider_config = 2;
}
