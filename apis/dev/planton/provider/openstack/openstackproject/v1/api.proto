syntax = "proto3";

package dev.planton.provider.openstack.openstackproject.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/openstack/openstackproject/v1/spec.proto";
import "dev/planton/provider/openstack/openstackproject/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// OpenStackProject is a Kubernetes Resource Model (KRM) style resource
// for managing OpenStack Identity (Keystone) projects.
//
// A project is the fundamental organizational unit in OpenStack. All cloud
// resources belong to a project, which provides resource isolation, quota
// boundaries, and access control scoping.
//
// Common use cases:
//   - Provision tenant projects for development teams
//   - Create isolated project hierarchies for multi-tenant environments
//   - Automate project onboarding in landing zone InfraCharts
//
// Note: Creating projects is an admin-level operation. The OpenStack credentials
// used with this component must have the "admin" role or equivalent permissions.
message OpenStackProject {
  // api-version
  string api_version = 1 [(buf.validate.field).string.const = 'openstack.planton.dev/v1'];

  // resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'OpenStackProject'];

  // metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  // spec
  OpenStackProjectSpec spec = 4 [(buf.validate.field).required = true];

  // status
  OpenStackProjectStatus status = 5;
}

// OpenStackProjectStatus represents the observed state of an OpenStack
// Identity project.
message OpenStackProjectStatus {
  // stack-outputs from the IaC deployment
  OpenStackProjectStackOutputs outputs = 1;
}
