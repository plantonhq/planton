apiVersion: openstack.planton.dev/v1
kind: OpenStackLoadBalancerListener
metadata:
  name: my-https-listener
spec:
  loadbalancerId:
    value: <loadbalancer-id>
  protocol: TERMINATED_HTTPS
  protocolPort: 443
  defaultTlsContainerRef: <barbican-tls-container-uri>
  insertHeaders:
    X-Forwarded-For: "true"
    X-Forwarded-Proto: "true"
  description: HTTPS listener with TLS termination on port 443
