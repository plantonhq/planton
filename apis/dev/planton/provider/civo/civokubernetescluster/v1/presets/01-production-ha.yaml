apiVersion: civo.planton.dev/v1
kind: CivoKubernetesCluster
metadata:
  name: my-k8s-cluster
spec:
  clusterName: my-k8s-cluster
  region: lon1
  kubernetesVersion: "1.29.2"
  network:
    value: "<vpc-network-id>"
  highlyAvailable: true
  autoUpgrade: true
  defaultNodePool:
    size: g4s.kube.medium
    nodeCount: 3
  tags:
    - production
