apiVersion: auth0.planton.dev/v1
kind: Auth0Client
metadata:
  name: e2e-spa-minimal
  org: e2e-org
  env: testing
spec:
  application_type: spa
  description: E2E minimal SPA application
  callbacks:
    - http://localhost:3000/callback
  allowed_logout_urls:
    - http://localhost:3000
  web_origins:
    - http://localhost:3000
  grant_types:
    - authorization_code
    - refresh_token
  oidc_conformant: true
  is_first_party: true
