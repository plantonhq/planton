apiVersion: auth0.planton.dev/v1
kind: Auth0Action
metadata:
  name: m2m-audit-log
  org: example-org
  env: production
spec:
  supported_trigger:
    id: credentials-exchange
    version: v2
  code: |
    const axios = require('axios');

    exports.onExecuteCredentialsExchange = async (event, api) => {
      try {
        await axios.post(event.secrets.AUDIT_ENDPOINT, {
          event_type: 'credentials_exchange',
          timestamp: new Date().toISOString(),
          client_id: event.client.client_id,
          client_name: event.client.name,
          audience: event.request?.body?.audience || '',
          scopes: event.request?.body?.scope || '',
          ip_address: event.request?.ip || '',
        }, {
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${event.secrets.AUDIT_TOKEN}`,
          },
          timeout: 5000,
        });
      } catch (error) {
        // Log but don't block the token exchange on audit failure
        console.error('Audit log failed:', error.message);
      }
    };
  runtime: node22
  deploy: true
  dependencies:
    - name: axios
      version: "1.7.0"
  secrets:
    - name: AUDIT_ENDPOINT
      value: "https://audit.example.com/events"
    - name: AUDIT_TOKEN
      value: "audit-bearer-token"
  trigger_binding:
    display_name: M2M Audit Log
