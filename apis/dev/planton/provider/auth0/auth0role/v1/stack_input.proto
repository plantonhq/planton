syntax = "proto3";

package dev.planton.provider.auth0.auth0role.v1;

import "dev/planton/provider/auth0/auth0role/v1/api.proto";
import "dev/planton/provider/auth0/provider.proto";

// Auth0RoleStackInput is the input to the Auth0Role IaC module.
// It contains the target resource and the Auth0 provider configuration.
message Auth0RoleStackInput {
  // target is the Auth0Role resource to be deployed.
  Auth0Role target = 1;

  // provider_config contains the Auth0 credentials for authentication.
  // Includes domain, client_id, and client_secret. These are used to authenticate
  // with Auth0's Management API. The credentials should belong to a Machine-to-Machine
  // application with role and resource-server permissions (create:roles, update:roles,
  // delete:roles, read:resource_servers).
  dev.planton.provider.auth0.Auth0ProviderConfig provider_config = 2;
}
