syntax = "proto3";

package dev.planton.provider.gcp.gcpvertexaiendpoint.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/gcp/gcpvertexaiendpoint/v1/spec.proto";
import "dev/planton/provider/gcp/gcpvertexaiendpoint/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

//gcp-vertex-ai-endpoint
message GcpVertexAiEndpoint {
  string api_version = 1 [(buf.validate.field).string.const = 'gcp.planton.dev/v1'];
  string kind = 2 [(buf.validate.field).string.const = 'GcpVertexAiEndpoint'];
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];
  GcpVertexAiEndpointSpec spec = 4 [(buf.validate.field).required = true];
  GcpVertexAiEndpointStatus status = 5;
}

message GcpVertexAiEndpointStatus {
  GcpVertexAiEndpointStackOutputs outputs = 1;
}
