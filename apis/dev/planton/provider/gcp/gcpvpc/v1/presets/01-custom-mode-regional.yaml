apiVersion: gcp.planton.dev/v1
kind: GcpVpc
metadata:
  name: my-production-vpc
spec:
  projectId:
    value: "<gcp-project-id>"
  networkName: <your-vpc-name>
  autoCreateSubnetworks: false  # custom mode; subnets created explicitly via GcpSubnetwork
  routingMode: REGIONAL  # default from spec; routes advertised within a single region
  privateServicesAccess:
    enabled: true  # enables private IPs for Cloud SQL, Memorystore, etc.
    ipRangePrefixLength: 16  # default from spec; /16 = 65,536 IPs for managed services
