syntax = "proto3";

package dev.planton.provider.gcp.gcpredisinstance.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/gcp/gcpredisinstance/v1/spec.proto";
import "dev/planton/provider/gcp/gcpredisinstance/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

//gcp-redis-instance
message GcpRedisInstance {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'gcp.planton.dev/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'GcpRedisInstance'];

  //metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  GcpRedisInstanceSpec spec = 4 [(buf.validate.field).required = true];

  //status
  GcpRedisInstanceStatus status = 5;
}

//gcp-redis-instance status
message GcpRedisInstanceStatus {
  //stack-outputs
  GcpRedisInstanceStackOutputs outputs = 1;
}
