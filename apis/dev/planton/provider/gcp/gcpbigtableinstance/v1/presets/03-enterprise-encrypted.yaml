apiVersion: gcp.planton.dev/v1
kind: GcpBigtableInstance
metadata:
  name: my-enterprise-bigtable
spec:
  projectId:
    value: "<gcp-project-id>"
  instanceName: <instance-name>
  displayName: <display-name>
  deletionProtection: true
  clusters:
    - clusterId: <cluster-id-zone-a>
      zone: <gcp-zone-a>
      kmsKeyName:
        value: "<kms-key-resource-name>"
      autoscalingConfig:
        minNodes: 5
        maxNodes: 50
        cpuTarget: 60
        storageTarget: 4096
    - clusterId: <cluster-id-zone-b>
      zone: <gcp-zone-b>
      kmsKeyName:
        value: "<kms-key-resource-name>"
      autoscalingConfig:
        minNodes: 5
        maxNodes: 50
        cpuTarget: 60
        storageTarget: 4096
