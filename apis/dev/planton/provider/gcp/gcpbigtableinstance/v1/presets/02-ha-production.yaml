apiVersion: gcp.planton.dev/v1
kind: GcpBigtableInstance
metadata:
  name: my-prod-bigtable
spec:
  projectId:
    value: "<gcp-project-id>"
  instanceName: <instance-name>
  displayName: <display-name>
  deletionProtection: true
  clusters:
    - clusterId: <cluster-id-zone-a>
      zone: <gcp-zone-a>
      autoscalingConfig:
        minNodes: 3
        maxNodes: 30
        cpuTarget: 65
    - clusterId: <cluster-id-zone-b>
      zone: <gcp-zone-b>
      autoscalingConfig:
        minNodes: 3
        maxNodes: 30
        cpuTarget: 65
