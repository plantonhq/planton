syntax = "proto3";

package dev.planton.provider.gcp.gcpcloudarmorpolicy.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/gcp/gcpcloudarmorpolicy/v1/spec.proto";
import "dev/planton/provider/gcp/gcpcloudarmorpolicy/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

//gcp-cloud-armor-policy
message GcpCloudArmorPolicy {
  string api_version = 1 [(buf.validate.field).string.const = 'gcp.planton.dev/v1'];
  string kind = 2 [(buf.validate.field).string.const = 'GcpCloudArmorPolicy'];
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];
  GcpCloudArmorPolicySpec spec = 4 [(buf.validate.field).required = true];
  GcpCloudArmorPolicyStatus status = 5;
}

message GcpCloudArmorPolicyStatus {
  GcpCloudArmorPolicyStackOutputs outputs = 1;
}
