apiVersion: gcp.planton.dev/v1
kind: GcpCloudRun
metadata:
  name: my-internal-service
spec:
  projectId:
    value: "<gcp-project-id>"
  region: <gcp-region>
  container:
    image:
      repo: <container-image-repo>
      tag: <image-tag>
    port: 8080
    cpu: 2
    memory: 1024  # 1 GiB for services accessing databases or doing heavier processing
    replicas:
      min: 1  # always-warm instance to avoid cold starts for internal traffic
      max: 10
  maxConcurrency: 80  # recommended_default from spec
  timeoutSeconds: 300  # recommended_default from spec
  ingress: INGRESS_TRAFFIC_INTERNAL_ONLY  # only reachable from within VPC and GCP services
  allowUnauthenticated: false  # requires IAM authentication
  executionEnvironment: EXECUTION_ENVIRONMENT_GEN2  # recommended_default from spec
  vpcAccess:
    network:
      value: "<vpc-network-name>"
    subnet:
      value: "<subnet-name>"
    egress: PRIVATE_RANGES_ONLY  # only private IP traffic routes through VPC
  deleteProtection: true  # prevents accidental deletion of an internal service
