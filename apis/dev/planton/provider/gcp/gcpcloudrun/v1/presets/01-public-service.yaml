apiVersion: gcp.planton.dev/v1
kind: GcpCloudRun
metadata:
  name: my-cloud-run-service
spec:
  projectId:
    value: "<gcp-project-id>"
  region: <gcp-region>
  container:
    image:
      repo: <container-image-repo>
      tag: <image-tag>
    port: 8080
    cpu: 1  # recommended_default from spec
    memory: 512  # recommended_default from spec; MiB
    replicas:
      min: 0  # recommended_default from spec; scale-to-zero when idle
      max: 10
  maxConcurrency: 80  # recommended_default from spec
  timeoutSeconds: 300  # recommended_default from spec; 5 minutes
  ingress: INGRESS_TRAFFIC_ALL  # recommended_default from spec; public internet
  allowUnauthenticated: true  # recommended_default from spec; publicly invokable
  executionEnvironment: EXECUTION_ENVIRONMENT_GEN2  # recommended_default from spec; full Linux support
