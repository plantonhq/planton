apiVersion: gcp.planton.dev/v1
kind: GcpGcsBucket
metadata:
  name: my-private-bucket
spec:
  gcpProjectId:
    value: "<gcp-project-id>"
  bucketName: <your-bucket-name>
  location: <gcp-region>
  uniformBucketLevelAccessEnabled: true  # IAM-only access control; no legacy ACLs
  storageClass: STANDARD
  versioningEnabled: true  # protects against accidental deletion and overwrite
  publicAccessPrevention: enforced  # blocks any public access
  lifecycleRules:
    - action:
        type: Delete
      condition:
        numNewerVersions: 3  # keep only 3 non-current versions
    - action:
        type: Delete
      condition:
        ageDays: 365  # delete non-current versions older than 1 year
        isLive: false
  gcpLabels:
    managed-by: planton
