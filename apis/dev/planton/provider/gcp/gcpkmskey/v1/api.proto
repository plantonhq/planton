syntax = "proto3";

package dev.planton.provider.gcp.gcpkmskey.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/gcp/gcpkmskey/v1/spec.proto";
import "dev/planton/provider/gcp/gcpkmskey/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

//gcp-kms-key
message GcpKmsKey {
  string api_version = 1 [(buf.validate.field).string.const = 'gcp.planton.dev/v1'];
  string kind = 2 [(buf.validate.field).string.const = 'GcpKmsKey'];
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];
  GcpKmsKeySpec spec = 4 [(buf.validate.field).required = true];
  GcpKmsKeyStatus status = 5;
}

message GcpKmsKeyStatus {
  GcpKmsKeyStackOutputs outputs = 1;
}
