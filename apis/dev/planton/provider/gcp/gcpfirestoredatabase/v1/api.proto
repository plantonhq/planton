syntax = "proto3";

package dev.planton.provider.gcp.gcpfirestoredatabase.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/gcp/gcpfirestoredatabase/v1/spec.proto";
import "dev/planton/provider/gcp/gcpfirestoredatabase/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

//gcp-firestore-database
message GcpFirestoreDatabase {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'gcp.planton.dev/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'GcpFirestoreDatabase'];

  //metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  GcpFirestoreDatabaseSpec spec = 4 [(buf.validate.field).required = true];

  //status
  GcpFirestoreDatabaseStatus status = 5;
}

//gcp-firestore-database status
message GcpFirestoreDatabaseStatus {
  //stack-outputs
  GcpFirestoreDatabaseStackOutputs outputs = 1;
}
