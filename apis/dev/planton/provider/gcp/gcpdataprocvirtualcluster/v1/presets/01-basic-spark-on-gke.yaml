apiVersion: gcp.planton.dev/v1
kind: GcpDataprocVirtualCluster
metadata:
  name: my-spark-on-gke
spec:
  projectId:
    value: "<your-gcp-project-id>"
  region: us-central1
  gkeClusterTarget:
    value: "<your-gke-cluster-resource-id>"
  softwareConfig:
    componentVersion:
      SPARK: "3.5-dataproc-17"
  nodePoolTargets:
    - nodePool:
        value: "<your-gke-node-pool-name>"
      roles:
        - DEFAULT
