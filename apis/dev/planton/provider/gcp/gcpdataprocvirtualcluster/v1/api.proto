syntax = "proto3";

package dev.planton.provider.gcp.gcpdataprocvirtualcluster.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/gcp/gcpdataprocvirtualcluster/v1/spec.proto";
import "dev/planton/provider/gcp/gcpdataprocvirtualcluster/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

//gcp-dataproc-virtual-cluster
message GcpDataprocVirtualCluster {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'gcp.planton.dev/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'GcpDataprocVirtualCluster'];

  //metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  GcpDataprocVirtualClusterSpec spec = 4 [(buf.validate.field).required = true];

  //status
  GcpDataprocVirtualClusterStatus status = 5;
}

//gcp-dataproc-virtual-cluster status
message GcpDataprocVirtualClusterStatus {
  //stack-outputs
  GcpDataprocVirtualClusterStackOutputs outputs = 1;
}
