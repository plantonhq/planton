syntax = "proto3";

package dev.planton.provider.gcp.gcpdataproccluster.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/gcp/gcpdataproccluster/v1/spec.proto";
import "dev/planton/provider/gcp/gcpdataproccluster/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

//gcp-dataproc-cluster
message GcpDataprocCluster {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'gcp.planton.dev/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'GcpDataprocCluster'];

  //metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  GcpDataprocClusterSpec spec = 4 [(buf.validate.field).required = true];

  //status
  GcpDataprocClusterStatus status = 5;
}

//gcp-dataproc-cluster status
message GcpDataprocClusterStatus {
  //stack-outputs
  GcpDataprocClusterStackOutputs outputs = 1;
}
