syntax = "proto3";

package dev.planton.provider.gcp.gcpspannerinstance.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/gcp/gcpspannerinstance/v1/spec.proto";
import "dev/planton/provider/gcp/gcpspannerinstance/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

//gcp-spanner-instance
message GcpSpannerInstance {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'gcp.planton.dev/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'GcpSpannerInstance'];

  //metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  GcpSpannerInstanceSpec spec = 4 [(buf.validate.field).required = true];

  //status
  GcpSpannerInstanceStatus status = 5;
}

//gcp-spanner-instance status
message GcpSpannerInstanceStatus {
  //stack-outputs
  GcpSpannerInstanceStackOutputs outputs = 1;
}
