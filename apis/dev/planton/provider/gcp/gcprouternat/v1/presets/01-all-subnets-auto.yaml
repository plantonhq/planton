apiVersion: gcp.planton.dev/v1
kind: GcpRouterNat
metadata:
  name: my-router-nat
spec:
  projectId:
    value: "<gcp-project-id>"
  vpcSelfLink:
    value: "<vpc-network-self-link>"
  region: <gcp-region>
  routerName: <your-router-name>
  natName: <your-nat-name>
  logFilter: ERRORS_ONLY  # default from spec; logs translation errors for troubleshooting
