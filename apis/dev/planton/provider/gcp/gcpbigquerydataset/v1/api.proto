syntax = "proto3";

package dev.planton.provider.gcp.gcpbigquerydataset.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/gcp/gcpbigquerydataset/v1/spec.proto";
import "dev/planton/provider/gcp/gcpbigquerydataset/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

//gcp-bigquery-dataset
message GcpBigQueryDataset {
  string api_version = 1 [(buf.validate.field).string.const = 'gcp.planton.dev/v1'];
  string kind = 2 [(buf.validate.field).string.const = 'GcpBigQueryDataset'];
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];
  GcpBigQueryDatasetSpec spec = 4 [(buf.validate.field).required = true];
  GcpBigQueryDatasetStatus status = 5;
}

message GcpBigQueryDatasetStatus {
  GcpBigQueryDatasetStackOutputs outputs = 1;
}
