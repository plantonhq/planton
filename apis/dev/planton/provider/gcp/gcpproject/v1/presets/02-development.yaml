apiVersion: gcp.planton.dev/v1
kind: GcpProject
metadata:
  name: my-dev-project
spec:
  projectId: <your-project-id>
  addSuffix: true  # appends random suffix to avoid ID collisions across dev environments
  parentType: folder
  parentId: "<your-folder-id>"
  billingAccountId: "<AAAAAA-BBBBBB-CCCCCC>"
  labels:
    environment: development
    managed-by: planton
  disableDefaultNetwork: true  # default from spec
  enabledApis:
    - compute.googleapis.com
    - container.googleapis.com
    - iam.googleapis.com
