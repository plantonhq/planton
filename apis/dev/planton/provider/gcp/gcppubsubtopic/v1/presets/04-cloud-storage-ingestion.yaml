apiVersion: gcp.planton.dev/v1
kind: GcpPubSubTopic
metadata:
  name: my-gcs-ingest-topic
spec:
  projectId:
    value: "<project-id>"  # e.g., my-gcp-project
  topicName: <your-topic-name>  # e.g., gcs-data-ingest
  ingestionDataSourceSettings:
    cloudStorage:
      bucket:
        value: "<bucket-name>"  # e.g., my-data-landing-bucket (without gs:// prefix)
      matchGlob: "**/*.json"
      textFormat:
        delimiter: "\n"
    platformLogsSettings:
      severity: INFO
