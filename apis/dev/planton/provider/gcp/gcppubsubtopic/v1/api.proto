syntax = "proto3";

package dev.planton.provider.gcp.gcppubsubtopic.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/gcp/gcppubsubtopic/v1/spec.proto";
import "dev/planton/provider/gcp/gcppubsubtopic/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

//gcp-pubsub-topic
message GcpPubSubTopic {
  string api_version = 1 [(buf.validate.field).string.const = 'gcp.planton.dev/v1'];
  string kind = 2 [(buf.validate.field).string.const = 'GcpPubSubTopic'];
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];
  GcpPubSubTopicSpec spec = 4 [(buf.validate.field).required = true];
  GcpPubSubTopicStatus status = 5;
}

message GcpPubSubTopicStatus {
  GcpPubSubTopicStackOutputs outputs = 1;
}
