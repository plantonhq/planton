syntax = "proto3";

package dev.planton.provider.gcp.gcppubsubtopic.v1;

// Outputs produced after provisioning a GCP Pub/Sub topic.
message GcpPubSubTopicStackOutputs {
  // The fully qualified topic ID.
  // Format: projects/{project}/topics/{name}
  // This is the value downstream resources (subscriptions, schedulers,
  // Cloud Functions) use to reference this topic.
  string topic_id = 1;

  // The short topic name (same as the spec's topic_name input).
  string topic_name = 2;
}
