syntax = "proto3";

package dev.planton.provider.gcp.gcpfirewallrule.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/gcp/gcpfirewallrule/v1/spec.proto";
import "dev/planton/provider/gcp/gcpfirewallrule/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

//gcp-firewall-rule
message GcpFirewallRule {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'gcp.planton.dev/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'GcpFirewallRule'];

  //metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  GcpFirewallRuleSpec spec = 4 [(buf.validate.field).required = true];

  //status
  GcpFirewallRuleStatus status = 5;
}

//gcp-firewall-rule status
message GcpFirewallRuleStatus {
  //stack-outputs
  GcpFirewallRuleStackOutputs outputs = 1;
}
