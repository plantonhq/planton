syntax = "proto3";

package dev.planton.provider.gcp.gcpcloudcomposerenvironment.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/gcp/gcpcloudcomposerenvironment/v1/spec.proto";
import "dev/planton/provider/gcp/gcpcloudcomposerenvironment/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

//gcp-cloud-composer-environment
message GcpCloudComposerEnvironment {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = 'gcp.planton.dev/v1'];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = 'GcpCloudComposerEnvironment'];

  //metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  GcpCloudComposerEnvironmentSpec spec = 4 [(buf.validate.field).required = true];

  //status
  GcpCloudComposerEnvironmentStatus status = 5;
}

//gcp-cloud-composer-environment status
message GcpCloudComposerEnvironmentStatus {
  //stack-outputs
  GcpCloudComposerEnvironmentStackOutputs outputs = 1;
}
