apiVersion: gcp.planton.dev/v1
kind: GcpCertManagerCert
metadata:
  name: my-cert
spec:
  gcpProjectId: <gcp-project-id>
  primaryDomainName: <your-domain.com>
  cloudDnsZoneId:
    value: "<dns-zone-name>"
  certificateType: MANAGED  # default from spec; Google Certificate Manager
  validationMethod: DNS  # default from spec; automatic DNS validation via Cloud DNS
