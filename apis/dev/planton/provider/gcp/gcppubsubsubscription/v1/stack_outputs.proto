syntax = "proto3";

package dev.planton.provider.gcp.gcppubsubsubscription.v1;

// Outputs produced after provisioning a GCP Pub/Sub subscription.
message GcpPubSubSubscriptionStackOutputs {
  // The fully qualified subscription ID.
  // Format: projects/{project}/subscriptions/{name}
  // This is the value downstream resources use to reference this subscription.
  string subscription_id = 1;

  // The short subscription name (same as the spec's subscription_name input).
  string subscription_name = 2;
}
