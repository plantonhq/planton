syntax = "proto3";

package dev.planton.provider.gcp.gcppubsubsubscription.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/gcp/gcppubsubsubscription/v1/spec.proto";
import "dev/planton/provider/gcp/gcppubsubsubscription/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

//gcp-pubsub-subscription
message GcpPubSubSubscription {
  string api_version = 1 [(buf.validate.field).string.const = 'gcp.planton.dev/v1'];
  string kind = 2 [(buf.validate.field).string.const = 'GcpPubSubSubscription'];
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];
  GcpPubSubSubscriptionSpec spec = 4 [(buf.validate.field).required = true];
  GcpPubSubSubscriptionStatus status = 5;
}

message GcpPubSubSubscriptionStatus {
  GcpPubSubSubscriptionStackOutputs outputs = 1;
}
