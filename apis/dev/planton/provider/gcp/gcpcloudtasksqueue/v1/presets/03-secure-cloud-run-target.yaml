# secure-cloud-run-target: Queue with OIDC auth targeting a Cloud Run service
#
# Use when: You need to dispatch tasks to a Cloud Run (or Cloud Functions)
# service with automatic OIDC authentication and controlled dispatch rates.
# This is the recommended modern pattern for Cloud Tasks.
#
# What it configures:
# - OIDC token authentication (automatic token generation per dispatch)
# - HTTPS URI override pointing to a Cloud Run service
# - POST method with JSON content type header
# - 100 tasks/second with 50 concurrent dispatches
# - 3 retry attempts with moderate backoff
# - Full logging for production observability
#
# Typical use cases:
# - Cloud Run microservice task dispatch
# - Cloud Functions background processing
# - Serverless webhook delivery
apiVersion: gcp.planton.dev/v1
kind: GcpCloudTasksQueue
metadata:
  name: ${name}
spec:
  projectId:
    value: ${project-id}
  queueName: ${queue-name}
  location: ${location}
  httpTarget:
    httpMethod: POST
    oidcToken:
      serviceAccountEmail:
        value: ${service-account-email}
      audience: ${cloud-run-service-url}
    uriOverride:
      scheme: HTTPS
      host: ${cloud-run-service-host}
      enforceMode: ALWAYS
    headerOverrides:
      - key: Content-Type
        value: application/json
  rateLimits:
    maxDispatchesPerSecond: 100
    maxConcurrentDispatches: 50
  retryConfig:
    maxAttempts: 3
    minBackoff: "5s"
    maxBackoff: "300s"
    maxDoublings: 4
  stackdriverLoggingConfig:
    samplingRatio: 1.0
