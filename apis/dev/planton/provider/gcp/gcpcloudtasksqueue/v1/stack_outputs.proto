syntax = "proto3";

package dev.planton.provider.gcp.gcpcloudtasksqueue.v1;

// Outputs produced after provisioning a GCP Cloud Tasks queue.
message GcpCloudTasksQueueStackOutputs {
  // The fully qualified queue ID.
  // Format: projects/{project}/locations/{location}/queues/{name}
  // This is the value downstream resources use to reference this queue.
  string queue_id = 1;

  // The short queue name (same as the spec's queue_name input).
  string queue_name = 2;

  // The current state of the queue.
  // Possible values: RUNNING, PAUSED, DISABLED.
  string state = 3;
}
