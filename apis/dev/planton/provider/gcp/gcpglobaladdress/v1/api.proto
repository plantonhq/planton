syntax = "proto3";

package dev.planton.provider.gcp.gcpglobaladdress.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/gcp/gcpglobaladdress/v1/spec.proto";
import "dev/planton/provider/gcp/gcpglobaladdress/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

//gcp-global-address
message GcpGlobalAddress {
  string api_version = 1 [(buf.validate.field).string.const = 'gcp.planton.dev/v1'];
  string kind = 2 [(buf.validate.field).string.const = 'GcpGlobalAddress'];
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];
  GcpGlobalAddressSpec spec = 4 [(buf.validate.field).required = true];
  GcpGlobalAddressStatus status = 5;
}

message GcpGlobalAddressStatus {
  GcpGlobalAddressStackOutputs outputs = 1;
}
