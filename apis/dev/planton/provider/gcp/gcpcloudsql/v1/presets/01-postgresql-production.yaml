apiVersion: gcp.planton.dev/v1
kind: GcpCloudSql
metadata:
  name: my-postgresql
spec:
  projectId:
    value: "<gcp-project-id>"
  region: <gcp-region>
  databaseEngine: POSTGRESQL
  databaseVersion: POSTGRES_15
  tier: db-custom-2-8192  # 2 vCPU, 8 GB RAM
  storageGb: 20
  diskAutoResize: true  # recommended_default from spec
  edition: ENTERPRISE  # recommended_default from spec
  deletionProtection: true  # prevents accidental deletion
  queryInsightsEnabled: true  # query performance monitoring
  network:
    vpcId:
      value: "<vpc-network-id>"
    privateIpEnabled: true  # accessible only via VPC private IP
  highAvailability:
    enabled: true
    zone: <failover-zone>
  backup:
    enabled: true
    startTime: "02:00"  # 2 AM UTC
    retentionDays: 7  # recommended_default from spec
    pointInTimeRecoveryEnabled: true  # enables recovery to any second within retention window
  maintenanceWindow:
    day: 7  # Sunday
    hour: 4  # 4 AM UTC
    updateTrack: stable
