apiVersion: gcp.planton.dev/v1
kind: GcpCloudCdn
metadata:
  name: my-api-cdn
spec:
  gcpProjectId:
    value: "<gcp-project-id>"
  backend:
    cloudRunService:
      serviceName: <cloud-run-service-name>
      region: <gcp-region>
  cacheMode: USE_ORIGIN_HEADERS  # respect Cache-Control headers from Cloud Run service
  enableNegativeCaching: true  # cache error responses to protect backend
  frontendConfig:
    customDomains:
      - <your-domain.com>
    enableHttpsRedirect: true
