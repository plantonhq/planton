syntax = "proto3";

package dev.planton.provider.hetznercloud.hetznercloudprimaryip.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/hetznercloud/hetznercloudprimaryip/v1/spec.proto";
import "dev/planton/provider/hetznercloud/hetznercloudprimaryip/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// hetznercloud-primary-ip
message HetznerCloudPrimaryIp {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = "hetzner-cloud.planton.dev/v1"];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = "HetznerCloudPrimaryIp"];

  //metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  HetznerCloudPrimaryIpSpec spec = 4 [(buf.validate.field).required = true];

  //status
  HetznerCloudPrimaryIpStatus status = 5;
}

// hetznercloud-primary-ip status
message HetznerCloudPrimaryIpStatus {
  //stack-outputs
  //  hetznercloud-primary-ip stack-outputs
  HetznerCloudPrimaryIpStackOutputs outputs = 1;
}
