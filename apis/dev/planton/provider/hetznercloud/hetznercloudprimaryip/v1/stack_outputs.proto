syntax = "proto3";

package dev.planton.provider.hetznercloud.hetznercloudprimaryip.v1;

// HetznerCloudPrimaryIpStackOutputs captures the resulting IP identifiers
// and addresses after provisioning.
message HetznerCloudPrimaryIpStackOutputs {
  // The Hetzner Cloud numeric ID of the created Primary IP (as a string).
  // Referenced by HetznerCloudServer via StringValueOrRef to assign the IP
  // to a server at creation time.
  string primary_ip_id = 1;

  // The allocated IP address. For IPv4, this is a single address
  // (e.g., "203.0.113.42"). For IPv6, this is the first address in the
  // allocated /64 block (e.g., "2001:db8::1").
  string ip_address = 2;

  // The allocated IPv6 network in CIDR notation (e.g., "2001:db8::/64").
  // Empty for IPv4 Primary IPs.
  string ip_network = 3;
}
