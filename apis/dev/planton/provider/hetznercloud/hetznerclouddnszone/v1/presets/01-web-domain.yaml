apiVersion: hetzner-cloud.planton.dev/v1
kind: HetznerCloudDnsZone
metadata:
  name: my-web-domain
spec:
  domainName: <your-domain>
  mode: primary
  ttl: 3600  # default from spec
  deleteProtection: true
  recordSets:
    - name: "@"
      type: A
      records:
        - value:
            value: <server-ipv4-address>
    - name: www
      type: CNAME
      records:
        - value:
            value: <your-domain>.
    - name: "@"
      type: MX
      ttl: 3600
      records:
        - value:
            value: 10 <mail-server-hostname>.
    - name: "@"
      type: TXT
      records:
        - value:
            value: "\"v=spf1 include:<spf-include-domain> ~all\""
    - name: _dmarc
      type: TXT
      records:
        - value:
            value: "\"v=DMARC1; p=reject; rua=mailto:dmarc@<your-domain>\""
    - name: "@"
      type: CAA
      records:
        - value:
            value: 0 issue "letsencrypt.org"
