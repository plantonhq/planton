apiVersion: hetzner-cloud.planton.dev/v1
kind: HetznerCloudDnsZone
metadata:
  name: my-simple-zone
spec:
  domainName: <your-domain>
  mode: primary
  recordSets:
    - name: "@"
      type: A
      records:
        - value:
            value: <server-ipv4-address>
    - name: www
      type: CNAME
      records:
        - value:
            value: <your-domain>.
