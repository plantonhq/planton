syntax = "proto3";

package dev.planton.provider.hetznercloud.hetznercloudcertificate.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/hetznercloud/hetznercloudcertificate/v1/spec.proto";
import "dev/planton/provider/hetznercloud/hetznercloudcertificate/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// hetznercloud-certificate
message HetznerCloudCertificate {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = "hetzner-cloud.planton.dev/v1"];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = "HetznerCloudCertificate"];

  //metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  HetznerCloudCertificateSpec spec = 4 [(buf.validate.field).required = true];

  //status
  HetznerCloudCertificateStatus status = 5;
}

// hetznercloud-certificate status
message HetznerCloudCertificateStatus {
  //stack-outputs
  //  hetznercloud-certificate stack-outputs
  HetznerCloudCertificateStackOutputs outputs = 1;
}
