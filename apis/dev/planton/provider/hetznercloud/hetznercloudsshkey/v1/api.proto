syntax = "proto3";

package dev.planton.provider.hetznercloud.hetznercloudsshkey.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/hetznercloud/hetznercloudsshkey/v1/spec.proto";
import "dev/planton/provider/hetznercloud/hetznercloudsshkey/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// hetznercloud-ssh-key
message HetznerCloudSshKey {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = "hetzner-cloud.planton.dev/v1"];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = "HetznerCloudSshKey"];

  //metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  HetznerCloudSshKeySpec spec = 4 [(buf.validate.field).required = true];

  //status
  HetznerCloudSshKeyStatus status = 5;
}

// hetznercloud-ssh-key status
message HetznerCloudSshKeyStatus {
  //stack-outputs
  //  hetznercloud-ssh-key stack-outputs
  HetznerCloudSshKeyStackOutputs outputs = 1;
}
