apiVersion: hetzner-cloud.planton.dev/v1
kind: HetznerCloudLoadBalancer
metadata:
  name: hetznercloudloadbalancer-demo
  org: demo-org
  env: dev
  labels:
    team: platform
spec:
  loadBalancerType: lb11
  location: fsn1
  algorithm: round_robin
  services:
    - protocol: https
      listenPort: 443
      destinationPort: 8080
      http:
        certificateIds:
          - value: "12345"
        redirectHttp: true
        stickySessions: true
        cookieName: APPSESSION
        cookieLifetime: 3600
      healthCheck:
        protocol: http
        port: 8080
        interval: 10
        timeout: 5
        retries: 3
        http:
          path: /health
    - protocol: http
      listenPort: 80
      destinationPort: 8080
  serverTargets:
    - serverId:
        value: "11111"
      usePrivateIp: true
    - serverId:
        value: "22222"
      usePrivateIp: true
  network:
    networkId:
      value: "99999"
    ip: "10.0.1.100"
    enablePublicInterface: true
