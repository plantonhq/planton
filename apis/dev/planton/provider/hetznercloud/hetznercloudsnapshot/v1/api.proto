syntax = "proto3";

package dev.planton.provider.hetznercloud.hetznercloudsnapshot.v1;

import "buf/validate/validate.proto";
import "dev/planton/provider/hetznercloud/hetznercloudsnapshot/v1/spec.proto";
import "dev/planton/provider/hetznercloud/hetznercloudsnapshot/v1/stack_outputs.proto";
import "dev/planton/shared/metadata.proto";

// hetznercloud-snapshot
message HetznerCloudSnapshot {
  //api-version
  string api_version = 1 [(buf.validate.field).string.const = "hetzner-cloud.planton.dev/v1"];

  //resource-kind
  string kind = 2 [(buf.validate.field).string.const = "HetznerCloudSnapshot"];

  //metadata
  dev.planton.shared.CloudResourceMetadata metadata = 3 [(buf.validate.field).required = true];

  //spec
  HetznerCloudSnapshotSpec spec = 4 [(buf.validate.field).required = true];

  //status
  HetznerCloudSnapshotStatus status = 5;
}

// hetznercloud-snapshot status
message HetznerCloudSnapshotStatus {
  //stack-outputs
  //  hetznercloud-snapshot stack-outputs
  HetznerCloudSnapshotStackOutputs outputs = 1;
}
