apiVersion: digital-ocean.planton.dev/v1
kind: DigitalOceanAppPlatformService
metadata:
  name: my-web-app
spec:
  serviceName: my-web-app
  region: nyc1
  serviceType: web_service
  gitSource:
    repoUrl: "<your-github-repo-url>"
    branch: main
  instanceSizeSlug: basic_xxs  # recommended_default from spec
  instanceCount: 1  # recommended_default from spec
  env:
    NODE_ENV: production
