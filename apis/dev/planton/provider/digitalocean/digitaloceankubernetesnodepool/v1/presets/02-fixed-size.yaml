apiVersion: digital-ocean.planton.dev/v1
kind: DigitalOceanKubernetesNodePool
metadata:
  name: my-system-pool
spec:
  nodePoolName: system-pool
  cluster:
    value: "<cluster-name>"
  size: s-2vcpu-4gb
  nodeCount: 2
  labels:
    workload: system
  taints:
    - key: dedicated
      value: system
      effect: NoSchedule
  tags:
    - production
