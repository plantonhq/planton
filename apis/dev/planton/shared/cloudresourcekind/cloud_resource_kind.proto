syntax = "proto3";

package dev.planton.shared.cloudresourcekind;

import "dev/planton/shared/cloudresourcekind/cloud_resource_provider.proto";
import "google/protobuf/descriptor.proto";

//enum value options for api-resource-kind
extend google.protobuf.EnumValueOptions {
  CloudResourceKindMeta kind_meta = 10100;
}

//cloud-resource-kind version
enum CloudResourceKindVersion {
  cloud_resource_kind_version_unspecified = 0;
  v1 = 1;
}

//api-resource-kind cloud-resource meta
message CloudResourceKindMeta {
  //cloud-resource provider
  CloudResourceProvider provider = 1;

  //cloud-resource kind version
  CloudResourceKindVersion version = 2;

  //name of the kind. this might be different from the enum value.
  // ex: AwsVpcV2 enum will still have "kind: AwsVpc" but groupVersion will have "aws.planton.dev/v2".
  //this is only set in options when the name is different from enum value.
  string name = 3;

  //cloud-resource id-prefix
  string id_prefix = 4;

  //flag indicating whether the cloud-resource kind can be used to launch a service.
  bool is_service_kind = 5;

  //flag indicating whether the cloud-resource kind is a container kind.
  //container kinds are resources that logically contain other resources
  //(e.g., a Kubernetes namespace contains deployments, a VPC contains subnets).
  //used by the organization graph to render hierarchical architecture diagrams
  //where container resources visually enclose their child resources.
  bool container_kind = 6;

  //components that must be deployed before this component can function.
  //order matters: index 0 is deployed first. the E2E framework installs these
  //(resolved transitively) before the component under test and tears them down
  //in reverse order; a component may pin a prerequisite's exact config via an
  //e2e/fixtures/ override, which wins over the registry entry. this is also
  //used by the platform for dependency ordering in infra charts.
  //example: KubernetesPostgres needs KubernetesZalandoPostgresOperator
  //because it creates acid.zalan.do/v1 postgresql CRDs.
  repeated CloudResourceKind prerequisites = 7;

  //set ONLY for kinds whose spec is a direct projection of a single Kubernetes
  //custom resource -- i.e. the Terraform module is a thin `kubernetes_manifest`
  //passthrough rather than hand-written provider logic. its presence flips the
  //proto->tfvars converter to emit the manifest-shaped (camelCase, pruned) spec
  //and drives deterministic thin-module generation (see `planton tofu
  //generate-module`). absent for provider-abstraction kinds (aws/gcp/etc.),
  //which keep idiomatic snake_case typed variables. the api_version/kind here
  //are the UPSTREAM CRD's group-version-kind, distinct from the Planton
  //groupVersion returned by crkreflect.GroupVersion.
  KubernetesManifestProjection kubernetes_manifest_projection = 8;
}

//identifies the upstream Kubernetes custom resource that a CloudResourceKind
//projects onto. carried on CloudResourceKindMeta for projection kinds only.
message KubernetesManifestProjection {
  //upstream CRD groupVersion, e.g. "networking.istio.io/v1".
  string api_version = 1;
  //upstream CRD kind, e.g. "DestinationRule".
  string kind = 2;
}

