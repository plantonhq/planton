apiVersion: oci.openmcf.org/v1
kind: OciApiGateway
metadata:
  name: my-api-gateway
spec:
  compartmentId:
    value: <compartment-ocid>
  endpointType: endpoint_type_public
  subnetId:
    value: <public-subnet-ocid>
  displayName: api-gateway
  networkSecurityGroupIds:
    - value: <gateway-nsg-ocid>
  deployment:
    pathPrefix: /api/v1
    displayName: api-deployment
    loggingPolicies:
      accessLog:
        isEnabled: true
      executionLog:
        isEnabled: true
        logLevel: info
    requestPolicies:
      cors:
        allowedOrigins:
          - https://<frontend-domain>
        allowedMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        allowedHeaders:
          - Content-Type
          - Authorization
        exposedHeaders:
          - X-Request-Id
        isAllowCredentialsEnabled: true
        maxAgeInSeconds: 3600
    routes:
      - path: /health
        methods:
          - GET
        backend:
          type: stock_response
          status: 200
          body: '{"status":"ok"}'
      - path: /{path*}
        methods:
          - GET
          - POST
          - PUT
          - DELETE
        backend:
          type: http
          url: <backend-url>
          connectTimeoutInSeconds: 10
          readTimeoutInSeconds: 30
          sendTimeoutInSeconds: 30
