apiVersion: oci.openmcf.org/v1
kind: OciQueue
metadata:
  name: my-enterprise-queue
spec:
  compartmentId:
    value: <compartment-ocid>
  customEncryptionKeyId:
    value: <kms-key-ocid>
  retentionInSeconds: 604800 # 7 days
  visibilityInSeconds: 120
  timeoutInSeconds: 30
  deadLetterQueueDeliveryCount: 3
  isLargeMessagesEnabled: true
  consumerGroupConfig:
    isPrimaryEnabled: true
    primaryDeadLetterQueueDeliveryCount: 3
    primaryDisplayName: primary-consumers
