apiVersion: oci.openmcf.org/v1
kind: OciFileSystem
metadata:
  name: my-multi-export-fs
spec:
  compartmentId:
    value: <compartment-ocid>
  availabilityDomain: <availability-domain>
  displayName: multi-export-fs
  kmsKeyId:
    value: <kms-key-ocid>
  mountTarget:
    subnetId:
      value: <private-subnet-ocid>
    displayName: multi-export-mt
    hostnameLabel: multiexport
    nsgIds:
      - value: <nfs-nsg-ocid>
  exports:
    - path: /app-data
      exportOptions:
        - source: <app-subnet-cidr>
          access: read_write
          identitySquash: root_squash
          requirePrivilegedSourcePort: true
          anonymousUid: 65534
          anonymousGid: 65534
    - path: /logs
      exportOptions:
        - source: <app-subnet-cidr>
          access: read_write
          identitySquash: root_squash
          requirePrivilegedSourcePort: true
          anonymousUid: 65534
          anonymousGid: 65534
        - source: <monitoring-subnet-cidr>
          access: read_only
          identitySquash: all_squash
          requirePrivilegedSourcePort: true
          anonymousUid: 65534
          anonymousGid: 65534
