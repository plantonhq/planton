apiVersion: hetznercloud.openmcf.org/v1
kind: HetznerCloudDnsZone
metadata:
  name: my-secondary-zone
spec:
  domainName: <your-domain>
  mode: secondary
  deleteProtection: true
  primaryNameservers:
    - address: <primary-ns-ip-address>
      tsigAlgorithm: <tsig-algorithm>
      tsigKey: <tsig-key>
