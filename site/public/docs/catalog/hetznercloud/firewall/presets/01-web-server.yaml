apiVersion: hetzner-cloud.openmcf.org/v1
kind: HetznerCloudFirewall
metadata:
  name: my-web-server-firewall
spec:
  rules:
    - direction: in
      protocol: tcp
      port: "22"
      sourceIps:
        - 0.0.0.0/0
        - "::/0"
      description: allow SSH
    - direction: in
      protocol: tcp
      port: "80"
      sourceIps:
        - 0.0.0.0/0
        - "::/0"
      description: allow HTTP
    - direction: in
      protocol: tcp
      port: "443"
      sourceIps:
        - 0.0.0.0/0
        - "::/0"
      description: allow HTTPS
    - direction: in
      protocol: icmp
      sourceIps:
        - 0.0.0.0/0
        - "::/0"
      description: allow ping
