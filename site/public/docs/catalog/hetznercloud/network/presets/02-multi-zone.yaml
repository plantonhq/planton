apiVersion: hetzner-cloud.openmcf.org/v1
kind: HetznerCloudNetwork
metadata:
  name: my-multi-zone-network
spec:
  ipRange: 10.0.0.0/16
  subnets:
    - type: cloud
      networkZone: eu-central
      ipRange: 10.0.1.0/24
    - type: cloud
      networkZone: us-east
      ipRange: 10.0.2.0/24
  deleteProtection: true
