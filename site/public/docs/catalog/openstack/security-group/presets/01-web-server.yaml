apiVersion: openstack.openmcf.org/v1
kind: OpenStackSecurityGroup
metadata:
  name: my-web-server-sg
spec:
  description: Allow SSH, HTTP, and HTTPS ingress with unrestricted egress
  rules:
    - key: allow-ssh
      direction: ingress
      ethertype: IPv4
      protocol: tcp
      portRangeMin: 22
      portRangeMax: 22
      remoteIpPrefix: <trusted-cidr>
      description: SSH access from trusted network
    - key: allow-http
      direction: ingress
      ethertype: IPv4
      protocol: tcp
      portRangeMin: 80
      portRangeMax: 80
      remoteIpPrefix: 0.0.0.0/0
      description: HTTP from anywhere
    - key: allow-https
      direction: ingress
      ethertype: IPv4
      protocol: tcp
      portRangeMin: 443
      portRangeMax: 443
      remoteIpPrefix: 0.0.0.0/0
      description: HTTPS from anywhere
