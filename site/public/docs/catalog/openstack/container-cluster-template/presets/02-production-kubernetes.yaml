apiVersion: openstack.openmcf.org/v1
kind: OpenStackContainerClusterTemplate
metadata:
  name: my-production-k8s-template
spec:
  coe: kubernetes
  image:
    value: <fedora-coreos-image-id>
  networkDriver: flannel
  dnsNameserver: 8.8.8.8
  externalNetwork:
    value: <external-network-id>
  fixedNetwork:
    value: <fixed-network-id>
  fixedSubnet:
    value: <fixed-subnet-id>
  masterLbEnabled: true
  floatingIpEnabled: true
  dockerVolumeSize: 50
