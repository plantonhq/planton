apiVersion: civo.openmcf.org/v1
kind: CivoFirewall
metadata:
  name: my-database-firewall
spec:
  name: my-database-firewall
  networkId:
    value: "<vpc-network-id>"
  inboundRules:
    - protocol: tcp
      portRange: "5432"
      cidrs:
        - "<app-tier-cidr>"
      action: allow
      label: PostgreSQL from app tier
    - protocol: tcp
      portRange: "3306"
      cidrs:
        - "<app-tier-cidr>"
      action: allow
      label: MySQL from app tier
  tags:
    - database
