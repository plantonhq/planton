apiVersion: civo.openmcf.org/v1
kind: CivoComputeInstance
metadata:
  name: my-web-server
spec:
  instanceName: my-web-server
  region: lon1
  size: g3.medium
  image: ubuntu-jammy
  network:
    value: "<vpc-network-id>"
  firewallIds:
    - value: "<web-firewall-id>"
  tags:
    - web
    - production
  userData: |
    #!/bin/bash
    apt-get update && apt-get upgrade -y
