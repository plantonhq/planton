apiVersion: azure.openmcf.org/v1
kind: AzureNatGateway
metadata:
  name: my-nat-gateway
spec:
  region: <azure-region>
  resourceGroup:
    value: "<your-resource-group-name>"
  subnetId:
    value: "<subnet-resource-id>"
  idleTimeoutMinutes: 10  # 10 min balances connection reuse vs resource cleanup
