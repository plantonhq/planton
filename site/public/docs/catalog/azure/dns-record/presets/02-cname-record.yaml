apiVersion: azure.openmcf.org/v1
kind: AzureDnsRecord
metadata:
  name: my-cname-record
spec:
  resourceGroup:
    value: "<your-resource-group-name>"
  zoneName:
    value: "<your-domain.com>"
  type: CNAME
  name: <subdomain>
  values:
    - <target-hostname>
  ttlSeconds: 300  # default from spec; 5 minutes
