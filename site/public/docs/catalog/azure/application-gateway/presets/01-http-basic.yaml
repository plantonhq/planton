apiVersion: azure.openmcf.org/v1
kind: AzureApplicationGateway
metadata:
  name: my-app-gateway
spec:
  region: <azure-region>
  resourceGroup:
    value: "<your-resource-group-name>"
  name: <your-appgw-name>
  subnetId:
    value: "<dedicated-subnet-resource-id>"
  publicIpId:
    value: "<public-ip-resource-id>"
  sku: Standard_v2
  capacity: 2  # default from spec
  backendAddressPools:
    - name: default
      fqdns:
        - <your-backend-fqdn>
  backendHttpSettings:
    - name: http-settings
      port: 80
      protocol: Http
      cookieBasedAffinity: Disabled  # default from spec
      requestTimeout: 30  # default from spec
      probeName: http-probe
  httpListeners:
    - name: http-listener
      port: 80
      protocol: Http
  requestRoutingRules:
    - name: http-rule
      httpListenerName: http-listener
      backendAddressPoolName: default
      backendHttpSettingsName: http-settings
      priority: 100
  probes:
    - name: http-probe
      protocol: Http
      path: /health
      interval: 30  # default from spec
      timeout: 30  # default from spec
      unhealthyThreshold: 3  # default from spec
