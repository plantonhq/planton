apiVersion: azure.openmcf.org/v1
kind: AzureApplicationGateway
metadata:
  name: my-waf-gateway
spec:
  region: <azure-region>
  resourceGroup:
    value: "<your-resource-group-name>"
  name: <your-appgw-name>
  subnetId:
    value: "<dedicated-subnet-resource-id>"
  publicIpId:
    value: "<public-ip-resource-id>"
  sku: WAF_v2
  capacity: 2  # default from spec
  wafEnabled: true
  wafMode: Prevention  # default from spec; blocks attacks
  enableHttp2: true
  identityIds:
    - value: "<user-assigned-identity-resource-id>"
  sslCertificates:
    - name: wildcard-cert
      keyVaultSecretId: <key-vault-certificate-secret-uri>
  backendAddressPools:
    - name: default
      fqdns:
        - <your-backend-fqdn>
  backendHttpSettings:
    - name: https-settings
      port: 443
      protocol: Https
      cookieBasedAffinity: Disabled  # default from spec
      requestTimeout: 30  # default from spec
      probeName: https-probe
      pickHostNameFromBackendAddress: true
  httpListeners:
    - name: https-listener
      port: 443
      protocol: Https
      sslCertificateName: wildcard-cert
    - name: http-redirect-listener
      port: 80
      protocol: Http
  requestRoutingRules:
    - name: https-rule
      httpListenerName: https-listener
      backendAddressPoolName: default
      backendHttpSettingsName: https-settings
      priority: 100
    - name: http-redirect-rule
      httpListenerName: http-redirect-listener
      backendAddressPoolName: default
      backendHttpSettingsName: https-settings
      priority: 200
  probes:
    - name: https-probe
      protocol: Https
      path: /health
      interval: 30  # default from spec
      timeout: 30  # default from spec
      unhealthyThreshold: 3  # default from spec
