apiVersion: azure.openmcf.org/v1
kind: AzureLinuxWebApp
metadata:
  name: my-container-webapp
spec:
  region: eastus
  resource_group:
    value: "<your-resource-group-name>"
  name: my-container-webapp
  service_plan_id:
    value: "<your-premium-plan-id>"
  https_only: true
  identity:
    type: SystemAssigned
  app_settings:
    WEBSITES_PORT: "8080"
  site_config:
    application_stack:
      docker:
        registry_url: https://<your-registry>.azurecr.io
        image_name: <your-org>/<your-web-app>
        image_tag: latest
    container_registry_use_managed_identity: true
    health_check_path: /health
    always_on: true
    minimum_tls_version: "1.2"
    ftps_state: Disabled
