apiVersion: azure.openmcf.org/v1
kind: AzureSubnet
metadata:
  name: my-container-apps-subnet
spec:
  resourceGroup:
    value: "<your-resource-group-name>"
  vnetId:
    value: "<vnet-resource-id>"
  name: container-apps
  addressPrefix: 10.0.4.0/21  # /21 = 2,048 IPs — minimum recommended for Container Apps
  delegation:
    name: container-apps-delegation
    serviceName: Microsoft.App/environments
    actions:
      - Microsoft.Network/virtualNetworks/subnets/join/action
