apiVersion: azure.openmcf.org/v1
kind: AzureContainerApp
metadata:
  name: my-web-service
spec:
  resourceGroup:
    value: "<your-resource-group-name>"
  name: my-web-service
  containerAppEnvironmentId:
    value: "<container-app-environment-id>"
  containers:
    - name: web
      image: mcr.microsoft.com/k8se/quickstart:latest
      cpu: 0.5
      memory: "1Gi"
      livenessProbe:
        transport: HTTP
        port: 8080
        path: /healthz
      readinessProbe:
        transport: HTTP
        port: 8080
        path: /ready
  minReplicas: 1
  maxReplicas: 10
  httpScaleRules:
    - name: http-requests
      concurrentRequests: "100"
  ingress:
    externalEnabled: true
    targetPort: 8080
    trafficWeight:
      - latestRevision: true
        percentage: 100
