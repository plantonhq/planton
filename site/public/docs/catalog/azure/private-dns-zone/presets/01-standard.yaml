apiVersion: azure.openmcf.org/v1
kind: AzurePrivateDnsZone
metadata:
  name: my-private-dns-zone
spec:
  resourceGroup:
    value: "<your-resource-group-name>"
  name: privatelink.postgres.database.azure.com
  vnetId:
    value: "<vnet-resource-id>"
  registrationEnabled: false  # default from spec; Private Link zones should not auto-register VM records
