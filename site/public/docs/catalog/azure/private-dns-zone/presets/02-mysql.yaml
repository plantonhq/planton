apiVersion: azure.openmcf.org/v1
kind: AzurePrivateDnsZone
metadata:
  name: my-mysql-dns-zone
spec:
  resourceGroup:
    value: "<your-resource-group-name>"
  name: privatelink.mysql.database.azure.com
  vnetId:
    value: "<vnet-resource-id>"
  registrationEnabled: false  # Private Link zones should not auto-register VM records
