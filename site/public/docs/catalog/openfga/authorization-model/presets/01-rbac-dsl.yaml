apiVersion: openfga.openmcf.org/v1
kind: OpenFgaAuthorizationModel
metadata:
  name: my-rbac-model
spec:
  storeId:
    value: "<store-id>"
  modelDsl: |
    model
      schema 1.1

    type user

    type group
      relations
        define member: [user]

    type document
      relations
        define viewer: [user, group#member]
        define editor: [user, group#member]
        define owner: [user]
