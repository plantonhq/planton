apiVersion: gcp.openmcf.org/v1
kind: GcpDataprocVirtualCluster
metadata:
  name: my-prod-spark-on-gke
spec:
  projectId:
    value: "<your-gcp-project-id>"
  region: us-central1
  gkeClusterTarget:
    value: "<your-gke-cluster-resource-id>"
  kubernetesNamespace:
    value: "<your-kubernetes-namespace>"
  stagingBucket:
    value: "<your-staging-bucket-name>"
  softwareConfig:
    componentVersion:
      SPARK: "3.5-dataproc-17"
    properties:
      "spark:spark.executor.memory": "8g"
      "spark:spark.driver.memory": "4g"
      "spark:spark.dynamicAllocation.enabled": "true"
  nodePoolTargets:
    - nodePool:
        value: "<your-default-pool-name>"
      roles:
        - DEFAULT
        - CONTROLLER
      nodePoolConfig:
        machineType: e2-standard-4
        autoscaling:
          minNodeCount: 1
          maxNodeCount: 3
    - nodePool:
        value: "<your-driver-pool-name>"
      roles:
        - SPARK_DRIVER
      nodePoolConfig:
        machineType: n2-standard-4
        autoscaling:
          minNodeCount: 1
          maxNodeCount: 5
    - nodePool:
        value: "<your-executor-pool-name>"
      roles:
        - SPARK_EXECUTOR
      nodePoolConfig:
        machineType: n2-standard-8
        spot: true
        autoscaling:
          minNodeCount: 0
          maxNodeCount: 30
