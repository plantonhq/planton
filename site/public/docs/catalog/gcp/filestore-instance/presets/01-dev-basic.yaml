apiVersion: gcp.openmcf.org/v1
kind: GcpFilestoreInstance
metadata:
  name: dev-nfs
spec:
  projectId:
    value: "<gcp-project-id>"
  instanceName: <instance-name>
  location: <gcp-zone>
  tier: BASIC_SSD
  fileShare:
    name: vol1
    capacityGb: 2560
  networkConfig:
    network:
      value: default
