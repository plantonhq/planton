apiVersion: gcp.openmcf.org/v1
kind: GcpCloudSql
metadata:
  name: my-mysql
spec:
  projectId:
    value: "<gcp-project-id>"
  region: <gcp-region>
  databaseEngine: MYSQL
  databaseVersion: MYSQL_8_0
  tier: db-custom-2-8192  # 2 vCPU, 8 GB RAM
  storageGb: 20
  diskAutoresize: true  # recommended_default from spec
  edition: ENTERPRISE  # recommended_default from spec
  deletionProtection: true
  queryInsightsEnabled: true
  network:
    vpcId:
      value: "<vpc-network-id>"
    privateIpEnabled: true
  highAvailability:
    enabled: true
    zone: <failover-zone>
  backup:
    enabled: true
    startTime: "02:00"
    retentionDays: 7  # recommended_default from spec
    pointInTimeRecoveryEnabled: true
  maintenanceWindow:
    day: 7  # Sunday
    hour: 4
    updateTrack: stable
