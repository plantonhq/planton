apiVersion: gcp.openmcf.org/v1
kind: GcpCloudCdn
metadata:
  name: my-static-cdn
spec:
  gcpProjectId:
    value: "<gcp-project-id>"
  backend:
    gcsBucket:
      bucketName: <gcs-bucket-name>
  cacheMode: CACHE_ALL_STATIC  # automatically caches CSS, JS, images, fonts
  defaultTtlSeconds: 3600  # 1 hour for content without Cache-Control headers
  maxTtlSeconds: 86400  # 1 day hard ceiling
  enableNegativeCaching: true  # cache 404s to reduce origin load
