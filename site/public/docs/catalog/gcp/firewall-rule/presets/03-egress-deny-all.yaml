apiVersion: gcp.openmcf.org/v1
kind: GcpFirewallRule
metadata:
  name: my-deny-all-egress
spec:
  projectId:
    value: "<gcp-project-id>"
  network:
    value: "<vpc-network-name-or-self-link>"
  ruleName: <your-rule-name>  # e.g., deny-all-egress
  direction: EGRESS
  action: DENY
  rules:
    - protocol: all  # matches all IP protocols (tcp, udp, icmp, etc.)
  destinationRanges:
    - 0.0.0.0/0  # all IPv4 destinations
  priority: 65534  # just above GCP's implied allow-all-egress at 65535
  description: Deny all outbound traffic by default; add higher-priority allow rules for specific destinations
