apiVersion: gcp.openmcf.org/v1
kind: GcpCloudComposerEnvironment
metadata:
  name: my-dev-composer
spec:
  projectId:
    value: "<your-gcp-project-id>"
  region: us-central1
  environmentSize: ENVIRONMENT_SIZE_SMALL
  softwareConfig:
    imageVersion: "<composer-2-latest-airflow-version>"
  workloadsConfig:
    scheduler:
      cpu: 0.5
      memoryGb: 2.0
      storageGb: 1.0
      count: 1
    webServer:
      cpu: 0.5
      memoryGb: 2.0
      storageGb: 1.0
    worker:
      cpu: 0.5
      memoryGb: 2.0
      storageGb: 1.0
      minCount: 1
      maxCount: 3
