apiVersion: gcp.openmcf.org/v1
kind: GcpCloudFunction
metadata:
  name: my-http-function
spec:
  projectId:
    value: "<gcp-project-id>"
  region: <gcp-region>
  buildConfig:
    runtime: nodejs20
    entryPoint: helloHttp
    source:
      bucket: <source-bucket-name>
      object: <source-archive-path>
  serviceConfig:
    availableMemoryMb: 256  # recommended_default from spec
    timeoutSeconds: 60  # recommended_default from spec
    maxInstanceRequestConcurrency: 80  # recommended_default from spec
    ingressSettings: ALLOW_ALL  # recommended_default from spec
    allowUnauthenticated: false  # recommended_default from spec; requires IAM invoker role
    scaling:
      minInstanceCount: 0  # recommended_default from spec; scale-to-zero
      maxInstanceCount: 100  # recommended_default from spec
  trigger:
    triggerType: HTTP  # recommended_default from spec
