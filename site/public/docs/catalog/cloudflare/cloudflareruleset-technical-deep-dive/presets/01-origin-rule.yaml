apiVersion: cloudflare.openmcf.org/v1
kind: CloudflareRuleset
metadata:
  name: my-origin-routing
spec:
  zone_id:
    value: "<cloudflare-zone-id>"
  ruleset_kind: zone
  phase: http_request_origin
  name: "Route non-marketing traffic to application origin"
  rules:
    - ref: "route-app-to-backend"
      expression: >-
        not (
          http.request.uri.path eq "/" or
          http.request.uri.path starts_with "/docs" or
          http.request.uri.path starts_with "/features" or
          http.request.uri.path starts_with "/pricing" or
          http.request.uri.path starts_with "/_site"
        )
      action: route
      description: "Route application paths to backend origin"
      enabled: true
      action_parameters:
        host_header: "<your-domain>"
        origin:
          host: "<backend-hostname>"
          port: 443
