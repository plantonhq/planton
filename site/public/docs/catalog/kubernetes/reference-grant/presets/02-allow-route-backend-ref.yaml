apiVersion: kubernetes.openmcf.org/v1
kind: KubernetesReferenceGrant
metadata:
  name: allow-route-backend-ref
spec:
  namespace:
    value: <backend-namespace>
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: <route-namespace>
    - group: gateway.networking.k8s.io
      kind: GRPCRoute
      namespace: <route-namespace>
  to:
    - group: ""
      kind: Service
