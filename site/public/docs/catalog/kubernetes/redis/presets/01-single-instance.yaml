apiVersion: kubernetes.openmcf.org/v1
kind: KubernetesRedis
metadata:
  name: my-redis
spec:
  namespace:
    value: "<your-namespace>"
  createNamespace: false
  container:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 100Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    persistenceEnabled: true
    diskSize: 1Gi
