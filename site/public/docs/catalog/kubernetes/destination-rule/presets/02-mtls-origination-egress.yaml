apiVersion: kubernetes.openmcf.org/v1
kind: KubernetesDestinationRule
metadata:
  name: egress-mtls
  relationships:
    - kind: KubernetesSecret
      name: <credential-secret>
      type: uses
spec:
  namespace:
    value: <namespace>
  host: <external-host>
  workload_selector:
    match_labels:
      app: <client-app-label>
  traffic_policy:
    tls:
      mode: MUTUAL
      credential_name: <credential-secret>
      sni: <external-host>
