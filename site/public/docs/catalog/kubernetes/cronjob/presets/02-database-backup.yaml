apiVersion: kubernetes.openmcf.org/v1
kind: KubernetesCronJob
metadata:
  name: my-database-backup
spec:
  namespace:
    value: "<your-namespace>"
  createNamespace: false
  image:
    repo: "<your-container-registry>/<your-backup-image>"
    tag: "<your-image-tag>"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  schedule: "0 2 * * *"  # daily at 2:00 AM UTC
  concurrencyPolicy: Forbid
  restartPolicy: OnFailure
  backoffLimit: 3
  startingDeadlineSeconds: 600  # 10-minute window
  successfulJobsHistoryLimit: 7  # keep one week of successful backups
  failedJobsHistoryLimit: 3
  env:
    variables:
      DATABASE_URL:
        value: "<your-database-connection-string>"
      BACKUP_BUCKET:
        value: "<your-backup-bucket-name>"
  command:
    - /bin/sh
    - -c
    - pg_dump $DATABASE_URL | gzip | aws s3 cp - s3://$BACKUP_BUCKET/backup-$(date +%Y%m%d).sql.gz
