apiVersion: kubernetes.openmcf.org/v1
kind: KubernetesJob
metadata:
  name: my-data-migration
spec:
  namespace:
    value: "<your-namespace>"
  createNamespace: false
  image:
    repo: "<your-container-registry>/<your-migration-image>"
    tag: "<your-image-tag>"
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  completions: 1
  parallelism: 1
  backoffLimit: 1
  activeDeadlineSeconds: 3600  # 1-hour timeout
  restartPolicy: Never
  env:
    variables:
      - name: DATABASE_URL
        value: "<your-database-connection-string>"
  command:
    - /bin/sh
    - -c
    - "<your-migration-command>"
