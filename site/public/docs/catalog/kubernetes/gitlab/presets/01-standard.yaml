apiVersion: kubernetes.openmcf.org/v1
kind: KubernetesGitlab
metadata:
  name: my-gitlab
spec:
  namespace:
    value: gitlab
  createNamespace: true
  container:
    resources:
      requests:
        cpu: 250m
        memory: 1Gi
      limits:
        cpu: 4000m
        memory: 8Gi
  ingress:
    enabled: true
    hostname: "<your-gitlab.example.com>"
