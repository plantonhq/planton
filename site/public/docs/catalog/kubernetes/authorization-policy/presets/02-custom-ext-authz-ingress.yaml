apiVersion: kubernetes.openmcf.org/v1
kind: KubernetesAuthorizationPolicy
metadata:
  name: ext-authz
spec:
  namespace:
    value: istio-system
  selector:
    match_labels:
      app: istio-ingressgateway
  action: CUSTOM
  provider:
    name: <ext-authz-provider>
  rules:
    - to:
        - operation:
            paths:
              - /admin/*
