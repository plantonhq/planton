apiVersion: kubernetes.openmcf.org/v1
kind: KubernetesElasticsearch
metadata:
  name: my-elasticsearch
spec:
  namespace:
    value: "<your-namespace>"
  createNamespace: false
  elasticsearch:
    container:
      replicas: 3
      resources:
        requests:
          cpu: 250m
          memory: 1Gi
        limits:
          cpu: 2000m
          memory: 8Gi
      persistenceEnabled: true
      diskSize: 50Gi
  kibana:
    enabled: true
    container:
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 1000m
          memory: 1Gi
    ingress:
      enabled: true
      hostname: "<your-kibana.example.com>"
