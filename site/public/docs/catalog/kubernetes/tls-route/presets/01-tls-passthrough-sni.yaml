apiVersion: kubernetes.openmcf.org/v1
kind: KubernetesTlsRoute
metadata:
  name: my-tls-route
spec:
  namespace:
    value: app-ns
  parentRefs:
    - name: <gateway-name>
      sectionName: tls
  hostnames:
    - <sni-hostname>
  rules:
    - backendRefs:
        - name: <service-name>
          port: 8443
