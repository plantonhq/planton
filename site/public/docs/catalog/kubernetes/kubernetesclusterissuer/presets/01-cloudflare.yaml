apiVersion: kubernetes.openmcf.org/v1
kind: KubernetesClusterIssuer
metadata:
  name: my-cluster-issuer
spec:
  certManagerNamespace:
    value: cert-manager
  dnsDomain: "<your-domain.com>"
  acme:
    email: "<your-acme-email@example.com>"
    server: https://acme-v02.api.letsencrypt.org/directory  # default from spec
  cloudflare:
    apiToken: "<your-cloudflare-api-token>"
