apiVersion: kubernetes.openmcf.org/v1
kind: KubernetesOpenBao
metadata:
  name: my-openbao
spec:
  namespace:
    value: openbao
  createNamespace: true
  serverContainer:
    resources:
      requests:
        cpu: 50m
        memory: 100Mi
      limits:
        cpu: 500m
        memory: 512Mi
  uiEnabled: true
  ingress:
    enabled: true
    hostname: "<your-openbao.example.com>"
