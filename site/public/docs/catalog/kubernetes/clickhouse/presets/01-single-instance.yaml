apiVersion: kubernetes.openmcf.org/v1
kind: KubernetesClickHouse
metadata:
  name: my-clickhouse
spec:
  namespace:
    value: "<your-namespace>"
  createNamespace: false
  container:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 2000m
        memory: 4Gi
    persistenceEnabled: true
    diskSize: 20Gi
