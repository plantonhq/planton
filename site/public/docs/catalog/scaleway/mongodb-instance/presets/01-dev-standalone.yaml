apiVersion: scaleway.openmcf.org/v1
kind: ScalewayMongodbInstance
metadata:
  name: my-mongodb
spec:
  region: fr-par
  version: 7.0.12
  nodeType: MGDB-PLAY2-NANO
  nodeNumber: 1
  volumeType: sbs_5k  # recommended_default from spec
  volumeSizeInGb: 10
  adminUser: <your-admin-user>
  adminPassword: <your-admin-password>
