apiVersion: scaleway.openmcf.org/v1
kind: ScalewayPublicGateway
metadata:
  name: my-gateway
spec:
  privateNetworkId:
    value: "<your-private-network-id>"
  zone: fr-par-1
  type: VPC-GW-S  # recommended_default from spec
  enableMasquerade: true  # recommended_default from spec
  bastion:
    enabled: true
    port: 22  # recommended_default from spec
    allowedIpRanges:
      - "<your-office-cidr>"
