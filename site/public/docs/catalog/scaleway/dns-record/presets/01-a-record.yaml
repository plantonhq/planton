apiVersion: scaleway.openmcf.org/v1
kind: ScalewayDnsRecord
metadata:
  name: my-a-record
spec:
  zoneName:
    value: "<your-dns-zone-name>"
  name: app
  type: A
  data:
    value: "<your-server-ip>"
  ttl: 3600  # recommended_default from spec
  keepEmptyZone: true  # recommended_default from spec
