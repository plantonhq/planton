apiVersion: digital-ocean.openmcf.org/v1
kind: DigitalOceanKubernetesCluster
metadata:
  name: my-production-cluster
spec:
  clusterName: my-production-cluster
  region: nyc1
  kubernetesVersion: "1.31"
  vpc:
    value: "<vpc-name>"
  highlyAvailable: true  # HA control plane for production uptime
  autoUpgrade: true
  maintenanceWindow: "sunday=03:00"
  registryIntegration: true  # Enable DOCR image pull
  controlPlaneFirewallAllowedIps:
    - "<your-management-cidr>"
  tags:
    - production
    - kubernetes
  defaultNodePool:
    size: s-4vcpu-8gb
    autoScale: true
    nodeCount: 3
    minNodes: 2
    maxNodes: 5
