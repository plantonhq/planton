apiVersion: digital-ocean.openmcf.org/v1
kind: DigitalOceanKubernetesNodePool
metadata:
  name: my-app-pool
spec:
  nodePoolName: app-pool
  cluster:
    value: "<cluster-name>"
  size: s-4vcpu-8gb
  nodeCount: 3
  autoScale: true
  minNodes: 2
  maxNodes: 6
  labels:
    workload: app
  tags:
    - production
