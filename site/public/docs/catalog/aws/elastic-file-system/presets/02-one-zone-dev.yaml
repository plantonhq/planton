apiVersion: aws.openmcf.org/v1
kind: AwsElasticFileSystem
metadata:
  org: example-org
  env: dev
  name: dev-efs-one-zone
  id: dev-efs-one-zone-id
spec:
  region: <aws-region>
  encrypted: true
  throughput_mode: bursting
  availability_zone_name: us-east-1a
  subnet_ids:
    - value: "<subnet-id-us-east-1a>"
  security_group_ids:
    - value: "<security-group-id>"
