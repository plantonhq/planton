apiVersion: aws.openmcf.org/v1
kind: AwsWafWebAcl
metadata:
  name: <acl-name>
spec:
  scope: REGIONAL
  defaultAction:
    type: allow
  rules:
    - name: rate-limit
      priority: 1
      action: block
      rateBased:
        limit: 2000
    - name: aws-common-rules
      priority: 10
      overrideAction: none
      managedRuleGroup:
        name: AWSManagedRulesCommonRuleSet
        vendorName: AWS
    - name: aws-sqli-rules
      priority: 20
      overrideAction: none
      managedRuleGroup:
        name: AWSManagedRulesSQLiRuleSet
        vendorName: AWS
    - name: aws-known-bad-inputs
      priority: 30
      overrideAction: none
      managedRuleGroup:
        name: AWSManagedRulesKnownBadInputsRuleSet
        vendorName: AWS
