apiVersion: aws.openmcf.org/v1
kind: AwsCloudFront
metadata:
  name: my-custom-domain-cdn
spec:
  enabled: true
  aliases:
    - <your-cdn-domain.com>
  certificateArn: <acm-certificate-arn-us-east-1>
  priceClass: PRICE_CLASS_200  # US, Canada, Europe, Asia, Middle East, Africa
  origins:
    - domainName: <origin-domain-name>
      isDefault: true
