apiVersion: aws.openmcf.org/v1
kind: AwsGlobalAccelerator
metadata:
  name: prod-multi-region-ga
  labels:
    openmcf.org/provisioner: pulumi
spec:
  region: <aws-region>
  enabled: true
  ipAddressType: IPV4
  flowLogs:
    enabled: true
    s3Bucket: "<flow-logs-s3-bucket-name>"
    s3Prefix: ga-logs/prod/
  listeners:
    - name: tcp-443
      protocol: TCP
      clientAffinity: NONE
      portRanges:
        - fromPort: 443
          toPort: 443
      endpointGroups:
        - name: us-east-1
          endpointGroupRegion: us-east-1
          healthCheckProtocol: HTTP
          healthCheckPath: /health
          healthCheckIntervalSeconds: 10
          thresholdCount: 5
          trafficDialPercentage: 60.0
          endpoints:
            - endpointId: "<us-east-1-alb-arn>"
              weight: 128
              clientIpPreservationEnabled: true
        - name: eu-west-1
          endpointGroupRegion: eu-west-1
          healthCheckProtocol: HTTP
          healthCheckPath: /health
          healthCheckIntervalSeconds: 10
          thresholdCount: 5
          trafficDialPercentage: 40.0
          endpoints:
            - endpointId: "<eu-west-1-alb-arn>"
              weight: 128
              clientIpPreservationEnabled: true
