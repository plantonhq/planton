apiVersion: aws.openmcf.org/v1
kind: AwsMemorydbCluster
metadata:
  name: my-memorydb-ha
spec:
  region: <aws-region>
  engine: redis
  engineVersion: "7.1"
  description: Production HA MemoryDB cluster
  nodeType: db.r7g.large
  numShards: 2
  numReplicasPerShard: 2
  aclName: <acl-name>
  tlsEnabled: true
  subnetIds:
    - value: <private-subnet-id-az1>
    - value: <private-subnet-id-az2>
  securityGroupIds:
    - value: <security-group-id>
  snapshotRetentionLimit: 7
  snapshotWindow: "03:00-04:00"
  maintenanceWindow: "sun:05:00-sun:06:00"
  parameterGroupFamily: memorydb_redis7
  parameters:
    - name: activedefrag
      value: "yes"
    - name: maxmemory-policy
      value: volatile-lru
