apiVersion: aws.openmcf.org/v1
kind: AwsEcrRepo
metadata:
  name: my-development-ecr-repo
spec:
  repositoryName: <repository-name>
  imageImmutable: false  # Allow tag overwriting for fast iteration
  encryptionType: AES256  # default from spec
  forceDelete: false  # Still protect against accidental deletion
  scanOnPush: true  # default from spec; keep scanning even in dev
  lifecyclePolicy:
    expireUntaggedAfterDays: 3  # Aggressive cleanup for dev builds
    maxImageCount: 20  # Keep fewer images to reduce costs
