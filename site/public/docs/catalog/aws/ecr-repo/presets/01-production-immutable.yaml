apiVersion: aws.openmcf.org/v1
kind: AwsEcrRepo
metadata:
  name: my-production-ecr-repo
spec:
  region: <aws-region>
  repositoryName: <repository-name>
  imageImmutable: true  # Prevents tag overwriting in production
  encryptionType: AES256  # default from spec
  forceDelete: false  # Prevents accidental data loss
  scanOnPush: true  # default from spec; vulnerability scanning on push
  lifecyclePolicy:
    expireUntaggedAfterDays: 7  # Remove orphaned layers quickly
    maxImageCount: 100  # Retain recent images for rollback capability
