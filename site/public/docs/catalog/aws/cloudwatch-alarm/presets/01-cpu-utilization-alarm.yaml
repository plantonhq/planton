apiVersion: aws.openmcf.org/v1
kind: AwsCloudwatchAlarm
metadata:
  name: cpu-high-alarm
spec:
  comparisonOperator: GreaterThanThreshold
  evaluationPeriods: 3
  datapointsToAlarm: 2
  threshold: 80.0
  metricName: CPUUtilization
  namespace: AWS/EC2
  period: 300
  statistic: Average
  treatMissingData: breaching
  alarmDescription: "EC2 CPU utilization exceeds 80% — investigate high compute load"
  alarmActions:
    - value: arn:aws:sns:us-east-1:123456789012:ops-alerts
