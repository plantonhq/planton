apiVersion: aws.openmcf.org/v1
kind: AwsEcsService
metadata:
  name: my-background-worker
spec:
  clusterArn:
    value: "<ecs-cluster-arn>"
  container:
    image:
      repo: <ecr-repo-uri>
      tag: latest
    replicas: 1
    cpu: 256
    memory: 512
    logging:
      enabled: true  # recommended_default from spec
    env:
      variables:
        QUEUE_URL: <sqs-queue-url>
  network:
    subnets:
      - value: "<private-subnet-id>"
    securityGroups:
      - value: "<security-group-id>"
