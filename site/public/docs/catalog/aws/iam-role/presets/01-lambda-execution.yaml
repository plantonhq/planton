apiVersion: aws.openmcf.org/v1
kind: AwsIamRole
metadata:
  name: my-lambda-execution-role
spec:
  description: Lambda function execution role with basic logging permissions
  path: /  # recommended_default from spec
  trustPolicy:
    Version: "2012-10-17"
    Statement:
      - Effect: Allow
        Principal:
          Service: lambda.amazonaws.com
        Action: sts:AssumeRole
  managedPolicyArns:
    - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
