apiVersion: aws.openmcf.org/v1
kind: AwsTransitGateway
metadata:
  name: my-dev-transit-gateway
spec:
  region: <aws-region>
  description: Development Transit Gateway with single VPC
  dnsSupport: true
  defaultRouteTableAssociation: true
  defaultRouteTablePropagation: true
  vpcAttachments:
    - name: dev-vpc
      vpcId:
        value: <dev-vpc-id>
      subnetIds:
        - value: <dev-private-subnet>
      dnsSupport: true
