apiVersion: aws.openmcf.org/v1
kind: AwsTransitGateway
metadata:
  name: my-inspection-transit-gateway
spec:
  region: <aws-region>
  description: Hub-and-spoke Transit Gateway with centralized firewall inspection
  defaultRouteTableAssociation: true
  defaultRouteTablePropagation: true
  dnsSupport: true
  vpnEcmpSupport: true
  vpcAttachments:
    - name: inspection-vpc
      vpcId:
        value: <inspection-vpc-id>
      subnetIds:
        - value: <inspection-subnet-az1>
        - value: <inspection-subnet-az2>
      dnsSupport: true
      applianceModeSupport: true
      defaultRouteTableAssociation: true
      defaultRouteTablePropagation: true
    - name: workload-vpc
      vpcId:
        value: <workload-vpc-id>
      subnetIds:
        - value: <workload-subnet-az1>
        - value: <workload-subnet-az2>
      dnsSupport: true
      defaultRouteTableAssociation: true
      defaultRouteTablePropagation: true
