apiVersion: aws.openmcf.org/v1
kind: AwsNetworkLoadBalancer
metadata:
  name: <nlb-name>
spec:
  region: <aws-region>
  internal: false
  deleteProtectionEnabled: true
  crossZoneLoadBalancingEnabled: true
  subnetMappings:
    - subnetId:
        value: <public-subnet-id-az1>
      allocationId:
        value: <elastic-ip-allocation-id-az1>
    - subnetId:
        value: <public-subnet-id-az2>
      allocationId:
        value: <elastic-ip-allocation-id-az2>
  listeners:
    - name: tls-443
      port: 443
      protocol: TLS
      tls:
        certificateArn:
          value: <acm-certificate-arn>
        sslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      targetGroup:
        port: <application-port>
        protocol: TCP
        preserveClientIp: true
        connectionTermination: true
        deregistrationDelaySeconds: 120
        healthCheck:
          protocol: HTTP
          port: traffic-port
          path: <health-check-path>
          healthyThreshold: 3
          unhealthyThreshold: 3
          intervalSeconds: 30
          timeoutSeconds: 10
          matcher: 200-399
  dns:
    enabled: true
    route53ZoneId:
      value: <route53-hosted-zone-id>
    hostnames:
      - <your-domain.com>
