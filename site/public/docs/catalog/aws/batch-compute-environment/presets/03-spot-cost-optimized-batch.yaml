apiVersion: aws.openmcf.org/v1
kind: AwsBatchComputeEnvironment
metadata:
  name: my-spot-batch
spec:
  computeResources:
    type: SPOT
    maxVcpus: 1024
    minVcpus: 0
    instanceTypes:
      - m5.xlarge
      - m5.2xlarge
      - c5.xlarge
      - c5.2xlarge
      - r5.xlarge
    allocationStrategy: SPOT_CAPACITY_OPTIMIZED
    bidPercentage: 60
    subnetIds:
      - value: "<private-subnet-id-az1>"
      - value: "<private-subnet-id-az2>"
      - value: "<private-subnet-id-az3>"
    securityGroupIds:
      - value: "<security-group-id>"
    instanceRole:
      value: "<ecs-instance-profile-arn>"
    spotIamFleetRole:
      value: "<spot-fleet-role-arn>"
  schedulingPolicy:
    shareDecaySeconds: 3600
    shareDistributions:
      - shareIdentifier: team-data
        weightFactor: 1.0
      - shareIdentifier: team-ml
        weightFactor: 0.5
  jobQueues:
    - name: batch-processing
      priority: 1
      jobStateTimeLimitActions:
        - action: CANCEL
          maxTimeSeconds: 7200
          reason: "Job stuck in RUNNABLE for over 2 hours"
          state: RUNNABLE
