apiVersion: aws.openmcf.org/v1
kind: AwsCognitoUserPool
metadata:
  name: ${name}
  org: ${org}
  env: ${env}
  id: ${id}
  labels:
    openmcf.org/provisioner: pulumi
    openmcf.org/stack: ${env}.AwsCognitoUserPool.${name}
spec:
  region: <aws-region>
  usernameAttributes:
    - email
  passwordPolicy:
    minimumLength: 12
    requireLowercase: true
    requireUppercase: true
    requireNumbers: true
    requireSymbols: true
    temporaryPasswordValidityDays: 3
  mfaConfiguration: OPTIONAL
  softwareTokenMfaEnabled: true
  autoVerifiedAttributes:
    - email
  accountRecoveryMechanisms:
    - name: verified_email
      priority: 1
  emailConfiguration:
    emailSendingAccount: DEVELOPER
    sourceArn: "arn:aws:ses:us-east-1:123456789012:identity/noreply@example.com"
    fromEmailAddress: "App Auth <noreply@example.com>"
  deletionProtection: true
  clients:
    - name: web-spa
      allowedOauthFlowsUserPoolClient: true
      allowedOauthFlows:
        - code
      allowedOauthScopes:
        - openid
        - email
        - profile
      callbackUrls:
        - https://app.example.com/callback
      logoutUrls:
        - https://app.example.com/logout
      supportedIdentityProviders:
        - COGNITO
      explicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      accessTokenValidityMinutes: 60
      idTokenValidityMinutes: 60
      refreshTokenValidityDays: 30
      enableTokenRevocation: true
      preventUserExistenceErrors: ENABLED
    - name: api-server
      generateSecret: true
      allowedOauthFlowsUserPoolClient: true
      allowedOauthFlows:
        - client_credentials
      allowedOauthScopes:
        - api/read
        - api/write
      explicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      accessTokenValidityMinutes: 30
      enableTokenRevocation: true
  domain:
    domain: ${name}-auth
