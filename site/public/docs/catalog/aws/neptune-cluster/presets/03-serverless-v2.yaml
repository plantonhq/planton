apiVersion: aws.openmcf.org/v1
kind: AwsNeptuneCluster
metadata:
  name: my-neptune-serverless
spec:
  region: <aws-region>
  subnetIds:
    - value: "<private-subnet-id-az1>"
    - value: "<private-subnet-id-az2>"
  securityGroupIds:
    - value: "<security-group-id>"
  vpcId:
    value: "<vpc-id>"
  engineVersion: "1.3.0.0"
  port: 8182
  instanceClass: db.serverless  # Neptune Serverless
  serverlessV2Scaling:
    minCapacity: 1.0  # Minimum NCUs; 1.0 = baseline
    maxCapacity: 16.0  # Maximum NCUs; adjust based on peak load
  storageEncrypted: true
  iamDatabaseAuthenticationEnabled: true
  backupRetentionPeriod: 7
  skipFinalSnapshot: true
