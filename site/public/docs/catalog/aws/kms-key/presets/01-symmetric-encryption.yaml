apiVersion: aws.openmcf.org/v1
kind: AwsKmsKey
metadata:
  name: my-symmetric-key
spec:
  keySpec: symmetric
  description: <key-description>
  disableKeyRotation: false  # Annual rotation enabled (recommended)
  deletionWindowDays: 30  # recommended_default from spec
  aliasName: alias/<key-alias>
