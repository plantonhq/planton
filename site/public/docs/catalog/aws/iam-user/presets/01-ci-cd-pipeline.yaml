apiVersion: aws.openmcf.org/v1
kind: AwsIamUser
metadata:
  name: my-ci-cd-user
spec:
  region: <aws-region>
  userName: <ci-cd-user-name>
  managedPolicyArns:
    - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryPowerUser
    - arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess
  inlinePolicies:
    deployAccess:
      Version: "2012-10-17"
      Statement:
        - Effect: Allow
          Action:
            - ecs:DescribeServices
            - ecs:UpdateService
            - ecs:DescribeTasks
            - ecs:RunTask
          Resource: "*"
