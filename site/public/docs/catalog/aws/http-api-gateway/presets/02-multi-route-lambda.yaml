apiVersion: aws.openmcf.org/v1
kind: AwsHttpApiGateway
metadata:
  name: my-multi-route-api
spec:
  region: <aws-region>
  description: Multi-route API with CORS support
  cors_configuration:
    allow_origins:
      - "<your-frontend-url>"
    allow_methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
    allow_headers:
      - "Content-Type"
      - "Authorization"
    allow_credentials: true
    max_age_seconds: 3600
  routes:
    - route_key: "GET /users"
      integration:
        integration_type: "AWS_PROXY"
        integration_uri:
          value: "<get-users-lambda-arn>"
    - route_key: "POST /users"
      integration:
        integration_type: "AWS_PROXY"
        integration_uri:
          value: "<create-user-lambda-arn>"
    - route_key: "GET /users/{userId}"
      integration:
        integration_type: "AWS_PROXY"
        integration_uri:
          value: "<get-user-lambda-arn>"
    - route_key: "PUT /users/{userId}"
      integration:
        integration_type: "AWS_PROXY"
        integration_uri:
          value: "<update-user-lambda-arn>"
    - route_key: "DELETE /users/{userId}"
      integration:
        integration_type: "AWS_PROXY"
        integration_uri:
          value: "<delete-user-lambda-arn>"
