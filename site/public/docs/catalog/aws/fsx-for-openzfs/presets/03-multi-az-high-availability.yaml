apiVersion: aws.openmcf.org/v1
kind: AwsFsxOpenzfsFileSystem
metadata:
  org: example-org
  env: production
  name: ha-openzfs
  id: awsfxz-ha-openzfs-production
spec:
  region: <aws-region>
  deployment_type: MULTI_AZ_1
  storage_capacity_gib: 1024
  throughput_capacity: 1280
  subnet_ids:
    - value: subnet-0123456789abcdef0
    - value: subnet-0987654321fedcba0
  preferred_subnet_id:
    value: subnet-0123456789abcdef0
  route_table_ids:
    - value: rtb-0123456789abcdef0
    - value: rtb-0987654321fedcba0
  security_group_ids:
    - value: sg-0123456789abcdef0
  kms_key_id:
    value: arn:aws:kms:us-east-1:123456789012:key/your-kms-key-id
  disk_iops_configuration:
    mode: USER_PROVISIONED
    iops: 100000
  root_volume_configuration:
    data_compression_type: ZSTD
    record_size_kib: 128
    copy_tags_to_snapshots: true
    nfs_exports:
      client_configurations:
        - clients: "10.0.0.0/16"
          options:
            - rw
            - crossmnt
            - no_root_squash
    user_and_group_quotas:
      - id: 0
        storage_capacity_quota_gib: 200
        type: USER
      - id: 1000
        storage_capacity_quota_gib: 500
        type: GROUP
  automatic_backup_retention_days: 14
  daily_automatic_backup_start_time: "03:00"
  copy_tags_to_backups: true
  copy_tags_to_volumes: true
  weekly_maintenance_start_time: "7:02:00"
