apiVersion: aws.openmcf.org/v1
kind: AwsRdsCluster
metadata:
  name: my-aurora-postgresql
spec:
  region: us-west-2
  subnetIds:
    - value: "<private-subnet-id-az1>"
    - value: "<private-subnet-id-az2>"
  securityGroupIds:
    - value: "<security-group-id>"
  engine: aurora-postgresql
  engineVersion: "15.4"
  databaseName: <database-name>
  manageMasterUserPassword: true  # recommended_default from spec; password stored in Secrets Manager
  username: master  # default from spec
  storageEncrypted: true
  deletionProtection: true
  backupRetentionPeriod: 7
  skipFinalSnapshot: false
  finalSnapshotIdentifier: <final-snapshot-name>
  enabledCloudwatchLogsExports:
    - postgresql
  copyTagsToSnapshot: true
