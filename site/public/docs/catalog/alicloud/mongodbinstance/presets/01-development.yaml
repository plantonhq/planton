apiVersion: alicloud.openmcf.org/v1
kind: AliCloudMongodbInstance
metadata:
  name: dev-mongodb
spec:
  region: cn-hangzhou
  engineVersion: "7.0"
  dbInstanceClass: dds.mongo.mid
  dbInstanceStorage: 20
  accountPassword: "${MONGODB_PASSWORD}"
  vswitchId:
    value: vsw-abc123
  replicationFactor: 3
  storageEngine: WiredTiger
