apiVersion: ali-cloud.openmcf.org/v1
kind: AliCloudPrivateDnsZone
metadata:
  name: db-zone
  org: <organization>
  env: <environment>
spec:
  region: <primary-region>
  zoneName: <zone-name>
  remark: <description>
  resourceGroupId: <resource-group-id>
  vpcAttachments:
    - vpcId: <primary-vpc-id>
    - vpcId: <secondary-vpc-id>
      regionId: <secondary-region>
  records:
    - rr: <database-name>
      type: A
      value: <database-private-ip>
  tags:
    team: <team-name>
