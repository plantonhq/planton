apiVersion: ali-cloud.openmcf.org/v1
kind: AliCloudNasFileSystem
metadata:
  name: prod-nas
  org: <organization>
  env: production
spec:
  region: <alibaba-cloud-region>
  protocolType: NFS
  storageType: Performance
  description: <purpose-description>
  encryption:
    encryptType: 1
  vpcId: <vpc-id>
  vswitchId: <vswitch-id>
  accessRules:
    - sourceCidrIp: <application-subnet-cidr>
      rwAccessType: RDWR
      userAccessType: root_squash
