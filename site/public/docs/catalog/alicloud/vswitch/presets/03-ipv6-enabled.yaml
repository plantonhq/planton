apiVersion: ali-cloud.openmcf.org/v1
kind: AliCloudVswitch
metadata:
  name: my-ipv6-vswitch
spec:
  region: <alibaba-cloud-region>
  vpcId:
    value: <your-vpc-id>
  zoneId: <availability-zone>
  cidrBlock: "172.16.0.0/24"
  vswitchName: <your-ipv6-vswitch-name>
  description: Dual-stack VSwitch with IPv6 support (requires IPv6-enabled VPC)
  enableIpv6: true
  ipv6CidrBlockMask: 42
  tags:
    networkType: dual-stack
