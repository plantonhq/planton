apiVersion: ali-cloud.openmcf.org/v1
kind: AliCloudVpc
metadata:
  name: my-dual-stack-vpc
spec:
  region: <alibaba-cloud-region>
  vpcName: <your-vpc-name>
  cidrBlock: 172.16.0.0/12
  description: Dual-stack VPC with IPv6 support for modern applications
  enableIpv6: true
  tags:
    networkType: dual-stack
