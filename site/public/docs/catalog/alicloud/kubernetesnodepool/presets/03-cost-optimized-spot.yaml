apiVersion: ali-cloud.openmcf.org/v1
kind: AliCloudKubernetesNodePool
metadata:
  name: my-spot-pool
spec:
  region: <alibaba-cloud-region>
  clusterId:
    value: <your-cluster-id>
  name: spot-pool
  vswitchIds:
    - value: <vswitch-id-zone-a>
    - value: <vswitch-id-zone-b>
    - value: <vswitch-id-zone-c>
  instanceTypes:
    - ecs.g7.xlarge
    - ecs.g7.2xlarge
    - ecs.c7.xlarge
    - ecs.c7.2xlarge
  desiredSize: 3
  imageType: AliyunLinux3 # default from spec
  systemDisk:
    category: cloud_essd # default from spec
    size: 120 # default from spec
  keyName: <your-ssh-key-pair>
  labels:
    costModel: spot
  taints:
    - key: spot-instance
      value: "true"
      effect: PreferNoSchedule
  scalingConfig:
    enable: true
    minSize: 0
    maxSize: 50
    type: spot
  multiAzPolicy: COST_OPTIMIZED
  management:
    enable: true
    autoRepair: true
    maxUnavailable: 5
  spotStrategy: SpotWithPriceLimit
  spotPriceLimits:
    - instanceType: ecs.g7.xlarge
      priceLimit: "0.98"
    - instanceType: ecs.g7.2xlarge
      priceLimit: "1.96"
    - instanceType: ecs.c7.xlarge
      priceLimit: "0.85"
    - instanceType: ecs.c7.2xlarge
      priceLimit: "1.70"
  installCloudMonitor: true # default from spec
  tags:
    team: <your-team>
    costModel: spot
