apiVersion: ali-cloud.openmcf.org/v1
kind: AliCloudEipAddress
metadata:
  name: my-high-bw-eip
spec:
  region: <alibaba-cloud-region>
  addressName: <your-eip-name>
  description: High-bandwidth EIP for production workloads
  bandwidth: 100
  internetChargeType: PayByBandwidth
  isp: BGP_PRO
  resourceGroupId: <your-resource-group-id>
  tags:
    team: <your-team>
    costCenter: <your-cost-center>
