# =============================================================================
# Release Orchestrator
# =============================================================================
# Single entry point for all release workflows. Triggers on semantic version
# tags (v*) and orchestrates the release of CLI, website, all Pulumi module
# binaries, all Terraform module zips, and content distribution zips
# (presets, IaC source, catalog pages, proto source).
#
# Architecture:
#   1. CLI job runs first (GoReleaser creates the GitHub Release)
#   2. Website job runs in parallel
#   3. Pulumi modules, Terraform modules, and Content jobs upload to
#      Cloudflare R2 (downloads.openmcf.org) after CLI completes
#
# Artifact hosting:
#   - CLI binaries   -> GitHub Release (via GoReleaser)
#   - Pulumi modules -> Cloudflare R2 (downloads.openmcf.org/releases/{tag}/modules/pulumi/)
#   - Terraform zips -> Cloudflare R2 (downloads.openmcf.org/releases/{tag}/modules/terraform/)
#   - Content zips   -> Cloudflare R2 (downloads.openmcf.org/releases/{tag}/content/)
#
# Trigger: git tag v0.1.0 && git push origin v0.1.0
# Note: Only triggers on strict semver tags (v1.2.3), not auto-release tags (v1.2.3+cli.*)
# =============================================================================

name: release

on:
  push:
    tags:
      # Strict semver only - excludes auto-release tags (v*+*)
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ============================================================================
  # CLI Release - Creates the GitHub Release
  # ============================================================================
  cli:
    uses: ./.github/workflows/release.cli.yaml
    secrets:
      HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

  # ============================================================================
  # Website Release - Runs in parallel
  # ============================================================================
  website:
    uses: ./.github/workflows/release.website.yaml

  # ============================================================================
  # Pulumi Modules - All providers (uploads to Cloudflare R2)
  # ============================================================================
  pulumi-modules:
    needs: cli
    uses: ./.github/workflows/release.pulumi-modules.yaml
    secrets:
      CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
      CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
      CLOUDFLARE_R2_ENDPOINT: ${{ secrets.CLOUDFLARE_R2_ENDPOINT }}

  # ============================================================================
  # Terraform Modules - All providers (uploads to Cloudflare R2)
  # ============================================================================
  terraform-modules:
    needs: cli
    uses: ./.github/workflows/release.terraform-modules.yaml
    secrets:
      CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
      CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
      CLOUDFLARE_R2_ENDPOINT: ${{ secrets.CLOUDFLARE_R2_ENDPOINT }}

  # ============================================================================
  # Content Distribution - presets, IaC source, catalog pages, proto source
  # ============================================================================
  content:
    needs: cli
    uses: ./.github/workflows/release.content.yaml
    secrets:
      CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
      CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
      CLOUDFLARE_R2_ENDPOINT: ${{ secrets.CLOUDFLARE_R2_ENDPOINT }}

