# =============================================================================
# Terraform Modules Release (Reusable Workflow)
# =============================================================================
# Zips all Terraform deployment component folders across all providers and
# uploads them to Cloudflare R2 (downloads.planton.dev).
#
# Features:
#   - Dynamic component discovery from directory structure
#   - Matrix-based parallelization: one job per provider
#   - Simple zip operation - no compilation needed
#   - Clear progress logging with component counts
#   - No hardcoded component paths - auto-discovers from filesystem
#
# Upload path: s3://downloads-dot-planton-dot-dev-bucket/releases/{tag}/modules/terraform/{component}.zip
# Public URL:  https://downloads.planton.dev/releases/{tag}/modules/terraform/{component}.zip
#
# Path pattern: apis/dev/planton/provider/{provider}/{component}/v1/iac/tf
#
# Called by: .github/workflows/release.yaml (after CLI release creates the release)
# =============================================================================

name: release.terraform-modules

on:
  workflow_call:
    secrets:
      CLOUDFLARE_R2_ACCESS_KEY_ID:
        required: true
      CLOUDFLARE_R2_SECRET_ACCESS_KEY:
        required: true
      CLOUDFLARE_R2_ENDPOINT:
        required: true

permissions:
  contents: read

env:
  PROVIDER_BASE_PATH: apis/dev/planton/provider
  R2_BUCKET: downloads-dot-planton-dot-dev-bucket

jobs:
  # ============================================================================
  # Zip and upload all Terraform modules for each provider
  # ============================================================================
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 18
      matrix:
        provider:
          - alicloud
          - atlas
          - auth0
          - aws
          - azure
          - civo
          - cloudflare
          - confluent
          - digitalocean
          - gcp
          - hetznercloud
          - kubernetes
          - oci
          - openfga
          - openstack
          - scaleway
          - snowflake

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Zip and upload all Terraform modules
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.CLOUDFLARE_R2_ENDPOINT }}
          PROVIDER: ${{ matrix.provider }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PROVIDER_PATH="${PROVIDER_BASE_PATH}/${PROVIDER}"
          
          # Discover all components by listing directories
          if [ ! -d "$PROVIDER_PATH" ]; then
            echo "WARNING: Provider path not found: $PROVIDER_PATH"
            exit 0
          fi
          
          # Get all component directories that have the tf folder
          COMPONENTS=()
          for component_dir in "$PROVIDER_PATH"/*/; do
            component=$(basename "$component_dir")
            tf_path="${component_dir}v1/iac/tf"
            if [ -d "$tf_path" ]; then
              COMPONENTS+=("$component")
            fi
          done
          
          TOTAL=${#COMPONENTS[@]}
          
          echo "========================================"
          echo "PROVIDER: ${PROVIDER}"
          echo "TERRAFORM MODULES: ${TOTAL}"
          echo "========================================"
          echo ""
          echo "Modules:"
          printf '  - %s\n' "${COMPONENTS[@]}"
          echo ""
          echo "========================================"
          
          if [ $TOTAL -eq 0 ]; then
            echo "WARNING: No Terraform modules found for provider ${PROVIDER}"
            exit 0
          fi
          
          COMPLETED=0
          FAILED=0
          
          for component in "${COMPONENTS[@]}"; do
            COMPLETED=$((COMPLETED + 1))
            REMAINING=$((TOTAL - COMPLETED))
            
            TF_PATH="${PROVIDER_PATH}/${component}/v1/iac/tf"
            ARTIFACT_NAME="${component}.zip"
            R2_KEY="releases/${TAG}/modules/terraform/${ARTIFACT_NAME}"
            
            echo ""
            echo "----------------------------------------"
            echo "ZIPPING: ${component}"
            echo "Progress: ${COMPLETED}/${TOTAL} (${REMAINING} remaining)"
            echo "----------------------------------------"
            
            if (cd "${TF_PATH}" && zip -r "${GITHUB_WORKSPACE}/${ARTIFACT_NAME}" .); then
              
              ZIP_SIZE=$(ls -lh "${ARTIFACT_NAME}" | awk '{print $5}')
              echo "Created: ${ARTIFACT_NAME} (${ZIP_SIZE})"
              
              # Upload to R2
              if aws s3 cp "${ARTIFACT_NAME}" "s3://${R2_BUCKET}/${R2_KEY}" \
                --endpoint-url "${AWS_ENDPOINT_URL}"; then
                echo "✓ Uploaded: https://downloads.planton.dev/${R2_KEY}"
              else
                echo "✗ ERROR: Failed to upload ${ARTIFACT_NAME} to R2"
                FAILED=$((FAILED + 1))
              fi
              
              # Clean up
              rm -f "${ARTIFACT_NAME}"
            else
              echo "✗ ERROR: Failed to zip ${component}"
              FAILED=$((FAILED + 1))
            fi
          done
          
          echo ""
          echo "========================================"
          echo "JOB SUMMARY: ${PROVIDER}"
          echo "========================================"
          echo "Total modules: ${TOTAL}"
          echo "Successfully zipped: $((TOTAL - FAILED))"
          echo "Failed: ${FAILED}"
          echo "========================================"
          
          if [ $FAILED -gt 0 ]; then
            echo "ERROR: ${FAILED} module(s) failed to zip"
            exit 1
          fi
