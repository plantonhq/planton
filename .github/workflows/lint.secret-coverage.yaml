# =============================================================================
# Secret Coverage Guard
# =============================================================================
# Fails the PR when a new cloud-resource field that LOOKS like a secret by name
# ships without the (dev.planton.shared.options.sensitive) annotation and is not
# in the accepted baseline -- the ratchet that makes the secure-by-default
# annotation sweep self-policing. It also fails on a stale baseline entry or a
# self-contradictory annotation.
#
# To fix a failure: annotate the field `sensitive`, or exempt an intentional
# non-secret with (dev.planton.shared.options.sensitive_exempt_reason), then run
# `planton secret-coverage --write-baseline`. See pkg/secretcoverage.
# =============================================================================

name: lint.secret-coverage

on:
  pull_request:
    paths:
      - 'apis/**'
      - 'pkg/secretcoverage/**'
      - '.github/workflows/lint.secret-coverage.yaml'
  push:
    branches:
      - main
    paths:
      - 'apis/**'
      - 'pkg/secretcoverage/**'
      - '.github/workflows/lint.secret-coverage.yaml'

permissions:
  contents: read

jobs:
  secret-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Run secret-coverage gate
        run: go test ./pkg/secretcoverage/...
