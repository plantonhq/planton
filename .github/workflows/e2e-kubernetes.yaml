# =============================================================================
# Kubernetes E2E Tests
# =============================================================================
# Runs E2E tests for all Kubernetes components on kind clusters at zero cloud
# cost. Uses the E2E profile framework to dynamically discover testable
# components and generate a parallel test matrix.
#
# Architecture:
#   1. build-check: compile E2E code + go vet (fast gate, every trigger)
#   2. discover: read E2E profiles, output GitHub Actions matrix JSON
#   3. e2e: matrix of (tier × provisioner) cells, each with its own kind cluster
#   4. summary: aggregate JUnit results into GitHub Step Summary
#
# Triggers:
#   - Pull requests (path-filtered): build-check only (~2 min)
#   - Weekly schedule: full pipeline (build-check → discover → e2e → summary)
#   - Manual dispatch: configurable tier/provisioner filters
# =============================================================================

name: e2e-kubernetes

on:
  schedule:
    - cron: '0 3 * * 0' # Weekly Sunday 3am UTC
  workflow_dispatch:
    inputs:
      tier:
        description: 'Tier to test (0 = all)'
        required: false
        default: '0'
        type: string
      provisioner:
        description: 'Provisioner filter (empty = all)'
        required: false
        default: ''
        type: string
  pull_request:
    paths:
      - 'apis/org/openmcf/provider/kubernetes/**'
      - 'e2e/**'
      - 'pkg/iac/**'
      - 'pkg/e2e/**'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - '.github/workflows/e2e-kubernetes.yaml'

concurrency:
  group: e2e-kubernetes-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PULUMI_CONFIG_PASSPHRASE: ''

jobs:
  # ============================================================================
  # Build Check -- fast compile + vet gate (every trigger)
  # ============================================================================
  build-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Compile E2E tests
        run: make e2e-build

      - name: Vet E2E packages
        run: make e2e-vet

  # ============================================================================
  # Discover -- load pre-generated matrix JSON (no Go compilation needed)
  # ============================================================================
  discover:
    needs: build-check
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Load and filter E2E matrix
        id: discover
        run: |
          FULL_MATRIX=$(cat .github/e2e-matrix-kubernetes.json)

          # Apply optional filters from workflow_dispatch
          TIER="${{ github.event.inputs.tier }}"
          if [ -n "$TIER" ] && [ "$TIER" != "0" ]; then
            FULL_MATRIX=$(echo "$FULL_MATRIX" | jq --argjson tier "$TIER" '{include: [.include[] | select(.tier == $tier)]}')
          fi

          PROV="${{ github.event.inputs.provisioner }}"
          if [ -n "$PROV" ]; then
            FULL_MATRIX=$(echo "$FULL_MATRIX" | jq --arg eng "$PROV" '{include: [.include[] | select(.engine == $eng)]}')
          fi

          echo "matrix=$(echo "$FULL_MATRIX" | jq -c .)" >> "$GITHUB_OUTPUT"
          echo "Matrix loaded:"
          echo "$FULL_MATRIX" | jq .

  # ============================================================================
  # E2E -- dynamic matrix, one kind cluster per cell
  # ============================================================================
  e2e:
    needs: discover
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.timeout }}
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Install kind
        run: go install sigs.k8s.io/kind@v0.27.0

      - name: Install kubectl
        run: |
          KUBECTL_VERSION=$(curl -fsSL https://dl.k8s.io/release/stable.txt)
          curl -fsSLo /usr/local/bin/kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x /usr/local/bin/kubectl

      - name: Install Pulumi
        if: matrix.engine == 'pulumi'
        run: curl -fsSL https://get.pulumi.com | sh && echo "$HOME/.pulumi/bin" >> "$GITHUB_PATH"

      - name: Install OpenTofu
        if: matrix.engine == 'terraform'
        run: |
          curl -fsSL https://get.opentofu.org/install-opentofu.sh -o install-opentofu.sh
          chmod +x install-opentofu.sh
          ./install-opentofu.sh --install-method standalone --skip-verify
          rm install-opentofu.sh

      - name: Run E2E tests
        run: |
          gotestsum \
            --format=testdox \
            --junitfile="results-${{ matrix.name }}.xml" \
            -- \
            -tags=e2e \
            -timeout=${{ matrix.timeout }}m \
            -v \
            -count=1 \
            -run '${{ matrix.run_regex }}' \
            ./e2e/...

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-${{ matrix.name }}
          path: results-${{ matrix.name }}.xml
          retention-days: 30

  # ============================================================================
  # Summary -- aggregate results into GitHub Step Summary
  # ============================================================================
  summary:
    needs: e2e
    if: always() && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          pattern: e2e-results-*
          merge-multiple: true

      - name: Generate summary
        run: |
          echo "## Kubernetes E2E Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cell | Tests | Passed | Failed | Skipped | Duration |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|--------|--------|---------|----------|" >> "$GITHUB_STEP_SUMMARY"

          TOTAL_TESTS=0
          TOTAL_PASS=0
          TOTAL_FAIL=0
          TOTAL_SKIP=0

          for f in results-*.xml; do
            [ -f "$f" ] || continue
            CELL=$(basename "$f" .xml | sed 's/^results-//')

            TESTS=$(grep -c '<testcase' "$f" 2>/dev/null || echo "0")
            FAILURES=$(grep -oP 'failures="\K[0-9]+' "$f" 2>/dev/null | head -1 || echo "0")
            SKIPPED=$(grep -c '<skipped' "$f" 2>/dev/null || echo "0")
            TIME=$(grep -oP 'time="\K[0-9.]+' "$f" 2>/dev/null | head -1 || echo "0")
            PASSED=$((TESTS - FAILURES - SKIPPED))

            TOTAL_TESTS=$((TOTAL_TESTS + TESTS))
            TOTAL_PASS=$((TOTAL_PASS + PASSED))
            TOTAL_FAIL=$((TOTAL_FAIL + FAILURES))
            TOTAL_SKIP=$((TOTAL_SKIP + SKIPPED))

            STATUS="✅"
            [ "$FAILURES" -gt 0 ] && STATUS="❌"

            echo "| $STATUS $CELL | $TESTS | $PASSED | $FAILURES | $SKIPPED | ${TIME}s |" >> "$GITHUB_STEP_SUMMARY"
          done

          echo "| **Total** | **$TOTAL_TESTS** | **$TOTAL_PASS** | **$TOTAL_FAIL** | **$TOTAL_SKIP** | |" >> "$GITHUB_STEP_SUMMARY"

          if [ "$TOTAL_FAIL" -gt 0 ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Failures" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            for f in results-*.xml; do
              [ -f "$f" ] || continue
              FAILURES=$(grep -oP 'failures="\K[0-9]+' "$f" 2>/dev/null | head -1 || echo "0")
              [ "$FAILURES" -gt 0 ] || continue

              CELL=$(basename "$f" .xml | sed 's/^results-//')
              echo "**$CELL:**" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              grep -A5 '<failure' "$f" 2>/dev/null | head -30 >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
            done
          fi
