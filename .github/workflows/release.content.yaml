# =============================================================================
# Content Distribution Release (Reusable Workflow)
# =============================================================================
# Packages Planton content into four zips and uploads them to Cloudflare R2
# (downloads.planton.dev). These zips decouple downstream consumers (e.g. the
# Planton upgrade-planton script) from needing a local Planton checkout.
#
# Artifacts created:
#   presets.zip       -- Preset YAML + MD, kind enum proto
#   iac-source.zip    -- IaC module source (.go, .tf, .md, .yaml)
#   catalog-pages.zip -- Per-component catalog-page.md
#   proto-source.zip  -- Raw proto source (spec, api, stack_input, stack_outputs)
#
# Upload path: s3://planton-downloads-bucket/releases/{tag}/content/{name}.zip
# Public URL:  https://downloads.planton.dev/releases/{tag}/content/{name}.zip
#
# Called by: .github/workflows/release.yaml (after CLI release creates the release)
# =============================================================================

name: release.content

on:
  workflow_call:
    secrets:
      CLOUDFLARE_R2_ACCESS_KEY_ID:
        required: true
      CLOUDFLARE_R2_SECRET_ACCESS_KEY:
        required: true
      CLOUDFLARE_R2_ENDPOINT:
        required: true

permissions:
  contents: read

env:
  R2_BUCKET: planton-downloads-bucket

jobs:
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package and upload content zips
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.CLOUDFLARE_R2_ENDPOINT }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          bash tools/ci/release/package_content.sh "$TAG"

          echo ""
          echo "Uploading content zips to R2 (releases/${TAG}/content/)..."
          for zip in presets.zip iac-source.zip catalog-pages.zip proto-source.zip; do
            if [ -f "$zip" ]; then
              R2_KEY="releases/${TAG}/content/${zip}"
              aws s3 cp "$zip" "s3://${R2_BUCKET}/${R2_KEY}" \
                --endpoint-url "${AWS_ENDPOINT_URL}"
              echo "  uploaded: https://downloads.planton.dev/${R2_KEY}"
            else
              echo "  WARNING: $zip not found, skipping upload"
            fi
          done
