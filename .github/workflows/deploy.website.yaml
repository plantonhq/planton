# =============================================================================
# Website Deploy (Manual Trigger)
# =============================================================================
# Builds and deploys openmcf.org to GitHub Pages from any branch.
#
# Use the branch picker in the GitHub Actions UI to select the branch to
# deploy. No tagging or GitHub release is created — this is a lightweight
# operational deploy for previewing changes before merging.
# =============================================================================

name: deploy.website
run-name: "Website Deploy: ${{ github.ref_name }}"

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  pages-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: |
          corepack enable
          corepack install
          yarn

      - name: Build site
        run: |
          yarn build
          if [ -f out/index.html ] && [ ! -f out/404.html ]; then
            cp out/index.html out/404.html
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/out

  pages-deploy:
    needs: pages-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
