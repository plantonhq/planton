# =============================================================================
# Pulumi Modules Auto-Release
# =============================================================================
# Builds pre-compiled binaries for Pulumi deployment components, uploads them
# to Cloudflare R2 (downloads.planton.dev), and creates a GitHub release with
# download links.
#
# Tag Format: v{semver}-pulumi.{component}.{YYYYMMDD}.{N}
# Example: v0.3.5-pulumi.awsecsservice.20260108.0
#
# Multi-Platform Builds (parallel via matrix):
#   - linux_amd64    - CI/CD, Docker, cloud servers
#   - darwin_arm64   - Apple Silicon Macs
#   - darwin_amd64   - Intel Macs
#   - windows_amd64  - Windows
#
# Upload path: s3://downloads-dot-planton-dot-dev-bucket/releases/{tag}/modules/pulumi/{component}_{platform}.gz
# Public URL:  https://downloads.planton.dev/releases/{tag}/modules/pulumi/{component}_{platform}.gz
#
# Triggered by: auto-tag.yaml via workflow_dispatch (one call per component)
# =============================================================================

name: auto-release.pulumi-modules
run-name: "Pulumi: ${{ inputs.component }} (${{ inputs.tag }})"

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.3.5-pulumi.awsecsservice.20260108.0)'
        required: true
        type: string
      component:
        description: 'Component name (e.g., awsecsservice)'
        required: true
        type: string
      provider:
        description: 'Provider name (e.g., aws, gcp, kubernetes)'
        required: true
        type: string
      path:
        description: 'Path to the Pulumi module (e.g., apis/dev/planton/provider/aws/awsecsservice/v1/iac/pulumi)'
        required: true
        type: string

permissions:
  contents: write

env:
  R2_BUCKET: downloads-dot-planton-dot-dev-bucket

jobs:
  # ===========================================================================
  # Create Release
  # ===========================================================================
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.tag }}"
          COMPONENT="${{ inputs.component }}"
          PROVIDER="${{ inputs.provider }}"
          BASE_URL="https://downloads.planton.dev/releases/${TAG}/modules/pulumi"
          
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists"
          else
            cat > release-notes.md << EOF
          ## Pulumi Module Auto-Release

          This is an auto-release of the **${COMPONENT}** Pulumi deployment component binaries.

          ---

          ## Module Info

          | Field | Value |
          |-------|-------|
          | Component | ${COMPONENT} |
          | Provider | ${PROVIDER} |
          | Tag | \`${TAG}\` |
          | Commit | ${{ github.sha }} |

          ---

          ## Available Platforms

          | Platform | Download |
          |----------|----------|
          | Linux x86-64 | [${COMPONENT}_linux_amd64.gz](${BASE_URL}/${COMPONENT}_linux_amd64.gz) |
          | macOS Apple Silicon | [${COMPONENT}_darwin_arm64.gz](${BASE_URL}/${COMPONENT}_darwin_arm64.gz) |
          | macOS Intel | [${COMPONENT}_darwin_amd64.gz](${BASE_URL}/${COMPONENT}_darwin_amd64.gz) |
          | Windows x86-64 | [${COMPONENT}_windows_amd64.exe.gz](${BASE_URL}/${COMPONENT}_windows_amd64.exe.gz) |

          ---

          ## Download and Extract

          \`\`\`bash
          # Linux x86-64
          curl -LO ${BASE_URL}/${COMPONENT}_linux_amd64.gz
          gunzip ${COMPONENT}_linux_amd64.gz
          chmod +x ${COMPONENT}_linux_amd64

          # macOS Apple Silicon
          curl -LO ${BASE_URL}/${COMPONENT}_darwin_arm64.gz
          gunzip ${COMPONENT}_darwin_arm64.gz
          chmod +x ${COMPONENT}_darwin_arm64
          \`\`\`

          ---

          ## Usage with IaC Runner

          This binary is designed to be used with the Planton IaC Runner.

          ---

          ## Source Code

          \`apis/dev/planton/provider/${PROVIDER}/${COMPONENT}/v1/iac/pulumi/\`
          EOF
            
            gh release create "${TAG}" \
              --title "${TAG}" \
              --notes-file release-notes.md
            
            echo "Created release: ${TAG}"
          fi

  # ===========================================================================
  # Build and Upload (parallel across platforms)
  # ===========================================================================
  build:
    needs: create-release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        platform: [linux_amd64, darwin_arm64, darwin_amd64, windows_amd64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build and upload binary
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.CLOUDFLARE_R2_ENDPOINT }}
        run: |
          COMPONENT="${{ inputs.component }}"
          PROVIDER="${{ inputs.provider }}"
          TAG="${{ inputs.tag }}"
          COMPONENT_PATH="${{ inputs.path }}"
          PLATFORM="${{ matrix.platform }}"
          
          # Parse platform
          GOOS="${PLATFORM%%_*}"
          GOARCH="${PLATFORM##*_}"
          
          echo "========================================"
          echo "BUILDING: ${COMPONENT}"
          echo "Platform: ${PLATFORM}"
          echo "========================================"
          
          # Handle Windows .exe extension
          if [ "$GOOS" = "windows" ]; then
            BINARY_NAME="${COMPONENT}.exe"
            ARTIFACT_NAME="${COMPONENT}_${PLATFORM}.exe.gz"
          else
            BINARY_NAME="${COMPONENT}"
            ARTIFACT_NAME="${COMPONENT}_${PLATFORM}.gz"
          fi
          
          R2_KEY="releases/${TAG}/modules/pulumi/${ARTIFACT_NAME}"
          
          # Build
          CGO_ENABLED=0 GOOS="${GOOS}" GOARCH="${GOARCH}" go build \
            -ldflags="-s -w -X main.Version=${TAG}" \
            -o "${BINARY_NAME}" \
            "./${COMPONENT_PATH}"
          
          # Compress
          gzip -9 -c "${BINARY_NAME}" > "${ARTIFACT_NAME}"
          
          COMP_SIZE=$(ls -lh "${ARTIFACT_NAME}" | awk '{print $5}')
          echo "Built: ${ARTIFACT_NAME} (${COMP_SIZE})"
          
          # Upload to R2
          aws s3 cp "${ARTIFACT_NAME}" "s3://${R2_BUCKET}/${R2_KEY}" \
            --endpoint-url "${AWS_ENDPOINT_URL}"
          echo "✓ Uploaded: https://downloads.planton.dev/${R2_KEY}"

  # ===========================================================================
  # Summary
  # ===========================================================================
  summary:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Generate summary
        run: |
          TAG="${{ inputs.tag }}"
          COMPONENT="${{ inputs.component }}"
          PROVIDER="${{ inputs.provider }}"
          BASE_URL="https://downloads.planton.dev/releases/${TAG}/modules/pulumi"
          
          echo "## Pulumi Module Auto-Release Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Component:** ${COMPONENT}" >> $GITHUB_STEP_SUMMARY
          echo "**Provider:** ${PROVIDER}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** \`${TAG}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts Uploaded to R2" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Download |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Linux x86-64 | [${COMPONENT}_linux_amd64.gz](${BASE_URL}/${COMPONENT}_linux_amd64.gz) |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS Apple Silicon | [${COMPONENT}_darwin_arm64.gz](${BASE_URL}/${COMPONENT}_darwin_arm64.gz) |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS Intel | [${COMPONENT}_darwin_amd64.gz](${BASE_URL}/${COMPONENT}_darwin_amd64.gz) |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows x86-64 | [${COMPONENT}_windows_amd64.exe.gz](${BASE_URL}/${COMPONENT}_windows_amd64.exe.gz) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View Release](https://github.com/${{ github.repository }}/releases/tag/${TAG})" >> $GITHUB_STEP_SUMMARY
