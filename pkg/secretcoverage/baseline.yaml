# Secret-coverage baseline -- the accepted backlog of cloud-resource fields that
# LOOK sensitive by name (the secret heuristic) but are not yet annotated with the
# OpenMCF `sensitive` option. This is the annotation-sweep TODO list.
#
# It is NOT a permanent exemption. A field that is intentionally not a secret (a
# public key, an access-key id, a resource name) must use the proto
# `sensitive_exempt_reason` option instead, which documents WHY in the proto itself.
#
# The CI guardrail (go test ./pkg/secretcoverage/...) fails when:
#   - a gap appears that is NOT listed here (a new unannotated secret field shipped), or
#   - a listed entry is no longer a gap (it was annotated/exempted -- remove it here).
# As the sweep proceeds, annotate fields and delete their lines; this list trends to 0.
#
# Regenerate with:  openmcf secret-coverage --write-baseline
#
# ─────────────────────────────────────────────────────────────────────────────
# Remaining backlog after the 2026-06-16 secure-by-default annotation sweep.
# These 20 fields ARE real secrets, deliberately deferred (not yet annotated) for
# one of four reasons, each to be closed in a follow-up:
#   (R)  Secret nested inside a REPEATED message. The web wizard renders these
#        rows with a raw input today, so annotating would degrade the create UX
#        until the repeated-row secret picker lands (planton follow-up).
#   (C)  Service env-var secret maps. Governed by the env-resolution path and the
#        still-open reference-only (allow_literals) decision; annotating here would
#        pre-empt that decision.
#   (D)  Secret-holder kinds (KubernetesSecret, OciVaultSecret) whose purpose is to
#        materialize a secret. Reference-only is the right end state but a
#        fundamental UX shift; needs its own design slice.
#   (FK) AzureVirtualMachine.admin_password also offers a foreign-key reference to
#        an AzureKeyVault secret; annotating would override that picker -- pending a
#        product decision on which reference model wins.
# ─────────────────────────────────────────────────────────────────────────────
gaps:
  # (R) nested-in-repeated secret rows
  - AliCloudPolardbCluster:spec.accounts.account_password
  - AliCloudRdsInstance:spec.accounts.account_password
  - OciApplicationLoadBalancer:spec.certificates.passphrase
  - OciApplicationLoadBalancer:spec.certificates.private_key
  - OciContainerInstance:spec.image_pull_secrets.password
  - ScalewayMongodbInstance:spec.users.password
  - ScalewayRdbInstance:spec.users.password
  # (C) service env-var secret maps
  - AwsAppRunnerService:spec.environment_secrets
  - AwsEcsService:spec.container.env.secrets
  - CloudflareWorker:spec.env.secrets
  - DigitalOceanFunction:spec.secret_environment_variables
  - GcpCloudFunction:spec.service_config.secret_environment_variables
  - GcpCloudRun:spec.container.env.secrets
  # (D) secret-holder kinds
  - KubernetesSecret:spec.basic_auth.password
  - KubernetesSecret:spec.docker_config_json.password
  - KubernetesSecret:spec.ssh_auth.ssh_private_key
  - OciVaultSecret:spec.secret_generation_context.secret_template
  - OciVaultSecret:spec.secret_metadata
  - OciVaultSecret:spec.secret_rules.secret_version_expiry_interval
  # (FK) foreign-key alternative pending product decision
  - AzureVirtualMachine:spec.admin_password
